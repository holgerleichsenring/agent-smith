apiVersion: v1
kind: Service
metadata:
  name: agentsmith-server
  namespace: agentsmith
  labels:
    app: agentsmith-server
    app.kubernetes.io/name: agentsmith-server
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app: agentsmith-server
  ports:
    - name: http
      port: 80
      targetPort: 8081
      protocol: TCP
