<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="lc-title lc-desc">
  <title id="lc-title">Agent Smith lifecycle: one ticket — N sandboxes — N pull requests</title>
  <desc id="lc-desc">A ticket flows from Azure DevOps, Jira, GitHub or GitLab into the Agent Smith orchestrator, which spawns one sandbox per repository with its own toolchain image. Each sandbox produces one pull request. The ticket is written back as resolved with every PR link.</desc>

  <defs>
    <marker id="lc-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    :root, svg {
      --lc-bg: #1c1e22;
      --lc-surface: #24262c;
      --lc-surface-2: #2c2f35;
      --lc-border: rgba(216, 212, 204, 0.16);
      --lc-text: #d8d4cc;
      --lc-mute: #6b7280;
      --lc-accent: #22c55e;
      --lc-accent-soft: rgba(34, 197, 94, 0.18);
    }
    .lc-bg { fill: #1c1e22; }
    .lc-surface { fill: #24262c; stroke: rgba(216, 212, 204, 0.16); stroke-width: 0.5; }
    .lc-surface-2 { fill: #2c2f35; stroke: rgba(216, 212, 204, 0.16); stroke-width: 0.5; }
    .lc-text { fill: #d8d4cc; font-family: 'Inter', system-ui, sans-serif; }
    .lc-mute { fill: #6b7280; font-family: 'Inter', system-ui, sans-serif; }
    .lc-mono { font-family: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace; }
    .lc-accent { fill: #22c55e; }
    .lc-wire { stroke: rgba(216, 212, 204, 0.18); stroke-dasharray: 4 6; }
    .lc-wire-accent { stroke: #22c55e; stroke-dasharray: 4 6; opacity: 0.55; }

    @keyframes lc-flow { to { stroke-dashoffset: -20; } }
    @keyframes lc-cycle {
      0%, 18%   { opacity: 1; }
      20%, 100% { opacity: 0; }
    }
    @keyframes lc-stage-spawn {
      0%, 18% { opacity: 0; transform: scaleY(0.05); }
      22%, 38% { opacity: 1; transform: scaleY(1); }
      42%, 100% { opacity: 1; transform: scaleY(1); }
    }
    @keyframes lc-stage-work {
      0%, 38% { opacity: 0; }
      42%, 58% { opacity: 1; }
      62%, 100% { opacity: 0; }
    }
    @keyframes lc-stage-prs {
      0%, 58% { opacity: 0; transform: translateY(8px); }
      62%, 78% { opacity: 1; transform: translateY(0); }
      82%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes lc-stage-resolved {
      0%, 78% { opacity: 0; }
      82%, 100% { opacity: 1; }
    }
    @keyframes lc-workbar {
      0%, 100% { transform: scaleX(0.25); }
      50% { transform: scaleX(1); }
    }

    .lc-stage-1 { animation: lc-cycle 12s infinite; }
    .lc-stage-2 { transform-origin: center bottom; transform-box: fill-box; animation: lc-stage-spawn 12s infinite; }
    .lc-stage-3 { animation: lc-stage-work 12s infinite; }
    .lc-stage-4 { transform-box: fill-box; animation: lc-stage-prs 12s infinite; }
    .lc-stage-5 { animation: lc-stage-resolved 12s infinite; }

    .lc-wire { animation: lc-flow 1.4s linear infinite; }
    .lc-workbar { transform-origin: left; transform-box: fill-box; animation: lc-workbar 1.6s ease-in-out infinite; }
    .lc-wb-b { animation-delay: 0.3s; }
    .lc-wb-c { animation-delay: 0.6s; }
    .lc-wb-d { animation-delay: 0.15s; }
  </style>

  <!-- Page background -->
  <rect width="920" height="560" rx="14" class="lc-bg"/>

  <!-- SOURCES (always visible) -->
  <g class="lc-mono">
    <text x="40" y="30" class="lc-text" font-size="15" font-weight="500">sources</text>
    <rect x="40" y="44" width="150" height="38" rx="7" class="lc-surface"/>
    <text x="58" y="68" class="lc-text" font-size="12.5">Azure DevOps</text>
    <rect x="40" y="90" width="150" height="38" rx="7" class="lc-surface"/>
    <text x="58" y="114" class="lc-text" font-size="12.5">Jira</text>
    <rect x="40" y="136" width="150" height="38" rx="7" class="lc-surface"/>
    <text x="58" y="160" class="lc-text" font-size="12.5">GitHub</text>
    <rect x="40" y="182" width="150" height="38" rx="7" class="lc-surface"/>
    <text x="58" y="206" class="lc-text" font-size="12.5">GitLab</text>
  </g>

  <!-- Feeder lines into orchestrator -->
  <path d="M190 63 C 240 63, 250 120, 318 130" fill="none" class="lc-wire" marker-end="url(#lc-arrow)"/>
  <path d="M190 109 C 245 109, 255 126, 318 134" fill="none" class="lc-wire" marker-end="url(#lc-arrow)"/>
  <path d="M190 155 C 245 155, 255 144, 318 138" fill="none" class="lc-wire" marker-end="url(#lc-arrow)"/>
  <path d="M190 201 C 255 201, 255 150, 318 142" fill="none" class="lc-wire" marker-end="url(#lc-arrow)"/>

  <!-- Moving ticket dot (stage 1) -->
  <g class="lc-stage-1">
    <circle cx="200" cy="63" r="7" class="lc-accent"/>
  </g>

  <!-- ORCHESTRATOR (always visible) -->
  <rect x="326" y="58" width="210" height="104" rx="9" class="lc-surface"/>
  <text x="344" y="84" class="lc-accent" font-size="15" font-weight="600" font-family="Inter, system-ui, sans-serif">Agent Smith</text>
  <text x="344" y="103" class="lc-mute" font-size="12.5" font-family="Inter, system-ui, sans-serif">orchestrator + agent loop</text>
  <g class="lc-mono">
    <rect x="344" y="116" width="86" height="30" rx="5" class="lc-surface-2"/>
    <text x="357" y="135" class="lc-text" font-size="11.5">pipeline</text>
    <rect x="438" y="116" width="84" height="30" rx="5" class="lc-surface-2"/>
    <text x="452" y="135" class="lc-accent" font-size="11.5">redis</text>
  </g>
  <text x="552" y="78" class="lc-mute lc-mono" font-size="11.5">k8s</text>
  <text x="552" y="94" class="lc-mute lc-mono" font-size="11.5">/ compose</text>

  <!-- STAGE 2: fan-out arrows -->
  <g class="lc-stage-3" opacity="0">
    <text x="430" y="200" class="lc-accent lc-mono" font-size="11.5" text-anchor="middle">one repo · one sandbox</text>
  </g>
  <g opacity="0.5">
    <path d="M380 162 L 150 250" fill="none" class="lc-wire-accent lc-wire" marker-end="url(#lc-arrow)"/>
    <path d="M410 162 L 370 250" fill="none" class="lc-wire-accent lc-wire" marker-end="url(#lc-arrow)"/>
    <path d="M452 162 L 560 250" fill="none" class="lc-wire-accent lc-wire" marker-end="url(#lc-arrow)"/>
    <path d="M484 162 L 770 250" fill="none" class="lc-wire-accent lc-wire" marker-end="url(#lc-arrow)"/>
  </g>

  <!-- SANDBOXES (appear in stage 2) -->
  <g class="lc-stage-2">
    <rect x="64" y="256" width="150" height="128" rx="9" class="lc-surface-2"/>
    <text x="80" y="280" class="lc-text" font-size="15" font-weight="600" font-family="Inter, system-ui, sans-serif">server</text>
    <text x="80" y="298" class="lc-accent lc-mono" font-size="11.5">dotnet/sdk:8.0</text>
    <rect x="80" y="312" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="80" y="312" width="118" height="7" rx="3.5" class="lc-accent lc-workbar"/>
    <rect x="80" y="326" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="80" y="326" width="118" height="7" rx="3.5" class="lc-accent lc-workbar lc-wb-c"/>
    <text x="80" y="356" class="lc-mute lc-mono" font-size="10.5">Auth.cs</text>
    <text x="80" y="372" class="lc-mute lc-mono" font-size="10.5">LoginController.cs</text>
  </g>
  <g class="lc-stage-2" style="animation-delay: 0.12s">
    <rect x="246" y="256" width="150" height="128" rx="9" class="lc-surface-2"/>
    <text x="262" y="280" class="lc-text" font-size="15" font-weight="600" font-family="Inter, system-ui, sans-serif">client</text>
    <text x="262" y="298" class="lc-accent lc-mono" font-size="11.5">node:20</text>
    <rect x="262" y="312" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="262" y="312" width="118" height="7" rx="3.5" class="lc-accent lc-workbar lc-wb-b"/>
    <rect x="262" y="326" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="262" y="326" width="118" height="7" rx="3.5" class="lc-accent lc-workbar"/>
    <text x="262" y="356" class="lc-mute lc-mono" font-size="10.5">authClient.ts</text>
    <text x="262" y="372" class="lc-mute lc-mono" font-size="10.5">session.ts</text>
  </g>
  <g class="lc-stage-2" style="animation-delay: 0.24s">
    <rect x="540" y="256" width="150" height="128" rx="9" class="lc-surface-2"/>
    <text x="556" y="280" class="lc-text" font-size="15" font-weight="600" font-family="Inter, system-ui, sans-serif">worker</text>
    <text x="556" y="298" class="lc-accent lc-mono" font-size="11.5">dotnet/sdk:8.0</text>
    <rect x="556" y="312" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="556" y="312" width="118" height="7" rx="3.5" class="lc-accent lc-workbar lc-wb-d"/>
    <rect x="556" y="326" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="556" y="326" width="118" height="7" rx="3.5" class="lc-accent lc-workbar lc-wb-c"/>
    <text x="556" y="356" class="lc-mute lc-mono" font-size="10.5">TokenQueue.cs</text>
    <text x="556" y="372" class="lc-mute lc-mono" font-size="10.5">RefreshJob.cs</text>
  </g>
  <g class="lc-stage-2" style="animation-delay: 0.36s">
    <rect x="722" y="256" width="150" height="128" rx="9" class="lc-surface-2"/>
    <text x="738" y="280" class="lc-text" font-size="15" font-weight="600" font-family="Inter, system-ui, sans-serif">docs</text>
    <text x="738" y="298" class="lc-accent lc-mono" font-size="11.5">alpine:3</text>
    <rect x="738" y="312" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="738" y="312" width="118" height="7" rx="3.5" class="lc-accent lc-workbar lc-wb-b"/>
    <rect x="738" y="326" width="118" height="7" rx="3.5" fill="#22c55e" opacity="0.22"/>
    <rect x="738" y="326" width="118" height="7" rx="3.5" class="lc-accent lc-workbar"/>
    <text x="738" y="356" class="lc-mute lc-mono" font-size="10.5">README.md</text>
    <text x="738" y="372" class="lc-mute lc-mono" font-size="10.5">auth-api.md</text>
  </g>

  <!-- STAGE 4: PRs -->
  <g class="lc-stage-4 lc-mono">
    <rect x="64"  y="402" width="150" height="34" rx="7" fill="#24262c" stroke="#22c55e" stroke-width="1"/>
    <text x="80"  y="423" class="lc-accent" font-size="11.5">PR · server  ✓</text>
    <rect x="246" y="402" width="150" height="34" rx="7" fill="#24262c" stroke="#22c55e" stroke-width="1"/>
    <text x="262" y="423" class="lc-accent" font-size="11.5">PR · client  ✓</text>
    <rect x="540" y="402" width="150" height="34" rx="7" fill="#24262c" stroke="#22c55e" stroke-width="1"/>
    <text x="556" y="423" class="lc-accent" font-size="11.5">PR · worker  ✓</text>
    <rect x="722" y="402" width="150" height="34" rx="7" fill="#24262c" stroke="#22c55e" stroke-width="1"/>
    <text x="738" y="423" class="lc-accent" font-size="11.5">PR · docs    ✓</text>
  </g>

  <!-- STAGE 5: resolved ticket banner -->
  <g class="lc-stage-5">
    <rect x="40" y="450" width="832" height="94" rx="9" class="lc-surface"/>
    <circle cx="66" cy="478" r="9" class="lc-accent"/>
    <path d="M61.5 478 l3 3 l6 -7" stroke="#1c1e22" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="475" class="lc-text" font-size="15" font-weight="600" font-family="Inter, system-ui, sans-serif">ticket #4471 — resolved</text>
    <text x="86" y="493" class="lc-mute" font-size="12.5" font-family="Inter, system-ui, sans-serif">one ticket · one run · 4 pull requests, branch agentsmith/ticket-4471</text>
    <g class="lc-mono">
      <text x="86"  y="520" class="lc-accent" font-size="11.5">→ server  · agentsmith/ticket-4471</text>
      <text x="86"  y="536" class="lc-accent" font-size="11.5">→ client  · agentsmith/ticket-4471</text>
      <text x="470" y="520" class="lc-accent" font-size="11.5">→ worker  · agentsmith/ticket-4471</text>
      <text x="470" y="536" class="lc-accent" font-size="11.5">→ docs    · agentsmith/ticket-4471</text>
    </g>
  </g>
</svg>
