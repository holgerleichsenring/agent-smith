# yaml-language-server: $schema=agentsmith.schema.json
#
# Agent Smith — Example Configuration (p0139 catalog-first schema)
#
# Top-level catalogs (`agents:`, `repos:`, `trackers:`, `pipeline_triggers:`)
# are defined once. Each project under `projects:` references catalog entries
# by name and adds its own trigger blocks. This replaces the pre-p0139 form
# where every project carried inline source/tickets/agent blocks (see
# docs/configuration/migration-from-pre-p0139.md if you're migrating).
#
# Supported providers:
#   - AI agents: Claude (Anthropic), OpenAI, Azure OpenAI, Gemini (Google), Ollama
#   - Repos:     GitHub | GitLab | AzureDevOps | Local
#   - Trackers:  GitHub | GitLab | AzureDevOps | Jira

# --- Sandbox carrier image (REQUIRED for K8s/Docker spawners) ---
sandbox:
  agent_registry: holgerleichsenring
  agent_version: 0.48.0

# --- Orchestrator container image (REQUIRED for K8s/Docker spawners) ---
orchestrator:
  registry: holgerleichsenring
  version: 0.48.0

# ────────────────────────────────────────────────────────────────────────
#  Agents catalog
# ────────────────────────────────────────────────────────────────────────
# Each named entry is the full AgentConfig that projects can reference by name.
# Same agent reused across projects → defined once, edited once.
agents:
  claude-default:
    type: Claude
    model: claude-sonnet-4-20250514
    retry:
      max_retries: 5
      initial_delay_ms: 2000
      backoff_multiplier: 2.0
      max_delay_ms: 60000
    cache:
      is_enabled: true
      strategy: automatic
    compaction:
      is_enabled: true
      threshold_iterations: 8
      max_context_tokens: 80000
      keep_recent_iterations: 3
      summary_model: claude-haiku-4-5-20251001
    models:
      scout:
        model: claude-haiku-4-5-20251001
        max_tokens: 4096
      primary:
        model: claude-sonnet-4-20250514
        max_tokens: 8192
      planning:
        model: claude-sonnet-4-20250514
        max_tokens: 4096
      summarization:
        model: claude-haiku-4-5-20251001
        max_tokens: 2048
    pricing:
      models:
        claude-sonnet-4-20250514:
          input_per_million: 3.0
          output_per_million: 15.0
          cache_read_per_million: 0.30
        claude-haiku-4-5-20251001:
          input_per_million: 0.80
          output_per_million: 4.0
          cache_read_per_million: 0.08

  # Required for api-security-scan to hit Anthropic's 5-min prompt-cache TTL.
  claude-parallel:
    type: Claude
    model: claude-sonnet-4-20250514
    cache:
      is_enabled: true
      strategy: automatic
    models:
      primary:
        model: claude-sonnet-4-20250514
        max_tokens: 8192
      planning:
        model: claude-sonnet-4-20250514
        max_tokens: 4096
    pricing:
      models:
        claude-sonnet-4-20250514:
          input_per_million: 3.0
          output_per_million: 15.0
          cache_read_per_million: 0.30
    parallelism:
      max_concurrent_skill_rounds: 4

  # azure-openai-default:
  #   type: azure-openai
  #   endpoint: https://your-instance.openai.azure.com
  #   api_version: 2025-01-01-preview
  #   models:
  #     primary:
  #       model: gpt-4.1
  #       deployment: gpt4-1-deployment
  #       max_tokens: 8192
  #     planning:
  #       model: gpt-4.1-mini
  #       deployment: gpt-4o-mini-deployment
  #       max_tokens: 4096

  # gemini-default:
  #   type: gemini
  #   model: gemini-2.5-flash
  #   models:
  #     primary:
  #       model: gemini-2.5-pro
  #       max_tokens: 8192

# ────────────────────────────────────────────────────────────────────────
#  Repos catalog
# ────────────────────────────────────────────────────────────────────────
repos:
  acme-app:
    type: GitHub
    url: https://github.com/owner/acme-app
    auth: github_token
    # default_branch: main

  acme-platform:
    type: AzureDevOps
    url: https://dev.azure.com/acme/platform/_git/platform-core
    organization: acme
    project: platform
    auth: azure_devops_token

  acme-rules-shared:
    type: GitLab
    url: https://gitlab.com/acme/rules-shared
    auth: gitlab_token

  acme-rules-billing:
    type: GitLab
    url: https://gitlab.com/acme/rules-billing
    auth: gitlab_token

  # Local repo for dev / api-security passive mode.
  api-source-local:
    type: Local
    path: ./repo
    auth: none

# ────────────────────────────────────────────────────────────────────────
#  Trackers catalog
# ────────────────────────────────────────────────────────────────────────
# Connection + lifecycle states shared across projects that point at the same
# tracker install. Project-specific routing (which labels → which pipelines)
# stays on the project's trigger block.
trackers:
  acme-github:
    type: GitHub
    url: https://github.com/owner/acme-app
    auth: github_token

  acme-ado:
    type: AzureDevOps
    url: https://dev.azure.com/acme
    organization: acme
    project: platform
    auth: azure_devops_token
    open_states: ["New", "Active"]
    done_status: "Resolved"

  acme-jira:
    type: Jira
    url: https://acme.atlassian.net/
    auth: jira_token
    open_states: ["To Do", "In Progress"]
    done_status: "In Review"
    close_transition_name: "Done"

# ────────────────────────────────────────────────────────────────────────
#  Global pipeline_triggers — label → pipeline default
# ────────────────────────────────────────────────────────────────────────
# Applied when a project's trigger block omits `pipeline_from_label`.
# A populated project-level map wins over this global default.
pipeline_triggers:
  agent-smith:init: init-project
  bug: fix-bug
  feature: add-feature
  security-review: security-scan
  api-security-review: api-security-scan

# ────────────────────────────────────────────────────────────────────────
#  Projects
# ────────────────────────────────────────────────────────────────────────
projects:

  # Single-repo GitHub project — uses the global pipeline_triggers map.
  acme-app:
    agent: claude-default
    tracker: acme-github
    repos: [acme-app]
    pipeline: fix-bug
    coding_principles_path: .agentsmith/coding-principles.md
    github_trigger:
      project_resolution:
        # p0140a: GitHub single-repo dispatch — match by the source-repo URL on the
        # webhook payload against the project's single repo. Requires
        # repos: [acme-app] (count == 1) — the validator enforces it.
        strategy: repo
        value: https://github.com/acme/app.git
      trigger_statuses: ["open"]
      done_status: "closed"
      comment_keyword: "@agent-smith"
      # pipeline_from_label omitted → inherits global pipeline_triggers map

  # Azure DevOps project with polling and an explicit per-project label map.
  acme-platform:
    agent: claude-default
    tracker: acme-ado
    repos: [acme-platform]
    pipeline: fix-bug
    polling:
      enabled: true
      interval_seconds: 60
      jitter_percent: 10
    azuredevops_trigger:
      project_resolution:
        # p0140a: ADO area-path dispatch — hierarchical prefix match. The configured
        # value AcmeMain/Platform also matches AcmeMain/Platform/Provisioning and any
        # deeper subtree. Backslash form (AcmeMain\\Platform with YAML-escaping) is
        # equivalent; the loader normalises.
        strategy: area-path
        value: AcmeMain/Platform
      trigger_statuses: ["New", "Active"]
      done_status: "Resolved"
      comment_keyword: "@agent-smith"
      pipeline_from_label:
        bug: fix-bug
        security: security-scan

  # Multi-repo Jira project — one ticket can spawn N pipeline runs once
  # p0140 lands. Today the loader accepts the list shape; only Repos[0] is
  # used by consumers via the transitional single-repo accessor.
  acme-rules:
    agent: claude-default
    tracker: acme-jira
    repos: [acme-rules-shared, acme-rules-billing]
    pipeline: fix-bug
    jira_trigger:
      project_resolution:
        # p0140a: Jira tag dispatch — a ticket carrying the label "acme-rules"
        # routes to this project. Case-insensitive equality. Ambiguous tickets
        # (a ticket with two project tags) spawn one pipeline run per matched
        # project per p0140's documented "let the LLM skip irrelevant ones" rule.
        strategy: tag
        value: acme-rules
      assignee_name: "Agent Smith"
      secret: ${JIRA_WEBHOOK_SECRET}
      trigger_statuses: ["To Do"]
      done_status: "In Review"
      comment_keyword: "@agent-smith"

  # api-security project (p0102) — local source enables code-aware skills;
  # remote clone via repos: [acme-app] also works.
  api-security:
    agent: claude-parallel
    tracker: acme-github
    repos: [api-source-local]
    pipeline: api-security-scan

# Tool runner for security scanning tools (Nuclei, Spectral).
tool_runner:
  type: auto
  images:
    nuclei: projectdiscovery/nuclei:latest
    spectral: stoplight/spectral:6

# Skill catalog source. See docs/skills/source-modes.md.
skills:
  source: default
  version: v2.1.2
  # cache_dir defaults to $XDG_CACHE_HOME/agentsmith/skills, then ~/.cache/agentsmith/skills.
  # cache_dir: /var/lib/agentsmith/skills

# Hard limits for the per-skill agentic loop.
limits:
  max_tool_calls_per_skill: 30
  max_tool_calls_per_investigator: 10
  max_tool_calls_per_verifier: 20
  max_llm_calls_per_skill: 15
  max_input_tokens_per_skill_call: 200000
  max_output_tokens_per_skill_call: 16000
  max_seconds_per_skill_call: 300
  max_concurrent_skill_calls: 10

# In-flight pipeline-storage settings.
pipeline_storage:
  redis_ttl_hours: 4

# p0128c data-flow gating.
pipeline_data_flow:
  enforce: false

secrets:
  anthropic_api_key: ${ANTHROPIC_API_KEY}
  github_token: ${GITHUB_TOKEN}
  gitlab_token: ${GITLAB_TOKEN}
  azure_devops_token: ${AZURE_DEVOPS_TOKEN}
  jira_token: ${JIRA_TOKEN}
  jira_webhook_secret: ${JIRA_WEBHOOK_SECRET}
