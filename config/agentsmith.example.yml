    #   pipeline_from_label:
    #     bug: fix-bug
    #     feature: add-feature
    #     security-review: security-scan
    #   default_pipeline: fix-bug
    #   comment_keyword: "@agent-smith"

  # --- api-security project (p0102): code-aware api-scan with prefix caching ---
  # The source: block is OPTIONAL for api-scan (p0102a). When present, the repo is
  # auto-resolved (Local path or remote clone via ISourceProviderFactory) and the
  # code-aware skills (auth-config-reviewer, ownership-checker, upload-validator-reviewer)
  # run with file:line evidence. When absent or unreachable, api-scan falls back to
  # passive schema-only mode without failing.
  api-security:
    source:
      type: Local
      path: ./repo                      # path to the API source — enables auth-config-reviewer,
                                        # ownership-checker, upload-validator-reviewer
    # --- Alternative: clone a remote repo on each run (p0102a) ---
    # source:
    #   type: GitHub                    # GitHub | GitLab | AzureRepos | Local
    #   url: https://github.com/owner/repo
    #   auth: token                     # auth token resolved from secret store / env (e.g. GITHUB_TOKEN)
    #   default_branch: main            # optional — falls back to provider default ('main') if omitted
    agent:
      type: Claude
      model: claude-sonnet-4-20250514
      cache:
        is_enabled: true
        strategy: automatic
      models:
        primary:
          model: claude-sonnet-4-20250514
          max_tokens: 8192
        planning:
          model: claude-sonnet-4-20250514
          max_tokens: 4096
      pricing:
        models:
          claude-sonnet-4-20250514:
            input_per_million: 3.0
            output_per_million: 15.0
            cache_read_per_million: 0.30
      # Required for prefix-cache hit rate within Anthropic's 5-minute TTL —
      # at parallelism 1 contributors run sequentially and the cache expires
      # before later skills hit it (p0102).
      parallelism:
        max_concurrent_skill_rounds: 4

# Tool runner for security scanning tools (Nuclei, Spectral).
# Type is auto-detected if not specified: docker socket → docker, else process.
tool_runner:
  type: auto  # auto | docker | podman | process
  # socket: unix:///var/run/docker.sock
  # docker_hostname: host.docker.internal
  images:
    nuclei: projectdiscovery/nuclei:latest
    spectral: stoplight/spectral:6

# Skill catalog source. The server pulls or mounts the catalog at boot
# based on this section. See docs/skills/source-modes.md.
skills:
  source: default                         # default | path | url
  version: v1.0.0                         # required when source: default
  # cache_dir defaults to $XDG_CACHE_HOME/agentsmith/skills, then $HOME/.cache/agentsmith/skills,
  # then {tmp}/agentsmith/skills — set explicitly only for system-managed paths (e.g. K8s mount).
  # cache_dir: /var/lib/agentsmith/skills
  # path: /opt/skills                     # source: path — pre-mounted directory containing skills/
  # url: https://...                      # source: url — explicit tarball URL
  # sha256: <hex>                         # SHA256 verification (any download mode)

secrets:
  anthropic_api_key: ${ANTHROPIC_API_KEY}
  # openai_api_key: ${OPENAI_API_KEY}
  # azure_openai_api_key: ${AZURE_OPENAI_API_KEY}
  # gemini_api_key: ${GEMINI_API_KEY}
  # groq_api_key: ${GROQ_API_KEY}
  # github_token: ${GITHUB_TOKEN}
  # gitlab_token: ${GITLAB_TOKEN}
  # azure_devops_token: ${AZURE_DEVOPS_TOKEN}
  # jira_token: ${JIRA_TOKEN}
  # jira_email: ${JIRA_EMAIL}
  # jira_webhook_secret: ${JIRA_WEBHOOK_SECRET}
