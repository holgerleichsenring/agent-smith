# Agent Smith - Example Configuration
# Copy to agentsmith.yml and adjust to your project.
# Supported AI providers: Claude (Anthropic), OpenAI, Azure OpenAI, Gemini (Google), Ollama
# Supported source/ticket providers: GitHub, GitLab, Azure DevOps (Repos), Jira

projects:
  my-project:
    source:
      type: GitHub # GitHub | AzureRepos | GitLab | Local
      url: https://github.com/owner/repo
      auth: token
      # default_branch: main          # PR target branch (auto-detected from API if omitted)
    tickets:
      type: GitHub # GitHub | AzureDevOps | Jira | GitLab
      url: https://github.com/owner/repo
      auth: token
      # Azure DevOps only:
      # organization: my-org
      # project: my-project
      # open_states: ["New", "Active"]           # Whitelist of states considered "open" (ADO only)
      # done_status: "Closed"                    # Target state when closing a ticket
      # close_transition_name: "Close"           # Jira transition name for closing
      # extra_fields:                            # Additional fields to fetch (ADO only)
      #   - "Microsoft.VSTS.Common.Priority"

    # --- Option A: Anthropic Claude (best tool calling, prompt caching) ---
    agent:
      type: Claude # claude | anthropic
      model: claude-sonnet-4-20250514
      retry:
        max_retries: 5
        initial_delay_ms: 2000
        backoff_multiplier: 2.0
        max_delay_ms: 60000
      cache:
        is_enabled: true
        strategy: automatic
      compaction:
        is_enabled: true
        threshold_iterations: 8
        max_context_tokens: 80000
        keep_recent_iterations: 3
        summary_model: claude-haiku-4-5-20251001
      models:
        scout:
          model: claude-haiku-4-5-20251001
          max_tokens: 4096
        primary:
          model: claude-sonnet-4-20250514
          max_tokens: 8192
        planning:
          model: claude-sonnet-4-20250514
          max_tokens: 4096
        summarization:
          model: claude-haiku-4-5-20251001
          max_tokens: 2048
      pricing:
        models:
          claude-sonnet-4-20250514:
            input_per_million: 3.0
            output_per_million: 15.0
            cache_read_per_million: 0.30
          claude-haiku-4-5-20251001:
            input_per_million: 0.80
            output_per_million: 4.0
            cache_read_per_million: 0.08
      # Parallelism for same-stage skill rounds (e.g. security-scan stage 1, api-scan contributors).
      # Default 1 = sequential. Raise to fan out contributor calls under a SemaphoreSlim throttle.
      # Recommended for api-security-scan: 4 — required to keep parallel calls within Anthropic's
      # 5-minute prompt-cache TTL so the prefix-cache hit rate (p0102) is realized.
      parallelism:
        max_concurrent_skill_rounds: 1   # set to 4 to enable parallel fan-out

    # --- Option B: OpenAI (uncomment to use instead of Claude) ---
    # agent:
    #   type: openai
    #   model: gpt-4.1
    #   retry:
    #     max_retries: 5
