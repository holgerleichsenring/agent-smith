# yaml-language-server: $schema=agentsmith.schema.json
#
# Agent Smith — Example Configuration (p0139 catalog-first schema)
#
# Top-level catalogs (`agents:`, `repos:`, `trackers:`, `pipeline_triggers:`)
# are defined once. Each project under `projects:` references catalog entries
# by name and adds its own trigger blocks. This replaces the pre-p0139 form
# where every project carried inline source/tickets/agent blocks (see
# docs/configuration/migration-from-pre-p0139.md if you're migrating).
#
# Supported providers (canonical YAML values are snake_case):
#   - AI agents: claude | openai | azure_openai | gemini | ollama
#   - Repos:     github | gitlab | azure_devops | local
#   - Trackers:  github | gitlab | azure_devops | jira

# --- Deployment image pin (REQUIRED for K8s/Docker spawners) ---
# p0281c: ONE registry + version feeds BOTH the orchestrator container and the
# sandbox-agent image — they ship from the same agent-smith release, so there is
# one knob to bump per upgrade instead of two kept in sync. The legacy per-image
# blocks (`sandbox: { agent_version }` / `orchestrator: { registry, version }`)
# still load and win field-by-field when present.
deployment:
  registry: holgerleichsenring
  version: 0.48.0

# --- Per-language toolchain images (p0245) ---
# Override the built-in language→image table per language, for one project, without
# touching code. The whole-project `toolchain_image` (if set) still wins outright;
# this is the polyglot-safe hook (pin `dotnet` to an internal mirror while `node`
# keeps the default). Operator-declared image — no runtime install, no version guess.
#
# projects:
#   my-polyglot-app:
#     sandbox:
#       images:
#         dotnet: my-mirror.azurecr.io/dotnet/sdk:9.0
#         node:   node:20-bookworm

# --- Per-project sandbox credentials (p0272, K8s only) ---
# Inject credentials into the sandbox pod from operator-created k8s Secrets. The
# VALUES live in the Secret (never in this file or context.yaml); only the
# references are sent to the pod. The consuming auth command lives in the repo's
# .agentsmith/context.yaml `prerequisites` as an `sh -c "…"` line, e.g. a
# Salesforce JWT login. Create the Secret first:
#   kubectl create secret generic sf-creds \
#     --from-literal=client-id=... --from-literal=username=... \
#     --from-file=jwt-key=server.key
#
# projects:
#   my-salesforce-app:
#     sandbox:
#       toolchain_image: my-corp.azurecr.io/sfdx:20-bookworm   # node + sf + git
#       secrets:
#         env:
#           SF_CLIENT_ID: "sf-creds:client-id"
#           SF_USERNAME:  "sf-creds:username"
#         files:
#           - mount: "/secrets/server.key"
#             secret: "sf-creds"
#             key: "jwt-key"
# context.yaml prerequisites (in the repo, not here):
#   prerequisites: 'sh -c "sf org login jwt --client-id $SF_CLIENT_ID --jwt-key-file /secrets/server.key --username $SF_USERNAME --alias devhub"'

# (Orchestrator + sandbox images both come from the `deployment:` pin above. To
# override just one — e.g. pin a pre-release orchestrator — add the legacy block:
#   orchestrator:
#     registry: my-mirror
#     version: 0.49.0-beta
# A per-project orchestrator.registry/version is ignored (p0281c); orchestrator
# resources stay per-project.)

# --- Relational system-of-record (SERVER only; the CLI one-shot runs ignore it) ---
# The server always uses a DB (run history + the single-run constraint) + Redis.
# Apply migrations with `agentsmith database migrate` (an init-container / one-shot
# job in your deployment) BEFORE starting the server — never on startup.
# These are the defaults; uncomment to override. SQLite needs no service; for a
# shared/HA deployment point it at Postgres/MySQL/SQL Server (creds via ${secret}).
persistence:
  provider: sqlite                                  # sqlite | postgresql | mysql | sqlserver
  connection_string: "Data Source=/var/lib/agentsmith/agentsmith.db"
  # provider: postgresql
  # connection_string: "Host=postgres;Database=agentsmith;Username=agentsmith;Password=${db_password}"
  # provider: sqlserver
  # connection_string: "Server=mssql,1433;Database=agentsmith;User Id=agentsmith;Password=${db_password};Encrypt=True;TrustServerCertificate=True"

# ────────────────────────────────────────────────────────────────────────
#  Agents catalog
# ────────────────────────────────────────────────────────────────────────
# Each named entry is the full AgentConfig that projects can reference by name.
# Same agent reused across projects → defined once, edited once.
agents:
  claude-default:
    type: claude
    model: claude-sonnet-4-20250514
    retry:
      max_retries: 5
      initial_delay_ms: 2000
      backoff_multiplier: 2.0
      max_delay_ms: 60000
    cache:
      is_enabled: true
      strategy: automatic
    compaction:
      is_enabled: true
      threshold_iterations: 8
      max_context_tokens: 80000
      keep_recent_iterations: 3
      summary_model: claude-haiku-4-5-20251001
    models:
      scout:
        model: claude-haiku-4-5-20251001
        max_tokens: 4096
      primary:
        model: claude-sonnet-4-20250514
        max_tokens: 8192
      planning:
        model: claude-sonnet-4-20250514
        max_tokens: 4096
      summarization:
        model: claude-haiku-4-5-20251001
        max_tokens: 2048
    pricing:
      models:
        claude-sonnet-4-20250514:
          input_per_million: 3.0
          output_per_million: 15.0
          cache_read_per_million: 0.30
        claude-haiku-4-5-20251001:
          input_per_million: 0.80
          output_per_million: 4.0
          cache_read_per_million: 0.08

  # Required for api-security-scan to hit Anthropic's 5-min prompt-cache TTL.
  claude-parallel:
    type: claude
    model: claude-sonnet-4-20250514
    cache:
      is_enabled: true
      strategy: automatic
    models:
      primary:
        model: claude-sonnet-4-20250514
        max_tokens: 8192
      planning:
        model: claude-sonnet-4-20250514
        max_tokens: 4096
    pricing:
      models:
        claude-sonnet-4-20250514:
          input_per_million: 3.0
          output_per_million: 15.0
          cache_read_per_million: 0.30
    parallelism:
      max_concurrent_skill_rounds: 4

  # azure-openai-default:
  #   type: azure_openai
  #   endpoint: https://your-instance.openai.azure.com
  #   api_version: 2025-01-01-preview
  #   models:
  #     primary:
  #       model: gpt-4.1
  #       deployment: gpt4-1-deployment
  #       max_tokens: 8192
  #     planning:
  #       model: gpt-4.1-mini
  #       deployment: gpt-4o-mini-deployment
  #       max_tokens: 4096

  # gemini-default:
  #   type: gemini
  #   model: gemini-2.5-flash
  #   models:
  #     primary:
  #       model: gemini-2.5-pro
  #       max_tokens: 8192

# ────────────────────────────────────────────────────────────────────────
#  Connections catalog (p0281a)
# ────────────────────────────────────────────────────────────────────────
# A connection holds the shared host/org/auth ONCE. Repos are DISCOVERED under it
# via the provider API, so a project selects them by glob instead of listing each
# repo block. azure_devops needs organization+project; github needs owner; gitlab
# needs group. A project then references repos as `connection/glob` (with `!` to
# exclude), e.g.:
#
#   projects:
#     acme-platform:
#       agent: claude-default
#       tracker: acme-ado
#       repos: ["acme/Sample.App.*", "!acme/Sample.App.Ui.Tests"]   # discovered + globbed
#       resolution: { area_path: AcmeMain/Platform }
#
# default_branch comes from each discovered repo; the connection value is only a
# fallback. Discovery is refreshed out-of-band (warm-on-start + interval) and the
# last-good set is cached, so a transient outage serves the previous result.
connections:
  acme:
    type: azure_devops
    organization: acme
    project: platform
    auth: azure_devops_token
  acme-github:
    type: github
    owner: acme
    auth: github_token

# ────────────────────────────────────────────────────────────────────────
#  Repos catalog (legacy / escape hatch for a single non-discoverable repo)
# ────────────────────────────────────────────────────────────────────────
repos:
  acme-app:
    type: github
    url: https://github.com/owner/acme-app
    auth: github_token
    # default_branch: main

  acme-platform:
    type: azure_devops
    url: https://dev.azure.com/acme/platform/_git/platform-core
    organization: acme
    project: platform
    auth: azure_devops_token

  acme-rules-shared:
    type: gitlab
    url: https://gitlab.com/acme/rules-shared
    auth: gitlab_token

  acme-rules-billing:
    type: gitlab
    url: https://gitlab.com/acme/rules-billing
    auth: gitlab_token

  # Local repo for dev / api-security passive mode.
  api-source-local:
    type: local
    path: ./repo
    auth: none

# ────────────────────────────────────────────────────────────────────────
#  Trackers catalog
# ────────────────────────────────────────────────────────────────────────
# Connection + lifecycle states shared across projects that point at the same
# tracker install. Project-specific routing (which labels → which pipelines)
# stays on the project's trigger block.
trackers:
  acme-github:
    type: github
    url: https://github.com/owner/acme-app
    auth: github_token

  acme-ado:
    type: azure_devops
    url: https://dev.azure.com/acme
    organization: acme
    project: platform
    auth: azure_devops_token
    # p0281b: the tracker OWNS the run workflow shared by every project routed to it.
    # A project then declares only its `resolution:` and inherits these. open_states
    # doubles as the trigger gate (trigger_statuses falls back to it when unset), so
    # there is nothing to repeat here.
    open_states: ["New", "Active"]
    done_status: "Resolved"
    failed_status: "Resolved"
    pipeline_from_label:
      bug: fix-bug
      security: security-scan

  acme-jira:
    type: jira
    url: https://acme.atlassian.net/
    auth: jira_token
    open_states: ["To Do", "In Progress"]
    done_status: "In Review"
    close_transition_name: "Done"
    # Optional: override Jira REST paths when Atlassian changes an API (e.g.
    # CHANGE-2046 removed /rest/api/3/search → /rest/api/3/search/jql). Defaults
    # shown; set only what differs. '{id}' is replaced with the issue key.
    # endpoints:
    #   search:      /rest/api/3/search/jql
    #   issue:       /rest/api/3/issue/{id}
    #   comment:     /rest/api/3/issue/{id}/comment
    #   transitions: /rest/api/3/issue/{id}/transitions

# ────────────────────────────────────────────────────────────────────────
#  Global pipeline_triggers — label → pipeline default
# ────────────────────────────────────────────────────────────────────────
# Applied when a project's trigger block omits `pipeline_from_label`.
# A populated project-level map wins over this global default.
pipeline_triggers:
  agent-smith:init: init-project
  bug: fix-bug
  feature: add-feature
  security-review: security-scan
  api-security-review: api-security-scan

# ────────────────────────────────────────────────────────────────────────
#  Projects
# ────────────────────────────────────────────────────────────────────────
projects:

  # Single-repo GitHub project — uses the global pipeline_triggers map.
  acme-app:
    agent: claude-default
    tracker: acme-github
    repos: [acme-app]
    pipeline: fix-bug
    coding_principles_path: .agentsmith/coding-principles.md
    # Per-pipeline overrides. Each entry: name + optional agent / skills_path /
    # coding_principles_path / confidence_threshold. confidence_threshold
    # (p0167b, default 70, range 0-100): a blocking observation whose
    # confidence is below the threshold is downgraded to non-blocking before
    # it can gate the run — lower it to let more findings block, raise it to
    # keep only high-confidence blockers.
    # pipelines:
    #   - name: pr-review
    #     confidence_threshold: 70
    github_trigger:
      project_resolution:
        # p0140a: GitHub single-repo dispatch — match by the source-repo URL on the
        # webhook payload against the project's single repo. Requires
        # repos: [acme-app] (count == 1) — the validator enforces it.
        strategy: repo
        value: https://github.com/acme/app.git
      trigger_statuses: ["open"]
      done_status: "closed"
      comment_keyword: "@agent-smith"
      # pipeline_from_label omitted → inherits global pipeline_triggers map

  # Azure DevOps project, terse shape (p0281b): only `resolution:` is project-specific —
  # trigger_statuses / done_status / failed_status / pipeline_from_label all come from the
  # acme-ado tracker. The trigger TYPE is inferred from the tracker (azure_devops). The
  # `resolution` key IS the strategy: tag | area_path | repo | to_address. area_path is a
  # hierarchical prefix match — AcmeMain/Platform also matches AcmeMain/Platform/Provisioning;
  # the backslash form is equivalent (the loader normalises).
  # (An explicit `azuredevops_trigger:` block still works and overrides field-by-field; use it
  # when you need a per-project comment_keyword or a different label map.)
  acme-platform:
    agent: claude-default
    tracker: acme-ado
    repos: [acme-platform]
    pipeline: fix-bug
    polling:
      enabled: true
      interval_seconds: 60
      jitter_percent: 10
    resolution:
      area_path: AcmeMain/Platform

  # Multi-repo Jira project — one ticket can spawn N pipeline runs once
  # p0140 lands. Today the loader accepts the list shape; only Repos[0] is
  # used by consumers via the transitional single-repo accessor.
  acme-rules:
    agent: claude-default
    tracker: acme-jira
    repos: [acme-rules-shared, acme-rules-billing]
    pipeline: fix-bug
    jira_trigger:
      project_resolution:
        # p0140a: Jira tag dispatch — a ticket carrying the label "acme-rules"
        # routes to this project. Case-insensitive equality. Ambiguous tickets
        # (a ticket with two project tags) spawn one pipeline run per matched
        # project per p0140's documented "let the LLM skip irrelevant ones" rule.
        strategy: tag
        value: acme-rules
      assignee_name: "Agent Smith"
      secret: ${JIRA_WEBHOOK_SECRET}
      trigger_statuses: ["To Do"]
      done_status: "In Review"
      comment_keyword: "@agent-smith"

  # api-security project (p0102) — local source enables code-aware skills;
  # remote clone via repos: [acme-app] also works.
  # A webhook/poll-triggered api-security project. For a one-off CLI scan you do NOT
  # need a project at all (p0281d): `agentsmith api-scan --agent claude-parallel
  # --source-path . --swagger ... --target ...` builds an ephemeral project from the
  # named agent + the source path. --project still works for back-compat.
  api-security:
    agent: claude-parallel
    tracker: acme-github
    repos: [api-source-local]
    pipeline: api-security-scan

# Tool runner for security scanning tools (Nuclei, Spectral).
tool_runner:
  type: auto
  images:
    nuclei: projectdiscovery/nuclei:latest
    spectral: stoplight/spectral:6

# Skill catalog source. See docs/skills/source-modes.md.
skills:
  source: default
  version: v2.2.0
  # cache_dir defaults to $XDG_CACHE_HOME/agentsmith/skills, then ~/.cache/agentsmith/skills.
  # cache_dir: /var/lib/agentsmith/skills

# Hard limits for the per-skill agentic loop.
limits:
  max_tool_calls_per_skill: 30
  max_tool_calls_per_investigator: 10
  max_tool_calls_per_verifier: 20
  max_llm_calls_per_skill: 15
  max_input_tokens_per_skill_call: 200000
  max_output_tokens_per_skill_call: 16000
  max_seconds_per_skill_call: 300
  max_concurrent_skill_calls: 10
  # p0177: sub-agent limits — soft defaults, hard caps live in
  # SubAgentBudget + SubAgentRunner. spawn_agents is opt-in per pipeline.
  max_concurrent_sub_agents: 4
  max_sub_agents_per_run: 20

# p0151d: per-pipeline cost cap. When cumulative USD or tokens cross the cap,
# remaining LLM-driven skill calls short-circuit with a `cost-cap-exhausted`
# observation and the pipeline proceeds to Compile + Deliver. Defaults shown.
# See docs/configuration/pipeline-cost-cap.md.
pipeline_cost_cap:
  default:
    usd: 5
    tokens: 500000
  # per_pipeline:
  #   api-security-scan:
  #     usd: 10
  #     tokens: 1000000
  #   fix-bug:
  #     usd: 2
  #     tokens: 200000

# In-flight pipeline-storage settings.
pipeline_storage:
  redis_ttl_hours: 4

# p0128c data-flow gating.
pipeline_data_flow:
  enforce: false

secrets:
  anthropic_api_key: ${ANTHROPIC_API_KEY}
  github_token: ${GITHUB_TOKEN}
  gitlab_token: ${GITLAB_TOKEN}
  azure_devops_token: ${AZURE_DEVOPS_TOKEN}
  jira_token: ${JIRA_TOKEN}
  jira_webhook_secret: ${JIRA_WEBHOOK_SECRET}
