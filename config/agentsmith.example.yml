    #       max_tokens: 4096
    #     primary:
    #       model: gpt-4.1
    #       deployment: gpt4-1-deployment
    #       max_tokens: 8192
    #     planning:
    #       model: gpt-4.1
    #       deployment: gpt4-1-deployment
    #       max_tokens: 4096
    #     summarization:
    #       model: gpt-4.1-mini
    #       deployment: gpt-4o-mini-deployment
    #       max_tokens: 2048
    #   pricing:
