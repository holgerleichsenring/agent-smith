projects:
  agent-smith:
    source:
      type: GitHub
      url: https://github.com/holgerleichsenring/agent-smith
      auth: token
    tickets:
      type: GitHub
      url: https://github.com/holgerleichsenring/agent-smith
      auth: token
    agent:
      type: Claude
      model: claude-sonnet-4-20250514
      retry:
        max_retries: 5
        initial_delay_ms: 2000
        backoff_multiplier: 2.0
        max_delay_ms: 60000
      cache:
        is_enabled: true
        strategy: automatic
      compaction:
        is_enabled: true
        threshold_iterations: 8
        max_context_tokens: 80000
        keep_recent_iterations: 3
        summary_model: claude-haiku-4-5-20251001
      models:
        scout:
          model: claude-haiku-4-5-20251001
          max_tokens: 4096
        primary:
          model: claude-sonnet-4-20250514
          max_tokens: 8192
        planning:
          model: claude-sonnet-4-20250514
          max_tokens: 4096
        summarization:
          model: claude-haiku-4-5-20251001
          max_tokens: 2048
      pricing:
        models:
          claude-sonnet-4-20250514:
            input_per_million: 3.0
            output_per_million: 15.0
            cache_read_per_million: 0.30
          claude-haiku-4-5-20251001:
            input_per_million: 0.80
            output_per_million: 4.0
            cache_read_per_million: 0.08
    pipeline: fix-bug
    coding_principles_path: .agentsmith/coding-principles.md

  todo-list:
    source:
      type: AzureRepos
      url: https://dev.azure.com/holgerleichsenring/todo-list/_git/todo-list
      auth: token
    tickets:
      type: Jira
      url: https://agent-smith-test.atlassian.net/
      auth: jira_token
    jira_trigger:
      assignee_name: "Holger Leichsenring"
      # secret: ${JIRA_WEBHOOK_SECRET}       # optional
      trigger_statuses: ["To Do"]  # only trigger in these statuses
      done_status: "In Review"              # transition after PR creation
      pipeline_from_label:                  # label → pipeline mapping
        bug: fix-bug
        feature: implement-feature
        security-review: security-scan
      default_pipeline: fix-bug             # fallback if no label matches
      comment_keyword: "@agent-smith"       # optional: re-trigger via comment
    # tickets:
    #   type: AzureDevOps
    #   organization: holgerleichsenring
    #   project: todo-list
    #   auth: token
    agent:
      type: Claude
      model: claude-sonnet-4-20250514
      retry:
        max_retries: 5
        initial_delay_ms: 2000
        backoff_multiplier: 2.0
        max_delay_ms: 60000
      cache:
        is_enabled: true
        strategy: automatic
      compaction:
        is_enabled: true
        threshold_iterations: 8
        max_context_tokens: 80000
        keep_recent_iterations: 3
        summary_model: claude-haiku-4-5-20251001
      models:
        scout:
          model: claude-haiku-4-5-20251001
          max_tokens: 4096
        primary:
          model: claude-sonnet-4-20250514
          max_tokens: 8192
        planning:
          model: claude-sonnet-4-20250514
          max_tokens: 4096
        summarization:
          model: claude-haiku-4-5-20251001
          max_tokens: 2048
      pricing:
        models:
          claude-sonnet-4-20250514:
            input_per_million: 3.0
            output_per_million: 15.0
            cache_read_per_million: 0.30
          claude-haiku-4-5-20251001:
            input_per_million: 0.80
            output_per_million: 4.0
            cache_read_per_million: 0.08
    pipeline: fix-bug
    coding_principles_path: .agentsmith/coding-principles.md

  mad-discussion:
    source:
      type: AzureRepos
      url: https://dev.azure.com/holgerleichsenring/todo-list/_git/todo-list
      auth: token
    tickets:
      type: AzureDevOps
      organization: holgerleichsenring
      project: todo-list
      auth: token
    agent:
      type: Claude
      model: claude-sonnet-4-20250514
      retry:
        max_retries: 5
        initial_delay_ms: 2000
        backoff_multiplier: 2.0
        max_delay_ms: 60000
      cache:
        is_enabled: true
        strategy: automatic
      models:
        planning:
          model: claude-sonnet-4-20250514
          max_tokens: 4096
      pricing:
        models:
          claude-sonnet-4-20250514:
            input_per_million: 3.0
            output_per_million: 15.0
            cache_read_per_million: 0.30
    pipeline: mad-discussion
    skills_path: skills/mad

  agent-smith-security:
    source:
      type: GitHub
      url: https://github.com/holgerleichsenring/agent-smith
      auth: token
    tickets:
      type: GitHub
      url: https://github.com/holgerleichsenring/agent-smith
      auth: token
    agent:
      type: OpenAI
      model: llama-3.3-70b-versatile
      endpoint: https://api.groq.com/openai
      api_key_secret: GROQ_API_KEY
      models:
        primary:
          model: llama-3.3-70b-versatile
          max_tokens: 8192
        planning:
          model: llama-3.3-70b-versatile
          max_tokens: 4096
        scout:
          model: llama-3.3-70b-versatile
          max_tokens: 4096
        code_map_generation:
          model: llama-3.3-70b-versatile
          max_tokens: 4096
        summarization:
          model: llama-3.3-70b-versatile
          max_tokens: 2048
    pipeline: security-scan
    skills_path: skills/security

  agent-smith-api-security-claude:
    source:
      type: GitHub
      url: https://github.com/holgerleichsenring/agent-smith
      auth: token
    tickets:
      type: GitHub
      url: https://github.com/holgerleichsenring/agent-smith
      auth: token
    agent:
      type: Claude
      model: claude-sonnet-4-20250514
      retry:
        max_retries: 5
        initial_delay_ms: 2000
        backoff_multiplier: 2.0
        max_delay_ms: 60000
      cache:
        is_enabled: true
        strategy: automatic
      models:
        scout:
          model: claude-haiku-4-5-20251001
          max_tokens: 4096
        primary:
          model: claude-sonnet-4-20250514
          max_tokens: 8192
        planning:
          model: claude-sonnet-4-20250514
          max_tokens: 4096
        summarization:
          model: claude-haiku-4-5-20251001
          max_tokens: 2048
      pricing:
        models:
          claude-sonnet-4-20250514:
            input_per_million: 3.0
            output_per_million: 15.0
            cache_read_per_million: 0.30
          claude-haiku-4-5-20251001:
            input_per_million: 0.80
            output_per_million: 4.0
            cache_read_per_million: 0.08
    pipeline: api-security-scan
    skills_path: skills/api-security

  agent-smith-security-scan-azure-openai:
    source:
      type: GitHub
      url: https://github.com/holgerleichsenring/agent-smith
      auth: token
    agent:
      type: azure-openai
      endpoint: https://oai-rhegpt-dev.openai.azure.com
      api_version: 2025-01-01-preview
      retry:
        max_retries: 5
        initial_delay_ms: 2000
        backoff_multiplier: 2.0
        max_delay_ms: 60000
      models:
        scout:
          model: gpt-4.1-mini
          deployment: gpt-4o-mini-deployment
          max_tokens: 4096
        primary:
          model: gpt-4.1
          deployment: gpt4-1-deployment
          max_tokens: 8192
        planning:
          model: gpt-4.1
          deployment: gpt4-1-deployment
          max_tokens: 4096
        summarization:
          model: gpt-4.1-mini
          deployment: gpt-4o-mini-deployment
          max_tokens: 2048
        code_map_generation:
          model: gpt-4.1-mini
          deployment: gpt-4o-mini-deployment
          max_tokens: 4096
        context_generation:
          model: gpt-4.1-mini
          deployment: gpt-4o-mini-deployment
          max_tokens: 3072
      pricing:
        models:
          gpt-4.1:
            input_per_million: 2.0
            output_per_million: 8.0
            cache_read_per_million: 0.50
          gpt-4.1-mini:
            input_per_million: 0.40
            output_per_million: 1.60
            cache_read_per_million: 0.10
          gpt-4.1-nano:
            input_per_million: 0.10
            output_per_million: 0.40
            cache_read_per_million: 0.025
    pipeline: security-scan
    skills_path: skills/security

