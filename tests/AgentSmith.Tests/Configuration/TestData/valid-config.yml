agents:
  claude-default:
    type: Claude
    model: sonnet-4

repos:
  test-repo:
    type: GitHub
    url: https://github.com/test/repo
    auth: token

trackers:
  test-ado:
    type: AzureDevOps
    organization: testorg
    project: TestProject
    auth: token

projects:
  testproject:
    agent: claude-default
    tracker: test-ado
    repos: [test-repo]
    pipeline: fix-bug
    coding_principles_path: ./config/coding-principles.md

secrets:
  github_token: ${AGENTSMITH_TEST_GH_TOKEN}
  anthropic_api_key: ${ANTHROPIC_API_KEY}
