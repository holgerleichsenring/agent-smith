# p0199 harness fixture: mirrors operator-shape agentsmith.yml.
# registries: block is here so the composition-root tests can prove the
# loaded config reaches handlers (the p0198-followup bug class). Token
# resolves from AGENTSMITH_TEST_AZDO_TOKEN env var; missing-token tests
# leave it unset and assert SetupRegistryAuth still tolerates it.

agents:
  openai-default:
    type: openai
    api_key: dummy
    models:
      primary:
        model: gpt-4
        max_tokens: 4096

trackers:
  github-fixture:
    type: github
    url: https://github.com/agent-smith-fixtures/repo
    auth: gh_token

repos:
  csharp-fixture:
    type: local
    path: ./Fixtures/CsharpFixture
    auth: ""

projects:
  fixture-fix-bug:
    agent: openai-default
    tracker: github-fixture
    repos: [csharp-fixture]
  fixture-add-feature:
    agent: openai-default
    tracker: github-fixture
    repos: [csharp-fixture]
  fixture-init-project:
    agent: openai-default
    tracker: github-fixture
    repos: [csharp-fixture]
  fixture-security-scan:
    agent: openai-default
    tracker: github-fixture
    repos: [csharp-fixture]

secrets:
  azdo_token: ${AGENTSMITH_TEST_AZDO_TOKEN}
  gh_token: ${AGENTSMITH_TEST_AZDO_TOKEN}

registries:
  - host: pkgs.dev.azure.com
    username: any
    token: ${azdo_token}

skills:
  source: default
  version: v3.5.0
  cache_dir: /tmp/agentsmith-harness/skills
