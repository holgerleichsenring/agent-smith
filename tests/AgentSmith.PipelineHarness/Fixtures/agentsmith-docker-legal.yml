# p0199e docker-tier harness fixture for legal-analysis. Distinct from
# agentsmith-docker.yml because the legal preset uses AcquireSource (not
# CheckoutSource) and therefore needs no nuget registries — the only
# prerequisites is the per-context `pip install markitdown==<pin>` in
# the fixture's context.yaml, picked up at discovery time as
# RemoteContextDiscovery.Prerequisites and run by EnsurePrerequisites
# before BootstrapDocument shells out to markitdown.

agents:
  openai-default:
    type: openai
    api_key: dummy
    models:
      primary:
        model: gpt-4
        max_tokens: 4096

trackers:
  github-fixture:
    type: github
    url: https://github.com/agent-smith-fixtures/repo
    auth: gh_token

repos:
  legal-fixture:
    type: github
    url: fake-replaced-at-runtime
    auth: gh_token

projects:
  fixture-legal-analysis:
    agent: openai-default
    tracker: github-fixture
    repos: [legal-fixture]

secrets:
  gh_token: ${GH_TOKEN}

skills:
  source: default
  version: v3.5.0
  cache_dir: /tmp/agentsmith-harness/skills

sandbox:
  agent_version: "0.74.1"
