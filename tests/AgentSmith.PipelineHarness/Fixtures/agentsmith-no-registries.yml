# p0199 harness fixture: NO registries block. Used by tests that prove
# SetupRegistryAuth tolerates a missing block (docs-only / public-only
# project shape) and that the downstream test that relies on a private
# feed correctly fails with NU1301 in a clean DockerSandbox.

agents:
  openai-default:
    type: openai
    api_key: dummy
    models:
      primary:
        model: gpt-4
        max_tokens: 4096

trackers:
  github-fixture:
    type: github
    url: https://github.com/agent-smith-fixtures/repo
    auth: gh_token

repos:
  csharp-fixture:
    type: local
    path: ./Fixtures/CsharpFixture
    auth: ""

projects:
  fixture-fix-bug:
    agent: openai-default
    tracker: github-fixture
    repos: [csharp-fixture]

secrets:
  gh_token: dummy

skills:
  source: default
  version: v3.5.0
  cache_dir: /tmp/agentsmith-harness/skills
