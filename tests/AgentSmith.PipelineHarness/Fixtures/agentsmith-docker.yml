# p0199b docker-tier harness fixture. agent_version pinned to the
# latest published sandbox-agent tag so DockerSandboxFactory can pull /
# inject the agent binary against a real image. registries: block is
# populated so SetupRegistryAuth stages credentials for the fixture's
# private feed host (pkgs.dev.azure.com). The token resolves from
# AGENTSMITH_TEST_AZDO_TOKEN — when present the staged credential lets
# `dotnet restore` succeed against the private feed; when absent the
# staging step still runs but downstream restore will fail per the
# fixture's nuget.config.

agents:
  openai-default:
    type: openai
    api_key: dummy
    models:
      primary:
        model: gpt-4
        max_tokens: 4096

trackers:
  github-fixture:
    type: github
    url: https://github.com/agent-smith-fixtures/repo
    auth: gh_token

repos:
  csharp-fixture:
    type: github
    url: fake-replaced-at-runtime
    auth: gh_token

projects:
  fixture-fix-bug:
    agent: openai-default
    tracker: github-fixture
    repos: [csharp-fixture]

secrets:
  azdo_token: ${AGENTSMITH_TEST_AZDO_TOKEN}
  gh_token: ${AGENTSMITH_TEST_AZDO_TOKEN}

registries:
  - host: pkgs.dev.azure.com
    username: any
    token: ${azdo_token}

skills:
  source: default
  version: v3.5.0
  cache_dir: /tmp/agentsmith-harness/skills

sandbox:
  agent_version: "0.73.0"
