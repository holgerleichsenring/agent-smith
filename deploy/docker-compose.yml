# Run from repo root:
#   docker compose -f deploy/docker-compose.yml up -d                        # server + redis
#   docker compose -f deploy/docker-compose.yml run --rm agentsmith run --headless "fix #1 in my-project"
#   docker compose -f deploy/docker-compose.yml run --rm agentsmith security-scan --repo /app/repo --output console
#
# Two images, two roles:
#   - agentsmith-cli (one-shot CLI for ad-hoc runs / pipelines)
#   - agentsmith-server (single long-running container: Slack/Teams chat,
#     webhooks, polling, queue consumer, lifecycle reconcilers — all in one
#     process via AgentSmith.Server.dll, since p0107)

services:
  agentsmith:
    build:
      context: ..
      dockerfile: src/AgentSmith.Cli/Dockerfile
    image: agentsmith-cli:latest
    restart: "no"
    env_file:
      - ../.env
    volumes:
      - ../config:/app/config
      - ${SSH_KEY_PATH:-~/.ssh}:/home/agentsmith/.ssh:ro
      - /var/run/docker.sock:/var/run/docker.sock    # for Nuclei/Spectral tool containers

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  server:
    build:
      context: ..
      dockerfile: src/AgentSmith.Server/Dockerfile
    restart: unless-stopped
    user: root  # docker socket access for SPAWNER_TYPE=docker (local dev)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis:6379
      - SPAWNER_TYPE=${SPAWNER_TYPE:-docker}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - AGENTSMITH_IMAGE=${AGENTSMITH_IMAGE:-agentsmith-cli:latest}
      - IMAGE_PULL_POLICY=${IMAGE_PULL_POLICY:-IfNotPresent}
    ports:
      - "${SERVER_PORT:-8081}:8081"
    volumes:
      - ../config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  ollama:
    image: ollama/ollama
    profiles: [local-models]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  ollama-data:
