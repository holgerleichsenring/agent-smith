apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentsmith-server
  namespace: agentsmith
  labels:
    app: agentsmith-server
    app.kubernetes.io/name: agentsmith-server
    app.kubernetes.io/component: server
spec:
  replicas: 1                      # prod: 2
  selector:
    matchLabels:
      app: agentsmith-server
  template:
    metadata:
      labels:
        app: agentsmith-server
    spec:
      serviceAccountName: agentsmith
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: server
          image: agentsmith-server:latest
          imagePullPolicy: IfNotPresent  # prod: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8081"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentsmith-secrets
                  key: redis-url
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentsmith-secrets
                  key: slack-bot-token
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentsmith-secrets
                  key: slack-signing-secret
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AGENTSMITH_IMAGE
              value: "agentsmith-cli:latest"
            - name: IMAGE_PULL_POLICY
              value: "IfNotPresent"      # prod: Always
            - name: K8S_SECRET_NAME
              value: "agentsmith-secrets"
            - name: AGENTSMITH_SKILLS_DIR
              value: "/var/lib/agentsmith/skills"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: skills-cache
              mountPath: /var/lib/agentsmith/skills
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"              # prod: 200m
              memory: "320Mi"          # prod: 448Mi (raised for skill catalog cache)
            limits:
              cpu: "500m"              # prod: 1000m
              memory: "640Mi"          # prod: 896Mi (raised for skill catalog cache)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: config
          configMap:
            name: agentsmith-config
        - name: skills-cache
          emptyDir:
            sizeLimit: 64Mi
      restartPolicy: Always
