apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentsmith-server
  namespace: agentsmith
  labels:
    app: agentsmith-server
    app.kubernetes.io/name: agentsmith-server
    app.kubernetes.io/component: server
spec:
  replicas: 1                      # prod: 2
  selector:
    matchLabels:
      app: agentsmith-server
  template:
    metadata:
      labels:
        app: agentsmith-server
    spec:
      serviceAccountName: agentsmith
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # p0246g: apply relational-persistence migrations BEFORE the server starts —
      # an init container runs to completion first (NOT a sidecar). It shares the
      # persistence volume, so it migrates the in-pod SQLite the server then reads
      # (you can't reach that file from outside the pod). For an external DB
      # (Postgres/SQLServer) this same container migrates over the connection
      # string, or run your own idempotent-SQL pipeline instead.
      initContainers:
        - name: migrate
          image: agentsmith-cli:latest
          imagePullPolicy: IfNotPresent
          command: ["agentsmith", "database", "migrate", "--config", "/app/config/agentsmith.yml"]
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: persistence
              mountPath: /var/lib/agentsmith
      containers:
        - name: server
          image: agentsmith-server:latest
          imagePullPolicy: IfNotPresent  # prod: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8081"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agentsmith-secrets
                  key: redis-url
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentsmith-secrets
                  key: slack-bot-token
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentsmith-secrets
                  key: slack-signing-secret
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AGENTSMITH_IMAGE
              value: "agentsmith-cli:latest"
            - name: IMAGE_PULL_POLICY
              value: "IfNotPresent"      # prod: Always
            - name: K8S_SECRET_NAME
              value: "agentsmith-secrets"
            - name: AGENTSMITH_SKILLS_DIR
              value: "/var/lib/agentsmith/skills"
            # p0332: honest orchestrator sizing. The spawned orchestrator pod runs
            # the LLM loop — it compiles nothing — so the build-sandbox default
            # (1Gi request / 4Gi limit) is absurd for it, and it is the
            # longest-lived pod of every run. Requests are what a requests-based
            # ResourceQuota counts and what the scheduler packs nodes by; the
            # limit stays as a pure OOM guard. See docs/host-it/kubernetes.md
            # ("Capacity quota") for the coordinated quota shape.
            - name: JobSpawner__Resources__CpuRequest
              value: "100m"
            - name: JobSpawner__Resources__CpuLimit
              value: "500m"
            - name: JobSpawner__Resources__MemoryRequest
              value: "512Mi"
            - name: JobSpawner__Resources__MemoryLimit
              value: "2Gi"
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: skills-cache
              mountPath: /var/lib/agentsmith/skills
            - name: persistence
              mountPath: /var/lib/agentsmith
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"              # prod: 200m
              memory: "320Mi"          # prod: 448Mi (raised for skill catalog cache)
            limits:
              cpu: "500m"              # prod: 1000m
              memory: "640Mi"          # prod: 896Mi (raised for skill catalog cache)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: config
          configMap:
            name: agentsmith-config
        - name: skills-cache
          emptyDir:
            sizeLimit: 64Mi
        # p0246g: holds the SQLite system-of-record (the init container migrates
        # it, the server reads it). emptyDir is fine for a test cluster; for run
        # history that survives a pod restart use a PersistentVolumeClaim here, or
        # point persistence.connection_string at an external Postgres/SQLServer.
        - name: persistence
          emptyDir:
            sizeLimit: 256Mi
      restartPolicy: Always
