apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentsmith
  namespace: agentsmith
  labels:
    app.kubernetes.io/name: agentsmith
    app.kubernetes.io/component: rbac
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentsmith-job-manager
  namespace: agentsmith
  labels:
    app.kubernetes.io/name: agentsmith
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  # ISandbox Kubernetes backend (p0116) — Server creates ephemeral Sandbox-Pods
  # per pipeline run and communicates with the Agent over Redis. NO pods/exec
  # is required.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentsmith-job-manager
  namespace: agentsmith
  labels:
    app.kubernetes.io/name: agentsmith
    app.kubernetes.io/component: rbac
subjects:
  - kind: ServiceAccount
    name: agentsmith
    namespace: agentsmith
roleRef:
  kind: Role
  name: agentsmith-job-manager
  apiGroup: rbac.authorization.k8s.io
