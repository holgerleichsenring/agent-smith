# Agent Smith - Kubernetes Secret Template
#
# DO NOT commit this file with real values.
# Copy, fill in your values, and apply:
#
#   cp deploy/k8s/4-secret-template.yaml my-secrets.yaml
#   # Edit my-secrets.yaml with your real tokens
#   kubectl apply -f my-secrets.yaml
#
# For production, consider:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - External Secrets Operator (https://external-secrets.io)
#   - HashiCorp Vault

apiVersion: v1
kind: Secret
metadata:
  name: agentsmith-secrets
  namespace: agentsmith
  labels:
    app.kubernetes.io/name: agentsmith
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # --- AI Providers ---
  anthropic-api-key: ""          # sk-ant-api03-...
  openai-api-key: ""             # sk-...
  azure-openai-api-key: ""       # Azure OpenAI resource key
  gemini-api-key: ""             # AIza...
  groq-api-key: ""               # gsk_...

  # --- Source Control & Ticket Systems ---
  github-token: ""               # ghp_...  (scopes: repo, issues)
  azure-devops-token: ""         # PAT (scopes: Code R/W, Work Items R/W)
  gitlab-token: ""               # glpat-... (scopes: api, write_repository)
  jira-token: ""                 # Jira API token (Cloud) or PAT (Server)
  jira-email: ""                 # Email associated with the Jira API token
  jira-webhook-secret: ""        # HMAC secret for Jira webhook signature verification

  # --- Chat Platforms ---
  slack-bot-token: ""            # xoxb-...  (Bot User OAuth Token)
  slack-signing-secret: ""       # Found in: Basic Information → App Credentials
  teams-bot-id: ""               # Microsoft App ID (from Bot Framework registration)
  teams-bot-password: ""         # Microsoft App Password

  # --- Infrastructure ---
  redis-url: "redis://redis:6379"  # Redis connection string inside the cluster
