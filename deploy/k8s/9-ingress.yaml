apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmith-server
  namespace: agentsmith
  labels:
    app: agentsmith-server
    app.kubernetes.io/name: agentsmith-server
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agentsmith.yourdomain.com
      secretName: agentsmith-tls
  rules:
    - host: agentsmith.yourdomain.com
      http:
        paths:
          # Backend paths go straight to the server (longest-prefix wins over
          # the "/" catch-all). /hub is the SignalR websocket — routing it
          # directly avoids a websocket hop through the dashboard's Next proxy.
          # The /slack + /webhook paths keep inbound webhooks public.
          - path: /hub
            pathType: Prefix
            backend:
              service:
                name: agentsmith-server
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agentsmith-server
                port:
                  name: http
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: agentsmith-server
                port:
                  name: http
          - path: /slack
            pathType: Prefix
            backend:
              service:
                name: agentsmith-server
                port:
                  name: http
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: agentsmith-server
                port:
                  name: http
          # Everything else is the dashboard UI (Next.js).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentsmith-dashboard
                port:
                  name: http
