name: dashboard

on:
  push:
    # p0234: tags trigger the publish-image job (gated on refs/tags/v*). Without
    # this the workflow never ran on a release tag, so its `if: refs/tags/v`
    # publish job was dead — the dashboard image was NEVER pushed to Docker Hub.
    # No `paths:` on push: a release tag rarely touches src/dashboard, and a
    # paths filter would gate the tag event too. lint-test-build on every main
    # push is cheap (~1m40s); PRs stay paths-filtered below.
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'src/dashboard/**'
      - 'tools/build-tokens.mjs'
      - 'tools/build-hub-event-types.mjs'
      - 'src/backend/AgentSmith.Contracts/Events/**'
      - 'DESIGN.md'
      - '.github/workflows/dashboard.yml'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/dashboard/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate tokens
        run: node ../../tools/build-tokens.mjs --target tailwind

      - name: Generate API types
        run: pnpm gen:types

      - name: Check hub-events.ts drift against C# RunEvent records
        run: pnpm gen:hub-events

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  publish-image:
    needs: lint-test-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: src/dashboard/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agentsmith-dashboard:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agentsmith-dashboard:${{ github.ref_name }}
