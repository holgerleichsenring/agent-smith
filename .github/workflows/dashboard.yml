name: dashboard

on:
  # p0235: lint/test/build only. The image is built + published by
  # docker-publish.yml's matrix (publish: always, per-main-push) — the previous
  # tag-gated publish here never fired (release-please tags don't trigger
  # workflows). Paths-filtered so this only runs when the dashboard changes.
  push:
    branches: [main]
    paths:
      - 'src/dashboard/**'
      - 'tools/build-tokens.mjs'
      - 'tools/build-hub-event-types.mjs'
      - 'src/backend/AgentSmith.Contracts/Events/**'
      - 'DESIGN.md'
      - '.github/workflows/dashboard.yml'
  pull_request:
    paths:
      - 'src/dashboard/**'
      - 'tools/build-tokens.mjs'
      - 'tools/build-hub-event-types.mjs'
      - 'src/backend/AgentSmith.Contracts/Events/**'
      - 'DESIGN.md'
      - '.github/workflows/dashboard.yml'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/dashboard/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate tokens
        run: node ../../tools/build-tokens.mjs --target tailwind

      - name: Generate API types
        run: pnpm gen:types

      - name: Check hub-events.ts drift against C# RunEvent records
        run: pnpm gen:hub-events

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
