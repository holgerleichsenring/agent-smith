name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKER_NAMESPACE: holgerleichsenring

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Fetch skill catalog for tests
        env:
          SKILLS_VERSION: ${{ vars.SKILLS_VERSION || 'v1.0.0' }}
        run: |
          chmod +x scripts/fetch-skills.sh
          scripts/fetch-skills.sh ./test-skills

      - name: Test
        env:
          AGENTSMITH_TEST_SKILLS_DIR: ${{ github.workspace }}/test-skills
        run: dotnet test --no-build --verbosity normal

  docker:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: agent-smith-cli
            dockerfile: src/AgentSmith.Cli/Dockerfile
            publish: always
          - image: agent-smith-server
            dockerfile: src/AgentSmith.Server/Dockerfile
            publish: always
          # p0115: sandbox-agent carrier image — gated to v* tags only.
          # Build runs on every event (validates the Dockerfile in PRs and on main),
          # but push to Docker Hub fires only on v* tags. Lift the gate by switching
          # publish: tags -> always once Docker Hub repo + description are ready.
          - image: agent-smith-sandbox-agent
            dockerfile: src/AgentSmith.Sandbox.Agent/Dockerfile
            publish: tags
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (matrix.publish == 'always' || (matrix.publish == 'tags' && startsWith(github.ref, 'refs/tags/v'))) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-dockerhub-description:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Update agent-smith description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_NAMESPACE }}/agent-smith-cli
          readme-filepath: deploy/DOCKERHUB_DESCRIPTION.md

      - name: Update server description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_NAMESPACE }}/agent-smith-server
          readme-filepath: deploy/DOCKERHUB_DESCRIPTION.md
