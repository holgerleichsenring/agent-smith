name: Docker Build & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKER_NAMESPACE: holgerleichsenring

# Serialise builds per ref so two pushes to main in quick succession (e.g. a
# feature merge immediately followed by the release-please merge) don't run two
# Docker builds concurrently against the SAME shared gha cache. That race
# corrupted a layer ref and failed the release build with
# ".next/standalone: not found" / "Unable to reserve cache ... another job may be
# creating this cache". cancel-in-progress: false → queue (never drop a main
# publish); different refs (PRs) still run in parallel.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Fetch skill catalog for tests
        env:
          SKILLS_VERSION: ${{ vars.SKILLS_VERSION || 'v2.1.2' }}
        run: |
          chmod +x tools/fetch-skills.sh
          tools/fetch-skills.sh ./test-skills

      - name: Test
        env:
          AGENTSMITH_TEST_SKILLS_DIR: ${{ github.workspace }}/test-skills
        # p0239b tier model — three tiers, one metered step:
        #   1. FAST (this step, every PR/CI): unit tests + the in-process
        #      PipelineHarness (Category=PipelineHarness, scripted LLM, fake
        #      clock, StubSandbox). Deterministic, no docker, no paid API.
        #   2. DOCKER (opt-in): the Tier=Docker harness classes self-gate on
        #      AGENTSMITH_HARNESS_DOCKER=1 + a reachable daemon; without it they
        #      emit a LOUD skip (DockerAvailability.CoverageNotExercised) — not
        #      filtered out, so the coverage gap stays visible in the CI log.
        #   3. REAL-MODEL (Category=LiveLLM, the ONLY metered step): a single
        #      model-fitness probe hitting a paid API (needs AZURE_OPENAI_API_KEY
        #      / OPENAI_API_KEY). Excluded here; run manually / on a schedule.
        run: dotnet test --no-build --verbosity normal --filter "Category!=LiveLLM"

  docker:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: agent-smith-cli
            dockerfile: src/backend/AgentSmith.Cli/Dockerfile
            publish: always
          - image: agent-smith-server
            dockerfile: src/backend/AgentSmith.Server/Dockerfile
            publish: always
          # Sandbox carrier image consumed by the server's spawner as an init-
          # container. Was originally gated to v* tags only (p0115) under the
          # assumption that release-please's tag pushes would re-trigger this
          # workflow — they don't (release-please uses GITHUB_TOKEN, and tag
          # pushes by GITHUB_TOKEN actions don't fire downstream workflows by
          # design). publish: always brings it into the same per-main-push
          # rhythm as cli + server, so every release-please squash-merge pushes
          # the matching sandbox-agent build to Docker Hub.
          - image: agent-smith-sandbox-agent
            dockerfile: src/backend/AgentSmith.Sandbox.Agent/Dockerfile
            publish: always
          # p0235: the dashboard (Next.js) image. It used to live in a separate
          # dashboard.yml whose publish-image was gated `if: refs/tags/v*` — and
          # since release-please tags never fire workflows (see the note above),
          # the dashboard image was NEVER pushed. Folding it into this matrix
          # with publish: always puts it on the same per-main-push rhythm as the
          # others — and in the same run, where operators look for it.
          - image: agentsmith-dashboard
            dockerfile: src/dashboard/Dockerfile
            publish: always
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need HEAD~1 to detect whether this commit changed version.txt
          # (= release-please squash merge), which is how we choose when to
          # apply semver tags. Without fetch-depth: 2 the diff fails.
          fetch-depth: 2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Release-please's GITHUB_TOKEN-driven tag push does NOT trigger downstream
      # workflows by GitHub design — so type=semver patterns never expand here
      # (the workflow always fires on refs/heads/main, never on refs/tags/v*).
      # Instead: read version.txt that release-please commits with every release,
      # and apply semver-style tags only on the commit where version.txt changed.
      # Regular feature-PR squash merges leave version.txt untouched and only
      # refresh :latest.
      - name: Resolve release tags
        id: release_tags
        run: |
          VERSION=$(tr -d ' \n' < version.txt)
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          if git diff --name-only HEAD~1 HEAD | grep -q "^version.txt$"; then
            IS_RELEASE=true
          else
            IS_RELEASE=false
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$VERSION major_minor=$MAJOR_MINOR is_release=$IS_RELEASE"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.release_tags.outputs.version }},enable=${{ steps.release_tags.outputs.is_release == 'true' }}
            type=raw,value=${{ steps.release_tags.outputs.major_minor }},enable=${{ steps.release_tags.outputs.is_release == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (matrix.publish == 'always' || (matrix.publish == 'tags' && startsWith(github.ref, 'refs/tags/v'))) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Scope the cache per image so the matrix legs (server / dashboard /
          # cli) don't read+write one shared gha cache key within a run — that
          # cross-image contention is the same race the concurrency group guards
          # across runs. Per-image scope also raises the cache hit-rate.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  update-dockerhub-description:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Update agent-smith description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_NAMESPACE }}/agent-smith-cli
          readme-filepath: deploy/DOCKERHUB_DESCRIPTION.md

      - name: Update server description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_NAMESPACE }}/agent-smith-server
          readme-filepath: deploy/DOCKERHUB_DESCRIPTION.md
