name: Release Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            binary: agent-smith-linux-x64
          - rid: linux-arm64
            os: ubuntu-latest
            binary: agent-smith-linux-arm64
          - rid: osx-x64
            os: macos-latest
            binary: agent-smith-osx-x64
          - rid: osx-arm64
            os: macos-latest
            binary: agent-smith-osx-arm64
          - rid: win-x64
            os: windows-latest
            binary: agent-smith-win-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: >-
          dotnet publish src/AgentSmith.Host -c Release
          -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish

      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv ./publish/AgentSmith.Host ./publish/${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv ./publish/AgentSmith.Host.exe ./publish/${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ./publish/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
