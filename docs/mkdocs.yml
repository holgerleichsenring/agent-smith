site_name: Agent Smith
site_url: https://docs.agent-smith.org
site_description: Open source AI coding agent — technical documentation
repo_url: https://github.com/holgerleichsenring/agent-smith
repo_name: holgerleichsenring/agent-smith
docs_dir: .
site_dir: ../site

theme:
  name: material
  font: false
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  favicon: agent-smith-title-green.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/tokens.css
  - stylesheets/overrides.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/holgerleichsenring/agent-smith
    - icon: fontawesome/solid/blog
      link: https://codingsoul.org
      name: CodingSoul Blog
    - icon: fontawesome/solid/shield-halved
      link: https://sentinel.agent-smith.org
      name: Sentinel
    - icon: fontawesome/solid/comments
      link: https://github.com/holgerleichsenring/agent-smith/issues
      name: Community

copyright: >
  Copyright &copy; 2026 Holger Leichsenring —
  <a href="https://codingsoul.org">CodingSoul Blog</a> ·
  <a href="https://github.com/holgerleichsenring/agent-smith/issues">Community</a>

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

