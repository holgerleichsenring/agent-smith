# yaml-language-server: $schema=../decision.schema.json
# p0117b: Sandbox consumer migration (LibGit2Sharp out, Repository.LocalPath const, deeper services sandbox-routed)
phase: p0117b
decisions:
  - category: Architecture
    chose: "**`Repository.LocalPath` is a `const \"/work\"` (no ctor parameter).** Eliminates the dual-truth between server-side path and sandbox path. ~25 source edits at call sites read fluently because `Path.Combine(repo.LocalPath, \".agentsmith\", …)` resolves to the canonical sandbox path. The 2-arg ctor `(BranchName, string)` deliberately compile-breaks every consumer the build catches; that's the migration tracker."
  - category: Architecture
    chose: "**`SandboxFileReader` is a thin ergonomic wrapper, not a strategy abstraction.** The 19 file-reading handlers each have their own path-construction logic; substituting `File.Exists` / `File.ReadAllText` with `reader.ExistsAsync` / `reader.ReadRequiredAsync` is line-level surgery. ExistsAsync probes via `Step{Kind=ReadFile} + catch-not-found`; no new wire-protocol kind. `SandboxFileReaderFactory` wraps `Create(ISandbox)` for testability"
    reason: singleton DI; per-pipeline reader is built inline in the handler.
  - category: Architecture
    chose: "**Source providers' `CheckoutAsync` is metadata-only; the clone runs sandbox-side.** GitHub/GitLab/AzDO providers do exactly two things: (1) parse + canonicalise the URL, (2) resolve the default branch via API. The clone is a `Step{Kind=Run, Command=git, Args=[clone, url, .]}` driven by `CheckoutSourceHandler`. `LocalSourceProvider` returns `Repository(branch, basePath)` and trusts the operator's bind-mount. `KubernetesSandbox + LocalSourceProvider` throws `NotSupportedException`"
    reason: the local disk isn't reachable from the pod.
  - category: Architecture
    chose: "**Bootstrap deeper services (`IProjectDetector` / `IRepoSnapshotCollector` / `IContextGenerator` / 3 `ILanguageDetector` impls / `MetaFileBootstrapper`) migrated alongside the handlers.** Without this, the BootstrapProject pipeline step would receive `repoPath = \"/work\"` and fail on every server-side `Directory.GetFiles(\"/work\", ...)` after the LibGit2Sharp clone disappeared. Made interfaces async + parameterised on `ISandboxFileReader`. ~600 lines of internal change; necessary for end-to-end pipeline correctness"
    reason: half-migrated state would have silently broken fix-bug under Docker / K8s.
  - category: Architecture
    chose: "**Scanner services take the sandbox per-call, not via DI ctor.** `ISandbox` and `ISandboxFileReader` are per-pipeline runtime values, not DI singletons. Spec text said \"ctor-injection\"; pragmatic shape became `ScanAsync(ISandboxFileReader, ct)` for `IStaticPatternScanner` and `(ISandbox sandbox, ISandboxFileReader reader, ct)` for `IGitHistoryScanner` / `IDependencyAuditor` (the latter two need `Step{Kind=Run}` for `git log` / `npm audit` / `pip-audit` / `dotnet list package`)."
  - category: Implementation
    chose: "**`GitHistoryScanner` rewritten end-to-end without LibGit2Sharp.** Drives `git log --max-count=500 -p --no-color --unified=0 --format=__COMMIT__%n%H` once via `Step{Kind=Run}`, parses commit blocks + unified-diff `+`/`-` lines manually. `GitDiffSecretMatcher.BuildHeadContentIndexAsync` walks `reader.ListAsync(/work, depth=12)` and `reader.TryReadAsync` each file to seed the \"still-in-tree\" set. Severity classification (HIGH = still in HEAD, CRITICAL = removed) preserved."
  - category: Tooling
    chose: "**`Ignore` NuGet (Sjuul Janssen, MIT) replaces LibGit2Sharp's `.gitignore` matcher.** `GitIgnoreResolver` (sandbox-routed) and the new `HostGitIgnore` (host-disk for api-scan code analyzers) parse `.gitignore` content and call `Ignore.IsIgnored(rel)`. Same API shape as the old LibGit2Sharp impl; ~30 LoC each. No native libgit2 dependency."
  - category: Implementation
    chose: "**`AcquireSourceHandler` (legal-analysis) sandbox-routes via `reader.WriteAsync`.** Reads the source PDF/doc from host disk (host-side `File.ReadAllTextAsync`"
    reason: |
      that path is a CLI argument, not a sandbox path), then writes the content to `/work/<filename>` via the reader so `BootstrapDocumentHandler` picks it up via `reader.ListAsync`. Repository ctor becomes 2-arg; the pseudo-Repository hack is gone.
  - category: Implementation
    chose: "**`CompileWikiCommand` (CLI) instantiates `InProcessSandbox` with `workDir = projectPath`.** That's exactly what InProcessSandbox is for"
    reason: |
      a CLI sandbox over a host directory. `await using` is deliberately omitted because `InProcessSandbox.DisposeAsync` deletes `workDir`; with `workDir = projectPath` that would delete the user's project. Process exit cleans up; no leak for a one-shot CLI command.
  - category: Implementation
    chose: "**`InProcessSandbox.ResolvePath` translates `/work` → `workDir` (and `ListFiles` translates back).** Without this, `reader.WriteAsync(\"/work/.agentsmith/runs/r01-xyz/result.md\", …)` in CLI mode would write to the literal host path `/work` (which doesn't exist or is inaccessible). The translation makes `/work` a virtual rebase point so CLI-mode handlers and tools speak the same path language as sandbox-mode handlers and tools."
  - category: Implementation
    chose: "**`ProjectMetaResolver.ResolveAsync` uses one `ListAsync(maxDepth=4)` call instead of N `ExistsAsync` probes.** Per-candidate `ExistsAsync` would round-trip the sandbox 100s of times for monorepos. One bulk listing + client-side filtering + ordering (root-first, then depth-first lex) is dramatically cheaper. `ExistsAsync` is reserved for file-existence checks (where the read-or-fail pattern is one round trip per check anyway)."
  - category: Implementation
    chose: "**`AzureGitOperations` deleted.** Pre-p0117b it owned `EnsureCloned` + `CheckoutBranch` + `FetchAllRemotes` for `AzureReposSourceProvider`. After CheckoutAsync became metadata-only and the clone/checkout moved sandbox-side, the entire class is dead code. PAT-credential handling lives directly in `AzureReposSourceProvider.CreateGitClient` via `VssBasicCredential`."
  - category: Security
    chose: "**`NoLibGit2SharpInGraphTests` is a runtime-closure regression test, not a csproj grep.** Walks `AppDomain.CurrentDomain.GetAssemblies()` after force-loading Application/Infrastructure/Server, asserts no `AssemblyName.Name` and no `Type.Namespace` starts with `LibGit2Sharp`. csproj-level inspection would miss transitive deps. Server image ~9 MB smaller now that the native `libgit2-*.dylib`/`.so`/`.dll` payload is gone."
  - category: TradeOff
    chose: "**Helm chart (Step deferred from p0117) stays in p0117c.** Pure deployment ergonomics with no source-code coupling"
    reason: folding it into this phase would obscure the actual refactor diff.
  - category: TradeOff
    chose: "**`SkillLoader` paths inside `LoadSkillsHandler` and `MetaFileBootstrapper.TryLoadSkillRoles` stay server-side.** Per-user instruction the migration touches only repo-rooted paths in skill loading; the catalog (`~/.agentsmith/skills/`) is operator-side and intentionally not sandboxed. Acknowledged: a project-vendored `skills/` directory is unreachable to a server-side `skillLoader` after the migration; that flow falls back to the catalog."
