# yaml-language-server: $schema=../decision.schema.json
# p0102: API Scan Code-Aware + Prefix Caching
phase: p0102
decisions:
  - category: Architecture
    chose: "`ILlmClient.CompleteWithCachedPrefixAsync(systemPrompt, userPrefix, userSuffix, taskType, ct)` added as an optional default-method overload. Providers without prompt caching (OpenAI, Azure OpenAI, Gemini, Ollama) inherit the default that joins the two halves and falls through to `CompleteAsync`. `AnthropicLlmClient` overrides to send the user message as two `TextContent` blocks with `cache_control = ephemeral` on the prefix only. Alternative considered: a separate `ICachedLlmClient` interface"
    reason: |
      rejected because it would force two paths through `SkillRoundHandlerBase`/`GateRetryCoordinator` for every call.
  - category: Architecture
    chose: Prompt-prefix split lives in a new `PromptPrefixBuilder` service that owns the boundary "what's stable across same-round calls vs. what varies per skill." `SkillPromptBuilder` gained `BuildDiscussionPromptParts` / `BuildStructuredPromptParts` returning `(system, prefix, suffix)`; the existing single-string methods now delegate to the parts API and re-join. Subclasses opt into caching by overriding `SkillRoundHandlerBase.BuildDomainSectionParts(pipeline)`
    reason: |
      default returns `(BuildDomainSection(pipeline), "")`, so existing `SkillRoundHandler` and `SecuritySkillRoundHandler` keep their old behavior with no edits.
  - category: Architecture
    chose: `ApiSkillRoundHandler.BuildDomainSectionParts` puts the swagger spec, code context, summary, and probe results in the stable half; mode line, per-skill findings slice, and per-skill source excerpts go in the variable half. The active-skill name is the only prompt input that differs across the same round, so per-skill code excerpts are scoped to the active role (auth-config-reviewer / ownership-checker / upload-validator-reviewer)
    reason: keeps the prefix identical across the cohort.
  - category: Architecture
    chose: `GateRetryCoordinator.ExecuteAsync` signature changed from `(systemPrompt, userPrompt, …)` to `(systemPrompt, userPromptPrefix, userPromptSuffix, …)`. Both attempts (initial + retry) reuse the same prefix; only the suffix grows the corrective-prompt block. Cache hit on retry is preserved.
  - category: Architecture
    chose: "`EvidenceMode` extended with a third value `AnalyzedFromSource` (in addition to `Potential` and `Confirmed`). `Finding.DisplayLocation` was tweaked to prefer `File:StartLine` when the mode is `AnalyzedFromSource`, even if `ApiPath` is also set"
    reason: |
      code-evidence findings should always surface their file:line. Console / Markdown / SARIF formatters render a three-way badge.
  - category: Architecture
    chose: `ApiCodeContextHandler` runs after `LoadSwagger` and before `SessionSetup` in the `ApiSecurityScan` preset. When `ContextKeys.SourcePath` is unset, it sets `ApiSourceAvailable = false` and returns immediately
    reason: |
      the rest of the pipeline behaves identically to pre-p0102. When source is present, it walks the tree once via `IRouteMapper`, `IAuthBootstrapExtractor`, and `IUploadHandlerExtractor`, then exposes the populated `ApiCodeContext` for downstream skills.
  - category: Architecture
    chose: "`RouteMapper` walks the source tree once and accumulates declarations per-framework. `FrameworkRoutePatterns` carries per-language file-extension scoping (`.cs` for .NET, `.js/.ts` for Express, `.py` for FastAPI, `.java/.kt` for Spring) so the patterns can't cross-match each other (an early test failure: `@app.post(...)` in a `.py` file matched the Express regex). Path canonicalization replaces `:param` (Express) and `{param}` (everything else) with `{}` so swagger paths and source paths compare correctly."
  - category: Architecture
    chose: "Confidence scoring on `RouteHandlerLocation`: exact method+path match → 1.0, path match with method mismatch → 0.5, no path match → not in list. Decision-locked threshold for downstream skills is 0.5"
    reason: |
      entries below that are kept in `RoutesToHandlers` (so the run output can log them as "low confidence") but skills must not emit findings against them. Implemented in `ApiSkillRoundHandler.BuildPerSkillCodeSection` and codified in `api-security-principles.md`.
  - category: Architecture
    chose: "`ApiSecurityTriageHandler` was over the 120-line class limit, so the gate landed as three classes: `ApiSecurityTriageHandler` (orchestration, ≤60 lines), `ApiSecurityTriagePromptBuilder` (signal + LLM prompt assembly), `ApiSecuritySkillFilter` (mode + source-availability gate). `Filter()` returns `{recon-analyst, anonymous-attacker, false-positive-filter, chain-analyst}` for passive+no-source, drops `auth-config-reviewer / ownership-checker / upload-validator-reviewer` whenever source is absent, and otherwise returns the input list unchanged. Active-mode-capable contributors (idor-prober, low-privilege-attacker, input-abuser, response-analyst) keep their existing degrade-in-passive behavior outside the passive+no-source branch."
  - category: Architecture
    chose: `config/patterns/api-auth.yaml` carries 8 deterministic patterns (the four `ValidateXxx = false` JWT toggles, CORS `AllowAnyOrigin + AllowCredentials` combo, `[AllowAnonymous]` adjacent to a state-changing verb, hardcoded JWT signing keys, exception-message-in-response). LLM skills cover the nuance; static patterns catch the unambiguous bugs cheaply. Same split that p0094b applied to `auth.yaml`.
  - category: Implementation
    chose: The three new `IRouteMapper` / `IAuthBootstrapExtractor` / `IUploadHandlerExtractor` interfaces live in `AgentSmith.Contracts.Services`; their regex-based implementations live in `AgentSmith.Infrastructure/Services/Security/Code/`, alongside a small `SourceSnippetReader` helper for bounded-line-range reads. Roslyn-based mapping was deferred per spec decision (#19)
    reason: revisit if LLM under-confidence on nuanced cases is measurable.
  - category: Implementation
    chose: "`agentsmith.example.yml` gained a sibling `api-security` project block (alongside `my-project`) with `parallelism.max_concurrent_skill_rounds: 4` and a `source.path` entry. The comment in the parallelism field explains *why* 4 is required (5-minute Anthropic cache TTL"
    reason: |
      sequential calls for 13 contributors take longer than the TTL window, so the cache misses on later skills). The example was added rather than editing `my-project` to keep the basic example minimal.
  - category: Implementation
    chose: CLI banner now prints `mode | source | ~N skill(s)`. Skill count is estimated locally in the CLI from `(active, source)`
    reason: |
      kept as a static map rather than asking the triage handler, because triage runs per-pipeline and the banner fires before pipeline DI exists.
  - category: Scope
    chose: LLM-skill content tests (`AuthConfigReviewer_DeadAuthorizationMiddleware_Critical`, `OwnershipChecker_DbSetWithoutUserPredicate_FlagsIdor`, `UploadValidatorReviewer_HeaderOnlyMime_Medium`) check that `SKILL.md` mentions the keywords the spec calls out, rather than running the LLM. Full skill behaviour requires an integration run against a fixture repo; the spec calls those out in the done criteria as run-time evidence rather than unit tests.
  - category: Scope
    chose: Baseline and Comparison cost decision keys (per spec done-criterion) are NOT filled in this commit. Recording them honestly requires a real api-scan run against a fixture target with an Anthropic API key; that run produces the numbers and a follow-up commit appends them here, pinned to model ID + `MaxConcurrentSkillRounds` value (matching p0094b's pattern). Placeholder follow-up tracked below; do not interpret the absence as zero cost benefit.
  - category: TradeOff
    chose: `MaxConcurrentSkillRounds = 4` in the example config is the spec-required default for api-security-scan but is not the system-wide default. Operators running api-scan without copying the example config get the safe sequential path (cache miss on later skills, no exposure to parallel-call edge cases)
    reason: |
      they only opt in once they read the comment. Trade: docs-as-default vs. behavior-as-default. Chose docs because the cache-TTL constraint is project-specific.
