# yaml-language-server: $schema=../decision.schema.json
# p0109a: Server-Lifecycle Decoupling
phase: p0109a
decisions:
  - category: Architecture
    chose: "Coordinator (not decorator) for the lifecycle wrap. Lifecycle wrapping in `PipelineExecutor` is more involved than the Jira lock that p0109 handled with a decorator: it transitions a status, holds a heartbeat handle across the whole run, and disposes with a deferred close-transition. Hiding all of that behind `IPipelineLifecycleCoordinator.BeginAsync(...) → IAsyncPipelineLifecycle` separates it cleanly from the executor's main loop, lets the CLI compose with `NoOpPipelineLifecycleCoordinator` (no Redis deps), and keeps the executor's ctor stable as new lifecycle concerns get added. Decorator pattern would have meant a wrapping `PipelineExecutor`"
    reason: too coarse a unit; the wrap belongs *inside* the executor's run, not around it.
  - category: Architecture
    chose: "`ITicketClaimService` registration moved from Application to Server. Unlike `PipelineExecutor` (which CLI uses for non-ticket pipelines like apiscan/security-scan), `TicketClaimService` is purely Server-instantiated: only `WebhookRequestProcessor` and `PollerHostedService` resolve it, both Server-side. Application-side registration meant the CLI's DI graph carried `IRedisJobQueue` + `IRedisClaimLock` + `IJobHeartbeatService` as transitive deps even though no CLI code path can reach the service. Move resolves the transitive leak completely."
  - category: Implementation
    chose: "`AddJiraLabelLockDecorator` renamed → `AddServerCompositionOverrides`. The Server-side overrides on top of Application's CLI-safe defaults are now multiple: locking transitioner factory, ticket-aware lifecycle coordinator, ticket claim service. One method bundles them"
    reason: |
      explicit "this is what Server adds beyond Application's CLI-safe defaults". The discipline is: Application/Infrastructure always register the Redis-free default; Server adds overrides on top.
  - category: Implementation
    chose: "`NoOpPipelineLifecycleCoordinator` is the Application default. Reason: an Application/Domain default that's *safe everywhere* is the inversion of the Pre-p0107 pattern (Null fallbacks were registered conditionally based on Redis availability). Now: Application registers the no-op, Server unconditionally overrides. The Application graph is always resolvable in any composition. Test `Cli_PipelineLifecycleCoordinator_ResolvesToNoOp` asserts the default is in place."
  - category: TradeOff
    chose: `NullTicketClaimService` deleted
    reason: |
      same Pre-p0107 orphan pattern as `NullRedisClaimLock`. Only used by its own test, never wired in production. Doc-comment claimed "CLI server when Redis unavailable", which describes a fallback p0107 retired. With `ITicketClaimService` now Server-only, no CLI graph needs even an orphan dummy.
  - category: TradeOff
    chose: Real-CLI smoke test uses `AgentSmith.Cli.ServiceProviderFactory.Build` (the production composition) inside the test
    reason: |
      `Cli_RealServiceProviderFactoryBuild_ResolvesPipelineExecutor`. p0109's test only covered a hand-rolled CLI-shape collection, which missed the `IJobHeartbeatService` gap because it never resolved `PipelineExecutor`. The real-factory test ensures any future divergence between the test fixture and production composition is caught: if production registers something the fixture forgets, the test still fails because it builds from production code.
