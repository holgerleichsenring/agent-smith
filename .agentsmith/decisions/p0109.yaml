# yaml-language-server: $schema=../decision.schema.json
# p0109: Jira Lock Decorator
phase: p0109
decisions:
  - category: Architecture
    chose: `IRedisClaimLock` is a multi-writer-coordination concern, not a Jira-platform concern. Cross-process serialization is needed only in the Server cluster (multiple pods, poller + webhook racing on the same ticket). A single CLI process cannot race with itself, and parallel CLI invocations have no shared Redis to coordinate through anyway. The lock attaches at composition time via a decorator (`LockedTicketStatusTransitioner`) that the Server registers and the CLI does not
    reason: |
      Jira's API atomicity gap (no If-Match on `fields.labels`) is real, but the *need* for the workaround is conditioned on the multi-writer reality, which is a deployment property, not a platform property.
  - category: Architecture
    chose: "Decorator wraps Jira only, not all platforms. GitHub/GitLab use ETag/If-Match-equivalent semantics; AzDO uses `op:test` on `/rev` for optimistic concurrency at the API level. Wrapping them with the same lock would convert API-level retries into queueing"
    reason: |
      strictly worse. The decorator class accepts any `ITicketStatusTransitioner` as inner type, but the `LockingTicketStatusTransitionerFactory` only applies it to `config.Type == "jira"`.
  - category: Implementation
    chose: "DI rebind extracted from `AddRedis()` into a standalone `AddJiraLabelLockDecorator()` extension method. Reason: real Server `Program.cs` calls `AddRedis().AddCoreDispatcherServices()`, but `AddCoreDispatcherServices` internally calls `AddAgentSmithInfrastructure` which re-registers `ITicketStatusTransitionerFactory→TicketStatusTransitionerFactory`. MS DI is last-wins for `GetService<T>`, so an in-`AddRedis` rebind would be silently overwritten by the subsequent infrastructure registration. Standalone method called *after* `AddCoreDispatcherServices` makes the override stick. Test fixture `ServerDiLifetimeTests` mirrors the same call order."
  - category: Implementation
    chose: "`LockingTicketStatusTransitionerFactory` takes the **concrete** `TicketStatusTransitionerFactory` (not `ITicketStatusTransitionerFactory`). Reason: passing the interface would risk a self-referential cycle if the binding is rebound to Locking. Binding the concrete type explicitly via `sp.GetRequiredService<TicketStatusTransitionerFactory>()` makes the dependency unambiguous. Infrastructure registration adds `services.AddSingleton<TicketStatusTransitionerFactory>()` plus a forwarding lambda for the interface so resolves of either return the same instance."
  - category: TradeOff
    chose: `NullRedisClaimLock` deleted as a Pre-p0107 leftover
    reason: |
      it was never wired in production, conflicting with p0107's "no Redis-fallback in CLI" decision. Doc-comment-claimed use-case ("manual security-scan, fix without ticket lifecycle inject the dep but never call these methods") was based on the assumption that `IRedisClaimLock` had to be in the CLI graph at all; this phase removes that need entirely. `ServerDiLifetimeTests` fixture rebased onto `Mock.Of<IRedisClaimLock>()`. Sibling `Null*` classes in the same directory (`NullRedisJobQueue`, `NullJobHeartbeatService`, etc.) left untouched — they're still used by the test fixture as DI test doubles, and removing them is out of scope.
  - category: TradeOff
    chose: "`EnvVarCollection` xUnit collection introduced to serialize tests that mutate process-global env vars. Reason: new `LockingTicketStatusTransitionerFactoryTests` and `CliShapedDiTests` set `GITHUB_TOKEN`/`GITLAB_TOKEN`/etc. so the inner factory's `SecretsProvider` calls succeed; existing `FactoryTests.TicketProviderFactory_NewTypes_RecognizedButNeedSecrets` asserts the *opposite* (env unset → ConfigurationException). xUnit's default per-class parallelism caused races. All three classes now share `[Collection(EnvVarCollection.Name)]`, and the env-mutating ones implement `IDisposable` to reset to clean state. Cheaper than introducing a `SecretsProvider` abstraction across the codebase for a test-only seam."
