# yaml-language-server: $schema=../decision.schema.json
# p0129b: build-verifier + test-verifier (D5 slice 2/3)
phase: p0129b
decisions:
  - category: Architecture
    chose: "**LLM-only static analysis instead of actual build/test execution.** Phase D D5 spec said build-verifier \"runs the project's build\" and test-verifier \"runs the project's tests\". p0129a's VerifyRoundHandler dispatches verifier skills via IChatClient WITHOUT tool access"
    reason: |
      wiring SandboxToolHost / RunCommand through to the chat client requires routing through SkillCallRuntime + ToolKit (the deferred consumer migration noted in p0126c). Static-analysis-only is the pragmatic first slice: verifiers analyze the diff content for breakage signals; the existing Test command in the FixBug preset runs the actual build/tests right after Verify, so failures still surface fast-fail-style. If LLM static analysis proves insufficient in operator runs, a follow-up phase wires tools into VerifyRoundHandler (or migrates it to SkillCallRuntime). -- alternatives: ship tool-passing now (rejected: scope creep into p0126/p0127 territory; would have doubled the slice size); skip both verifiers (rejected: build/test breakage is the highest-volume regression class — the static pre-check has real value even without command execution).
  - category: Architecture
    chose: "**Two skills, no new C# code.** VerifyRoundHandler from p0129a already filters AvailableRoles by role + investigator_mode + activates_when, so adding new VerifyDiff skills is purely a skills-repo concern. The handler doesn't know or care which verifier ran"
    reason: |
      observations come back through ObservationParser the same way. This is the slicing payoff of p0129a's parameterized handler: each subsequent verifier costs one SKILL.md + one CHANGELOG entry.
  - category: Implementation
    chose: "**test-verifier blocks ONLY on test-removal-without-justification, not on coverage gaps.** Coverage gaps (new public method without test, business-logic change without test update) flag as severity=Medium + blocking=false. Reason: pipelines that block on every coverage edge become operator noise in codebases without 100% coverage discipline. Test removal is structurally suspicious"
    reason: |
      if a test was removed, the implementer should have documented why; missing rationale is exactly the silent regression verify exists to catch. -- alternatives: block on all coverage gaps (rejected: noise); never block (rejected: silent test removal is the bug-18693-class regression for the test layer).
  - category: Implementation
    chose: "**build-verifier discipline: when in doubt, lower confidence and drop blocking.** Diff text doesn't always contain enough evidence to know whether a build will break (e.g. type used in changed code might be defined in an unchanged file). False positives erode operator trust faster than missed signals (which the actual Test command catches). The SKILL.md explicitly tells the LLM \"lower confidence rather than guess\""
    reason: same calibration principle as p0089a's confidence-threshold work.
  - category: TradeOff
    chose: "**Verify-notes deduplication still deferred.** Round-2 verifiers re-emit round-1 findings plus possibly new ones. p0129b adds two more verifiers, which multiplies the duplicate-volume across rounds. Not a regression"
    reason: |
      round-2 escalation already concatenates round-1 + round-2 notes wholesale; operators see duplicates in the ticket writeback. Dedup at the combine site (compare by concern + file + description-prefix, keep most recent) is mechanical but lands cleaner in p0129c when architecture-verifier increases volume further, or in a dedicated cleanup phase. -- alternatives: implement dedup here (rejected: scope creep into the slice that's primarily about adding skill content).
  - category: TradeOff
    chose: "**No ProjectBuildCommandResolver implemented.** Parent p0129 spec called for a service that bridges ProjectDetector's per-language BuildCommand/TestCommand to verifiers. Deferred because (a) no verifier currently invokes commands, so the resolver has no consumer; (b) when actual command execution lands in a follow-up phase, the resolver shape will be informed by what the consumer actually needs. Building it speculatively now would be premature abstraction."
