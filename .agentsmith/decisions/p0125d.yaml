# yaml-language-server: $schema=../decision.schema.json
# p0125d: validate-concepts CLI verb (D1 slice 4/4)
phase: p0125d
decisions:
  - category: Architecture
    chose: "**`IConceptWriter` discovered via DI, not via reflection over assemblies.** Coding-principles is non-negotiable on \"no assembly scanning magic\" and the user explicitly rejected the `[PublishesConcept]` attribute path. The explicit contract has three benefits: handlers self-declare what they publish (truth-at-the-writer), registration is single-line in DI, and discovery cost is zero. Trade-off: a tiny boilerplate cost (one `IReadOnlyList<ConceptDeclaration>` property per publishing handler) for a build-time-discoverable, principle-aligned design."
    reason: |
      alternatives: `[PublishesConcept]` + reflection (rejected per coding-principles); a YAML side-file declaring writers (rejected: drift between code and YAML).
  - category: Architecture
    chose: "**`ConceptDeclaration` carries (ConceptName, ConceptType), not just the name.** The validator checks both that the handler claims the right concept AND the right type. A handler that declares `source_available` as Int when the vocabulary says Bool is a typo the verb catches at build-time. Type-mismatch is a separate error tuple from name-not-in-vocabulary, so operators see the specific drift."
  - category: Architecture
    chose: "**Three-step DI pattern for handlers that are also `IConceptWriter`s.** Each publishing handler is registered as: (1) concrete type (transient"
    reason: |
      for resolution by IConceptWriter lambda), (2) `ICommandHandler<TContext>` (transient, resolves the concrete) — the pipeline-execution path, (3) `IConceptWriter` (singleton, resolves a one-time concrete instance). The IConceptWriter singleton lambda runs once and caches; the IConceptWriter role uses a single dedicated stateless instance. Pipeline execution still gets fresh transient handlers per command. -- alternatives: change all four handlers to Singleton lifetime (rejected: wider blast radius across the existing pipeline); a separate `*WriterDescriptor` class per handler (rejected: doubles the number of types and breaks the spec's "handlers implement IConceptWriter" contract).
  - category: Architecture
    chose: "**`ValidateConceptsCommand` is an instance class in `AgentSmith.Cli/Commands/`, not in Application.** Application can't see `Infrastructure.Core.Services.ConceptVocabularyLoader` (layering: Application → Contracts/Domain only). The Cli project sees both layers. Putting the validator in Cli keeps its dependency graph honest without adding a Contracts-side abstraction over `ConceptVocabularyLoader` just to satisfy layering."
    reason: |
      alternatives: lift `ConceptVocabularyLoader` behind an `IConceptVocabularyLoader` interface in Contracts (deferred: when a second consumer needs the abstraction); duplicate the YAML loading logic in Application (rejected: two parsers, two error messages).
  - category: Architecture
    chose: "**Single class with both validator-method and CLI-factory-method.** `ValidateConceptsCommand` has the instance `Validate(skillsDirectory)` method (testable, the actual work) AND a static `Create(...)` method that builds the System.CommandLine `Command` (CLI surface glue). One file, one type, two entry points"
    reason: |
      keeps the test-and-CLI pair adjacent. The CLI handler resolves the same `ValidateConceptsCommand` from DI and calls `Validate`, so the production path and the test path exercise the same code. -- alternatives: split into `ValidateConceptsCommand` (validator) + `ValidateConceptsCommandFactory` (CLI) (rejected: two types for one feature).
  - category: Implementation
    chose: "**Validator uses `ISkillLoader.LoadRoleDefinitions`, not the internal `SkillMdParser` directly.** The spec mentioned `SkillMdParser`, but it is `internal sealed` in Infrastructure.Core and would require either an `InternalsVisibleTo` to Cli (already present) plus knowing the `IProviderOverrideResolver` ctor wiring, or a public re-export. `ISkillLoader.LoadRoleDefinitions` is already the public contract that wraps `SkillMdParser` + override resolution + role merging"
    reason: |
      reusing it gives the verb the same parsing path the runtime uses. -- alternatives: instantiate `SkillMdParser` directly via `InternalsVisibleTo` (rejected: tight coupling to internals); inline a YAML-frontmatter scanner in the verb (rejected: a second parser path that drifts from runtime).
  - category: Implementation
    chose: "**`activates_when` field plumbed through `SkillMdFrontmatter` → `RoleSkillDefinition`.** Adding it once at the parser level makes it available to both p0125d (build-time validation) and p0127 (runtime triage consumption). The field is `string?` and optional; existing skills without it parse unchanged. The override-merge path also handles it (over wins, falls back to base) so provider-override SKILL.&lt;provider&gt;.md files can override the activation expression like every other field."
  - category: Implementation
    chose: "**Errors collected and returned all at once, sorted by subject then concept.** Operators want the full picture, not a fix-and-rerun loop. The verb runs every check (activates_when × N skills, handler-side × M registered writers, vocabulary-side × K concepts), accumulates errors, sorts deterministically, and prints. Exit code is the boolean OR of any error existing"
    reason: 0 on clean tree, 1 otherwise.
  - category: Implementation
    chose: "**`CollectIdentifiers` is a switch over the AST nodes, not a visitor.** The grammar is small (5 internal node types, 3 literal types, 1 identifier); a visitor base class plus 5 visit methods is more code than a 7-line switch. Literal nodes fall through (yield no identifiers) implicitly. New AST node types in the future will trigger a non-exhaustive switch warning."
  - category: Implementation
    chose: "**Empty `writers: []` lists are allowed without `IConceptWriter` backing.** Not every concept is published by a handler"
    reason: |
      some are seeded externally (test fixtures, future external publishers, snapshot-only concepts). The vocabulary-side check skips entries with empty writers. The reverse check (every handler-declared concept must be in the vocabulary's writers list) still applies — handlers can't publish concepts the vocabulary doesn't allow them to.
  - category: TradeOff
    chose: "**Output is plain text, one error per line, format `{subject}: {concept}: {message}`.** Shell-friendly, grep-able, diff-able. A structured format (JSON, SARIF) is justified once the verb feeds into a richer CI dashboard; for now stdout + exit code is enough for local runs and CI scripts. The verb prints `validate-concepts: OK` on success so CI logs are positive when clean."
