# yaml-language-server: $schema=../decision.schema.json
# p0158g: Per-repo BootstrapDispatch + BootstrapRound
phase: p0158g
decisions:
  - category: Architecture
    chose: "**Per-iteration concept mutation with try/finally restore"
    reason: |
      NOT a per-repo concept-vocabulary scope.** Skill activation reads `project_language` from one shared `IRunStateConcepts` instance; routing per-repo activation needs either (a) mutate the concept before each `ActivationSkillFilter.Filter` call and restore at the end, or (b) introduce a new per-repo concept-overlay layer. Option (a) is ~6 lines (save in `SafeGetString`, set per-iteration, restore in `finally`) and keeps the activation infrastructure untouched. Option (b) is a full subsystem extension — `IRunStateConcepts` doesn't have scoping today and adding it touches every concept reader (PipelineNameInitializer, every activation site, the skill-runner). The mutation approach is correct because BootstrapDispatch runs synchronously, single-threaded, and is the only writer of `project_language` during the dispatch step. -- alternatives: per-repo concept-overlay scope (rejected: scope creep, dominates the phase); pre-compute matches by iterating repos against ALL skills filtered with substituted strings (rejected: re-implements ActivationSkillFilter outside its own contract, two evaluators with divergence risk).
  - category: Architecture
    chose: "**`PipelineCommand.RepoName` is the dispatch carrier"
    reason: |
      added to `SkillRound` factory + flowed through every SkillRound-shaped context builder (BootstrapRoundContextBuilder, SkillRoundContextBuilder).** The dispatcher emits N `BootstrapRound` commands, one per repo; the executor needs to thread the `RepoName` from the queued command into the per-iteration handler context so the handler can pick `Sandboxes[X]` + `RepoProjectMaps[X]`. Threading `RepoName` through every SkillRound-shaped builder (not just BootstrapRoundContextBuilder) costs ~3 lines but lets future per-repo SkillRound flows (multi-repo plan / verify / etc.) reuse the same plumbing without another contract change. The non-bootstrap SkillRoundHandler doesn't consume RepoName today — forward plumbing only. -- alternatives: stash RepoName on PipelineContext under a transient key (rejected: parameter-on-the-side, harder to trace which command owns which repo); only thread to BootstrapRoundContext (rejected: locks future per-repo SkillRound flows into another contract churn).
  - category: Architecture
    chose: "**BootstrapToolHostFactory stays single-sandbox per Create()"
    reason: |
      N rounds, N hosts, N PathWriteGuards.** The factory takes one `ISandbox` per call and returns a `BootstrapToolBundle` scoped to that sandbox. Each `BootstrapRound` execution constructs a fresh host inside the dispatched repo's sandbox, so writes physically can only target that repo's `/work/.agentsmith/...`. Alternative: multi-sandbox routing inside the bootstrap tool host (route on path prefix like the general FilesystemToolHost) would conflate dispatch (one repo per round, deterministic) with routing (one of N, agent-driven) and let one bootstrap round accidentally write into a sibling repo. -- alternatives: multi-sandbox bootstrap tool host (rejected: blurs the "one round = one repo" guarantee); pass all sandboxes and a repoName arg into a re-routed tool host (rejected: same blurring, more state).
  - category: Implementation
    chose: "**BootstrapRoundHandler keeps the legacy single-sandbox/single-ProjectMap fallback (Sandboxes[RepoName] → ContextKeys.Sandbox; RepoProjectMaps[RepoName] → ContextKeys.ProjectMap).** Pre-p0158g single-repo runs and pre-existing handler tests seed only the singular keys with RepoName == \"\". The fallback path produces identical behaviour to the legacy single-repo handler when the dispatch dict isn't present, and the new multi-repo path is exercised when the per-repo dict has the requested key. Mirrors the `MultiRepoTargets.Resolve` shim pattern introduced in p0158f."
    reason: |
      alternatives: hard-require the per-repo dicts (rejected: every single-repo handler test fixture would need rewriting for no behaviour change); deprecate-only the singular keys with a TODO (rejected: leaves a fail mode in single-repo runs for a runtime symptom no operator has reported).
  - category: TradeOff
    chose: "**`InitProject_FiveRepos_ProducesFivePullRequests` is exercised at the dispatch boundary (`ExecuteAsync_FiveRepos_QueuesFiveBootstrapRounds`), not as a full PipelineExecutor smoke.** The downstream CommitAndPR per-repo flow is fully covered by p0158b/c handler tests + the existing PrCrossLink orchestrator tests. Re-running the entire executor at the unit level requires standing up the sandbox coordinator, chat client mocks, decision logger, source provider, and 8 context builders for one assertion (N=5 ⇒ 5 PRs). The dispatch-boundary check answers the load-bearing question for p0158g"
    reason: |
      "does N repos produce N rounds with correct RepoName + skill?" — and the existing per-repo CommitAndPR tests answer "does each round become one PR?". -- alternatives: full PipelineExecutor smoke (rejected: harness cost dominates a question already answered by two existing tests); operator-only smoke deferred to release gate (kept as the production gate; the spec done-criterion explicitly names this as the operator check).
