# yaml-language-server: $schema=../decision.schema.json
phase: p0356
decisions:
  - key: "The overlay ships as skill text + thin backend affordances, NOT choreography. The compiler-scout, decide-once-fan-out and batch-verify steps needed ZERO new C# orchestration: spawn_agents (p0177), run_command, write_file, the ledger tool and MasterVerification already carry the flow, and the ProgressLedgerToolHost reconcile ALREADY allows done->pending status flips (protected ids only forbid DROPPING — pinned by a new test). The flow lives in coding-agent-master 1.14.0 (skills PR #135) as capability wording; AgenticLoopRunner's message-list ownership is untouched."
  - key: "Mid-run ledger durability reuses the EXISTING RunStoryRecordedEvent verbatim — no new event type, no RunEventApplier change (that applier is p0355's surface; its null-coalescing apply already preserves a previously persisted AcceptanceJson when the mid-run flush sends null). ProgressLedgerFlusher chains publishes in replace order and is fire-and-forget per tool call: a lost flush is repaired by the next one / the run-end snapshot. The seeded ledger is flushed once at master start, so the viewer sees the checklist live from iteration 0."
  - key: "Note is persisted on ProgressLedgerItemView as a trailing optional field (camelCase wire omits nulls on the storage side) — pre-p0356 payloads deserialize unchanged; the run-detail JSON now carries note per item, which the dashboard may ignore. The note is exactly the working state (conventions, batch counts) a resumed run needs, so dropping it at persistence would have made rehydration amnesiac."
  - key: "Same-ticket resume is a PORT (IPriorRunLedgerReader): NullPriorRunLedgerReader is the TryAdd default (CLI + spawned orchestrators — they have no DB channel by design, p0320c), DbPriorRunLedgerReader (scope-per-op, DbActiveRunLease idiom) replaces it in the server's relational composition. Reads order by run Id, not StartedAt — run ids are time-sortable by construction (p0156) and SQLite cannot ORDER BY DateTimeOffset. Known limitation, stated openly: a SPAWNED orchestrator resumes without a prior ledger until the spawn path forwards it (touching SpawnPipelineRunsUseCase was deliberately avoided — p0355 is editing it); in-process runs (the current default deployment) get the full resume path."
  - key: "Resume gates live in PriorRunLedgerSeeder, pure + tested: same ticket only (the reader query), progressed-past-bootstrap (at least one non-pending item — mid-run flushing persists ledgers EARLY, so an all-pending ledger is a bootstrap abort nothing validated), age-capped at 72h, capped at MaxItems, and in_progress comes back as pending (the interrupted step is re-verified, never assumed done). Deliberately outcome-AGNOSTIC — a reaped/failed run's ledger is the point; cross-run context ingestion (LoadRuns) stays successful-runs-only and untouched; the bootstrap-abort ingestion trust gate is p0355's."
  - key: "The environment probe is one POSIX-sh run_command per sandbox at master start (SandboxToolchainProbe), distilled to 'This sandbox has: git 2.43.0, dotnet 8.0.408, ...' and APPENDED to the coding master's system prompt — per-run stable, so the p0323 automatic cache anchoring is unaffected, and it reaches ALL coding-master branches (default + phase-execution) without touching any prompt factory. Scan masters (read-only) and spec-dialog (no sandbox commands) are not probed. Probe failure omits the section — never a fabricated inventory."
  - key: "Telemetry is compute-and-log, not a new persistence surface: ContextCostTelemetry derives tokens-per-done-ledger-item + cached share from PipelineCostTracker's existing four token buckets (p0323) and the final ledger, logged at master completion. The underlying buckets already persist via RunCostSummary/RunLlmCall rows; inventing a parallel metrics store for a health SIGNAL would have duplicated them. TokensPerDoneItem is null when nothing is done — no fake zeros."
  - key: "RunOutcomeKeystone untouched (p0355 edits it concurrently): batch-verify feeds the EXISTING MasterVerification/keystone contract — the skill's final whole-set verify emits the normal Phase 4 verdict; no parallel verification mechanism."
  - key: "Spec stays in active/: the baseline-rerun step (re-run a #19106-class migration on HEAD) is an operator action and the phase's first done-criterion; the overlay ships against the spec's decided design, the rerun validates it."
