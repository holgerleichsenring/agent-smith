# yaml-language-server: $schema=../decision.schema.json
phase: p0368
decisions:
  - key: "update_progress becomes a MERGE, not a full REPLACE — but only for DONE work. p0359 made the replace fully model-owned, which is correct for pending restructuring (the plan deviates mid-run) but is exactly what let a master rewrite a 10-item/5-done ledger into a 4-item/0-done one, losing completed-state and defeating ShouldReengage into a 65-min loop. The operator's rule is neither append-only (too rigid) nor free-replace (the defect): a step that is DONE stays DONE, pending stays freely editable. LedgerMergePolicy.Merge(retained, incoming, explicitReopens) preserves the retained DONE set and lets the incoming list drive everything else."
  - key: "A completed step leaves DONE only via an EXPLICIT reopen signal — never by omission or plain regression. A done->pending regression or an omitted done item in an ordinary rewrite is accidental and is rescued: forced back to done / re-attached, with a LogWarning naming the count ('master tried to discard N completed steps') for operator visibility. The escape hatch is a new 'reopen' status token (also revert/reopened/reverted) that maps to pending AND flags the id as an explicit reopen. This supersedes p0356's 'honest status regression is always legal': the decision-revision scenario (a revised convention re-applies finished work) now uses the token, so legitimate reopens still work while a silent reset cannot."
  - key: "Matching is id-first with an activity+target fallback. Seeded ids are stable by construction (p0341) so id is primary; but a rewrite may re-word a step and reassign ids, so the fallback key is normalized(activity) + a unit-separator char + normalized(target). A reworded, re-id'd completed step is still bound to its retained DONE entry and held done. Entries with neither activity nor target are not fallback-indexed to avoid spurious collisions; the fallback is intentionally exact-match (a genuinely-new pending item sharing an exact activity+target with a completed step is conservatively treated as that step and kept done)."
  - key: "The merge is a pure type in AgentSmith.Contracts.Progress (LedgerMergePolicy + LedgerMergeResult) — no IO, no logging — so it is directly unit-testable; the tool host owns side effects (wire mapping, reopen-id collection, warning logs). ProgressLedgerToolHost gains an optional ILogger defaulting to NullLogger.Instance, so the CLI + all existing constructions compile unchanged; AgenticMasterHandler passes its handler logger. RunOutcomeKeystone and ProgressLedgerCoverage are untouched — the merged FINAL list still faces the diff cross-check; the merge only prevents completed-state from being silently lost, it does not assert honesty."
  - key: "Two pre-existing tests encoded the p0359 'drops are always legal' premise and were updated to the p0368 rule, not worked around: ProgressLedgerTests.ProgressLedger_DoneFlippedBackToPending_AcceptedForDecisionRevision (a plain done->pending flip) is now DoneReopenedExplicitly (uses the reopen token) plus a new DoneRegressedWithoutReopen_KeptDone; PriorRunLedgerSeederTests.Seed_SeededEntries_RoundTripIntoToolHost now asserts a resumed PRIOR done step survives a rewrite that omits it (a resume must never re-tread finished steps). MaxItems and at-most-one-in_progress stay pre-merge checks — the merge only adds done items or downgrades a regression to done, so it cannot violate the in_progress invariant; re-attached done may exceed MaxItems in a pathological rewrite and preservation deliberately wins over the cap."
