# yaml-language-server: $schema=../decision.schema.json
# p0098: Docs Catch-Up for p0084 + p0095a/b/c + p0096
phase: p0098
decisions:
  - category: Architecture
    chose: `concepts/ticket-lifecycle.md` is the single canonical state-machine page. Setup and configuration pages link to it rather than restating the diagram, so future changes land in one place. Recovery semantics (StaleJobDetector, EnqueuedReconciler, what-survives-what) live there too
    reason: they're concept material, not setup steps.
  - category: Architecture
    chose: "Polling docs split into two pages: `setup/polling.md` (config + ops + troubleshooting, action-oriented) and `setup/polling-vs-webhooks.md` (decision matrix, scenario-oriented). Operators reaching the docs from \"I need to enable polling\" land on the first; operators reaching from \"should we use polling here?\" land on the second. Single combined page tested in draft and felt overloaded."
  - category: Implementation
    chose: "Polling page leads with a `!!! warning \"GitHub-only at runtime\"` admonition. Other docs (label-triggers, polling-vs-webhooks, agentsmith-yml) repeat the limitation in tables. Cost: redundancy. Benefit: an operator who skims a single page still sees the constraint"
    reason: |
      silent failure ("polling enabled, no claims") is the failure mode this guards against.
  - category: Architecture
    chose: `setup/README.md` reorganised into "Ticket Ingress" with Webhook + Polling as siblings, instead of the previous Webhook-only listing with Polling absent. Decision matrix lives in the comparison page; README only routes to it. Keeps README scan-friendly.
  - category: Scope
    chose: `architecture/index.md` got two table rows (Claim-then-Enqueue, Leader Election) in the Patterns section; `architecture/layers.md` got expanded service tables. Did not touch the layer diagram or the dependency-flow text
    reason: |
      those still reference the old Host/Dispatcher names (renamed to Cli/Server in p0069) and should be a separate cleanup phase. Mixing layer-rename in this phase would dilute the docs catch-up message.
  - category: Scope
    chose: "PR-comment webhook path (free-form TriggerInput, dialogue answers) explicitly called out in `webhooks.md` as separate from the lifecycle. Avoids confusion when an operator notices PR comments don't get `agent-smith:enqueued` labels."
  - category: Scope
    chose: "Single commit `docs: catch up to p0084 + p0095a/b/c + p0096`. Splitting per-page would create intermediate docs states where one page describes the claim flow and the next still says \"webhook → ExecutePipelineUseCase direct\". Docs are read coherently or not at all."
