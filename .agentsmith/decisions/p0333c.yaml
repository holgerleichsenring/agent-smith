# yaml-language-server: $schema=../decision.schema.json
phase: p0333c

decisions:
  - category: Implementation
    chose: "Skip generated files only for non-'secrets' patterns"
    over: "Exclude generated files from the static scan entirely"
    reason: |
      A wholesale exclusion would also stop secret detection in generated output, where a
      hardcoded credential is a genuine leak. Keeping Category=='secrets' patterns active on
      generated files removes the vuln-pattern noise without any secret-detection trade-off.
  - category: Implementation
    chose: "Detect generated code via the <auto-generated> self-declaration"
    over: "Path/name heuristics (*.g.cs, */ClientApiGenerator/*) or LLM classification"
    reason: |
      The <auto-generated> marker is the standard Roslyn analyzers themselves honor — the
      file declares its own provenance, so this is not a per-language parser or a guess. Path
      heuristics are framework-specific and brittle; an LLM call here would be overkill for a
      first-line string check.
  - category: Scope
    chose: "Tighten the over-broad llm-output-in-sql pattern in a separate skills-repo phase (p0334)"
    over: "Editing the pattern in this PR"
    reason: |
      Pattern definitions live in agent-smith-skills, not this repo. The pattern also fired on
      a hand-written MediatR handler (not generated), which only pattern-tightening fixes — but
      that is a skills-repo change. p0333 already suppresses both live cases via the read-set, so
      this is a precision follow-up, not a regression, and is tracked openly as p0334.
