# yaml-language-server: $schema=../decision.schema.json
phase: p0199-real-composition-pipeline-harness

decisions:
  - category: Architecture
    chose: |
      Tests use IPipelineExecutor + a thin PipelineRunner that mirrors
      ExecutePipelineUseCase's context seeding instead of resolving
      ExecutePipelineUseCase directly.
    over: |
      Resolving the use case and letting it run its catalog resolver +
      vocabulary load.
    reason: |
      ExecutePipelineUseCase calls ISkillsCatalogResolver.EnsureResolvedAsync,
      which dispatches to the configured source handler (default = network
      download). The harness asserts on handler chain behaviour, not on
      catalog plumbing. Bypassing the catalog round trip keeps the
      harness fast and deterministic while still exercising the real
      ServerCompositionBuilder DI graph.

  - category: Architecture
    chose: |
      ScriptedChatClientFactoryAdapter wraps the bare scripted client
      with FunctionInvokingChatClient for tool-bearing tasks (Primary /
      Scout / Planning), mirroring production's ChatClientFactory.
    reason: |
      Without the FunctionInvocation wrap, scripted FunctionCallContent
      responses never invoke the registered AITools. The agentic master
      then "writes" nothing — CodeChanges stays empty and downstream
      handlers (CommitAndPR, DeliverOutput) misread the signal as a
      master-with-no-work-to-do shape. The wrap is what makes tool-call
      SHAPE assertions reach the real FilesystemToolHost plumbing.

  - category: Testing
    chose: |
      Tool-call SHAPE assertions only (which tool, which args, in which
      order). No assertion on the master's literal prose.
    reason: |
      Tests that pin assistant text become change-detectors on every
      prompt iteration, get silenced, and rot. SHAPE is the behavioural
      contract that survives prompt tuning. Each preset test asserts
      "the master called write_file with path=X" / "run_command with
      command containing dotnet build" — never the assistant string.

  - category: TradeOff
    chose: |
      Stub IPromptCatalog, ISwaggerProvider, ISkillsCatalogPath in the
      harness as named boundary swaps alongside LLM / ticket / source.
    over: |
      Loading the real agent-smith-skills v3.x catalog into the test
      run.
    reason: |
      The skill catalog and swagger endpoints are external data sources,
      not handler logic. Loading them couples the test suite to a remote
      git ref + network and adds minutes per run. Production behaviour
      of those resolvers is unit-tested in AgentSmith.Tests; the harness
      assertion target is "does the preset's handler chain compose end
      to end against the production DI graph".

  - category: Scope
    chose: |
      Defer init-project and autonomous to a follow-up p0199b phase.
    reason: |
      Both presets demand a real AvailableRoles tree to make progress
      (BootstrapDiscover refuses to run without an output_schema=
      discovery skill; StructuredTriageStrategy refuses without any
      loaded skill). Seeding synthetic skills + scripting JSON discovery
      output gets brittle fast — the chain is LLM-coupled by design.
      Honest scope-slicing per spec: mark deferred with a named follow-
      up Skip fact rather than fake the green.

  - category: Scope
    chose: |
      Docker tier facts probe `docker ps` and skip with a verbatim
      "registry coverage NOT exercised" log line; the actual
      DockerSandbox spawn (with sandbox-agent image + Redis) is wired
      in p0199b.
    over: |
      Forcing every dev machine to build the sandbox-agent image and
      run a Redis container before the suite passes.
    reason: |
      The spec forbids silent skipping but also accepts that the docker
      tier is the only tier that proves the NU1301 / EAUTH falsifiability
      anchor. The skip-with-loud-log already satisfies the operator-must-
      see-this-isn't-exercised contract; the full docker spawn is a
      separate work order, not a precondition for the fast-tier coverage
      this phase ships.

  - category: TradeOff
    chose: |
      Per-preset scripted-response queue accounts for upstream
      consumers (e.g. LegalAnalysis seeds an extra "nda" text before
      the master's write_file).
    over: |
      Engineering a per-handler script dispatcher that knows which
      response belongs to which handler.
    reason: |
      Two presets need pre-master responses today (legal-analysis
      contract classifier). Encoding awareness of this in the test
      script is one line; building a dispatcher is over-engineering at
      N=1. Revisit when a third preset needs the same shape.

  - category: Implementation
    chose: |
      Anonymise the Csharp fixture's nuget.config source name from
      "fixture-private-feed" to "fixture-private-feed".
    reason: |
      Coding principles forbid customer fingerprints in opensource
      artefacts. The "old-" prefix was a leftover from the fixture
      author's local context; renamed in lockstep with the harness
      surface so future readers don't infer a customer association.

  # ---- p0199b decisions ----

  - category: Architecture
    chose: |
      Bind-mount the per-test bare git repo into the sandbox via a new
      ExtraBinds field on SandboxSpec, honored by
      DockerContainerSpecBuilder.
    over: |
      Running a `git daemon` on the host, or pushing the bare repo into a
      side-car container, or using a shared docker network with a public
      git server.
    reason: |
      The bare repo lives on the host; the sandbox needs to clone +
      push to it. A bind mount is the smallest mechanism that works and
      keeps the test self-contained (no extra processes, no DNS, no
      network exposure). ExtraBinds is gated on the field being non-null
      so production specs see no behaviour change.

  - category: Architecture
    chose: |
      Docker harness uses the production DockerSandboxFactory wrapped by
      ExtraBindsSandboxFactory — the wrapper decorates the spec with the
      per-test bind, delegates everything else.
    over: |
      Forking DockerSandboxFactory or extending it with test-only knobs.
    reason: |
      Wrapping leaves the production class untouched. The wrapper is one
      method and tracks spawned sandboxes so the test can assert
      container lifecycle. The decorator pattern keeps test concerns out
      of the production composition graph.

  - category: Architecture
    chose: |
      LocalGitSourceProvider returns ProviderType="GitHub" (not "Local")
      and exposes a file:// URL pointing at the in-sandbox bare repo path.
    reason: |
      ProviderType="Local" makes CheckoutSourceHandler short-circuit the
      in-sandbox `git clone` entirely. The docker tier's whole point is
      to exercise that clone path against a real container. Naming the
      provider as GitHub gates the real flow without dragging in actual
      GitHub.

  - category: Testing
    chose: |
      Replace IProjectAnalyzer + IProjectMapStore with no-op / stub
      implementations in the docker harness mode.
    over: |
      Scripting the analyzer's LLM round-trip via the ScriptedChatClient.
    reason: |
      The analyzer uses scout tools (read/list/grep) which pull from the
      same FIFO queue as the master's tool calls; scripting the analyzer
      JSON in the queue steals tool-call slots intended for the master.
      Stubbing IProjectAnalyzer is one class, deterministic, and keeps
      the FIFO ownership clean. The Redis-backed map store would also
      leak ProjectMap state across tests (cache key is content-hash, but
      identical fixture content hashes to the same key), so the NoOp
      store keeps every test isolated.

  - category: Gating
    chose: |
      Docker tier gated on AGENTSMITH_HARNESS_DOCKER=1 AND a `docker ps`
      probe. Either failing produces a verbatim loud-skip log.
    over: |
      A single env gate, or a single docker-probe gate.
    reason: |
      The env gate keeps CI from ever opting in by accident. The probe
      catches operators who set the env on a machine without docker —
      they get a clear "docker daemon not reachable" message instead of
      a confusing CreateContainerAsync exception.

  - category: Implementation
    chose: |
      Docker harness writes the fixture's nuget.config per-test (public
      or with-private-feed variant), instead of shipping a static
      nuget.config in the fixture tree.
    reason: |
      Two scenarios need different feed configurations (green path: only
      nuget.org; NU1301 path: include the unauthorised private feed). A
      per-test write keeps both reachable from a single fixture source
      tree, removes duplicate fixture trees, and makes the registry-empty
      assertion's setup self-evident in the test.

  # ---- p0199c decisions ----

  - category: Scope
    chose: |
      One [Fact] per preset is the bar for the docker-tier extension.
      Multi-variant coverage (failure paths, registries-empty per preset,
      FIXTURE_FAIL replays) stays out until a real bug surfaces.
    over: |
      Mirroring fix-bug's five-fact shape across every preset.
    reason: |
      The docker tier is expensive (minutes per test, real container spawn,
      real dotnet restore). Pinning multi-variant coverage now would lock
      in change-detector tests for happy paths that haven't yet surfaced
      a regression. The fast tier already covers handler-flow variations;
      docker proves the wiring end-to-end. New variants land when a
      production regression points at them.

  - category: Scope
    chose: |
      init-project and autonomous land as docker-tier loud Skip-with-reason
      facts pointing at the next follow-up phase.
    over: |
      Trying to fabricate AvailableRoles or mount an empty fake skill tree
      to push them green.
    reason: |
      Both presets need a real skill catalog: init-project for the
      bootstrap-* roles consumed by BootstrapDispatch, autonomous for the
      autonomous-* roles consumed by Triage. Faking the catalog produces
      a test that lies about coverage. The same gap is already documented
      on the fast tier (Skip in InitProjectTests / AutonomousTests); the
      docker-tier skip mirrors it so operators see one consistent gap
      story across both tiers.

  - category: Architecture
    chose: |
      A shared DockerPresetScripts helper feeds both the xUnit test
      classes and the standalone DockerPresetRunner.
    over: |
      Inline per-test LLM scripting, plus a parallel switch inside the
      runner.
    reason: |
      Drift between the runner script and the test script is the same
      class of bug ServerCompositionBuilder solves for production DI:
      two sources of truth that have to stay in lockstep. One helper
      makes the master tool-call sequence per preset the single editable
      thing; tests still script inline when a scenario needs a deliberate
      deviation (e.g. fix-bug's registries-empty case).

  - category: Testing
    chose: |
      A DockerPresetHarness instance per test class (gate, start, log,
      dispose) plus a DockerPresetRun record for the three per-test
      objects.
    over: |
      Duplicating FixBugDockerTests' private helper block in every new
      preset class.
    reason: |
      Eight new test classes with the same five-line scaffold each is
      worse than one focused helper. Coding principles cap class size at
      120 lines and method size at 20; centralising the scaffold keeps
      every preset class under 30 lines and one [Fact] long, which is
      what the bar (one green per preset) actually wants.

  - category: TradeOff
    chose: |
      api-security-scan keeps the ApiScannerStubs swap in docker mode
      too — Nuclei / Spectral / ZAP are NOT invoked for real.
    over: |
      Running the real scanners (each of which spawns its OWN docker
      container from the host).
    reason: |
      The real scanners need nested-docker access on every operator
      machine plus their own image cache, which is outside this harness's
      scope. The pipeline chain (LoadSwagger → scanner steps →
      AgenticMaster → DeliverFindings) still runs end-to-end through the
      production DockerSandbox; only the three scanner side-channels are
      stubbed. The trade-off is named in the test file so an operator
      who needs the real scanners knows what's NOT covered.

  - category: Scope
    chose: |
      api-security-scan docker tier lands as a loud Skip-with-reason,
      not a green [Fact]. Two stacked boundary conditions block it:
      TryCheckoutSource clones on the host (sandbox-only bare-repo URL
      unreachable) AND BootstrapCheck probes /work inside the sandbox
      (empty without an in-sandbox clone).
    over: |
      Hacking around either constraint (working-copy bind into the
      sandbox /work, or a conditional BootstrapGate skip on api-scan).
    reason: |
      Both workarounds change the preset's contract under test. A bind
      into the sandbox /work makes the harness diverge from the
      production wiring (where api-scan operates on a host-side clone).
      A conditional BootstrapGate skip is a production-side change that
      doesn't belong in a test harness phase. Honest scope-slicing per
      spec: name the gap, point at the follow-up.

  - category: Scope
    chose: |
      legal-analysis docker tier lands as a loud Skip-with-reason. The
      preset's BootstrapDocumentHandler shells out to `markitdown`
      inside the sandbox and the default dotnet/sdk:8.0 image (resolved
      by SandboxLanguageResolver from the csharp fixture) doesn't ship
      that binary.
    over: |
      Swapping markitdown for a host-side stub or extending the harness
      to use a custom toolchain image with markitdown pre-installed.
    reason: |
      A stub changes the preset's contract under test (markitdown's
      sandbox-side execution IS what makes the docker tier meaningful
      for legal-analysis). Bringing a custom image into the harness is
      a separate work order with its own publish + cache story. Same
      honest-skip pattern as init-project / autonomous: visible gap,
      named follow-up.

  # ---- p0199d decisions ----

  - category: Architecture
    chose: |
      Ship a checked-in synthetic SkillsCatalog under
      tests/AgentSmith.PipelineHarness/Fixtures/SkillsCatalog/skills/.
      SkillsBackend.Fixture opt-in routes ISkillsCatalogPath at that
      tree.
    over: |
      Downloading the real agent-smith-skills v3.5.0 catalog at test
      time, or scripting AvailableRoles directly into pipeline context.
    reason: |
      A live download couples every test run to GitHub and the catalog's
      release shape; direct context-set bypasses the loader contract and
      hides parse failures. Checked-in synthetic fixtures stay
      deterministic, offline, fast, and surface upstream loader-shape
      drift as a failing FixtureSkillsCatalogTests instead of a
      confusing "0 roles loaded" downstream.

  - category: Implementation
    chose: |
      Place autonomous-planner + autonomous-investigator under
      skills/coding/ alongside the bootstrap-* producers, even though
      the upstream agent-smith-skills catalog keeps them under
      skills/autonomous/.
    over: |
      Mirroring the upstream layout exactly.
    reason: |
      PipelinePresets.DefaultSkillsPaths maps both autonomous and init-
      project to skills/coding. The LoadSkillsHandler walks ONE
      directory (no recursion into siblings). Placing the autonomous
      role files where the preset actually reads is what gets them into
      AvailableRoles; mirroring upstream would have left Triage with
      zero matches and the autonomous chain dead in the water.

  - category: Implementation
    chose: |
      SkillRoundHandlerBase treats an empty SkillName as a deterministic
      no-op with an Ok result.
    over: |
      Leaving the existing "Role '' not found" Fail path in place.
    reason: |
      Autonomous + skill-manager presets place a parameterless
      SkillRoundCommand in the static chain as a marker. Triage's
      PhaseCommandExpander inserts the actual per-skill rounds AFTER
      the Triage step; the original marker still runs but carries no
      SkillName. The handler now no-ops with an informative message
      instead of crashing the pipeline on a leftover placeholder. Same
      shape would have unblocked autonomous in production even without
      the harness work.

  - category: Implementation
    chose: |
      HarnessTicketSeed plants a stub Ticket for Plan-producing presets
      (autonomous, skill-manager) so WriteRunResultHandler.WriteSingleAsync
      no longer NREs on Ticket.Title.
    over: |
      Patching WriteRunResultHandler to tolerate Plan-without-Ticket
      (e.g. expand IsInitMode to "Ticket is null").
    reason: |
      Autonomous runs are trigger-driven in production and always have
      a ticket; the harness needs the stub to mimic the production
      shape. Touching WriteRunResultHandler IsInitMode rewrites the
      init-vs-discussion mode boundary for a separate concern (no-ticket
      runs); out of p0199d's scope.

  - category: Architecture
    chose: |
      Docker tier restores the real IConnectionMultiplexer (REDIS_URL,
      default localhost:6379) after ReplaceProductionBoundaries swaps
      in the mock. Fast tier stays on the mock.
    over: |
      Splitting ReplaceRedisBackedServices into two methods, or
      conditionally skipping the mock when backend=Docker.
    reason: |
      The production DockerSandbox pushes step descriptors through
      SandboxRedisChannel; a mocked multiplexer NREs on the very first
      checkout. ValidateEnvironmentAsync already pre-checks host Redis
      reachability for docker mode, so the restore is safe-by-
      construction. Wraps the swap chain instead of forking it — easier
      to read than two parallel boundary swaps.

  # ---- p0199e (legal-analysis docker tier) ----

  - category: Architecture
    chose: |
      Reuse p0202's InstallDependencies handler for legal-analysis's
      markitdown install — insert CommandNames.InstallDependencies into
      PipelinePresets.LegalAnalysis between AcquireSource and
      BootstrapDocument.
    over: |
      A new per-preset MarkitdownInstall handler, or baking markitdown
      into a custom toolchain image with its own publish pipeline.
    reason: |
      The install-step contract (per-context ci.install_command,
      fail-aggregated, tolerant on empty) already exists and reads from
      RemoteContextDiscovery.InstallCommand at the same early-pipeline
      slot. legal-analysis needed the slot, not a parallel handler.
      The 3-5s pip cost per run is cheaper than maintaining an image-
      publish flow for a single Python dependency.

  - category: TradeOff
    chose: |
      Fixture context.yaml uses `stack.lang: python` so the sandbox
      image resolves to python:3.12-bookworm (pip + git already on
      PATH), with `ci.install_command: pip install markitdown==0.1.1`.
    over: |
      stack.lang: csharp with a custom image override, or a legal-
      specific image variant.
    reason: |
      The language-driven image table already covers python, and
      python:3.12-bookworm ships glibc + git so CheckoutSource +
      InstallDependencies work without overrides. The pinned version
      makes the fixture deterministic and breaks loudly if an upstream
      major moves; floating `markitdown` would silently re-resolve every
      run.

  - category: TradeOff
    chose: |
      LegalFixture/inbox/sample.txt — a plain-text NDA-shaped sample,
      not a real PDF or DOCX.
    over: |
      Real PDF/DOCX byte fixtures (as the original spec suggested).
    reason: |
      AcquireSourceHandler reads the source via File.ReadAllTextAsync
      and pushes it through the sandbox WriteFile step, which carries
      string Content only. UTF-8 replacement fallback mangles binary
      bytes (PDF / DOCX) before markitdown ever sees them. A real
      binary path needs a base64-or-bytes-shaped WriteFile step plus
      AcquireSource changes — its own follow-up. Format-coverage is
      markitdown's own concern; the orchestration assertion the spec
      asks for survives with a text sample.

  - category: Architecture
    chose: |
      Per-preset fixture routing extracted as DockerPresetLayout (preset
      -> ConfigYml + FixtureSourceDir + SourceFilePath). Both
      DockerPresetRunner (console) and DockerPresetHarness (xUnit)
      resolve through it.
    over: |
      Open-coding the legal-only fixture branch in two parallel call
      sites, or keeping a single hard-wired csharp fixture path.
    reason: |
      One source of truth for preset -> fixture layout keeps the
      console runner and the xUnit test path identical. Adding a
      future preset's docker fixture is a single dictionary entry,
      not two parallel switches.
