# yaml-language-server: $schema=../decision.schema.json
# p0128a: Schemas + Validators + Persistence (D4 slice 1/3)
phase: p0128a
decisions:
  - category: Architecture
    chose: "**Schemas live under `.agentsmith/schemas/` AND ship as embedded resources via csproj `Link`.** The done criterion required schemas under `.agentsmith/schemas/`; runtime loading needs them in the binary. A single source of truth (`.agentsmith/schemas/*.schema.json`) is referenced via `<EmbeddedResource Include=\"..\\..\\.agentsmith\\schemas\\*.json\" Link=\"Services\\Validation\\Schemas\\...\" />` so operators see the schemas in the repo, JsonSchemaLoader reads them from manifest resources, no duplication."
    reason: |
      alternatives: embed-only under `Services/Validation/Schemas/` (rejected: violates the spec's done criterion of files under `.agentsmith/schemas/`); dual-copy (rejected: drift risk and pointless duplication).
  - category: Tooling
    chose: "**JsonSchema.Net 7.0.4 (pinned EXACT) over Newtonsoft.Json.Schema.** The codebase uses System.Text.Json throughout (PlanParser, ObservationParser, PipelineCostTracker); pulling in Newtonsoft for schema validation alone would mean two JSON libraries in one process. JsonSchema.Net supports Draft 2020-12 and reads schemas as JsonDocument so they stay in the same in-memory representation as the data being validated. Pin EXACT matches the dependency-pinning discipline (M.E.AI, Anthropic.SDK, OllamaSharp)."
    reason: |
      alternatives: NJsonSchema (rejected: ties to Newtonsoft.Json); Newtonsoft.Json.Schema (rejected: same reason).
  - category: Implementation
    chose: "**`SchemaValidator` extracted as an internal helper instead of duplicating the parse-validate-format flow in each validator.** Plan/Diff/Bootstrap validators all do the same work"
    reason: |
      parse JSON, evaluate against the cached schema, format errors with JSON Pointer + rule description. Extracting the routine keeps each validator at ~10 lines (pure binding to a schema name + cached JsonSchema). ObservationOutputValidator is the exception: it wraps ObservationParser to preserve p0124's resilient extraction (truncated-mid-array recovery), so it does NOT use SchemaValidator — the JSON Schema observation.schema.json exists for documentation symmetry only. -- alternatives: copy-paste the routine into each validator (rejected: 3-way duplication); inheritance from a base class (rejected: violates "composition over inheritance" coding principle).
  - category: Implementation
    chose: "**`SkillOutputValidatorFactory` keyed by closed enum `SkillOutputSchema`, with a stringly-typed `ForSchema(string?)` entry point that throws on unknown values.** The closed enum (Plan/Diff/Bootstrap/Observation) mirrors NewFormatSkillValidator's already-closed string set. The factory's public surface accepts `string?` because RoleSkillDefinition.OutputSchema is a string field; null is the legacy SKILL.md path → NoOpSkillOutputValidator; unknown non-empty value is a config bug → throws ArgumentException."
    reason: |
      alternatives: stringly-typed switch all the way down (rejected: loses compile-time exhaustiveness); enum on the public surface (rejected: forces every caller to parse strings, which the factory exists to do).
  - category: Implementation
    chose: "**`Plan` record extended additively, not rewritten.** Adding new properties (`Scope`, `OpenQuestions`, `TestImpact`, `ConsumerImpact`, `Status`) with sensible defaults keeps every existing constructor call compatible"
    reason: |
      no consumer of `ContextKeys.Plan` / `ContextKeys.PlanArtifact` breaks. Same for the strict-mode parser: the existing `Parse(providerName, rawJson)` is preserved verbatim alongside the new `ParseStrict(output, validator)`. The new fields populate only on the strict path; legacy lax-parsed plans see `Scope.Empty`, empty open_questions, null impact strings, `Status=Complete`. -- alternatives: rename the existing `Parse` to `ParseLax` (rejected: cascading rename across every Plan-emitting handler); replace the existing `Plan` constructor with the new fields (rejected: every existing test fixture would fail).
  - category: Architecture
    chose: "**Strict-path step mapping: schema's `id`→`PlanStep.Order`, `action`→`Description`, `file`→`TargetFile`, `reason`→`ChangeType`.** PlanStep has 4 fields; the schema's step shape has 4 fields with different names. The strict path puts the LLM-emitted `reason` into `ChangeType` (today a free-form string defaulting to \"Modify\") so the rationale survives. The full structured form is preserved in `PlanJson` regardless"
    reason: |
      `PlanStep` is the legacy view. p0128b's strict-path migration is the natural moment to revisit whether `ChangeType` should split into a typed enum + a separate `Reason` field. -- alternatives: drop `reason` on the typed side (rejected: silently loses info); concatenate `action — reason` into `Description` (rejected: cluttered prose for the typed field's `description` consumers).
  - category: Architecture
    chose: "**`IRunArtifactStore` lives in `AgentSmith.Contracts.Persistence`, not `AgentSmith.Application.Services.Persistence`.** First draft put both contract and snapshot record in Application; build broke because Infrastructure (where `RedisRunArtifactStore` lives) doesn't reference Application. Moved both to Contracts to match the existing pattern (`IRedisJobQueue`, `IRedisClaimLock` etc.)."
    reason: |
      alternatives: add Application as a reference of Infrastructure (rejected: inverts the layered architecture); keep RedisRunArtifactStore in Application (rejected: Infrastructure is where Redis-coupled code conventionally lives).
  - category: Implementation
    chose: "**InMemoryRunArtifactStore is registered as the safe default in Application's DI; RedisRunArtifactStore overrides in Server's `AddRedis()`.** Mirrors the existing pattern: Application registers fallbacks (NoOpPipelineLifecycleCoordinator, NullTicketClaimService) that Server replaces when Redis services are available. CLI graphs (no Redis) get the in-memory store; Server graphs (Redis) get the Redis store. `TryAddSingleton` in Application means a Server-side `AddSingleton<IRunArtifactStore, RedisRunArtifactStore>()` wins last-binding."
    reason: |
      alternatives: gate at the CLI/Server level explicitly (rejected: duplicates the DI pattern that's already established for IRedisJobQueue and friends); single-impl with config switch (rejected: ties Infrastructure to a config-only branch).
  - category: TradeOff
    chose: "**Redis integration tests deferred (spec marked them `Trait('Category','Slow')`).** Per the spec, RedisRunArtifactStore tests need a Redis fixture; the InMemory store covers the same contract surface (write/read/promote/clear/TTL) as a unit test. The Redis impl is straightforward `StringSetAsync` + `KeyDeleteAsync` against the same key shape as RedisJobQueue/RedisClaimLock"
    reason: |
      covered indirectly by the existing Server DI lifetime regression-guards. Real Redis fixture comes in a follow-up phase if/when an end-to-end smoke is needed. -- alternatives: write the integration tests now with Testcontainers (rejected: spec already deferred; adds a dependency on Docker for `dotnet test` on the main project, mirroring the Sandbox.Agent.Tests pattern but without the corresponding need); skip RedisRunArtifactStore entirely (rejected: production storage path needs to exist for the Server graph).
  - category: TradeOff
    chose: "**`PlanParser.ParseStrict` takes `PlanOutputValidator` as a parameter rather than the static class becoming instance-based.** The existing `PlanParser` is static; consumers call `PlanParser.Parse(provider, json)` from many sites. Making it instance-based + DI-resolved cascades into ~5 call sites. Passing the validator as a parameter for the strict path keeps the static class shape and lets consumers compose the call themselves. -- alternatives: convert PlanParser to an instance class (rejected: scope creep"
    reason: |
      the parser's state is purely the methods); make the validator a static dependency (rejected: violates the DI rule for services).
  - category: Implementation
    chose: "**`SkillOutputValidatorFactory` exposes a test-only `internal` ctor that maps every schema to the same fallback validator.** Avoids forcing every test fixture that touches `SkillCallRuntime` to construct the four real validators (PlanOutputValidator, DiffOutputValidator, BootstrapOutputValidator, ObservationOutputValidator) just to satisfy the runtime's new constructor signature. The internal ctor takes (ISkillOutputValidator @default, NoOpSkillOutputValidator noOp); production code uses the public ctor exclusively."
    reason: |
      alternatives: build all four real validators in the test helper (rejected: noisy test setup); thread an `ISkillOutputValidator` through SkillCallRuntime instead of the factory (rejected: the runtime has to dispatch by schema-id at call time, not at construction).
