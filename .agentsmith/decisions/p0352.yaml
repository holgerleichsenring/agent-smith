# yaml-language-server: $schema=../decision.schema.json
phase: p0352
decisions:
  - key: "Scope was already half-shipped by p0349: the whole import machinery (IConfigDocumentStore.Import, ConfigImportRepository, ConfigDocumentAssembler.Decompose, RawConfigYaml, the CLI `config import/export` verbs) already exists and is live-verified against SQL Server (40 entities across 20 types, non-empty guard, --force version bump + history, export round-trip). Only the UI path was missing. So this phase is purely additive: an HTTP endpoint + a frontend button, reusing the existing, tested import path."
  - key: "The endpoint does NOT put Import on IConfigStore. IConfigStore has multiple implementations (FileConfigStore, DbConfigStore) + test doubles, and import is a server-DB-only operation (the file store IS its own source). POST /api/config/import depends directly on IConfigDocumentStore.Import (already present) + a new ConfigDocumentAssembler, then calls IConfigStore.Load() to refresh DbConfigStore's cached catalog. Zero churn to existing IConfigStore implementations."
  - key: "persistence is excluded from import in BOTH the endpoint and the CLI ConfigCommand.ImportAsync (a shared .Where(d => d.Type != ConfigDocTypes.Persistence)). persistence is bootstrap-only — the server reads it from BootstrapConfig (file/env) before the DB exists, so importing it writes a dead row into the DB it describes. ConfigDocTypes was made public for the cross-assembly reference (it is the canonical type-name registry stored in config_entity.type)."
  - key: "Guard semantics mirror the CLI: empty store imports freely; a non-empty store returns 409 (checked via IConfigDocumentStore.IsEmpty before Import) so the frontend can confirm-overwrite and retry with ?force=true. IConfigDocumentStore.Import still guards internally (defense in depth) and applies SecretValueGuard. The frontend surfaces the 409 as a ConfigStoreNotEmptyError → window.confirm → force retry → catalog reload."
  - key: "Verification reuses the p0349 ConfigStudioApiSmokeTests self-host harness (real ConfigStudioEndpoints over real DbConfigStore + HttpClient on loopback). Added ConfigStudioApi_Import_EmptyThenGuardThenForce and made the harness DB provider env-switchable (AGENTSMITH_TEST_DB_CONNSTR → pre-migrated SQL Server, else per-test SQLite). Ran green on both SQLite (CI) and a real SQL Server DB (17 entities, persistence rows=0, 409 then force→200, version bumped to 2)."
