# yaml-language-server: $schema=../decision.schema.json
# p0095b: Multi-Platform Status Transitioners
phase: p0095b
decisions:
  - category: Architecture
    chose: GitLab uses PUT /issues/{iid} with add_labels/remove_labels rather than full-labels replacement. Targets only the lifecycle label, leaves unrelated labels untouched. No ETag on GitLab issues
    reason: |
      concurrency is last-write-wins at the platform level; TicketClaimService's SETNX claim-lock carries the primary race guard. Full-label PUT was considered and rejected — concurrent edits to non-lifecycle labels would be clobbered.
  - category: Architecture
    chose: AzureDevOps uses JSON Patch on /workitems/{id} with an explicit `test /rev` operation before the `add /fields/System.Tags`
    reason: |
      AzDO returns 412 (PreconditionFailed) on rev mismatch. System.Tags is a semicolon-separated list; we read-filter-add-serialize. 409 Conflict treated as PreconditionFailed too (AzDO occasionally returns that for concurrent modifications).
  - category: Architecture
    chose: "Jira label-mode uses an *additional* SETNX label-lock (`agentsmith:jira-label-lock:{ticketId}`, 10s TTL) on top of the global claim-lock that TicketClaimService already holds. Reason: Jira's PUT fields.labels is not atomic"
    reason: |
      two concurrent PUTs from the same pod could both succeed and clobber each other within the claim-lock's validity window if the window straddled a GET/PUT pair. The label-lock narrows the atomic critical section specifically to the label mutation. p0095a's single-lock pattern was considered and rejected for Jira specifically.
  - category: Architecture
    chose: JiraWorkflowCatalog ships in p0095b as a skeleton
    reason: |
      always returns Label-mode regardless of project. Native probing (GET /rest/api/3/project/{key}/statuses) waits for p0095c when LifecycleConfig introduces per-project status name customisation; probing before that would force native-status mapping into the p0095b scope. Structure is in place (ConcurrentDictionary cache, `SetModeForTest` internals) so p0095c only flips the probe logic.
  - category: Scope
    chose: WebhookRequestProcessor's `UsesClaimService(platform)` GitHub-only check was removed. All structured webhooks with both ProjectName and Platform set now go through ITicketClaimService
    reason: |
      the dead fire-and-forget `ExecuteStructuredAsync` method was deleted. Pre-p0095a behaviour is no longer reachable; the legacy TriggerInput path (PR comments) stays untouched as documented in p0095a.
  - category: Scope
    chose: ITicketProvider.ListByStatusAsync moved from p0095b to p0095c. It's a reconciler dependency, not a transitioner dependency
    reason: |
      keeping it with the reconciler (p0095c) makes the p0095b YAML redundant with the multi-platform transitioner focus and gives p0095c the full "recovery" surface area in one coherent phase.
