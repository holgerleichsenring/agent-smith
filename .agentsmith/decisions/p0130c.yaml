# yaml-language-server: $schema=../decision.schema.json
# p0130c: InitProject Bootstrap-step migration to SkillRound dispatch (D6 follow-up)
phase: p0130c
decisions:
  - category: Architecture
    chose: "**Deterministic BootstrapDispatch instead of full Triage for InitProject.** The catalog is supposed to ship exactly one bootstrap skill per `project_language` enum value (csharp / node / python / generic). An LLM-driven Triage would add cost and latency for a decision with no judgment component. BootstrapDispatch reuses the same `ActivationSkillFilter` that StructuredTriage uses, so routing semantics stay consistent. Fail-loud on 0 / >1 matches surfaces catalog misconfiguration immediately."
    reason: |
      alternatives: full Triage (rejected: LLM overhead with no decision-value); hardcoded language → skill table in the handler (rejected: bypasses the activates_when contract that lets operators add a 5th language without a code change).
  - category: Architecture
    chose: "**ProjectLanguageMapper as a static service consumed by a separate `PublishProjectLanguageHandler`, not folded into AnalyzeProjectHandler.** AnalyzeProjectHandler produces ProjectMap (a Domain entity); PublishProjectLanguageHandler translates `ProjectMap.PrimaryLanguage` into a typed concept publication. Mixing the two would reintroduce the pattern p0125c explicitly chose against"
    reason: |
      that publishing handlers and analyzing handlers are different concerns. -- alternatives: extend AnalyzeProjectHandler to publish project_language directly (rejected: 6 presets call AnalyzeCode and would all start publishing project_language; today only init-project consumes it, and the bootstrap skills' tightened activates_when assumes publication is init-project-scoped); compute project_language inline in BootstrapDispatch (rejected: bypasses IRunStateConcepts so other concept-aware filters can't see the value).
  - category: Implementation
    chose: "**`project_language` synonym table is fixed code, not config.** 10 entries covering csharp/c#/.net/dotnet, typescript/javascript/node/node.js/nodejs/ts/js, python/py"
    reason: |
      everything else falls to `generic`. Case-insensitive lookup; whitespace-trimmed input. External config (YAML in skills repo) was rejected — premature config-ification for a stable internal translation. A 5th language is a deliberate vocabulary change, not a config knob.
  - category: Implementation
    chose: "**Bootstrap skills' `activates_when` tightens from `project_language = \"X\"` to `pipeline_name = \"init-project\" AND project_language = \"X\"`.** The four bootstrap skills ship under `skills/coding/` (the same directory fix-bug / add-feature load), and `project_language` is a stable per-project concept. Without the conjunction, a Node project running fix-bug would see `node-bootstrap` appear in the ActivationSkillFilter output"
    reason: |
      wrong, that skill should only ever run during init-project. -- alternatives: keep narrow activates_when + rely on triage prompt to filter (rejected: relies on LLM judgment for what is a structural constraint).
  - category: Implementation
    chose: "**`init-project` added to `pipeline_name` enum cross-repo (agent-smith-skills 2.5.0 → 2.6.0).** `PipelineNameInitializerHandler.SetEnum(\"pipeline_name\", \"init-project\")` now succeeds instead of throwing the p0125c fence. The fence stays in place for `skill-manager` / `autonomous` / `fix-no-test` / `add-feature`"
    reason: |
      those presets still trigger the ArgumentException at the head of every chain until they have working skill sets to justify being unfenced.
  - category: Implementation
    chose: "**`PipelineCommand.SkillRound` resolved via `PipelinePresets.GetSkillRoundCommandName(pipelineName)`.** Even though init-project resolves to `SkillRoundCommand` (the default), going through the preset-aware resolver keeps BootstrapDispatch consistent with how `StructuredTriageStrategy` emits SkillRound commands"
    reason: |
      and tracks any future per-preset divergence in one place. -- alternatives: hardcode `CommandNames.SkillRound` (rejected: parallel knowledge that drifts with future security/api preset additions).
  - category: TradeOff
    chose: "**InitProject preset gains `WriteRunResult` step that wasn't there before.** Old preset was 4 steps (Init / CheckoutSource / BootstrapProject / InitCommit). New preset is 8 steps including WriteRunResult"
    reason: |
      operator now sees a `runs/<run-id>/result.md` for init-project runs. p0128a wired bootstrap-output rendering into WriteRunResultHandler; this slice lights it up. Cost: an extra file write per init-project run; benefit: same observability story as every other pipeline.
  - category: TradeOff
    chose: "**PipelineType for init-project stays `PipelineType.Discussion`.** Conceptually init-project is now closer to Hierarchical (deterministic dispatch + single producer skill), but changing the type drives `TriageStrategySelector` routing"
    reason: |
      and InitProject doesn't have a Triage step in the new preset, so the type only affects classification labels. Changing it pre-emptively is a triage-strategy decision that belongs in p0131c-pre. -- alternatives: introduce a new PipelineType.Linear (rejected: scope creep for one preset's classification); flip to Structured now (rejected: makes the type definition lie about what the executor actually does).
  - category: TradeOff
    chose: "**`autonomous` and `skill-manager` remain fenced (not in pipeline_name enum).** Both have unresolved real issues"
    reason: |
      autonomous has no skills with `activates_when` matching it; skill-manager has its own DiscoverSkills/Evaluate/Install handler chain that doesn't go through the SkillRound mechanism. Lifting their fence would be a parallel work-stream; this slice keeps them at the p0125c posture so the symptom (`SetEnum` throws when those presets run) stays visible to operators rather than silently allowing pipelines that don't actually do anything productive.
