# yaml-language-server: $schema=../decision.schema.json
# p0138: Triage prompt rewrite + coding-catalog gap fix
phase: p0138
decisions:
  - category: Architecture
    chose: "**Root cause is a stale prompt, not a missing validator branch.** `triage-structured-system.md` referenced `activation.positive`, `role_assignment[role].positive/negative`, and `roles_supported`"
    reason: |
      three SkillMdFrontmatter fields p0131a removed. The LLM had no defined key-source for rationale tokens and imitated the example, citing invented keys. Tightening the validator without fixing the prompt would produce 'failed harder' — the prompt itself must encode the post-p0131a constraints. -- alternatives: relax TriageOutputValidator to warn on vocab violations (rejected: the role-slot constraint is semantic, fail-loud is correct; vocab-as-contract is worth keeping); add a stricter retry message (rejected: retries should converge, not contradict the first attempt — the first message should already say the right thing).
  - category: Architecture
    chose: "**Coding catalog gets 4 planner skills + 1 filter skill"
    reason: |
      consistency with the existing investigator/judge pairs trumps an architect-planner-covers-backend exception.** Every domain category (architect, backend-developer, frontend-developer, dba, devops, security-reviewer, tester) ends up with a {investigator, judge, planner} triple plus the verifier family. An exception 'architect-planner handles backend' is inferrable from descriptions but not from the catalog's structural shape — the LLM (and future readers) are more likely to pick the right Lead when the naming convention is fully regular. -- alternatives: 3 planners + architect-planner description tweak (rejected: structural irregularity bites the next-largest reader); collapse all planners into one generic planner (rejected: existing planners have non-overlapping output shapes — architect emits 'pattern + reason + files', dba emits 'schema + migration + integrity', security-reviewer emits 'threat + control + verification').
  - category: Implementation
    chose: "**Catalog version 2.0.1 → 2.1.0, not 2.7.0 → 2.8.0 as the spec said.** The spec's 2.7.0 figure was carried over from a stale read of context.yaml; the actual catalog had been re-versioned through release-please at v2.0.0 (BREAKING change for the SKILL.md format flip) + v2.0.1 (validator fixes). 2.0.1 → 2.1.0 is the conventional minor bump for additive features. release-please will materialise the bump automatically from the `feat:` commit on merge to skills-repo main; manual CHANGELOG.md / version.txt edits are intentionally not in this PR."
    reason: |
      alternatives: 2.0.1 → 2.0.2 patch bump (rejected: 5 new skills are features, not patches); 2.0.1 → 3.0.0 major (rejected: additions are backwards-compatible, agent-smith pin stays in the >=2.0.0 range).
  - category: Implementation
    chose: "**Description field follows the addyosmani/agent-skills convention of doubling as an activation hint.** Their format is minimal (`name` + `description`) with descriptions starting 'Use when …' as routing guidance. We keep our richer frontmatter (role + output_schema + activates_when are load-bearing for the pipeline), but every new planner's description opens with 'Lead when X. Analyst/reviewer when Y.' so the LLM has the role-selection heuristic at a glance instead of inferring from the body. Filter opens with 'Use in Final phase to …'. Existing 3 planners stay unchanged this phase."
    reason: |
      alternatives: rewrite all existing planner descriptions in lockstep (rejected: scope creep + churn on already-working skills); skip the convention (rejected: the addyosmani comparison surfaced it as a concrete cheap improvement).
  - category: Implementation
    chose: "**`BuildTokens` signature changes from `(TriageInput)` to `(TriageInput, ConceptVocabulary)`.** The vocabulary loads in `ProduceAsync` (line 50-53) and gets passed to `CallAndValidateAsync` for validator use, but pre-p0138 was never injected into the prompt template"
    reason: |
      the user prompt couldn't show the LLM the legal key set. Adding a parameter to `BuildTokens` (rather than threading vocabulary into `TriageInput`) keeps `TriageInput` as the ticket-and-skills shape and uses the parameter list to surface 'BuildTokens depends on both input + vocabulary'. -- alternatives: add `Vocabulary` field to `TriageInput` (rejected: bloats the record with a value already in scope at the call site); render vocabulary inside `RenderSkills` (rejected: conflates two distinct content blocks).
  - category: TradeOff
    chose: "**Catalog smoke test deferred"
    reason: |
      architecture + canonical-example tests cover the failure modes that bit us.** The spec listed `YamlSkillLoaderCatalogTests.CodingCatalog_v2_8_0_LoadsAllPlannersAndFilter` which would load real v2.1.0 SKILL.md files via fixture. The two tests landed (`TriagePromptArchitectureTests`×6 + `TriagePromptCanonicalExampleTests`×1) cover the higher-value failure modes (stale field references reintroduced, role-slot mapping documentation lost, canonical example violates its own constraints). The catalog-load test would just re-verify YamlSkillLoader works on the standard format — already covered by existing `YamlSkillLoaderTests`. Logged as a deferred-to-followup item in the phase's done section. -- alternatives: write the catalog test inline (rejected: time-cost > value-add given the existing coverage); skip both new test classes (rejected: the architecture test is the only regression-guard against the bug class that just bit us).
  - category: Architecture
    chose: "**`SandboxSpec` gains an optional `InitialSourcePath`"
    reason: |
      host-filesystem dir for InProcessSandbox to use as `/work` instead of creating a fresh empty temp dir.** Reason: api-security-scan's `TryCheckoutSourceHandler` clones host-side via IHostSourceCloner and publishes the path on `ContextKeys.SourcePath`. Pre-fix, the InProcessSandboxFactory ignored this and minted a separate empty temp dir as `/work` — handlers reading `/work/.agentsmith/context.yaml` reported `False/False` even though the cloned source contained the bootstrap files. The field is honored only by InProcessSandboxFactory; container-based factories (Docker/Kubernetes) ignore it because they have their own in-sandbox source-loading mechanism (CheckoutSourceHandler runs `git clone` directly into the sandbox volume). -- alternatives: TryCheckoutSourceHandler copies/symlinks into sandbox /work after sandbox creation (rejected: requires ISandbox to expose its workDir or a recursive file-copy via ISandboxFileWriter — both invasive); recreate sandbox after TryCheckoutSource (rejected: breaks `await using` lifetime + double-creation cost).
  - category: Architecture
    chose: "**Sandbox creation in `PipelineExecutor.RunAsync` is now lazy"
    reason: |
      built only when the first sandbox-requiring command in a batch comes up, instead of upfront at loop entry.** Reason: TryCheckoutSourceHandler is a sandbox-free, host-side command that must run BEFORE the sandbox is built (it publishes the source path the sandbox needs). Pre-fix's upfront construction made the SourcePath read in `TryCreateSandboxAsync` always see an empty context. Lazy-init defers construction past TryCheckoutSource; the sandbox is built at the first sandbox-requiring command's turn, with the published path already in scope. -- alternatives: split RunAsync into pre-sandbox + post-sandbox phases (rejected: more code surface for the same effect); Lazy<Task<ISandbox>> wrapper (rejected: adds indirection that buys nothing).
  - category: Implementation
    chose: "**`TryCheckoutSource` removed from `SandboxRequiringCommands` HashSet.** It was a latent miscategorisation"
    reason: |
      TryCheckoutSourceHandler's ctor takes no `ISandbox` and writes only to host-filesystem via IHostSourceCloner. Listing it forced upfront sandbox creation even though the handler never used it. Removal is semantically correct AND load-bearing for the lazy-init flow (sandbox creation now defers past TryCheckoutSource). -- alternatives: keep it in the list and special-case (rejected: list = "uses sandbox at runtime", special case is a lie about that contract).
  - category: Implementation
    chose: "**`BootstrapCheck` added to `SandboxRequiringCommands` HashSet.** Pre-existing latent dependency that was invisible under upfront sandbox creation"
    reason: |
      BootstrapCheckHandler always saw a ready ISandbox because some later command in the same preset triggered the upfront creation. With lazy init, an early BootstrapCheck would run before any later sandbox-requiring command and trip the handler's `requires an active sandbox` guard. Adding it to the trigger list closes the gap. -- alternatives: have BootstrapCheck silently no-op when sandbox is absent (rejected: returning False/False on missing sandbox would mask config errors); leave it implicit (rejected: the trigger list is the contract, implicit deps will rot the next time someone reorders a preset).
