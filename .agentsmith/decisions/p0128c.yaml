# yaml-language-server: $schema=../decision.schema.json
# p0128c: opt-in data-flow gating (D4 slice 3/3)
phase: p0128c
decisions:
  - category: Architecture
    chose: "**`PipelineContext` got an opt-in `IPipelineContextReadGate` hook instead of being subclassed.** PipelineContext is `sealed` and consumed by every handler. A wrapper subclass would force a per-handler choice (which class to take); a separate `GatedPipelineContext` with its own surface would mean every handler checks both types. The hook stays minimal: PipelineExecutor `using (context.AttachReadGate(gate)) { ... }` scopes the gate around `SafeExecuteAsync`. Internal executor reads (e.g. ResolvedPipeline lookup before the gate attaches) bypass the gate naturally. -- alternatives: unseal PipelineContext (rejected: breaks cleanliness"
    reason: |
      the type's intent is to be a flat state bag, not a polymorphism axis); thread a separate IPipelineContextReader through every handler (rejected: 100+ touchpoint refactor for a feature that defaults to warning-only).
  - category: Architecture
    chose: "**`DataFlowReadGate` only fires on `Get`/`TryGet`. `Set` is unmodified.** The producer writes freely; the consumer's read is the gate. This matches the spec's \"wrapper rejects reads of keys not declared by the active phase's incoming edges\" and keeps the write path entirely uninstrumented. -- alternatives: gate writes too (rejected: producers can write whatever they like"
    reason: |
      the contract is what consumers can READ); gate only Get and not TryGet (rejected: TryGet is the more common pattern in handlers, would create huge gap).
  - category: Architecture
    chose: "**`PermissivePhaseDataFlow` baseline ships ONE wildcard edge `(\"*\", \"*\", [\"*\"])`.** Spec said \"every existing PipelineContext.Get<T>/TryGet<T> call site that reads a key produced by an upstream phase either gets covered by the declared edges or refactors\". With 165 reads across the Application layer, a strict per-key declaration is days of work and high-regression-risk; the wildcard baseline keeps `enforce=true` viable from day one without breaking anything, and follow-up phases tighten edges per preset as the data-flow story crystalizes. The gate infrastructure is fully load-bearing (DataFlowViolationException, warn vs throw, JSON Pointer errors); only the per-preset edge declarations are placeholder. -- alternatives: declare every edge precisely now (rejected: scope creep"
    reason: |
      would have doubled this phase's size; spec already allows enforce=false default to defer this); ship without preset declarations and rely on resolver-fallback bypass (rejected: violates done criterion "every preset has a matching IPhaseDataFlow").
  - category: Implementation
    chose: "**Wildcards: `FromPhaseStep == \"*\"` matches any producer; `ToPhaseStep == \"*\"` matches any consumer; `ContextKeys` containing `\"*\"` matches any key.** The three wildcard axes compose, so an edge `(\"*\", \"*\", [\"*\"])` is fully open. `*` is intentionally not a regex"
    reason: |
      operators read these declarations and "any" is the only level of indirection they need. -- alternatives: regex/glob on key names (rejected: hard to read and easy to over-match); enum of pipeline lifecycle phases (rejected: doesn't match the dynamic command-name reality where same handler runs in multiple presets).
  - category: Implementation
    chose: "**`PipelineExecutor` resolves the data-flow lazily"
    reason: |
      `IPhaseDataFlowResolver.Resolve(presetName)` returns null when no declaration registered, and the gate is simply not attached.** Tests can construct PipelineExecutor with an empty resolver (`new PhaseDataFlowResolver(Array.Empty<IPhaseDataFlow>())`) and the gate stays dormant — every existing test passes unchanged. -- alternatives: throw on missing declaration (rejected: forces every test fixture to register all 10 flows); attach a "deny-all" gate (rejected: same problem).
  - category: Implementation
    chose: "**Gate scope wraps SafeExecuteAsync only"
    reason: |
      TrackCommand and post-step bookkeeping read freely.** `context.TrackCommand` reads `ExecutionTrail` and `ActiveSkill`; those are framework-internal keys, not handler-declared inputs. Wrapping only the handler's ExecuteAsync ensures the gate sees handler reads, not infrastructure reads. -- alternatives: gate the entire step including TrackCommand (rejected: would require declaring ExecutionTrail/ActiveSkill on every preset's edges); gate only the inner handler call (rejected: same as chosen approach but spelled differently).
  - category: TradeOff
    chose: "**`enforce: false` is the production-config default.** Switching to `true` requires the operator to verify the warning log is empty for their pipeline mix. Until preset edges tighten in follow-up phases, the warning-only mode is the only viable default"
    reason: |
      a hard `enforce=true` on permissive `("*","*","*")` flows would be silent (everything matches the wildcard). The two states (warn-only, strict) both work right now; the value of strict only kicks in once edges tighten. -- alternatives: default to true (rejected: zero benefit until edges are real); ship without the config knob (rejected: operators need a way to opt-in once they've cleaned up the warnings).
  - category: TradeOff
    chose: "**No GatedPipelineContext class.** Spec described a wrapper class. Implementation made it a hook on PipelineContext itself. Tests now exercise PipelineContext.AttachReadGate (in `PipelineContextReadGateTests`) plus DataFlowReadGate (in `DataFlowReadGateTests`); the same coverage the spec's wrapper would have had, but spread across two types whose responsibilities are clearly separate (PipelineContext: state bag + gate hook; DataFlowReadGate: enforcement policy)."
    reason: |
      alternatives: implement spec verbatim (rejected: would require unsealing PipelineContext or a parallel interface that handlers also have to take).
