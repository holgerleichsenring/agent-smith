# yaml-language-server: $schema=../decision.schema.json
# p0111c: Triage Rewrite & Phase-Based Pipeline
phase: p0111c
decisions:
  - category: Architecture
    chose: "**Strategy pattern for triage, not in-place rewrite.** `ITriageStrategy` with `LegacyTriageStrategy` (Discussion pipelines: legal/mad/init-project/skill-manager/autonomous) and `StructuredTriageStrategy` (fix-bug/add-feature/security-scan/api-scan). `TriageHandler` becomes a thin adapter that picks the strategy via `ITriageStrategySelector` based on `PipelineType`. Reason: the spec said \"rewrite TriageHandler internals\" but the legacy LLM-based discussion path is a load-bearing fallback for discussion pipelines that don't have skills migrated to the new frontmatter, so a clean strategy split is more honest than a single body with `if (pipelineType == Discussion) ...` branching. Selector is the single dispatch point so the existing `TriageCommand` wiring stayed untouched."
  - category: Architecture
    chose: "**Model B for phase tagging"
    reason: |
      Triage emits Plan-phase commands inline; new `RunReviewPhaseCommand` and `RunFinalPhaseCommand` preset steps emit subsequent phases.** Considered Model A (PipelineExecutor iterates phases driven by preset metadata) — rejected because it would require deep changes to the executor's flat-command linked-list model, plus a new preset shape. Model B keeps the executor untouched and matches today's `OkAndContinueWith`/`InsertNext` pattern. `TriageOutput` is stored once in pipeline context; both `StructuredTriageStrategy` and `PhaseAdvanceHandler` re-read it. Phase boundaries are conveyed via `ContextKeys.CurrentPhase`, set by each phase-advance step before its commands fire. AgenticExecute remains a regular preset step between Plan and Review for `fix-bug` / `add-feature`.
  - category: Architecture
    chose: "**One `PhaseAdvanceContext` + one `PhaseAdvanceHandler` for both `RunReviewPhase` and `RunFinalPhase`.** The two builders (`RunReviewPhaseContextBuilder`, `RunFinalPhaseContextBuilder`) bake the phase + round into the context; the handler stays generic. Avoided two near-identical handler classes; trade-off is that the context is shared across two command names which violates the conventional \"one context type per command\" pattern, but it cuts the new-handler count without losing clarity."
  - category: Architecture
    chose: "**Deleted: `SkillGraphBuilder`, `DeterministicTriageBuilder`, `ISkillGraphBuilder`, `SkillGraph`, `ExecutionStage`, `SecurityTriageHandler`, `ApiSecurityTriageHandler`, `ApiSecurityTriagePromptBuilder`, `ApiSecuritySkillFilter`, `TriageHandlerBase`, `SecurityTriageContext`, `ApiSecurityTriageContext`.** Reason: with phase-based triage and a unified `TriageHandler`, the deterministic-graph machinery and per-pipeline triage handlers have no consumers. Pre-triage pipeline-specific signal detection that lived in `SecurityTriageHandler` is gone"
    reason: |
      the new flow relies on the unified triage prompt (with `ProjectMapExcerpt` + `SkillIndexEntry` list) to do per-pipeline-type triage via the LLM. If the unified prompt proves insufficient, signal-detection helpers can be reintroduced as `ITriageInputDecorator` services in a follow-up, but adding them speculatively now would carry the legacy assumption forward.
  - category: Architecture
    chose: "**`OrchestrationRole`, `SkillOrchestration`, `SkillOrchestrationParser` retained at the type level, no longer populated from `agentsmith.md`.** The parser is deleted. `SkillMdParser` no longer reads the `## orchestration` section. The `RoleSkillDefinition.Orchestration` field remains nullable and is now always null at runtime. `SkillRoundHandlerBase.ExecuteStructuredRoundAsync` (with its gate-branch) and `GateRetryCoordinator` / `GateOutputHandler` / `UpstreamContextBuilder` / `StructuredOutputInstructionBuilder` are kept alive as internal components per user directive. Trade-off: dead code paths in `SkillRoundHandlerBase` (only reachable if `role.Orchestration != null`, which can no longer happen). Acceptable in this phase; full removal is a follow-up cleanup if no consumer reappears."
  - category: Implementation
    chose: "**Per-pipeline command-name lookup in `PipelinePresets.GetSkillRoundCommandName(pipelineName)`.** `security-scan` → `SecuritySkillRoundCommand`, `api-security-scan` → `ApiSecuritySkillRoundCommand`, default → `SkillRoundCommand`. `PhaseCommandExpander.ExpandPhase` takes the resolved command name as a parameter. Reason: `SecuritySkillRoundHandler` and `ApiSkillRoundHandler` still have pipeline-specific domain-section building (project brief, findings summary), which the new unified `TriageHandler` doesn't replicate. Routing to those handlers via the existing command names preserves their value while the triage step itself is unified."
  - category: Implementation
    chose: "**`{{plan}}` template substitution lives in `SkillPromptBuilder`, not `ISkillBodyResolver`.** The body resolver (p0111a) caches per `(skill, role)` and stays focused on `## as_<role>` selection + `{{ref:<id>}}` inlining. `{{plan}}` substitution depends on per-run `PlanArtifact`, so caching it would be wrong. Substitution happens after body resolution in `SkillPromptBuilder.BuildRolePrompt`. Reviewers without a same-run lead see `(no plan provided)` rather than an empty string"
    reason: explicit signal beats silent fallback.
  - category: Implementation
    chose: "**Confidence threshold downgrade in `SkillRoundHandlerBase.ApplyConfidenceThreshold` (private static helper).** Applied to all observation-emitting paths after `ObservationParser.ParseWithoutIds` and before `SkillRoundBuffer` creation. Threshold = 70; observations with `Blocking=true && Confidence<70` get re-emitted with `Blocking=false` and a structured log entry. The downgrade is in `SkillRoundHandlerBase` not in `ObservationParser` so the parsed observations stay intact and the threshold applies uniformly to all pipeline types."
  - category: Implementation
    chose: "**`PlanArtifact` stored as soon as the Plan-phase Lead's observations are parsed (post-confidence-threshold), not after the Plan phase ends.** Trade-off: if the Lead later runs in another phase the artifact gets overwritten, but the Lead role is bound to one phase per run, so this is fine. Alternative would have been a dedicated `BuildPlanArtifact` step at the Plan→Review boundary; the inline approach saves a preset step."
  - category: TradeOff
    chose: "**`ConceptVocabulary` accessed via `ContextKeys.ConceptVocabulary` rather than DI-injected.** `YamlSkillLoader` already loads the vocabulary at boot but does not expose it as a registered service. Adding a `IConceptVocabularyAccessor` would be cleaner but requires plumbing through Infrastructure→Application. Pragmatic shortcut: the builder reads from pipeline context with `ConceptVocabulary.Empty` as the safe fallback. Future plumbing (LoadSkillsHandler or boot-time setter) can populate the context key without changing the builder."
  - category: TradeOff
    chose: "**`RationaleEntry.Role` is nullable** (`SkillRole?`) where the spec used non-nullable. Negative rationale tokens (`-<skill>:<key>;`) carry no role per the grammar"
    reason: |
      modeling that with a nullable enum is more honest than picking an arbitrary default. The validator handles both forms; consumers infer role from context if needed.
  - category: TradeOff
    chose: "**Step 9 ships 22 new unit tests covering parser/validator/excerpt-builder/expander/label-applier/filter handler.** The 8 spec-listed integration-style tests (frontend-bug ticket assigns architect, db-migration assigns dba, etc.) require complete `SkillIndexEntry` fixtures with realistic activation criteria"
    reason: |
      those depend on the agent-smith-skills v2.0.0 release that ships the migrated skill definitions. The mechanism is exercised by the unit tests; the integration assertions land alongside the v2.0.0 skills release. Sample regression test similarly deferred.
  - category: TradeOff
    chose: "**`ProjectMapExcerptBuilder` uses crude substring matching (haystack of `PrimaryLanguage` + `Frameworks` + module paths against vocabulary keys).** Per spec the matching \"happens here, not in the LLM\" but the matching algorithm is unspecified. Substring is operator-extensible: adding more concepts to the vocabulary picks up matches automatically. Refinement (e.g., regex patterns per concept, or LLM-assisted matching) is a follow-up if substring proves too noisy."
