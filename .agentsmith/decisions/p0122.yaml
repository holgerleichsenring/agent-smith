# yaml-language-server: $schema=../decision.schema.json
# p0122: Skill output hardening (parser tolerance + schema ban list + skills cleanup)
phase: p0122
decisions:
  - category: Architecture
    chose: "**ObservationParser switches from `Deserialize<List<RawObservation>>` to per-element JsonDocument enumeration with try/catch.** Reason: a single bad enum value (LLM emits `\"critical\"` for severity) used to throw at the list-level deserialize and drop the entire round to FallbackSingle, losing every other valid observation. Element-wise parsing skips the bad item with a warning, keeps the valid ones. Same shape protects against future drift in `Concern` / `Effort` / `Confidence` field types"
    reason: one tolerance loop covers all of them.
  - category: Architecture
    chose: "**`observation-schema.md` is the single source of truth for output shape; per-SKILL \"Output format\" sections are removed across all 16 api-security skills.** Discovery: SkillPromptBuilder.BuildDiscussionPromptParts injects the framework schema AFTER the role body, but salient JSON-block schemas in the role body (e.g. `\"severity\": \"critical\" | \"high\" | …`) overpower the later rule-text schema in LLM completion. The fix is removal: skills describe WHAT to observe, the framework owns HOW to format. Domain hints (OWASP category, evidence_mode, endpoint location) move into description/rationale/location of the framework schema."
  - category: Architecture
    chose: "**Severity ban list lives in observation-schema.md, not in structured-output-* prompts.** Discussion-mode is the actual injection path verified by the operator stack trace (ObservationParser.Parse). The structured-output-* templates feed an IsStructuredRound code path that no skill currently reaches"
    reason: |
      `RoleSkillDefinition.Orchestration` is never populated by any parser in the Application layer (latent bug, separate phase). Updating only the prompt that LLMs actually see avoids dead-letter edits.
  - category: Implementation
    chose: "**Severity allowlist enforces lowercase explicitly + maps tool-imported values.** observation-schema.md: `\"high\" | \"medium\" | \"low\" | \"info\"` lowercase only; explicit ban list of `critical`/`warning`/`severe`/`none`/`important`/`informational`; mapping table for Nuclei → framework (`critical → high` with `(was: critical)` in rationale; `info → info`; ZAP `informational → info`; ZAP `warning → medium`). The mapping prevents the most common LLM drift pattern (echoing tool-native severity)."
  - category: Implementation
    chose: "**Per-SKILL hints follow a consistent template: `## Output` heading + one paragraph that maps domain-specific concepts onto framework fields.** Examples: `Put HTTP method + path into location`; `Lead description with the OWASP category`; `Prefix rationale with evidence: confirmed | potential`. No JSON examples in skill bodies"
    reason: |
      those compete with the framework schema for LLM attention. `evidence_mode` becomes a rationale prefix convention, not a top-level field, since the parser doesn't consume custom fields.
  - category: Tooling
    chose: "**agent-smith-skills bumps 1.4.0 → 1.5.0 (minor) for skill-author-visible contract change.** Per release-please's bump-minor-pre-major config in the skills repo. Operators with vendored / downstream-modified skills need to know this is a content-shape change, not a bug fix. Tarball regeneration via scripts/package.sh is deferred to the GitHub Actions release on tag push (release-please bot drives the cut); not committed locally because dist/ is build-artifact-only."
  - category: TradeOff
    chose: "**No migration of api-security skills to the actual structured-mode (IsStructuredRound) path.** That path is currently unreachable because no code populates `RoleSkillDefinition.Orchestration`. Wiring it up means writing an orchestration parser + threading it through SkillMdParser + agentsmith.md format support"
    reason: |
      a distinct refactor that doesn't fit the regression-fix scope of p0122. Until that lands, all skills go through Discussion-mode prompts (which now have the framework schema as authoritative).
  - category: TradeOff
    chose: "**No JSON-schema-constrained outputs at the IChatClient level.** Azure OpenAI / OpenAI structured outputs (`response_format: json_schema`) would eliminate the entire class of enum-drift failures by constraining decoding at the API level. Out of scope for p0122"
    reason: |
      separate phase touching ChatOptions setup in IChatClientFactory + per-provider builder logic. The parser-tolerance + skill-cleanup combination handles the regression for now; the API-level fix is the long-term endgame.
