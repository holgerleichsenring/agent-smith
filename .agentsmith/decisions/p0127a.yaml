# yaml-language-server: $schema=../decision.schema.json
# p0127a: SKILL.md frontmatter + loader (parallel format support, D3 slice 1/3)
phase: p0127a
decisions:
  - category: Architecture
    chose: "**Format detection by frontmatter key (`roles_supported` vs `role`), not by directory or filename.** Grep workflows operators use today walk the same `.agentsmith/skills/<name>/SKILL.md` layout; forcing two parallel trees during the migration would break those workflows. Both keys present is a hard `SkillFormatException`, so the per-skill format is unambiguous."
    reason: |
      alternatives: separate directories for new-format skills (rejected: parallel trees during migration); a `format: v2` frontmatter key (rejected: redundant with the presence of `role`).
  - category: Architecture
    chose: "**`NewFormatSkillBuilder` and `NewFormatSkillValidator` extracted from `SkillMdParser`.** SkillMdParser is already over the 120-line cap (305 lines pre-phase); piling on the new-format build + validation logic would add ~80 more lines to a class that was already a refactor target. The two new types are each focused (~35 / ~125 lines), one-public-method, instance-based, and keep the new-format logic discoverable by name. The validator slightly exceeds the cap but stays a single responsibility (rule enforcement), with each rule a private 4-6 line method."
    reason: |
      alternatives: inline both inside SkillMdParser (rejected: pushes the parser past 400 lines and makes the new code hard to find); a single `NewFormatSkillParser` doing both build and validate (rejected: validation has ten distinct rules; mixing them with field-mapping would obscure both responsibilities).
  - category: Architecture
    chose: "**`RoleSkillDefinition` holds a union of legacy and new fields, all nullable on the not-applicable path.** Triage and runtime consumers read `RoleSkillDefinition`; making them branch on which path produced the definition would couple consumer logic to the parser's internals. Nullable union means: legacy skill â†’ `ActivationCriteria` + `RoleAssignment` populated, new fields null; new skill â†’ new fields populated, legacy fields null. Cleanup of the now-dead legacy fields is p0131 (D7) after p0127c proves the migration."
    reason: |
      alternatives: two separate definition types with a discriminated-union consumer (rejected: would fork every consumer's read path; the union-of-nullables is the standard pattern in this codebase, e.g. p0117b's similar `RoleBodies` nullable on legacy YAML).
  - category: Implementation
    chose: "**Validation throws `SkillFormatException`; the loader catches and logs a clear error.** The exception carries the offending file path and the rule description as separate properties (not just a concatenated message). `YamlSkillLoader.LoadFromSkillMdDirectories` adds a dedicated `catch (SkillFormatException)` arm that logs at `Error` with `{Path}` and `{Rule}` fields, separately from the generic `catch (Exception)` warning path. Same effective behavior as the legacy `ValidateStrict` returns-bool pattern (skill is rejected, boot continues), but with structured fields operators can grep on."
    reason: |
      alternatives: return-value-based validation matching the legacy pattern (rejected: ten separate rules don't fit a single error string cleanly; an exception per rule keeps each rule's context attached); fail-boot-hard (rejected: a single bad skill shouldn't kill the whole pipeline; the existing pattern logs and skips).
  - category: Implementation
    chose: "**`YamlSkillLoader.ValidateStrict` short-circuits to `true` when `Role` is set on the loaded definition.** New-format skills are validated at parse time by `NewFormatSkillValidator`; the legacy `roles_supported` / `RoleBodies` / `role_assignment` checks don't apply and would all return false against a new-format definition. The early return treats the parse-time validation as authoritative for new-format skills."
  - category: Implementation
    chose: "**`MergeFrontmatter` change for `RolesSupported`: now falls back to base when override omits it.** Previously `over.RolesSupported` won unconditionally because override files always declared it (validated by `ValidateOverrideMatchesBase`). With the new format an override may omit `RolesSupported` (it's not part of the new shape); the fallback-to-base merge keeps legacy override files unchanged in behavior while letting new-format overrides work."
  - category: Implementation
    chose: "**`ValidateOverrideMatchesBase` dispatches per format.** Legacy-base + override checks `roles_supported` set-equality (existing rule). New-format-base + override checks role string-equality only when both are present; override may omit `role` and inherit from base. Override format must match base (mixing legacy-base + new-override would surface as a `DetectFormat` failure post-merge)."
  - category: Implementation
    chose: "**`category` is loosely validated in p0127a (non-empty string when `investigator_mode=verify_hint`); closed-enum check is deferred to p0127c.** Defining the enum now means picking values before any `verify_hint` skill exists in the new format. Loose-then-tight: a accepts any string, c populates each skill's category, the validator extension at c's land closes the enum to actually-used values."
  - category: TradeOff
    chose: "**Body-verbatim path skips `SkillBodySplitter` entirely.** The legacy splitter looks for `## as_<role>` headers; new-format files have no role sections, the entire body is one body. Forcing the new path through the splitter would mean teaching it to recognize \"no sections, just body\" as a valid case"
    reason: |
      a special branch with no behavioral upside. Cleaner: new path skips the splitter; `NewFormatSkillValidator` ensures body is non-empty.
