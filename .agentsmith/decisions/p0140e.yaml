# yaml-language-server: $schema=../decision.schema.json
# p0140e: Metrics + empty-plan gate + docs (umbrella close-out)
phase: p0140e
decisions:
  - category: Architecture
    chose: "**`AgentSmithMeter` is a static class"
    reason: |
      no DI registration.** `System.Diagnostics.Metrics.Meter` is designed to be a long-lived singleton, typically held as a static field. DI registration would add ceremony with no benefit — counters can't be 'scoped' in the metrics model. The Meter named 'AgentSmith' is discoverable from any consumer via the static type's public counters OR via OpenTelemetry's `AddMeter("AgentSmith")` without any wiring inside agent-smith. -- alternatives: register Meter via DI (rejected: ceremony, conflicts with the static-singleton intent of the BCL API); register the counters as DI services (rejected: counters are tied to the meter; splitting them creates leaky abstractions).
  - category: Architecture
    chose: "**System.Diagnostics.Metrics (BCL), not OpenTelemetry SDK.** System.Diagnostics.Metrics ships with .NET 6+ and is the .NET-native metrics abstraction; OpenTelemetry interops with it via `OpenTelemetry.Instrumentation.AspNetCore` + `.AddMeter(...)`. Picking the BCL surface means no NuGet dependency in agent-smith's csproj"
    reason: |
      operators choose their exporter stack. Picking OpenTelemetry directly would lock the project into a specific exporter chain that's actively churning (the OTel .NET ecosystem). -- alternatives: ship `OpenTelemetry.Api` (rejected: ties operators to OTel even if they use a non-OTel pipeline); ship `Prometheus-net` (rejected: even more coupling).
  - category: Architecture
    chose: "**Empty-plan gate is a new `EmptyPlanCheckHandler`, not an extension of `GeneratePlanHandler`.** Two reasons: (1) separation of concerns"
    reason: |
      GeneratePlan owns Plan creation, EmptyPlanCheck owns the "is this plan actionable?" decision; (2) PipelinePresets ordering: GeneratePlan → PlanOpenQuestions → **EmptyPlanCheck** → Approval, so the gate runs AFTER PlanOpenQuestions (which already short-circuits on `needs_user_input`). EmptyPlanCheck only fires for plans that are NOT awaiting answers AND have zero steps. Distinct decisions at distinct steps. -- alternatives: bolt the check into GeneratePlanHandler (rejected: violates SRP — handler grows new branch, harder to test in isolation); make it a method on Plan (rejected: pure data type shouldn't own side-effect-emitting metric calls).
  - category: Architecture
    chose: "**`EmptyPlanCheckHandler` follows the same short-circuit pattern as `PlanOpenQuestionsHandler`"
    reason: |
      sets a context flag, PipelineExecutor reads it.** Precedent from p0128b: `OpenQuestionsAwaitingAnswer` sets `ContextKeys.OpenQuestionsAwaitingAnswer = true`, PipelineExecutor checks the flag after every command and returns `CommandResult.Ok("parked")` cleanly. Same pattern for EmptyPlanSkipped: handler sets the flag, executor sees it, returns Ok without running downstream handlers. No new CommandResult variant needed. -- alternatives: add `CommandResult.OkAndStop()` factory (rejected: two ways to signal "stop the pipeline cleanly" — the context-flag pattern is the established one); have the handler return InsertNext with no items (rejected: doesn't actually stop downstream commands).
  - category: Implementation
    chose: "**Reason label starts with one value: `'empty_plan'`. Classification is future work.** Audit revealed GeneratePlanHandler today doesn't classify WHY a plan came back empty (LLM judged the ticket out-of-scope vs. LLM failed to understand vs. LLM thought another pipeline should handle it). Classifying requires Plan-phase output post-processing that doesn't exist. Shipping with one reason now + leaving the label as a string lets future phases add reasons without a contract change. The umbrella spec's mention of `'wrong_project_tag' / 'wrong_pipeline_for_ticket_type' / 'ticket_insufficient_info' / 'other'` is the future direction, not the p0140e ship state."
    reason: |
      alternatives: ship a reason-enum (rejected: closed set; adding values is a breaking API change for any external listener that parses labels); ship zero reasons + a single counter (rejected: when classification arrives we'd want labels but they'd need a contract change).
  - category: Implementation
    chose: "**Counter labels include `project` + `pipeline` (both) on both counters.** Operator dashboards typically slice by project (which project is causing the noise?) and by pipeline (which preset is most often skipped?). Including both labels enables both pivots. -- alternatives: project-only labels (rejected: doesn't surface the pipeline picture); per-event counter (rejected: loses per-project distinction"
    reason: `max()` over per-project counts gives total events anyway).
  - category: Implementation
    chose: "**`EmptyPlanCheckHandler` labels: project from `Ticket.Source` (best-effort), pipeline from `ResolvedPipelineConfig.PipelineName` (authoritative).** No ContextKeys.ProjectName exists today; Ticket.Source happens to carry the project string in practice (set by FetchTicketHandler). Using it for the label is best-effort and surfaces useful operator data; if Ticket isn't in context (test cases, edge paths), fall back to `'unknown'`. ResolvedPipelineConfig is set by PipelineConfigResolver at the head of every run, so PipelineName is always present. -- alternatives: add ContextKeys.ProjectName + ExecutePipelineUseCase publishes it (deferred to a follow-up"
    reason: touches many tests for one label).
  - category: TradeOff
    chose: "**Counter not wired to ProjectResolver call sites in webhook handlers or pollers"
    reason: |
      wired inside ProjectResolver itself.** The instrumentation is in the resolver's own method, so EVERY caller (webhook + polling) gets the counter automatically. Wiring at each call site would be ~5 locations and easy to forget. The downside: counter increments are coupled to the resolver's implementation, not to the dispatcher's matching decisions. In practice the resolver IS the matcher, so coupling is acceptable. -- alternatives: emit counter from WebhookSpawnDispatcher + TrackerPoller separately (rejected: 2 call sites duplicating the same loop logic).
  - category: TradeOff
    chose: "**`agentsmith.example.yml` not updated with metrics block.** Metrics is opt-in operator-side and requires no agentsmith.yml change"
    reason: |
      there's nothing in the YAML schema to document. The metrics.md doc covers the operator-side wiring. If a future phase adds metrics-config to YAML (e.g. exporter endpoint), the example file gets updated then.
