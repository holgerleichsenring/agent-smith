# yaml-language-server: $schema=../decision.schema.json
# p0125c: Handler Concept Publication (D1 slice 3/4)
phase: p0125c
decisions:
  - category: Architecture
    chose: "**PipelineNameInitializer is a dedicated command-handler at the head of every preset, not a routing-side concern.** Pipeline identity is a property of the pipeline run, not the CLI surface (Slack/CLI/webhook all converge on the same pipeline). Five-plus call sites (one per surface) would drift; one Initializer command keeps publication in one place. The Initializer reads `PipelineContext.ResolvedPipeline` (set by PipelineConfigResolver from p0106), so it doesn't need parameters"
    reason: |
      the resolver is the source of truth. -- alternatives: publish in each routing branch (rejected: drift across surfaces); inject pipeline name via constructor (rejected: ICommandHandler<TContext> is generic, per-route DI binding impossible).
  - category: Architecture
    chose: "**`pipeline_name` enum starts narrow: api-security-scan, security-scan, fix-bug, feature-implementation, mad-discussion only.** init-project, legal-analysis, autonomous, skill-manager, fix-no-test, add-feature are NOT in the enum yet. An enum value the LLM can cite must be a pipeline that actually publishes it; listing dead routes lets triage activate skills on a phantom pipeline. The enum grows when each route's pipeline name actually fires through a real Initializer call."
    reason: |
      alternatives: list every pipeline up front (rejected: silent dead branches in triage).
  - category: Architecture
    chose: "**`PipelineNameInitializer` is prepended to every preset INCLUDING those whose name isn't in the enum yet.** Currently 5 of 10 presets (init-project, legal-analysis, autonomous, skill-manager, fix-no-test, add-feature) will throw `ArgumentException` at SetEnum because their names aren't in the declared enum_values. This is the LLM-driver fence: a future routing change adding a new pipeline forces a vocabulary update before the pipeline runs at all. The enum starts narrow; presets that need to ship today add their name to the enum in a follow-up. The four explicit-test pipelines (api-security-scan, security-scan, fix-bug, mad-discussion) work; the other six are exercised by p0125c's `PipelineNotInEnum_ThrowsAtSetEnum` test as the documented failure mode."
    reason: |
      alternatives: only prepend to enum-listed presets (rejected: split discipline across routes; would let a new pipeline silently skip publication).
  - category: Implementation
    chose: "**Handlers consume `Func<PipelineContext, IRunStateConcepts>` factory delegate, not `IRunStateConcepts` directly.** PipelineContext is created `new` per pipeline run by ExecutePipelineUseCase, not in DI. Direct `IRunStateConcepts` injection isn't resolvable. The factory is the registration shape p0125b set up; handlers call `conceptsFactory(context.Pipeline)` once inside ExecuteAsync to get a context-bound view."
    reason: |
      alternatives: thread `PipelineContext` through every IRunStateConcepts method call (rejected: changes the contract from p0125b).
  - category: Implementation
    chose: "**CheckoutSourceHandler refactored into RunCheckoutAsync + CloneAndSwitchAsync + MaybeSwitchBranchAsync to keep methods <=20 lines.** ExecuteAsync wraps a single `RunCheckoutAsync` call with a post-execute `SetBool(\"source_available\", result.IsSuccess)`. The pre-existing 40-line ExecuteAsync was already over the methods<=20 limit; the source_available wiring forced a touch on every return path, so splitting along natural seams (clone-vs-local, clone-then-switch, switch-or-skip) was less risky than a per-return-path patch. -- alternatives: try/catch wrapper at ExecuteAsync entry that always publishes false on throw (rejected: throws aren't the failure mode here"
    reason: |
      explicit `CommandResult.Fail` returns are; wrapping a try/catch would swallow the existing fail-fast semantics for unexpected exceptions).
  - category: Implementation
    chose: "**TryCheckoutSourceHandler publishes `source_available` inside `EmitBanner` because every success/failure path already routes through it.** EmitBanner takes a `string? sourcePath`; null means passive mode (false), non-null means resolved (true). Adding the publish call there gives one chokepoint instead of five."
    reason: |
      alternatives: publish in each return path (rejected: five sites that must stay in sync as TryCheckout grows).
  - category: Implementation
    chose: "**TriageHandler `RenderSnapshot` walks `vocabulary.Concepts` and dispatches on declared type, not on the runstate object's storage.** The runstate doesn't expose its declared types directly (it's a value-typed read/write surface, by design); the vocabulary IS the schema. Walking vocabulary lets the snapshot stay in sync with declared concepts as the namespace grows. Default-valued concepts are omitted: false bools, 0 ints, first-enum strings. Empty result renders as `(all defaults)`"
    reason: |
      for 100+ concepts mostly at default, the noise drowns the signal. -- alternatives: emit every concept including defaults (rejected: log noise dominates the actual change signal); add an `IsDefault(name)` method to runstate (rejected: vocabulary already knows the answer, runstate would have to delegate to it anyway).
  - category: Implementation
    chose: "**BootstrapCheckHandler is registered in DI but NOT inserted into any pipeline preset.** The publishing code is mechanical (read two paths, set two bools); the gating decision (do we abort the pipeline on missing files?) is a pipeline-design concern that lives next to init-project's bootstrap flow in p0130 (D6). Splitting along this line keeps p0125c about concept-publication plumbing and lets D6 own the policy. The handler is constructable now so D6's eventual wiring is observation-only."
    reason: |
      alternatives: wire it into init-project unconditionally (rejected: forces a gate decision before D6 has the design context).
  - category: Implementation
    chose: "**`source_available` is the only existing-handler concept publication added in p0125c.** The four scan-handler concepts (swagger_spec_present, nuclei_findings_count, zap_findings_count, spectral_findings_count) live in pipelines that already work end-to-end. Adding them now means re-touching four scan handlers across two pipelines for no behavioral change yet"
    reason: |
      they land when D2's tool-loop refresh of those handlers happens, or as a small follow-up phase if they hold us back. -- alternatives: publish them all here (rejected: scope creep; D2 will retouch the scan handlers anyway).
  - category: TradeOff
    chose: "**TriageHandler snapshot is single `ILogger.LogInformation` line, not a structured artifact.** D1's reproducibility goal is `grep concepts run-456.log` and the human sees what was true. A structured artifact (file under `.agentsmith/runs/...`) is justified once Plan/Diff persistence lands in D4; doing it now creates a one-off persistence path we'd refactor next phase."
    reason: |
      alternatives: write a per-run concepts.json artifact (deferred: D4 plan/diff persistence will re-shape this).
  - category: TradeOff
    chose: "**`RunStateConceptsTestFactory.P0125cVocabulary` is a hand-rolled test vocabulary, not loaded from the cross-repo YAML.** Tests must run without the agent-smith-skills repo on disk; loading the YAML would couple unit tests to a sister repo. The hand-rolled vocab declares only the four concepts handlers in this slice publish."
    reason: |
      alternatives: load via ConceptVocabularyLoader at test setup (rejected: cross-repo coupling for unit tests).
  - category: TradeOff
    chose: "**Cross-repo coupling: vocabulary entries for the four new concepts ship in agent-smith-skills paired with this PR.** Same hard-cutover discipline as p0125a"
    reason: |
      boot against an unmigrated vocabulary fails because the Initializer's SetEnum throws on undeclared concept. Version bump 1.8.0 -> 1.9.0; additive only (no existing entries touched), so the breaking aspect is just the pin between agent-smith and agent-smith-skills versions.
