# yaml-language-server: $schema=../decision.schema.json
# p0117: Sandbox follow-ups (Docker backend, TRX, sandbox-routed git ops, grep Step kind, Redis-stream cleanup)
phase: p0117
decisions:
  - category: Architecture
    chose: "**Docker backend mirrors the K8s shape, not docker-cli shell-out.** `DockerSandboxFactory` runs an `agent-loader` container first (waits for exit), then a `toolchain` container with two named volumes (`{slug}-shared` RO, `{slug}-work` RW). `DockerContainerSpecBuilder` is the single place that knows the `/shared` + `/work` mount paths. Same Wire/Step protocol as K8s; the only differences are container lifecycle + volume cleanup."
  - category: Architecture
    chose: "**`SandboxGitOperations` runs git in the sandbox, not in the source-provider.** `CommitAndPRHandler`, `PersistWorkBranchHandler`, `InitCommitHandler` all migrated. Reason: the LLM's `write_file` tool writes to `/work` in the sandbox; the server-side checkout never sees those changes. `provider.CommitAndPushAsync` would have committed an empty diff in K8s/Docker mode"
    reason: |
      a latent bug fixed as a side-effect of the migration. PR creation stays in the providers (Octokit / GitLab REST / AzDO) because that's API plumbing, not git plumbing.
  - category: Architecture
    chose: "**`StepKind.Grep` ships in Wire so grep is sandbox-routed end-to-end.** Pre-p0117 grep was server-side `Directory.GetFiles + Regex` over the LibGit2Sharp checkout"
    reason: |
      empty results in K8s mode (server-pod has the original tree, sandbox `/work` has the modifications). New `GrepStepHandler` in the Agent: `rg --json` first, managed `Directory.EnumerateFiles + Regex` fallback. `MaxMatches` default 200, truncation event emitted on cap. `SandboxToolHandler.GrepAsync` builds the Step; `ToolExecutor` routes through it when sandbox is set, returns a clear error otherwise (ScoutAgent migration deferred to p0119a).
  - category: Implementation
    chose: "**TRX result-files parsed via `TrxResultParser` into structured `TrxSummary`.** Pre-p0117 `TestHandler` stored raw stdout in `ContextKeys.TestResults`; downstream consumers got an unparseable string. Post-p0117: `dotnet test --logger trx --results-directory /work/test-results`, then ListFiles + ReadFile + parse + aggregate (`TrxSummary.Combine` for multi-test-project solutions). TestHandler's failure-case message now surfaces failing test names + counters instead of dumping stdout."
  - category: Implementation
    chose: "**`StreamLimits.EventStreamMaxLength = 10_000` lives in Wire.** Agent's XADD passes `MAXLEN ~` so a single chatty step can't balloon a stream. `SandboxRedisChannel.DisposeAsync` (was no-op) DELs all three sandbox keys with a try/catch"
    reason: Redis-down on dispose logs and returns rather than throwing.
  - category: TradeOff
    chose: "**CheckoutSourceHandler stays hybrid; LibGit2Sharp removal deferred.** Spec called for `CheckoutSourceHandler` pure-Step + `Repository.LocalPath` → `/work`, but ~15 file-reading handlers (`BootstrapProject`, `LoadCodingPrinciples`, `LoadContext`, `CompileDiscussion`, `AnalyzeProject`, `LoadRuns`, `CompileKnowledge`, `LoadCodeMap`, `WriteRunResult`, `SecurityTrend`, `DependencyAudit`, `StaticPatternScan`, `GitHistoryScan`, `QueryKnowledge`, `BootstrapDocument`) read `LocalPath` via `File.Exists` / `File.ReadAllText`. Migrating all of them to `sandbox.RunStepAsync(Step{Kind=ReadFile})` is a multi-day refactor that exceeds p0117 scope. Provider impls keep their `LibGit2Sharp` clone path; `CommitAndPushAsync` is gone (dead code, removed in step 6)."
  - category: TradeOff
    chose: "**Steps 7 (ProjectAnalyzer sandbox), 8 (ToolExecutor cleanup + ScoutAgent migration) skipped.** All three target the IAgenticAnalyzer / ToolExecutor / ScoutAgent infrastructure that p0119a deletes wholesale (M.E.AI's `IChatClient` + `SandboxToolHost` replaces the apparatus). Doing the migration in p0117 = pure throwaway work that p0119a immediately reverts. Documented as a known-gap interim state: ScoutAgent's grep tool returns a clear error message until p0119a's tool-host migration ships."
  - category: TradeOff
    chose: "**Step 9 (Helm chart) deferred to a follow-up phase.** Helm-ifying `deploy/k8s/`'s 9 numbered YAMLs is independent infrastructure (no p0119a dependency, no source-code blocker). Skipped to keep p0117 focused on the sandbox-runtime concerns that p0119a actually depends on."
