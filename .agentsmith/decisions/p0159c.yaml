# yaml-language-server: $schema=../decision.schema.json
# p0159c: Docs re-skin + content drift
phase: p0159c
decisions:
  - category: Architecture
    chose: "**Material theme stays; palette / fonts overridden via tokens.css + overrides.css, not a custom theme.** Material is well-maintained, search and nav are useful, the override surface is small. Swapping generators would be months of work for no user-visible win."
  - category: Architecture
    chose: "**Lifecycle SVG embedded in docs as `<img>`, inlined on the landing.** Material sanitises inline `<style>` and `<script>` blocks; CSS animations on inline SVG don't survive. Static image is fine for docs; the landing keeps the same source file in an inline copy when CSS chip controls are wanted."
  - category: Architecture
    chose: "**Light-mode default, dark-mode toggle via Material's built-in.** Developer docs need to print and clip cleanly; cream-canvas default is friendlier than ink-dark. Material's dark scheme reads the same custom-property names with polarity-flipped values via the `[data-md-color-scheme=slate]` selector mapping in overrides.css."
  - category: Architecture
    chose: "**`concepts/multi-repo-pipelines.md` is a new canonical concept page.** Today the one-ticket-many-PRs story is scattered across p0140 + p0158 spec text + commit messages, with no single concept page tying it together. The landing's hero diagram needed a docs landing target"
    reason: this page is it.
  - category: Implementation
    chose: "**Drift fixes apply only to the high-severity items identified by the audit; low / medium items are documented in `.agentsmith/notes/p0159c-doc-drift-audit.md` and either fixed here or queued for follow-up.** Specifically fixed in this phase: phases-and-runs.md (run-id format `r{NN}` → ISO-8601 + 4hex per p0156), multi-skill.md (OBJECT/AGREE prose → typed SkillObservation per p0146c + p0151), pipeline-system.md (step counts updated against current `PipelinePresets.*.cs`), ticket-lifecycle.md (single ClaimRequest unification per p0158a). Plus a targeted patch to agentsmith-yml.md (deprecation admonition + AzureRepos→AzureDevOps)."
  - category: Implementation
    chose: "**`configuration/agentsmith-yml.md` left in legacy inline shape with a deprecation admonition at the top.** Page needs a full rewrite against the post-p0139 catalog-based schema"
    reason: |
      every code example changes. That's a focused phase of its own; doing it inside p0159c would dilute the docs-skin commit. Admonition points readers at multi-repo.md + the schema reference page where the current shape lives.
  - category: Implementation
    chose: "**Drift audit verifies against the running code, not against older docs.** Per [[feedback_challenge_premises]]. At this refactor pace, docs lie before code does."
  - category: Implementation
    chose: "**mkdocs locally not installed"
    reason: |
      `mkdocs build --strict` runs in CI only.** Python + mkdocs-material aren't in this dev environment. The CI workflow (`.github/workflows/docs.yml`, updated in p0159a to also trigger on `DESIGN.md` and `scripts/build-tokens.mjs` changes) runs `node scripts/build-tokens.mjs` before `mkdocs build --strict`; the next push to main validates the full nav + link graph. Browser walk pending operator review before push.
  - category: TradeOff
    chose: "**Two concept pages with smaller drift (sandbox-architecture, sandbox-agent) verified-only, not edited.** The audit confirmed they match the current code"
    reason: |
      touching them would be busywork. Documented in the audit notes as "verified, no drift".
