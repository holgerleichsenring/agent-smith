# yaml-language-server: $schema=../decision.schema.json
# p0156: Timestamp run identifiers
phase: p0156
decisions:
  - category: Architecture
    chose: "**Unified RunId at pipeline start, not at WriteRunResultHandler.** The phase spec proposed generating the timestamp+suffix identifier inside `WriteRunResultHandler`, but `ContextKeys.RunId` already existed since p0112 as an 8-hex log-correlation tag set by `ExecutePipelineUseCase`. Two ids for one run would drift (WIP commit trailer != directory name != log scope). Promoted the new canonical format into the existing `ContextKeys.RunId` slot, generated once by `ExecutePipelineUseCase` and consumed everywhere"
    reason: |
      log scope, `PersistWorkBranchHandler` WIP trailer, directory naming, context.yaml `runs:` entry. WriteRunResultHandler just reads the value. -- alternatives: keep two ids and have WriteRunResultHandler generate independently (rejected: log/directory drift, duplicate concept); rename existing RunId to RunCorrelationId and keep two (rejected: the canonical identifier IS the run, no reason for a second tag).
  - category: Implementation
    chose: "**4-hex collision suffix uses `Random.Shared.Next(0x10000).ToString(\"x4\")`.** Not crypto, doesn't need to be"
    reason: |
      same-second collision avoidance for ~10 simultaneous batch-enqueues. `Random.Shared` is thread-safe and seeded from time + thread id. Fixed-width hex keeps lexicographic sort stable across the second boundary. -- alternatives: `Guid.NewGuid().ToString("N")[..4]` (rejected: same outcome, more allocation); incrementing per-second counter (rejected: requires shared state, the bug we're fixing).
  - category: Implementation
    chose: "**`runs:` block created at end-of-file when absent.** Pre-p0156 the handler regex-scanned for `^\\s+active:` and silently no-op'd when the anchor was missing (root cause of a6914f38). Post-p0156: if no `^runs:\\s*$` line exists, append `\\nruns:\\n  \"<runid>\": \"<summary>\"\\n`. The handler never returns without writing. -- alternatives: keep silent no-op (rejected: the bug); fail loud (rejected: target repos may legitimately have no `runs:` key on first run"
    reason: that's the case we're handling).
  - category: TradeOff
    chose: "**`.last-compiled` storage changed from `int` to `string`.** Required by the format change; `CompareOrdinal` is now the comparison op. Format-invariant regex test pins the canonical 24-char shape so the ordinal compare stays valid (ISO 8601 with fixed-width suffix sorts lexicographically)."
    reason: |
      alternatives: parse the timestamp portion back to DateTimeOffset (rejected: extra step, same ordering, more failure modes).
  - category: TradeOff
    chose: "**Pre-p0156 r{NN} run directories become invisible to wiki compilation.** `RunDirectoryReader.TryExtractRunId` only matches the new 24-char canonical prefix; old `r01-foo` names return null and are filtered out. Documented in the commit message; the fleet is small and historical wiki entries are not at risk (the wiki itself doesn't get reset)."
    reason: |
      alternatives: dual-format reader (rejected: ongoing maintenance for a one-time transition); migration step (rejected: not worth the script for a non-load-bearing artefact).
