# yaml-language-server: $schema=../decision.schema.json
# p0158f: Per-repo bootstrap + context loading
phase: p0158f
decisions:
  - category: Architecture
    chose: "**Path mechanics correction from spec: per-repo bootstrap reads `/work/.agentsmith/...` IN EACH repo's per-repo sandbox (post-p0158e), not `/work/{name}/.agentsmith/...` in one shared sandbox.** The original p0158f spec was written pre-p0158e assuming the single-sandbox `/work/{name}/` layout. After p0158e each repo has its OWN sandbox where `/work` is the repo root; per-repo distinction is via `Sandboxes[name]` dispatch, not path-prefixing inside the sandbox. BootstrapCheck / LoadContext / LoadCodingPrinciples / AnalyzeProject / TestHandler all iterate `ContextKeys.Repos` and for each repo grab `Sandboxes[repo.Name]`, then read/write at the legacy single-sandbox-relative path."
    reason: |
      alternatives: introduce `ProjectMetaPaths.WorkPathFor(repoName)` helpers (rejected: per-repo paths inside a per-repo sandbox are just `/work/...`, not `/work/{name}/...`; the helper would encode a layout that doesn't exist post-p0158e); refactor sandboxes to share a single `/work/{name}/` workspace (rejected: contradicts p0158e's "one sandbox = one repo's runtime" architecture).
  - category: Architecture
    chose: "**Back-compat shim `MultiRepoTargets.Resolve` lets handlers transparently fall back to a single-entry Sandboxes dict + one-element synthetic Repos list when only legacy `ContextKeys.Sandbox` is seeded.** ~25 existing handler tests seed only the singular `ContextKeys.Sandbox`. Rewriting every fixture to also seed `Sandboxes` + `Repos` would be mechanical busywork that buys nothing"
    reason: |
      the synthetic single-element back-compat path produces the same single-repo behaviour the legacy code had, and the spec-driven multi-repo tests explicitly seed the multi-entry dictionary. The shim is internal to the handler layer (one static helper class, ~20 LOC), used by BootstrapCheckHandler, LoadContextHandler, LoadCodingPrinciplesHandler, TestHandler. PublishProjectLanguageHandler has its own `ResolvePerRepo` doing the same trick for `ContextKeys.ProjectMap → RepoProjectMaps`. -- alternatives: hard migration of every test fixture (rejected: high mechanical cost for no behaviour change in single-repo runs); two parallel handler classes (rejected: dual maintenance for one routing concern); leave the legacy fail mode and update fixtures incrementally (rejected: would block p0158f's commit on ~25 fixture rewrites).
  - category: Architecture
    chose: "**Aggregated `ContextKeys.CodingPrinciples` (legacy slot) is a single string with per-repo headers when N > 1, but the raw content when N == 1.** AgenticExecute consumes `ContextKeys.CodingPrinciples` as one string into the system prompt"
    reason: |
      preserving that contract means the agent sees per-repo principles inline (`## server\n{csharp-principles}\n---\n## client\n{ts-principles}\n...`) without prompt-builder changes. The single-repo case skips the header so existing legacy tests that assert on raw content still pass. `ContextKeys.RepoCodingPrinciples` (dict) is available for any multi-repo-aware consumer that wants structured access. Same pattern in `LoadContextHandler` for `ContextKeys.ProjectContext` (= primary repo's YAML, full content). -- alternatives: always prepend headers (rejected: changes content shape for single-repo consumers and breaks ~3 legacy assertions); pass only primary content (rejected: silently drops per-repo principles when multi-repo).
  - category: TradeOff
    chose: "**Wave D (BootstrapDispatch + BootstrapRound multi-repo) deferred to p0158g.** Each repo with its own language needs its own SkillRound emission with repo-scoped activation context (because skill activation reads a single `project_language` concept value), which requires either per-iteration concept mutation in BootstrapDispatch + a `RepoName` field on BootstrapRoundContext + parameter passing through `PipelineCommand.SkillRound`, OR a full per-repo concept-vocabulary scope. Both are real subsystem refactors that deserve their own phase. p0158f delivers the BootstrapCheck/Gate per-repo probe + clear-error path so the operator workaround is: run init-project with `--repo NAME` per repo (one round per stack) until p0158g lands the automated per-repo dispatch."
    reason: |
      alternatives: hack a single-call dispatch that toggles concepts mid-iteration (rejected: race condition risk in the activation infrastructure, hard to test); rebuild concept vocab as per-repo dict (rejected: full vocab-infrastructure refactor, dominates the phase); skip BootstrapDispatch entirely (rejected: init-project would degrade vs single-repo current state).
  - category: TradeOff
    chose: "**`project_languages` aggregate concept is SET-attempt-with-silent-skip via `try { SetString } catch (KeyNotFoundException) { }`.** The pinned agent-smith-skills catalog (v2.5.2/v2.6.0) doesn't declare `project_languages` yet"
    reason: |
      that's a catalog bump separate from p0158f. The handler sets `project_language` (primary, in vocab) unconditionally, and ATTEMPTS to set `project_languages` (aggregate); the attempt silently no-ops when the concept isn't in the current vocab. When the operator updates the catalog pin, the aggregate concept lights up automatically without a handler change. -- alternatives: declare `project_languages` in the handler's `DeclaredConcepts` (rejected: the runtime concept-vocab validation is the canonical source of truth, not handler declarations); fail loud (rejected: would block every multi-repo run until the catalog ships); only set on multi-repo (rejected: same vocab-validation throw on multi-repo too).
  - category: TradeOff
    chose: "**TestHandler aggregates TRX failures into one message identical to the legacy single-repo format (no per-repo grouping in the failure message).** Legacy single-repo tests pin the exact `Tests failed (..., exit X):\\n  - {test}: {error}` format. Preserving it keeps those tests passing without rewrites. The multi-repo failure detail includes ALL repos' failures concatenated (each TrxSummary.Combine merges Failures), so the operator still sees every failed test name; only the per-repo grouping is missing from the message. The per-repo grouping is a usability nice-to-have that's worth a separate phase if any operator asks."
    reason: |
      alternatives: per-repo grouped message (rejected: breaks legacy assertion format); separate single-repo / multi-repo message branches (rejected: more code for marginal benefit, the flat failure list is operator-grep-friendly).
