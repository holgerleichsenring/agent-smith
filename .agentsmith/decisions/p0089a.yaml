phase: p0089a
decisions:
  - category: Architecture
    chose: Confidence calibration defined once in observation-schema.md
    reason: Low (0-30), Medium (31-69), High (70-100). Referenced by all skills.
  - category: Architecture
    chose: Framework-specific false-positive rules derived from Anthropic's claude-code-security-review
    reason: 12 precedents battle-tested across thousands of reviews.
  - category: Architecture
    chose: Phase 1 repo context exploration before analysis
