# yaml-language-server: $schema=../decision.schema.json
# p0143: Triage determinism + DataFlow wildcard tightening
phase: p0143
decisions:
  - category: Architecture
    chose: "**Triage becomes deterministic: zero LLM calls in the triage path.** New `DeterministicTriageSelector` (Application/Services/Triage) is a pure function `(filteredSkills) â†’ TriageOutput`. Per-phase role-slot fill: Plan = producerâ†’Lead + investigatorâ†’Analysts; Review = producerâ†’Lead (same producer re-runs) + judgeâ†’Reviewers; Final = filterâ†’Filter. Single-slot picks (Lead, Filter) use highest-specificity-wins with alphabetical-by-name as the deterministic tiebreak. Multi-slot picks (Analysts, Reviewers) include all matching candidates sorted by specificity desc then name. Replaces the LLM-driven `TriageOutputProducer` chat call. `Confidence` is always 100"
    reason: |
      deterministic selection has no judgment uncertainty. -- alternatives: keep the LLM call (rejected: defeats the purpose); per-pipeline slot catalog (rejected: spec proposed it, but roleâ†’slot mapping is data-driven from each candidate's role field â€” no catalog needed).
  - category: Architecture
    chose: "**Per-preset RoleSlotCatalog / PresetRoleSlotResolver SKIPPED"
    reason: |
      roleâ†’slot mapping is data-driven.** The spec proposed a static per-preset table declaring "fix-bug Plan needs [Lead, Analyst, Analyst]" etc. But every candidate skill already carries its `role` field; the per-phase slot assignment is mechanically derivable (producers â†’ Lead in Plan/Review; investigators â†’ Analysts in Plan; judges â†’ Reviewers in Review; filter â†’ Filter in Final). A separate catalog would have to be maintained in lockstep with the agent-smith-skills role frontmatter â€” drift opportunity. -- alternatives: ship the catalog (rejected: redundant with skill.role); fail-loud when (preset, phase) has no candidate of expected role (rejected: producer-only preset like init-project legitimately has no Review-phase judge; the selector returns null which downstream tolerates).
  - category: Implementation
    chose: "**Reuse existing `ActivationSpecificityScorer` instead of building a new `SpecificityScorer`.** The existing scorer (Application/Services/Activation) already counts comparison + identifier nodes in the parsed activates_when AST. Spec proposed a new SpecificityScorer counting \"distinct concept references\""
    reason: |
      the existing scorer counts each occurrence (non-distinct), but the practical difference is negligible (activates_when rarely repeats the same concept). Reusing avoids a parallel scoring system that could drift. -- alternatives: ship a new scorer (rejected: parallel implementations of the same intent); upgrade the existing scorer to dedupe (rejected: scope creep; same scorer is used by PhaseSpecificityTrimmer with the current semantics â€” changing it would shift trim behaviour across the entire pipeline).
  - category: Implementation
    chose: "**`TriageOutputProducer` rewritten as thin wrapper around the selector.** Ctor drops `ProjectMapExcerptBuilder`, `TriageOutputValidator`, `IPromptCatalog`, `IChatClientFactory`; gains `DeterministicTriageSelector`. `ProduceAsync` is now ~30 lines: load skills â†’ activates_when filter â†’ selector.Select â†’ phaseTrimmer.Trim â†’ labelOverrider.Apply â†’ return. Under-count slots logged at Warn level (Plan without Lead, Review without Reviewers, Final without Filter) instead of failing"
    reason: |
      downstream handlers already tolerate empty slots (SinglePhaseCollapser's Lead-fallback chain; SkillRoundHandlerBase's "no skill assigned" skip).
  - category: Implementation
    chose: "**`TriageOutputValidator` + `TriageRationaleParser` + `TriageValidationResult` DELETED outright (no [Obsolete] window).** Validator's job was checking LLM output (rationale length, role-slot coherence, vocabulary citations). With no LLM, the selector guarantees role-slot coherence by construction and never emits a rationale that needs validating. Rationale parser only existed to extract cited keys from rationale text"
    reason: |
      now the rationale is a self-generated "deterministic-triage: candidates by role [...]" diagnostic line with no key citations. Zero external callers in src/; only the validator referenced the parser + result types. -- alternatives: deprecate with [Obsolete] (rejected: nothing outside src/ references these â€” operator code can't extend them since they're stateful services with private collaborators); rename to "diagnostic" types (rejected: dead code by another name).
  - category: Implementation
    chose: "**Obsolete tests deleted: TriageOutputValidatorTests (8), TriageRationaleParserTests (3), TriagePromptCanonicalExampleTests (1), TriagePromptArchitectureTests (3), TriageOutputProducerInputTests (3), TriageOutputProducerFilterTests (3).** All exercise the LLM-path collaborators (validator, prompt catalog tokens, ResolveTicketOrSyntheticInput, LLM-driven filter narrowing). Replaced with new `DeterministicTriageSelectorTests` (10 tests covering per-role-slot assignment, specificity tiebreak, alphabetical fallback, idempotence) + `TriageOutputProducerDeterministicTests` (3 tests covering filter+selector+trimmer composition). 13 new tests replace 21 deleted = net -8 tests for higher signal density."
    reason: |
      alternatives: keep tests with stale assertions (rejected: false-confidence); reframe each (rejected: they're testing dead code paths).
  - category: Implementation
    chose: "**`StructuredTriageStrategy` body unchanged.** Spec proposed deleting Parse/Validation catch blocks, but the current implementation doesn't have them (the catch blocks were never added"
    reason: |
      the producer threw `InvalidOperationException` on validation failure, which propagated up). The HasLoadedSkills check + SinglePhaseCollapser flow + phase command emission already form the simple shape the spec described.
  - category: TradeOff
    chose: "**Triage prompt files (`triage-structured-system.md`, `triage-structured-user.md`) STAY in the embedded prompt catalog.** They're dead code post-p0143"
    reason: |
      the producer no longer calls IPromptCatalog. Deleting them would mean editing the EmbeddedPromptCatalog manifest + the embedded resources file. Low-value cleanup; prompts are tiny and don't drift. A follow-up phase can sweep them with other dead prompt-text. -- alternatives: delete now (rejected: scope creep, separate concern from selector migration).
  - category: TradeOff
    chose: "**DataFlowReadGate wildcard removal + per-preset explicit edges DEFERRED to p0143b (new follow-up phase).** The spec's premise that wildcards live in operator YAML is wrong"
    reason: |
      `pipeline_data_flow` in YAML only carries `enforce: false`; the actual edges are C# classes (`FixBugDataFlow`, `AddFeatureDataFlow`, etc.) all extending `PermissivePhaseDataFlow` which provides the wildcard. Properly removing the wildcards means rewriting 11 C# `*DataFlow.cs` classes with explicit edges, deleting `PermissivePhaseDataFlow`, removing the wildcard branches at DataFlowReadGate.cs:59+70, and writing per-preset edge tests. High regression risk (any missed edge breaks the preset at runtime when enforce flips on). Worth a dedicated phase. -- alternatives: rip the wildcard out of DataFlowReadGate now and accept breakage (rejected: enforce=true is operator-opt-in, so the wildcard is the safety net â€” removing it without explicit edges would silently break enforce-mode operators); ship a partial migration (rejected: half-explicit edges are worse than all-wildcards or all-explicit â€” easy to miss an edge mid-rewrite). FOLLOW-UP: p0143b will rewrite the 11 DataFlow classes with explicit edges + delete PermissivePhaseDataFlow + delete the wildcard branches in DataFlowReadGate + add per-preset edge-coverage tests.
