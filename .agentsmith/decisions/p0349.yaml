# yaml-language-server: $schema=../decision.schema.json
phase: p0349
decisions:
  - key: "p0345 relational config schema was NEVER migrated — nothing to DROP. VERIFIED before dropping (the spec's #1 hard checkpoint). p0345's ConfigStudioSchema was a raw SQL DDL STRING constant referenced only by the throwing DbConfigStore skeleton + doc comments; NO EF migration ever created agents/trackers/connections/projects/config_changes, and the audit was InMemoryConfigAuditStore (in-memory, not a table). So the new migration ADDS config_entity/version/config_ref and drops nothing (dropping non-existent tables would break every fresh install). Removed the dead ConfigStudioSchema.cs + the skeleton + IConfigAuditStore/InMemoryConfigAuditStore instead. Migration_DropsP0345... test asserts the entity-doc tables exist and no relational config tables / second audit exist."
  - key: "Entity-DOCUMENT store on the existing EF stack. config_entity {EntityType,EntityId,Doc(json),Version,UpdatedBy} with a composite alternate key (EntityType,EntityId); config_entity_version = the single append-only audit (null Doc = delete tombstone, CreatedAt = changed-at); config_ref {From*,To*} FK RESTRICT to the alternate key. Surrogate long PK + unique/alternate key matches the codebase convention (no composite PKs anywhere; run children are keyed the same way). Generated per-provider (SQLite + SqlServer) with the pinned local dotnet-ef 9.0.17."
  - key: "Clean-arch port split, no shims. Core defines IConfigDocumentStore (the doc CRUD + version primitives) + the ConfigDocumentAssembler type<->model map + DbConfigStore : IConfigStore; Persistence implements the port with EfConfigDocumentStore (singleton facade, scope-per-op like DbActiveRunLease) delegating to scoped ConfigDocumentRepository/ConfigImportRepository. Edge derivation is domain logic (projects only) so it lives in Core; the repo just persists the edges passed in. Revert is orchestrated in DbConfigStore (it has the assembler) via GetVersion + PriorDoc primitives."
  - key: "The type<->model map covers the WHOLE RawAgentSmithConfig so a DB round-trip is byte-identical to the file store through the port. Collections keyed by id: agent/tracker/connection/repo/project/mcp_server/secret/pipeline_trigger; singletons id='default': registries/queue/skills/primary_provider/limits/pipeline_storage/pipeline_data_flow/deployment/sandbox/orchestrator/dialogue/persistence/pipeline_cost_cap. Adding a type is one map entry + a C# record; adding a field is zero migration (opaque JSON). System.Text.Json both directions with the same options."
  - key: "Bootstrap-split breaks the chicken-and-egg. The server now LOADS AgentSmithConfig from the DB (DbConfigurationLoader replaces YamlConfigurationLoader on the server only, in ServerCompositionBuilder), so the DbContext connection can NO LONGER read persistence off AgentSmithConfig — it reads BootstrapConfig (persistence + secret names) straight from the file. DbConfigurationLoader assembles raw from the docs, overlays bootstrap persistence/secrets, then runs the SAME RawConfigMaterializer pipeline the file loader uses (extracted from YamlConfigurationLoader — no duplication). The DI-lifetime test is untouched because it never calls ConfigureServices (AgentSmithConfig stays Empty() there)."
  - key: "Unconfigured boot needs no flag. An empty store assembles an empty-but-valid config; AgentSmithConfigValidator passes on zero projects, and pollers/pumps iterate empty Trackers/Projects -> idle. Proven by ServerBoot_EmptyDb_StudioReachable... (studio serves an empty catalog without throwing; loader yields empty config; importing a minimal-viable config wires it)."
  - key: "FileConfigStore is READ-ONLY again (drops the p0345 file-writeback, a no-op vs a read-only ConfigMap). Every mutation throws NotSupportedException; the shared studio->raw patch builders were extracted to RawConfigPatch so DbConfigStore applies the identical patch semantics (not a drifting second copy). CLI stays purely file-based (Cli_RunsPurelyFileBased_NoDbDependency asserts its graph wires no DbContext); the new `agentsmith config import/export` verbs touch the DB deliberately via a hand-built context, exactly like `database migrate`."
  - key: "Invariants: SecretValueGuard rejects a secret doc whose value is not a ${NAME} env reference (save-time, on the DB boundary). Optimistic concurrency via ConfigDocWrite.ExpectedVersion -> StaleConfigVersionException -> HTTP 409 in ConfigStudioEndpoints. config_ref RESTRICT is declared in the schema AND enforced transactionally at the app layer (the referencing set is surfaced), because SQLite FK enforcement is off by default; the harness turns PRAGMA foreign_keys=ON so RESTRICT is genuinely tested. `config import` inserts ALL entity rows before ANY edges so RESTRICT holds regardless of file order; guarded (empty store, or --force which bumps versions past the kept history)."
