# yaml-language-server: $schema=../decision.schema.json
# p0115: AgentSmith.Sandbox.Agent + Carrier Image (Init-Container Pattern)
phase: p0115
decisions:
  - category: Architecture
    chose: "**Init-container pattern with ONE carrier image, NOT pre-baked toolchain images.** The original spec draft listed `sandbox-dotnet`, `sandbox-angular` etc. as pre-baked images we'd publish. Corrected before implementation: we ship exactly one image (`agent-smith-sandbox-agent`) whose only job is to deliver the agent binary into the sandbox pod. The Server pod (p0116) constructs each sandbox pod with two containers sharing an `emptyDir` volume: an initContainer using our carrier image (its ENTRYPOINT copies `/agent` to `/shared/agent` and exits 0), and a main container using the unmodified upstream toolchain image of choice (`mcr.microsoft.com/dotnet/sdk:8.0`, `node:20`, `mcr.microsoft.com/openjdk/jdk:21-ubuntu`, …) with `command: ['/shared/agent']`. We maintain ONE image; toolchain updates flow automatically from upstream; operator-custom toolchains work without our involvement; new languages need zero changes from us."
  - category: Architecture
    chose: "**Self-Inject mode (Option B), not a Busybox stage (Option A).** The carrier's ENTRYPOINT is the agent itself with `--inject <target>`. The agent's `BinaryInjector` resolves `Environment.ProcessPath` and copies the binary to the requested target with executable permissions, then exits 0. Rejected alternative"
    reason: |
      a separate Busybox stage providing `/bin/cp`: would add 1 MB and a second tool to the carrier for a 30-line copy operation that the agent can do natively. Self-inject also keeps the carrier truly single-binary.
  - category: Implementation
    chose: "**Carrier base = `mcr.microsoft.com/dotnet/runtime-deps:8.0-bookworm-slim`, NOT distroless.** First attempt used `gcr.io/distroless/cc-debian12` (tight, small) but it lacks `libz.so.1` which self-contained .NET 8 needs at startup. `gcr.io/distroless/base-debian12` lacks `libgcc` and `libstdc++` too. Microsoft's `runtime-deps` is the documented minimal base for self-contained .NET and bundles everything required (glibc, libgcc, libstdc++, libz, libssl, ICU stubs). Cost: image is ~218 MB instead of the spec's ~80 MB target. That's the price of running a real .NET binary in a real container; distroless ergonomics don't apply here. Documented in the Dockerfile comment block."
  - category: Implementation
    chose: "**`IncludeAllContentForSelfExtract=true`, NOT `IncludeNativeLibrariesForSelfExtract=true`.** Spec said \"same pattern as p52 used for the CLI\" with `IncludeNativeLibrariesForSelfExtract=true`. That setting bundles native libs for self-extraction at startup but keeps managed assemblies in-bundle. In practice this caused CoreCLR startup to fail with \"Failed to load System.Private.CoreLib.dll\" because the TPA list ended up empty (`COREHOST_TRACE=1` confirmed: `TRUSTED_PLATFORM_ASSEMBLIES = `, `CoreCLR path = ''`). Switching to `IncludeAllContentForSelfExtract=true` extracts the entire bundle to `$DOTNET_BUNDLE_EXTRACT_BASE_DIR` (defaults to `/tmp/.net/...`) on first launch; CoreCLR then loads cleanly. Cost: a one-time disk write (~75 MB) per fresh container startup. Acceptable for the pod lifetime model"
    reason: extraction stays around for the full pipeline.
  - category: Implementation
    chose: "**ProcessRunner catches `Win32Exception`/`InvalidOperationException` from `Process.Start` and translates them to `ProcessOutcome(-1, false, message)`.** Original spec didn't address this"
    reason: |
      Process.Start throws when the target binary or working directory doesn't exist, which would propagate through StepExecutor → JobLoop → Program and crash the agent (exit 3) on the first bad step. Smoke test caught this immediately (`echo` against missing `/work` directory crashed the loop). The catch turns the failure into a normal step failure (`StepResult` with ExitCode=-1 + descriptive ErrorMessage), letting the loop continue. Aligns with the spec's "Run steps without a Command are pushed as a step failure (ExitCode=-1) and the loop continues" — same shape, broader coverage. Two new tests (`RunAsync_NonexistentCommand_*`, `RunAsync_NonexistentWorkingDirectory_*`) regression-guard the behavior.
  - category: Implementation
    chose: "**Three classes for what the spec called \"StepExecutor\", not one.** Spec described a single `StepExecutor` doing process spawning + soft-batching + timeout enforcement. That would be ~150 lines violating the 120-line class limit. Split into `ProcessRunner` (Process.Start + readers + timeout + kill), `OutputBatcher` (thread-safe buffer + 50/100ms flush), and `StepExecutor` (orchestrator: validates, wires the two together, emits Started/Completed events, packages result). Each is single-responsibility and ≤90 lines. Same external contract: `IStepExecutor.ExecuteAsync(step, onEvents, ct)`."
  - category: Implementation
    chose: "**Two interfaces (`IRedisJobBus`, `IStepExecutor`) extracted purely for testability.** Spec didn't list them. Without them, `JobLoop` would be coupled to two concrete classes, blocking unit tests via `Mock<>`. The interfaces have one consumer each, so it's a marginal abstraction cost for full unit-test reach."
  - category: Implementation
    chose: "**Wire-format JSON uses string-cased enums (camelCase: `\"run\"`, `\"stdout\"`, …) via `JsonStringEnumConverter(JsonNamingPolicy.CamelCase)`.** Numeric enums would round-trip fine but render as integers in `redis-cli LRANGE` / `XRANGE`"
    reason: |
      which is exactly the debugging tool the spec called out as a reason for picking JSON over Protobuf. Strings make Redis snapshots human-readable. Cost: ~3 bytes per event. Centralized in `WireFormat.Json` so both sides of the wire (agent + future Server pod in p0116) deserialize the same way.
  - category: Implementation
    chose: "**Step backward-compat for missing `kind` field uses default-value parameters on the positional record.** Spec said \"System.Text.Json deserializes a missing enum to the 0 value = Run\""
    reason: |
      that only works if the record parameter has a default. Implemented as `StepKind Kind = StepKind.Run, … int TimeoutSeconds = Step.DefaultTimeoutSeconds`. A missing `kind` field on incoming JSON now deserializes to Run; missing `timeoutSeconds` defaults to 600. Required fields (`schemaVersion`, `stepId`, plus `command` for Run validated by JobLoop) still throw if absent.
  - category: Implementation
    chose: "**WaitForStepAsync polls `LPOP` with 250 ms sleep, NOT `BRPOP`.** Spec mentioned BRPOP/LMPOP. StackExchange.Redis is a multiplexer and doesn't expose true blocking calls (BRPOP would tie up the connection). Polling LPOP with a short sleep is the canonical workaround under StackExchange.Redis and avoids the multiplexer-blocking trap. The 250 ms tick is invisible compared to step durations (seconds-to-minutes)."
  - category: Tooling
    chose: "**Separate test project (`AgentSmith.Sandbox.Agent.Tests`), not added to the existing single `AgentSmith.Tests`.** The repo convention so far has been one consolidated test project. The sandbox agent is meant to be a standalone deployable, and Testcontainers.Redis is a heavy new dep that would slow every unrelated test discovery. The new project keeps the agent's test surface isolated and the existing 1338-test suite untouched. Confirmed with the user before splitting."
  - category: Tooling
    chose: "**NO `ProjectReference` to `AgentSmith.Contracts`.** Spec listed Contracts as a possible reference \"for constants / logging setup if needed\". In practice the agent needs nothing from Contracts"
    reason: |
      its 4 model types (Step/StepEvent/StepResult/RedisKeys) are all new and self-contained. Skipping the reference (a) keeps the self-contained binary lean by avoiding Contracts' transitive dependency on Domain plus all its types, and (b) proves the agent really is decoupled. Confirmed with the user.
  - category: Tooling
    chose: "**CI publish gated to `v*` tags only, NOT main pushes.** Per user direction. The matrix entry for `agent-smith-sandbox-agent` builds on every event (validates the Dockerfile in PRs and on main) but only pushes to Docker Hub when a v* tag is created. Lifts to \"always\" once the Docker Hub repo + description are ready. Implemented via a `publish: tags` matrix key + per-step `if:` on the build-and-push step."
  - category: Security
    chose: "**Git credentials flow via pod env vars, NOT via `step.env`.** This decision pre-existed in the spec but is worth highlighting: anything in `step.env` lands in the Redis input stream and is readable via `redis-cli`. Pod env is only visible via `kubectl describe` (RBAC-gated). The agent passes pod env through to subprocess automatically (Process.Start inherits parent env), so a `git clone` step using `credential.helper='!f() { echo \"username=x-access-token\"; echo \"password=$GIT_TOKEN\"; }; f'` reads the token from pod env without it ever touching Redis. The carrier image deliberately leaves USER unset so the Server pod controls runtime UID/GID per pod (typically matched to the toolchain main container via `fsGroup`)."
