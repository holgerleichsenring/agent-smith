# yaml-language-server: $schema=../decision.schema.json
# p0095c: Lifecycle Recovery
phase: p0095c
decisions:
  - category: Architecture
    chose: "IJobHeartbeatService exposes both `Start(ticketId) → IAsyncDisposable` and `IsAliveAsync(ticketId)`. The second method keeps StaleJobDetector and EnqueuedReconciler in AgentSmith.Application (which doesn't reference StackExchange.Redis). Without IsAliveAsync they'd need direct IDatabase access, forcing them into Infrastructure and breaking the layering. Cost: one extra interface method; benefit: correct layering and tests don't need Redis mocks."
  - category: Architecture
    chose: ListByLifecycleStatusAsync defaults to empty on ITicketProvider. p0095c ships the GitHub impl (GetAllForRepository with label filter). GitLab/AzDO/Jira keep the default
    reason: |
      reconciler becomes a no-op for them until a follow-up phase adds the listing implementations. This is incremental delivery: the recovery infrastructure is in place and exercised for GitHub, other platforms land when their implementations do.
  - category: Architecture
    chose: PipelineExecutor.BeginLifecycleAsync + LifecycleScope (`IAsyncDisposable`) wrap execution with Enqueued→InProgress transition + heartbeat start on entry, and InProgress→Done/Failed + heartbeat stop on disposal. `MarkFailed()` toggles the disposal target status. Scope.Noop is used when no TicketId is in context (manual CLI runs). The disposal runs transitions with CancellationToken.None because the scope must complete even when the pipeline was cancelled
    reason: |
      we want the ticket marked Failed in the cancellation case, not left in InProgress.
  - category: Architecture
    chose: StaleJobDetector + EnqueuedReconciler run unconditionally on every replica in p0095c. Leader-election is deferred to p0096 (which introduces the lease primitive for the poller anyway). Duplicate detector/reconciler work is cheap because all transitions are atomic per platform
    reason: |
      whichever replica wins sees the updated status and the others no-op on their next scan.
  - category: Scope
    chose: Full LifecycleConfig schema (status_labels, reconciler_interval_minutes, heartbeat_ttl_seconds) deferred to a follow-up. p0095c uses hardcoded intervals (heartbeat 30s/2min TTL, stale scan 1min, reconcile 10min) that match p0095a's implicit defaults. LifecycleConfig + Jira native-mode probing are naturally paired
    reason: they land together when someone wants per-project lifecycle label customisation.
  - category: Scope
    chose: OpenTelemetry counters deferred to the same follow-up. Structured logging at Information level covers the observability needs for a small team; metrics make sense when a platform operator team wants dashboards. Adding `System.Diagnostics.Metrics.Meter` is a small additive change when requested.
  - category: TradeOff
    chose: Hosted services (consumer, stale detector, reconciler) are plain classes with RunAsync(ct), not BackgroundService
    reason: |
      matches p0095a's PipelineQueueConsumer decision. Cli has no IHost. Task.WhenAll in ServerCommand composes them. When/if Cli migrates to IHost, conversion is mechanical.
