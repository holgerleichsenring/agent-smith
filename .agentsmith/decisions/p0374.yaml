# yaml-language-server: $schema=../decision.schema.json
phase: p0374

decisions:
  - category: Architecture
    chose: "Mark the last message at the WIRE via a DelegatingHandler (ClaudeHistoryCacheHandler)"
    over: "Rebuild the M.E.AI → native Anthropic message/tool/response mapping to place cache_control natively"
    reason: |
      The M.E.AI ↔ Anthropic adapter (Anthropic.SDK 5.10.0) marks cache_control on
      the last system block + last tool ONLY, never a message — spike-confirmed on the
      wire (Spike_MultiTurn) and matching the live ~29k-of-80k cached share. It exposes
      no per-message hook: setting a native CacheControl via AIContent.RawRepresentation
      was IGNORED (Spike_RawRepresentation: the last message stayed unmarked), and
      ChatClientHelper.CreateMessageParameters is not public, so its mapping can't be
      reused. A full native send would reimplement ~150-250 lines of message/tool/
      response mapping on the hot path (every LLM call) — a mapping bug would break ALL
      Claude runs. The handler instead edits the already-correctly-shaped JSON body just
      before egress: the adapter still does all mapping (free) and parses the response
      (cache-read/write usage intact). ~60 lines, wire-tested, low blast radius.
    alternatives:
      - "AIContent.RawRepresentation carrying a native cache_control — spike-proven ignored by the adapter"
      - "PromptCacheType.FineGrained — marks nothing without native content the M.E.AI path can't reach"

  - category: Scope
    chose: "Mark only the LAST message (tail breakpoint)"
    over: "Multi-anchor placement (also mark a message ~15 blocks back)"
    reason: |
      Anthropic caches up to AND including a breakpoint, so one tail mark caches the whole
      growing prefix — system + tools + all prior messages. Budget: system(1)+last-tool(1)
      +last-message(1) = 3, within the 4-breakpoint limit. Anthropic's breakpoint walks
      back at most 20 content blocks, so a single pass appending >20 blocks can miss the
      prior cache next turn; multi-anchor would cover that but spends the tight breakpoint
      budget. v1 keeps the tail-only rule simple and documents the 20-block edge as a
      follow-up.

  - category: TradeOff
    chose: "Always hand the SDK a caller-built HttpClient (10-min timeout) on the Claude path"
    reason: |
      To insert the handler on the plain sk-ant-api03 path (which previously let the SDK
      build its own HttpClient), the builder now always constructs the HttpClient. This
      also lifts the plain path off the SDK's 100s default onto the 10-min ceiling the
      OAuth path already used (p0235: the 100s default caused "A task was cancelled") — a
      safe, consistent improvement, not just a caching side effect.

  - category: Implementation
    chose: "Gate the handler on the same signal as automatic caching (Cache.IsEnabled ⇒ promptCaching != None); fail-open on any unrecognised body"
    reason: |
      IsEnabled=false sends NO directive at all (no system marker, no history handler),
      keeping the disable switch total. TryMarkLastMessage returns the body untouched on
      malformed JSON, empty messages, string content, or an already-4-breakpoint body — a
      caching optimisation must never corrupt or reject a request.
