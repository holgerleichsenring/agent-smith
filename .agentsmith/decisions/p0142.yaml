# yaml-language-server: $schema=../decision.schema.json
# p0142: SkillCallRuntime consumer migration
phase: p0142
decisions:
  - category: Architecture
    chose: "**All three handler families (SkillRoundHandlerBase + FilterRoundHandler + VerifyRoundHandler) migrate to ISkillCallRuntime in one slice.** Spec proposed three slices; the structural shape (build SkillCallRequest, hand to runtime, translate result) is identical across the three handlers and the cost-scope debt is already closed from p0132a/b. One slice means one PR, one test motion."
    reason: |
      alternatives: per-handler slicing (rejected: no risk reduction since the runtime surface is the same for all three); split by capability (rejected: would tear SkillRoundHandlerBase's Discussion + Structured paths across phases).
  - category: Architecture
    chose: "**Gate-path stays direct (GateRetryCoordinator), NOT routed through SkillCallRuntime.** Gate retry semantics are observation-driven (judge says \"rerun with these objections\"), distinct from RetryCoordinator's mechanical parse/validation retries. The new `onResponse` callback on IGateRetryCoordinator.ExecuteAsync is what closes the deferred-3x cost-scope debt"
    reason: |
      each gate attempt fires the hook, which the calling handler chains to `costTracker.Track`. -- alternatives: route gate through runtime (rejected: conflates two retry policies); accept gate path stays uninstrumented (rejected: p0132a/b/c deferred this three times, debt compounds).
  - category: Implementation
    chose: "**Outcome→CommandResult translation policy lives in the handler, not the runtime.** \"Is Incomplete acceptable?\" depends on what the caller does with the output"
    reason: |
      Discussion: yes (partial observations still useful); Structured Plan/Review: no (gate fails); Filter: yes (partial-batch tolerated via Coverage observation); Verify: yes (partial verifier observations useful). Each handler owns a small `TranslateOutcome` helper. -- alternatives: runtime returns CommandResult directly (rejected: forces semantically-different callers onto identical policy); ISkillOutcomePolicy interface (rejected: ceremony for three short helpers).
  - category: Implementation
    chose: "**`SkillCallRequest.PipelineName` propagated, but SkillCallRuntime doesn't yet call IToolKit.** p0142 wires the field through every consumer's SkillCallRequest. The runtime still receives ToolSet pre-built by the caller"
    reason: |
      IToolKit integration is structural future work (callers would build hosts at call time, see p0145 facade pattern). For now PipelineName is the carrier; ToolKit pickup is a follow-up if/when runtime needs to compose tools itself. -- alternatives: refactor runtime to call ToolKit in p0142 (rejected: would need per-runtime host-construction, scope creep beyond consumer migration).
  - category: TradeOff
    chose: "**`ChatClientFactory.MaxIterationsPerRequest` const STAYS; `Create(...)` signature stays `int? maxIterations = null`.** Spec assumed only 2 callers would remain after migration; reality is 18+ (Triage, ConvergenceCheck, GeneratePlan, GenerateDocs, GenerateTests, IntentParser × 2, PlanConsolidator, CompileKnowledge, QueryKnowledge, EvaluateSkills, BootstrapDocument, BootstrapRound, ProjectAnalyzer, AgenticExecute, FilterRoundHandler.GetMaxOutputTokens, GateRetryCoordinator.CallAsync, SkillCallRuntime). Removing the const would ripple through every one. The const is fine where it lives"
    reason: |
      runtime + AgenticExecute pass explicit caps where they care; everyone else keeps the default. -- alternatives: required int + ripple through 18 callers (rejected: massive scope creep, low value — the default isn't actively wrong for non-skill paths); rename const + force callers to opt out (rejected: same ripple).
  - category: TradeOff
    chose: "**`AgenticExecuteHandler` cap-from-LoopLimitsConfig wiring deferred.** Spec asked AgenticExecute to inject `IOptions<LoopLimitsConfig>` and pass `MaxToolCallsPerSkill` to Create. Skipped"
    reason: |
      AgenticExecute is the one IChatClientFactory.Create caller that the spec said "stays on its current path"; its current default-cap behaviour matches what a runtime-routed Implementation-phase call would emit. If a real operator-evidence case surfaces where 25 vs 30 iterations matters, that's a single-line follow-up. -- alternatives: do the wiring anyway (rejected: speculative — no evidence the 5-iteration delta has ever bitten anyone); deprecate the default branch in code-comments (rejected: noise without action).
  - category: Implementation
    chose: "**`VerifyRoundHandler` ctor drops `IChatClientFactory` + `LoopLimitsConfig`.** Both were direct dependencies of the pre-p0142 chat-call path. Post-migration the runtime owns the chat client + the cap resolution (via `_limits.ResolveToolCallCap(InvestigatorMode)` inside SkillCallRuntime.TryInvokeAsync). Removing the unused ctor params keeps the handler's surface honest"
    reason: |
      no dead deps. -- alternatives: keep the unused params for "future use" (rejected: dead-code smell; SOLID-D says depend only on what you use).
  - category: Implementation
    chose: "**`HitLimit` is a string label on CallCostRecord, not a typed enum.** The operator-visible signal is \"this skill call returned partial output, here's why\". Values today: `tokens / wall-clock / tool-calls / llm-calls` (the four LimitEnforcer cap-points). A typed enum would push the contract into log/persist surfaces (PerSkillBreakdown markdown, run-result JSON sidecar if/when persisted) that benefit from open-ended evolution."
    reason: |
      alternatives: typed LimitKind enum (rejected: contract churn when LimitEnforcer grows a new cap); top-level "any limit fired" boolean (rejected: loses the diagnostic value).
  - category: Implementation
    chose: "**`LimitEnforcer.HitLimit` records the FIRST cap reason, not the latest.** A single skill call typically hits at most one cap (the enforcer cancels the cts on cap, so subsequent calls return immediately). But if a misbehaving caller pumps more RecordLlmCall after the cancel, the first-cap label is the load-bearing signal"
    reason: |
      that's the limit that ACTUALLY terminated the call. Newer caps are noise. -- alternatives: latest-wins (rejected: hides the actual termination cause); accumulate as list (rejected: over-spec for diagnostic value).
  - category: TradeOff
    chose: "**PerSkillBreakdown column rendering is an inline suffix, not a separate table column.** Current `RunResultSectionWriter.AppendPerSkillBreakdown` renders one bullet line per call (`- {skill} ({role}, {phase}): N in / N out / N tools / Nms`). Spec proposed a markdown table with a new \"Limit\" column. Inline `(limit: tokens)` suffix is the minimal-disruption change that keeps the existing format for operators who already parse it. If a real markdown table is desired later, that's a renderer rewrite"
    reason: |
      orthogonal to the data-flow this phase delivers. -- alternatives: separate table column (rejected: changes the entire rendering shape for what is a per-call diagnostic field); silent (rejected: defeats the point of recording HitLimit).
