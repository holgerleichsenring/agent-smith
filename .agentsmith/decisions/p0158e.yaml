# yaml-language-server: $schema=../decision.schema.json
# p0158e: Multi-sandbox-per-repo
phase: p0158e
decisions:
  - category: Architecture
    chose: "**N sandboxes, one per configured repo"
    reason: |
      orchestrator stays central, execution becomes decentralised.** Mixed-stack multi-repo projects (.NET server + npm client + markdown docs in one ticket) cannot share a container because each stack needs its own runtime toolchain. The unified-run model from p0158a-d stays: one PipelineQueueConsumer dispatch, one agent loop, one plan, one set of cross-linked PRs. p0158e replaces the single-sandbox plumbing inside PipelineSandboxCoordinator with a Dictionary<repoName, ISandbox>; per-repo toolchain resolution uses the existing p0135 layered chain applied to THAT repo's source provider (NOT an aggregate across repos), so each sandbox can boot with the right image. Operators with mixed-stack projects now work without operator-built composite images. -- alternatives: composite multi-stack image (rejected at the umbrella scope.out as a stop-gap that explodes image size and version conflicts); same-stack-only multi-repo (rejected — this is the explicit mixed-stack case); sandbox-per-language grouping (rejected: more complex routing for marginal container-count savings).
  - category: Architecture
    chose: "**Agent's mental model and tool-call paths stay unchanged from p0158b (`server/src/Foo.cs`). The tool layer routes; the agent doesn't see the sandbox boundary.** Explicit `read_file(repo, path)` would require a tool-surface version bump and skill-catalog rewrites everywhere. The FilesystemToolHost now holds an IReadOnlyDictionary<string, ISandbox> internally; every path-based tool call parses the first segment as a repo name, strips the prefix, and dispatches the bare path to that repo's sandbox where /work is the repo root. PromptPrefixBuilder's `Repos in scope` section teaches the convention once. -- alternatives: explicit repo parameter on every filesystem tool (rejected: large surface change, skill-catalog churn); virtual-FS layer hiding the sandbox boundary (rejected: hides the layout from the agent so debugging becomes mystery"
    reason: operator prints a path and can't grep it on the host).
  - category: Architecture
    chose: "**Inside each sandbox /work = THAT repo's root, NOT /work/{repo-name}/. The repo-prefixed addressing scheme exists only at the tool-host layer.** p0158b's `/work/{name}/` layout was a single-sandbox addressing scheme. With per-repo sandboxes each container holds one repo; layering an unnecessary subdir inside every sandbox adds confusion for skills that run inline shell commands (`dotnet build` would need `cd server` first). External addressing (orchestrator → tool host) stays with the `server/...` prefix; internal sandbox view is just /work. Repository.LocalPath reverts to a const = SandboxWorkPath."
    reason: |
      alternatives: keep /work/{name}/ inside each sandbox (rejected: stutter); make the subdir name configurable per repo (rejected: speculative flexibility, no caller needs it).
  - category: Implementation
    chose: "**FilesystemToolHost keeps the single-sandbox back-compat constructor.** Eight construction sites today pass a single ISandbox to `new FilesystemToolHost(sandbox, ...)`"
    reason: |
      VerifyRoundCoordinator, ProjectAnalyzer, BootstrapToolHostFactory, the round policies. Migrating each one in p0158e would have multiplied the blast radius without delivering multi-repo capability where they don't need it (bootstrap and scan-style flows are inherently single-target). The back-compat ctor wraps the single sandbox in a Dictionary<empty, sandbox> so the same routing logic handles both shapes — no separate code path. Multi-repo-aware handlers (AgenticExecute, GenerateTests, GenerateDocs) read ContextKeys.Sandboxes + ContextKeys.Repos and pass the dict explicitly. -- alternatives: hard-rename ctor + force all 8 sites to migrate (rejected: scope creep, the four single-repo-purpose sites have no multi-repo benefit); two FilesystemToolHost classes (rejected: dual maintenance cost for one routing concern).
  - category: Implementation
    chose: "**run_command tool gains a required `repo` parameter on multi-repo runs; single-repo runs accept it as optional.** Unlike filesystem tools whose first path segment naturally encodes the repo, shell commands don't carry that information. Requiring `repo` on multi-repo makes ambiguity impossible. Single-repo back-compat preserves every existing skill prompt that issues `run_command(cmd)` without a repo argument. The agent learns via the prompt prefix's `Repos in scope` line and the tool's [Description] copy."
    reason: |
      alternatives: derive repo from the working_directory of the command (rejected: not every command uses working_directory); always require repo (rejected: back-compat break for single-repo); default to primary on multi-repo (rejected: silent mistargeting, exactly the surprise multi-repo unified-run is supposed to prevent).
  - category: Implementation
    chose: "**All N sandboxes created eagerly on first sandbox-requiring command"
    reason: |
      predictable timing, slight resource waste accepted.** Lazy per-repo creation saves resources but complicates lifecycle (when does each repo's sandbox come up? what if the agent surprises us by accessing repo X late?). Eager creation: every sandbox is up before the first tool call, paths are immediately routable, dispose-all is symmetric to create-all. The waste (a sandbox for `docs` that the bug-fix pipeline never touches) is real but small (alpine-class image, ~50MB, ~50ms cold start). -- alternatives: lazy per-repo (rejected: timing surprises, harder error reporting); on-demand at the tool-host level (rejected: tool-host shouldn't be in lifecycle management).
  - category: Implementation
    chose: "**ContextKeys.Sandbox (singular) kept during p0158e, populated from Sandboxes[Repos[0].Name].** Several handlers/coordinators (AgenticExecute legacy path, VerifyRoundCoordinator, BootstrapToolHostFactory, ProjectAnalyzer, the round policies) still read ContextKeys.Sandbox. Marking the singular key deprecated and populating it from primary lets the new dict coexist without forcing every reader to migrate in the same phase. Removal of ContextKeys.Sandbox is a separate cleanup phase once every reader is migrated."
    reason: |
      alternatives: hard remove (rejected: scope creep into p0158f territory and beyond); keep forever (rejected: dead-weight ambiguity once Sandboxes is everywhere).
  - category: TradeOff
    chose: "**Existing hardcoded slug→image mapping in SandboxSpecBuilder.LanguageImages is left unchanged.** p0155 + the user's reinforcement of \"no hardcoded language detection\" applies here too, but p0158e's job is sandbox topology (one→N), not vocabulary cleanup. Moving that map to operator-controlled config (operator decides slug→image, no C# hardcoding) is a separate follow-up phase; p0158e does NOT add new entries to the map and does NOT introduce new in-code language detection."
    reason: |
      alternatives: extend the map for this case (rejected: contradicts the principle); inline language detection (rejected: contradicts the principle); refactor the map to config in this phase (rejected: scope creep, would dominate the phase).
  - category: TradeOff
    chose: "**Per-repo bootstrap (BootstrapCheck/Gate/Dispatch/Round, LoadContext, LoadCodingPrinciples, AnalyzeProject, PublishProjectLanguage, TestHandler) stays in p0158f.** The multi-sandbox foundation from p0158e is the prerequisite"
    reason: |
      per-repo bootstrap writes go into each repo's OWN sandbox at /work/.agentsmith/, which only makes sense once each repo HAS its own sandbox. Splitting the work this way keeps p0158e focused on sandbox topology and gives p0158f a clean per-repo write target. -- alternatives: bundle p0158f into p0158e (rejected: doubles the phase blast radius, same risk that bit p0158b's smoke).
