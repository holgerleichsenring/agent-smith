# yaml-language-server: $schema=../decision.schema.json
# p0102a: API Scan Source Checkout
phase: p0102a
decisions:
  - category: Architecture
    chose: `TryCheckoutSourceHandler` mirrors `CheckoutSourceHandler` but is fail-soft. Two handlers with shared `ISourceProviderFactory` is clearer than one handler with a policy flag
    reason: |
      security-scan keeps strict semantics (any clone failure is fatal), api-scan never fails the pipeline. The handler returns `Ok` in every branch; downstream `ApiCodeContextHandler` decides what to do based on whether `ContextKeys.SourcePath` is set.
  - category: Architecture
    chose: "Single source-of-truth contract downstream: `ContextKeys.SourcePath`. Whether the path comes from `--source-path` (CLI), a configured Local source, or a fresh remote clone, every consumer reads the same key. `ContextKeys.Repository` (set by the strict `CheckoutSourceHandler`) is intentionally not introduced into the api-scan flow"
    reason: keeps one mechanism, one read site.
  - category: Architecture
    chose: Branch resolution differs from the strict `CheckoutSourceContextBuilder`. api-scan has no `TicketId` in scope, so `BranchName.FromTicket` does not apply and `ContextKeys.CheckoutBranch` (set by webhooks) is also ignored. Branch comes from `SourceConfig.DefaultBranch` only; if unset, the provider's default ('main') wins. Read-only inspection
    reason: checking out a ticket-scoped branch would be wrong here.
  - category: Implementation
    chose: "Auth presence is not pre-checked from `SourceConfig.Auth`. `SourceProviderFactory.CreateGitHub` (and the GitLab/AzureRepos siblings) ask `SecretsProvider.GetRequired(\"GITHUB_TOKEN\")` which can resolve via env vars, secret stores, or any other registered source. A naive `if (string.IsNullOrEmpty(source.Auth))` guard would shadow valid auth paths. Instead the handler wraps `factory.Create(source) + provider.CheckoutAsync(...)` in try/catch and treats any failure (missing token, network unreachable, invalid URL, transient git error) the same way: log warning, fall back to passive mode."
  - category: Implementation
    chose: "Banner moved to two phases. Pre-flight in `ApiScanCommand` shows mode + 'Resolving source...'; the final 'Source: <path or unavailable> | ~N skill(s)' is emitted by `TryCheckoutSourceHandler` via `ILogger.LogInformation` after each branch decides. `EstimateSkillCount` moved out of the CLI into the handler so the count reflects the actual resolved state, not the CLI flag's pre-flight guess. No event-subscriber plumbing"
    reason: direct logger output is sufficient.
  - category: Architecture
    chose: Conditional execution lives in the handler, not in pipeline composition. `PipelinePresets.ApiSecurityScan` is a static list with `TryCheckoutSource` always first; the handler decides at runtime whether the source is configured/reachable and shortcircuits to passive mode if not. Dynamic step injection was considered (and discussed in spec) but rejected
    reason: |
      it would have been a larger architectural change for no semantic gain in this case.
  - category: Implementation
    chose: Clone caching is provider-owned, not phase-owned. `ISourceProvider` implementations (GitHub/GitLab/AzureRepos) clone into `Path.GetTempPath()/agentsmith/<owner>/<repo>` and short-circuit re-clone via `LibGit2Sharp.Repository.IsValid`. Same persistent cache `security-scan` already uses; api-scan inherits the convention as-is. No new cleanup hook in `TryCheckoutSourceHandler`
    reason: |
      disposal is the user's concern. Stale-cache risk (out-of-date local clone vs upstream) exists today and is not regressed by this phase.
  - category: Scope
    chose: `ApiCodeContextHandler` was not modified beyond a doc-comment refresh. The existing `TryResolveSourcePath` already reads `ContextKeys.SourcePath` and is agnostic to who set it
    reason: |
      the handler reads the same key whether the value came from the CLI flag, the Local source resolution, or a remote clone result. One read site, three producers.
