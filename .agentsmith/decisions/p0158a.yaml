# yaml-language-server: $schema=../decision.schema.json
# p0158a: Spawn-side collapse of the per-repo fan-out
phase: p0158a
decisions:
  - category: Architecture
    chose: "**Sliced from p0158 retroactively into p0158a (enqueue side) + p0158b (consumer side).** The original p0158 spec was implementable end-to-end, but the consumer-side change (handler iteration + workdir layout `/work/{repo-key}/` + PR cross-link two-pass across three platform APIs + CLI `--repo` on eight commands + ~20 new tests + fixture updates at every handler boundary) realistically does not fit in one conversation. p0158a delivers the smallest standalone slice that dissolves the originating multi-repo reconciler bug (multi-repo project orphan tickets looped on ResolveCurrentRepo's multi-repo throw every reconcile interval), keeps the codebase clean+green, and unblocks p0158b. The umbrella file stays in done/ as the design-intent record, mirroring the p0140-umbrella convention."
    reason: |
      alternatives: ship p0158 as one commit (rejected: realistically multi-conversation, partial states higher-risk than a clean slice); ship only an EnqueuedReconciler hotfix (rejected: RepoName-as-field stays as a misleading contract and ResolveCurrentRepo's resolve-from-name path stays as a latent multi-repo trap).
  - category: Architecture
    chose: "**Repos[0] read on the consumer side is the explicit transitional contract for p0158a.** Every builder/coordinator that previously read CurrentRepo now reads `pipeline.Get<IReadOnlyList<RepoConnection>>(ContextKeys.Repos)[0]`. For single-repo projects this is bit-for-bit identical to pre-p0158a (one repo, list of length 1, index 0 IS that repo). For multi-repo projects this means only the first configured repo is processed; sibling repos appear in the list but are ignored by builders. This is a known limitation of the slice"
    reason: |
      p0158b lifts it by introducing per-repo handler iteration and the workdir-layout change. -- alternatives: change every Context type to be list-shaped immediately (rejected: cascades into handler and test-fixture rewrites at every boundary, defeats the slicing premise); throw on multi-repo at the consumer side until p0158b (rejected: would re-introduce a multi-repo-loop-equivalent bug right after removing it at the enqueue side).
  - category: Implementation
    chose: "**ClaimSpawnAsync (list) collapsed to ClaimAsync (single); new internal SingleClaimRegionExecutor extracted from TicketClaimService.** The list-shaped ITicketClaimService.ClaimSpawnAsync was added in p0140b for the fan-out that p0158a removes. With one request per ticket, the list is always length 1, so the list-shaped interface is dead weight and AssertSharedTicket becomes a trivially-true no-op. Inlining the in-lock body (lifecycle read, Pending→Enqueued transition, enqueue) directly into TicketClaimService would push it over the 120-LOC limit; extracting to SingleClaimRegionExecutor (55 LOC) keeps TicketClaimService at 60 LOC and isolates the region semantics from the orchestrator."
    reason: |
      alternatives: inline into TicketClaimService and accept >120 LOC (rejected: breaks the hard limit in coding-principles.md); keep ClaimSpawnAsync as a one-element wrapper around ClaimAsync (rejected: YAGNI, no caller benefits, the wrapper is the kind of "what if fan-out comes back" speculation the principles warn against).
  - category: Implementation
    chose: "**ContextKeys.SourceOverrideRepo added at the read side now, even though no CLI populates it yet.** The CLI step in p0158b will set this key from `--repo NAME`. Adding the read side in ExecutePipelineUseCase.ResolveRepos + SourceConfigOverrider at this slice means p0158b's CLI work is purely additive (CLI flag + ContextKeys population), not a cross-cutting consumer-side change that would have to touch the ExecutePipelineUseCase again. The unread key is a documented no-op until p0158b lands."
    reason: |
      alternatives: defer the read side to p0158b (rejected: would force p0158b to re-open ExecutePipelineUseCase for what is logically a CLI-only change); rename the key in p0158b (rejected: noisy churn for no benefit).
  - category: Implementation
    chose: "**PipelineSandboxCoordinator's toolchain-language resolution loops Repos with fall-through, even though only Repos[0] is otherwise honoured at this slice.** SandboxLanguageResolver is called for each repo in order; the first non-null language wins; GenericFallback if none resolve. This is the spec's p0135-followup behaviour and costs nothing extra here (the surrounding code already does sequential calls), so landing it now avoids a tiny one-line edit in p0158b."
    reason: |
      alternatives: defer the loop to p0158b (rejected: trivially small, fits cleanly in this slice's PipelineSandboxCoordinator touch).
  - category: TradeOff
    chose: "**Reconciler code unchanged in p0158a"
    reason: |
      the bug is dissolved, not patched.** EnqueuedReconciler.ReconcileProjectAsync already constructed a PipelineRequest without RepoName. The original multi-repo loop required (a) a RepoName-missing request and (b) ResolveCurrentRepo to throw on multi-repo. p0158a removes (a) by deleting the RepoName field and (b) by deleting ResolveCurrentRepo. The reconciler now Just Works for multi-repo projects without any code change to the reconciler itself — by the unified-run model, "re-enqueue one PipelineRequest per orphan ticket" is the right behaviour. -- alternatives: add a non-N assertion test to lock the behaviour (deferred to p0158b's test step, where it has more company in the new-tests bucket).
  - category: TradeOff
    chose: "**p0023 (planned/p0023-multi-repo-update.yaml) deleted as superseded.** The old design (primary repo + consumer repos + sequential dialogue) was incompatible with the unified-run model agreed in the p0158 design discussion; keeping the file in planned/ would have invited confusion. Removed at this slice rather than at p0158b so the planned/ folder reflects the actual roadmap from p0158a forward."
    reason: |
      alternatives: move to done/ with a SUPERSEDED marker (rejected: it was never implemented, "done" would be misleading); keep until p0158b (rejected: serves no purpose between slices).
