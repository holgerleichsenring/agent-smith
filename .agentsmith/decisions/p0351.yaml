# yaml-language-server: $schema=../decision.schema.json
phase: p0351
decisions:
  - key: "Scope was already mostly shipped by p0345c: /api/config/capabilities + write-enforcement (ValidateTracker/ValidateProjectResolution throw on unknown, coverage tests as tripwires) already made tracker/connection types, providers, pipelines and resolution strategies stringent + drift-proof. The ONLY remaining free-text gap was the model-role KEYS (the agent form's 'add role' box) and the absence of pricing enforcement. This phase is narrowed to exactly that — it does NOT re-build the type/provider/pipeline stringency."
  - key: "Roles are exposed from code truth via the SAME capabilities descriptor (new ConfigCapabilities.Roles), not a hardcoded TS list — the anti-drift rule p0345c set. RoleCapabilities = the reserved 'coding' (the agent's top-level model/deployment) + every TaskType member (reasoning flagged optional), keys camelCased to match ConfigCatalogMapper's models map exactly (char.ToLowerInvariant(name[0]) + name[1..] → contextGeneration/codeMapGeneration). A coverage test asserts every TaskType role is present, so a new TaskType without a role fails the build."
  - key: "ValidateAgent enforces both halves on upsert, wired into DbConfigStore.UpsertAgent (symmetric with ValidateTracker): an unknown model-role key is rejected (only the fixed set routes to a model — a typo used to be silently dropped), and every routed model must have a pricing entry on that agent (empty/unset optional roles are skipped). Surfaced as ConfigurationException → HTTP 400 by the existing Guard. The DbConfigStoreTests Agent() helper now carries pricing for its coding model — the correct consequence of the rule, not a workaround."
  - key: "Frontend renders the fixed role set from capabilities.roles as rows, not a free-text add-role box: required roles are always-present rows, the optional reasoning role is a seed until added, and each row flags 'no pricing entry' when its model is unpriced (mirroring the save-time rule so the operator sees it before the 400). The AgentForm test was rewritten off the removed add-role flow onto the fixed 'coding' row."
