# p0053: Documentation Site
phase: p0053
decisions:
  - category: Architecture
    chose: MkDocs + Material theme over custom solution
    reason: reduces maintenance burden, leverages community defaults
  - category: Architecture
    chose: README trimmed to landing page, docs site as authoritative source
    reason: solves discoverability and information architecture split
