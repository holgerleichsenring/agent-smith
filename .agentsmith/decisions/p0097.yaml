# yaml-language-server: $schema=../decision.schema.json
# p0097: Parallel Skill Rounds
phase: p0097
decisions:
  - category: Architecture
    chose: DeferredBuffers context key as the channel between handler base and executor. SkillRoundHandlerBase always builds a `SkillRoundBuffer`; if the executor put a list under `ContextKeys.DeferredBuffers` before dispatching the batch, the handler appends to it and returns; otherwise it applies the buffer immediately (sequential default). Public `ICommandHandler.ExecuteAsync` signature unchanged
    reason: |
      no new interface, subclass handlers (SkillRoundHandler/SecuritySkillRoundHandler/ApiSkillRoundHandler) stay one-liners. Alternatives considered: (a) new `ISkillRoundCollector` returning `(CommandResult, SkillRoundBuffer)` — adds plumbing to every handler; (b) explicit flag in PipelineContext queried by handlers — same idea, more verbose. Picked the channel approach because presence/absence IS the signal.
  - category: Architecture
    chose: Observation IDs assigned at merge time, not parse time. `ObservationParser.ParseWithoutIds` returns `Id=0` for every entry; `ApplyBufferToContext` reads the runtime list, computes `nextId = Max(o.Id) + 1`, and stamps each buffer entry under the executor's serial merge order. Parallel completion order does NOT affect IDs
    reason: |
      graph order does. Cross-run ID stability is NOT claimed (LLMs vary observation count run-to-run); the contract is "deterministic within a single run."
  - category: Architecture
    chose: "`PipelineBatchRunner` extracted from PipelineExecutor as a separate class (composition over fat orchestrator). Reason: PipelineExecutor was already over the class-size limit before parallelism arrived; adding fan-out + cancellation + buffer-merge would push it well past 500 lines. Extraction also models the runner as a real responsibility (parallel execution under throttle) instead of a private detail. PipelineExecutor now owns main loop + sequential single-step path + lifecycle; the runner owns SemaphoreSlim, linked CTS, and merge."
  - category: Architecture
    chose: `BatchOutcome` value object replaces a tuple-of-arrays return shape from the runner. The two queries operators care about post-batch
    reason: |
      first failure (fail-fast reporting) and first InsertNext (sequential follow-up insertion) — sit on the outcome as named methods. Keeps PipelineExecutor's batch handler short and the intent legible.
  - category: Implementation
    chose: Buffer merge in graph order, not completion order. `MergeBuffersInGraphOrder` walks the original `LinkedListNode<PipelineCommand>` list and looks each skill name up in a `Dictionary<string, List<SkillRoundBuffer>>` built from the deferred list. Tasks may complete in any order, but merge order is fixed by the topology.
  - category: TradeOff
    chose: CancellationToken cancels orchestration but NOT in-flight LLM calls. Once the SemaphoreSlim releases and the inner `commandExecutor.ExecuteAsync` is past the point of return, Polly retries can still fire and Anthropic responses run to completion. Cost is recorded for every settled call (cancelled task's cost is tracked before the cancellation throws), so the cost report stays trustworthy. Operators should expect close-to-full batch cost even when one slot fails. Documented because "CTS = stop everything" is a reasonable misread.
  - category: TradeOff
    chose: `MaxCommandExecutions` (100) counts each command in the batch once. A 13-skill stage burns 13 of 100 in one parallel burst
    reason: |
      same total as today's sequential path, just consumed in fewer wall-clock seconds. Acceptable for now; revisit if security-scan pipelines with nested OBJECTIONs trip the guard.
  - category: Implementation
    chose: PipelineCostTracker switched from `Interlocked.Add`/`Increment` to a `lock`-based design. `Interlocked` covered the int counters but `_lastModel` write was already racy and `EstimateCostUsd`/`ToString` read multiple fields non-atomically. One lock simplifies the model and the contention window is negligible relative to the LLM call.
  - category: Implementation
    chose: PipelineContext `Dictionary<string, object>` wrapped under a single lock. The deferred-buffer pattern means most parallel writes go through the locked `List<SkillRoundBuffer>` in DeferredBuffers, but handlers still call `pipeline.Set(ContextKeys.ActiveSkill, name)` during execution. ConcurrentDictionary was considered but would force callers using `Get<T>` to handle missing-key differently. Single lock keeps the surface identical.
  - category: Architecture
    chose: "Parallelism opt-in via `agent.parallelism.max_concurrent_skill_rounds` (default 1). Sequential path is byte-identical to pre-p0097: same logging, same execution trail, same observation IDs given identical LLM output. Verified by full test suite (1089 → 1105, +16 new tests) all green at default."
  - category: TradeOff
    chose: Logging stays per-command in batch mode (each slot logs its own `[{Step}/{Total}] Executing ...` and `... completed`). With 13 parallel slots this can interleave on stdout
    reason: |
      tolerable in CLI mode, potentially noisy on Slack/Teams progress streams. Spec flagged this for verification; no batch-aware progress event added in p0097. Revisit if UX feedback on production runs (with `MaxConcurrentSkillRounds=4`) shows actual flooding.
  - category: Scope
    chose: "InsertNext semantics on batch: first-in-graph-order InsertNext wins. If skills A and B in the same batch both return InsertNext, only A's follow-ups are queued. Conservative choice"
    reason: |
      alternatives (concatenation, voting) considered too clever for the typical use case (OBJECTION from one skill triggering a single targeted re-round). Documented so future-self doesn't reinvent it.
