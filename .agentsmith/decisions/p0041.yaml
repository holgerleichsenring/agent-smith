phase: p0041
decisions:
  - category: Architecture
    chose: IDecisionLogger with nullable repoPath and tell-don't-ask pattern
    reason: handlers always log, implementation decides what to do
  - category: Implementation
    chose: FileDecisionLogger + InMemoryDecisionLogger split
