    p0141: "Email tracker type + Message-Family infrastructure. One mail → one pipeline run; minimal schedule-appointment example. PipelineExecutionMode (Code|Message) discriminator; new SkillExecutionPhase values Read/Process/Write; IRunBlobStorage with concept-pointer convention for large payloads; first production SkillCallRuntime consumer. Tools execute directly (no Action-Queue). Requires p0145. → .agentsmith/phases/planned/p0141-email-tracker.yaml"
    p0143b: "DataFlow wildcard removal (follow-up to p0143's deferred scope items 5+6). Replaces the `*` wildcard in DataFlowReadGate with per-preset explicit edges. New DataFlowReadMode enum (Enforce / Warn / Discover) replaces the bool enforce flag — Discover mode + DataFlowDiscoveryAggregator JSON sidecar lets an operator smoke against all 10 presets generate the migration edge-set data-driven. Per-preset explicit edges in 10 *DataFlow.cs classes (C# not YAML so refactoring tools see drift). PermissivePhaseDataFlow base deleted; new PhaseDataFlowConfigValidator fails fast at *DataFlow.cs ctor time on any wildcard. PipelineDataFlowConfig binds both legacy `enforce: bool` and new `mode: enforce|warn|discover` for backwards compat. config/agentsmith.yml defaults to Enforce; agentsmith.example.yml stays Warn for operator soft migration. ~21 new tests. → .agentsmith/phases/planned/p0143b-dataflow-wildcard-removal.yaml"
    p0155: "LLM owns the project-language vocabulary end-to-end. Deletes ProjectLanguageMapper (closed csharp/node/python/generic enum from p0130c); PublishProjectLanguageHandler publishes ProjectMap.PrimaryLanguage verbatim after trim+lower. TestHandler.ResolveTestCommand reads Ci.TestCommand verbatim (shell-tokenised) and drops the PrimaryLanguage switch that silently skipped tests on non-{csharp,node,python} repos and miscoded C# in run a6914f38. IsTrxCapable derives from command-prefix, not language. project-analyzer prompt teaches lowercase canonical slugs by rule. Cross-repo: agent-smith-skills concept-vocabulary.yaml relaxes project_language from enum to string; generic-bootstrap becomes an explicit LLM choice, not a silent fallback. BootstrapDispatch stays fail-loud on no-match with the language slug + available skill names in the error. Supersedes the ProjectLanguageMapper-related decisions of p0130c. → .agentsmith/phases/planned/p0155-llm-owned-language-vocabulary.yaml"
    p0157: "Non-DI ctor elimination. 38 implementation classes across Application/Infrastructure/Server/Sandbox carry non-service ctor parameters (22 hybrid DI+value, 16 pure-value). Four conversion patterns: Options (15 classes → IOptions<T> binding), Factory (8 multi-string credential ctors → one ProviderConnection record each), Stateless (10 classes → strip ctor state, move to method arg or scoped context), Value (5 classes → collapse to record). Adds an architectural test (NonDiCtorRuleTests) that fails any new service ctor with a non-interface non-record non-IOptions parameter. (Renamed from the originally-planned p0152 which collided with the already-shipped p0152-cleanup-after-p0151.) → .agentsmith/phases/planned/p0157-non-di-ctor-elimination.yaml"
    p0146: "Umbrella — retire every regex-based 'understand-by-pattern' layer that duplicates the LLM. Five independent sub-phases (a..e), each closes one regression. p0146a done; b/c/d/e in planned/. → .agentsmith/phases/planned/p0146-delete-regex-intelligence-layer.yaml"
    p0146b: "Retire RegexIntentParser; LlmIntentParser already exists. CLI dry-run + legacy string overload either route through Llm or get deleted. → .agentsmith/phases/planned/p0146b-retire-regex-intent-parser.yaml"
    p0146d: "ObservationParser stops regex-fishing file:line + HttpEndpoint from descriptions. Skill output schema gets explicit file / start_line / api_path fields. → .agentsmith/phases/planned/p0146d-observation-explicit-location-fields.yaml"
    p0146e: "CommentIntentParser keeps the slash-prefix discriminator (`/approve`, `/reject`, `/agent-smith ...` — structural UI contract) but the PipelineAliases table and the free-text tail after the command go to a Haiku LLM call. → .agentsmith/phases/planned/p0146e-comment-intent-tail-to-llm.yaml"
    p0158d: "Fourth slice of p0158: CLI ergonomics + multi-repo guard. SourceOptions gains `--repo NAME` (Option<string?>); ApplyTo populates ContextKeys.SourceOverrideRepo (read by ExecutePipelineUseCase since p0158a). All eight source-using CLI commands inherit the flag automatically via the existing SourceOptions.AddTo wiring (no per-command edits needed). New multi-repo guard in ExecutePipelineUseCase.ResolveRepos: when ContextKeys.Source{Type/Path/Url/Auth} is set without ContextKeys.SourceOverrideRepo on a project with Repos.Count > 1, throws InvalidOperationException with the project name + known-repos list. Single-repo projects keep accepting --source-* without --repo (legacy ergonomics). Guard lives in the use case, not in SourceOptions, so non-CLI entry paths (webhooks, pollers, future intents) are covered automatically. CHANGELOG entries are commit-message-driven via conventional-commits + release-please — the p0158a/b/c/d commits use `feat(...)!: ...` (breaking-change) with detailed migration bodies. Operator /smoke gate documented as the spec's done criterion (executed by the operator at release time, not by the agent). 3 new tests in ExecutePipelineUseCaseReposTests cover the guard (rejected on multi-repo without --repo, accepted with --repo, accepted on single-repo). 1969 main + 83 sandbox tests passing (+3 net new). p0158 umbrella closed. → .agentsmith/phases/done/p0158d-cli-and-cleanup.yaml"
