    p0108: "Poller discovery — closes the webhook-equivalence gap. Pre-phase: pollers only queried 'agent-smith:pending' lifecycle tag, so webhook-less deployments couldn't ingest tickets even when the user tagged them with fix/feature. Post-phase: each poll cycle runs discovery (find tickets in open states matching any pipeline_from_label key, in lifecycle ∈ {none, Pending}) AND catchup (existing Pending query), merged + deduped + filtered by LifecyclePollFilter. New ITicketProvider.ListByLabelsInOpenStatesAsync method on all 4 providers (AzDO/GitHub/GitLab/Jira) with platform-native OR-semantics (WIQL OR-of-CONTAINS, GitHub/GitLab dedupe-per-label loop, Jira JQL labels-IN). Discovery is auto-disabled when pipeline_from_label is empty (no regression for webhook-only projects). Polling is now a complete webhook substitute. 1220 tests."
    p0109: "Jira lock decorator: IRedisClaimLock removed from JiraTicketStatusTransitioner — fetch-then-PUT is plain HTTP now. New LockedTicketStatusTransitioner wraps any ITicketStatusTransitioner with SETNX label-lock around TransitionAsync (ReadCurrentAsync passes through). New LockingTicketStatusTransitionerFactory selectively decorates the Jira branch only (other platforms have native optimistic concurrency via ETag/rev). Infrastructure DI registers plain TicketStatusTransitionerFactory under both the interface and concrete type; Server's new AddJiraLabelLockDecorator() extension (called after AddCoreDispatcherServices to win the last-write) rebinds the interface to the locking variant. CLI never carries IRedisClaimLock — apiscan boot path resolves PipelineExecutor → ITicketStatusTransitionerFactory without the missing-service crash. NullRedisClaimLock orphan deleted; ServerDiLifetimeTests rebased onto Mock<IRedisClaimLock>. New EnvVarCollection xUnit collection serializes env-mutating tests against existing FactoryTests. 1237 tests."
    p0109a: "Server-lifecycle decoupling: PipelineExecutor no longer takes IJobHeartbeatService or ITicketStatusTransitionerFactory directly. New IPipelineLifecycleCoordinator interface; Application registers NoOpPipelineLifecycleCoordinator as the safe default; Server's AddServerCompositionOverrides (renamed from AddJiraLabelLockDecorator) rebinds to TicketAwarePipelineLifecycleCoordinator (Enqueued→InProgress + heartbeat + InProgress→Done/Failed dispose). ITicketClaimService registration moved from Application to Server — only WebhookRequestProcessor + PollerHostedService consume it, both Server-instantiated. NullTicketClaimService orphan deleted. CliShapedDiTests gains real regression-guards: PipelineExecutor end-to-end resolution + assertion that IJobHeartbeatService/ITicketClaimService are absent in CLI graph + a smoke test that uses the production AgentSmith.Cli.ServiceProviderFactory.Build composition. Real-CLI smoke confirmed: api-scan and security-scan boot through the full pipeline (fail later on legitimate config/env issues, not DI). 1265 tests."
    p0110a: "IAgenticAnalyzer abstraction + grep tool. Provider-neutral types in Contracts (ToolDefinition, ToolCall, ToolResult, AnalysisResult, IToolCallHandler, IAgenticAnalyzer, IAgenticAnalyzerFactory). 4 per-provider adapters in Infrastructure/Services/Providers/Agent/Adapters/ (Claude/OpenAi/AzureOpenAi/Gemini) — thin parallel loops alongside the existing AgenticLoop classes; existing IAgentProvider/plan-execute path unchanged. AgenticAnalyzerFactory dispatches by AgentConfig.Type; ollama explicitly throws NotSupportedException with deferral note (no silent fallback). New GrepToolHandler (7th tool in ToolExecutor, bounded at 200 matches with glob support) added to ToolDefinitions/OpenAiToolDefinitions/GeminiToolDefinitions/OllamaToolDefinitions. ScoutAgent unchanged (migration deferred to p0110c). DI registers IAgenticAnalyzerFactory as singleton. 1254 tests (factory dispatch including ollama-throws + grep handler scenarios)."
    p0110b: "ProjectAnalyzer + ProjectMap. Tool-driven LLM discovery replaces RepoSnapshotCollector + CodeMapGenerator's heuristics. New ProjectMap record in Domain (PrimaryLanguage, Frameworks, Modules, TestProjects with FileCount + Framework + SampleTestPath, EntryPoints, Conventions, CiConfig). ProjectAnalyzer service in Application uses IAgenticAnalyzer + read-only tools (list_files, read_file, grep) via IRepositoryToolDispatcher (new Contracts interface, Infrastructure-implemented), parses JSON with one retry-on-malformed (2 attempts max, fail-loud). AnalyzeProjectHandler replaces AnalyzeCodeHandler at the DI level (pipeline-DSL name 'AnalyzeCode' preserved); transitional dual-population fills ContextKeys.CodeAnalysis + ContextKeys.CodeMap from ProjectMap so unmigrated downstream consumers keep working until p0110c. Cache via ProjectMapCacheKey (SHA-256 over manifest content) → .agentsmith/project-map.json + .cache-key. ReadOnlyToolCallHandler refuses write_file/run_command structurally (analyzer can't mutate the repo). Skill prompts surface ProjectMap via new {{ExistingTests}} block in PromptPrefixBuilder (BuildDiscussionParts + BuildStructuredParts); SkillRoundHandlerBase feeds ProjectMap from PipelineContext. Sample regression test (AnalyzeProjectHandlerTests) confirms TestProjects.Count > 0 surfaces into the rendered ExistingTests block. 1280 tests (+15: ProjectAnalyzer happy/retry/fail/code-fence-strip + cache key + prompt renderer + transitional dual-population + Sample regression)."
    p0110c: "CodeAnalysis path migrated to ProjectMap end-to-end. IAgentProvider.GeneratePlanAsync signature updated (5 implementations: Claude/OpenAi/AzureOpenAi/Gemini/Ollama). AgentPromptBuilder.BuildPlanUserPrompt now consumes ProjectMap (Modules + TestProjects + EntryPoints + Frameworks instead of raw FileStructure). GeneratePlanContext + GeneratePlanContextBuilder + GeneratePlanHandler migrated. SecurityTriageHandler signal-detection rebuilt on ProjectMap.Modules paths. AnalyzeProjectHandler dropped transitional CodeAnalysis dual-population (ContextKeys.CodeAnalysis removed); CodeMap text rendering retained as separate concern. Deleted: CodeAnalysis entity, AnalyzeCodeHandler + its test. SCOPE-REDUCED: RepoSnapshotCollector / CodeMapGenerator / ScoutAgent kept — they're consumed by BootstrapProjectHandler (one-time .agentsmith/ generation, separate concern) and ScoutAgent runs in parallel to plan-execute. Their removal requires inverting bootstrap-vs-analyze pipeline order, deferred to follow-up. 1278 tests (CodeAnalysis-touching tests rewired to ProjectMap)."
    p0111d: "Per-provider SKILL.md overrides. New IProviderOverrideResolver / ProviderOverrideResolver returns {EffectivePath, BasePath?} for a skill directory: override at SKILL.<provider>.md when active provider matches, base SKILL.md otherwise. New IActiveProviderResolver / ActiveProviderResolver reads AgentSmithConfig.PrimaryProvider (new top-level scalar — spec suggested nested llm.primary.provider but flat field maps cleaner to existing YAML). SkillMdParser refactored to take resolver via constructor: when override exists, parses both files, validates name + roles_supported match base (mismatch throws InvalidOperationException with clear error), merges frontmatter shallowly (override wins per top-level key, omitted inherits from base), and uses override's body. INFO log when override loads; silent otherwise. AgentSmithConfig registered as singleton in AddAgentSmithCore with default empty instance — composition roots can replace to honor operator-set primary_provider but no CLI/Server wireup done this phase (zero overrides ship per spec). YamlSkillLoader takes resolver and passes it to its SkillMdParser instance. docs/configuration/skills.md 'Per-provider overrides' section expanded (file naming, merge rules, active-provider config, boot logging). 1305 tests (+8: 4 ProviderOverrideResolver cases, 4 SkillMdParser override cases)."
    p0111c: "Phase-based triage rewrite. New contracts (PhaseAssignment, TriageInput/Output, ProjectMapExcerpt, TestCapability, CiCapability, PlanArtifact, RationaleEntry, TriageValidationResult). ITriageStrategy strategy pattern: LegacyTriageStrategy wraps the existing LLM-based discussion path; StructuredTriageStrategy + TriageOutputProducer + TriageRationaleParser + TriageOutputValidator + TriageLabelOverrideApplier + ProjectMapExcerptBuilder + PhaseCommandExpander drive the new phase-based flow. TriageHandler refactored into a thin selector adapter. Model B for phase tagging: Triage emits Plan-phase commands inline; new RunReviewPhaseCommand + RunFinalPhaseCommand preset steps (one shared PhaseAdvanceContext + PhaseAdvanceHandler) emit Review and Final phases by re-reading the stored TriageOutput. SkillRoundHandlerBase: role-aware body via ISkillBodyResolver, {{plan}} substitution from PlanArtifact for reviewers, confidence-threshold downgrade (Blocking=true && Confidence<70 → Blocking=false). New FilterRoundHandler with list-mode (reduce observations) and artifact-mode (synthesize text) per output_contract.output_type[Filter]. New triage-structured-system + triage-structured-user prompts. Deleted: SkillGraphBuilder, ISkillGraphBuilder, SkillGraph, ExecutionStage, DeterministicTriageBuilder, SecurityTriageHandler, ApiSecurityTriageHandler, ApiSecurityTriagePromptBuilder, ApiSecuritySkillFilter, TriageHandlerBase, SkillOrchestrationParser, SecurityTriageContext, ApiSecurityTriageContext + their tests + their command names. Pipeline presets: fix-bug, fix-no-test, add-feature, security-scan, api-security-scan switched to phase-based (RunReviewPhase + RunFinalPhase steps inserted; SecurityTriage and ApiSecurityTriage replaced with unified Triage). Docs: 3 new (concepts/triage.md, configuration/skills/migration.md, configuration/concept-vocabulary.md), 2 rewritten (multi-agent-orchestration.md, skills.md), mkdocs nav updated. 1297 tests (+22 net; -8 from deleted SecurityTriage/ApiSecurityTriage/ApiSecuritySkillFilter tests, -8 from deleted SkillOrchestrationParser tests, +30 new for parser/validator/builder/expander/label-applier/filter-handler). NOTE: 8 of 20 spec-listed integration tests deferred until agent-smith-skills v2.0.0 ships migrated skill fixtures."
    p0112: "Branch persistence MVP (shipped as p0112a) — push WIP commit + work branch on pipeline failure so tokens spent and code written on a failing run survive into the next run for the same ticket. New branch identity 'agent-smith/<platform>/<projectSlug>/<ticketId>' (one branch per ticket, no force-push), hard cutover from legacy 'fix/<ticketId>'. CheckoutSourceHandler resumes from the remote branch when present. PersistWorkBranchHandler runs in PipelineExecutor's failure path with its own try/catch so persist exceptions never overwrite the original failure cause; failures are non-fatal warnings with a (project, ticket)-keyed counter that escalates after 3 consecutive non-transient failures. WIP commits prefixed '[wip] agent-smith run <runId>' with Run-Id / Pipeline / Failed-Step trailers; PR auto-flips to Draft on GitHub/GitLab. LibGit2Sharp reused for consistency with existing source providers. Out-of-scope: container-kill recovery (process crashes pre-handler still lose /tmp state — known gap)."
    p0113: "Spawn pipeline jobs from queue — SUPERSEDED, DO NOT IMPLEMENT. Original spec wanted to spawn agentsmith-cli:latest containers per ticket. Conceptually wrong: CLI is a developer-only console tool, never deployed; running the entire pipeline in a spawned worker is the wrong granularity (LLM rounds and git ops belong to orchestration, not to a worker). MVP merged briefly as p0113a then immediately reverted (would have broken every queue ticket via ImagePullBackOff + EnqueuedReconciler infinite loop). Replaced by p0115 (standalone sandbox agent as worker binary, Redis-driven, language-specific image — NOT the CLI) + p0116 (server-pod-side migration: toolchain steps delegate to sandbox pods). Spec kept as historical document; status: superseded, superseded_by: [p0115, p0116]."
    p0114: "OpenAI/Azure-OpenAI context compactor — flat-lines per-iteration token growth in long agentic loops (ProjectAnalyzer 800k+ tokens, AgenticExecute over many iterations). Same algorithm as p0008's ClaudeContextCompactor; different SDK glue. Selected per AgentConfig.Type at the IAgenticAnalyzer / IAgentProvider factory layer; type=openai + azure-openai use OpenAiContextCompactor; type=gemini + ollama get NoOpContextCompactor (explicit placeholder, not a denial that they need it — follow-up phase). Trigger is boolean OR of (iterations >= ThresholdIterations) and (estimatedAccumulatedInputTokens >= MaxContextTokens) — defaults 8 / 80000 from existing CompactionConfig. Pre-compaction token count is tiktoken-equivalent ESTIMATE (used only for trigger); post-compaction reports VERIFIED prompt_tokens from the next response, computing tokens_saved from ground truth. Tail-boundary respects tool-call pairs: tail = last N COMPLETE rounds (assistant.tool_calls + matching tool messages); never splits a round mid-pair (default N=2). Summarization prompt via IPromptCatalog (p0103c); CompactionEvent logs SHA-256 prefix (8 hex) of resolved prompt for drift detection. CompactionConfig.DeploymentName lets operators route summarization to a cheaper deployment (e.g. gpt-4o-mini); compactor failure (rate-limit / garbage / error) is non-fatal — falls back to original messages with WARN + CompactionEvent.Failed=true. Compaction point fires AFTER an assistant turn produces no further tool_calls (between rounds, never mid-round) — inline comment guards against future parallelization breakage. Scoped to agentic loops only (not single-shot CompleteAsync paths)."
    p0115: "AgentSmith.Sandbox.Agent — standalone .NET single-file binary (Models: Step/StepEvent/StepResult/RedisKeys; Services: ProcessRunner/OutputBatcher/StepExecutor/RedisEventChannel/RedisJobBus/JobLoop/BinaryInjector). Pulls Steps from Redis (LIST sandbox:{jobId}:in via polling LPOP), executes shell commands via Process.Start with per-step timeout + process-tree kill, streams stdout/stderr soft-batched (50 lines OR 100 ms) to Redis STREAM sandbox:{jobId}:events through Channel<T>-buffered consumer (capacity 1000, DropOldest, 3 retries 200ms/1s/5s), pushes StepResult to LIST sandbox:{jobId}:results. Run-once mode: exits on Step.Kind=Shutdown or 5×60s idle. Carrier image agent-smith-sandbox-agent on distroless/cc-debian12 (~109 MB), ENTRYPOINT is the agent itself in --inject mode (Self-Inject Option B). Init-container injection pattern: initContainer copies /agent into emptyDir /shared, main container runs unmodified upstream toolchain image (mcr.microsoft.com/dotnet/sdk:8.0, node:20, …) with command ['/shared/agent']. ONE image, no per-toolchain variants. CI: matrix entry in docker-publish.yml gated to v* tags only. Server-pod-side wiring lands in p0116. 36 unit tests + 5 Testcontainers integration tests in new tests/AgentSmith.Sandbox.Agent.Tests project; main test suite count unchanged."
    p0116: "Sandbox Creator — Wire extraction (AgentSmith.Sandbox.Wire with Step + Validate + SizeLimits + ReadFile/WriteFile/ListFiles kinds + StepResult.OutputContent), ISandbox/ISandboxFactory/SandboxSpec/SandboxSecurityContext in Contracts, SandboxRedisChannel (pipeline-scoped, persistent _lastSeenXid), KubernetesSandbox + KubernetesSandboxFactory + PodSpecBuilder + KubernetesPodWatcher (init-container pattern, fsGroup=1000), InProcessSandbox + InProcessSandboxFactory in Infrastructure (CLI mode), AddSandbox auto-detection (SANDBOX_TYPE > KUBERNETES_SERVICE_HOST > inprocess), PipelineExecutor wraps the run in await using sandbox + ContextKeys.Sandbox + SandboxSpecBuilder, ToolExecutor optional sandbox routing via SandboxToolHandler (run_command sh -c wrap, file/list ops via Step kinds), ISandbox threaded through IAgentProvider.ExecutePlanAsync 8-arg overload + 4 providers, AgenticExecuteHandler pulls sandbox from context, CheckoutSourceHandler hybrid (server-side LibGit2Sharp + sandbox-side git clone Step), TestHandler ProjectMap-driven test command. RBAC patch (pods + pods/log + pods/status, no pods/exec). Docs: sandbox-architecture.md + cross-ref. Deferred to p0117: Docker sandbox, GenerateTests/Docs migration, TRX parsing, Helm chart, GrepToolHandler migration to StepKind.Grep, LibGit2Sharp removal from project graph, Redis-stream cleanup (MAXLEN + DEL on dispose). 1338 main + 49 sandbox-agent tests passing."
    p0119: "Polymorphic cost-tracker hierarchy + OpenAI cached_tokens demo fix. Replaced single CostTracker with ICostTracker / CostTrackerBase + 5 derived (Claude / OpenAi / AzureOpenAi / Gemini / Ollama) under src/AgentSmith.Infrastructure/Services/Providers/Agent/Cost/. Calculation lives in the base; derived classes only extract canonical billable/cached/output tokens from native API response types. OpenAiCostTracker.Track(ChatCompletion) reads InputTokenDetails.CachedTokenCount and splits prompt_tokens into billable + cached — fixes the demo-visible cost over-statement caused by OpenAI's automatic prompt caching being billed at full input rate. CostTrackerBase wraps TokenUsageTracker via composition so compactor / scout / summarizer paths stay backward-compatible. AzureOpenAi inherits OpenAi (same SDK type). Spec scope-narrowed from original M.E.AI-migration framing — the M.E.AI work moves to p0119a. Original 'delta-aggregation' framing rejected as wrong fix (each call IS billed for its full prompt_tokens; the actual distortion came from cached_tokens not being read). 13 cost-tracker tests + all 1417 existing tests green. Branch feat/p0119-batch1-cost-tracker-polymorphic, PR #73."
    p0117: "Sandbox follow-ups (partial scope). Done: DockerSandboxFactory + DockerSandbox + DockerContainerSpecBuilder + /var/run/docker.sock auto-detect. GenerateTests/Docs handlers thread ISandbox from PipelineContext. TrxResultParser + TestHandler aggregates structured TrxSummary across multi-test-project solutions (--logger trx --results-directory /work/test-results, ListFiles + ReadFile each .trx, parse + Combine). SandboxGitOperations runs git config/add/commit/push as Steps in the sandbox; CommitAndPRHandler + PersistWorkBranchHandler + InitCommitHandler migrated (fixes a latent bug — server-side LibGit2Sharp commit would have committed an unchanged tree in K8s/Docker mode since AgenticExecute writes only to /work). StepKind.Grep + GrepStepHandler in Agent (ripgrep + managed System.IO.Regex fallback) + InProcessSandbox.Grep + SandboxToolHandler.GrepAsync; server-side GrepToolHandler.cs deleted. ISourceProvider.CommitAndPushAsync + 4 impls + LibGit2Sharp helper methods removed (dead code after the SandboxGitOperations migration). StreamLimits.EventStreamMaxLength = 10000 in Wire; agent's XADD passes MAXLEN ~; SandboxRedisChannel.DisposeAsync DELs all three sandbox keys (best-effort, never throws). PipelineExecutor.SandboxRequiringCommands extended for CommitAndPR/InitCommit/PersistWorkBranch. Deferred: CheckoutSourceHandler pure-Step + Repository.LocalPath → /work (15+ file-reading handlers would need sandbox-routed reads — too big for p0117); LibGit2Sharp PackageReference removal (CheckoutAsync still clones server-side for those readers); Helm chart (non-blocking, separate phase); ProjectAnalyzer-sandbox + ToolExecutor cleanup + ScoutAgent migration (all replaced wholesale by p0119a's M.E.AI migration — would have been pure throwaway). 1445 main + 62 sandbox-agent tests passing."
    p0119a: "Microsoft.Extensions.AI migration. Microsoft.Extensions.AI 10.4.0 + .OpenAI 10.4.0 (pinned EXACT below 10.4.1 due to tghamm/Anthropic.SDK#197) + Anthropic.SDK 5.10.0 (tghamm) + Google_GenerativeAI.Microsoft 3.6.6 (Gemini) + OllamaSharp 5.4.24 (replaces preview-only abandoned M.E.AI.Ollama). New IChatClientFactory + ChatClientFactory + 4 IChatClientBuilder impls (Claude / OpenAi+Azure / Gemini / Ollama) — single Create(AgentConfig, TaskType) returns the right IChatClient with FunctionInvokingChatClient (MaximumIterationsPerRequest=25) wrap for tool-bearing tasks. New SandboxToolHost (Application/Services/Tools) with 7 [Description]-annotated methods (ReadFile/WriteFile/ListFiles/Grep/RunCommand/LogDecision/AskHuman) consumed via AIFunctionFactory.Create — replaces 4 provider-specific ToolDefinitions formats. 6 contract interfaces (ITriageStrategy/ITriageOutputProducer/IGateRetryCoordinator/IContextGenerator/ICodeMapGenerator/ICodingPrinciplesGenerator) drop the ILlmClient param; ~20 caller sites migrated directly to IChatClientFactory + GetResponseAsync (intent parsers, generators, all SkillRound handlers, ConvergenceCheck, FilterRound, EvaluateSkills, PlanConsolidator, GateRetryCoordinator, CompileKnowledge, QueryKnowledge, BootstrapProject/Document, Triage, AgenticExecute, GenerateTests, GenerateDocs, GeneratePlan, ProjectAnalyzer). Deleted: 5 *AgentProvider classes, 4 *AgenticLoop classes, 4 *AgenticAnalyzer adapters, ILlmClient + factory + 3 impls + TrackingLlmClient + LlmResponse, ToolDefinition + ToolCall + ToolResult, IRepositoryToolDispatcher + impl, ReadOnlyToolCallHandler, ScoutAgent, AgentExecutionContextFactory, original PlanParser + AgentPromptBuilder (moved to Application/Services/Prompts/). PipelineCostTracker.Track(ChatResponse) reads UsageDetails.AdditionalCounts per provider (cache_read_input_tokens for Anthropic, cached_tokens for OpenAI). DI: AddAgentSmithInfrastructure registers IChatClientFactory + 4 builders; legacy IAgentProviderFactory/ILlmClientFactory/IAgenticAnalyzerFactory/IRepositoryToolDispatcher/AgentPromptBuilder registrations dropped. ~250 obsolete tests deleted (factory/adapter/loop/executor/llm-client tests; handler tests with ILlmClient mocks); 1126 main + 62 sandbox tests passing. Replacement IChatClientFactory-mock-based handler tests deferred to a follow-up phase. AAD-DEV smoke test against all 5 providers deferred to operator. Branch feat/p0119a-meai-migration."
    p0117b: "Sandbox consumer migration. SandboxFileReader / ISandboxFileReaderFactory wrap ISandbox with typed ExistsAsync/TryReadAsync/ReadRequiredAsync/WriteAsync/ListAsync (singleton factory; per-pipeline reader built inline in handlers). Repository entity simplified — 2-arg ctor (CurrentBranch, RemoteUrl); LocalPath = const '/work' (Repository.SandboxWorkPath). All 4 source providers' CheckoutAsync metadata-only (no clone server-side). LocalSourceProvider+K8s throws NotSupportedException. CheckoutSourceHandler pure-Step — provider returns metadata, sandbox runs git clone + optional checkout. ~19 file-reading handlers + 4 deeper bootstrap services migrated (ProjectDetector, RepoSnapshotCollector, ContextGenerator, MetaFileBootstrapper, 3 ILanguageDetector impls — async + ISandboxFileReader; cascades to 25 callers via Repository ctor change forcing compile-time discovery). ProjectMetaResolver: ResolveAsync(reader, sourcePath, ct) with one ListAsync(depth=4) instead of N ExistsAsync probes. Scanner services rewritten: StaticPatternScanner takes ISandboxFileReader; GitHistoryScanner drives git log/diff via Step{Kind=Run} + parses unified diff (no LibGit2Sharp); DependencyAuditor runs npm/pip-audit/dotnet via Step{Kind=Run}. AcquireSourceHandler copies host file → /work via reader.WriteAsync (legal-analysis pipeline). CompileWikiCommand instantiates InProcessSandbox with workDir = projectPath (no DisposeAsync — would delete the user's project). InProcessSandbox.ResolvePath translates '/work' ↔ workDir so CLI-mode handlers speak the same path language. AzureGitOperations deleted (orphan after CheckoutAsync metadata-only). GitIgnoreResolver rewritten via Ignore NuGet (Sjuul Janssen, MIT); HostGitIgnore variant for api-scan host-disk path. LibGit2Sharp PackageReference removed from Infrastructure csproj. NoLibGit2SharpInGraphTests asserts zero LibGit2Sharp types in runtime closure (image ~9 MB smaller). Docs: sandbox-architecture.md 'What runs where' updated. 1132 main + 62 sandbox tests passing."
    p0121: "Pipeline output, cost, and source-context regressions: PipelineCostTracker.ResolvePricing falls back to longest-prefix match so date-suffixed model ids (gpt-4.1-2025-04-14, claude-sonnet-4-5-20250929) hit base-model pricing. ConsoleOutputStrategy short-circuits the verbose ConsolidatedPlan dump for Structured pipelines via existing ContextKeys.PipelineTypeName (no OutputContext plumbing needed) — Discussion pipelines unchanged. ApiSecurityScan preset gains ExtractFindings between CompileFindings and DeliverFindings, mirroring SecurityScan's order. New IHostSourceCloner + HostSourceCloner shells out to git clone --depth=1 into a host tempdir; TryCheckoutSourceHandler uses it for remote sources so api-scan analyzers (RouteMapper / extractors) can read host disk via System.IO as designed. 7 new tests + rewritten TryCheckoutSourceHandlerTests; 1138 main + 62 sandbox tests passing."
    p0122: "Skill output hardening (cross-repo: agent-smith + agent-smith-skills). ObservationParser.Parse switches to element-wise JsonDocument enumeration with per-item try/catch — one bad enum value (e.g. LLM emits 'critical' for severity) skips that observation instead of dropping the round to FallbackSingle. observation-schema.md gains explicit lowercase severity allowlist + ban list (critical/warning/severe/none/important/informational) + Nuclei→framework mapping rule. agent-smith-skills 1.4.0→1.5.0: all 16 api-security SKILL.md files have their per-skill 'Output format' sections replaced with a single framework-pointer heading; severity drift (critical/CRITICAL) and confidence drift (1-10 vs 0-100) eliminated. 3 new ObservationParser tolerance tests; 1141 main + 62 sandbox tests passing."
    p0123: "SkillObservation as universal pipeline output (cross-repo). Finding type retired entirely — SkillObservation absorbs File/StartLine/EndLine/ApiPath/SchemaName/EvidenceMode/ReviewStatus/Category typed fields and becomes the single carrier from skill emit to delivery. Three scanner handlers (StaticPatternScan/GitHistoryScan/DependencyAudit) emit observations alongside their existing Result records via shared ScannerObservationFactory (explicit severity-mapping table, no silent Info-fallback). Gate path migrates: GateObservationParser/Merger replace Finding-shaped versions; structured-output-gate-list.md prompt rewritten. Output layer flips: OutputContext.Observations replaces Findings; Console/Markdown/Summary/Snapshot/Builder consume directly; SARIF + SpawnFix get internal converters at the spec boundary. ObservationParser auto-migrates 1-10 confidence → 0-100 with once-per-(skill,run) warning, parses legacy Location string into structured fields, drops Category that duplicates Concern. ExtractFindingsHandler + ExtractFindings command + ContextKeys.ExtractedFindings + FindingAssessment all deleted; ApiSecurityScan/SecurityScan presets lose ExtractFindings step. CommandNames.RetiredCommands maps retired commands → migration hints at startup. agent-smith-skills 1.5.0→1.6.0: 16 SKILL.md files updated to write typed evidence_mode/category/file/start_line/api_path/schema_name fields. observation-schema.md (in agent-smith binary) documents new typed fields. 1139 main + 62 sandbox tests passing."
    p0125a: "Concept vocabulary typed schema (D1 slice 1/4, cross-repo). New ConceptType enum (Bool/Int/Enum) + new ConceptIntRange record in Contracts. ProjectConcept signature replaced: legacy (Key, Desc, Section) → (Name, Description, Type, EnumValues?, IntRange?, Writers); section semantics collapsed to a flat namespace with prefix conventions. ConceptVocabulary.GetDefault returns the typed default per concept type (false / 0 / first enum value). ConceptVocabularyLoader rewritten for the flat-typed schema with hard fail-loud on legacy three-section shape (text-pre-check + migration hint), missing/unknown type, missing name, duplicate names, and type-incompatible attributes (enum_values on non-enum, int_range on non-int, enum without values, int without range). Missing file behavior unchanged (warning + Empty). agent-smith-skills 1.7.1→1.8.0: skills/concept-vocabulary.yaml rewritten in place, all 68 entries migrated to bool-typed flat shape with empty writers lists; PR pairs synchronously with this PR. ConceptVocabularyValidator unchanged in behavior (TryGet-only consumer of ProjectConcept). 12-test loader pack: valid flat YAML, type defaults, legacy-shape rejection with migration hint, mixed-type attributes rejected, missing fields rejected, duplicates rejected, missing-file empty. 1186 main + 62 sandbox tests passing."
    p0125b: "Boolean expression evaluator + IRunStateConcepts run-state surface (D1 slice 2/4). Activation expression pipeline lives under src/AgentSmith.Application/Services/Activation/: 9 AST records (ActivationExpression abstract base + And/Or/Not/Comparison/Identifier/BoolLit/IntLit/StringLit/ComparisonOperator), 3 functional classes ≤120 lines each (ActivationExpressionTokenizer 117L, ActivationExpressionParser 119L, ActivationEvaluator 97L), and 2 typed exceptions (ActivationExpressionParseException with Offset+OffendingToken; ActivationExpressionEvaluateException). Grammar precedence (loosest→tightest): OR, AND, NOT, comparison; left-associative; case-insensitive keywords (true/false/AND/OR/NOT). String literals support \\\\\" and \\\\\\\\ escapes. Evaluator infers comparison type from a literal operand (IntLit→GetInt, StringLit→GetEnum, BoolLit→GetBool); ordered comparisons on string/enum/bool throw at evaluation time. New AgentSmith.Contracts.Activation namespace with IRunStateConcepts (GetBool/Int/Enum + SetBool/Int/Enum) and ConceptTypeMismatchException carrying (conceptName, declaredType, attemptedTypeName). PipelineContextRunStateConcepts in Infrastructure backs the surface: stores values under new ContextKeys.ConceptValues (Dictionary<string,object>); Get returns vocabulary-declared default when unset; Set throws ConceptTypeMismatchException on type mismatch, ArgumentOutOfRangeException outside int_range, ArgumentException on unknown enum value, KeyNotFoundException on undeclared concept. DI: parser/evaluator/tokenizer registered as singletons (Application); Infrastructure registers Func<PipelineContext, IRunStateConcepts> factory delegate (PipelineContext is per-pipeline-run, not a DI service — factory pulls vocabulary from the ConceptVocabulary slot, falls back to Empty). 34 new tests (ActivationExpressionTokenizerTests×6, ActivationExpressionParserTests×12, ActivationEvaluatorTests×9, PipelineContextRunStateConceptsTests×7). 1220 main + 62 sandbox tests passing. No production runtime path consumes the evaluator yet — that's p0125c/d/p0127."
    p0125d: "validate-concepts CLI verb (D1 slice 4/4, completes D1). New IConceptWriter contract (single property IReadOnlyList<ConceptDeclaration> DeclaredConcepts) + ConceptDeclaration record (ConceptName, ConceptType) in AgentSmith.Contracts.Activation. Four publishing handlers from p0125c implement it: CheckoutSourceHandler/TryCheckoutSourceHandler declare source_available (Bool), BootstrapCheckHandler declares context_yaml_present + coding_principles_present (Bool), PipelineNameInitializerHandler declares pipeline_name (Enum). New ConceptWriterRegistry in Application/Services/Activation/ takes IEnumerable<IConceptWriter> via constructor; folds DeclaredConcepts into a concept-to-handlers lookup using writer.GetType().Name as the handler identity (no reflection over assemblies). Three-step DI: each publishing handler is registered as concrete type (transient) + ICommandHandler<TContext> (transient) + IConceptWriter (singleton-of-handler) so the IConceptWriter registry sees one dedicated instance per writer while pipeline execution still gets fresh transient handlers. New ValidateConceptsCommand in src/AgentSmith.Cli/Commands/ — instance class with constructor (ConceptVocabularyLoader, ISkillLoader, ActivationExpressionParser, ConceptWriterRegistry) + Validate(skillsDirectory) method returning ConceptValidationResult (errors + exit code) + static Create() returning the System.CommandLine Command. Validator runs three cross-cuts: (a) activates_when expressions reference vocabulary concepts (parses via p0125b, walks AST identifiers, checks each against vocabulary, reports parse errors with offset+offending-token); (b) every IConceptWriter declares only vocabulary-known concepts with matching ConceptType and is listed in the vocabulary's writers list; (c) every name in a vocabulary writers list is backed by a registered IConceptWriter. Empty writers: [] lists are allowed without backing. Errors sorted by subject then concept; output format `{subject}: {concept}: {message}` one per line; exit 0/1. Verb registered in Program.cs alongside existing CLI verbs; ServiceProviderFactory registers ValidateConceptsCommand as singleton. activates_when plumbed through SkillMdFrontmatter → RoleSkillDefinition + provider-override merge so the field is available to both p0125d (build-time validate) and p0127 (runtime triage). Documentation: docs/configuration/concept-vocabulary.md gains a Validation section. 12 new tests (ConceptWriterRegistryTests×4, ValidateConceptsCommandTests×8). 1247 main + 62 sandbox tests passing. D1 is complete: vocabulary, evaluator, run-state, publication, and validation are all in place. Triage rewrite (D2/p0127) can build on top without further D1 work."
    p0125c: "Pre-skill handler concept publication (D1 slice 3/4, cross-repo). New PipelineNameInitializer command-handler is prepended to all 10 pipeline presets; reads ResolvedPipeline.PipelineName from PipelineContext (set by PipelineConfigResolver per p0106) and calls IRunStateConcepts.SetEnum('pipeline_name', ...). The pipeline_name enum starts narrow — only api-security-scan/security-scan/fix-bug/feature-implementation/mad-discussion are declared; init-project/legal-analysis/autonomous/skill-manager/fix-no-test/add-feature would throw ArgumentException at SetEnum (the LLM-driver fence: a future routing change forces a vocabulary update before runtime). CheckoutSourceHandler refactored into RunCheckoutAsync+CloneAndSwitchAsync+MaybeSwitchBranchAsync (≤20 lines per method) and publishes source_available based on result.IsSuccess at end of ExecuteAsync. TryCheckoutSourceHandler publishes source_available inside EmitBanner (single chokepoint for all success/failure paths). New BootstrapCheckHandler in Application/Services/Handlers/ probes /work/.agentsmith/context.yaml + /work/.agentsmith/coding-principles.md via ISandboxFileReader and publishes context_yaml_present + coding_principles_present; registered in DI but NOT wired into any pipeline preset (gating policy lives next to init-project bootstrap in p0130/D6). TriageHandler logs `Triage concept snapshot: {Concepts}` before strategy dispatch — comma-separated `name=value` of every non-default concept; default-valued concepts (false bools, 0 ints, first-enum strings) omitted; empty result renders `(all defaults)`. Handlers consume a `Func<PipelineContext, IRunStateConcepts>` factory delegate (mirrors p0125b registration). New CommandNames.PipelineNameInitializer + CommandNames.BootstrapCheck; Labels updated; PipelineNameInitializerContextBuilder registered as IContextBuilder. agent-smith-skills 1.8.0→1.9.0: 4 additive entries (pipeline_name, source_available, context_yaml_present, coding_principles_present) in concepts vocabulary; cross-repo PR pairs synchronously. New RunStateConceptsTestFactory test helper for hand-rolled vocabulary covering all four published concepts. 15 new tests (PipelineNameInitializerHandlerTests×4, CheckoutSourceHandlerConceptTests×4, BootstrapCheckHandlerTests×4, TriageHandlerSnapshotTests×3); 2 existing PipelinePresetsTests updated for the prepended Initializer. 1235 main + 62 sandbox tests passing. The evaluator from p0125b is still not consumed for runtime skill selection (that's p0127); concept publication is observable via the snapshot log, closing Phase D1's visible-improvement criterion."
    p0128: "D4 parent — Plan/Diff/Bootstrap JSON schemas + ISkillOutputValidator + run-artifact persistence + open_questions round-trip + opt-in data-flow gating. All three slices (a/b/c) landed."
    p0129c: "architecture-verifier + verify-notes dedup (D5 slice 3/3, cross-repo). Third VerifyDiff investigator skill under skills/coding/architecture-verifier/ in agent-smith-skills 2.2.0 → 2.3.0. Compares the Diff against the project's coding-principles.md (now threaded into the verifier prompt by VerifierPromptBuilder.Build's new optional codingPrinciples parameter; VerifyRoundHandler reads ContextKeys.CodingPrinciples and passes it through). Skill body teaches the LLM to distinguish checkable rules (hard numerical limits like class size ≤120, naming conventions, forbidden patterns, required patterns — quotable from principles + verifiable in diff) from subjective ones (skip 'readable code', 'follow SOLID', etc.). Conservative discipline: blocking only at severity=high + confidence≥70 + direct diff evidence; concern=Architecture. VerifyNotesFormatter.Dedup added — collapses cross-round duplicate observations by (file, concern, description-prefix-100), keeps last per group; VerifyRoundHandler.Escalate now uses BuildCombinedDedupedNotes which reads the cumulative VerifyObservations list, dedups, filters to blocking, formats as single round-2 notes block. The previous concat-strings-across-rounds semantic is replaced (cleaner output: one entry per unique unfixed concern; round-1 'still pending' findings appear once not twice). agentsmith.yml skills.version v2.2.0 → v2.3.0. 9 new tests (VerifierPromptBuilderTests×4: codingPrinciples-section-presence/absence/empty/placeholder; VerifyNotesFormatterDedupTests×5: no-duplicates / same-key-last-wins / different-file / different-concern / description-diverges-past-100). 1 existing test rewritten (BlockingSecondRound_ReturnsFailWithDedupedCombinedNotes) for the new dedup semantic. 1488 main + 62 sandbox tests passing. D5 complete: scope-verifier + build-verifier + test-verifier + architecture-verifier all in place; verify-phase wired into FixBug + AddFeature presets; first-blocking re-loops AgenticExecute; second-blocking escalates with deduped notes."
    p0129b: "build-verifier + test-verifier (D5 slice 2/3, cross-repo). Two new VerifyDiff investigator skills under skills/coding/build-verifier/ and skills/coding/test-verifier/ in agent-smith-skills 2.1.0 → 2.2.0. build-verifier static-analyzes the Diff for likely build breakage (missing imports, removed-but-still-referenced members, interface signature changes without implementation updates, malformed patches) — blocking only at severity=high + confidence≥70. test-verifier flags test-coverage gaps (new public surface without tests, weakened assertions) as non-blocking medium-severity notes; blocks only on test-removal-without-justification (rationale not stated in Plan). LLM-only static analysis — both verifiers analyze diff content; actual build/test execution from inside verifiers is deferred (would need SandboxToolHost wired through VerifyRoundHandler, separate infrastructure phase). Existing Test command in the FixBug preset still runs the real build/tests right after Verify. No new agent-smith C# code: VerifyRoundHandler from p0129a already filters AvailableRoles by role + investigator_mode + activates_when, so new VerifyDiff skills plug in cleanly. agentsmith.yml skills.version v2.1.0 → v2.2.0. 2 new tests (VerifyRoundHandlerMultiVerifierTests×2: ThreeActiveVerifiers_AllInvokedAndObservationsAggregated, OneBlockingFromBuildVerifier_TriggersReLoop). 1479 main + 62 sandbox tests passing. ProjectBuildCommandResolver and verify-notes dedup still deferred (post-D7 follow-up if needed)."
    p0129a: "Verify-phase wiring + scope-verifier (D5 slice 1/3). New CommandNames.RunVerifyPhase + ContextKeys.VerifyRoundCount/VerifyNotes/VerifyObservations. New VerifyRoundHandler (~150L across handler + VerifierPromptBuilder + VerifyNotesFormatter — three files <120L each) is a standalone ICommandHandler<RunVerifyPhaseContext>; reads PlanJson + DiffJson, filters AvailableRoles to role=investigator+investigator_mode=verify_diff, applies ActivationSkillFilter against IRunStateConcepts, dispatches each verifier via IChatClientFactory + ObservationParser.ParseWithoutIds with confidence-threshold downgrade. Re-loop on first blocking observation: CommandResult.OkAndContinueWith(InsertNext=[AgenticExecute, RunVerifyPhase]) + sets VerifyNotes (NOT [RunFinalPhase, RunVerifyPhase] as spec wrote — RunFinalPhase is the post-impl discussion phase, not the implementer; AgenticExecute is). Second blocking → CommandResult.Fail with combined notes. AgentPromptBuilder.BuildExecutionUserPrompt grows optional verifyNotes parameter; AgenticExecuteHandler reads ContextKeys.VerifyNotes and threads it through (null on first run, populated after re-loop). PipelinePresets.FixBug + AddFeature gain RunVerifyPhase between RunFinalPhase and Test/CommitAndPR. PermissivePhaseDataFlow.Edges flipped to virtual + protected static Wildcard constant exposed; FixBugDataFlow + AddFeatureDataFlow override to concatenate Wildcard + (Plan→Verify, Implementation→Verify) edges — DOCUMENTATION ONLY (wildcard still matches first regardless of Enforce; real enforcement requires wildcard removal in a post-D7 tightening phase across all 10 presets). Cross-repo: agent-smith-skills 2.0.0 → 2.1.0 with new skills/coding/scope-verifier/SKILL.md (concern: Correctness — 'Scope' is not in the ObservationConcern enum; scope creep is correctness). Body leaves test-file-sibling judgment to the LLM with worked examples per language (C#/TS/Python/Java/Go/Kotlin) — no hardcoded regex; 'when in doubt, allow the test file' default. agentsmith.yml skills pin → 2.1.0. 22 new tests across VerifyRoundHandlerTests×10 (no-verifiers/no-blocking/blocking-round1-inserts/sets-notes/blocking-round2-fails-with-combined/round-count-increments/no-plan-or-diff-skips/non-blocking-appended/low-conf-downgraded/filter-excludes-non-matching), VerifyPhaseDataFlowEdgesTests×5 (FixBug+AddFeature edge presence + wildcard preserved), PipelinePresetsTests×4 new (FixBug + AddFeature have RunVerifyPhase after RunFinalPhase before CommitAndPR; FixNoTest/SecurityScan/ApiSecurityScan/MadDiscussion/InitProject do not), AgentPromptBuilderVerifyNotesTests×4 (no-notes/notes-present/empty-string/whitespace). 1477 main + 62 sandbox tests passing (2 skipped, pre-existing). build-verifier + test-verifier pending in p0129b; architecture-verifier in p0129c."
    p0128c: "D4 slice 3/3 — Opt-in data-flow gating between pipeline phases. New IPhaseDataFlow + PhaseDataFlowEdge + DataFlowViolationException contracts; ContextKeys.ActivePhaseStep; PipelineContext gains an opt-in IPipelineContextReadGate hook (sealed class kept; AttachReadGate(gate) returns IDisposable scope, nested attach throws). DataFlowReadGate enforces declared edges with wildcard support on FromPhaseStep / ToPhaseStep / ContextKeys (all three accept '*'); throws DataFlowViolationException under enforce=true, logs once-per-key warning under enforce=false. PhaseDataFlowResolver indexes IPhaseDataFlow declarations by preset name (case-insensitive). 10 PermissivePhaseDataFlow subclasses (FixBug/FixNoTest/AddFeature/InitProject/SecurityScan/ApiSecurityScan/MadDiscussion/LegalAnalysis/SkillManager/Autonomous), each declaring a single wildcard edge as a starting point — follow-up phases tighten per preset. PipelineExecutor sets ContextKeys.ActivePhaseStep before each step, attaches the gate around SafeExecuteAsync via a tiny FinalizeStepAsync split (kept method ≤20 lines per coding-principles); gate not attached when no IPhaseDataFlow is registered for the preset (test fixtures get a free pass). PipelineDataFlowConfig.Enforce default false; binds via agentsmith.yml's pipeline_data_flow section. 19 new tests (DataFlowReadGate×8, PhaseDataFlowResolver×3, PipelineContextReadGate×6, PipelineDataFlowsCoverage×2). 1454 main + 62 sandbox tests passing. D4 complete."
    p0128b: "D4 slice 2/3 — Plan open_questions round-trip via ticket comments. New ITicketCommentTemplate (Contracts) with MarkdownOpenQuestionsCommentTemplate base + GitHub/GitLab/AzDO subclasses (HTML-comment anchors `<!--Q1-->` / `<!--agent-smith:open-questions-->`) and JiraOpenQuestionsCommentTemplate (visible bracket anchors `[Q1]` / `[agent-smith open questions]` since Jira ADF doesn't preserve HTML comments). OpenQuestionsCommentMarkers helper detects either form. New IPlanOpenQuestionsPoster (Application) resolves the platform-specific template via keyed-singleton DI, posts via ITicketProvider.UpdateStatusAsync. PlanOpenQuestionsHandler runs after GeneratePlan in fix-bug + add-feature presets; on Status=NeedsUserInput posts the comment + sets ContextKeys.OpenQuestionsAwaitingAnswer. PipelineExecutor halts cleanly with `Pipeline parked: awaiting_user_input`. PlanAnswerParser extracts answers from comment-reply bodies (regex with horizontal-only whitespace to keep Q-lines self-contained), supports both `(parent, reply)` and `(commentBody)` overloads — webhook handlers use the single-body form for the Quote-reply path. PipelineRequest gains PlanAnswers (Dictionary<string,string>?); ClaimRequest + WebhookResult thread it through; ExecutePipelineUseCase publishes it as ContextKeys.PlanAnswers. AgentPromptBuilder.BuildPlanUserPrompt renders a `## Operator answers to prior open questions` block when PlanAnswers is non-empty. GeneratePlanHandler tries PlanParser.ParseStrict first (with PlanOutputValidator); falls back to legacy lax parse so unstructured prompts still work; sets ContextKeys.PlanJson when strict parse succeeds and Plan declared questions. Webhook plumbing: GitHubIssue / GitLabIssue / AzureDevOpsWorkItem / Jira comment handlers detect PlanAnswers (in addition to keyword trigger) and emit them on WebhookResult; Jira falls back to `first project with jira_trigger configured` when answers arrive without keyword. 13 new tests (MarkdownOpenQuestionsCommentTemplate×3, JiraOpenQuestionsCommentTemplate×2, PlanAnswerParser×5, PlanOpenQuestionsHandler×3). 1448 main + 62 sandbox tests passing."
    p0128a: "D4 slice 1/3 — Schemas + Validators + Persistence. Hand-written Draft 2020-12 JSON Schema files for Plan/Diff/Bootstrap/Observation under .agentsmith/schemas/, embedded into AgentSmith.Application.dll via csproj Link (one source of truth, runtime loader reads embedded resources). New JsonSchemaLoader caches all four at boot + meta-schema-validates each. Real ISkillOutputValidator implementations (PlanOutputValidator/DiffOutputValidator/BootstrapOutputValidator + ObservationOutputValidator wrapping ObservationParser) replace NoOp for skills with declared output_schema; SchemaValidator extracts the parse-validate-format-with-JSON-Pointer routine the three plan-shaped validators share. SkillOutputValidatorFactory keyed by closed enum SkillOutputSchema (Plan/Diff/Bootstrap/Observation); ForSchema(string?) → null=NoOp, unknown=throws ArgumentException. SkillCallRequest.OutputSchema (string?) added; SkillCallRuntime constructs the validator per request via the factory. Plan record extended additively (Scope/OpenQuestions/TestImpact/ConsumerImpact/Status with sensible defaults); new PlanScope/PlanOpenQuestion/PlanStatus types in Domain. New Diff entity introduced as the typed in-process Diff representation (Diff/DiffChange/DiffTestEntry/DiffOperation/DiffStatus); CodeChange remains the legacy in-flight shape pending p0128c bridge. ContextKeys gains PlanJson/DiffJson/BootstrapMarkdown wire-format slots. PlanParser dual-path: existing Parse(provider, rawJson) preserved verbatim; new ParseStrict(output, PlanOutputValidator) returns PlanParseResult{Plan?, ValidationResult} with all schema fields populated on the strict path. WriteRunResultHandler persists plan.json / diff.json / bootstrap.md to .agentsmith/runs/<run-id>/ alongside existing plan.md / result.md when those keys are populated; PerSkillBreakdown from PipelineCostTracker renders into result.md as a Per-skill cost breakdown section. IRunArtifactStore in Contracts.Persistence with InMemory (Application, default) + Redis (Infrastructure, registered by Server's AddRedis) impls; Redis TTL configurable via AgentSmithConfig.PipelineStorage.RedisTtlHours (default 4) — pipeline_storage section in agentsmith.yml + agentsmith.example.yml. JsonSchema.Net 7.0.4 pinned EXACT in AgentSmith.Application.csproj. 56 new tests across Validation/Domain/Services/Persistence/Handlers; 1422 main + 62 sandbox tests passing (2 pre-existing skipped). open_questions round-trip (p0128b) and opt-in data flows (p0128c) ride next."
    p0127c: "Skill content migration + hard cutover (D3 slice 3/3, cross-repo: agent-smith + agent-smith-skills). agent-smith-skills 1.9.0 → 2.0.0: all 44 SKILL.md files migrated to the new single-body format with role-as-frontmatter and activates_when expressions. 8 multi-role skills (3 three-role: architect / dba / security-reviewer; 5 two-role: backend-developer / frontend-developer / devops / tester / api-vuln-analyst) split into 19 single-role files via the <original>-<suffix> naming convention (producer→-planner, investigator→-investigator, judge→-judge, filter→-filter). 36 single-role skills migrated in place. Catalog grows 44 → 55 SKILL.md files. activates_when assigned per category: api-security/* → pipeline_name=\"api-security-scan\"; security/* → pipeline_name=\"security-scan\"; mad/* → pipeline_name=\"mad-discussion\"; legal/* → pipeline_name=\"legal-analysis\"; coding/* → pipeline_name=\"fix-bug\" OR pipeline_name=\"feature-implementation\". Vocabulary extended: pipeline_name enum gains legal-analysis (PipelineNameInitializerHandler will now publish the value when the legal-analysis pipeline runs). agent-smith loader cutover: SkillMdParser drops the legacy code path (BuildLegacyRole + MapRolesSupported / MapActivation / MapRoleAssignments / MapReferences / MapOutputContract / TryParseRole / TryParseOutputForm / DetectFormat / ValidateLegacyOverride deleted; class drops from 356 → 186 lines). SkillBodySplitter deleted entirely. SkillMdFrontmatter shrinks: legacy fields RolesSupported / Activation / RoleAssignment / References / OutputContract / RawXxx classes removed; only RolesSupported kept as a rejection probe (parses + throws SkillFormatException with migration message). YamlSkillLoader.ValidateStrict drops legacy branch — new-format parse-time validation is authoritative. NewFormatSkillBuilder dual-writes legacy RoleSkillDefinition fields (RolesSupported, RoleAssignments, Activation, OutputContract, References) from the new taxonomy (producer→Lead, investigator→Analyst, judge→Reviewer, filter→Filter; output_schema mapped to OutputForm) so existing triage / index / body-resolver consumers keep working during the [Obsolete] window before p0131 removes them outright. ValidateConceptsCommand closes the category enum: {auth, injection, secrets, iam, crypto, headers, inputs, outputs}. Tests: SkillMdParserOverrideTests rewritten for new-format fixtures; YamlSkillLoaderTests.WriteAnalystSkill helper updated to emit new-format YAML; 2 SkillMdParserExtendedTests skipped with p0127c reason (functionality retired); SkillMdParserNewFormatTests / RoleSkillDefinitionNewFormatFieldsTests legacy-loaded assertions inverted to rejection assertions. 1370 main + 62 sandbox tests passing (2 skipped). agentsmith.yml skills pin → 2.0.0; agent-smith-skills version.txt → 2.0.0; CHANGELOG entry under BREAKING CHANGES. SkillCallRuntime consumer migration still deferred — SkillRoundHandlerBase + FilterRoundHandler restructure is its own phase. Final cleanup of [Obsolete] legacy properties on RoleSkillDefinition is p0131 (D7)."
    p0127b: "Triage filter via activates_when + specificity tie-break (D3 slice 2/3). New ActivationSkillFilter (Application/Services/Activation/, ~57 lines) deterministically narrows the triage candidate skill set BEFORE the LLM call by parsing each skill's activates_when expression once (per-call cache) and evaluating against IRunStateConcepts; null/empty activates_when passes through (legacy fallback path); parse/evaluate failures log Error and exclude the skill. New ActivationSpecificityScorer (~32 lines) walks the AST and counts Identifier + Comparison terms (And/Or sum children, Not passes through) returning an int score; null/empty/parse-error returns 0. New PhaseSpecificityTrimmer (Application/Services/Triage/, ~67 lines) caps each PhaseAssignment to LoopLimitsConfig.MaxSkillsPerPhase by total member count (Lead + Analysts + Reviewers + Filter) — Lead and Filter slots preserved when over cap; Analysts trimmed first then Reviewers, ordered by score descending then name ascending for determinism; emits 'Phase {Phase} trimmed from {Before} to {After} skills by specificity (kept: {Names})' Info log on each trim. LoopLimitsConfig gains MaxSkillsPerPhase (default 5). TriageOutputProducer ctor extends to (filter, trimmer, conceptsFactory, limits) and reorders ProduceAsync as: LoadAvailableSkills (RoleSkillDefinition list, not SkillIndexEntry) → ApplyActivatesWhenFilter (logs 'Triage filtered {Before}->{After}') → BuildInput from filtered list → CallAndValidateAsync (existing retry-once path) → phaseTrimmer.Trim → labelOverrider.Apply. The existing TrimToCap private method-cluster (BuildSpecificityIndex / TrimPhase / TrimList / TotalSkillCount / EnumerateNames) was extracted into PhaseSpecificityTrimmer to keep the producer ≤200 lines. DI: ActivationSkillFilter + ActivationSpecificityScorer + PhaseSpecificityTrimmer registered as singletons in Application's ServiceCollectionExtensions next to the p0125b activation pipeline. 25 new tests across ActivationSkillFilterTests×7 (null/empty pass-through, true/false outcomes, parse-error exclusion, mixed-skills filtering, parse-cache reuse), ActivationSpecificityScorerTests×8 (null/empty/single-id/and/or/comparison/not/parse-error), PhaseSpecificityTrimmerTests×7 (over-cap by score, exactly-at-cap, under-cap, name-tie deterministic, lead+filter counted, other-phases-untouched, reviewer overflow), TriageOutputProducerFilterTests×3 (filter narrows LLM input, no-activates-when pass-through, end-to-end trim by specificity via CapturingChatClient). 1372 main + 62 sandbox tests passing. Skills with no activates_when (all 44 in agent-smith-skills 1.9.0) still flow through the LLM with legacy activation.positive/negative — fallback path lives until p0127c migrates them. SkillCallRuntime consumer migration deferred — SkillRoundHandlerBase (441L) + FilterRoundHandler (224L) restructure is its own phase."
    p0127a: "SKILL.md frontmatter + loader (D3 slice 1/3, parallel format support). New SKILL.md shape parses alongside the legacy multi-body format; per-file routing in SkillMdParser.DetectFormat picks legacy on `roles_supported`, new on `role`, throws SkillFormatException on both-present or neither. New SkillMdFrontmatter fields (Role, Category, InvestigatorMode, SurveyScope, ScopeHint, BlockCondition, Loop, OutputSchema) parse via existing UnderscoredNamingConvention; same eight fields as nullable properties on RoleSkillDefinition (legacy skills leave them null, new skills leave RolesSupported/Activation/RoleAssignments/RoleBodies null). New types in Infrastructure.Core: NewFormatSkillBuilder (constructs RoleSkillDefinition from new-format frontmatter+body, body verbatim — no SkillBodySplitter), NewFormatSkillValidator (10 rules: role∈{producer,investigator,judge,filter}, description ≤200 chars + non-empty, activates_when non-empty, output_schema∈{observation,plan,diff,bootstrap}, investigator_mode required+enum-checked when role=investigator, survey_scope required+non-empty when investigator_mode=survey, category required when investigator_mode=verify_hint, block_condition required when role=judge, output_schema=bootstrap requires role=producer, body non-empty), SkillFormatException in Infrastructure.Core/Exceptions/ (carries SkillFilePath + RuleDescription as separate fields), SkillMdFormat enum. SkillMdParser.MergeFrontmatter extended for the eight new fields under `over.X ?? base.X` semantics; RolesSupported merge changed from `over wins unconditionally` to `over ?? base` so new-format overrides can omit it. ValidateOverrideMatchesBase dispatches per format: legacy → roles_supported set-equality, new → role string-equality (override may omit role and inherit). YamlSkillLoader.ValidateStrict short-circuits to true when skill.Role is set (parse-time validation in NewFormatSkillValidator is authoritative for new format); LoadFromSkillMdDirectories adds dedicated `catch (SkillFormatException)` arm logging at Error with structured Path+Rule fields. ValidateConceptsCommand extended with CheckNewFormatRules per-skill check: category-on-verify_hint, block_condition-on-judge, output_schema=bootstrap-requires-producer; emits same `(subject, concept, message)` tuples as existing checks; closed-enum check for category deferred to p0127c. 32 new tests across SkillMdParserNewFormatTests×17 (format detection, parsing, validation rules, body verbatim, legacy fields null), SkillMdParserMergeNewFieldsTests×5 (override-wins, base-wins, list-replace, omit-all-preserved), SkillMdFrontmatterFieldsTests×3 (YAML deserialization), RoleSkillDefinitionNewFormatFieldsTests×2 (round-trip + legacy-null), ValidateConceptsCommandNewFormatTests×5 (each new rule + legacy untouched). 1347 main + 62 sandbox tests passing. No skill content migrated yet — that's p0127c. No triage consumption — that's p0127b."
    p0126c: "Skill-call runtime + scope guards + tool-kit + cost tracking (slice 3/3 of p0126). New IGitIgnoreResolver contract in AgentSmith.Contracts.Providers; existing GitIgnoreResolver flips internal→public and implements it. PathReadGuard (~67 lines) wraps the resolver: rejects paths outside the working repo, paths under .git/, and .gitignored paths via a structured Result/GuardError flow (no throws — errors flow back into the LLM loop as tool-result strings). PathWriteGuard (~57 lines) layers phase-gating on top: only Implementation and Bootstrap may write; Bootstrap further restricted to .agentsmith/context.yaml + .agentsmith/coding-principles.md. Supporting types in own files (Result, GuardError, GuardErrorKind, IPathReadGuard, IPathWriteGuard, ToolGuardInvoker — the last extracts the guard-check adapter so SandboxToolHost stays at exactly 120 lines). SandboxToolHost grows two optional ctor parameters (IPathReadGuard?, IPathWriteGuard?); legacy callers passing nothing see no behavior change. ToolKit (~67 lines) returns phase-keyed AITool lists from a SandboxToolHost: Plan/Review/Discuss/Filter/Synthesize → 5 read-only tools; Investigate/Verify → +RunCommand; Implementation → all 7; Bootstrap → +WriteFile (no RunCommand); null phase → all 7 (legacy fallback). PipelineCostTracker grows BeginCall/EndCall/PerSkillBreakdown via a new SkillCostScopeManager helper (extracted per the original p0126 spec's prediction); Track(ChatResponse) attributes tokens to the active scope when one exists; nested BeginCall throws InvalidOperationException. SkillCallScope (~75 lines) is IDisposable; Dispose finalizes the CallCostRecord using the LimitEnforcer's tool/LLM counters (or its own elapsed when no enforcer attached). ISkillCallRuntime + SkillCallRuntime (~117 lines) compose the five collaborators (LimitEnforcer, RetryCoordinator, LoopTraceCollector, OutcomeClassifier, PipelineConcurrencyGate) into ExecuteAsync(request, costTracker, ct); body split into TryInvokeAsync + ClassifyAndLog + BuildClassificationInput + BuildResult helpers each ≤20 lines. RetryCoordinator gains an optional onResponse callback so the runtime can attribute every chat response to the cost tracker. PipelineCostTracker is per-pipeline-run state passed in by the caller (matches the existing GetOrCreate-from-PipelineContext convention) — not a DI-resolved dependency, so the runtime stays scoped without polluting the DI graph. 33 new tests under AgentSmith.Tests/Loop/: PathReadGuardTests×5, PathWriteGuardTests×5, ToolKitTests×6, SkillCallCostTrackingTests×5, SkillCallRuntimeLimitTests×5, SkillCallOutcomeTests×4, SkillCallRuntimeIntegrationTests×3 (against ScriptedRuntimeChatClient + StubRuntimeChatClientFactory). Decisions logged in decisions.md (8 entries covering the IGitIgnoreResolver extraction, ToolGuardInvoker split, SkillCostScopeManager extraction, runtime ExecuteAsync helper split, optional-guard SandboxToolHost, no-DI for guards). 1315 main + 62 sandbox tests passing. p0126 complete: SkillCallRuntime + the five-state outcome contract + per-skill cost tracking + phase-keyed tool sets + PathReadGuard/PathWriteGuard now exist and are exercised by 68+ tests; consumer migration (binding handlers to the runtime) is p0127's job."
    p0126b: "Skill-call collaborator services (slice 2/3 of p0126). Five new services under src/AgentSmith.Application/Services/Loop/: LimitEnforcer (~70 lines, tracks tokens + wall-clock during a skill call, raises CappedTokens / CappedTime LimitDecision when caps cross, signals the call's CTS on cap), RetryCoordinator (~85 lines split into InvokeAsync + AppendRetryHint + ClassifyRetryResult helpers ≤20 lines each, owns ParseRetryHint + ValidationRetryHintPrefix constants), LoopTraceCollector (~55 lines, AppendLlmCall/AppendToolCall, 200-char ArgsSummary truncation preserving leading {/[ boundary, EmitLog at INFO level), OutcomeClassifier (~25 lines, pure mapping function from ClassificationInput to SkillCallOutcome), PipelineConcurrencyGate (~40 lines, wraps SemaphoreSlim sized from MaxConcurrentSkillCalls, AcquireAsync returns release-on-dispose handle, scoped per pipeline-run DI scope). Supporting one-type-per-file records: LimitDecision + LimitDecisionKind, ValidationResult + ISkillOutputValidator + NoOpSkillOutputValidator, RetryOutcome + RetryOutcomeKind, ClassificationInput. DI registered in AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs (PipelineConcurrencyGate scoped; OutcomeClassifier + RetryCoordinator + ISkillOutputValidator→NoOpSkillOutputValidator singletons). 28 new tests across LimitEnforcerTests×6, RetryCoordinatorTests×6 (with ScriptedChatClient + StrictValidator helpers), LoopTraceCollectorTests×6, OutcomeClassifierTests×6, PipelineConcurrencyGateTests×4. 1282 main + 62 sandbox tests passing. No consumer of these services in production yet — runtime composition lands in p0126c."
    p0126a: "Skill-call runtime foundation (D1 of p0126, slice 1/3). Six contract records in AgentSmith.Application.Models — SkillCallRequest, SkillCallResult, SkillCallOutcome enum (Ok/Incomplete/FailedParse/FailedValidation/FailedRuntime with explicit 0..4 values), SkillExecutionPhase enum (Plan/Review/Implementation/Verify/Discuss/Investigate/Filter/Synthesize/Bootstrap), CallCostRecord, LoopTraceEntry (flat-record discriminator on Kind: LlmCall/ToolCall, JSON-serialization-friendly). New LoopLimitsConfig POCO in AgentSmith.Contracts.Models.Configuration with eight Phase-B defaults (MaxToolCallsPerSkill=30, MaxToolCallsPerInvestigator=10, MaxToolCallsPerVerifier=20, MaxLlmCallsPerSkill=15, MaxInputTokensPerSkillCall=200_000, MaxOutputTokensPerSkillCall=16_000, MaxSecondsPerSkillCall=300, MaxConcurrentSkillCalls=10) and ResolveToolCallCap(string? investigatorMode) dispatching verify_diff→Verifier / verify_hint+survey→Investigator / null+unknown→Skill. AgentSmithConfig.Limits property added; YamlConfigurationLoader binds the new agentsmith.yml `limits:` section automatically (UnderscoredNamingConvention). Infrastructure DI registers LoopLimitsConfig as singleton (defaults; composition roots may replace with the YAML-bound instance). IChatClientFactory.Create gains optional `int? maxIterations = null` parameter; ChatClientFactory threads it through UseFunctionInvocation only when non-null (legacy callers passing nothing keep the inline literal 25 default unchanged — no new fallback constant). StubChatClientFactory test helper updated for the new signature. 7 new LoopLimitsConfigBindingTests; 1254 main + 62 sandbox tests passing."
    p0124: "Tight SkillObservation contract + batched filter with resilient parsing (cross-repo: agent-smith + agent-smith-skills). New ObservationCaps constants (Description ≤500, Suggestion ≤300, Rationale ≤500) + new optional Details field (≤4000 chars). ObservationParser truncates over-cap fields with `…[truncated, original was N chars]` marker + per-(skill,field) warning — observation always survives. Channel-aware output: Console/Summary render Description-only; Markdown renders Description headline + Details body; SARIF.message.text gets Description, SARIF.properties.detailed_message gets Details. New TokenBudgetBatcher.Split deterministically splits SkillObservation lists by JSON-serialize-and-measure (4 chars/token proxy, 0.85 reserve, worst-case ~1500 chars per obs ≈ 375 tokens → batch_size ≈ 18 at max_output_tokens=8192). FilterRoundHandler.ApplyList rebuilt as batched: foreach batch invokes a private FilterBatchAsync with new RenderForFilter helper (excludes Details + Rationale to preserve batch_size), parses via TryParseWithoutIds, logs input count + expected/actual response chars per batch. Per-batch failure preserves that batch's input observations and increments failedBatchCount; if any failed, FilterCoverageObservationFactory appends a single Coverage-Incomplete observation (Concern=Correctness, Severity=Info, Category=meta) so the gap is visible in Markdown/SARIF output. New ResilientJsonObjectExtractor (brace-counting state machine with string-literal awareness) is the safety net for genuine output-token truncation; ObservationParser.TryParseWithoutIds gains a strict→resilient fallback path on JsonException. agent-smith-skills 1.6.0→1.7.0: all 16 api-security SKILL.md files get a standardized length-contract paragraph in their `## Output` section. 1166 main + 62 sandbox tests passing (29 new across ObservationParser truncation, channel-split rendering, TokenBudgetBatcher, ResilientJsonObjectExtractor, batched FilterRoundHandler)."
    p0130a: "BootstrapCheck gate + csharp-bootstrap skill (D6 slice 1/2, cross-repo). New CommandNames.BootstrapGate + BootstrapGateContext + BootstrapGateContextBuilder + BootstrapGateHandler in AgentSmith.Application reads the concepts published by BootstrapCheckHandler (context_yaml_present, coding_principles_present) via the existing Func<PipelineContext, IRunStateConcepts> factory and aborts the pipeline with a structured 'Pipeline aborted: project missing .agentsmith/context.yaml or coding-principles.md. Run init-project first.' message when either is false. ApiSecurityScan conditional logic hardcoded inline (single consumer; concepts.GetBool('source_available') skip on false → 'Bootstrap gate skipped: passive api-scan mode'). BootstrapCheckContextBuilder also added (handler shipped in p0125c but its builder was never registered — no preset referenced it). DI: BootstrapGateContext handler registered transient + builders for both BootstrapCheck and BootstrapGate command names. PipelinePresets gain BootstrapCheck → BootstrapGate after the source-checkout step in: FixBug, FixNoTest, AddFeature (after CheckoutSource); SecurityScan + Autonomous (after CheckoutSource); ApiSecurityScan (after TryCheckoutSource so source_available is published before the gate evaluates). MadDiscussion + LegalAnalysis + InitProject + SkillManager unchanged (no gate per the parent-spec three-way categorization). Cross-repo: agent-smith-skills 2.3.0 → 2.4.0 ships skills/coding/csharp-bootstrap/SKILL.md (role=producer, output_schema=bootstrap, activates_when='project_language = \"csharp\"') + new project_language enum concept (csharp, node, python, generic) in concept-vocabulary.yaml. agentsmith.yml skills.version pin 2.3.0 → 2.4.0. 21 new tests (BootstrapGateHandlerTests×6 across both-files-present / context-missing / principles-missing / api-scan-passive-skip / api-scan-source-available-files-missing / api-scan-source-available-files-present; BootstrapGatePipelinePresetsTests×15 across 5 strict presets × 2 wiring assertions + api-scan ordering + 4 ungated presets); 1530 main + 62 sandbox tests passing."
    p0130b: "Three remaining bootstrap producer skills (D6 slice 2/2, cross-repo, content-only). agent-smith-skills 2.4.0 → 2.5.0: skills/coding/node-bootstrap/SKILL.md (Node/TypeScript stack detection — package.json + lockfile + tsconfig signals; activates_when='project_language = \"node\"'); skills/coding/python-bootstrap/SKILL.md (Python stack detection — pyproject.toml / requirements / poetry.lock / uv.lock; pytest vs unittest; activates_when='project_language = \"python\"'); skills/coding/generic-bootstrap/SKILL.md (deliberate fallback for languages outside the narrow project_language enum — Go / Java / Rust / Kotlin / Ruby; produces minimal but technically-correct file pair and explicitly flags itself as a fallback in the principles file so operators know to extend it; activates_when='project_language = \"generic\"'). agentsmith.yml skills.version pin 2.4.0 → 2.5.0. No agent-smith C# code change — gate plumbing already shipped in p0130a. p0130 parent done: bootstrap producers exist for every project_language enum value."
    p0130: "D6 parent: init-project pipeline as first-class onboarding flow (sliced into p0130a + p0130b + p0130c — all shipped)."
    p0130c: "InitProject Bootstrap-step migration to SkillRound dispatch (D6 follow-up, cross-repo). New CommandNames.PublishProjectLanguage + CommandNames.BootstrapDispatch in agent-smith. New ProjectLanguageMapper static service: 10-entry synonym table maps ProjectMap.PrimaryLanguage → project_language enum (csharp/c#/.net/dotnet → csharp, typescript/javascript/node/node.js/nodejs/ts/js → node, python/py → python, else → generic; case-insensitive, whitespace-trimmed). New PublishProjectLanguageHandler IConceptWriter publishes the typed enum via IRunStateConcepts.SetEnum. New BootstrapDispatchHandler reads AvailableRoles, narrows via existing ActivationSkillFilter against IRunStateConcepts, fail-loud on 0/>1 matches, emits exactly one SkillRound for the matching skill via CommandResult.OkAndContinueWith. InitProject preset rewritten: PipelineNameInitializer → CheckoutSource → AnalyzeCode (populates ProjectMap) → PublishProjectLanguage → LoadSkills → BootstrapDispatch → WriteRunResult → InitCommit. BootstrapProjectHandler no longer reachable from init-project (still consumed by 6 other presets — retirement is p0131b). Cross-repo: agent-smith-skills 2.5.0 → 2.6.0 — pipeline_name enum gains init-project; csharp/node/python/generic-bootstrap activates_when tighten from `project_language = \"X\"` to `pipeline_name = \"init-project\" AND project_language = \"X\"` so the bootstrap skills don't accidentally fire in fix-bug etc. when project_language is set; project_language vocab writer-pointer updated to PublishProjectLanguageHandler. agentsmith.yml skills.version pin 2.5.0 → 2.6.0. 14 new tests (ProjectLanguageMapperTests×6 across csharp/node/python/unrecognised/null-or-whitespace/whitespace-trimming, BootstrapDispatchHandlerTests×5 across single-match/no-match/ambiguous/activates_when-excludes-pipeline_name/no-skills-loaded, InitProjectPipelinePresetTests×3 across full-step-sequence/no-bootstrap-project/ordering); 1 existing PipelinePresetsTests.InitProject_HasMinimalCommands rewritten to InitProject_ContainsKeyCommands for the new shape. 1544 main + 62 sandbox tests passing. p0131b unblocked."
    p0132b: "FilterRound + VerifyRound cost attribution (slice 2/3 of p0132). FilterRoundHandler.FilterBatchAsync wraps per-batch chat-call in `BeginCall(role.Name, \"filter\", SkillExecutionPhase.Filter)` — each batch is its own scope so PerSkillBreakdown shows the cost distribution when a filter skill's input gets split by TokenBudgetBatcher. FilterRoundHandler.ApplyArtifactAsync wraps with SkillExecutionPhase.Synthesize (artifact-mode consolidates, doesn't filter). VerifyRoundHandler.InvokeVerifierAsync wraps per-verifier with SkillExecutionPhase.Verify — scope-verifier / build-verifier / test-verifier / architecture-verifier each show up individually. Gate-path scope (gateRetryCoordinator) still deferred — coordinator-side onResponse hook required. PerSkillBreakdown now covers every non-Gate LLM call routed through SkillRound + FilterRound + VerifyRound handlers. 1501 main + 62 sandbox tests passing."
    p0132a: "Per-skill cost attribution (slice 1/3 of p0132). SkillRoundHandlerBase's two chat-call sites (ExecuteDiscussionRoundAsync + non-Gate ExecuteStructuredRoundAsync) wrap their GetResponseAsync + Track in a `using (costTracker.BeginCall(skillName, role.Role, phase))` scope. New MapPhase helper translates PipelinePhase (from ContextKeys.CurrentPhase) into the per-skill SkillExecutionPhase enum (Plan→Plan, Review→Review, Final→Synthesize, unset→Discuss). PerSkillBreakdown now populates non-empty for every fix-bug / add-feature / mad-discussion / legal-analysis / security-scan / api-security-scan run — WriteRunResultHandler's existing rendering (shipped in p0128a) surfaces it in result.md as the headline operator-visible deliverable. Trade-off: full SkillCallRuntime migration (LimitEnforcer, RetryCoordinator, LoopTraceCollector, OutcomeClassifier, PipelineConcurrencyGate) deferred — the 441-line handler's two-path orchestration plus the Gate sub-path's existing retry coordinator doesn't fit cleanly through the runtime's single-shot ExecuteAsync shape; the scope wrap delivers the operator value while keeping the runtime as a known-good future migration target. Gate-path also NOT wrapped (gateRetryCoordinator owns its own chat-loop; wrapping requires a coordinator-side onResponse hook, absorbed by p0132b). ToolCallCount + LlmCallCount stay at 0 in cost records (no LimitEnforcer attached); duration falls back to elapsed-ms from StartedAt. 1501 main + 62 sandbox tests passing."
    p0131d: "Test-pack + validator cleanup (D7 slice 4/4) — CLOSED AS SUBSUMED. Each concrete done-criterion of the slice landed organically: (a) SkillMdParserExtendedTests.cs (with its 2 [Fact(Skip)] entries) deleted whole in p0131a; (b) ConceptVocabularyValidator reduced to a no-op stub in p0131a; (c) [Obsolete] markers never shipped on RoleSkillDefinition's legacy properties — they were just removed in p0131a; (d) ValidateConceptsCommand category-enum is already closed (auth/injection/secrets/iam/crypto/headers/inputs/outputs); no `*` wildcard ever shipped, nothing to tighten. p0131 parent done — all four slices closed."
    p0131c: "LegacyTriageStrategy removal (D7 slice 3/4). LegacyTriageStrategy.cs + TriageResponseParser.cs deleted (the latter's internal TriageResult retired with it). TriageStrategySelector collapses to a one-liner returning StructuredTriageStrategy for every (PipelineType, name) pair. autonomous routes to Structured now — the previous silent-no-op via Legacy hid the catalog gap (no `pipeline_name = \"autonomous\"` skills); StructuredTriage's HasLoadedSkills Fail-louds, which surfaces the issue explicitly. autonomous remains `pipeline_name`-fenced (out of scope here; skills-repo concern). DI registration AddTransient<LegacyTriageStrategy>() dropped. ITriageStrategy interface kept as a DI seam for future routing variants (provider-specific, replay-from-trace, etc.). TriageStrategySelectorTests rewritten as a single theory asserting every (type, name) pair returns Structured. 1501 main + 62 sandbox tests passing."
    p0131b: "BootstrapProjectHandler + CodeMapGenerator removal (D7 slice 2/4). Cascading deletion: ~10 supporting services that lived only in the BootstrapProject path retire as a package — MetaFileBootstrapper, SkillYamlGenerator, IProjectDetector + ProjectDetector, IRepoSnapshotCollector + RepoSnapshotCollector, IContextGenerator + ContextGenerator, IContextValidator + ContextValidator, ICodingPrinciplesGenerator + CodingPrinciplesGenerator, ICodeMapGenerator + CodeMapGenerator, ContextUserPromptBuilder, ILanguageDetector + DotNet/TypeScript/Python detectors, LlmResponseHelper, TreeRenderer. Domain records DetectedProject + RepoSnapshot deleted (only consumers were the deleted chain). 6 presets (FixBug, FixNoTest, AddFeature, MadDiscussion, SecurityScan, Autonomous) lose the legacy BootstrapProject step (operators relying on the BootstrapGate from p0130a get fast-fail with 'run init-project first' instead). Same 6 + ApiSecurityScan lose LoadCodeMap (the YAML-ish text rendering in ContextKeys.CodeMap is now emitted directly by AnalyzeProjectHandler). TestHandler.ResolveTestCommand drops the DetectedProject branch — ProjectMap is the single source of truth. CommandNames.BootstrapProject + LoadCodeMap constants kept (operators with custom presets may still reference them); both registered in RetiredCommands with migration hints. ContextKeys.DetectedProject + RepoSnapshot removed. 7 test files deleted (CodeMapGeneratorTests, ContextGeneratorTests, ContextValidatorTests, LoadCodeMapHandlerTests, ProjectDetectorTests, RepoSnapshotCollectorTests, LlmResponseHelperTests — ~1100 LoC); SecurityScanPresetTests + ApiSecurityScanPresetTests rewired for the new step ordering; TestHandlerNoSandboxFailsTests seeds ProjectMap; CommandContextFactoryTests builder list trimmed; NoLibGit2SharpInGraphTests anchored on a different Infrastructure.Core type. 1502 main + 62 sandbox tests passing. Net diff: ~ -3000 LoC across 46 files."
    p0131a: "Skill loader + frontmatter cleanup (D7 slice 1/4). RoleSkillDefinition loses RolesSupported / Activation / RoleAssignments / References / OutputContract / RoleBodies — only new-format fields (Role, Category, InvestigatorMode, SurveyScope, ScopeHint, BlockCondition, Loop, OutputSchema, ActivatesWhen) plus universals remain. SkillMdFrontmatter loses the RolesSupported rejection probe; YamlDotNet's IgnoreUnmatchedProperties just drops the unknown field. SkillMdParser.BuildRole drops the legacy-rejection branch. NewFormatSkillBuilder dual-write removed (was bridging to legacy fields for the [Obsolete] window). New SkillRoleMapping helper translates Role string (producer/investigator/judge/filter) → SkillRole enum (Lead/Analyst/Reviewer/Filter) at consumption sites. SkillIndexEntry shape simplified to (Name, Description, Role, OutputSchema?, ActivatesWhen?). TriageOutputValidator rewritten — role-slot check uses SkillRoleMapping; rationale-key check goes vocabulary-only (legacy ActivationCriteria-bag retired). TriageOutputProducer's ToIndexEntry + RenderSkills updated. SkillIndexBuilder writes the new YAML schema (role / output_schema / activates_when per skill); skills without Role excluded. SkillBodyResolver shrunk from 82 → 19 lines (RoleBodies branch + {{ref:X}} placeholder substitution retired with the References field). FilterRoundHandler.ResolveOutputForm derives OutputForm from OutputSchema (observation/plan → List; diff/bootstrap → Artifact). ConceptVocabularyValidator becomes a no-op stub (kept as DI hook for future load-time concept checks). 5 dead types deleted: ActivationCriteria, ActivationKey, RoleAssignment, OutputContract, SkillReference. SkillMdParserExtendedTests.cs (210 lines) deleted; SkillBodyResolverTests / SkillIndexBuilderTests / TriageOutputValidatorTests / TriageOutputProducerFilterTests / SkillMdParserNewFormatTests / YamlSkillLoaderTests updated for the new shape. 1562 main + 62 sandbox tests passing. Net diff: ~ -600 LoC across 23 files. Most of p0131d's intended cleanup happened here as a side-effect of the field removal."
    p0132c: "Verifier tool access (slice 3/3 of p0132, cross-repo). VerifyRoundHandler gains IDecisionLogger + LoopLimitsConfig ctor deps. New ResolveVerifyTools helper reads ContextKeys.Sandbox — when present, builds SandboxToolHost + ToolKit and returns the Verify-phase tool list (ReadOnly + RunCommand); when absent (smoke tests, no-runtime contexts), returns empty list so verifiers degrade gracefully to LLM-only static analysis. RunVerifiersAsync creates the chat-client with maxIterations = LoopLimitsConfig.ResolveToolCallCap(\"verify_diff\") (defaults to MaxToolCallsPerVerifier = 20). InvokeVerifierAsync attaches tools to ChatOptions.Tools (or null when empty). Cross-repo: agent-smith-skills 2.6.0 → 2.7.0 with build-verifier + test-verifier SKILL.md bodies describing two-mode operation — static pre-check (default) + live build/test run (when run_command exposed). Live failures → severity:high, blocking:true, confidence:100. Static-mode signals stay non-blocking medium-severity when live mode passes. Architecture-verifier + scope-verifier ignore the tool set (their bodies don't reference run_command). Post-verify Test command in FixBug preset stays as a fast-fail catch during the rollout window. ProjectBuildCommandResolver deferred — SKILL.md bodies instruct the LLM to read the build/test command from `.agentsmith/context.yaml` → `stack.testing` directly via the read-only tool set. agentsmith.yml skills.version pin 2.6.0 → 2.7.0. 17 existing verifier tests adapted to the new ctor signature. 1501 main + 62 sandbox tests passing. p0132 parent done — all three slices closed."
    p0131c-pre: "Discussion-triage migration prerequisite for p0131c. New PipelinePresets.IsSinglePhase(name) helper — true when preset contains neither RunReviewPhase nor RunFinalPhase (mad-discussion, legal-analysis, autonomous, init-project, skill-manager); unknown presets default to true. ITriageStrategySelector.Select signature extended (PipelineType) → (PipelineType, string pipelineName). TriageStrategySelector logic: Discussion-type AND name in {mad-discussion, legal-analysis} → StructuredTriage; everything else Discussion → LegacyTriage; non-Discussion → StructuredTriage. New SinglePhaseCollapser merges Review/Final phase assignments into Plan with first-write-wins dedup (Plan analysts seeded first, then Review analysts, Review reviewers, Final analysts, Final reviewers; HashSet ensures each skill appears once; Filter falls back Plan → Review → Final). StructuredTriageStrategy.ExecuteAsync resolves the pipeline name from ContextKeys.ResolvedPipeline, runs the collapser when IsSinglePhase, then emits only Plan-phase commands. TriageHandler updated to pass pipeline name to selector. autonomous stays on LegacyTriage — its catalog gap (no `pipeline_name = \"autonomous\"` skills) means StructuredTriage's HasLoadedSkills would Fail-loud on autonomous runs; Legacy's Ok-with-no-roles is the safer behavior until autonomous-* skills ship. 27 new tests across PipelinePresetsSinglePhaseTests×11 (5 single-phase presets + 4 multi-phase + fix-no-test edge + unknown-preset default), TriageStrategySelectorTests×10 (Discussion mad/legal → Structured ×2 + Discussion others → Legacy ×3 + non-Discussion → Structured ×4 + case-insensitive name match), SinglePhaseCollapserTests×6 (only-plan unchanged, review-merge, final-also-merged, dedup, filter-fallback, confidence/rationale-preserved). 1 existing TriageHandlerSnapshotTests adapted to new selector signature. 1571 main + 62 sandbox tests passing. mad-discussion + legal-analysis now route through StructuredTriage; LegacyTriageStrategy retained only for autonomous (and any future un-migrated Discussion preset). p0131c (LegacyTriage delete) unblocked once autonomous catalog gap is resolved separately."
    p0133: "Init-project label-trigger onboarding. Closes the D6 gap that left no documented way to bootstrap a new repo in webhook/polling-only deployments (no Slack/Teams). New TicketLifecycle static helper extracted from CommitAndPRHandler's FinalizeTicketAsync (id-only signature: TicketId + TicketConfig + doneStatus? + summary). InitCommitHandler gains the lifecycle branch: TryGet<TicketId> from pipeline context, when present call TicketLifecycle.FinalizeAsync (UpdateStatusAsync + TransitionToAsync when DoneStatus configured; CloseTicketAsync otherwise). Slack-modal / CLI init paths publish no TicketId → branch no-ops. NO FetchTicket addition to InitProject preset — that would have required making FetchTicketContextBuilder.cs:14 null-tolerant, touching a handler used by 5 other presets. config/agentsmith.yml gains agent-smith:init → init-project as the FIRST pipeline_from_label entry in all four platform examples (one live jira_trigger block + four commented github/gitlab/azuredevops/jira examples). New docs/setup/onboarding.md walks the operator flow (prereq → trigger config → label-an-issue → review-and-merge-PR → followup tickets) with a troubleshooting section. docs/setup/label-triggers.md gains an 'Onboarding (first run)' section; docs/setup/README.md links onboarding.md as the recommended first step. New tests: InitProjectLabelTriggerSmokeTests×4 (one per platform — GitHub label, GitLab label, Azure DevOps tag, Jira label-via-assignee — verifies WebhookResult.Pipeline = 'init-project' and InitialContext[DoneStatus] is published); InitCommitHandlerLifecycleTests×4 (no-ticket skip, ticket+done_status transition+update-status, ticket-without-done_status close, transition failure still PR-success). p0029 Slack-modal path audited and confirmed functional (notes/init-trigger-audit.md): ChatIntentParser → InitProjectIntent → InitProjectIntentHandler → JobRequest, modal route also wired via SlackModalSubmissionHandler. 1519 main tests passing."
    p0135: "Sandbox toolchain auto-detection. Fixes the structural bug where SandboxSpecBuilder's language-aware branch was never taken (TryCreateSandboxAsync runs before AnalyzeProjectHandler so ProjectMap was always null at sandbox-create time → every pipeline got the generic buildpack-deps fallback regardless of repo language). New SandboxLanguageResolver service walks two additional resolution layers before the fallback: (a) host-side project-map.json cache via IAgentSmithPaths.ProjectCacheDir(source.Url) — populated by every prior AnalyzeCode run; (b) remote .agentsmith/context.yaml via a new ISourceProvider.TryReadFileAsync(path, ct) interface method implemented across all four source providers (AzureRepos via GitHttpClient.GetItemContentAsync, GitHub via Octokit Repository.Content.GetAllContentsByRef, GitLab via REST raw-file endpoint, Local via File.ReadAllTextAsync — null on 404, propagate auth + server errors). New SandboxToolchainResolutionLayer enum (Override / HostCache / RemoteContextYaml / InMemoryProjectMap / GenericFallback) drives grep-stable log line at pipeline start: 'Sandbox toolchain resolved via {Layer}: language={Language}, image={Image}'. SandboxSpecBuilder gains Build(ProjectConfig, string? language) overload; LanguageImages dict extended with operator-facing aliases (C#, .NET 8, TypeScript, Node.js, golang). YamlDotNet PackageReference added to Application for context.yaml parsing. ISandboxLanguageResolver interface extracted for Moq compatibility. 18 new tests: SandboxLanguageResolverTests×7 (cache-hit, cache-miss-with-remote-fallthrough, remote-context-yaml-hit, all-layers-miss, malformed-yaml-graceful, non-scalar-stack-lang-graceful, remote-throws-non-cascade), LocalSourceProviderTryReadFileTests×4 + GitLabSourceProviderTryReadFileTests×4 (canonical existing-file / 404 / 500 / 401 paths), PipelineExecutorSandboxResolutionTests×3 (csharp-from-cache→dotnet-image, typescript-from-remote→node-image, generic-fallback→buildpack-deps). GitHub + Azure DevOps TryReadFileAsync unit tests deferred (SDK clients constructed internally; testing requires constructor-injection refactor → scope creep beyond p0135). 1582 main + 62 sandbox tests passing. Operator-facing: after one init-project run on a .NET repo, subsequent fix-bug runs use mcr.microsoft.com/dotnet/sdk:8.0 automatically — no agentsmith.yml override needed."
    p0139: "Named catalogs for agents/repos/trackers/pipeline_triggers in agentsmith.yml. Breaking config-schema change — pre-p0139 per-project inline source/tickets/agent blocks are replaced by top-level `agents:` / `repos:` / `trackers:` catalogs with reference-by-name from projects. New types in AgentSmith.Contracts/Models/Configuration: RepoConnection (record, RepoType enum: GitHub|GitLab|AzureDevOps|Local), TrackerConnection (record, TrackerType enum: GitHub|GitLab|AzureDevOps|Jira), ResolvedProject (record, transitional single-repo `Repo` accessor on top of `Repos` list), PipelineTriggerMap (wrapper around IReadOnlyDictionary<string,string>). AgentSmithConfig reshaped: Projects is now IReadOnlyDictionary<string, ResolvedProject>; new catalog dictionaries Agents/Repos/Trackers/PipelineTriggers exposed at top level. Old SourceConfig / TicketConfig / ProjectConfig deleted. Raw* DTOs (RawAgentSmithConfig, RawRepoEntry, RawTrackerEntry, RawProjectEntry) live in Infrastructure.Core as YamlDotNet binding targets only. New ConfigCatalogResolver + 3 small builders (RepoCatalogBuilder, TrackerCatalogBuilder, ResolvedProjectBuilder) convert raw → resolved with fail-fast aggregated ConfigurationException listing every unresolved reference. New AgentSmithConfigValidator (Application) catches trigger-block kind vs tracker-type mismatches + pipeline_triggers values referencing unknown pipelines; wired into Server startup (refuses to start with single aggregated error message). WebhookTriggerConfig.PipelineFromLabel is now nullable; PipelineResolver in the polling path falls back to global PipelineTriggers map when project-level map is null/empty. Consumer migration (~70 call sites) done via bulk perl rename + targeted Edit fixes — driven from 450 production errors + 638 test errors to zero. SourceConfigOverrider rewritten as immutable (returns new ResolvedProject via `with`). All four provider factories switched from string-Type switches to enum-Type switches; GitTokenResolver takes RepoType. New JSON schema at config/agentsmith.schema.json. Three doc files: docs/configuration/agentsmith-yml-schema.md (canonical reference), docs/configuration/migration-from-pre-p0139.md (hand-migration walkthrough using the Acme Sample+sample-b pair as worked example). agentsmith.example.yml + dogfood config/agentsmith.yml rewritten to new schema (11 projects in dogfood collapse onto 5 reusable agents + 4 repos + 4 trackers, replacing ~1100 lines of duplication with ~330 lines of references). 16 new tests: ConfigCatalogResolverTests×6 (valid load resolves all four catalogs, unknown agent/tracker/repo throws with precise message, multi-error single-pass, single-repo accessor returns it), AgentSmithConfigValidatorTests×5 (known/unknown pipeline_triggers values, jira-on-jira ok, azuredevops-on-jira rejected, github-on-github ok), PipelineResolverFallbackTests×5 (project-null → global, project-empty → global, project-populated → wins, project-no-match → null, no-global + null → DefaultPipeline). Webhook handlers refactor to use PipelineResolver+global fallback deferred to follow-up (polling path proves the design today). 1666 main + 62 sandbox tests passing. Operator-facing: agentsmith.yml is a one-time hand-rewrite — see docs/configuration/migration-from-pre-p0139.md. New schema reduces the cost of a 'change one agent default' operator action from O(N projects) to O(1)."
    p0140a: "Foundation slice of p0140 (multi-repo + project pipelines). Schema gains REQUIRED project_resolution sub-block on every webhookTrigger plus optional tracker.zero_match_comment; project.pipelines becomes a typed array (oneOf string|{name, agent?, skills_path?}). New domain records in AgentSmith.Contracts: ProjectResolutionConfig + ResolutionStrategy enum (Tag, AreaPath, Repo, ToAddress) under Models/Configuration; IncomingTicketEnvelope under Models/Triggers (labels + area-path + source-repo-url + to-address + ticket id/url/platform). WebhookTriggerConfig gains nullable ProjectResolution property (nullable so the validator emits a typed error, not a null-deref). TrackerConnection gains ZeroMatchComment bool default false. PipelineDefinition gains AgentName string? (the catalog reference) alongside the existing Agent: AgentConfig? (catalog-resolved). New RawPipelineEntry in Infrastructure.Core for YAML binding — RawProjectEntry.Pipelines retyped from List<PipelineDefinition> to List<RawPipelineEntry>; ResolvedProjectBuilder gains ResolvePipelines that maps Raw→Resolved with agent-catalog lookup (fails fast on unresolved agent refs with aggregated error). ITicketProvider gains bool SupportsComments => true default (zero behaviour change for today's four providers; future Email provider in p0141 returns false). New ProjectResolver service in Application/Services/Triggers — stateless, DI-registered as singleton, Resolve(config, envelope) returns IReadOnlyList<ProjectMatch(ProjectName, PipelineName, Kind)> with all matches (multi-match is intentional per p0140 umbrella). New AreaPathNormalizer static helper handles backslash/forward-slash equivalence and hierarchical prefix matching with real path-segment boundary (ContosoMain\\Billing does NOT match sibling ContosoMain\\BillingOther). AgentSmithConfigValidator gains 3 new checks: ValidateProjectResolutionPresence (every declared trigger has project_resolution), ValidateRepoStrategySingleRepo (strategy=Repo requires Repos.Count==1), ValidatePipelineOverrides (each PipelineDefinition.Name in PipelinePresets.Names, defence-in-depth for AgentName resolution). Dogfood config/agentsmith.yml's todo-list-azuredevops azuredevops_trigger gets a project_resolution strategy=area-path; example file gains three worked examples — one per shipped strategy (tag/area-path/repo). 14 new/adapted tests: ProjectResolverTests×7 (tag matches/none/two-projects, area-path exact/subtree/sibling-no-match, repo URL match); AreaPathNormalizerTests×3 (slash equivalence, exact match, sibling no-match); AgentSmithConfigValidatorTests×3 new (missing project_resolution, repo strategy with multiple repos, pipeline override agent missing); ConfigCatalogResolverTests×2 new (pipeline entry with agent name resolves from catalog, unknown agent throws); 3 existing happy-path validator tests adapted to declare ProjectResolution; 6 existing ProjectConfigNormalizerTests adapted from PipelineDefinition→RawPipelineEntry. NO production caller goes through ProjectResolver in this slice — webhook handlers still use today's per-handler FindProject (11 handlers migrate in p0140b). NO SpawnPipelineRunsUseCase (p0140b). NO ResolvedProject.Repo shim removal (p0140d). NO metrics infrastructure (p0140e). NO docs (deferred until full picture is stable, p0140e). Pipelines list YAML shorthand (`pipelines: [foo, bar]` plain-string form) deferred — only object form `[{name: foo, agent?: bar, skills_path?: baz}]` accepted today; custom IYamlTypeConverter is a future add when a project actually uses it. 1681 main + 62 sandbox tests passing (up from baseline 1666+62 — 15 net new green)."
    p0138: "Triage prompt rewrite + coding-catalog gap fix (cross-repo, agent-smith-skills 2.0.1 → 2.1.0). Closes the Triage failure exposed by p0137a's LoadSkills bundle: pre-p0138 triage-structured-system.md referenced SkillMdFrontmatter fields removed by p0131a (`activation.positive/negative`, `role_assignment`, `roles_supported`) and the canonical JSON example cited rationale keys not present in concept-vocabulary.yaml; the LLM imitated the example and produced invalid output. Prompt full rewrite: deletes stale field references, adds explicit role→slot mapping table (producer→Lead, investigator→Analyst, judge→Reviewer, filter→Filter) as a HARD CONTRACT section, rewrites Rationale grammar pointing to the new `## Available Rationale Keys (Concept Vocabulary)` user-prompt section as the sole key source, updates the JSON example with real vocabulary keys (`persistence`, `authentication`). AddStrictReminder retry-prompt fixed in parallel. TriageOutputProducer.BuildTokens signature changes to take ConceptVocabulary; new private static RenderVocabulary(ConceptVocabulary) emits one bullet per entry (`- <name>: <description>`), empty vocabulary → explicit 'cite no keys' note. triage-structured-user.md gains the `## Available Rationale Keys (Concept Vocabulary)` section between Available Skills and Instructions with a `{concept_vocabulary}` placeholder. Skills-repo ships 5 new SKILL.md files under skills/coding/: backend-developer-planner / frontend-developer-planner / devops-planner / tester-planner (role=producer, output_schema=plan, activates_when='pipeline_name = \"fix-bug\" OR pipeline_name = \"feature-implementation\"'), plus false-positive-filter (role=filter, output_schema=observation, activates_when covers fix-bug + fix-no-test + feature-implementation + mad-discussion). All 5 follow the addyosmani-style 'Lead when X. Analyst/reviewer when Y.' description convention. Filter body enumerates 6 explicit removal categories (out-of-scope / framework-handled / test-only / already-addressed / insufficient-evidence / duplicate) with one-line examples each so the LLM has a fixed rubric instead of 'remove noise'. Coding catalog now has 11 producer skills (4 new planners + 3 existing + 4 bootstraps), 12 investigator, 7 judge, 1 filter (was 0) — Filter slot in fix-bug / fix-no-test / feature-implementation / mad-discussion is structurally fulfillable. agentsmith.example.yml + Acme k8s configmap pin updated to v2.1.0. 3 new tests: TriagePromptArchitectureTests×6 (4 stale-term theory cases + role-slot mapping + concept_vocabulary placeholder), TriagePromptCanonicalExampleTests×1 (canonical JSON example from the system prompt passes TriageOutputValidator — closes 'example contradicts its own constraints' bug class). 1651 main + 62 sandbox tests passing. DEFERRED to p0138-followup: rewrite existing architect-planner / dba-planner / security-reviewer-planner descriptions into the addyosmani convention for catalog consistency (current 3 work end-to-end, just stylistic polish). Operator-facing: fresh fix-bug run on a backend-heavy ticket now reaches Triage and passes validation on the first attempt — no role-slot mismatch, no invented keys, filter slot fillable."
    p0137d: "Compose tag pinning + logging-config to appsettings (partial — scope reduced at implementation time). Program.cs inline AddFilter / SetMinimumLevel calls removed; replacement in src/AgentSmith.Server/appsettings.json (production defaults: Default=Information, framework noise categories like System.Net.Http.HttpClient / Microsoft.AspNetCore.* at Warning, Console.IncludeScopes=true) and appsettings.Development.json (Default=Debug override). Microsoft.NET.Sdk.Web auto-copies both files. deploy/docker-compose.yml :latest tags replaced with ${AGENTSMITH_VERSION:-0.48.0} / ${AGENT_VERSION:-0.48.0} substitution on agentsmith, sandbox-agent, and server services (server's AGENTSMITH_IMAGE env-var fallback also pinned via the same variable). DEFERRED to p0137d-followup: docker-socket-proxy sidecar replacement for user:root, env-var-fallback removal in AddJobSpawnerOptions (K8S_NAMESPACE / IMAGE_PULL_POLICY / K8S_SECRET_NAME / DOCKER_NETWORK), Acme k8s-management manifest update, deploy/README.md operator-upgrade note. 1644 main + 62 sandbox tests passing. Operator-facing: log filters now operator-tunable without rebuild (Logging:LogLevel:* in appsettings or via ASPNETCORE / DOTNET / Logging__ env-var conventions); compose tag pinning surfaces via AGENTSMITH_VERSION + AGENT_VERSION env-vars (set in .env or shell)."
    p0137c: "Async-pattern cleanup (partial — scope reduced at implementation time). Four hosted-service Task.Run wrappers removed: PipelineQueueConsumer.RunAsync calls RunOneAsync directly (returned Task added to inFlight); LeaderElectedHostedService.LeadAsync calls the work delegate directly (Func<CancellationToken, Task> already returns the running task); JobHeartbeatService.Start calls RenewLoopAsync directly so the Handle captures the actual loop for DisposeAsync to await. RedisEventChannel constructor stops doing work — new explicit Start() method replaces the constructor-side Task.Run, with the consumer task field nullable and DisposeAsync tolerating null; RedisJobBus invokes Start() immediately after construction. DEFERRED to p0137c-followup: IBackgroundTaskQueue + BackgroundTaskQueueProcessor infrastructure for the Slack/Teams webhook ack-and-detach pattern (4 call sites still use _ = Task.Run); architecture test asserting no Task.Run inside async methods across src/. 1644 main + 62 sandbox tests passing. Operator-facing: no behavior change; diagnostic Task identity is now meaningful for the four hosted services."
    p0137b: "DI hygiene (partial — scope reduced at implementation time). AddHttpClient() consolidated to a single composition-root call in Server's Program.cs; duplicate AddHttpClient() removed from AddTeamsAdapter, AddSlackAdapter, and Infrastructure's AddAgentSmithInfrastructure. TeamsApiClient + BotFrameworkTokenProvider + SlackApiClient registered via services.AddHttpClient<T>() with declarative Timeout (30 s) and SlackApiClient BaseAddress (https://slack.com/api/) — IHttpClientFactory owns the handler pool. ValidateScopes=true unconditionally + ValidateOnBuild=true in Development wired via builder.Host.UseDefaultServiceProvider — DI tree is captive-free at this boundary (verified by ServerDiLifetimeTests). DEFERRED to a p0137b-followup phase: TeamsAdapter/SlackAdapter Singleton → Scoped conversion (handler-rotation enabler) — the captive-dependency analysis across MessageBusListener + webhook scopes + interaction handlers is non-trivial enough to warrant a focused pass; dedicated architecture test asserting bare-AddHttpClient appears once across src/AgentSmith.Server/**/*.cs. 1644 main + 62 sandbox tests passing. Operator-facing: no config change required; behavior unchanged at the IPlatformAdapter surface."
    p0137a: "Orchestrator-spawn-path symmetry — IJobSpawner brought to configuration parity with ISandboxFactory (p0135 / p0136). New OrchestratorGlobalConfig (top-level agentsmith.yml 'orchestrator' block: registry + version) + OrchestratorConfig (per-project override: registry / version / resources, peer to SandboxConfig). New IOrchestratorImageResolver + OrchestratorImageResolver (Application) mirror IAgentImageResolver semantics — project override → global → fail-loud InvalidOperationException naming 'orchestrator.version' when empty. New IOrchestratorResourceResolver (interface in Application) + OrchestratorResourceResolver (Server-side impl — accesses Server-resident JobSpawnerOptions.Resources as the global-default surface, hence the split). JobRequest gains required OrchestratorImage + OrchestratorResources fields — the contract between handler and spawner makes the handler-resolves-first invariant load-bearing. FixTicketIntentHandler + InitProjectIntentHandler inject the resolvers + IConfigurationLoader + ServerContext, resolve ProjectConfig from intent.Project (TryGetValue → empty ProjectConfig fallback for unknown projects → resolver falls through to global), populate JobRequest. Spawners read exclusively from JobRequest: KubernetesJobSpawner sets V1Container.Image = request.OrchestratorImage + Resources = BuildResources(request.OrchestratorResources); DockerJobSpawner sets CreateContainerParameters.Image = request.OrchestratorImage + HostConfig.Memory/MemoryReservation/NanoCPUs from request.OrchestratorResources via new ResourceLimitsDockerExtensions (extracted parser pair from DockerContainerSpecBuilder, shared via extension methods on ResourceLimits). JobSpawnerOptions.Image default → empty (legacy AGENTSMITH_IMAGE env-var still binds for one-release transition window). DispatcherDefaults.AgentImage constant removed. AddOrchestratorGlobalConfig() extension in SandboxServiceCollectionExtensions binds IOptions<OrchestratorGlobalConfig> from AgentSmithConfig.Orchestrator (loaded via IConfigurationLoader) + registers IOrchestratorResourceResolver. PipelinePresets fix: LoadSkills inserted before Triage in FixBug / FixNoTest / AddFeature / MadDiscussion (regression — StructuredTriageStrategy bails at Triage without AvailableRoles); regression test PipelinePresetsConsistencyTests asserts the invariant across all presets that contain Triage or SkillRound-family commands, also caught LegalAnalysis + Autonomous missing LoadSkills which were fixed in the same patch. agentsmith.example.yml documents new top-level orchestrator block + per-project override block. 12 new tests: OrchestratorImageResolverTests×4 (project-overrides-both / version-only / both-empty-throws / empty-registry-bare-name), OrchestratorResourceResolverTests×3, PipelinePresetsConsistencyTests×6 (4 named-preset + 2 cross-cutting theory tests). SlackModalSubmissionHandlerTests + JobSpawnerOptionsBindingTests + ServerDiLifetimeTests adapted to the new handler ctor + JobSpawnerOptions.Image=empty + AddOrchestratorGlobalConfig wiring. 1656 main + 62 sandbox tests passing. Operator-facing: pin orchestrator.version once in agentsmith.yml; FixTicket / InitProject in Slack/Teams now spawns the pinned version on both K8s and Docker — no more agentsmith-cli:latest implicit dependency."
    p0136: "Per-project sandbox container resources via IOptions. Replaces hardcoded CPU/memory in PodSpecBuilder + DockerContainerSpecBuilder with global SandboxOptions defaults plus per-project projects.<name>.sandbox.resources overrides in agentsmith.yml. ResourceLimits expanded to four explicit Kubernetes quantities (CpuRequest, CpuLimit, MemoryRequest, MemoryLimit) with mutable properties + parameterless ctor so YamlDotNet can deserialise the YAML block; positional 4-arg ctor preserved for in-code construction. SandboxSpec.Resources is required (no nullable + default fallback) so the resolver becomes load-bearing — no path bypasses ISandboxResourceResolver. PodSpecBuilder.BuildToolchainContainer now emits BOTH Requests and Limits (pre-p0136 only Limits, breaking namespaces with ResourceQuota that mandates requests). DockerContainerSpecBuilder maps the four quantities onto HostConfig: CpuLimit→NanoCPUs, MemoryLimit→Memory, MemoryRequest→MemoryReservation; CpuRequest intentionally unmapped (Docker has no first-class CPU request). First IOptions<T> touchpoint in Server: JobSpawnerOptions converted in-place (KubernetesJobSpawner, DockerJobSpawner, DockerNetworkResolver consume IOptions<JobSpawnerOptions>; AddJobSpawnerOptions takes IConfiguration, layered binding keeps legacy env-vars as defaults with JobSpawner__* section winning) and extracted from KubernetesJobSpawner.cs into its own Server/Models/JobSpawnerOptions.cs file (one-type-per-file). New SandboxResourceResolver (Application/Services/Sandbox) injects IOptions<SandboxOptions> and resolves projectConfig.Sandbox?.Resources first, otherwise the global section. AgentSmith.Application/Models/SandboxOptions.cs houses the IOptions binding target (Application not Server so the resolver doesn't invert layering). Acme 8-deployment-server.yaml gets commented Sandbox__* env-var examples; agentsmith.example.yml documents the projects.<name>.sandbox.resources YAML block. 11 new tests: SandboxResourceResolverTests×3 (project-override / sandbox-resources-null / sandbox-block-null), SandboxSpecBuilderResourcesTests×2 (resolver-driven population), PodSpecBuilderResourcesTests rewritten×3 (loader keeps fixed limits + requests, toolchain populates both Requests AND Limits with passed-in quantities), DockerContainerSpecBuilderTests×6 (CPU + memory quantity parsing now covers millicore + plain-core CPU and bare/Gi/Mi memory, MemoryReservation mapping from MemoryRequest), SandboxOptionsBindingTests×2 (appsettings section binds + defaults), JobSpawnerOptionsBindingTests×2 (section binds + legacy env-var fallback), SandboxResourcesYamlTests×2 (YAML block populates ResourceLimits + absent leaves null). 1604 main + 62 sandbox tests passing. Backwards-compatible: a project with no sandbox.resources block and no Sandbox configuration section receives ResourceLimits.Default (250m/1000m CPU, 512Mi/2Gi memory) — same effective limits as before the phase, no operator-visible change without opt-in. IJobSpawner / KubernetesJobSpawner legacy CLI-image path intentionally untouched per memory note 'CLI is dev-tool only; spawned containers must be per-tool/per-language runtimes'."
    p0140a: "Foundation slice of p0140 (multi-repo + project pipelines). Schema gains REQUIRED project_resolution sub-block on every webhookTrigger plus optional tracker.zero_match_comment; project.pipelines becomes a typed array (oneOf string|{name, agent?, skills_path?}). New domain records in AgentSmith.Contracts: ProjectResolutionConfig + ResolutionStrategy enum (Tag, AreaPath, Repo, ToAddress) under Models/Configuration; IncomingTicketEnvelope under Models/Triggers (labels + area-path + source-repo-url + to-address + ticket id/url/platform). WebhookTriggerConfig gains nullable ProjectResolution property (nullable so the validator emits a typed error, not a null-deref). TrackerConnection gains ZeroMatchComment bool default false. PipelineDefinition gains AgentName string? (the catalog reference) alongside the existing Agent: AgentConfig? (catalog-resolved). New RawPipelineEntry in Infrastructure.Core for YAML binding — RawProjectEntry.Pipelines retyped from List<PipelineDefinition> to List<RawPipelineEntry>; ResolvedProjectBuilder gains ResolvePipelines that maps Raw→Resolved with agent-catalog lookup (fails fast on unresolved agent refs with aggregated error). ITicketProvider gains bool SupportsComments => true default (zero behaviour change for today's four providers; future Email provider in p0141 returns false). New ProjectResolver service in Application/Services/Triggers — stateless, DI-registered as singleton, Resolve(config, envelope) returns IReadOnlyList<ProjectMatch(ProjectName, PipelineName, Kind)> with all matches (multi-match is intentional per p0140 umbrella). New AreaPathNormalizer static helper handles backslash/forward-slash equivalence and hierarchical prefix matching with real path-segment boundary (ContosoMain\\Billing does NOT match sibling ContosoMain\\BillingOther). AgentSmithConfigValidator gains 3 new checks: ValidateProjectResolutionPresence (every declared trigger has project_resolution), ValidateRepoStrategySingleRepo (strategy=Repo requires Repos.Count==1), ValidatePipelineOverrides (each PipelineDefinition.Name in PipelinePresets.Names, defence-in-depth for AgentName resolution). Dogfood config/agentsmith.yml's todo-list-azuredevops azuredevops_trigger gets a project_resolution strategy=area-path; example file gains three worked examples — one per shipped strategy (tag/area-path/repo). 14 new/adapted tests: ProjectResolverTests×7 (tag matches/none/two-projects, area-path exact/subtree/sibling-no-match, repo URL match); AreaPathNormalizerTests×3 (slash equivalence, exact match, sibling no-match); AgentSmithConfigValidatorTests×3 new (missing project_resolution, repo strategy with multiple repos, pipeline override agent missing); ConfigCatalogResolverTests×2 new (pipeline entry with agent name resolves from catalog, unknown agent throws); 3 existing happy-path validator tests adapted to declare ProjectResolution; 6 existing ProjectConfigNormalizerTests adapted from PipelineDefinition→RawPipelineEntry. NO production caller goes through ProjectResolver in this slice — webhook handlers still use today's per-handler FindProject (11 handlers migrate in p0140b). NO SpawnPipelineRunsUseCase (p0140b). NO ResolvedProject.Repo shim removal (p0140d). NO metrics infrastructure (p0140e). NO docs (deferred until full picture is stable, p0140e). Pipelines list YAML shorthand (`pipelines: [foo, bar]` plain-string form) deferred — only object form `[{name: foo, agent?: bar, skills_path?: baz}]` accepted today; custom IYamlTypeConverter is a future add when a project actually uses it. 1681 main + 62 sandbox tests passing (up from baseline 1666+62 — 15 net new green)."
    p0140b: "Webhook migration + spawner slice of p0140 (multi-repo fan-out at the enqueue layer). All 8 ticket-event webhook handlers (GitHubIssue/GitHubIssueComment/GitLabIssue/GitLabIssueComment/AzureDevOpsWorkItem/AzureDevOpsWorkItemComment/JiraAssignee/JiraComment) drop their per-handler static FindProject + backward-compat default-label fallbacks; instead they build IncomingTicketEnvelope via new WebhookEnvelopeBuilders (per-platform label extraction + envelope factory), call new IEnvelopeProjectResolver (interface in Contracts.Services; ProjectResolver implements it), and hand each (project, pipeline) match to new WebhookSpawnDispatcher (sealed instance class concentrating the per-match status-filter + zero-match log + opt-in tracker comment). The dispatcher invokes new ISpawnPipelineRunsUseCase (one method ExecuteAsync(config, project, pipelineName, envelope, matchedTrigger, ct, planAnswers?)) which builds one ClaimRequest per RepoConnection in project.Repos and submits via new ITicketClaimService.ClaimSpawnAsync (one pre-check + one Redis lock on agentsmith:claim-lock:{platform}:{ticket-id} + one Pending→Enqueued lifecycle transition + N enqueues). SpawnRegionExecutor extracted from TicketClaimService to honour the 120-line class limit. ClaimRequest + PipelineRequest both grow optional string? RepoName (single-repo projects get RepoName=repos[0].Name → bit-for-bit identical request shape per the single-repo regression suite). Old single-request ClaimAsync stays as a 1-element wrapper around ClaimSpawnAsync. WebhookRequestProcessor.RouteToClaimServiceAsync + ResolvePipelineName + MapClaim helpers DELETED (dead post-migration since no handler returns ProjectName/TicketId); DialogueAnswer + TriggerInput branches untouched. WebhookResult gets HandledNoRoute() + NotHandled() factory methods. CommitAndPRHandler + InitCommitHandler header text gains repo name (## Agent Smith - Completed in {repoName}) read from the already-populated RepoConnection on the per-handler context record. ITicketClaimService DI lifetime fixed from Scoped → Singleton (TicketClaimService is stateless; chain Singleton WebhookSpawnDispatcher → Transient ISpawnPipelineRunsUseCase → Scoped ITicketClaimService failed ValidateScopes). 44 new/adapted tests: ClaimSpawnAsyncTests×5 (one-request locks-transitions-enqueues-once / three-requests share lock+transition / rejection short-circuits / non-Pending lifecycle returns AlreadyClaimed / ClaimAsync delegates to spawn), SpawnPipelineRunsUseCaseTests×4, WebhookZeroMatchTests×6 (4 platforms + opt-in comment path + SupportsComments=false no-crash), MultiRepoEnqueueSmokeTests×1 (3 repos → 3 ClaimRequests in one ClaimSpawnAsync), SingleRepoRegressionTests×4 (one per tracker family — asserts canonical PipelineRequest shape + RepoName=repos[0].Name), 8 adapted handler tests + InitProjectLabelTriggerSmokeTests adapted to real ProjectResolver + mock spawn. PR/MR-dialogue handlers (GitHubPrCommentWebhookHandler / GitHubPrLabelWebhookHandler / AzureDevOpsPrCommentWebhookHandler / GitLabMrCommentWebhookHandler / GitLabMrLabelWebhookHandler) untouched — they route /approve|/reject answers, not pipeline starts. Scope-change from original spec: the count of '11 handlers' was wrong (audit showed 8 ticket-event handlers + 5 dialogue handlers); ClaimSpawnAsync replaces direct IRedisJobQueue.EnqueueAsync (spec text was unsafe — would have lost lifecycle dedup); multi-repo is enqueue-only in p0140b (consumer-side multi-repo execution unblocks via ContextKeys.CurrentRepo in p0140d). 1692 main tests passing (up from baseline 1681 + 20 net new green)."
    p0140e: "Metrics + empty-plan gate + docs closeout slice of p0140 — umbrella completes. New AgentSmithMeter static class (src/AgentSmith.Application/Services/Metrics/AgentSmithMeter.cs, ~30 lines) exposes Meter name='AgentSmith' (System.Diagnostics.Metrics BCL — no NuGet dep) + two Counter<long>: agent_smith_ambiguous_resolution_total (incremented per matched (project, pipeline) pair inside ProjectResolver.Resolve when matches.Count > 1) and agent_smith_pipeline_skipped_as_irrelevant_total (incremented by new EmptyPlanCheckHandler with labels project + pipeline + reason='empty_plan'). EmptyPlanCheckHandler (src/AgentSmith.Application/Services/Handlers/EmptyPlanCheckHandler.cs) is a new post-Plan gate that reads Plan from pipeline context and, when plan.Steps.Count == 0, sets new ContextKeys.EmptyPlanSkipped + emits the skip counter. PipelineExecutor short-circuits on the flag (same pattern as p0128b's OpenQuestionsAwaitingAnswer — returns CommandResult.Ok('Pipeline skipped: empty_plan') without running downstream Apply/Verify/Commit). Inserted into FixBug/FixNoTest/AddFeature presets between PlanOpenQuestions and Approval. Counter labels: project from Ticket.Source (best-effort), pipeline from ResolvedPipelineConfig.PipelineName (authoritative); both fall back to 'unknown'. Reason label is a string (not enum) so future phases can add classifications (wrong_pipeline_for_ticket_type, ticket_insufficient_info, etc.) without contract changes — today only 'empty_plan' ships. 4 new doc files: docs/configuration/multi-repo.md (~163 lines — when to use, YAML schema with 3-repo Jira example, what operator sees on multi-repo run, ambiguous-tag handling cross-linked to metrics, explicit non-feature of cross-repo coordination, init flow, p0140a-e summary), docs/configuration/project-resolution.md (~256 lines — one section per strategy with worked examples, YAML escape pitfall for area-path, validator constraint for repo strategy, p0141 forward-reference for to_address), docs/operations/metrics.md (~166 lines — Meter overview, two-counter spec with label semantics, cost-of-ambiguity PromQL dashboard, OpenTelemetry wiring example WITHOUT shipping the dep, dotnet-counters one-liner, roadmap for richer reason classification), docs/setup/onboarding.md updated (+56 lines — 'Bootstrapping a multi-repo project' section with 3-repo YAML + per-repo init workflow + cross-link). mkdocs.yml nav updated. 9 new tests: AgentSmithMeterRegistrationTests×2 (Meter name + counters discoverable via MeterListener), ProjectResolverAmbiguousMetricsTests×3 (single-match no increment / 2-match → 2 increments / 3-match → 3 increments with correct labels), EmptyPlanCheckHandlerTests×4 (plan-with-steps no-op / zero-step plan sets flag + emits counter / no-plan no-op / labels populated). New TestSupport: MeterCapture helper + MeterCollection (xUnit serial-collection — Counter<T> is process-global so meter-touching tests must not race). 1697 main tests passing (+9 net new green). p0140 umbrella spec moves from planned/ to done/. p0140 multi-repo + project-pipelines is now FULLY DELIVERED across a/b/c/d/e."
    p0140d: "ResolvedProject.Repo shim removal slice of p0140 — multi-repo invariant is now honest end-to-end. The transitional single-repo `Repo` accessor (introduced in p0139, slated for removal in p0140) DELETED from ResolvedProject.cs. New ContextKeys.CurrentRepo (string const = 'CurrentRepo') in AgentSmith.Contracts/Commands/ContextKeys.cs holds the run's RepoConnection. ExecutePipelineUseCase resolves PipelineRequest.RepoName → RepoConnection from project.Repos via new ResolveCurrentRepo helper (null RepoName falls back to repos[0] when Repos.Count==1; throws InvalidOperationException with clear message otherwise) and publishes it on PipelineContext BEFORE pipelineExecutor.ExecuteAsync runs. Every internal consumer of project.Repo migrated: SourceConfigOverrider (now reads CurrentRepo + writes updated CurrentRepo back to pipeline — fixes a pre-existing dormant bug where the call site at ExecutePipelineUseCase.cs:114 discarded the return value; CLI source-override flags actually work for the first time), PersistWorkBranchContextBuilder, CheckoutSourceContextBuilder, TryCheckoutSourceContextBuilder, CommitAndPRContextBuilder, InitCommitContextBuilder, AcquireSourceContextBuilder, DeliverOutputContextBuilder, PipelineExecutor (sandbox-language resolution at line 205 now reads CurrentRepo). GitLabMrLabelWebhookHandler.FindProjectBySourceUrl (dialogue handler, was out-of-scope of p0140b but reads .Repo.Url) migrated to iterate project.Repos.Multi-repo projects now correctly attribute PR comments to the right project regardless of which sibling repo hosts the PR. StartupSummaryLogger.LogProject rewritten: one project-summary line ('{Project}: {RepoCount} repo(s), tickets=..., agent=...') + N indented per-repo lines ('- {Repo.Name}: {Source}'). The 'source=' inline summary is gone — multi-repo projects naturally show their shape at startup. Tests: ~14 new + ~21 existing-fixture migrations (Repo = ... → Repos = new[] { ... }, and inline-PipelineContext tests gained `pipeline.Set(ContextKeys.CurrentRepo, repo)` setup). New test files: ExecutePipelineUseCaseCurrentRepoTests×4 (null RepoName + single-repo / null RepoName + multi-repo throws / case-insensitive match / unknown name throws with known repos list), BuildersReadCurrentRepoFromContextTests×3 (CommitAndPR / InitCommit / AcquireSource all read CurrentRepo from pipeline), StartupSummaryLoggerMultiRepoTests×2 (multi-repo emits one line per repo / single-repo unchanged shape). Adapted fixtures: ConfigCatalogResolverTests renamed `…_TransitionalSingleRepoAccessorReturnsIt` → `…_ExposesItViaReposList`. Existing ExecutePipelineUseCaseTests fixtures gained `Repos = new[] { ... }` (pre-p0140d they built `ResolvedProject { Pipeline = ... }` with no Repos — pre-p0140d ResolveCurrentRepo was non-existent, post-p0140d the zero-Repos case fails fast which is desirable). 1688 main tests passing (+9 net new green). Pre-existing dormant CLI source-override bug is collateral fix. Cross-slice: p0140c's StartupSummaryLogger polling rewrite + p0140d's repo rewrite are in different parts of the same file — clean separation.\n      → .agentsmith/phases/done/p0140d-repo-shim-removal.yaml"
    p0140c: "Poller restructure slice of p0140 — pollers go per-tracker. The four per-platform pollers (GitHubIssuePoller / GitLabIssuePoller / AzureDevOpsWorkItemPoller / JiraIssuePoller) DELETED and replaced by ONE class: TrackerPoller (sealed, src/AgentSmith.Application/Services/Polling/TrackerPoller.cs) — post-p0140c the loop is identical across platforms (the tracker.Type provides the platform string), so collapsing to one class removes 4 files of duplicated plumbing. TrackerPoller pulls open tickets via ITicketProvider.ListByLifecycleStatusAsync + ListOpenAsync, builds Labels-only IncomingTicketEnvelope (Ticket entity lacks AreaPath/SourceRepoUrl — polling supports only tag-strategy resolution; area-path on ADO via polling is a documented limitation), calls IEnvelopeProjectResolver, per-match selects trigger via new TriggerSelectionHelper.ByTrackerType, applies trigger_statuses filter, and invokes ISpawnPipelineRunsUseCase directly. IEventPoller.PollAsync return type changes from Task<IReadOnlyList<ClaimRequest>> to Task<PollResult> (new record at AgentSmith.Contracts/Models/PollResult.cs with counts PolledTickets/MatchedProjects/Spawned/StatusFiltered/ZeroMatched + static Empty()). PollerHostedService no longer takes IConfigurationLoader + configPath + ITicketClaimService — pollers own their own spawn path. PollerFactory.Build rewritten per-tracker (foreach over config.Trackers.Values where Polling.Enabled). PollerLeaderHostedService simplified accordingly. New TriggerSelectionHelper static class in Application/Services/Triggers (ByKind for webhook flow + ByTrackerType for polling flow); WebhookSpawnDispatcher migrated to use it (DRY). New PollingConfigDeprecationWarner (Application/Services/Configuration) emits a warning per project with project-level Polling.Enabled=true at startup — the project-level block stays bindable (soft-deprecation; hard removal is a follow-up phase). Wired in Program.cs alongside AgentSmithConfigValidator. TrackerConnection gains Polling property (PollingConfig). RawTrackerEntry + TrackerCatalogBuilder bind it from YAML (including the p0140a ZeroMatchComment bug fix — the field was on TrackerConnection but never bound from YAML pre-p0140c). agentsmith.schema.json tracker $def gains optional polling block. Claim-lock key stays `agentsmith:claim-lock:{platform}:{ticket-id}` so webhook + poller paths race for the same lock — no double-spawn possible. StartupSummaryLogger rewritten: per-tracker polling section with serving-projects list ('polling tracker X (Type) every Ns — serving projects: [a, b]'); project-level Polling.Enabled inline-flagged as [DEPRECATED]. ~16 new/adapted tests: TrackerPollerTests×8 (empty / alpha-tag-only spawn / status-filter skip / zero-match log-only / shared-tag fan-out / no-matching-projects all-zero / pending+discovered dedup / lifecycle-filter drops already-Enqueued), PollingConfigDeprecationWarnerTests×3, TrackerCatalogBuilderTests×3 (Polling binds / Polling defaults disabled / ZeroMatchComment binds), StartupSummaryLoggerTests×2 (per-tracker line + DEPRECATED flagging), ServerCommandBuildPollersTests rewritten for per-tracker registration (shared-tracker dedup assertion). Scope change from original spec: the spec's '4 pollers change ctor' framing was a holdover from the pre-collapse model; one TrackerPoller is the natural shape. 1679 main tests passing (delta vs p0140b: 16 new − 13 deleted = +3 net; matches consolidation arithmetic)."
    p0142: "SkillCallRuntime consumer migration: SkillRoundHandlerBase (Discussion + non-gate Structured paths), FilterRoundHandler (per-batch + artifact-mode), VerifyRoundHandler (per-verifier loop) all dispatch through ISkillCallRuntime instead of direct IChatClient.GetResponseAsync. LimitEnforcer + OutcomeClassifier + LoopTraceCollector + RetryCoordinator now run for every skill round/batch/verifier call. Gate-path cost scope (deferred 3x across p0132a/b/c) CLOSES via new optional Action<ChatResponse>? onResponse parameter on IGateRetryCoordinator.ExecuteAsync — SkillRoundHandlerBase opens a SkillCallScope around the gate call and chains costTracker.Track as the onResponse hook so each retry attempt produces its own per-attempt cost record (defensive try/catch around hook). New CallCostRecord.HitLimit string field surfaces the LimitEnforcer cap label (tokens/wall-clock/tool-calls/llm-calls) in PerSkillBreakdown's result.md rendering as an inline '(limit: X)' suffix; LimitEnforcer records FIRST cap reason (the cap that actually terminated the call). Per-handler Outcome→CommandResult policy lives in each handler: Discussion accepts Ok+Incomplete; Structured Plan/Review requires Ok; Filter tolerates per-batch Incomplete (Coverage observation); Verify tolerates per-verifier Incomplete. VerifyRoundHandler ctor DROPS IChatClientFactory + LoopLimitsConfig (both runtime-internal now via _limits.ResolveToolCallCap(InvestigatorMode)). SkillCallRequest gains optional PipelineName carrier (future IToolKit pickup). SkillRoundHandler/ApiSkillRoundHandler/SecuritySkillRoundHandler ctors gain ISkillCallRuntime pass-through. AgenticExecuteHandler intentionally NOT migrated (spec out-of-scope — FunctionInvokingChatClient + SandboxToolHost shape doesn't fit runtime's chat-then-result surface). 8 new tests (LimitEnforcerHitLimitTests×4 + GateRetryCoordinatorOnResponseTests×4); existing FilterRoundHandlerBatchedTests + VerifyRoundHandler*Tests + SkillRoundHandlerBootstrapTests adapted to ISkillCallRuntime ctor wire-up. 1730 main + 62 sandbox tests passing. Scope deviations: ChatClientFactory.MaxIterationsPerRequest const STAYS (the 16+ non-runtime callers would all need updates for zero practical value); AgenticExecuteHandler cap-from-LoopLimitsConfig deferred. Foundation for Message-Pipeline-Family (p0141) is in place. → .agentsmith/phases/done/p0142-skill-call-runtime-consumer-migration.yaml"
    p0143: "Triage becomes fully deterministic — zero LLM calls in the triage path. New DeterministicTriageSelector (~80 lines, Application/Services/Triage) reuses the existing ActivationSpecificityScorer to pick per-phase role-slot assignments from the activates_when-filtered candidate pool: Plan = producer→Lead + investigator→Analysts; Review = producer→Lead (same producer re-runs) + judge→Reviewers; Final = filter→Filter. Single-slot picks (Lead, Filter) use highest-specificity-wins with alphabetical-by-name tiebreak; multi-slot picks (Analysts, Reviewers) include all matching candidates sorted by specificity desc then name. Confidence is always 100 (deterministic selection has no judgment uncertainty). TriageOutputProducer rewritten as ~30-line wrapper; ctor DROPS ProjectMapExcerptBuilder + TriageOutputValidator + IPromptCatalog + IChatClientFactory dependencies; under-count slots logged at Warn level instead of failing (downstream tolerates via SinglePhaseCollapser + SkillRoundHandlerBase's no-skill-assigned skip). TriageOutputValidator + TriageRationaleParser + TriageValidationResult DELETED outright (no [Obsolete] window — zero external callers). StructuredTriageStrategy body unchanged (spec's Parse/Validation catch-block removal was a no-op — current implementation never had those catches). Per-preset RoleSlotCatalog / PresetRoleSlotResolver SKIPPED — role→slot mapping is data-driven from candidate.role field, no static catalog needed. 13 new tests (DeterministicTriageSelectorTests×10 + TriageOutputProducerDeterministicTests×3); 21 obsolete LLM-path tests deleted. 1719 main + 62 sandbox tests passing. DataFlow wildcard removal (spec scope item 5+6) DEFERRED to follow-up phase p0143b — spec's premise that wildcards live in operator YAML was wrong (actual edges are 11 C# *DataFlow.cs classes all extending PermissivePhaseDataFlow). → .agentsmith/phases/done/p0143-triage-determinism-and-flow-tightening.yaml"
    p0144: "Autonomous + skill-manager preset unfencing (cross-repo: agent-smith + agent-smith-skills). agent-smith-skills v2.2.0 (commit 5cf57ac on fix/api-security-judge-roles branch, not yet pushed/merged): pipeline_name enum gains 'autonomous' + 'skill-manager' values; 8 new SKILL.md files ship — 4 autonomous-* (planner, investigator, judge, filter) + 4 skill-manager-* (planner, investigator, judge, filter). Each follows the canonical Discussion-pipeline 4-skill shape so DeterministicTriageSelector (p0143) picks them correctly per phase. agent-smith: PipelinePresets.SkillManager rewritten from the bespoke 5-handler chain (DiscoverSkills + EvaluateSkills + DraftSkillFiles + ApproveSkills + InstallSkills) to the standard [PipelineNameInitializer, LoadSkills, LoadContext, Triage, SkillRound, ConvergenceCheck, CompileDiscussion, GeneratePlan, Approval, AgenticExecute, WriteRunResult] flow — proposed SKILL.md goes through standard GeneratePlan/Approve before AgenticExecute writes via WriteFile gated by Bootstrap-phase ToolKit. PipelinePresets.Autonomous gains the missing SkillRound step (pre-p0144 had Triage but no SkillRound — crashed since p0131c). 5 handler chains deleted (5 handlers + 5 contexts + 5 builders = ~15 files, ~600 LoC). CommandNames constants for the 5 retired commands removed; entries added to CommandNames.RetiredCommands with per-command migration hints. PipelineNameInitializerHandlerTests: throw-assertion rewritten with synthetic 'not-a-real-pipeline' name; two new positive-path tests for autonomous + skill-manager. PipelinePresetSmokeTests fence assertions deleted. 1721 main + 62 sandbox tests passing. Scope deviations: skills.version pin STAYS at v2.1.0 (two-step landing — pin bump waits for agent-smith-skills v2.2.0 tag after PR merges + release-please runs); smoke tests + PipelinePresetsCatalogConsistencyTests SKIPPED (catalog-consistency test would fail today because pinned v2.1.0 doesn't yet contain the new skills — deferred to p0144-followup after pin lands); autonomous-* activates_when uses 'pipeline_name = \"autonomous\"' ONLY (skipped spec's `AND has_<role-trigger>` per-role specialisation as speculative). → .agentsmith/phases/done/p0144-autonomous-and-skill-manager-unfencing.yaml"
    p0145: "Vorarbeit für Message-Pipeline-Family. New IToolHost contract + decomposition of SandboxToolHost into FilesystemToolHost (5 FS tools, per-phase filter), LogDecisionToolHost (always-on audit), HumanToolHost (always-on operator dialog). New IPipelineToolPolicy (Contracts) + AllHostsActivePolicy default that returns all three host types for every known and unknown pipeline name — preserves pre-p0145 behaviour 1:1 for code-family pipelines. IToolKit.GetToolsFor signature gains string pipelineName (positional first) + accepts IEnumerable<IToolHost> at CALL TIME (deviation from spec: hosts hold per-pipeline-run state — ISandbox, IDialogueTransport?, jobId, repoPath — that lives in PipelineContext not DI; ToolKit only takes IPipelineToolPolicy via DI, callers pass hosts as parameter). New ContextKeys.PipelineName set by ExecutePipelineUseCase alongside PipelineTypeName so non-concept consumers (ToolKit lookup, SkillCallRequest factories) have a string lookup without going through IRunStateConcepts. SandboxToolHost retained as [Obsolete] facade — all 7 public AIFunction methods + GetChanges()/GetDecisions() preserved by delegating to the internal sub-hosts; existing handlers (AgenticExecuteHandler, BootstrapRoundHandler, GenerateDocsHandler, GenerateTestsHandler, VerifyRoundHandler, ProjectAnalyzer) and SandboxToolHostExtensions all continue to work unchanged. VerifyRoundHandler.ResolveVerifyTools migrated to new IToolKit.GetToolsFor(pipelineName, phase, mode, hosts) signature, reading pipelineName from new ContextKeys.PipelineName with WildcardPipelineName='*' fallback. SkillCallRequest gains optional PipelineName field (carrier for the future p0142 SkillCallRuntime→IToolKit integration; runtime body itself unchanged because that's p0142's job). FilesystemToolHost SKIPS IDecisionLogger (spec listed as 'minimal, could go' — no FS tool uses it). HumanToolHost takes IDialogueTransport? + jobId? directly (no new IHumanQueryService — spec referenced 'existing internal' interface that doesn't exist in any sibling phase). 25 new tests (FilesystemToolHostTests×9 / LogDecisionToolHostTests×3 / HumanToolHostTests×3 / AllHostsActivePolicyTests×4 / ToolKitCompositionTests×6) + ToolKitTests adapted to new composition API + VerifyRoundHandler test ctors. 1722 main + 62 sandbox tests passing."
    p0146a: "Regex intelligence layer deleted — first slice of p0146 umbrella. Trigger: a recent Sample run mapped 4/82 routes (5%) because RouteMapper's regex only caught inline paths on HTTP attributes, missing the class-level [Route] prefix used by every real ASP.NET controller. Code deleted: 7 services (RouteMapper, FrameworkRoutePatterns, AuthBootstrapExtractor, UploadHandlerExtractor, SourceSnippetReader, DotNetRouteExtractor, FindingHandlerCorrelator), 2 application handlers (ApiCodeContextHandler, CorrelateFindingsHandler), 4 Contract interfaces (IRouteMapper, IAuthBootstrapExtractor, IUploadHandlerExtractor, IFindingHandlerCorrelator), 4 Contract models (ApiCodeContext, RouteHandlerLocation, SourceFileExcerpt, FindingHandlerCorrelation), 1 Application context (CorrelateFindingsContext), and 5 test files (RouteMapperTests, AuthBootstrapExtractorTests, UploadHandlerExtractorTests, FindingHandlerCorrelatorTests, ApiCodeContextHandlerTests). Wiring: ContextKeys (ApiCodeContext, ApiSourceAvailable, FindingHandlerCorrelations) + CommandNames (ApiCodeContext, CorrelateFindings constants + labels) + PipelinePresets.ApiSecurityScan (ApiCodeContext + CorrelateFindings steps) + ApiSecurityContexts (ApiCodeContextCommandContext) + ApiSecurityContextBuilders (ApiCodeContextContextBuilder, CorrelateFindingsContextBuilder) + Application/Infrastructure DI all cleaned. ApiSkillRoundHandler dropped BuildCodeContextSection + BuildPerSkillCodeSection + BuildCorrelationsForSkill (~40 LoC of per-skill source-excerpt lookup table) and now injects Func<PipelineContext, IRunStateConcepts> to read project_language; prompt prefix gains a single 'Project language: {project_language}.' line. Cross-repo (agent-smith-skills working copy on fix/severity-vocabulary-unification branch, not yet committed): 4 api-security SKILL.md files (controller-implementation-reviewer, auth-config-reviewer, upload-validator-reviewer, ownership-checker) lose their RoutesToHandlers/auth_bootstrap_files/upload_handlers input bullets in favour of 'use Read+Grep + project_language' — explicit NO framework cheat-sheet (first edit pass slipped a Program.cs/Spring/Express list in, removed before commit per spec). concept-vocabulary.yaml drops 3 dead-writer concepts (controller_handlers_mapped, upload_handlers_mapped, auth_bootstrap_files) — spec named two by approximate names, principle ('pre-LLM gate concept that no longer has a writer') covers all three. 1700 main + 66 sandbox tests passing. Scope deviation: DotNetRouteExtractor.cs deleted alongside RouteMapper.cs even though spec's delete list didn't enumerate it — its only caller was RouteMapper, same regex-encodes-framework-semantics anti-pattern, kept-would-be-dead-code; 3 model files (SourceFileExcerpt, FindingHandlerCorrelation, CorrelateFindingsContext) deleted alongside their sole consumers; 1 preset-order test rewritten from CorrelateFindingsBetweenCompressAndLoadSkills to LoadSkillsImmediatelyAfterCompress. → .agentsmith/phases/done/p0146a-delete-api-code-context-and-extractors.yaml"
    p0146c: "Drop ConvergenceCheckHandler's OBJECTION/AGREE prose-regex fallback + SkillRoundHandlerBase's ObjectionPattern. ConvergenceCheckHandler now fails loud (CommandResult.Fail) when SkillObservations are missing — every discussion-pipeline skill must emit observations (p0123); the regex fallback was double-dead (no observation-less caller exists post-p0123, and DetectObjection was matching against RenderObservationsAsText output rather than raw LLM text, so the OBJECTION substring could never appear in a typed observation's Concern/Description/Suggestion field). Two files in Application/Services/Handlers: ConvergenceCheckHandler.cs (legacy ExecuteLegacyConvergenceAsync + ObjectionPattern + AgreePattern + using System.Text.RegularExpressions removed; missing-observations → CommandResult.Fail surfaces the upstream contract violation instead of silently regex-fishing prose), SkillRoundHandlerBase.cs (DetectObjection method + ObjectionPattern field + using System.Text.RegularExpressions removed; RenderObservationsAsText output still feeds DiscussionEntry construction). 1721 main + 66 sandbox tests passing — no test asserted the legacy regex behaviour. Skipped sub-step 'extend SkillObservation with objection_target field' from the spec — audit found zero present consumers of OBJECTION[target] attribution. Skipped sub-step 'add temporary LogWarning before legacy fallback' from the spec — adding code that's removed in the same PR is churn when the audit already shows no caller relies on it. docs/pipelines/mad-discussion.md + docs/concepts/multi-skill.md + docs/concepts/pipeline-system.md + docs/pipelines/index.md still describe AGREE/OBJECTION/SUGGESTION/SILENCE — flagged as stale, dedicated docs-refresh follow-up tracked in decisions.md. Sub-phase of p0146 umbrella; sister phases p0146a + p0146b shipped in parallel branches. → .agentsmith/phases/done/p0146c-drop-convergence-objection-prose-regex.yaml"
    p0146b: "Retired RegexIntentParser (one of the five p0146 sub-phases eliminating regex-based 'understand-by-pattern' layers that duplicate LLM capability). RegexIntentParser.cs + RegexIntentParserTests.cs DELETED. DI registration in AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs swapped from `AddTransient<IIntentParser, RegexIntentParser>()` to a factory `AddTransient<IIntentParser>(sp => new LlmIntentParser(IChatClientFactory, IConfigurationLoader, new AgentConfig { Type='claude' }, ILogger<LlmIntentParser>))` — the naive `AddTransient<IIntentParser, LlmIntentParser>()` form fails DI validation because AgentConfig has no registration in the Application graph (Server's own ILlmIntentParser uses the identical factory pattern at AgentSmith.Server/Extensions/ServiceCollectionExtensions.cs:137). ExecutePipelineUseCase.BuildRequestFromLegacyInput simplified: the two regex shapes (`^init in X` / `^(security-scan|legal-analysis|api-scan) in X`) and the `using System.Text.RegularExpressions;` import DELETED; the method body now reduces to `intent = await intentParser.ParseAsync(userInput, ct)` + ResolvePipelineName + PipelineRequest construction. The string overload of ExecuteAsync KEPT (spec's optimistic premise that only RunCommand used it was wrong — WebhookRequestProcessor.ExecuteLegacyAsync at AgentSmith.Server/Services/Webhooks/WebhookRequestProcessor.cs:86 also hits it via webhook TriggerInput legacy path; deletion would have orphaned that handler). ExecutePipelineUseCaseTests.ExecuteAsync_InitMode_IncludesPrUrl DELETED — it exercised the deleted regex init shape; after removal `init todo-list` would route through LlmIntentParser (which throws on ticket-less input) — agent-smith init is the structured replacement. 1700 main + 66 sandbox tests passing. → .agentsmith/phases/done/p0146b-retire-regex-intent-parser.yaml"
    p0153: "MCP/Claude-Code parity for the filesystem + shell tool surface. read_file gains start_line/line_count/with_line_numbers; grep_in_file + grep_in_tree gain context_before/after, output_mode (content/files_with_matches/count), head_limit (1000) replacing the silent 200 cap; edit gains replace_all; new multi_edit with atomic+dry_run; run_command gains timeout_seconds + labeled-section text output (not JSON); find_files flips basename → path-relative globbing; list_directory gains with_sizes + sort_by; new directory_tree tool; ask_human gains flat choices[{label,description?}] + top-level recommended_index. SourceAnchoringPreamble names only the new tool set; deprecated grep/glob/list_files aliases stay registered as forwarders pending p0154's removal. → .agentsmith/phases/done/p0153-tool-surface-claude-code-parity.yaml"
    p0156: "ISO-8601 timestamp + 4-hex collision-suffix run identifiers replace the sequential r{NN} scheme. RunId is now generated once at pipeline start by ExecutePipelineUseCase (unified with the pre-existing log-correlation slot at ContextKeys.RunId — previously two separate ids drifted: 8-hex correlation in log scope + WIP trailer vs. r{NN} in directory + context.yaml). New format `{yyyy-MM-ddTHH-mm-ss}-{4hex}` is lexicographically sortable, filesystem-safe, ls-readable, and same-second collision-resistant (16-bit suffix kills batch-enqueue races). WriteRunResultHandler now creates the top-level `runs:` key in context.yaml when absent (fixes the silent no-op observed in a6914f38 when target repos lacked the legacy `state.active:` anchor). RunDirectoryReader parses only the new 24-char prefix; pre-p0156 r{NN} directories become wiki-invisible (CHANGELOG note). RunNumber:int → RunId:string across RunDirectoryInfo / RunData / handlers / formatter. New RunIdGenerator helper with format-invariant regex pin so CompileKnowledgeHandler's ordinal string compare stays valid by construction. Display sites render `Run 2026-05-20 22:27:43 UTC (8a3f)` — keeps seconds + suffix so operators can map header → directory. 1964 main + 83 sandbox tests passing. → .agentsmith/phases/done/p0156-timestamp-run-identifiers.yaml"
    p0154: "Web-fetch tool + skills-rename + deprecated-alias removal (lockstep with p0153). New WebToolHost (in-process, IHttpClient-backed) ships web_fetch(url, max_length?, start_index?, raw?) with HTML→markdown conversion via HtmlAgilityPack + ReverseMarkdown; pagination via max_length + start_index; non-HTML bodies returned verbatim; raw=true bypasses conversion. AgenticToolSurface gains optional WebToolHost params on ReadWriteWithHuman + Scout; Bootstrap stays web-less. WebToolHost added to AllHostsActivePolicy so policy doesn't block construction-site adoption. Deprecated `grep` / `glob` / `list_files` aliases removed from FilesystemToolHost (alongside agent-smith-skills 2.6.0 catalogue rename). Cross-repo agent-smith-skills (branch p0155-project-language-string, 2nd commit): targeted SKILL.md sweep migrating `glob \"...\"` → `find_files \"...\"` and `list_files` → `list_directory` across 12 SKILL.md files. DEFERRED: construction-site wiring of WebToolHost (no call site yet provides an HttpClient), bare-`grep` references that meant the tool (need per-skill audit of grep_in_file vs grep_in_tree), and the web_fetch adoption in supply-chain-auditor / compliance-checker / false-positive-filter that the spec called out. 1960 main + 83 sandbox tests passing. → .agentsmith/phases/done/p0154-web-tools-and-skills-rename.yaml"
    p0155: "LLM owns the project-language vocabulary end-to-end. ProjectLanguageMapper (closed csharp/node/python/generic enum from p0130c) DELETED; PublishProjectLanguageHandler now publishes ProjectMap.PrimaryLanguage verbatim (trim + lower) — Fail on missing ProjectMap or empty PrimaryLanguage (was: silently defaulted to 'generic'). TestHandler.ResolveTestCommand now reads ProjectMap.Ci.TestCommand and tokenises via System.CommandLine.Parsing.CommandLineStringSplitter; IsTrxCapable derives from command-prefix ('dotnet'), not language; the PrimaryLanguage switch that masked the a6914f38 'C#' miscoding is gone. New ConceptType.String + IRunStateConcepts.GetString/SetString admit free-form-vocabulary concepts at the type system level; GetString accepts both Enum and String so activation expressions `project_language = \"csharp\"` work regardless of declared type. BootstrapDispatch reads via GetString and the no-match Fail message now lists observed slug + available skill names. project-analyzer-system.md teaches the lowercase-canonical-slug rule with examples. Cross-repo agent-smith-skills 2.6.0: concept-vocabulary.yaml `project_language` enum→string; generic-bootstrap SKILL.md rewritten as deliberate-analyzer-choice. Pin bump deferred until skills v2.6.0 tags. 1950 main + 83 sandbox tests passing. → .agentsmith/phases/done/p0155-llm-owned-language-vocabulary.yaml"
    p0158: "Umbrella spec for unified multi-repo runs (one ticket = one pipeline = 1..N PRs). SUPERSEDED by slices p0158a + p0158b at implementation time; the umbrella file is retained in done/ as the design-intent record. → .agentsmith/phases/done/p0158-multi-repo-unified-run.yaml"
    p0158a: "First slice of p0158: collapse per-repo fan-out at the enqueue layer. PipelineRequest/ClaimRequest.RepoName removed; SpawnPipelineRunsUseCase emits exactly one ClaimRequest per ticket; ITicketClaimService.ClaimSpawnAsync (list) collapsed to ClaimAsync (single) with new SingleClaimRegionExecutor extracted to honour the 120-LOC limit. ContextKeys.CurrentRepo (singular RepoConnection) renamed to ContextKeys.Repos (IReadOnlyList<RepoConnection>); ContextKeys.SourceOverrideRepo added as the consumer-side scope filter (read by ExecutePipelineUseCase, populated later by p0158b's CLI step). ExecutePipelineUseCase.ResolveCurrentRepo deleted; new ResolveRepos returns the full project Repos list by default and filters to a single match when SourceOverrideRepo is set (unknown name throws with known-repos list). Consumer-side behaviour preserved bit-for-bit by reading Repos[0] in builders/coordinator — true multi-repo unified-run (workdir layout, per-repo iteration, PR cross-link, CLI --repo) deferred to p0158b. The original Sample-class reconciler bug (multi-repo project orphan tickets looping on ResolveCurrentRepo's multi-repo throw) is dissolved at this slice: there is no RepoName field and no resolve-from-name path anymore. Tests: ExecutePipelineUseCaseCurrentRepoTests + ClaimSpawnAsyncTests deleted; ExecutePipelineUseCaseReposTests new; SpawnPipelineRunsUseCaseTests + MultiRepoEnqueueSmokeTests rewritten for single-request shape; 1955 main + 83 sandbox tests passing. p0023 (old primary/consumer multi-repo spec) deleted as superseded. → .agentsmith/phases/done/p0158a-spawn-collapse.yaml"
    p0158b: "Second slice of p0158: workdir layout + per-repo handler iteration. Workdir moves from /work/ to /work/{repo-key}/ across the board, even for single-repo projects (one level deeper than pre-p0158a — documented breaking change). Repository.LocalPath becomes per-instance with optional ctor parameter; new static Repository.WorkPathFor(name) is the single source of truth for the per-repo subdir. SandboxGitOperations.CommitAndPushAsync gains a required workingDirectory parameter so every caller is explicit about which repo's tree is being committed. Five context records (CheckoutSource, TryCheckoutSource, CommitAndPR, InitCommit, PersistWorkBranch) become list-shaped: Configs (IReadOnlyList<RepoConnection>) replaces the singular Config / Source; a computed Config => Configs[0] keeps legacy primary-repo read sites compiling unchanged. Builders pass the full Repos list. New CheckoutStepFactory (internal static) extracts the mkdir/clone/checkout/checkout -b step builders parameterised by target directory, keeping CheckoutSourceHandler under the 120-LOC limit. Five handlers iterate Configs: CheckoutSourceHandler clones each repo into /work/{name}; CommitAndPRHandler + InitCommitHandler open one PR per repo with a `<!-- agentsmith:sibling-prs -->` marker in the body for p0158c's PATCH pass to replace; PersistWorkBranchHandler aggregates per-repo WIP-push outcomes. TryCheckoutSourceHandler kept on Configs[0] (api-scan today is single-primary; multi-repo fail-soft is a follow-up beyond p0158d). New OpenedPullRequest record + OpenStatus enum + ContextKeys.OpenedPullRequests carry per-repo PR outcomes (Opened / SkippedNoChanges / Failed) for p0158c's orchestrator. Test fixtures across ~10 affected handler/builder/service test files updated to the list-shaped contexts; 6 new spec-driven tests in MultiRepoHandlerTests cover workdir layout, per-repo iteration, empty-changes skip, OpenedPullRequests publication, monorepo N=1 path equivalence. 1961 main + 83 sandbox tests passing (+6 net new). → .agentsmith/phases/done/p0158b-handlers-workdir-pr.yaml"
    p0158c: "Third slice of p0158: PR cross-link pass-2. ISourceProvider gains UpdatePullRequestBodyAsync(prUrl, newBody, ct) with platform-specific impls (GitHub Octokit PullRequest.Update, GitLab PUT /merge_requests/{iid}, AzureRepos UpdatePullRequestAsync, Local no-op) — deviates from spec's separate IPullRequestBodyPatcher hierarchy because the provider already owns platform credentials/clients (decision logged). CommitAndPRHandler + InitCommitHandler now publish ContextKeys.OpenedPullRequestBodies (Dictionary<repoName, body-string>) alongside OpenedPullRequests so the orchestrator does in-memory marker-replace without re-fetching. New CommandNames.PrCrossLink + PrCrossLinkContext + PrCrossLinkContextBuilder + PrCrossLinkHandler. PrCrossLinkHandler short-circuits on <2 opened PRs; for >=2, renders the sibling block (Opened → URL, Failed → `(open failed)`, SkippedNoChanges → `(no changes)`) and calls UpdatePullRequestBodyAsync per Opened entry. PATCH failures are logged at WARN and counted in the result but do NOT fail the pipeline. PrCrossLink step inserted after CommitAndPR in FixBug + AddFeature + FixNoTest + MadDiscussion presets, and after InitCommit in InitProject preset. 5 new PrCrossLinkHandlerTests + InitProjectPipelinePresetTests sequence-shape test updated. 1966 main + 83 sandbox tests passing (+5 net new). → .agentsmith/phases/done/p0158c-pr-cross-link.yaml"
