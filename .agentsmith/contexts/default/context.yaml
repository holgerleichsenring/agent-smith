    p0205: "Two-pane master/detail run-detail (single-line NavRail + DetailPane, selection/expansion in URL hash via useRailSelection) replacing the p0183 stacked tree+collapsibles; Architecture/Result become Overview rail nodes wrapping TopologyGraph/ResultTab. New visible LoadCatalog first step in all 10 presets: resolver/handlers return CatalogResolution (real version tag/source/url/from-cache), handler gathers concept/skill/master counts and emits a per-run CatalogLoadedEvent (EventType 27, mirrored in hub-events.ts); CatalogLoadBody renders version/source/url/counts/cache-badge. → .agentsmith/phases/done/p0205-run-detail-two-pane.yaml"
