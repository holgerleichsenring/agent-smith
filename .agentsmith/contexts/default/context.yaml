    p0161a: "Monorepo context fan-out, runtime side. Wires the p0161 foundation (ISourceProvider.ListDirectoryAsync + MetaDiscovery + RemoteContextDiscovery + ContextYamlSummary + IContextYamlParser, all in commit ff4daa3) through the runtime: IProjectMetaResolver.ResolveAllAsync replaces single-result first-hit-wins resolution (depth-first descent + IsSkippedSegment helper deleted); SandboxLanguageResolver.ResolveAllAsync does pre-sandbox fan-out via ISourceProvider.ListDirectoryAsync + per-subdir TryReadFileAsync (synthetic ('default', '.', null) fallback for un-init repos); PipelineSandboxCoordinator spawns one sandbox per discovery with composite key from new SandboxKeyComposer ('default' / '<ctx>' / '<repo>' / '<repo>/<ctx>'); new ContextKeys.SandboxDiscoveries dict carries (Workdir, Language) per sandbox key. 9 p0158f handlers + 4 git-flow handlers (CheckoutSource, CommitAndPR, InitCommit, PersistWorkBranch) iterate ContextKeys.Sandboxes keys via new SandboxTargets helper; per-context TestHandler dispatches at WorkingDirectory = /work/<workdir>; MultiRepoTargets + ToolchainResolutionResult + SandboxToolchainResolutionLayer + old ResolveAsync overloads deleted per [[feedback_no_wrapper_shims]]. AgentPromptBuilder.BuildContextsInScopeSection (renamed from BuildReposInScopeSection) annotates sandbox keys with per-key PrimaryLanguage; applies_to plumbing deferred. Pre-existing GitHistoryScanner StringBuilder thread-safety crash (surfaced by p0161b's security-scan smoke) fixed with lock-on-append. 2001/2001 main test suite green + 83/83 sandbox suite green + 2/2 monorepo-mixed fixture integration tests green. Decisions: 10 entries in .agentsmith/decisions/p0161a.yaml (clone-at-workdir Option A, parallel SandboxDiscoveries dict, MultiRepoTargets deletion, applies_to deferral, legacy pre-v2 handling, key-naming scheme, smoke split, SandboxesForRepo helper over SandboxRepos dict, first-sandbox commit fallback for multi-context monorepo, GitHistoryScanner lock). Requires: p0161 (foundation). → .agentsmith/phases/done/p0161a-context-fanout-implementation.yaml"
    p0161b: "Closeout phase for p0161a: smoke gates + mixed-stack monorepo fixture. New tests/AgentSmith.Tests.Fixtures/monorepo-mixed/ on-disk fixture (contexts/server csharp + contexts/client typescript + contexts/docs markdown) with per-context context.yaml + ci.test_command + minimal source content. New MonorepoMixedDiscoveryTests exercises real LocalSourceProvider + ContextYamlParser end-to-end against the fixture (no mocks below the SandboxLanguageResolver layer) — asserts three RemoteContextDiscovery entries with per-context workdir + language, and that SandboxKeyComposer produces ['server','client','docs'] for single-repo multi-context. Smoke gates: fast (build + 2001/2001 unit + cli-boot + 4 cli-dry-runs + docker-compose config) all PASS; api-scan on agent-smith-api-security-azure-openai project PASS (33 findings, $4.20, 7 LLM calls); fix-bug --dry-run PASS (prints 22-command pipeline plan); security-scan FAIL at AnalyzeCode step 13/21 due to operator's expired GROQ_API_KEY in .env — code-side reached step 13 cleanly, validating the full Checkout + Bootstrap + Load* + Scan + LoadSkills chain under the new sandbox-key scheme (HTTP 401 is environmental, not regression). Two real regressions caught by smoke + fixed in this commit: 4 git-flow handlers (CheckoutSource, InitCommit, PersistWorkBranch, CommitAndPR) using sandboxes[repo.Name] post-rename; GitHistoryScanner StringBuilder thread-safety crash under concurrent Progress<T> dispatch. Requires: p0161a. → .agentsmith/phases/done/p0161b-monorepo-smoke-gates.yaml"
    p0161d: "Closes every item p0158g/p0161/p0161a/p0161b deferred — cold-init multi-component discovery + per-context bootstrap writes + applies_to plumbing + init-project run-doc parity. New BootstrapDiscover read-only round (SkillExecutionPhase.BootstrapDiscover, FilesystemToolHost BootstrapDiscoverSet — read_file/list_directory/directory_tree/grep_in_*/find_files only, plus ask_human via AgenticToolSurface.BootstrapDiscover) runs once per RepoConnection in cold-init; BootstrapDiscoverHandler resolves the project-discovery skill (output_schema=discovery), builds the prompt via BootstrapDiscoverPromptFactory (component-criteria anchor + ProjectMap + per-mode ambiguity guidance), parses the LLM's structured output (DiscoveryOutputParser, new SkillOutputSchema.Discovery + DiscoveryOutputValidator + embedded discovery.schema.json), and publishes ContextKeys.DiscoveredComponents = Dict<repoName, List<DiscoveredComponent>>. Re-init short-circuits when SandboxDiscoveries already surfaces a non-synthetic context. Ambiguity is fail-loud in headless mode (sets ContextKeys.DiscoveryAmbiguous; BootstrapDispatch refuses to emit rounds); interactive transports get ask_human. BootstrapDispatchHandler iterates DiscoveredComponents and emits one BootstrapRound per (repo, component) with new PipelineCommand fields RepoName + ContextName + Workdir; BootstrapRoundContext + BootstrapRoundContextBuilder thread ContextName + Workdir through. BootstrapPromptFactory writes per-context paths via MetaDirFor; PathWriteGuard takes contextName and rejects flat-root + foreign-context writes. Phase-spec applies_to flows through ContextKeys.PhaseAppliesTo into AgentPromptBuilder.BuildExecutionUserPrompt + BootstrapPromptFactory as an 'Applies to: ...' prefix line. WriteRunResultHandler fans out per RepoConnection on init-mode (Ticket null && Plan null): per-repo runs/{runId}-init/plan.md from per-repo DiscoveredComponents (component+workdir+language+evidence+bootstrap-skill table); per-repo result.md at parity with FormatResult (frontmatter + Discovery table + per-component bootstrap output sections + cost + duration + decisions + dialogue + per-skill breakdown + ExecutionTrail). BootstrapOutputs (new ContextKey, Dict<repoName, Dict<contextName, output>>) accumulates per-(repo,context) bootstrap-skill markdown summaries alongside legacy SkillOutputs. InitProject preset gains BootstrapDiscover step immediately before BootstrapDispatch. Cross-repo: agent-smith-skills 3.1.0 (catalog minor) — new skills/coding/project-discovery/SKILL.md (read-only producer, output_schema=discovery, depth-over-speed component enumeration, ask_human + fail-loud ambiguity branches); project-bootstrap SKILL.md rewritten — hardcoded path strings removed (user prompt canonical), 3-4 read-calls cap dropped, scope narrowed to 'write the two files at the paths the user prompt names'. Tests: 2022/2022 unit (15 new spec-driven — BootstrapDispatch ambiguity/multi-context/single-default, BootstrapDiscover cold-init/single/ambiguous-headless/ambiguous-interactive/re-init, BootstrapPromptFactory per-context paths, applies_to flow, PathWriteGuard foreign+flat reject, WriteRunResult init plan/fan-out/parity/cost). Anti-defer checklist walked: every item from p0158g/p0161/p0161a/p0161b scope.out documented as implemented-in-step-X or rejected-with-reason. Requires: p0161a, p0161b. → .agentsmith/phases/done/p0161d-bootstrap-per-context-discover-applies-to.yaml"
    p0154: "Web-fetch tool + skills-rename + deprecated-alias removal (lockstep with p0153). New WebToolHost (in-process, IHttpClient-backed) ships web_fetch(url, max_length?, start_index?, raw?) with HTML→markdown conversion via HtmlAgilityPack + ReverseMarkdown; pagination via max_length + start_index; non-HTML bodies returned verbatim; raw=true bypasses conversion. AgenticToolSurface gains optional WebToolHost params on ReadWriteWithHuman + Scout; Bootstrap stays web-less. WebToolHost added to AllHostsActivePolicy so policy doesn't block construction-site adoption. Deprecated `grep` / `glob` / `list_files` aliases removed from FilesystemToolHost (alongside agent-smith-skills 2.6.0 catalogue rename). Cross-repo agent-smith-skills (branch p0155-project-language-string, 2nd commit): targeted SKILL.md sweep migrating `glob \"...\"` → `find_files \"...\"` and `list_files` → `list_directory` across 12 SKILL.md files. DEFERRED: construction-site wiring of WebToolHost (no call site yet provides an HttpClient), bare-`grep` references that meant the tool (need per-skill audit of grep_in_file vs grep_in_tree), and the web_fetch adoption in supply-chain-auditor / compliance-checker / false-positive-filter that the spec called out. 1960 main + 83 sandbox tests passing. → .agentsmith/phases/done/p0154-web-tools-and-skills-rename.yaml"
    p0155: "LLM owns the project-language vocabulary end-to-end. ProjectLanguageMapper (closed csharp/node/python/generic enum from p0130c) DELETED; PublishProjectLanguageHandler now publishes ProjectMap.PrimaryLanguage verbatim (trim + lower) — Fail on missing ProjectMap or empty PrimaryLanguage (was: silently defaulted to 'generic'). TestHandler.ResolveTestCommand now reads ProjectMap.Ci.TestCommand and tokenises via System.CommandLine.Parsing.CommandLineStringSplitter; IsTrxCapable derives from command-prefix ('dotnet'), not language; the PrimaryLanguage switch that masked the a6914f38 'C#' miscoding is gone. New ConceptType.String + IRunStateConcepts.GetString/SetString admit free-form-vocabulary concepts at the type system level; GetString accepts both Enum and String so activation expressions `project_language = \"csharp\"` work regardless of declared type. BootstrapDispatch reads via GetString and the no-match Fail message now lists observed slug + available skill names. project-analyzer-system.md teaches the lowercase-canonical-slug rule with examples. Cross-repo agent-smith-skills 2.6.0: concept-vocabulary.yaml `project_language` enum→string; generic-bootstrap SKILL.md rewritten as deliberate-analyzer-choice. Pin bump deferred until skills v2.6.0 tags. 1950 main + 83 sandbox tests passing. → .agentsmith/phases/done/p0155-llm-owned-language-vocabulary.yaml"
    p0158: "Umbrella spec for unified multi-repo runs (one ticket = one pipeline = 1..N PRs). SUPERSEDED by slices p0158a + p0158b at implementation time; the umbrella file is retained in done/ as the design-intent record. → .agentsmith/phases/done/p0158-multi-repo-unified-run.yaml"
    p0158a: "First slice of p0158: collapse per-repo fan-out at the enqueue layer. PipelineRequest/ClaimRequest.RepoName removed; SpawnPipelineRunsUseCase emits exactly one ClaimRequest per ticket; ITicketClaimService.ClaimSpawnAsync (list) collapsed to ClaimAsync (single) with new SingleClaimRegionExecutor extracted to honour the 120-LOC limit. ContextKeys.CurrentRepo (singular RepoConnection) renamed to ContextKeys.Repos (IReadOnlyList<RepoConnection>); ContextKeys.SourceOverrideRepo added as the consumer-side scope filter (read by ExecutePipelineUseCase, populated later by p0158b's CLI step). ExecutePipelineUseCase.ResolveCurrentRepo deleted; new ResolveRepos returns the full project Repos list by default and filters to a single match when SourceOverrideRepo is set (unknown name throws with known-repos list). Consumer-side behaviour preserved bit-for-bit by reading Repos[0] in builders/coordinator — true multi-repo unified-run (workdir layout, per-repo iteration, PR cross-link, CLI --repo) deferred to p0158b. The original multi-repo reconciler bug (multi-repo project orphan tickets looping on ResolveCurrentRepo's multi-repo throw) is dissolved at this slice: there is no RepoName field and no resolve-from-name path anymore. Tests: ExecutePipelineUseCaseCurrentRepoTests + ClaimSpawnAsyncTests deleted; ExecutePipelineUseCaseReposTests new; SpawnPipelineRunsUseCaseTests + MultiRepoEnqueueSmokeTests rewritten for single-request shape; 1955 main + 83 sandbox tests passing. p0023 (old primary/consumer multi-repo spec) deleted as superseded. → .agentsmith/phases/done/p0158a-spawn-collapse.yaml"
    p0158b: "Second slice of p0158: workdir layout + per-repo handler iteration. Workdir moves from /work/ to /work/{repo-key}/ across the board, even for single-repo projects (one level deeper than pre-p0158a — documented breaking change). Repository.LocalPath becomes per-instance with optional ctor parameter; new static Repository.WorkPathFor(name) is the single source of truth for the per-repo subdir. SandboxGitOperations.CommitAndPushAsync gains a required workingDirectory parameter so every caller is explicit about which repo's tree is being committed. Five context records (CheckoutSource, TryCheckoutSource, CommitAndPR, InitCommit, PersistWorkBranch) become list-shaped: Configs (IReadOnlyList<RepoConnection>) replaces the singular Config / Source; a computed Config => Configs[0] keeps legacy primary-repo read sites compiling unchanged. Builders pass the full Repos list. New CheckoutStepFactory (internal static) extracts the mkdir/clone/checkout/checkout -b step builders parameterised by target directory, keeping CheckoutSourceHandler under the 120-LOC limit. Five handlers iterate Configs: CheckoutSourceHandler clones each repo into /work/{name}; CommitAndPRHandler + InitCommitHandler open one PR per repo with a `<!-- agentsmith:sibling-prs -->` marker in the body for p0158c's PATCH pass to replace; PersistWorkBranchHandler aggregates per-repo WIP-push outcomes. TryCheckoutSourceHandler kept on Configs[0] (api-scan today is single-primary; multi-repo fail-soft is a follow-up beyond p0158d). New OpenedPullRequest record + OpenStatus enum + ContextKeys.OpenedPullRequests carry per-repo PR outcomes (Opened / SkippedNoChanges / Failed) for p0158c's orchestrator. Test fixtures across ~10 affected handler/builder/service test files updated to the list-shaped contexts; 6 new spec-driven tests in MultiRepoHandlerTests cover workdir layout, per-repo iteration, empty-changes skip, OpenedPullRequests publication, monorepo N=1 path equivalence. 1961 main + 83 sandbox tests passing (+6 net new). → .agentsmith/phases/done/p0158b-handlers-workdir-pr.yaml"
    p0158c: "Third slice of p0158: PR cross-link pass-2. ISourceProvider gains UpdatePullRequestBodyAsync(prUrl, newBody, ct) with platform-specific impls (GitHub Octokit PullRequest.Update, GitLab PUT /merge_requests/{iid}, AzureRepos UpdatePullRequestAsync, Local no-op) — deviates from spec's separate IPullRequestBodyPatcher hierarchy because the provider already owns platform credentials/clients (decision logged). CommitAndPRHandler + InitCommitHandler now publish ContextKeys.OpenedPullRequestBodies (Dictionary<repoName, body-string>) alongside OpenedPullRequests so the orchestrator does in-memory marker-replace without re-fetching. New CommandNames.PrCrossLink + PrCrossLinkContext + PrCrossLinkContextBuilder + PrCrossLinkHandler. PrCrossLinkHandler short-circuits on <2 opened PRs; for >=2, renders the sibling block (Opened → URL, Failed → `(open failed)`, SkippedNoChanges → `(no changes)`) and calls UpdatePullRequestBodyAsync per Opened entry. PATCH failures are logged at WARN and counted in the result but do NOT fail the pipeline. PrCrossLink step inserted after CommitAndPR in FixBug + AddFeature + FixNoTest + MadDiscussion presets, and after InitCommit in InitProject preset. 5 new PrCrossLinkHandlerTests + InitProjectPipelinePresetTests sequence-shape test updated. 1966 main + 83 sandbox tests passing (+5 net new). → .agentsmith/phases/done/p0158c-pr-cross-link.yaml"
    p0159a: "Design system + token pipeline. Repo-root DESIGN.md (Zapier structural template, Smith-green primary, Inter-only typography, plus one Smith-specific `card-terminal-panel` for CLI/code surfaces) is single source of truth. `scripts/build-tokens.mjs` (zero deps, hand-rolled YAML parser, ~120 LOC) reads DESIGN.md frontmatter and writes `website/src/static/tokens.css` + `docs/stylesheets/tokens.css` (CSS custom properties for every color / typography role / radius / spacing token) and copies DESIGN.md → docs/DESIGN.md so MkDocs nav stays intact without external-link gymnastics. Inter @font-face block inlined in tokens.css (jsdelivr fontsource variable woff2, weight 100-900). Eleventy prebuild hook runs build:tokens; GitHub Actions docs workflow runs `node scripts/build-tokens.mjs` before `mkdocs build`. Generated artefacts (`tokens.css` × 2 + `docs/DESIGN.md`) gitignored. Old Linear-themed docs/DESIGN.md (from p0066) replaced wholesale by the copy step. Sites consume tokens via `var(--color-primary)` / `var(--typography-display-xl-size)` — token NAMES are the swap-tomorrow contract; values can change. → .agentsmith/phases/done/p0159a-design-system-and-token-pipeline.yaml"
    p0159b: "Eleventy landing re-skin. `styles.css` rewritten end-to-end against the DESIGN.md token vocabulary (every brand color via `var(--color-…)`, every typography role via `var(--typography-…-size/weight/line-height/tracking)`, every radius and spacing via var). Hero replaced: `hero-lifecycle.njk` partial leads with `Tickets become PRs.` headline + lifecycle SVG (animated 5-stage one-ticket→N-sandboxes→N-PRs diagram, embedded as `<img>` for re-embed-in-docs reuse). Pipeline taxonomy grid uses deterministic cream/dark tint mapping from DESIGN.md (code-changing pipelines = cream, severity/admin = dark). Geist CDN font drop; Inter loads via tokens.css @font-face. Two new terminal-accent tokens added to DESIGN.md (`terminal-link`, `terminal-string`) so styles.css has zero hardcoded brand hex (macOS traffic-light dots remain inline as chrome metaphor). `_data/site.json` tagline → 'Tickets become PRs.'; description rewritten around multi-repo. `_data/pipelines.json` step counts + skills.njk legacy discussion terminology kept as-is — drift fixes belong to p0159c. Eleventy build green; assets serve 200 from local http-server. → .agentsmith/phases/done/p0159b-landing-reskin.yaml"
    p0159c: "MkDocs Material re-skin + content drift fix. New `docs/stylesheets/overrides.css` maps Material's `--md-*` palette / typography / code-block CSS variables to the shared DESIGN.md tokens (`var(--color-primary)` etc.); light scheme = cream canvas + coffee ink + Smith green, dark scheme = ink canvas + cream-soft text + same accent. Old `docs/stylesheets/custom.css` (DM Sans + Linear `#00a854`) and `docs/overrides/stylesheets/linear.css` (Linear `#5e6ad2` indigo) deleted; `mkdocs.yml extra_css` swapped to `tokens.css + overrides.css`. `docs/index.md` rewritten around the embedded lifecycle SVG (`docs/assets/lifecycle.svg`, copied from website) + a 13-step user-visible fix-bug walkthrough that matches current `PipelinePresets.FixBug.cs` (plumbing steps hidden, multi-repo PR per repo + cross-link shown). New `docs/concepts/multi-repo-pipelines.md` page (linked from mkdocs nav under Concepts) tells the one-ticket-N-PRs story end to end: path-prefix dispatch, per-repo sandboxes, branch coherence, `--repo` ergonomics. Content drift: two parallel Explore agents audited 8 concept + 4 config docs against C# source-of-truth; HIGH-severity drifts fixed in this commit — phases-and-runs.md (r{NN} → ISO-8601 + 4hex per p0156), multi-skill.md (OBJECT/AGREE prose → typed SkillObservation per p0146c + p0151), pipeline-system.md (step counts vs current PipelinePresets.*.cs), ticket-lifecycle.md (single ClaimRequest per ticket per p0158a). MEDIUM/LOW drifts documented in `.agentsmith/notes/p0159c-doc-drift-audit.md`. agentsmith-yml.md gets a deprecation admonition + `AzureRepos`→`AzureDevOps` fix; full catalog-based rewrite deferred to its own phase. `mkdocs build --strict` not run locally (no mkdocs-material in dev env); CI workflow handles validation on next push. → .agentsmith/phases/done/p0159c-docs-reskin-and-content-drift.yaml"
    p0160: "Docs restructure + rewrite. MkDocs nav cut from 12 sections / 50+ pages to six sections (Home / Get it running / Connect your stuff / Trigger it / Host it / How it works / Reference). Existing pages moved under `docs/reference/` unchanged; new task-oriented surface written from scratch. New content (20 pages): docs/index.md rewritten with methodology + overview tables + lifecycle SVG; get-it-running/install.md + first-run.md; connect-your-stuff/tracker-{azure-devops,jira,github-issues,gitlab-issues}.md + repos-mono.md + repos-multi.md + ai-providers.md; trigger-it/{webhooks,polling,labels,cli}.md; host-it/{cli,docker-compose,kubernetes}.md; how-it-works/{methodology,lifecycle,multi-repo,skills-catalog}.md. Anchor sample is the fictional TodoList project (`todolist-api/worker/web/docs` under `acme-org/Platform`); zero customer/employer names in the docs per [[feedback_no_customer_names]] and explicit operator instruction. Skills-catalog.md is load-bearing — documents that skills live in the separate versioned `agent-smith-skills` repo (the older docs buried this). Holger-voice blog-mode applied per the updated `config/docs-writing-skill.md` (in-medias-res starts, positive descriptions per Rule 9, `stuff` over `components`). Eleventy landing hero retuned per Rule 9: `From ticket to PR` + `Every run shows its cost. Every change comes with the reasoning the agent followed.` (replaces previous `Agent Smith ships pull requests, not suggestions.` which used negation as definition). Audit trail in `.agentsmith/notes/p0160-doc-inventory.md`. `mkdocs build --strict` not run locally (no mkdocs-material in dev env); CI validates on next push. → .agentsmith/phases/done/p0160-docs-restructure-and-rewrite.yaml"
    p0157a: "First slice of p0157: provider Connection records replace positional credential strings (Pattern F). Seven new sealed records in Contracts/Providers/ (GitHubSourceConnection, GitLabSourceConnection, AzureReposSourceConnection, GitHubTicketConnection, GitLabTicketConnection, AzureDevOpsTicketConnection, JiraTicketConnection) collapse the 2-6 primitive-string ctor argument lists across 19 provider classes (5 GitHub: source/pr-diff/ticket/transitioner/issue-lister; 6 GitLab: source/ticket/transitioner/attachment-loader/issue-lister; 5 AzDO: source/ticket/transitioner/attachment-loader/connection-cache; 3 Jira: ticket/transitioner/issue-searcher). All three platform factories (SourceProviderFactory, TicketProviderFactory, TicketStatusTransitionerFactory) build the connection record once per call and pass it down. AzureDevOpsConnectionCache CreateClient renames the local VssConnection variable to avoid shadowing the new ctor param. JiraTicketStatusTransitioner._projectKey defaults to 'default' when ProjectKey is null to preserve old positional-string behaviour. Single-string types (GitLabPrDiffProvider/AzureDevOpsWorkItemLister/JiraTransitioner) stay positional. AzureDevOpsPrDiffProvider skipped (orphan code, no DI/factory/callers). Tests: 9 call sites migrated (source/ticket/transitioner test fixtures + GitLab attachment loader fixture). 2022 main + 83 sandbox tests passing. Smoke fast green. → .agentsmith/phases/done/p0157a-provider-connection-records.yaml"
    p0157b: "Second slice of p0157: stateless gate + value-record (Pattern S, partial Pattern V). DataFlowReadGate becomes a scoped DI service taking (IPhaseDataFlowResolver, IOptions<PipelineDataFlowConfig>, ILogger); AttachToStep(activeStep, pipelineName, context) returns an IDisposable that builds a nested private StepGate carrying the per-step values (_activeStep, _flow, _enforce, _alreadyWarned). PipelineStepRunner ctor drops (IPhaseDataFlowResolver, AgentSmithConfig) for the DataFlowReadGate dependency; the manual `new DataFlowReadGate(...)` in AttachReadGate at the per-step level is gone. PathReadGuard becomes stateless (ctor: IGitIgnoreResolver only); AssertReadable signature gains repoRoot as method arg. PathWriteGuard becomes stateless (ctor: IPathReadGuard only); AssertWritable signature gains repoRoot + phase + contextName as method args. ToolGuardInvoker absorbs per-bootstrap (repoRoot, writePhase, contextName) once at construction; FilesystemToolHost ctor defaults (writePhase=Implementation, contextName=null) keep non-bootstrap call sites unchanged. BootstrapToolHostFactory shrinks: takes IPathReadGuard + IPathWriteGuard from DI, no longer constructs them; previously-inline NullGitIgnoreResolver promoted to a top-level type and registered as default IGitIgnoreResolver singleton. SkillCallScope deliberately NOT collapsed to a record (spec premise wrong — IDisposable, mutator methods, BuildRecord business logic — see [[feedback_challenge_premises]]). PipelineDataFlowConfig bound via .Configure<AgentSmithConfig> so it stays one source of truth. Tests: DataFlowReadGateTests rewritten to drive the gate through PipelineContext.Get<T> + AttachToStep; PathReadGuardTests/PathWriteGuardTests migrated to per-call method args; PipelineStepRunnerTests + PipelineExecutorTestBuilder + BootstrapPerContextTests + BootstrapRoundHandlerMultiRepoTests updated for new ctor shapes. 2023 main + 83 sandbox tests passing. Smoke fast green. → .agentsmith/phases/done/p0157b-stateless-gate-and-value-record.yaml"
    p0157c: "Third slice of p0157: idiomatic config-injection (Pattern O) — closed as documentation. Re-baseline against actual DI state showed the spec's ~20-class IOptions migration would be a no-op refactor: AgentSmithConfig, LoopLimitsConfig, SlackAdapterOptions, KubernetesSandboxOptions, DockerSandboxOptions, NucleiConfig, ZapConfig are all already singleton-registered and DI-resolved into their consumers. Cost trackers / ConfigBasedModelRegistry / OpenAiContextCompactor / ResilientHttpClientFactory / LlmIntentParser are intentionally factory products (built inside ChatClientFactory.Create), not DI services — they correctly stay positional. Canonical pattern decision: direct `*Config` injection, not IOptions<T> (no IConfiguration-reload story behind any of these). Pattern documented as a new sub-section in .agentsmith/contexts/default/coding-principles.md. The architectural guard in [[p0157d]] enforces the rule by checking registered-in-IServiceCollection ctor types only; factory products and IOptions<T> consumers both pass. Two pre-existing IOptions<T> registrations (SandboxGlobalConfig, OrchestratorGlobalConfig) left untouched — both patterns are allowed going forward, direct is canonical. Zero source-code changes; one .md edit + one decisions YAML. → .agentsmith/phases/done/p0157c-config-positional-to-options.yaml"
    p0157: "Umbrella spec for non-DI ctor elimination. SUPERSEDED at execution time by slices p0157a (Pattern F: connection records), p0157b (Pattern S+partial V: stateless gate, path guards, NOT SkillCallScope→record), p0157c (Pattern O: closed as documentation — direct *Config injection is the canonical idiom, no IOptions migration needed), p0157d (registration-based architectural test). Original 38-class inventory was stale (drafted pre-p0152); re-baselining showed many classes already DI-correct, some factory products legitimately exempt, and the proposed type-shape architectural rule was too aggressive. Slices restructured the work into focused, executable phases. → .agentsmith/phases/done/p0157-non-di-ctor-elimination.yaml"
    p0157d: "Final slice of p0157: architectural test enforcing the DI-only-ctor rule for registered services. tests/AgentSmith.Tests/Architecture/NonDiCtorRuleTests.cs ships three Facts: (1) AllRegisteredServices_HaveDiOnlyCtorParameters_OrAreAllowlisted iterates the Server-shape IServiceCollection, scans every ServiceDescriptor whose ImplementationType is in AgentSmith.Application/Infrastructure/Server/Sandbox.Agent assemblies, and asserts every ctor parameter is DI-legal — interface, IOptions/IOptionsMonitor/IOptionsSnapshot<T>, ILogger/ILogger<T>, framework well-knowns (HttpClient, TimeProvider, IServiceProvider, IConfiguration, IServiceScopeFactory, ILoggerFactory), or a concrete type registered in the same collection. (2) Sanity_TheScanFindsTargetClasses_ScopeIsNotEmpty prevents silent-pass mode by asserting the scan hits 20+ classes. (3) Rule_HasTeeth_SyntheticViolatorWithNonDiCtorParam_GetsFlagged registers a SyntheticBadService(string apiKey) and confirms the rule catches it. The allowlist (HashSet keyed on `{FullClassName}::{ParamType} {paramName}`) is empty at landing — every existing service passes; future violators must shrink to zero or be temporarily allowlisted with an explanation. Rule deliberately uses registration-membership rather than type-shape (interface || record || IOptions<T>) to avoid false positives on TimeProvider/HttpClient/legitimately-DI'd concrete services. BuildServerLikeServices helper duplicated from ServerDiLifetimeTests; extraction deferred until a third consumer appears. 2026 main + 83 sandbox tests passing (+3 new). Smoke fast green. Closes [[p0157]]. → .agentsmith/phases/done/p0157d-di-registration-guard.yaml"
    p0162: "Monorepo restructure: all 9 .NET projects moved from src/AgentSmith.X/ to src/backend/AgentSmith.X/ to make room for src/dashboard/ in p0169-pre. AgentSmith.sln + 2 test csprojs + AgentSmith.Application embedded-schema link paths + 3 Dockerfiles + 2 docker-compose dockerfile: paths + 3 GitHub workflows (agent-smith.yml, docker-publish.yml, release-please.yml) updated. scripts/ renamed to tools/; docs.yml + docker-publish.yml + 4 docs files + DESIGN.md updated. reports/ removed (stale security-scan output); agentsmith-output/ cleaned locally (untracked). Documentation path references updated across 6 docs files. Pure move + rename. Build green, 2105 tests passing (2022 main + 83 sandbox), Cli/Server/Sandbox Docker images build with new paths. → .agentsmith/phases/done/p0162-pre-monorepo-restructure.yaml"
    p0169-pre: "Next.js 15 dashboard scaffolded at src/dashboard/ with TypeScript strict + Tailwind v4 + shadcn-compatible components.json + lucide icons + clsx/tailwind-merge cn() util. Landing page renders 'agent-smith' with DESIGN.md tokens (Smith-green primary + Inter typography); Vitest smoke (2 tests) green. tools/build-tokens.mjs extended with --target tailwind flag emitting src/dashboard/src/styles/tokens.json (gitignored); tailwind.config.ts imports it. openapi-typescript wired via pnpm gen:types, falling back to checked-in openapi.stub.json until p0169a's backend ships. Multi-stage Dockerfile mirrors repo layout (/repo/src/dashboard, /repo/tools, /repo/DESIGN.md) so ../../tools/build-tokens.mjs resolves identically in CI and local dev; 50 MB standalone runtime. docker-compose dashboard service profile-gated ('dashboard' profile), reaches backend at http://server:8081 via compose DNS. CI workflow .github/workflows/dashboard.yml: paths-filter + pnpm install + token gen + type gen + lint + test + build, publishes image on v* tags. docs/reference/setup/dashboard.md added (operator setup, disable, reverse-proxy notes); mkdocs nav updated. → .agentsmith/phases/done/p0169-pre-dashboard-bootstrap.yaml"
    p0169a: "Job-Viewer (backend + dashboard). Backend: WriteRunResultHandler harvests topology (run_id, pipeline_name, status, started_at, repo_mode, sandbox_count, repos[]) at run-end via new ResolveTopology() reading ContextKeys.{Repos,Sandboxes,Sandbox,PipelineName,RunStartedAt}; RunCostSectionWriter.AppendFrontmatter takes a new RunMetaTopology record. New /api/jobs (paginated 1-200, newest first), /api/jobs/{id} (RunMeta + artefact list), /api/jobs/{id}/files/{*path} (PathTraversalGuard rejects ../, abs paths, escapes). RunMetaReader parses result.md YAML frontmatter via YamlDotNet — pre-p0169a runs surface unknown placeholders, legacy `result: success` reused as Status. RunArtefactLister enumerates run-dir files with coarse MIME guess. AGENTSMITH_RUNS_ROOT env (default /app/runs) configures scan root. CORS allowed-origin from AGENTSMITH_DASHBOARD_ORIGIN (default http://localhost:3000) gates the /api group. Swashbuckle exposes /api/openapi.json (redirected to /api/openapi/v1.json) — DocInclusionPredicate hides non-/api routes. AGENTSMITH_UI_API_ENABLED env-gate (default on) toggles the whole stack. Dashboard: app/page.tsx renders JobListTable with StatusBadge + RepoModeBadge; app/jobs/[id]/page.tsx renders TopologyHeader + ResultMarkdown + ArtefactSidebar. lib/api.ts wraps the 3 endpoints. ResultMarkdown ships as <pre>-wrapped — react-markdown deferred to a follow-up. 14 new backend tests (WriteRunResultTopologyTests x4, RunMetaReaderTests x3, JobsEndpointsTests x2, PathTraversalGuardTests x5) + 7 new dashboard tests. dotnet test 2036→2050 main + 83 sandbox green; vitest 9 tests green; dashboard pnpm build green. → .agentsmith/phases/done/p0169a-job-viewer-data-and-list.yaml"
    p0169b: "Job live-tail (SSE). Backend: GET /api/jobs/{id}/stream emits progress / tool_call / done / error events from the per-job Redis Stream (job:{id}:out, existing 2-hour TTL > spec's 5-min). New IJobBusSubscriber resolves the latest stream ID via XINFO STREAM for live-only mode and starts at 0-0 for from_beginning=true (replay). SseEventWriter formats BusMessage → SSE `event: <name>\\ndata: <json>\\n\\n`; tool_call + skill_observation event names reserved in the vocabulary, populated from BusMessage.Detail until the pipeline publishes typed observations directly. 30-min idle timeout via request CTS CancelAfter. ExcludeFromDescription on the endpoint — text/event-stream isn't an OpenAPI-friendly shape. MessageBusEntrySerializer extracted as the shared deserializer (mirrors RedisMessageBus's private one). Dashboard: useJobStream hook wraps EventSource with reconnecting-flag + status enum; LiveLogPanel renders ProgressBar (last progress event) + ToolCallEntry (collapsible) + ObservationCard (severity-coloured) + terminal done/error cards. JobDetailPage mounts LiveLogPanel for in-progress jobs only (status not in {done, success, failed, error}). 8 new backend tests (SseEventWriterTests x4, JobStreamEndpointTests x3, JobStreamEndpoint excluded from full HTTP-level coverage for same reason as JobsEndpoints) + 6 new dashboard tests (useJobStream x3, LiveLogPanel x3). dotnet test 2050→2058 main + 83 sandbox green; vitest 9→15 tests green; dashboard pnpm build green (jobs/[id] route 8.63 kB). → .agentsmith/phases/done/p0169b-job-live-tail.yaml"
    p0169e: "Event-sourcing backbone replaces p0169a's filesystem-scan job-list + p0169b's SSE bolt-on. Typed L1/L2/L3 RunEvent records under AgentSmith.Contracts.Events; IEventPublisher + RedisEventPublisher (per-run stream run:{runId}:events with MAXLEN=10000 + EXPIRE=2h, plus agentsmith:runs:active SET / agentsmith:runs:recent LIST indices) + NoOpEventPublisher; AsyncLocal IRunContextAccessor opened at ExecutePipelineUseCase entry. Producers grounded in current code (p0119a/p0142 reality, not the spec's pre-migration list): ExecutePipelineUseCase emits RunStarted/RunFinished; PipelineStepRunner emits StepStarted/StepFinished (single + batch); PipelineSandboxCoordinator emits SandboxCreated/Disposed per sandbox key; new EventPublishingChatClient (decorator, wrapped INNERMOST inside SkillCallRuntime below the retry layer so each attempt produces its own event pair with per-attempt token counts) emits LlmCallStarted/Finished with sha256-hex-8 promptHash — plaintext prompts never leave the hub; new EventPublishingAIFunction (decorator) emits ToolCall/ToolResult with METADATA ONLY (name + ArgsLength + ok/fail + ResultLength — same security boundary as prompts); InMemoryDecisionLogger + FileDecisionLogger mirror DecisionLogged into the stream when a run scope is active; BootstrapGateHandler + EmptyPlanCheckHandler emit GateChecked; TriageOutputProducer emits TriageRoute per phase-slot. SandboxEventProjector implemented as ISandbox decorator at PipelineSandboxCoordinator.CreateOneAsync (NOT a parallel Redis consumer — the existing sandbox impls already cross the wire boundary and forward StepEvents via IProgress); maps StepEvent → L3 RunEvents (SandboxCommand on entry, SandboxOutput per stdout/stderr line with batchSeq, SandboxResult on completion); Sandbox.Agent + Sandbox.Wire untouched. JobsBroadcaster IHostedService cold-starts from the two pointer indices (SMEMBERS + LRANGE, never KEYS/SCAN); self-heals when a stream's TTL expired; maintains Dictionary<RunId, RunSnapshot> for active + capacity-50 LRU RecentRunsRingBuffer for recent; fans events out via IRunEventFanout abstraction. JobsHub (Microsoft.AspNetCore.SignalR) at /hub/jobs with SubscribeOverview (immediate snapshot + JobUpserted diffs), SubscribeRun (XRANGE replay of retained stream window bounded by MAXLEN, then live tail), ExpandSandbox/CollapseSandbox (L3 SandboxOutput gating via SandboxExpansionRegistry); behind existing AGENTSMITH_UI_API_ENABLED env-gate. p0169a + p0169b code ripped out file-by-file per spec list (12 backend files + 5 backend test files + 8 dashboard files + jobs/[id] route); /api/openapi.json + CORS + Swashbuckle stay (generic). Dashboard home page renders 'connecting…' shim until p0169f. EventSequenceCompletenessTests Theory drives 9 drop-rows (incl. TriageOutputProducer + SandboxEventProjector — silent producer = red); SandboxEventProjectorTests as dedicated seam-gate (StepEvent fixture → SandboxCommand+Output+Result); RedisEventPublisherTests verifies stream key + MAXLEN/TTL + index maintenance + empty-RunId throws; PromptHashTests asserts sha256-hex-8 stable + plaintext never serialised. 2045 main + 83 sandbox + 2 dashboard tests passing. → .agentsmith/phases/done/p0169e-event-backbone.yaml"
    p0169f: "Topology UI on top of the p0169e hub: @microsoft/signalr 10 + hand-curated hub-events.ts (16 event types + RunSnapshot + OverviewSnapshot) + tools/build-hub-event-types.mjs drift-detector wired into pnpm gen:hub-events. JobsHubClient module-singleton per browser tab + HubGroupRegistry (ref-counted SubscribeOverview/Run/ExpandSandbox so two components on the same run share one transport sub) + HubReconnectPolicy (0/2/10/30s, then steady 30s). useJobsHub hook owns connection lifecycle + connectionState + OverviewSnapshot (applyUpsert reshapes active↔recent on JobUpserted by status string, recent capped at 50 client-side); useRunEvents per-runId (2000-event cap); useSandboxEvents per-(runId,repo) with 200-line ring buffer. Overview replaces the p0169e placeholder shim with OverviewCardGrid (skeleton + empty + populated) + RunCard (status badge via DESIGN.md token vocabulary, pipeline + repos + step counter + elapsed). Run detail at app/jobs/[id]/page.tsx: TopologyCard derives StepProgressList rows from StepStarted/Finished events; SandboxList renders one SandboxBox per SandboxCreated repo (collapsed by default — mirrors hub L3 gating); ?expand=repo1,repo2 deep-link parsed in both directions (URL ↔ UI) via Next router.replace. ConnectionState dot reflects HubConnectionState enum. 15 dashboard tests green (HubGroupRegistry×4, RunCard×3, TopologyCard×3, SandboxBox×3, page×2); pnpm build green (4.01 kB jobs/[id] route, 2.76 kB /). Backend dotnet build clean. Hooks-level test files (useJobsHub.test.ts, JobsHubClient.test.ts from the spec) deferred to a focused follow-up — explicitly flagged in decisions.yaml so the deferral is visible. → .agentsmith/phases/done/p0169f-topology-ui.yaml"
    p0169g: "Filter rail + L3 tool rendering on top of p0169f. Three-section FilterRail (L1 topology / L2 decisions / L3 sandbox) with per-event-type checkboxes; L1+L2 default on, L3 default off (mirrors the hub's gated fanout). EventFilterContext + URL-persistence via Next router.replace; defaults encoded by absence (L1/L2 default = full type set, L3 default = empty set — bug-fix during testing of the level-specific default semantics). ToolEventPairer matches ToolCall+ToolResult by tool-name + 60s window — concurrent same-name calls fall to two standalone rows. ToolCallRow + ToolResultRow + ToolPairCard render METADATA ONLY (tool name + ArgsLength + ok + ResultLength, no content) with a tooltip explaining the p0169e security boundary. ExpandCollapseControls (expand-all / collapse-all, disabled when redundant) + ToolCountChip. SandboxList header gains the controls; run-detail page hosts FilterRail in a sidebar + RunToolsPanel above the SandboxList. ARCHITECTURAL DEVIATION from spec: tool events render at the RUN level (RunToolsPanel), not per-sandbox (inline in SandboxBox) — the underlying ToolCall/ToolResult events don't carry a repo field, so per-sandbox attribution would require a backend contract extension (flagged in decisions.yaml as a named follow-up, not a silent defer). 36 dashboard tests green (+21 net: ToolEventPairer×4, eventFilterQuery×7, ExpandCollapseControls×3, ToolCallRow×3, FilterRail×4); pnpm build green (jobs/[id] route now 6.4 kB). → .agentsmith/phases/done/p0169g-filter-rail-and-l3-tools.yaml"
    p0169h: "Event-trail tree on top of p0169e + p0169f. Backend: TrailReader (Server.Services.Events) extracts the XRANGE+deserialise logic from JobsHub so it's unit-testable against a mocked IConnectionMultiplexer (6 tests); JobsHub.GetTrail / GetTrailPage delegate to it (count clamped to [1, 2000], HasMore detected by requesting count+1 entries). Frontend: TrailAssembler is a pure-function projector from RunEvent[] → tree (level-1 steps, level-2 LLM-call pairs + decisions + triage routes, GateChecked as inline chips on parent step, no tool-pair nodes — those live in p0169g's RunToolsPanel at the run level); useTrail hook calls JobsHubClient.getTrail. UI: react-arborist TrailTree + TrailNodeRow + StepGateChips + two-pane TrailNodeDetailPane with typed payload renderers (LlmCallPayload shows tokens/cost/duration/promptHash, DecisionPayload shows chose/over/reason, StepPayload shows step status/duration, TriageRoute inline). TrailTimelineSlider with play button (6x time-scaled rAF animation) physically filters tree nodes by timestamp (cloneFiltered) so the tree shows what existed at time T. TrailTruncationBanner renders when the oldest event isn't RunStarted (Redis MAXLEN trim). ?tab=trail URL search param toggles between topology view and trail tab. 47 dashboard tests (+11 net: TrailAssembler×7, TrailNodeDetailPane×3, TrailTruncationBanner×1) + 2051 main backend tests (+6 net: TrailReader×6). pnpm build green (jobs/[id] route 40.1 kB with react-arborist). Supersedes p0169c. → .agentsmith/phases/done/p0169h-event-trail-tree.yaml"
    p0169c: "SUPERSEDED by p0169h — original trail-tree spec built against p0169a/p0169b's file-join API (deleted in the p0169e ripout). Kept as historical record; do not implement. → .agentsmith/phases/done/p0169c-job-trail-tree.yaml"
    p0169d: "SUPERSEDED by p0169i — original asciinema spec relied on an agent-side ScriptRecorder + cast-file endpoint that the event-backbone makes redundant. Kept as historical record; do not implement. → .agentsmith/phases/done/p0169d-sandbox-screen-recording.yaml"
    p0169j-c: "Result tab routed via ?tab=result. Spec premise corrected vs original draft — result.md is not server-readable from .agentsmith/runs/ (lives in sandbox / target repo); resolved via IRunArtifactStore extension. New 4th slot on the store (WriteResultMarkdownAsync + ReadResultMarkdownAsync, 24h hard-coded TTL separate from the in-flight slot TTL), WriteRunResultHandler caches the rendered resultMd to Redis after the disk write on both single-run + init-fan-out paths (failure swallowed at warning — disk + PR are source of truth). New ResultMarkdownReader service (path-traversal guarded via RunIdGenerator.IsValid) + JobsHub.GetResultMarkdown one-line forward. Dashboard: JobsHubClient.getResultMarkdown + useResultMarkdown hook + ResultTab (react-markdown 10.1 + remark-gfm 4 + rehype-sanitize 6) + ResultCodeBlock with terminal-panel tokens + copy-markdown button. Empty state links to PR via snapshot.prUrl (the durable surface, since result.md ships in CommitAndPR's git add -A); init-mode / mid-run falls back to 'result becomes visible when run finishes'. 2071 main + 83 sandbox + 77 dashboard tests passing (+7 backend ResultMarkdownReaderTests, +5 dashboard ResultTab tests). Dashboard 42.1 → 87.1 kB (react-markdown payload), pnpm build green. Server + dashboard images rebuilt + healthy. PARKED.md item 1 closed — IRunArtifactStore approach becomes permanent design. → .agentsmith/phases/done/p0169j-c-result-tab.yaml"
    p0169j-b: "Activity tab + 6 operator-vocabulary pills (Decisions / Tools / LLM / Sandbox / Gates / Issues) replace the L1/L2/L3 FilterRail jargon. ActivityRow reads p0169j-b1's typed reason fields directly — failure rows surface event.reason / event.errorMessage / event.message inline (rose for error, amber for warning); no client-side pairing. Lifecycle events (RunStarted/Finished, StepStarted/Finished) are pill-exempt scaffold. ?activity=decisions,tools URL param round-trips; absence=default, empty-string=all-off (matches eventFilterQuery convention). Power-user 'Show event types' toggle reveals the legacy FilterRail inline for debug. Click-to-expand renders raw event JSON (payload renderers from TrailNodeDetailPane left for a follow-up slice — flagged in decisions). 72 dashboard tests (+25 net: activityPillQuery×13, ActivityRow×6, ActivityTab×6); pnpm build green (jobs/[id] route 42.1 kB). Dashboard image rebuilt + healthy. → .agentsmith/phases/done/p0169j-b-activity-tab.yaml"
    p0169j-b1: "Failing producers emit reason as a typed event field — closes the heuristic-pairer trap. StepFinishedEvent gains optional Reason (CommandResult.Message when status=failed); ToolResultEvent gains optional ErrorMessage (caught in EventPublishingAIFunction, decorator re-throws transparently); new CatalogIssueEvent (severity/source/category/message, EventType=30) emitted by YamlSkillLoader (warning, skip-and-continue) + ConceptVocabularyLoader (error, then throws) so skill-validator FAIL lines + vocabulary parse failures stop being log-only. YamlSkillLoader + ConceptVocabularyLoader inject IEventPublisher + IRunContextAccessor (sync .GetAwaiter().GetResult() on PublishAsync — local Redis, no SynchronizationContext capture). New EventFailureReasonCompletenessTests with four [Fact] methods mirrors p0169e's silent-producer gate for failure paths (StepFinished.Reason, ToolResult.ErrorMessage, CatalogIssue skill-validation + vocabulary-parse). hub-events.ts mirror updated: CatalogIssueEvent type, EventType.CatalogIssue=30, FilterRail LABELS extended, drift detector green. 2063 main + 83 sandbox + 47 dashboard tests passing. → .agentsmith/phases/done/p0169j-b1-failure-reason-events.yaml"
