    p0132: "Post-D7: SkillCallRuntime consumer migration. SkillRoundHandlerBase + FilterRoundHandler + VerifyRoundHandler dispatch through SkillCallRuntime; PerSkillBreakdown lights up in production; verifiers gain tool access (build/test verifiers run actual commands instead of LLM-only static analysis). Closes the consumer-migration debt deferred since p0126c. Sliced a/b/c. → .agentsmith/phases/planned/p0132-skill-call-runtime-consumer-migration.yaml"
    p0141: "Email tracker type + Message-Family infrastructure. One mail → one pipeline run; minimal schedule-appointment example. PipelineExecutionMode (Code|Message) discriminator; new SkillExecutionPhase values Read/Process/Write; IRunBlobStorage with concept-pointer convention for large payloads; first production SkillCallRuntime consumer. Tools execute directly (no Action-Queue). Requires p0145. → .agentsmith/phases/planned/p0141-email-tracker.yaml"
    p0143b: "DataFlow wildcard removal (follow-up to p0143's deferred scope items 5+6). Replaces the `*` wildcard in DataFlowReadGate with per-preset explicit edges. New DataFlowReadMode enum (Enforce / Warn / Discover) replaces the bool enforce flag — Discover mode + DataFlowDiscoveryAggregator JSON sidecar lets an operator smoke against all 10 presets generate the migration edge-set data-driven. Per-preset explicit edges in 10 *DataFlow.cs classes (C# not YAML so refactoring tools see drift). PermissivePhaseDataFlow base deleted; new PhaseDataFlowConfigValidator fails fast at *DataFlow.cs ctor time on any wildcard. PipelineDataFlowConfig binds both legacy `enforce: bool` and new `mode: enforce|warn|discover` for backwards compat. config/agentsmith.yml defaults to Enforce; agentsmith.example.yml stays Warn for operator soft migration. ~21 new tests. → .agentsmith/phases/planned/p0143b-dataflow-wildcard-removal.yaml"
    p0155: "LLM owns the project-language vocabulary end-to-end. Deletes ProjectLanguageMapper (closed csharp/node/python/generic enum from p0130c); PublishProjectLanguageHandler publishes ProjectMap.PrimaryLanguage verbatim after trim+lower. TestHandler.ResolveTestCommand reads Ci.TestCommand verbatim (shell-tokenised) and drops the PrimaryLanguage switch that silently skipped tests on non-{csharp,node,python} repos and miscoded C# in run a6914f38. IsTrxCapable derives from command-prefix, not language. project-analyzer prompt teaches lowercase canonical slugs by rule. Cross-repo: agent-smith-skills concept-vocabulary.yaml relaxes project_language from enum to string; generic-bootstrap becomes an explicit LLM choice, not a silent fallback. BootstrapDispatch stays fail-loud on no-match with the language slug + available skill names in the error. Supersedes the ProjectLanguageMapper-related decisions of p0130c. → .agentsmith/phases/planned/p0155-llm-owned-language-vocabulary.yaml"
    p0146: "Umbrella — retire every regex-based 'understand-by-pattern' layer that duplicates the LLM. Five independent sub-phases (a..e), each closes one regression. p0146a done; b/c/d/e in planned/. → .agentsmith/phases/planned/p0146-delete-regex-intelligence-layer.yaml"
