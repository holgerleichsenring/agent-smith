    p0158b: "Multi-repo workdir layout and per-repo handler iteration: /work/{repo-key}/, list-shaped contexts, one PR per repo with sibling-PR marker, OpenedPullRequest records"
    p0158c: "PR cross-link pass: UpdatePullRequestBodyAsync per provider, PrCrossLinkHandler patches sibling-PR blocks into each opened PR body, inserted after commit steps"
    p0159a: "Design system foundation: DESIGN.md single source of truth, zero-dep build-tokens.mjs emits tokens.css for website and docs, Inter font inlined"
