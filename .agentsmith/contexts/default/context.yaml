    p0146e: "CommentIntentParser keeps the slash-prefix discriminator (`/approve`, `/reject`, `/agent-smith ...` — structural UI contract) but the PipelineAliases table and the free-text tail after the command go to a Haiku LLM call. → .agentsmith/phases/planned/p0146e-comment-intent-tail-to-llm.yaml"
    p0158e: "Multi-sandbox-per-repo refactor (closes the mixed-stack gap exposed by p0158b's first multi-repo smoke run against a mixed-stack reference project: dotnet sandbox couldn't run npm tests in sibling repo). Replaces the single-sandbox-per-run model with N sandboxes (one per configured repo), each with its OWN toolchain image resolved via the existing p0135 layered chain applied per-repo (LanguageResolver called once per repo, not aggregated). Orchestrator stays centralised; execution becomes decentralised (tool calls route by repo prefix). New ContextKeys.Sandboxes (Dict<repoName, ISandbox>); ContextKeys.Sandbox (singular) kept as deprecated, populated from Sandboxes[Repos[0].Name]. PipelineSandboxCoordinator rewritten to manage N: EnsureSandboxesAsync creates all eagerly on first sandbox-requiring command, DisposeAsync disposes all once. FilesystemToolHost gains an internal Route(path)/Resolve(repo) router: first path segment parsed as repo name, prefix stripped, dispatched to that repo's sandbox; unknown prefix throws with known-repos list; single-entry dict short-circuits routing. run_command tool gains required `repo` arg on multi-repo (kept optional on single-repo for back-compat). FilesystemToolHost retains single-sandbox back-compat ctor — VerifyRoundCoordinator / ProjectAnalyzer / BootstrapToolHostFactory / round policies stay on single-target paths. AgenticExecuteHandler / GenerateTestsHandler / GenerateDocsHandler migrated to read Sandboxes + pass dict. SandboxGitOperations.CommitAndPushAsync drops the workingDirectory param (always /work inside per-repo sandbox); five source-touching handlers dispatch git ops to per-repo Sandboxes[repo.Name]. CheckoutStepFactory.BuildCloneStep drops target-dir; mkdir step removed (each sandbox holds one repo at /work). Repository.LocalPath reverts to const /work; static WorkPathFor(name) retained for tool-host external addressing only. AgentPromptBuilder.BuildExecutionUserPrompt gains optional repoNames list; multi-repo runs render a `Repos in scope` section with the repo-qualified-path + run_command(repo=...) convention. NO new hardcoded slug→image mapping (SandboxSpecBuilder.LanguageImages untouched); LLM owns the slug via per-repo .agentsmith/context.yaml; moving that map to operator config is a separate follow-up. 10 new spec-driven tests (6 FilesystemToolHostMultiRepoTests + 4 PipelineSandboxCoordinatorMultiRepoTests) + ~30 fixture updates across handler/coordinator/Gradle tests. 1979 main + 83 sandbox tests passing (+10 net new). p0158f (per-repo bootstrap) is queued and sequenced after p0158e. → .agentsmith/phases/done/p0158e-multi-sandbox-per-repo.yaml"
    p0158f: "Per-repo bootstrap + context loading (closes the multi-repo BootstrapGate-abort symptom). 4 new ContextKeys: RepoProjectMaps / RepoContextYamls / RepoCodingPrinciples / MissingBootstrapRepos. Six handlers migrated to iterate per-repo via ContextKeys.Sandboxes + ContextKeys.Repos: BootstrapCheckHandler (per-repo probe → aggregate `context_yaml_present` + `coding_principles_present` + comma-separated MissingBootstrapRepos), BootstrapGateHandler (error message names the missing repos), LoadContextHandler (per-repo .agentsmith/context.yaml into RepoContextYamls + legacy ContextKeys.ProjectContext = primary), LoadCodingPrinciplesHandler (per-repo coding-principles.md into RepoCodingPrinciples + legacy ContextKeys.DomainRules = aggregated per-repo headers when N>1 / raw content when N=1), AnalyzeProjectHandler (per-repo via Repository.SandboxWorkPath in each sandbox; populates RepoProjectMaps + legacy ProjectMap = primary), PublishProjectLanguageHandler (primary `project_language` from Repos[0] + try-set `project_languages` aggregate concept silently skipping when catalog vocab doesn't declare it yet), TestHandler (per-repo iteration with per-repo sandbox + ci.test_command; logical-AND aggregation; failure message preserves legacy single-repo format). AgentPromptBuilder.BuildExecutionUserPrompt extended with optional repoLanguages dict; multi-repo runs render `Repos in scope` section with per-repo language. New MultiRepoTargets static helper provides back-compat shim (legacy single Sandbox / ProjectMap → synthetic one-entry dict + one-element Repos list) so all ~25 existing handler test fixtures continue to pass unmodified. PATH CORRECTION from spec: per-repo paths are `/work/.agentsmith/...` IN EACH repo's sandbox (post-p0158e), not `/work/{name}/.agentsmith/...` in one shared sandbox; spec was pre-p0158e. EXPLICITLY DEFERRED TO p0158g: BootstrapDispatchHandler + BootstrapRoundHandler per-repo iteration (needs PipelineCommand.SkillRound RepoName parameter + per-iteration concept activation context); today init-project on multi-repo still bootstraps Repos[0] only, operator workaround is `cli init --repo NAME` per stack. 6 new MultiRepoBootstrapTests + 0 fixture rewrites needed (back-compat shim absorbs all legacy tests). 1985 main + 83 sandbox tests passing (+6 net new). → .agentsmith/phases/done/p0158f-multi-repo-bootstrap-and-context.yaml"
    p0158g: "Per-repo BootstrapDispatch + BootstrapRound (closes init-project's multi-repo gap left open by p0158f). PipelineCommand gains RepoName; SkillRound factory threads it through; BootstrapRoundContext + SkillRoundContext + their builders carry it forward (SkillRoundContext is forward-only plumbing — handler doesn't consume it today). BootstrapDispatchHandler iterates ContextKeys.RepoProjectMaps (single-repo back-compat via synthesized one-entry dict from ContextKeys.ProjectMap keyed by ''); for each repo: saves the project_language concept, mutates it to that repo's PrimaryLanguage, runs ActivationSkillFilter, emits one PipelineCommand.SkillRound(BootstrapRound, skill, round=1, repoName=X), then restores in finally so post-dispatch concept state matches pre-dispatch. Fails loud per-repo on 0 / >1 matches (error names the repo + observed slug + available skills). BootstrapRoundHandler now reads RepoName from context: Sandboxes[RepoName] → fallback ContextKeys.Sandbox; RepoProjectMaps[RepoName] → fallback ContextKeys.ProjectMap; BootstrapToolHostFactory.Create still takes a single ISandbox per call (one host per round, scoped to that repo's sandbox). Init-project on a 5-repo project now produces 5 .agentsmith/context.yaml + 5 coding-principles.md (one per stack), cross-linked via p0158c's PrCrossLink. 7 new tests: 4 in BootstrapDispatchHandlerTests (multi-repo one-round-per-repo, multi-repo with one unmatched, project_language concept preserved across iterations, 5-repo smoke) + 3 in new BootstrapRoundHandlerMultiRepoTests (per-repo ProjectMap selection via captured user prompt, Sandboxes[RepoName] miss fails with repo name, RepoProjectMaps[RepoName] miss fails with repo name). 1992 main + 83 sandbox tests passing (+7 net new). p0158 closed end-to-end (a..g). → .agentsmith/phases/done/p0158g-bootstrap-dispatch-per-repo.yaml"
    p0158d: "Fourth slice of p0158: CLI ergonomics + multi-repo guard. SourceOptions gains `--repo NAME` (Option<string?>); ApplyTo populates ContextKeys.SourceOverrideRepo (read by ExecutePipelineUseCase since p0158a). All eight source-using CLI commands inherit the flag automatically via the existing SourceOptions.AddTo wiring (no per-command edits needed). New multi-repo guard in ExecutePipelineUseCase.ResolveRepos: when ContextKeys.Source{Type/Path/Url/Auth} is set without ContextKeys.SourceOverrideRepo on a project with Repos.Count > 1, throws InvalidOperationException with the project name + known-repos list. Single-repo projects keep accepting --source-* without --repo (legacy ergonomics). Guard lives in the use case, not in SourceOptions, so non-CLI entry paths (webhooks, pollers, future intents) are covered automatically. CHANGELOG entries are commit-message-driven via conventional-commits + release-please — the p0158a/b/c/d commits use `feat(...)!: ...` (breaking-change) with detailed migration bodies. Operator /smoke gate documented as the spec's done criterion (executed by the operator at release time, not by the agent). 3 new tests in ExecutePipelineUseCaseReposTests cover the guard (rejected on multi-repo without --repo, accepted with --repo, accepted on single-repo). 1969 main + 83 sandbox tests passing (+3 net new). p0158 umbrella closed. → .agentsmith/phases/done/p0158d-cli-and-cleanup.yaml"
    # --- dashboard / event-backbone series (closes p0169) ---
    p0169i: "OPTIONAL — sandbox session replay: client-side AsciinemaCastBuilder projects SandboxOutput L3 events → asciinema v2 cast; AsciinemaPlayerModal wraps asciinema-player for playback at original timing. No agent-side recorder, no separate cast endpoint — the events ARE the recording (p0169e seam). Supersedes p0169d. Ship after f/g/h stabilise. → .agentsmith/phases/planned/p0169i-sandbox-session-replay.yaml"
    p0169j: "Umbrella — operator-grade UX polish on the dashboard. Five independently-shippable slices: p0169j-b1 (BACKEND prerequisite — failing producers emit reason as typed event field; new CatalogIssueEvent for skill-validator drops; failed-run completeness Theory), p0169j-b (Activity tab + 6 human pills replacing the 16-event-type FilterRail + failure rows surface event.reason directly — no heuristic), p0169j-c (Result tab rendering result.md via react-markdown), p0169j-a (frozen-trail persistence — events.jsonl), p0169j-d (ArgoCD-style SVG topology graph; green RESERVED for done, running is amber-pulsing). Recommended ship order: b1 → b → c → a → d. → .agentsmith/phases/planned/p0169j-dashboard-polish.yaml"
    p0169j-a: "Event stream survives past 2h Redis TTL — operators open yesterday's run on the dashboard. Spec premise correction vs original draft: events.jsonl on disk is not server-readable (same blocker as p0169j-c). Resolution: bump EventStreamKeys.StreamTtl 2h → 24h, paired with the IRunArtifactStore result-slot's 24h TTL as a single 'operator look-back window' knob. No new frozen format, no FrozenTrailWriter, no ListHistoricalRuns — the simplest mechanism extends every existing code path automatically. New TrailExpiredEmptyState component mirrors ResultTab's empty state: finished runs whose stream has TTL-expired show 'View in PR' link (snapshot.prUrl) or a generic expired message. TrailTab takes isFinished + prUrl props from the run snapshot. ActivityTab inherits the same fallback via its existing 'No matching activity yet' branch. Realistic Redis memory: ~500 events × 500 bytes × 100 runs = ~25 MB, comfortably under the 256mb cap. 80 dashboard tests passing (+3 net TrailExpiredEmptyState). pnpm build green (jobs/[id] 87.1 → 87.3 kB). Dashboard image rebuilt + healthy. PARKED.md item 2 closed. → .agentsmith/phases/done/p0169j-a-frozen-trail-persistence.yaml"
    p0169j-d: "ArgoCD-style SVG topology graph replaces the stacked SandboxList on the Topology tab. Pure-SVG math layout (no dagre/d3-hierarchy — star topology is ~15 LoC): root run-node at top, sandbox nodes radial below in rows of 8, bezier edges. Status palette from DESIGN.md tokens with green RESERVED for done (smith-green=success), running is amber-pulsing (motion-safe variant disables animation under prefers-reduced-motion), failed rose, disposed stone. New sandboxStatusColor pure helper derives status from event stream (10 cases incl. per-repo isolation + run-finished context). Single-select: TopologyDetail pane reuses SandboxBox in always-expanded mode for the focused terminal. ?expand=URL param keeps backwards-compat — last value wins (multi-expand semantic dropped per spec). page.tsx Topology tab swaps FilterRail+SandboxList rendering for TopologyGraph+TopologyDetail. SandboxList component stays in the codebase for a future accessibility-tab path. 97 dashboard tests passing (+17 net: sandboxStatus×10, TopologyGraph×5, TopologyDetail×2). pnpm build green (jobs/[id] 87.3 → 88.1 kB). Dashboard image rebuilt + healthy. p0169j umbrella complete. → .agentsmith/phases/done/p0169j-d-topology-graph.yaml"
    p0173a: "System event backbone — pipe only. Parallel to p0169e's run-scoped backbone: new SystemEvent abstract base (Source/Type/Timestamp) + SystemEventType enum (40-range for poller/webhook, 50-range for chat/config/catalog) + ISystemEventPublisher contract. RedisSystemEventPublisher writes to single `system:events` stream (MAXLEN=10000, inherits StreamTtl from EventStreamKeys). NoOpSystemEventPublisher for CLI/test paths. EventEnvelopeSerializer gains SerializeSystem + DeserializeSystem paths. JobsBroadcaster gains SystemRecent ring buffer (capacity 500) + DrainSystem loop + RehydrateSystemRecent cold-start via XREVRANGE. JobsHub.SubscribeSystem + HubGroups.System + ToSystemAsync on IRunEventFanout (kept on existing fanout). SystemEventSequenceCompletenessTests scaffold (Skipped Theory + empty MemberData + guard [Fact] until producers land in b/c). Dashboard: system-events.ts mirror, useSystemEvents hook (500-cap), JobsHubClient.subscribeSystem + systemEvents emitter. Drift detector scans both EventType.cs + SystemEventType.cs in one pass. No producers wired (b + c own that). 2072 main + 83 sandbox + 97 dashboard tests passing; server image rebuilt + healthy; XLEN system:events=0 (pipe wired, silent). → .agentsmith/phases/done/p0173a-system-event-backbone.yaml"
    p0173b: "Poller + webhook instrumentation. Six concrete SystemEvent records: PollCycleStartedEvent / PollCycleFinishedEvent (per-cycle counters from TrackerPollCounts), TicketScannedEvent (every ticket seen), TicketSkippedEvent (with TicketSkipReason enum + free-form Detail string), TicketTriggeredEvent (without RunId — see PARKED.md #5), WebhookReceivedEvent (one per HTTP delivery, Actioned + SkipReason). PollerHostedService.PollSafeAsync emits PollCycleStarted+Finished around every cycle. TrackerPoller emits TicketScanned/Skipped/Triggered with Source='tracker:{type}/{name}'. WebhookRequestProcessor emits one WebhookReceivedEvent per delivery from the single funnel; processor populates four reasons (unknown-platform, signature-invalid, no-handler-matched, redis-unavailable). WebhookResult gains optional SkipReason field + NotHandled(reason) factory — individual handlers opt-in over time without forcing a 14-file change. Both poller + webhook publishes are fire-and-warn — Redis hiccup never breaks polling loop or HTTP response. SystemEventSequenceCompletenessTests now has six Theory rows asserting round-trip per SystemEventType. Dashboard system-events.ts mirror gains the six concrete record types + TicketSkipReason enum; drift detector green (10 system types). 2077 main + 83 sandbox + 97 dashboard tests passing; server rebuilt + healthy; XLEN system:events=94 within 10s smoke (PollCycle + Scanned + Skipped events flowing live from real AzureDevOps poller). → .agentsmith/phases/done/p0173b-poller-and-webhook-instrumentation.yaml"
    p0173c: "Chat + config + skill catalog instrumentation. Four concrete SystemEvent records: ChatMessageReceivedEvent (Source/Channel/MessageType/Actioned/SkipReason — metadata only, NO message content per the p0169e security boundary), ConfigFileReadEvent (Path/Kind/SizeBytes/RunId? — RunId nullable so one record serves both startup audit and run-scoped reads), SkillCatalogLoadedEvent (success-only counters; failure stays on p0169j-b1's CatalogIssueEvent), ConceptVocabularyLoadedEvent (success-only). New ConfigFileKind enum (AgentSmithYml/ContextYaml/CodingPrinciplesMd/SkillYaml/ConceptVocabulary). Producer wiring: SlackEventEndpointHandler + TeamsEndpoints.HandleMessageAsync emit at entry with channel + messageType + actioned/skipped; YamlConfigurationLoader emits on agentsmith.yml load (startup, RunId=null); LoadContextHandler + LoadCodingPrinciplesHandler emit per file read with RunId from IRunContextAccessor; YamlSkillLoader emits one ConfigFileRead per accepted skill + one SkillCatalogLoaded summary after catalog load completes (drop count from existing FAIL-vs-OK branches); ConceptVocabularyLoader emits ConceptVocabularyLoaded on success. Modal/interaction sub-action chat handlers deferred (high volume, low diagnostic value). Webhook handlers' internal NotHandled() sites kept null SkipReason — opt-in over time. Drift detector regex now scopes to the named enum's body via brace-matching so TicketSkipReason + ConfigFileKind don't cause false-positive drift reports. SystemEventSequenceCompletenessTests now has 10 Theory rows covering every populated SystemEventType. 2081 main + 83 sandbox + 97 dashboard tests passing; server rebuilt + healthy; XLEN system:events=1701 across the smoke window, type breakdown verified: 40 PollCycleStarted (19), 41 PollCycleFinished (19), 42 TicketScanned (874), 43 TicketSkipped (874), 51 ConfigFileRead (8). → .agentsmith/phases/done/p0173c-channel-and-config-instrumentation.yaml"
    p0174: "Dashboard pull-aggregation + DESIGN.md token activation. Replaces the per-event TriggerLog (one-row-per-Skipped/Triggered, log-like) with PullCycleLog (one-row-per-cycle, dashboard-like). New usePullCycleLog hook pairs PollCycleStarted+Finished events scoped to the same Source string; collects all TicketScanned/Skipped/Triggered events in the [started, finished] window for that source; produces PullCycleEntry with durationMs (null for in-flight cycles), ticketsPolled, triggered count, and skippedByReason histogram. New useWebhookLog hook for one-row-per-delivery webhook visibility. New PullCycleLog + WebhookLog UI components with expand-row drill-in (per-ticket detail for the cycle). page.tsx swaps TriggerLog → PullCycleLog + WebhookLog; TriggerLog component deleted. Inter font loaded via next/font/google (self-hosted, font-display:swap) and bound to --font-sans CSS variable. globals.css canvas/ink tokens activated as actual body defaults (was zinc-950 inherited from p0169f). layout.tsx switches to bg-canvas + text-ink + font-sans with Smith-green primary dot accent next to the brand name. Tab-active underline color migrated from stone-800 to --color-primary (Smith-green) — consistent with p0169j-d's green=signal palette. Dashboard surface stays light even under prefers-color-scheme:dark (operator content-bright; terminal-panel surfaces handle their own dark variant). 127 dashboard tests passing (+11 net: usePullCycleLog×8, useWebhookLog×3). pnpm build green (/system 5 → 6.45 kB after aggregation logic). Dashboard image rebuilt + healthy. → .agentsmith/phases/done/p0174-dashboard-pull-aggregation-and-design.yaml"
    p0173d: "Dashboard /system route with five cards. Layout side-nav links to /system (peer to /, not under /jobs/[id] — system events are global, not per-run). Five pure derivation hooks on top of useSystemEvents (deriveSystemStatus / deriveActivityKpis / deriveChannelBreakdown / deriveTriggerLog / deriveCostRollup) — all pure functions of (events, now), useMemo'd in the hook wrappers. Cards: SystemStatusCard (per-tracker StatusPill with ok/degraded/disconnected thresholds at 1.5×/3× intervalSeconds + next-poll ETA), TodayActivityCard (rolling-24h KPI tiles: ticketsScanned/Triggered/Skipped/webhooksReceived/Actioned/pollCycles), ChannelBreakdown (per-source event counts sorted by count desc with percentage bars), TriggerLog (chronological TicketSkipped/Triggered merged stream with reason+detail inline — no click-to-expand, the answer is the row), CostRollupCard (today/week from LlmCallFinished.costUsd on the run channel — RunEvents wired empty for now, dashboard zero-states; cross-stream subscription is a follow-up). Status palette consistent with p0169j-d (green RESERVED for ok). 116 dashboard tests (+19 net: useSystemStatus×5, useActivityKpis×4, useChannelBreakdown×2, useTriggerLog×4, useCostRollup×4). pnpm build green (/system route 5 kB). Dashboard image rebuilt + /system smoke-200. NO Sparkline component yet — KPI tiles render numeric values only (deferred). Design polish deferred to a separate design-unification slice. p0173 umbrella complete. → .agentsmith/phases/done/p0173d-dashboard-system-view.yaml"
    p0173: "Umbrella — operator info substrate. Make every pre-run activity (ticket polling, webhook receipt, chat ingestion, trigger evaluation, config-file reads, skill catalog loads) visible on the dashboard. Same envelope contract as p0169e but parallel hierarchy: SystemEvent base + ISystemEventPublisher + single system:events stream + JobsHub.SubscribeSystem. Four independently-shippable slices: p0173a (system event backbone — pipe only, no producers), p0173b (TrackerPoller + 14 webhook handlers emit PollCycle / TicketScanned / TicketSkipped-with-reason / TicketTriggered-with-runId / WebhookReceived), p0173c (Slack/Teams + agentsmith.yml/context.yaml/coding-principles.md + YamlSkillLoader/ConceptVocabularyLoader — metadata only, no chat content), p0173d (/system route with SystemStatusCard + TodayActivityCard + ChannelBreakdown + TriggerLog + CostRollupCard, driven from SubscribeSystem + XRANGE replay). Ship order: a → b → c → d. Renumbered from p0170-range during creation to avoid phase-id collision with existing p0170a/b VS Code extension specs. → .agentsmith/phases/planned/p0173-operator-info-substrate.yaml"
    p0176a: "Call-scope attribution on top of p0176b. CallScope record in Contracts.Events carrying (Role, Phase, RepoName?); IRunContextAccessor gains BeginCallScope alongside the existing BeginScope, AsyncLocal frame restored on dispose, nested scopes resolve topmost-wins. LlmCallStarted/Finished + ToolCall/Result events gain optional Phase + RepoName fields; EventPublishingChatClient drops the role ctor parameter and reads role / phase / repo from CurrentCallScope at emission time. 14 IChatClient.GetResponseAsync call sites open a BeginCallScope using-statement around their call — ProjectAnalyzer (threaded repoName from AnalyzeProjectHandler's sandbox-key iteration), BootstrapDiscoverHandler / BootstrapRoundHandler / BootstrapDocumentHandler / AgenticExecuteHandler / GeneratePlanHandler / GenerateDocsHandler / GenerateTestsHandler / ConvergenceEvaluator / PlanConsolidator / CompileKnowledgeHandler / QueryKnowledgeHandler / GateRetryCoordinator / LlmIntentParser plus SkillCallRuntime (so RetryCoordinator's inner GetResponseAsync inherits the scope through AsyncLocal). PipelineCostTracker.BeginCall + SkillCostScopeManager + SkillCallScope + CallCostRecord gain optional repoName; BuildSummary returns RunCostSummary.PerRepo (new Dictionary<repoName, RepoCost>) when any record was attributed — pipelines without per-repo records get null and result.md skips the repo_cost block. RunCostSectionWriter.AppendFrontmatter / AppendInitFrontmatter render the repo_cost YAML section alongside the pipeline total when the caller passes a repoName matching a PerRepo key; WriteRunResultHandler's init-mode fan-out already passes repoName per repo, so each repo's PR shows '$X (this repo's share) / $Y (pipeline total)'. Build-time Roslyn-style architectural gate (tests/AgentSmith.Tests/Architecture/ChatClientCallScopeRuleTests.cs) scans Application + Infrastructure source for direct .GetResponseAsync calls and asserts every call is inside a method that opened BeginCallScope — pinned by synthetic violator + passing-case tests. File-name exemption list: EventPublishingChatClient.cs (the decorator itself), TracingChatClient.cs (pass-through decorator), RetryCoordinator.cs (runtime retry, scope inherited from SkillCallRuntime). 2185 tests (2102 main + 83 sandbox, +14 net new: 5 call-scope + 3 per-repo tracker + 3 per-repo result.md + 3 architecture). Closes the per-repo half of cost integrity and pins the structural fix so the next handler can't silently regress. → .agentsmith/phases/done/p0176a-call-scope-attribution.yaml"
    p0176c: "Topology failure visibility (renamed from the umbrella's 'p0176b' to avoid collision with the shipped cost-integrity baseline). Three operator-UX gaps on the Topology view closed in one slice. (1) Topology header shows the failure summary inline — TopologyCard renders snapshot.summary as a rose-coloured second header line whenever snapshot.status is anything other than 'running' or 'success' (failed / error / cancelled / future statuses all surface). Operator no longer has to switch to Activity/Trail to read why a run aborted. (2) Sandbox 'not_started' terminal status — sandboxStatus.ts gains a new SandboxStatus enum value; rule (!created && runFinished) → not_started; palette mirrors disposed (terminal-grey, no pulse) — visually neutral 'this never happened'. `waiting` keeps its mid-run semantics so SandboxCreated still arriving is read as in-progress. (3) BootstrapRound step naming includes (repo, component) — PipelineStepRunner.ComposeStepLabel internal helper appends '(repo, component)' / '(repo)' / '(component)' suffix to the base label depending on which fields the executing PipelineCommand carries (RepoName / ContextName from p0158g / p0161d). Multi-repo BootstrapDispatch fan-outs render one row per (repo, component) pair instead of N identical 'Producing bootstrap files' rows. The suffix flows through StepStartedEvent.StepName to every dashboard reader. 2107 main + 83 sandbox (+5 step-name tests) + 129 dashboard (+7 not_started + failure-summary tests) green. → .agentsmith/phases/done/p0176c-topology-failure-visibility.yaml"
    p0176b: "Cost integrity baseline. Diagnosed against the redis stream of a 5-repo init-project run that showed $0/0 calls on /system despite a $5.37 result.md: (D1) EventPublishingChatClient hard-coded CostUsd=0m on every LlmCallFinished, (D2) the decorator was wired into ONE call site only (SkillCallRuntime.TryInvokeAsync:110) — 12 other handlers obtained bare IChatClient from the factory and bypassed it entirely (1384 events, 0× LlmCall/Tool events). Structural fix: IModelPricingResolver extracted from PipelineCostTracker (interface in Contracts.Services, ModelPricingResolver impl in Application, registered as DI singleton). EventPublishingChatClient moved to Infrastructure.Services.Events so ChatClientFactory in Infrastructure can wrap unconditionally — every consumer (not just SkillCallRuntime) now emits LlmCallStarted/Finished events with cost computed via response.Usage + resolver (billable input minus cache_read, output billed full, cache_create at 1.25× input rate, cache_read at its own rate). PipelineCostTracker keeps project overrides as a per-instance dict layer on top of the resolver. SkillCallRuntime's manual `new EventPublishingChatClient(...)` removed. RunFinishedEvent gains optional CostUsd; ExecutePipelineUseCase publishes from PipelineCostTracker.EstimateCostUsd() at run end; RunSnapshot.Apply prefers the finished value over the per-call accumulation (defence in depth). Dashboard hub-events.ts mirror updated. 2088 backend (+7) + 122 dashboard tests passing. Per-call attribution (role / phase / repoName) + per-repo cost in result.md + Roslyn build-time gate live on top in p0176a-call-scope-attribution. → .agentsmith/phases/done/p0176b-cost-integrity.yaml"
    p0173e: "Typed message contracts. IDomainEvent marker (EventId/OccurredAt/Origin/ParentEventId) via explicit interface impl on RunEvent + SystemEvent base records — fixtures stay byte-compatible. DeprecatedFieldAttribute for field-level retire with grace window. docs/event-schema-policy.md ships the three rules: additive-optional, deprecate-via-attribute, semantic break = new versioned record; Contracts/README.md links it (CLAUDE.md absent — skipped). EventSchemaCompatibilityTests + frozen JSON fixtures (28 fixtures across L1Run/L1Step/L1Sandbox/L2Llm/L2Orchestrator/L3Sandbox/L3Tool/System tiers) deserialise through EventEnvelopeSerializer. DomainEventCoverageTests reflection-asserts every concrete RunEvent/SystemEvent subtype carries the marker. build-hub-event-types.mjs walks every record under Events/ and asserts the dashboard TS mirror has a matching interface; --check exits 1 on drift (17+10 records, green). IProgressReporter.ReportProgressAsync swaps string commandName → PipelineCommand; ReportDetailAsync removed; PipelineStepRunner.PostSkillDetailAsync emits typed L1StepDetailEvent (EventType.L1StepDetail=25) via IEventPublisher. FileToolHandler/HumanQuestionToolHandler/CommandRunner drop their IProgressReporter dep (no current callers in the pipeline graph). Pre-existing main build error fixed (ExecutePipelineUseCase.cs:144 missing costUsd arg). 2142 main + 83 sandbox + 129 dashboard tests green. → .agentsmith/phases/done/p0173e-typed-message-contracts.yaml"
    p0177: "Sub-agents (steps 1-12 + verify; steps 0 baseline-spike and 13 smoke-real operator-owned). AgenticLoopRunner extracted from AgenticExecuteHandler as the shared loop core — request carries InheritedContext + identity (Name/Activity/SubAgentId/ParentSubAgentId). Sub-agent type family: SubAgentSpec, InheritedContext (data only — pipeline goal + prior context slice + optional system prompt block; no cache_control here, that's p0178), ToolProfile enum, SubAgentResult (decision anchors only — TaskIndex/Status/SubAgentId/Name/ObservationsCount/FindingsCount/FilesWrittenCount/ToolCalls/CostUsd; NO ResultText field, reflection-asserted; implements IDomainEvent), SubAgentStatus, SubAgentContext. L2SubAgent typed events under p0173e contract: SubAgentSpawnedEvent, SubAgentObservationEvent, SubAgentFindingEvent, SubAgentFileWrittenEvent, SubAgentToolCallEvent, SubAgentCompletedEvent (EventType 60..65); 6 frozen JSON fixtures under tests/AgentSmith.Tests/Events/fixtures/events/L2SubAgent/; serializer + dashboard TS mirror + drift detector all green (24 RunEvent records). SubAgentBudget (per-run, thread-safe TryReserve, never throws). SubAgentNameValidator (regex + single-word generic HashSet, shared singleton). ISubAgentRunner + SubAgentRunner (SemaphoreSlim(MaxConcurrentSubAgents) + Task.WhenAll with deterministic spec-order merge; no fail-fast — failed child returns Failed, siblings continue; emits Spawned + Completed per child; children share the run cost tracker). SpawnAgentToolHost (IToolHost; parses flat-primitive params; validates names without LLM cost; reserves budget; runs children via ISubAgentRunner; logs decision; returns labeled SubAgentResult list — no result_text). ReadSubAgentObservationsToolHost (IToolHost; filters in-process event stream by sub_agent_id + optional kinds + max_results; returns paged typed events, never a summary; available to master AND children — sibling-read explicitly allowed). IPipelineToolPolicy stays single-method; ToolKit gets an IsSubAgent overload that filters out SpawnAgentToolHost by class-name match (decision: keeps existing Moq-based policy tests working). AllHostsActivePolicy adds SpawnAgentToolHost + ReadSubAgentObservationsToolHost. LoopLimitsConfig: MaxConcurrentSubAgents=4, MaxSubAgentsPerRun=20; agentsmith.example.yml updated. SourceAnchoringPreamble (p0151a master prompt) appended with role-naming requirement + good/bad examples + run-budget statement. 2186 main + 83 sandbox + 129 dashboard tests green. Step 0 baseline + step 13 smoke deferred to operator-owned reports/p0177-baseline.md + reports/p0177-subagent-bench.md — gate decision (pass/halt) is operator-only. → .agentsmith/phases/done/p0177-sub-agents.yaml"
    p0173f: "Dashboard typed render of the p0173e contracts + p0177 sub-agents. dimensionFilterQuery.ts ships four chip-style filter dimensions (agent/sandbox/pipeline/activity) with URL persistence (d.<key> params); EventFilterContext composes them alongside the existing L1/L2/L3 toggles. FilterRail renders four DimensionSection chip groups in addition to the three level checkboxes; observedDimensions arrive as a prop so the rail stays presentational. SubAgentTreeNode component renders one child — Name badge, Activity one-liner, four decision-anchor count chips (obs/find/files/tools), pulse-on-running status indicator. SubAgentTimelinePanel renders typed L2SubAgent events row-by-row with kind-chip narrowing; field-aware row components per kind (SubAgentObservationRow text-field rendered; SubAgentFindingRow severity-badge+title+detail; SubAgentFileWrittenRow path+bytes; SubAgentToolCallRow toolName+argsSummary). useSubAgentObservations hook + filterSubAgentObservations pure helper filter the existing useRunEvents stream by SubAgentId + optional kinds, no parallel subscription. SandboxBox gains operatingSubAgentName prop (caller resolves from latest SubAgentToolCallEvent/FileWrittenEvent on that sandbox). ActivityRow's L1StepDetail + StepStarted cases (shipped in p0173e) already render typed fields; TypedStepDetailRender tests pin the no-JSON-dump contract. TS drift detector green (24/10 records, no new event types in this slice). 2186 main + 83 sandbox + 151 dashboard tests green (+22 net new dashboard tests: dimensionFilterQuery round-trip ×3, FilterRailDimensions ×4, SubAgentTreeNode ×3, useSubAgentObservations ×3, SubAgentTimelinePanel + rows ×5, TypedStepDetailRender ×2, SandboxBoxOperator ×2). TrailTab integration (placing SubAgentTreeNode under master nodes via TrailAssembler) deferred — assembler change is a follow-up; SubAgentTreeNode ships ready to mount. → .agentsmith/phases/done/p0173f-dashboard-typed-render.yaml"
    p0179g: "Acute production fix. After p0179b shipped collapsed coding presets and p0179f fixed the Approval data contract, every server-spawned coding run reached step 10 (AgenticMasterCommand) and crashed with 'Prompt resource coding-agent-master not found at AgentSmith.Application.Prompts.Resources.coding-agent-master.md'. Root cause: SkillCatalogPromptCatalog.GetMasterCatalog called _skillLoader.LoadRoleDefinitions(_catalogPath.Root) — but Root is the tarball-extraction wrapper directory; the actual skills subtree (including _masters/) lives at {Root}/skills/. ExecutePipelineUseCase.LoadVocabularyFromCatalog already composes Path.Combine(Root, CatalogSkillsRootSubPath) correctly; the p0179a adapter forgot that segment, so the loader iterated baselines/ patterns/ skills/ _index/ as siblings, the underscore-skip + no-SKILL.md-at-root combination produced 'Loaded 0 role definitions', the master catalog cached empty, every coding-agent-master lookup fell through to EmbeddedPromptCatalog, and the embedded resource had been moved out by p0179a → InvalidOperationException. Fix: one-line Path.Combine(_catalogPath.Root, 'skills') inside GetMasterCatalog (mirrors ExecutePipelineUseCase's CatalogSkillsRootSubPath pattern). New regression test GetMasterCatalog_ReadsFromSkillsSubpath_NotTarballRoot uses a path-spy on the StubSkillLoader to assert the loader sees {Root}/skills, not {Root}. Deviation from spec captured as a decision: real-on-disk tarball integration test downsized to a path-spy assertion (the bug class is 'wrong path argument', and the spy catches it with 1 line of assertion). Embedded coding-agent-master.md stays deleted — reviving it as a safety net would re-introduce the two-source drift p0179a exists to abolish. Structural follow-up tracked: ISkillsCatalogPath should expose a typed SkillsSubtreeRoot property so this misuse becomes unrepresentable. 2228 backend tests green. → .agentsmith/phases/done/p0179g-prompt-catalog-skills-subpath.yaml"
    p0194: "Build-time gate gegen die slim/alpine-image regression aus dem p0193-followup. CheckoutSourceHandler ruft `git clone` INSIDE der Sandbox — wenn das Toolchain-Image kein git mitbringt, schlägt der Checkout nach 5min Pipeline-Wartezeit fehl mit '/work: no such file or directory'. Statt das auf den Operator zu verschieben: positive Allowlist die jeden Eintrag in SandboxSpecBuilder.LanguageImages gegen bekannte git-bearing Image-Basen pinnt (mcr.microsoft.com/dotnet/sdk*, *:*-bookworm, *:*-bullseye, buildpack-deps:*-scm). Zwei Tests: SandboxSpecBuilderImageBundlesGitTests iteriert KnownLanguages (neuer internal getter) gegen die Allowlist + theory mit 5 known-bad images (node:20-bookworm-slim, python:3.12-slim, alpine-Varianten, bare node:20); PipelineSandboxCoordinatorImageBundlesGitTests theory mit 5 Sprachen (csharp/typescript/python/go/rust) durch den Coordinator-Layer hindurch, capture SandboxSpec via Moq, assert ToolchainImage matched die Allowlist. Re-introduction von -slim oder -alpine für irgendeine Sprache failed jetzt im dotnet build statt nach 5min Pipeline-Time. KnownLanguages als internal IReadOnlyDictionary<string,string> exposed (InternalsVisibleTo war schon gesetzt). 2288 backend tests green (+11 net: 6 allowlist + 5 coordinator). → .agentsmith/phases/done/p0194-pipeline-shape-smoke.yaml"
    p0193: "Typed write path for context.yaml. Reader und Writer sind beide unser Code — der LLM tippt nie mehr YAML, er liefert JSON über ein neues Tool und das Framework serialisiert. ContextYamlDocument + ContextYamlMeta + ContextYamlStack records (Contracts) — Meta+Stack typisiert weil orchestrator-load-bearing (Workdir, Lang), Arch/Quality/Behavior als IDictionary<string,object?> pass-through (operator-content). Neues IContextYamlSerializer in Contracts + ContextYamlSerializer in Infrastructure halten EINEN YamlDotNet-Builder (UnderscoredNamingConvention, IgnoreUnmatchedProperties, OmitNull) für beide Richtungen — Round-Trip-Garantie by construction. ContextYamlParser wird zum dünnen Adapter der an den Serializer delegiert; ProjectMetaExtensions registriert beide als DI-Singletons. Neuer WriteContextYamlToolHost (Application/Services/Tools) exposes write_context_yaml(repo, context_name, document) — JSON-Input, deserialize zu typed Document, serialize via shared serializer, write in Sandbox an kanonischem Pfad .agentsmith/contexts/{context_name}/context.yaml. Validation guards: context_name muss single path segment sein (keine slashes / ..), repo muss in der sandboxes-Dict sein, meta.workdir REQUIRED. FilesystemToolHost.WriteFile + Edit + MultiEdit lehnen .agentsmith/contexts/*/context.yaml ab (case-insensitive Match, mit / ohne Repo-Prefix) mit ContextYamlPathRejection-Konstante die write_context_yaml als korrekten Tool nennt — belt-and-suspenders gegen stale Skills. Tool registriert in AllHostsActivePolicy (jetzt 8 Hosts) + AgenticToolSurface.ReadWriteWithHuman bekommt optional writeContextYaml-Parameter + AgenticMaster/ExecuteHandler ctor bekommt IContextYamlSerializer-Dependency und baut den Tool-Host beim Setup. Tests pinnen die zentralen Garantien: ContextYamlSerializer_Roundtrip_NpmScopedPackageInSdks_ParsesBackClean (echter Customer-Bug), ContextYamlSerializer_Roundtrip_StringWithColonInQualityPrinciples_ParsesBackClean (zweiter echter Customer-Bug), WriteContextYamlToolHost_HappyPath_WritesCanonicalPath_AndYamlParsesBack, FilesystemToolHostContextYamlGuardTests (theory mit 4 Pfad-Varianten + Edit + MultiEdit + happy-path nicht-context.yaml). AllHostsActivePolicyTests + ContextYamlParserTests + MonorepoMixedDiscoveryTests + AgenticMasterHandlerTests ctor-args nachgezogen. 2277 backend tests green (+18 net new: 6 Serializer + 5 WriteContextYaml + 7 Guard). Cross-repo skills bump (project-bootstrap + context-generator-master → write_context_yaml; catalog 3.4.0 → 3.5.0) als separater agentsmith-skills-PR. Customer-Cleanup: 2 broken context.yaml in /Users/da5id/develop/source/acme/ hand-gefixt (copyrheview: testing als mapping; client/default: quoted strings mit ':' und '@'). → .agentsmith/phases/done/p0193-typed-context-yaml-write-path.yaml"
    p0192: "Defence-in-depth secret scanner gates CommitAndPRHandler before `git commit`. New ISecretPatternScanner contract in Contracts.Services + SecretPatternScanner implementation in Application.Services (no Infrastructure deps; pure regex). Pattern set covers NuGet `<add key=\"ClearTextPassword\">` structural marker, npm `_authToken=` lines, common PAT prefixes (ghp_ / glpat- / sk-ant- / sk-), and the JWT three-segment shape. SandboxGitOperations split into StageAllAsync + GetStagedDiffAsync + CommitAndPushStagedAsync (the orchestrating CommitAndPRHandler now sequences stage → diff → scan → commit-or-abort). The original CommitAndPushAsync stays as the composed unscanned helper for InitCommitHandler + PersistWorkBranchHandler which write operator-controlled scaffolding and don't need the agent-credential gate. On a match the handler logs file:line + pattern, returns OpenStatus.Failed for that repo, never reaches `git commit` so no commit object exists for the leak to escape into history. Registered as singleton in PipelineHandlersExtensions. 2259 backend tests green (+7 net: 6 SecretPatternScanner + 1 CommitAndPRHandler gate). → .agentsmith/phases/done/p0192-pre-commit-secret-scan.yaml"
    p0191: "Private package feed credentials via a pull-on-demand tool, no per-language code in agent-smith. New `registries:` block in agentsmith.yml carries a flat list of {host, username, token} entries; tokens reference secrets via ${name} substitution. New AgentSmithConfig.Registries property + RawRegistryEntry; YamlConfigurationLoader.ResolveRegistryTokens does the secret substitution after the env-var pass. New GetArtifactCredentialsToolHost (Application/Services/Tools) exposes one tool `get_artifact_credentials(host_filter?)`. host_filter required when >1 registry configured (silent over-disclosure is unrepresentable). URL-shaped inputs are reduced to hostname via Uri.TryCreate. Match is dot-boundary subdomain (H == filter OR H endsWith '.' + filter) — string-suffix would let evil-dev.azure.com steal dev.azure.com tokens, pinned by GetArtifactCredentialsToolHost_DoesNotMatchPartialLabel. ISensitiveToolHost marker in Contracts.Services plus a SensitiveToolNames static class with the canonical name set (single source of truth referenced by both the Application-level host and the Infrastructure-level scrub client without a layering inversion). New SensitiveToolHistoryScrubChatClient (Infrastructure/Services) is a DelegatingChatClient inserted by ChatClientFactory between EventPublishingChatClient and FunctionInvokingChatClient — rewrites prior-turn Tool messages from sensitive tools to `[set, applied earlier turn]` before they hit the LLM provider. Stateless rule: a sensitive tool result is 'prior' iff at least one Assistant message follows it in the list, so the fresh result reaches the agent intact but never re-enters the provider's prompt cache on subsequent iterations. Architectural test ChatClientCallScopeRuleTests adds the scrub client to its exempt list (pass-through decorator). Two construction sites updated: AgenticMasterHandler + AgenticExecuteHandler ctor now takes AgentSmithConfig and builds the tool host with config.Registries; AgenticToolSurface.ReadWriteWithHuman gains an optional credentials parameter. Spec deviations captured in p0191.yaml decisions: (1) ToolResultEvent body-redaction step DROPPED — EventPublishingAIFunction emits metadata-only events (ok, resultLength, errorMessage, scope) since p0173e, never the result body; nothing to redact at the event layer. (2) Compaction-summarizer prompt-hardening DEFERRED — IRunArtifactStore persists plan/diff/bootstrap/result.md, not chat history, so compaction summaries stay in-memory where the scrub layer already covers them. 2252 backend tests green (+7 new: 6 GetArtifactCredentialsToolHost cases + 3 SensitiveToolHistoryScrubChatClient cases + 1 YamlConfigurationLoader registries roundtrip; AllHostsActivePolicy + ChatClientCallScopeRule updated). Master prompt cross-repo bump (coding-agent-master 1.2.0 → 1.3.0) DEFERRED to a follow-up agentsmith-skills PR. → .agentsmith/phases/done/p0191-artifact-credentials-tool.yaml"
    p0189: "Two operator-visibility fixes from the 2026-06-01 production run. (1) ContextYamlParser silently swallowed YamlException and returned null — operator saw 'parse returned null, skipped' without the cause and the sandbox fell back to buildpack-deps:bookworm-scm (no node), so jest timed out at 330s on the client repo. Root cause: unquoted `@azure/msal-angular` under `sdks:` in the client's `.agentsmith/contexts/default/context.yaml`; YAML reserves `@` as an indicator at the start of an unquoted scalar so the scanner aborted at line 22 col 7. New ContextYamlParseResult record (Summary?, ErrorReason?) replaces the nullable-only return — parser converts YamlException into ErrorReason with `(Line: N, Col: M)` prefix + a targeted hint when the scanner choked on `@` (the npm scoped-package case detected by reading the source line at the column, not by regex over the YamlDotNet message which is generic). SandboxLanguageResolver logs the structured error with file path + reason instead of generic null-fallback. ProjectMetaResolver migrated to the new contract; missing-workdir InvalidOperationException is swallowed there because SandboxLanguageResolver surfaces it upstream. (2) Run-detail page hid sandbox stdout/stderr behind the Architecture topology graph (collapsible section, click a node to expand) — for a 5-minute dotnet test step the operator only saw 'step running…' with no live output. useRunExecutionTree gains a per-step `sandboxRepos: Map<repo, SandboxRepoSnapshot>` populated from SandboxCommand + SandboxResult events; stepBucketToNode composes a new StepSandboxes body section above the existing drawer/ticket body when sandboxRepos is non-empty. StepSandboxes renders one row per (repo, command) with a status badge (running… / exit 0 + duration / exit N error) and an always-expanded SandboxBox underneath — L3 fanout streams live stdout/stderr for the active step; finished-step buffer is empty (the ring lives in dashboard memory) but the command + exit code still convey what ran. runId threaded through the hook as an optional default-null arg so existing two-arg callers (system page) keep compiling. 2242 backend + 33 dashboard execution-tree tests green (+5 ContextYamlParserTests + 2 ProjectMetaResolverAsyncTests + 1 useRunExecutionTree test net new). → .agentsmith/phases/done/p0189-context-yaml-parse-errors-and-stream-in-tree.yaml"
    p0188: "Process-wide LLM rate limiter for proactive throttling on top of p0187's reactive retry shim. ILlmRateLimiter contract (AcquireAsync(estimatedInputTokens, ct) → IDisposable lease) + ILlmRateLimiterRegistry keyed by `providertype::model`. Implementation in AgentSmith.Infrastructure.Services.RateLimiting uses System.Threading.RateLimiting 9.0.0 (NuGet — not in the BCL despite .NET 8) with two TokenBucketRateLimiters (requests + tokens) gated by AND so either cap can be the binding constraint. ReplenishmentPeriod=1s at limit/60 so a burst trickles smoothly instead of queuing behind a single per-minute refill. RateLimitingChatClient is a DelegatingChatClient inserted by ChatClientFactory between the bare provider client and EventPublishingChatClient — every Microsoft.Extensions.AI consumer is covered without per-call-site changes. AgentConfig gains a nullable RateLimitConfig (RequestsPerMinute + InputTokensPerMinute) so operators override defaults per agent. Defaults: claude OAuth 5/20k, claude API 50/40k, openai 60/60k. Input-token estimate is chars/4 (cross-provider rough); wait > 500ms logs info so operators see when caps bind. ChatClientCallScopeRuleTests adds RateLimitingChatClient to the exempt-files set (pass-through decorator, no scope wrap). 2242 backend tests green. → .agentsmith/phases/done/p0188-llm-rate-limiter.yaml"
    p0187: "Claude subscription tokens (`sk-ant-oat01-…`) + 429/529 retry + run-detail title fix. Anthropic.SDK 5.10.0 only knows the API-key flow and unconditionally sends `x-api-key`; the Anthropic API rejects an OAuth token sent that way with `invalid x-api-key`. New AnthropicOAuthHttpHandler (DelegatingHandler installed by ClaudeChatClientBuilder when the token starts with `sk-ant-oat`) removes `x-api-key`, sets `Authorization: Bearer <token>`, adds `anthropic-beta: oauth-2025-04-20` (gate for the OAuth endpoints). Tokens that start with `sk-ant-api` (regular API keys) pass through unchanged. Same handler retries 429/529 responses on both auth flows with Retry-After honored when present + exponential fallback 5/10/20/40/60s otherwise (MaxRetries=5, MaxBackoff=60s); HttpClient.Timeout bumped to 10 minutes so the retry budget fits. ChatClientBuilder.ConfigureOptions wraps the client to default ChatOptions.ModelId from agent.Model — required because the OAuth call path returns 'model: Field required' when callers omit it. jobs/[id]/page.tsx header rewrites: h1 prefers ticketTitle → pipeline → 'run'; meta line under it adds ticketId · pipeline · runId · stepCaption · agentName so the operator can identify a run at a glance. Decision: per-request header rewrite via DelegatingHandler, not a vendored Anthropic.SDK fork — single handler is testable in isolation and the rewrite is a no-op for API-key callers. No new unit tests (OAuth + retry tested via live smoke against an sk-ant-oat token; existing tests pin the bare ClaudeChatClientBuilder path). 2242 backend tests green. → .agentsmith/phases/done/p0187-claude-oauth-and-detail-title.yaml"
    p0186: "Run-detail tail fallbacks + agent visibility. Backend: RunStartedEvent gains optional AgentName field (string?, default null for pre-p0186 back-compat) with display shape '{AgentConfig.Type}/{AgentConfig.Model}' (e.g. 'claude/claude-sonnet-4-20250514', 'azure_openai/gpt-4.1') — operator's config-key (e.g. 'claude-default') NOT threaded today; type+model already answers 'which agent is doing this work' and avoids a bigger refactor of ResolvedProject. ExecutePipelineUseCase.PublishRunStartedAsync receives projectConfig and fills the field from projectConfig.Agent.Type + .Model. RunSnapshot gains AgentName + Apply copies it from RunStartedEvent. Dashboard: hub-events.ts mirrors the field on RunStartedEvent + RunSnapshot; jobs/[id]/page.tsx renders '· agent {AgentName}' in the header meta line under run-id + step caption. useRunExecutionTree.pickStepTail: new helper wraps pickTail with a status-derived fallback — empty step buckets (Publishing pipeline name, Checking out source, Loading coding principles, etc. that only emit StepStarted/StepFinished, no L1StepDetail/Decision/LLM events) now show 'done'/'running…'/'failed' instead of leaving the row tail-less. 3 dashboard RunSnapshot fixtures updated with ticketId/ticketTitle/agentName null defaults. 2240 backend + 182 dashboard tests green. → .agentsmith/phases/done/p0186-tail-fallbacks-and-agent-visibility.yaml"
    p0185: "Acute production fix for the Claude path. AnalyzeProjectHandler → ProjectAnalyzer → EventPublishingChatClient → Anthropic.SDK MessagesEndpoint crashed with 'MissingMethodException: Method not found: System.String Microsoft.Extensions.AI.HostedMcpServerTool.get_AuthorizationToken()' on the FIRST Claude chat call after the operator switched a project to claude-default agent. Root cause: Microsoft.Extensions.AI.Abstractions removed HostedMcpServerTool.AuthorizationToken in the 10.4.0 jump (replaced by Headers[\"Authorization\"]). Anthropic.SDK 5.10.0 still calls the removed property; upstream tghamm/Anthropic.SDK#197 is open with no fix released. The pre-p0185 csproj comment claimed 10.4.0 was the workaround for #197 'at 10.4.1' — but the property is gone in 10.4.0 too. The pin sat on a stale assumption since the bug only surfaces on Claude-typed agents (Azure-OpenAI-only runs never tripped it). Fix: M.E.AI.Abstractions / M.E.AI / M.E.AI.OpenAI pinned EXACT to [10.3.0] (last version where AuthorizationToken still exists). OllamaSharp 5.4.24 → 5.3.10 (last version whose M.E.AI.Abstractions floor is ≤ 10.3.0; same OllamaApiClient : IChatClient surface so no consumer change). csproj comments rewritten to name the real condition + bump-back trigger (upstream #197 lands). No code changes outside the csproj files; bug was pure binary-compat between packages. 2240 backend tests green. → .agentsmith/phases/done/p0185-claude-sdk-compat.yaml"
    p0184: "TicketFetchedEvent + run-card title + Fetch-ticket body. New L1Run event TicketFetchedEvent (EventType=26) carries ticketId/title/description/state/labels/attachmentCount/source. FetchTicketHandler publishes the event after the ticket fetch (and the attachments-slot fill); IEventPublisher + IRunContextAccessor injected, publish is best-effort (skipped when CurrentRunId is null, exceptions swallowed at debug level — fetch must not fail because of an event publish hiccup). RunSnapshot gains TicketId + TicketTitle nullable fields; Apply copies them from the typed event so the runs-page RunCard renders the human-readable title as heading (with #ticketId underneath + pipeline as secondary context) instead of pipeline-as-heading or 'unknown'. New FetchTicketBody dashboard component reads the latest TicketFetchedEvent from the step bucket and renders id/title/state/attachment-count chips + truncated description (320 chars). useRunExecutionTree adds TicketFetched to the step-event bucketing and routes Fetch-ticket step rows through FetchTicketBody when a TicketFetchedEvent is present. ActivityRow + FilterRail get an exhaustive-switch entry for the new EventType. Frozen JSON fixture + EventEnvelopeSerializer.ResolveType entry land together so the schema-compat test passes. 2240 backend + 182 dashboard tests green (+9 new: 2 FetchTicketHandler, 5 FetchTicketBody, 2 RunCard). → .agentsmith/phases/done/p0184-ticket-fetched-event.yaml"
    p0182: "ProjectMap cache moves from container disk to Redis. New IProjectMapStore abstraction in AgentSmith.Contracts.Services: TryGetAsync(cacheKeyId, contentHash) + SetAsync(cacheKeyId, contentHash, map). RedisProjectMapStore (Infrastructure) keys 'agentsmith:projectmap:{cacheKeyId}' with a JSON envelope {hash, map}, 30-day TTL refreshed on every read+write. DiskProjectMapStore (Infrastructure.Core) preserves the pre-p0182 file-pair layout (project-map.json + project-map.cache-key under IAgentSmithPaths.ProjectCacheDir) so the CLI flow without Redis keeps working and operator's pre-existing on-disk caches deserialize without migration. AnalyzeProjectHandler depends on IProjectMapStore — no direct file I/O, no path resolution; the per-sandbox CacheKeyForDiscovery helper stays because it is a domain concern not a path concern. DI: ServiceCollectionExtensions.AddAgentSmithCore registers Disk as the CLI-safe default; RedisExtensions.AddRedis swaps in Redis via RemoveAll<>+Add. Backwards behaviour: first run after deploy still pays the analyzer toll (Redis cache empty); every subsequent run/restart reads from Redis until content hash changes. 2240 backend tests green (+4 RedisProjectMapStore round-trip + TTL + mismatched-hash + unknown-key). Closes the worst restart-penalty for the dev cycle without introducing a new dependency. → .agentsmith/phases/done/p0182-project-map-redis-cache.yaml"
    p0179h: "Acute fix for the multi-repo path-prefix gap surfaced after p0179g unblocked AgenticMaster. FilesystemToolHost.Route enforces multi-repo prefix addressing when there is more than one sandbox; the master prompt never taught the rule, so the LLM called list_directory('Sample.Api/Controllers') and crashed at the first file-tool call with 'does not start with a known repo name'. Two-edge fix: (1) FilesystemToolHost accepts the prefix even in single-sandbox mode (strips it when it matches the only repo, otherwise passes through) — same path convention works in both single- and multi-repo runs so the master never has to branch on run shape; (2) AgenticMasterHandler renders a new {RepoNames} token (bullet list under 'Repositories in this run' heading for 2+ sandboxes, empty for 0-1) so the master sees the available names embedded in its prompt body. Cross-repo: agentsmith-skills feat/p0179h-repo-prefix-awareness (PR #69) adds a 'Repository-prefixed paths' section to coding-agent-master/SKILL.md + the {RepoNames} token + three examples; bumps skill 1.1.0 → 1.2.0 and catalog 3.2.0 → 3.3.0. agentsmith.yml skills.version pin moves to 3.3.0. 5 new tool-host tests pin the prefix-tolerance behaviour (single-repo-matching-prefix, single-repo-bare, multi-repo-with-prefix, multi-repo-missing-prefix, single-repo-non-matching-first-segment). 2240 backend tests green. The structural defect (ambiguous ISkillsCatalogPath.Root that bit p0179g) is mirrored here by FilesystemToolHost's two-mode routing — tracked as a follow-up to expose a single typed RoutedPath contract once a third caller surfaces. → .agentsmith/phases/done/p0179h-master-knows-repo-prefix.yaml"
    p0183: "Execution-tree run-detail + system-page redesign. Replaces the 4-tab RunDetail layout (Topology / Activity / Result / Trail) with a single execution tree that tells the story of a run in one scroll. New components under src/dashboard/src/components/execution/: ExecutionTree, ExecutionNode (lead + chev + status dot + label + TimingGutter + duration), TimingGutter (gantt-style bar relative to total run duration), LiveTail (one-line ↳ newest-event preview under each row), EventDrawer (filter chips per typed EventType bucket — Findings/Obs/Tools/LLM/Files/Decisions — plus newest-first sort toggle, content search, and cap-at-8 expander), CollapsibleSection. Run assembler hook useRunExecutionTree groups RunEvent stream by stepIndex and nests SubAgentSpawned/Completed under whichever step was active at spawn time. System page rewritten with same shape: useSystemExecutionTree maps SystemEvent stream to a static 5-subsystem registry (tracker / webhook / chat / config / catalog) with freshness-window gutter (last-event-time → now). Cost rollup + TodayActivity moved into CollapsibleSections below the subsystem tree. Old tab components (TopologyCard / StepProgressList / ActivityTab / TrailTab and their children) stay on disk this slice — physical deletion is a follow-up cleanup once the new layout has settled. Bespoke step-kind body renderers (rich FetchTicketBody / BootstrapCheckBody / CheckoutSourceBody with typed step payloads) DEFERRED until a backend phase publishes the missing typed payloads — EventDrawer with typed L1StepDetail / DecisionLogged / GateChecked / Tool / LLM events is enough for slice 1. 7 new dashboard tests pin the redesign components (TimingGutter ×3, ExecutionNode ×5, ExecutionTree ×2, EventDrawer ×7, useRunExecutionTree ×4, useSystemExecutionTree ×3 — 24 net). pnpm build + 175 dashboard tests green. Dashboard image rebuilt as 0.69.1; both /system and /jobs/[id] return HTTP 200 and carry the new layout markers. → .agentsmith/phases/done/p0183-execution-tree-redesign.yaml"
    p0179f: "Acute fix for p0179b's runtime data-contract gap. Every server-spawned coding run was crashing at step 9 (ApprovalCommand) with KeyNotFoundException 'Key Plan not found in pipeline context' because the collapsed coding presets (fix-bug / add-feature / fix-no-test) kept the Approval step in place but retired GeneratePlan — Approval's ContextBuilder demanded a structured Plan that no upstream step in the new preset shape produced. Honoring the explicit p0179b decision that 'Approval stays', the fix makes ApprovalContext.Plan nullable, switches ApprovalContextBuilder to TryGet, and branches the handler: render Plan steps when a structured Plan is set (legacy choreography presets), render Ticket + Repos summary otherwise (collapsed coding presets). Headless auto-approve path unchanged. Approval result messages flipped to lowercase ('approved by user') to keep the legacy ApprovalHandlerTests substring assertion stable. New PipelinePresetContextContractTests walks each of the 3 collapsed coding presets command-by-command and asserts every ContextBuilder.Build() succeeds against a context primed only with keys earlier steps in the SAME preset are known to produce — this exact bug now fails at build time, not in prod. Modeling scope intentionally narrowed to coding presets (scope-tracked in spec out-section); extending to scan / mad / skill-manager / api-scan requires modeling Triage / SkillRound / Convergence outputs and waits for a similar regression on a non-coding preset. 2227 backend tests green (+8). → .agentsmith/phases/done/p0179f-approval-without-plan.yaml"
    p0179e: "MAD-pipeline collapse to one master step (same shape as p0179b/d). AgenticMasterContextBuilder gains mad-discussion → mad-discussion-master in its per-pipeline routing. MadDiscussion preset drops Triage / ConvergenceCheck / CompileDiscussion / LoadSkills — one AgenticMaster step replaces them. Cross-repo: agentsmith-skills feat/p0179e-mad-master-skill (PR #63) ships mad-discussion-master with the 5-perspective protocol (dreamer / realist / philosopher / devils-advocate / silencer) using p0177's spawn_agents + read_sub_agent_observations primitives — NO new C# tool hosts, NO new EventType range, NO new MadOrchestrator service, NO N+1 perspective master skills, NO dashboard MadMasterPerspectivePanel. Reason: the original p0179e spec assumed master-to-master typed channels were necessary; the simpler shape (one master + sub-agents) is enough until a real run surfaces a concrete need. Removed PipelinePresetsConsistencyTests.MadDiscussion_LoadSkills_AppearsBeforeTriage + PipelinePresetsTests.MadStillContainsTriage_UntilSliceEMigratesIt (no preset still asserts them). Added MadDiscussion_UsesAgenticMaster_PostP0179e. 2204 backend tests green. With p0179e shipped, the four umbrella slices (b coding, d scan, e mad) all collapse the choreography. The handler-class cleanup (Triage / SkillRound / Convergence / SwitchSkill / GateRetry / Compress / PlanConsolidator / StructuredOutputInstructionBuilder / DiscussionRoundToolPolicy / CompileDiscussionHandler) waits on autonomous + skill-manager — they still dispatch the handlers. Original p0179c (typed master-phase events + enter_phase tool + phase-aware policy) and the d-scope content extraction (verbatim investigator-skill rules into the new scan masters) remain deferred. → .agentsmith/phases/done/p0179e-mad-master-step.yaml"
    p0179d: "Scan-pipeline collapse to one master step (same shape as p0179b for security-scan / api-security-scan / legal-analysis). AgenticMasterContextBuilder gains a per-pipeline-name routing table (security-scan → security-master, api-security-scan → api-security-master, legal-analysis → legal-analyst-master). SkillCatalogPromptCatalog adapter gains a direct-master fallback: when the requested name matches a loaded role:master skill directly, serve it (no need to grow the static NameMap with identity entries). SecurityScan preset sheds CompressSecurityFindings / LoadSkills / Triage / Review / Final / ConvergenceCheck / CompileDiscussion. ApiSecurityScan sheds CompressApiScanFindings / LoadSkills / Triage / Review / Final / Convergence / CompileFindings. LegalAnalysis sheds LoadSkills / Triage / ConvergenceCheck / CompileDiscussion. Cross-repo: agentsmith-skills feat/p0179d-scan-master-skills adds 3 new master bodies (hand-written domain principles + 3-phase rhythm; verbatim extraction from existing investigator skills DEFERRED until master pattern is validated end-to-end — 30+ investigator skills stay on disk untouched). Updated PipelinePresetsTests + PipelinePresetsSinglePhaseTests + ApiSecurityScanPresetTests. 2205 backend tests green. Handler-class deletions still deferred — skill-manager/autonomous/mad-discussion still dispatch the choreography handlers until p0179e + a final cleanup slice. → .agentsmith/phases/done/p0179d-scan-master-step.yaml"
    p0179b: "Coding-pipeline collapse to one master step (re-slicing of original p0179b+c — atomic cut). NEW AgenticMasterHandler + AgenticMasterContext + AgenticMasterContextBuilder alongside AgenticExecuteHandler (additive — not a replacement); resolves master skill body through SkillCatalogPromptCatalog (p0179a route), runs IAgenticLoopRunner with full ReadWriteWithHuman tool surface, no Plan dependency (master analyses ticket+repo itself). CommandNames.AgenticMaster + 'Running master skill' progress label. DI registered. fix-bug / add-feature / fix-no-test presets shed Triage / GeneratePlan / PlanOpenQuestions / EmptyPlanCheck / AgenticExecute / RunReviewPhase / RunFinalPhase / RunVerifyPhase / LoadSkills — replaced by AgenticMaster. Approval kept before AgenticMaster, Test after (AddFeature also keeps GenerateTests + GenerateDocs post-master). Cross-repo: agentsmith-skills feat/p0179b-coding-master-plan-verify (PR #61) adds Plan/Execute/Verify soft-guidance sections to coding-agent-master 1.0.0 → 1.1.0. Choreography handler-class deletions (Triage / SkillRound family / Convergence / SwitchSkill / GateRetry / Compress / PlanConsolidator / StructuredOutputInstructionBuilder / DiscussionRoundToolPolicy) deferred — their non-coding consumers (skill-manager, autonomous, scan, mad) still run the old shape. Single cleanup commit lands after p0179d+e. Original p0179c (typed master-phase events + enter_phase tool + phase-aware policy + MasterPhaseTracker) DEFERRED — soft guidance is enough until an observability/ordering need surfaces. 11 new tests pin handler shape + new preset shape + scan/mad still on Triage until d/e. Updated PipelinePresetsSinglePhaseTests + PipelinePresetsConsistencyTests for the new coding-preset shape. 2205 backend tests green. → .agentsmith/phases/done/p0179b-coding-master-step.yaml"
