    p0156: "ISO-8601 timestamp + 4-hex collision-suffix run identifiers replace the sequential r{NN} scheme. RunId is now generated once at pipeline start by ExecutePipelineUseCase (unified with the pre-existing log-correlation slot at ContextKeys.RunId — previously two separate ids drifted: 8-hex correlation in log scope + WIP trailer vs. r{NN} in directory + context.yaml). New format `{yyyy-MM-ddTHH-mm-ss}-{4hex}` is lexicographically sortable, filesystem-safe, ls-readable, and same-second collision-resistant (16-bit suffix kills batch-enqueue races). WriteRunResultHandler now creates the top-level `runs:` key in context.yaml when absent (fixes the silent no-op observed in a6914f38 when target repos lacked the legacy `state.active:` anchor). RunDirectoryReader parses only the new 24-char prefix; pre-p0156 r{NN} directories become wiki-invisible (CHANGELOG note). RunNumber:int → RunId:string across RunDirectoryInfo / RunData / handlers / formatter. New RunIdGenerator helper with format-invariant regex pin so CompileKnowledgeHandler's ordinal string compare stays valid by construction. Display sites render `Run 2026-05-20 22:27:43 UTC (8a3f)` — keeps seconds + suffix so operators can map header → directory. 1964 main + 83 sandbox tests passing. → .agentsmith/phases/done/p0156-timestamp-run-identifiers.yaml"
