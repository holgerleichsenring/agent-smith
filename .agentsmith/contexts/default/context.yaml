    p0157: "Umbrella for non-DI ctor elimination, superseded by slices a-d after stale inventory re-baseline; restructured into focused phases"
    p0157d: "Architectural test enforcing DI-only ctor params for registered services, with scope-sanity and synthetic-violator teeth checks"
    p0162: "Monorepo restructure moving 9 .NET projects under src/backend to make room for src/dashboard; scripts renamed to tools"
    p0169-pre: "Scaffolded Next.js 15 dashboard with TypeScript strict, Tailwind v4, shadcn, token build pipeline, Dockerfile and CI workflow"
    p0169a: "Job-Viewer: backend job-list/detail/file endpoints from run topology plus dashboard job table and detail pages"
    p0169b: "Job live-tail via SSE streaming progress/tool_call/done/error from per-job Redis stream, plus dashboard log panel hook"
    p0169e: "Event-sourcing backbone with typed L1/L2/L3 RunEvents, Redis publisher, decorator producers, JobsBroadcaster and SignalR JobsHub, replacing filesystem-scan job-list and SSE"
    p0169f: "Topology UI on the SignalR hub: typed hub-event client, ref-counted groups, reconnect policy, overview cards and run-detail topology with sandbox boxes"
    p0169g: "Filter rail and L3 tool rendering: per-event-type checkboxes, tool-call/result pairing, metadata-only rows at run level"
    p0169h: "Event-trail tree: backend TrailReader plus dashboard react-arborist tree, typed payload panes, timeline slider; supersedes p0169c"
    p0169c: "Superseded by p0169h; original trail-tree spec against deleted file-join API, kept as historical record only"
    p0169d: "Superseded by p0169i; original asciinema spec made redundant by event backbone, kept as historical record only"
    p0169j-c: "Result tab: IRunArtifactStore gains result-markdown slot cached to Redis, ResultMarkdownReader and hub forward, dashboard react-markdown tab"
    p0169j-b: "Activity tab with 6 operator-vocabulary pills replacing L1/L2/L3 filter jargon, typed reason fields inline, URL round-trip"
    p0169j-b1: "Failing producers emit typed reason fields: StepFinished.Reason, ToolResult.ErrorMessage, new CatalogIssueEvent; completeness gate added → .agentsmith/phases/done/p0169j-b1-failure-reason-events.yaml"
    p0180: "Per-toolchain sandbox dedup: PipelineSandboxCoordinator groups contexts by toolchain image so a repo spawns one container per toolchain not per context"
    p0198: "Deterministic SetupRegistryAuth step pre-stages private-feed credentials into sandboxes before build/test; ServerCompositionBuilder unifies DI"
    p0199b: "Real DockerSandbox harness tier for fix-bug: end-to-end pipeline with real Redis, dotnet restore/test and git push to a bare repo, env-gated"
    p0199a: "Real-composition pipeline harness covering 8 of 11 matrix presets via the production DI graph with scripted chat client"
    p0201: "Sandbox liveness and orphan reaper: agent heartbeat loop, labelled containers, liveness watcher emitting SandboxVanished, cancellation-reason tracking, orphan reaper"
    p0199c: "Docker-tier harness extended to 8 presets: four green end-to-end, four deferred with loud skip-with-reason; shared script seeder and helpers"
    p0202: "New language-agnostic InstallDependencies step for non-dotnet stacks, plus TestHandler NoTests state and PersistWorkBranch clean-repo aggregation fixes"
    p0202c: "PersistWorkBranch failure-recovery now recognises AgenticMaster so fix-no-test/add-feature push a WIP branch on mid-run failure instead of silently dropping master edits"
    p0202a: "Durable install_command from context.yaml: read at discovery time (beside stack.lang) onto RemoteContextDiscovery so the early InstallDependencies step sees it — fixes the p0202 ProjectMap no-op; ci segment on context.yaml + bootstrap emits it"
    p0202d: "Re-init MERGES context.yaml instead of clobbering: BootstrapRound reads the existing context.yaml/coding-principles.md and the producer prompt preserves operator fields + backfills missing install_command — re-run init across the estate is the migration path, zero hand-editing"
    p0202e: "Analyzer DERIVES `prerequisites` (repo-state-aware: npm ci only with a committed lock, else npm install) — fixes the npm-ci-without-lockfile failure; the step moved after AnalyzeCode so the ProjectMap is available; renamed InstallDependencies → EnsurePrerequisites and ci.install_command → top-level `prerequisites` everywhere (no `ci` jargon / `stack.ci` collision); context.yaml stays as an optional override (legal-analysis markitdown needs it)."
    p0204: "skill-manager preset-shape PARTIAL fix — LoadContext removed (the only step the original spec named). Contract test surfaced that CompileDiscussion (and likely others) ALSO demand Repository → un-blacklisting was reverted; skill-manager stays on KnownBrokenPresets pointing at p0204a for the full rework. Honest scope-correction documented in the spec's done section."
    p0203: "Execution-tree UI rework: handler Message under each step row, central CommandDisplayNames map + StepStartedEvent.DisplayName, per-repo aggregation (N/M parent + failed-repo names, sub-blocks collapsed), paired LLM rows with per-step cost rollup and 'unknown' role marker (producer fix sliced to p0203a), stdout collapsed-by-default on success"
    p0212: "Prerequisites + test commands now run in the project's actual subtree, not the repo root: new pure CommandWorkingDirectory.Resolve derives the dir from the longest common prefix of ProjectMap.Modules[].Path (meta.workdir overrides; '.' fallback = today's behaviour) — fixes `npm install` ENOENT when package.json sits in a subdirectory. A module at '.' collapses to '.', so the .NET test_command convention and single-stack repos are unchanged."
    p0199d: "Checked-in synthetic SkillsCatalog fixture under the harness tree; SkillsBackend.Fixture opt-in on RealCompositionHarness; init-project + autonomous fast-tier tests un-skipped and green; matching docker-tier classes; DockerPresetRunner no longer defers either preset. Coverage matrix moves to 7 of 9 docker-tier presets green (skill-manager + legal-analysis + api-security-scan remain deferred)."
    p0199e: "legal-analysis docker-tier: InstallDependencies inserted between AcquireSource and BootstrapDocument; LegalFixture context.yaml pins `pip install markitdown==0.1.1` on python:3.12-bookworm; three xUnit cases (green pipeline, markdown extracted, negative no-install fails); DockerPresetLayout extracted for per-preset fixture routing; legal-analysis removed from DockerPresetRunner.DeferredPresets. Coverage matrix moves to 8 of 9 docker-tier presets green (only api-security-scan remains, p0199f)."
    p0205: "Two-pane master/detail run-detail (single-line NavRail + DetailPane, selection/expansion in URL hash via useRailSelection) replacing the p0183 stacked tree+collapsibles; Architecture/Result become Overview rail nodes wrapping TopologyGraph/ResultTab. New visible LoadCatalog first step in all 10 presets: resolver/handlers return CatalogResolution (real version tag/source/url/from-cache), handler gathers concept/skill/master counts and emits a per-run CatalogLoadedEvent (EventType 27, mirrored in hub-events.ts); CatalogLoadBody renders version/source/url/counts/cache-badge."
    p0208: "Runs list rebuilt as an Azure DevOps-style dense single-line list (StatusIcon + title/meta + step-progress bar + relative time, All/Running/Failed/Done filter chips with live counts, active+recent merged newest-first, full-bleed page); shared 14px base type scale lands on html in globals.css so p0205 run-detail inherits it, shared filled-circle StatusIcon (ok/fail/run/wait) reuses the p0205 NodeStatus palette; OverviewCardGrid superseded (re-exports RunsList); branch/title rendered only when present (p0211 producer gap left honest)."
    p0199f: "api-security-scan docker-tier: passive-mode default (Kestrel StubApiTargetHost on host.docker.internal, no source checkout, BootstrapGate's p0130a-conditional skip), ApiScannerStubs moved into RealCompositionHarness env-gated by AGENTSMITH_HARNESS_REAL_SCANNERS=1, source-mode deferred to p0199g (DockerSandbox /work is a managed volume — duplicate-mount-point blocks the working-copy bind). Coverage matrix: 9 of 9 non-excluded docker-tier presets green; skill-manager fast-tier-only per p0204."
    p0209a: "App-rail shell: persistent left rail (248px) replaces the topbar on every route via a [248px 1fr] layout grid; route-based (usePathname) URL-stable nav with no selection state; prop-driven AppRailItem (Runs live from connection state, subsystems idle pending p0209b); Runs + run-detail render inside the shell unchanged"
    p0209b: "System rebuilt as rail-driven master/detail: optional-catch-all route /system/[[...slug]] reads the path segment (URL-stable, refresh/deep-link safe) → SubsystemDetail (crumb + active/idle pill + freshness + tail + reused EventDrawer; idle → explicit empty-state); useSubsystemActivity derives per-subsystem {live,freshness,tail,events} from useSystemEvents and now also feeds the AppRail dots; cost/today slugs render a p0209c placeholder; ExecutionTree-of-subsystems + collapsibles dropped from /system (run-detail tree untouched)"
    p0211: "Backend run-snapshot metadata completeness: diagnosed 'no repos / unknown' as a snapshot-state artefact (single RunStartedEvent producer in ExecutePipelineUseCase always carries repos+agent on every trigger path; the Empty seed's 'unknown'/empty values were what leaked) plus a real title gap (TicketTitle null until/without TicketFetchedEvent). Threaded TicketId onto RunStartedEvent and added explicit RunSnapshot.Title fallback (real ticket title → '{Pipeline} #{TicketId}' → Pipeline, never 'unknown' when data exists)."
    p0216: "Dropped the rigid projectmap-derived Test gate from the coding pipelines — the coding-agent-master now owns build+test verification via its real run_command calls (visible in the event stream), not a separate single-shot re-run. Removed CommandNames.Test from FixBug/AddFeature (FixBug tail is now AgenticMaster→PersistWorkBranch→WriteRunResult→CommitAndPR; EnsurePrerequisites kept) and, since nothing else triggered it, cleanly removed TestHandler + TestContext/builder + TrxResultParser/TrxSummary/FailedTest + ContextKeys.TestResults + DI/display/label entries."
    p0217: "Dashboard dense type scale: replaced 76+ ad-hoc text-[Npx] sizes (9–30px incl. fractional) with six dsh-* rungs (dsh-h1 28, dsh-h2 20, dsh-h3 16, dsh-body 14, dsh-mono 12, dsh-label 11) wired as Tailwind v4 @utility classes in globals.css (size + line-height only; font-weight stays orthogonal as font-* utilities, so the token never fights an explicit weight — 21 sites carried one). DESIGN.md's marketing ladder untouched; IBM Plex Mono still drives mono surfaces. typography-drift.test.ts bans raw text-[…px] and asserts every dsh-* used is defined."
    p0218: "Dashboard event scoping: replaced the per-component global system firehose (useSystemEvents subscribed subscribeSystem + setEvents([]) on every mount → backlog wiped on navigation, needed refresh) with a shared EventStore. lib/eventStore: ScopeBuffer (capped backlog + ref-counted subscription + useSyncExternalStore identities) per scope; EventStore holds one system scope + a per-run scope map over a minimal HubEventSource seam; EventStoreProvider (root layout) keeps one app-lifetime system subscription. useSystemEvents → useSubsystemEvents(id) (scoped slice) + useSystemBacklog (full, for the rail's per-subsystem liveness); useRunEvents reads the store, backlog retained across remount, sub torn down on last release. useJobsHub still owns overview/connection (no backend change). 4 scope/leak/remount tests."
    p0219: "Dashboard component kit + pipeline heading: introduced the DESIGN.md primitive classes (card-content, card-terminal-panel, badge-pill) as Tailwind v4 @utility in globals.css (they were only described, never defined) + a components/ui kit (Button dense brand-green/ghost/subtle, Card content|terminal, Badge tone pill, Chip). One Chip replaces the 3 duplicate filter-chip impls (RunFilterChips/ActivityPills/EventDrawer) preserving all testids; Badge adopted by StatusPill + RunCard status; card-terminal-panel applied to the code/CLI output (ResultCodeBlock). Run-detail h1 = pipeline (extracted testable RunDetailHeader); ticketId + title demoted to secondary metadata. Button/Card ship as canonical primitives, broader ad-hoc migration ongoing. 7 new tests."
    p0220: "Dashboard layout structure: one content-shell @utility (full-bleed + 24px gutter) replaces the per-route padding disagreement (runs p-8 / run-detail px-6 / DetailPane px-7 / SubsystemDetail mx-auto max-w-5xl), applied to all four content areas; the centered max-w-5xl outlier is gone. eyebrow-uppercase + breadcrumb @utility tokens + a SectionLabel component (adopted by AppRail's section headers); SubsystemDetail/DetailPane crumbs use the breadcrumb token. layout-shell.test.ts asserts every content area uses content-shell and no max-w-5xl remains."
    p0221: "Catalog contents browser (FE + backend): new lazy catalog-contents API — GET /api/catalog (masters/skills name+role+description + concepts name+type+description) + GET /api/catalog/skills/{name} (raw SKILL.md). CatalogContentsReader (Server singleton) resolves on demand via ISkillsCatalogResolver + reuses ISkillLoader, caches once (avoids SkillCatalogLoaded event spam + index rebuild), degrades to Ready=false (never 500). FE CatalogBrowser on the System 'catalog' page: masters/skills as expandable cards with lazy SKILL.md rendered via shared Markdown (react-markdown, code→card-terminal-panel), concepts as filterable type+definition rows. Per-run CatalogLoadBody drops the p0210 raw name lists for a link to /system/catalog (bodies never on the per-run event). 3 backend + 2 FE tests; CatalogLoadBody.test updated for the link."
    p0222: "LLM activity transparency (FE + backend): capture the agent's one-sentence intent via a mutable CallScope.Intent — EventPublishingChatClient sets it from the assistant response text, EventPublishingAIFunction reads it onto ToolCallEvent.Intent (localized to the event-decorator layer, one shared AsyncLocal scope per turn). FE: ToolCallRow renders verb (tool) + target (summary) + intent; LlmCallsBody renders an activity label = role→phase→'llm call' (the bare red 'unknown' badge is gone — every turn carries a label whatever the source); StepSandboxes phrases the build/test outcome explicitly (passed / failed (exit N) / running). 2 backend + 3 FE tests. OPEN SLICE: the producer-side fix threading the REAL skill role through every LLM callsite remains the pre-existing p0203a — the UI degrades to a meaningful label until then."
    p0223: "Meaningful commit/PR-step outcomes (FE + backend): the multi-repo commit/PR step showed 4-of-5 repos as red 'git commit · exit 1' for repos with nothing to commit (normal, not failure). New EventType.PullRequestOutcome + PullRequestOutcomeEvent (status opened/no_changes/failed + url + reason) emitted per repo from CommitAndPRHandler (reuses the existing OpenStatus classification — the data existed, was never surfaced; OpenedPullRequest gained a Reason from the failure exception). FE PrOutcomeList renders no-changes neutral, opened as a clickable PR link, failed with reason; wired into composeStepBody above the raw sandbox rows; ActivityRow projects the event. Supersedes the closed spec-only PR #276. 1 backend + 3 FE tests."
    p0224: "Trust the LLM + the context.yaml (backend + skills prompts): three live-run fixes. (1) In-flight LLM rows showed model 'unknown' — EventPublishingChatClient gains a configuredModel arg the factory fills from assignment.Model, so LlmCallStarted carries the real model (response ModelId still wins on finish). (2) The deterministic EnsurePrerequisites step kept failing with a doubled/wrong path (p0202e analyzer-derived install + p0212 module-path workdir guessing) — the handler now runs ONLY the operator-declared context.yaml prerequisite at meta.workdir/root (no command/subtree guessing); when none is set the coding-agent-master installs deps itself via run_command (prompt), extending p0216's build+test ownership. Operator context.yaml prerequisites still run (CI's FixBug_ContextYamlPrerequisites guards it — an initial full-removal attempt was reverted). (3) project-analyzer ignored context.yaml and grepped every file type — agent-smith-skills prompts updated: analyzer reads .agentsmith/context.yaml FIRST and scopes to the declared type; coding-agent installs deps before build/test. Full solution suite green (incl. PipelineHarness). Skills-repo prompt changes ship as a separate PR."
    p0225: "Runs-list correctness (FE + backend): (1) the Runs list was empty until a hard refresh on any client-side nav — AppRail (mounted app-wide via useJobsHub) holds the overview subscription, and the hub pushes its snapshot only on the 0→1 ref-count, so a later-mounting RunsList registered its listener after the one-time snapshot. Fix: overviewSnapshots + systemActivityUpdates become behavior subjects (makeBehaviorSubject caches+replays the last value to late subscribers); event streams stay plain. (2) every run except the live one rendered 'unknown · no repos · 0s' (even successful ones) — RehydrateFromStreamAsync applied only the head (newest) stream entry to an Empty seed, losing title/repos/pipeline/agent set by the early RunStarted/TicketFetched. Fix: fold the FULL stream chronologically via an extracted pure RebuildSnapshot. 1 FE + 1 backend test."
    p0226: "PersistWorkBranch robustness: in a multi-repo run the master edits only some repos, but persist ran git config + git add on ALL of them first → the untouched repos failed on the first `git config` (host-side exit -1 'couldn't run' sentinel) → 'Persist failed in 4/5 repo(s) (Unknown)' even though the edited repo persisted. Fix: SandboxGitOperations.HasWorkingChangesAsync probes with a side-effect-free `git status --porcelain` BEFORE config/stage (true only on clean exit + non-empty output); repos with no changes or an unreachable sandbox route to NoChanges and skip. Persist goes green when the repos that carry work are saved. 1 new test + existing persist tests updated to model the porcelain probe. (Companion idea for a later phase: write .agentsmith/memory.md into the WIP commit so the work branch carries the project memory — git as the persistence + memory layer.)"
    p0227: "Run-detail live-watching + false-alarm cleanup (dashboard FE): (1) pairing — p0224 made LlmCallStarted carry the configured model ('gpt-4.1') while Finished reports the fuller provider id ('gpt-4.1-2025-04-14'), so exact-match pairing split every call into a lone 'in flight' + orphan finish; modelsMatch() now pairs on a model-prefix (or 'unknown' sentinel). (2) sticky header — RunDetailHeader + failure banner wrapped in a sticky full-bleed bar so the title doesn't scroll away. (3) follow the active step — useRailSelection defaultSelection prefers the running step (then failed, then last) and `selected` is recomputed every render while unpinned, so it tracks the pipeline live with the body auto-expanded; an explicit click writes hash `n` and pins. (4) exit -1 renders neutral 'not run' not red 'failed' — it's the JobLoop 'couldn't run' sentinel (untouched repo / unreachable sandbox / canceled run), so a canceled run's git-status probes stop shouting red. (5) unfinished LLM rows flip to 'ended' on a terminal run via a runEnded flag threaded into LlmCallsBody. 5 new FE tests; lint+build+test green."
    p0228: "Run-detail transparency: per-step chronological command timeline (verb·target·outcome + write-count, so a read-only run is obvious); 14px fonts; light output panel; clickable PR links; commit skips truly-empty repos."
    p0229: "Command-timeline polish: rendered under the repo boxes (live runs stop shifting) + per-repo common-prefix stripped & colour-coded so the acting repo is clear."
    p0230: "Per-project sandbox timeouts in agentsmith.yml: step_timeout_seconds cap + new run_command_timeout_seconds (default 300, replaces hard-coded 60); global with per-project override."
    p0231: "Unified execution timeline (LLM turns merged with the commands they issued, time-ordered) + k8s dashboard Deployment/Service + path-based ingress."
    p0232: "Cancellations now report WHY (registry reason for operator/watchdog; an inner timeout names the active step + the timeout levers) instead of 'A task was canceled'; timeline newest-first; '● working' pulse; k8s dashboard no longer forces nonroot."
    p0233: "Runs list updates live on a new job: fold JobUpserted into the overview inside the singleton hub client + re-emit the behavior subject, so a remounting list shows the current list (was stale until reload)."
    p0234: "Per-repo run-record: each repo writes its own .agentsmith/runs/{runId}/ scoped to itself, force-staged so it always commits; PR per changed repo, one record-PR if nothing changed; clear factual outcome message."
    p0235: "LLM NetworkTimeout fix (SDK default 100s → config 300s) — the real cause of a 139s 'A task was cancelled'; dashboard image folded into the docker-publish matrix; result view renders styled markdown + frontmatter header; plan.md cached + shown next to result.md."
    p0236: "Pinned the cancel mechanism: SDK NetworkTimeout TaskCanceledException caught inside the skill call (one layer below p0232) → surfaced raw. BuildResult now maps it to a network_timeout_seconds message; MaxInputTokensPerSkillCall 200k→500k headroom (still observational — RecordLlmCall unwired)."
    p0237: "Robust finalization: a failed/cancelled/timed-out run now ALWAYS runs the finalizer tail (WriteRunResult+CommitAndPR) → records result.md with an ## Outcome reason + a record/partial PR, instead of vanishing. OCE split (operator-cancel propagates vs internal-timeout → failed step + network_timeout_seconds reason). Agent plan.md relocated into the run dir. coding-agent-master v1.5.0: test-sync + done-checklist for gpt-4.1. Folds in p0236."
    p0246e: "Durable run ARTIFACTS (data half of thin-notify): DbRunArtifactStore DECORATOR mirrors the durable markdown (result.md/plan.md/analyze.md) into the DB — writes to inner+DB, reads DB-first — so they survive a process restart AND a Redis flush; the transient in-flight slots stay with the inner store (the container path is transport-only). Dropped the enforced child→Run FK (children keyed by indexed RunId, no relationship): a child can be written before/without its Run row (result.md mirror, trail flush, projection lag) and an enforced FK would LOSE that data — Run.* are unmapped in-memory holders DbRunStore fills by RunId query; migration DropRunChildFksKeyByRunId. One generic Decorate<T> helper (transitioner factory + artifact store). SQLite-proven: result.md survives a Redis flush (DB serves it); transient slots not mirrored. 3 tests; 2461 unit + 51 harness green. The SignalR thin-notify TRANSPORT + UI reshape + fixture regen carved to p0246f (the data layer it needs is now complete)."
    p0246d: "TicketLifecycle DB-AUTHORITATIVE: DbAuthoritativeTicketStatusTransitioner writes the DB status first then the platform label as a BEST-EFFORT projection (a failed/throwing label write is logged, never fatal); ReadCurrent returns the DB value, label-fallback only when no DB row. DB wins on drift. DbTicketLifecycleStore = the system-of-record (upsert keyed by project/platform/ticket). Wired by GENERICALLY decorating the existing (Jira-locking) transitioner factory, guarded for minimal graphs. SQLite-proven: drift→DB wins; label-failure tolerated (transition still Succeeds, DB updated); no-row→label fallback. 3 tests; 2458 unit green. Project key empty for now (call site doesn't thread it); StaleJobDetector label-revert now cosmetic."
    p0246c: "Server event PROJECTOR (single writer): CompositeRunEventFanout wraps JobsHubFanout + an optional RunDbProjector at the IRunEventFanout seam (JobsBroadcaster drains the stream server-side; the job stays transport-only). RunEventApplier maps every structured event → ER entity (Run/RunStep/RunLlmCall/RunRepo/RunSandbox/RunDecision); the raw trail is BATCHED (RunTrailBuffer, flush per 25 / on RunFinished); stdout (ToSandboxAsync) deliberately not persisted. DbRunStore reads run list/detail back; RunRetentionService prunes aged trail + non-final artifacts (keeps Run + summary, default 90d). SQLite-portable (order by sortable run-id, client-side age filter). Opt-in registration extended + retention hosted service. SQLite-proven: persist→read survives a restart; batched trail; active→recent; retention keeps summary. 4 tests; 2455 unit + 51 harness green. Full IRunArtifactStore DB impl + dashboard read wiring → p0246e."
    p0246b: "Claim-lease CUTOVER (additive, safe): the DB ActiveRun lease is now the AUTHORITATIVE single-run guard in the claim path (UNIQUE(Project,TicketId) INSERT → AlreadyClaimed; survives a label revert AND a Redis flush by construction), alongside the kept Redis heartbeat. ActiveRun.RunId→nullable + JobId added (claim precedes the Run; JobId = orchestrator handle). Positive-evidence ActiveRunReaper (IRunLivenessProbe → IJobSpawner.IsAliveAsync; no handle → present, never blind-release) re-scopes p0242. Opt-in via env AGENTSMITH_PERSISTENCE_PROVIDER (RemoveAll-swaps NoOp→DbActiveRunLease + reaper + auto-migrate); default Server + CLI stay DB-free. SQLite-proven: concurrent claim→one row; crash+gone→release→reclaimable; stale+alive→no release. 7 new tests; 2451 unit + 51 harness green. JobId-attach-at-spawn + StaleJobDetector removal land with p0246c/d."
    p0246g: "Persistence SHAPE aligned to the reference pattern + migration deployment: DbContext is SCOPED + IS the unit of work (AddDbContext + IUnitOfWork→DbContext), all data access via per-entity *Repository (ActiveRun/Run/RunArtifact/TicketLifecycle) injecting IUnitOfWork — NO IDbContextFactory anywhere. Background singletons (projector/reaper/retention/claim/transitioner/artifact-decorator) open a scope per operation (IServiceScopeFactory) — scoped is the web-request idiom, look at the environment. ONE way: server ALWAYS wires DB+Redis from config.persistence (sqlite default), CLI never (verified DB-free scans); env-gate removed. `agentsmith database migrate` (programmatic, no dotnet-ef) runs from an INIT-CONTAINER (deploy/k8s) / one-shot compose service before the server — NEVER on startup (not a sidecar). persistence: block in agentsmith.example.yml; sqlite-on-volume reference (prod: PVC or external DB own-pipeline). 2461 unit + 51 harness green."
    p0246: "UMBRELLA (sliced a-f; a-e built, f planned): Relational system-of-record (EF Core, server-mode). Single-run = ActiveRun unique constraint; Redis demoted to thin notify; UI reads from DB. Retained as the ER-model + decision design record. NB: persistence is OPT-IN via AGENTSMITH_PERSISTENCE_PROVIDER and currently OFF in all configs/compose/k8s — the DB layer is built+tested but DORMANT until an operator enables it; p0246f makes the dashboard actually read from the DB."
    p0246a: "Persistence FOUNDATION (self-contained, NOT wired into CLI/Server yet → can't break the running system): new AgentSmith.Infrastructure.Persistence (EF Core 8.0.13), 10 ER entities + EntityBase audit, AgentSmithDbContext:IUnitOfWork, provider selection (sqlite|postgresql|mysql) via PersistenceOptions + UseProvider, IUniqueViolationTranslator (SQLite 19/2067, PG 23505, MySQL 1062), InitialCreate migration + design-time factory. SQLite-PROVEN (real engine, NOT EF-InMemory): two claims for the same (project,ticket) → exactly ONE ActiveRun row, the loser maps to AlreadyClaimed; migration applies; Run round-trips with children. 4 persistence tests; full suite 2444 green. b-e wire it into the hosts."
    p0239b: "Harness breadth: cross-provider TICKET lifecycle MATRIX as one parametrized theory over GitHub/GitLab/AzDO/Jira (CrossProviderLifecycleMatrixTests — Pending→Enqueued→InProgress→Done + precondition + read-null uniform across all four, per-platform HTTP fixtures; 12 tests). Dashboard ui-e2e: recorded JobUpserted-stream slice (RecordedRunStream.test.ts — live-update + failed-run views, typed against the generated RunSnapshot contract) on top of existing component/hook tests + gen:hub-events drift check. Gate-tiering documented as the three-tier model in CI (fast every PR / Docker opt-in with loud skip / single metered LiveLLM run). Chat-adapter wire tests CARVED to p0239c (needs builder transport-injection refactor). FULL live-SignalR UI fixtures co-delivered with p0246 thin-notify (it regenerates them)."
