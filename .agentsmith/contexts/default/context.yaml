    p0211: "Backend run-snapshot metadata completeness: diagnosed 'no repos / unknown' as a snapshot-state artefact (single RunStartedEvent producer in ExecutePipelineUseCase always carries repos+agent on every trigger path; the Empty seed's 'unknown'/empty values were what leaked) plus a real title gap (TicketTitle null until/without TicketFetchedEvent). Threaded TicketId onto RunStartedEvent and added explicit RunSnapshot.Title fallback (real ticket title → '{Pipeline} #{TicketId}' → Pipeline, never 'unknown' when data exists). → .agentsmith/phases/done/p0211-run-snapshot-metadata-completeness.yaml"
    p0216: "Dropped the rigid projectmap-derived Test gate from the coding pipelines — the coding-agent-master now owns build+test verification via its real run_command calls (visible in the event stream), not a separate single-shot re-run. Removed CommandNames.Test from FixBug/AddFeature (FixBug tail is now AgenticMaster→PersistWorkBranch→WriteRunResult→CommitAndPR; EnsurePrerequisites kept) and, since nothing else triggered it, cleanly removed TestHandler + TestContext/builder + TrxResultParser/TrxSummary/FailedTest + ContextKeys.TestResults + DI/display/label entries. → .agentsmith/phases/done/p0216-drop-rigid-test-gate.yaml"
    p0217: "Dashboard dense type scale: replaced 76+ ad-hoc text-[Npx] sizes (9–30px incl. fractional) with six dsh-* rungs (dsh-h1 28, dsh-h2 20, dsh-h3 16, dsh-body 14, dsh-mono 12, dsh-label 11) wired as Tailwind v4 @utility classes in globals.css (size + line-height only; font-weight stays orthogonal as font-* utilities, so the token never fights an explicit weight — 21 sites carried one). DESIGN.md's marketing ladder untouched; IBM Plex Mono still drives mono surfaces. typography-drift.test.ts bans raw text-[…px] and asserts every dsh-* used is defined. → .agentsmith/phases/done/p0217-dashboard-typography-tokens.yaml"
    p0218: "Dashboard event scoping: replaced the per-component global system firehose (useSystemEvents subscribed subscribeSystem + setEvents([]) on every mount → backlog wiped on navigation, needed refresh) with a shared EventStore. lib/eventStore: ScopeBuffer (capped backlog + ref-counted subscription + useSyncExternalStore identities) per scope; EventStore holds one system scope + a per-run scope map over a minimal HubEventSource seam; EventStoreProvider (root layout) keeps one app-lifetime system subscription. useSystemEvents → useSubsystemEvents(id) (scoped slice) + useSystemBacklog (full, for the rail's per-subsystem liveness); useRunEvents reads the store, backlog retained across remount, sub torn down on last release. useJobsHub still owns overview/connection (no backend change). 4 scope/leak/remount tests. → .agentsmith/phases/done/p0218-dashboard-event-scoping.yaml"
    p0219: "Dashboard component kit + pipeline heading: introduced the DESIGN.md primitive classes (card-content, card-terminal-panel, badge-pill) as Tailwind v4 @utility in globals.css (they were only described, never defined) + a components/ui kit (Button dense brand-green/ghost/subtle, Card content|terminal, Badge tone pill, Chip). One Chip replaces the 3 duplicate filter-chip impls (RunFilterChips/ActivityPills/EventDrawer) preserving all testids; Badge adopted by StatusPill + RunCard status; card-terminal-panel applied to the code/CLI output (ResultCodeBlock). Run-detail h1 = pipeline (extracted testable RunDetailHeader); ticketId + title demoted to secondary metadata. Button/Card ship as canonical primitives, broader ad-hoc migration ongoing. 7 new tests. → .agentsmith/phases/done/p0219-dashboard-component-kit-and-heading.yaml"
    p0220: "Dashboard layout structure: one content-shell @utility (full-bleed + 24px gutter) replaces the per-route padding disagreement (runs p-8 / run-detail px-6 / DetailPane px-7 / SubsystemDetail mx-auto max-w-5xl), applied to all four content areas; the centered max-w-5xl outlier is gone. eyebrow-uppercase + breadcrumb @utility tokens + a SectionLabel component (adopted by AppRail's section headers); SubsystemDetail/DetailPane crumbs use the breadcrumb token. layout-shell.test.ts asserts every content area uses content-shell and no max-w-5xl remains. → .agentsmith/phases/done/p0220-dashboard-layout-structure.yaml"
    p0221: "Catalog contents browser (FE + backend): new lazy catalog-contents API — GET /api/catalog (masters/skills name+role+description + concepts name+type+description) + GET /api/catalog/skills/{name} (raw SKILL.md). CatalogContentsReader (Server singleton) resolves on demand via ISkillsCatalogResolver + reuses ISkillLoader, caches once (avoids SkillCatalogLoaded event spam + index rebuild), degrades to Ready=false (never 500). FE CatalogBrowser on the System 'catalog' page: masters/skills as expandable cards with lazy SKILL.md rendered via shared Markdown (react-markdown, code→card-terminal-panel), concepts as filterable type+definition rows. Per-run CatalogLoadBody drops the p0210 raw name lists for a link to /system/catalog (bodies never on the per-run event). 3 backend + 2 FE tests; CatalogLoadBody.test updated for the link. → .agentsmith/phases/done/p0221-catalog-contents-browser.yaml"
    p0222: "LLM activity transparency (FE + backend): capture the agent's one-sentence intent via a mutable CallScope.Intent — EventPublishingChatClient sets it from the assistant response text, EventPublishingAIFunction reads it onto ToolCallEvent.Intent (localized to the event-decorator layer, one shared AsyncLocal scope per turn). FE: ToolCallRow renders verb (tool) + target (summary) + intent; LlmCallsBody renders an activity label = role→phase→'llm call' (the bare red 'unknown' badge is gone — every turn carries a label whatever the source); StepSandboxes phrases the build/test outcome explicitly (passed / failed (exit N) / running). 2 backend + 3 FE tests. OPEN SLICE: the producer-side fix threading the REAL skill role through every LLM callsite remains the pre-existing p0203a — the UI degrades to a meaningful label until then. → .agentsmith/phases/done/p0222-llm-activity-transparency.yaml"
    p0223: "Meaningful commit/PR-step outcomes (FE + backend): the multi-repo commit/PR step showed 4-of-5 repos as red 'git commit · exit 1' for repos with nothing to commit (normal, not failure). New EventType.PullRequestOutcome + PullRequestOutcomeEvent (status opened/no_changes/failed + url + reason) emitted per repo from CommitAndPRHandler (reuses the existing OpenStatus classification — the data existed, was never surfaced; OpenedPullRequest gained a Reason from the failure exception). FE PrOutcomeList renders no-changes neutral, opened as a clickable PR link, failed with reason; wired into composeStepBody above the raw sandbox rows; ActivityRow projects the event. Supersedes the closed spec-only PR #276. 1 backend + 3 FE tests. → .agentsmith/phases/done/p0223-meaningful-step-outcomes.yaml"
    p0224: "Trust the LLM + the context.yaml (backend + skills prompts): three live-run fixes. (1) In-flight LLM rows showed model 'unknown' — EventPublishingChatClient gains a configuredModel arg the factory fills from assignment.Model, so LlmCallStarted carries the real model (response ModelId still wins on finish). (2) The deterministic EnsurePrerequisites step kept failing with a doubled/wrong path (p0202e analyzer-derived install + p0212 module-path workdir guessing) — the handler now runs ONLY the operator-declared context.yaml prerequisite at meta.workdir/root (no command/subtree guessing); when none is set the coding-agent-master installs deps itself via run_command (prompt), extending p0216's build+test ownership. Operator context.yaml prerequisites still run (CI's FixBug_ContextYamlPrerequisites guards it — an initial full-removal attempt was reverted). (3) project-analyzer ignored context.yaml and grepped every file type — agent-smith-skills prompts updated: analyzer reads .agentsmith/context.yaml FIRST and scopes to the declared type; coding-agent installs deps before build/test. Full solution suite green (incl. PipelineHarness). Skills-repo prompt changes ship as a separate PR. → .agentsmith/phases/done/p0224-trust-llm-and-context.yaml"
    p0225: "Runs-list correctness (FE + backend): (1) the Runs list was empty until a hard refresh on any client-side nav — AppRail (mounted app-wide via useJobsHub) holds the overview subscription, and the hub pushes its snapshot only on the 0→1 ref-count, so a later-mounting RunsList registered its listener after the one-time snapshot. Fix: overviewSnapshots + systemActivityUpdates become behavior subjects (makeBehaviorSubject caches+replays the last value to late subscribers); event streams stay plain. (2) every run except the live one rendered 'unknown · no repos · 0s' (even successful ones) — RehydrateFromStreamAsync applied only the head (newest) stream entry to an Empty seed, losing title/repos/pipeline/agent set by the early RunStarted/TicketFetched. Fix: fold the FULL stream chronologically via an extracted pure RebuildSnapshot. 1 FE + 1 backend test. → .agentsmith/phases/done/p0225-runs-list-correctness.yaml"
    p0226: "PersistWorkBranch robustness: in a multi-repo run the master edits only some repos, but persist ran git config + git add on ALL of them first → the untouched repos failed on the first `git config` (host-side exit -1 'couldn't run' sentinel) → 'Persist failed in 4/5 repo(s) (Unknown)' even though the edited repo persisted. Fix: SandboxGitOperations.HasWorkingChangesAsync probes with a side-effect-free `git status --porcelain` BEFORE config/stage (true only on clean exit + non-empty output); repos with no changes or an unreachable sandbox route to NoChanges and skip. Persist goes green when the repos that carry work are saved. 1 new test + existing persist tests updated to model the porcelain probe. (Companion idea for a later phase: write .agentsmith/memory.md into the WIP commit so the work branch carries the project memory — git as the persistence + memory layer.) → .agentsmith/phases/done/p0226-persist-only-changed-repos.yaml"
    p0227: "Run-detail live-watching + false-alarm cleanup (dashboard FE): (1) pairing — p0224 made LlmCallStarted carry the configured model ('gpt-4.1') while Finished reports the fuller provider id ('gpt-4.1-2025-04-14'), so exact-match pairing split every call into a lone 'in flight' + orphan finish; modelsMatch() now pairs on a model-prefix (or 'unknown' sentinel). (2) sticky header — RunDetailHeader + failure banner wrapped in a sticky full-bleed bar so the title doesn't scroll away. (3) follow the active step — useRailSelection defaultSelection prefers the running step (then failed, then last) and `selected` is recomputed every render while unpinned, so it tracks the pipeline live with the body auto-expanded; an explicit click writes hash `n` and pins. (4) exit -1 renders neutral 'not run' not red 'failed' — it's the JobLoop 'couldn't run' sentinel (untouched repo / unreachable sandbox / canceled run), so a canceled run's git-status probes stop shouting red. (5) unfinished LLM rows flip to 'ended' on a terminal run via a runEnded flag threaded into LlmCallsBody. 5 new FE tests; lint+build+test green. → .agentsmith/phases/done/p0227-run-detail-live-watching.yaml"
    p0228: "Run-detail transparency + readability (dashboard FE + commit handler). Triggered by a live run that produced 0 code changes: a Redis dig (run 06-05-30-065e) showed the coding-master ran 274 ReadFile / 26 Grep / 78 ListFiles / 136 find and ZERO source WriteFiles — it never edited (root cause is a coding-agent-master enablement problem, tracked separately; this phase makes it VISIBLE). (1) Chronological command timeline: SandboxCommand/Result were folded only into a last-command-per-repo map, collapsing the whole exploration to 5 rows; added StepBucket.commands (full ordered sequence) + a CommandTimeline body (verb · target · outcome, write-count surfaced so 0-writes is obvious, capped with show-all), shown when a step ran >1 command/repo. (2) Fonts bumped dsh-label(11)/text-xs(12) → dsh-body(14) to match the Runs nav. (3) Sandbox output panel → light surface (canvas-soft/stone-700/14px; stderr rose-600) — operator found the near-black terminal gloomy. (4) Step-message URLs linkified into labelled link buttons ('<repo> #<id>' for Azure/GitHub PR URLs) so 'Pull request created: <url>' is clickable. (5) Commit handler probes the staged diff before committing (mirrors p0226's persist guard); empty → SkippedNoChanges, so a repo with nothing to commit no longer runs a doomed git commit that paints a red exit-1 row. 7 new FE tests + 1 backend test (+ harness updated to model the staged-diff probe); FE 282 + backend 2392 green. → .agentsmith/phases/done/p0228-run-detail-transparency.yaml"
    p0229: "Command-timeline polish (dashboard FE, on top of p0228). (1) The live timeline grew at the TOP of the step body, shoving the stable sections (repo boxes, LLM rollup) down on every streamed command — moved it LAST so a running step extends downward instead of shifting everything above. (2) On a multi-repo run every row showed the same truncated common prefix ('acme-platform-…'), hiding the distinguishing suffix — now buildRepoDisplay strips the longest common prefix (trimmed to a -/ boundary) so server/client/docs show, each repo coloured from a fixed palette, full name on hover; single-repo steps show the full name. Sets up optional per-repo grouping (data already carries repo per command). 2 new FE tests; 284 FE green. → .agentsmith/phases/done/p0229-timeline-under-repos.yaml"
    p0230: "Configurable per-project sandbox timeouts (backend). A live run had the master run dotnet restore/build, each killed at the hard-coded 60s run_command default → 'A task was canceled', run failed; builds differ per project so the timeout must be tunable. Two knobs in agentsmith.yml, global + per-project (projects.<n>.sandbox), resolution project-override ?? global ?? default: (1) sandbox.step_timeout_seconds (existing hard per-step cap, default 900) is now per-project — SandboxSpecBuilder resolves it (injected IOptions, optional for test sites) and carries it on new SandboxSpec.StepTimeoutSeconds; Docker/K8s factories use spec ?? global. (2) NEW sandbox.run_command_timeout_seconds (default for run_command when the agent passes none, default 300 — replaces the hard-coded 60 that killed real builds) — resolved in ExecutePipelineUseCase, stashed in ContextKeys.RunCommandTimeoutSeconds, threaded by the agentic master/execute handlers into FilesystemToolHost → SandboxStepRunner; explicit agent timeout clamps to [1, max(600, default)], backend caps at the step cap regardless. Resolve* helpers on SandboxGlobalConfig. Documented sandbox block added to the reference config. 6 new tests; backend 2398 green. Companion (open): make a command timeout non-fatal to the run (agent self-corrects) — needs the cancel-propagation pinned down. → .agentsmith/phases/done/p0230-configurable-sandbox-timeouts.yaml"
    p0231: "Unified execution timeline + k8s dashboard manifests. (1) The step body showed LLM turns ('agentic-executor gpt-4.1 … $cost') and sandbox commands (server · Grep/ReadFile …) as two disconnected lists the operator couldn't correlate. Merged into ONE chronological timeline (CommandTimeline now takes llmCalls): each LLM turn is keyed by its start time so the commands it issued sort directly beneath it — reads 'call → what it did → next call'. No producer correlation key exists, so this uses timestamps only (no invented linkage). LLM rows tinted+indigo as decision points; summary adds llm count + cost. Replaces the separate LlmCallsBody section (component kept + still unit-tested). 2 new FE tests; 286 FE green. (2) Dashboard had no k8s manifests — added 10-deployment-dashboard.yaml + 11-service-dashboard.yaml (mirror the server's) and made 9-ingress.yaml path-based: backend paths (/hub,/api,/health,/slack,/webhook) → server (/hub direct avoids a websocket hop through the Next proxy), everything else → dashboard. → .agentsmith/phases/done/p0231-unified-timeline-and-k8s-dashboard.yaml"
    p0232: "Surface cancellation reasons + live-watching polish (backend + dashboard FE). Operator kept hitting 'A task was canceled' with no visible cause. (1) Two cancel paths now report WHY: the runCt path (operator/watchdog) reads the registry's recorded reason (TryGetReason) → 'Run exceeded its N-minute wall-time budget (orchestrator.max_run_wall_time_seconds)' for watchdog-wall-time, 'Cancelled by operator' otherwise; a NEW catch for an INNER OperationCanceledException (a timeout inside a step — long dotnet/npm restore/build or an LLM call; the master loop has no wall-clock limit) names the ACTIVE step (ContextKeys.ActivePhaseStep) + points at the timeout levers. Replaces the useless bare 'A task was canceled.' Finding: the per-job/pipeline wall-time budget the operator wanted ALREADY exists (PipelineRunWatchdog → orchestrator.max_run_wall_time_seconds, default 1800s/30min); p0230's per-command timeout is the complementary hung-command safety net, not the primary budget — this phase just makes the verdict legible. (2) Timeline ordered newest-first (mergeTimeline desc) so latest actions are visible without scrolling. (3) Active-work indicator: in-flight LLM badge reads '● working' with animate-pulse (vs neutral 'ended' on a terminal run); running command outcome pulses amber. (4) k8s dashboard Deployment no longer forces runAsNonRoot — the node:20-alpine standalone image has no non-root USER, so pinning uid 1000 breaks Next.js; documented the hardening path. FE 286 + backend 2398 green. Open: Runs list doesn't auto-add a newly-arrived job (overview subscription, related p0225); making an inner step timeout non-fatal (agent self-corrects) instead of failing the run. → .agentsmith/phases/done/p0232-surface-cancel-reason-and-live-polish.yaml"
