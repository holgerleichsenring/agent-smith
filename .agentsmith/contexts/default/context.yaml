# yaml-language-server: $schema=../../context.schema.json
meta:
  project: agent-smith
  version: 1.0.0
  type: [agent, pipeline]
  purpose: "Self-hosted AI orchestration framework: code, legal, security, workflows."
  workdir: "."

methodology:
  version: "2.0.1"

stack:
  runtime: .NET 8
  lang: C#
  infra: [Docker, K8s, Redis]
  testing: [xUnit, Moq, FluentAssertions]
  sdks: [Anthropic, OpenAI, Azure.AI.OpenAI, Google-Gemini, Octokit, LibGit2Sharp, YamlDotNet]

arch:
  style: [CleanArch]
  patterns: [Command/Handler, Pipeline, Factory, Strategy, Adapter]
  layers:
    - Domain        # entities, value objects — no deps
    - Contracts   # interfaces, DTOs, config models
    - Application   # handlers, pipeline executor, use cases
    - Infrastructure # AI providers, git, tickets, Redis bus
    - Cli           # CLI entry point, DI wiring
    - Server        # Slack gateway, job spawning, intent routing

behavior:
  pipelines:
    fix-bug:
      trigger: [cli, slack, webhook]
      steps: [FetchTicket, CheckoutSource, BootstrapProject, LoadCodeMap,
              LoadCodingPrinciples, LoadContext, AnalyzeCode, Triage, GeneratePlan,
              Approve, AgenticExecute, Test, WriteRunResult, CommitAndPR]
      error: stop-on-first-failure
    security-scan:
      trigger: [cli, slack, webhook]
      steps: [CheckoutSource, BootstrapProject, LoadCodingPrinciples, AnalyzeCode,
              Triage, ConvergenceCheck, CompileDiscussion, DeliverOutput]
    mad-discussion:
      trigger: [cli, slack]
      steps: [FetchTicket, CheckoutSource, BootstrapProject, LoadContext,
              Triage, ConvergenceCheck, CompileDiscussion, WriteRunResult, CommitAndPR]
    legal-analysis:
      trigger: [cli, slack, inbox-polling]
      steps: [AcquireSource, BootstrapDocument, LoadCodingPrinciples,
              Triage, ConvergenceCheck, CompileDiscussion, DeliverOutput]

quality:
  lang: english-only
  limits: { method-lines: 20, class-lines: 120, types-per-file: 1 }
  principles: [SOLID, DRY, GuardClauses, FailFast]
  csharp: [file-scoped-ns, sealed-default, primary-constructors, records-for-DTOs]
  naming:
    classes: PascalCase
    booleans: Is/Has/Can-prefix
    async: Async-suffix
    fields: _camelCase
    interfaces: I-prefix
  testing: { style: AAA, naming: "{Method}_{Scenario}_{Expected}" }

integrations:
  AI:     { type: outbound, providers: [Claude, OpenAI, Azure-OpenAI, Gemini, Ollama] }
  Git:    { type: bidirectional, protocol: SSH/HTTPS, does: "LibGit2Sharp clone/branch/commit/push" }
  GitHub: { type: bidirectional, does: "Issues + PRs via Octokit" }
  GitLab: { type: bidirectional, does: "Issues + MRs via REST" }
  Azure:  { type: bidirectional, does: "Work items + Repos via DevOps SDK" }
  Jira:   { type: bidirectional, does: "Tickets via REST v3, webhook trigger (assignee+label+status gate, comment re-trigger, done_status transition)" }
  Slack:  { type: bidirectional, does: "Chat commands + progress via Events API" }
  Redis:  { type: bidirectional, does: "Job queue + progress pub/sub" }

