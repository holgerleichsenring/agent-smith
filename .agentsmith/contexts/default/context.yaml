# yaml-language-server: $schema=../../context.schema.json
meta:
  project: agent-smith
  version: 1.0.0
  type: [agent, pipeline]
  purpose: "Self-hosted AI orchestration framework: code, legal, security, workflows."
  workdir: "."

methodology:
  version: "2.0.1"

stack:
  runtime: .NET 8
  lang: C#
  infra: [Docker, K8s, Redis]
  testing: [xUnit, Moq, FluentAssertions]
  sdks: [Anthropic, OpenAI, Azure.AI.OpenAI, Google-Gemini, Octokit, LibGit2Sharp, YamlDotNet]

arch:
  style: [CleanArch]
  patterns: [Command/Handler, Pipeline, Factory, Strategy, Adapter]
  layers:
    - Domain        # entities, value objects — no deps
    - Contracts   # interfaces, DTOs, config models
    - Application   # handlers, pipeline executor, use cases
    - Infrastructure # AI providers, git, tickets, Redis bus
    - Cli           # CLI entry point, DI wiring
    - Server        # Slack gateway, job spawning, intent routing

behavior:
  pipelines:
    fix-bug:
      trigger: [cli, slack, webhook]
      steps: [FetchTicket, CheckoutSource, BootstrapProject, LoadCodeMap,
              LoadCodingPrinciples, LoadContext, AnalyzeCode, Triage, GeneratePlan,
              Approve, AgenticExecute, Test, WriteRunResult, CommitAndPR]
      error: stop-on-first-failure
    security-scan:
      trigger: [cli, slack, webhook]
      steps: [CheckoutSource, BootstrapProject, LoadCodingPrinciples, AnalyzeCode,
              Triage, ConvergenceCheck, CompileDiscussion, DeliverOutput]
    mad-discussion:
      trigger: [cli, slack]
      steps: [FetchTicket, CheckoutSource, BootstrapProject, LoadContext,
              Triage, ConvergenceCheck, CompileDiscussion, WriteRunResult, CommitAndPR]
    legal-analysis:
      trigger: [cli, slack, inbox-polling]
      steps: [AcquireSource, BootstrapDocument, LoadCodingPrinciples,
              Triage, ConvergenceCheck, CompileDiscussion, DeliverOutput]

quality:
  lang: english-only
  limits: { method-lines: 20, class-lines: 120, types-per-file: 1 }
  principles: [SOLID, DRY, GuardClauses, FailFast]
  csharp: [file-scoped-ns, sealed-default, primary-constructors, records-for-DTOs]
  naming:
    classes: PascalCase
    booleans: Is/Has/Can-prefix
    async: Async-suffix
    fields: _camelCase
    interfaces: I-prefix
  testing: { style: AAA, naming: "{Method}_{Scenario}_{Expected}" }

integrations:
  AI:     { type: outbound, providers: [Claude, OpenAI, Azure-OpenAI, Gemini, Ollama] }
  Git:    { type: bidirectional, protocol: SSH/HTTPS, does: "LibGit2Sharp clone/branch/commit/push" }
  GitHub: { type: bidirectional, does: "Issues + PRs via Octokit" }
  GitLab: { type: bidirectional, does: "Issues + MRs via REST" }
  Azure:  { type: bidirectional, does: "Work items + Repos via DevOps SDK" }
  Jira:   { type: bidirectional, does: "Tickets via REST v3, webhook trigger (assignee+label+status gate, comment re-trigger, done_status transition)" }
  Slack:  { type: bidirectional, does: "Chat commands + progress via Events API" }
  Redis:  { type: bidirectional, does: "Job queue + progress pub/sub" }

state:
  done:
    p0341c: "LOAD-BEARING LEDGER — OPEN, BUDGET-BOUNDED, VERIFIED MASTER LOOP (backend + coding-agent-master skill). Replaces the 25-iteration guillotine + fixed re-drive count with MONEY + VERIFICATION. The master loop's iteration cap is demoted to a large anti-runaway SAFETY ceiling (AgentConfig.MaxMasterLoopIterations=200, threaded via AgenticLoopRequest.MaxIterations → ChatClientFactory.Create); sub-agents get a real child budget (MaxSubAgentLoopIterations=100) instead of inheriting 25. The EXISTING per-pipeline cost budget (PipelineCostCapConfig, p0151d) becomes the binding fence at TWO granularities: BETWEEN passes (handler consults IsBudgetExhausted before re-engaging) and WITHIN a pass (MasterLoopGovernorChatClient DelegatingChatClient below UseFunctionInvocation throws MasterBudgetExhaustedException on the live estimate) — budget exhausted => partial CodeChanges + ledger published, honest cost-cap FAILED. A coarse complexity TIER (trivial|small|medium|large) rides the SAME RepoScopeClassifier call (one JSON field) and sizes the run's effective cap via ScopeRepos (PipelineCostTracker.ApplyCostCap + PipelineCostCap key); Unknown => static default (fail-safe). Open loop RE-ENGAGES (ShouldReengage: expects-code + actionable ledger steps + not honest-RED + budget OK) WHILE each pass makes MEANINGFUL forward progress (MadeForwardProgress: a newly-done step or a now-passing verdict — never a bare edit; an exception pass = recovery, not zero-progress), NO fixed re-drive count. Each re-engagement resumes WARM: nudge carries the current ledger (checklist) + a working-state block (decisions + last build/test tail = continuity). The governor also injects the ledger + a done-discipline line every N iterations / on drift (edit-less streak) — the system-reminder analogue. A parked operator question (p0315d) short-circuits before any re-engage. RunOutcomeKeystone gains ledger + changedPaths as OPTIONAL deterministic inputs: a self-reported Met over a still-pending step, a done step whose present target is absent from the diff, or a target-less done step with no diff => downgraded STRICTLY on Met (a justified-N/A is never downgraded; empty ledger = byte-for-byte p0340). WriteContextYamlToolHost constrains context_name to the discovered contexts (reject when many, redirect when one, no-op on bootstrap). SKILL (coding-agent-master 1.12.0→1.13.0, separate skills PR): Phase 1 shrunk to validate-and-execute the approved plan (full self-planning only for fix-no-test) with explicit re-decomposition licence + ask-first discipline. 3174 unit green (+~40 new: keystone ledger cross-check, ShouldReengage/MadeForwardProgress, governor budget+reminder+drift, tier parse+cap, ActionablePending, context-name guard). Embedded-pin bump DEFERRED to the skills release. -> .agentsmith/phases/done/p0341c-load-bearing-ledger.yaml"
    p0341: "DURABLE PROGRESS LEDGER — CORE (backend + coding-agent-master skill). A TodoWrite-style checklist that gives the coding master durable memory of which plan steps are done vs remaining, killing the amnesia that let p0340's completion-loop lose its place (duplicate greps, retreat to a cheap metadata write). ProgressLedgerToolHost exposes update_progress on the coding surface ONLY (scan/spec-dialog excluded) with FULL-STATE-REPLACE semantics + the invariants that make that safe as memory: at-most-one in_progress, reconcile-by-id via a protected-id set (seeded ids ∪ ever-done ids — a full replace may not silently DROP a seeded/done step), a size cap (MaxItems 40), and an EXPLICIT per-step target. Seeded 1:1 from the ratified plan (ProgressLedgerSeeder: id = plan step order = STABLE framework id, target = PlanStep.TargetFile) → PipelineContext (source of truth) + rendered into the master body via {ProgressLedgerSection}. The p0255 apply / p0263 verdict re-drives (fresh loops) carry the ledger forward via the nudge prompt. Done-status HONESTY DIAGNOSTIC (ProgressLedgerCoverage, pure): a done step whose EXPLICIT target is absent from the diff is surfaced as a result.md decision line — matched by a DEFINED equal-or-endswith rule (no fuzzy activity parsing), target-less items skipped (never a false warning); it NEVER feeds RunOutcomeKeystone (p0340 byte-for-byte unchanged, guarded by a test) — the ledger is memory, not a gate. Closes the 7 spec-review holes (seed-pin, fuzzy target, unstable ids, silent drop, keystone-leak, size cap, in_progress carryover). SLICED openly: the in-loop COMPACTION PIN (both provider compactors) → p0341b — it lives inside the provider chat-client loops (deep, isolated) and is hardening for the long-gap edge case, not the sole load-bearer (re-drives + KeepRounds tail already cover the common case). 3299 green (11 new). Skill: {ProgressLedgerSection} token + update_progress discipline; version bump + embedded pin (operator step). -> .agentsmith/phases/done/p0341-durable-progress-ledger.yaml"
    p0340: "ACCEPTANCE-DRIVEN COMPLETION (backend + coding-agent-master skill). Root cause of the 2026-07-14 DAP run that self-declared green after ONE csproj change: the master's Definition of done never referenced the ratified acceptance criteria, and the keystone only required '>=1 real file + green self-report' — so a near-noop cleared both. Fixed in TWO coordinated layers. SKILL (coding-agent-master, SHARED by fix-bug + add-feature): Definition-of-done item 1 is now 'every ratified Expected assertion is met (name the edit) or evaluated not_applicable (the MEANING of not doing it, e.g. no MassTransit -> nothing to migrate, no behaviour change); an actionable-but-unmet criterion means NOT done -> keep working, do not summarise'; the verdict block gains an ordered `acceptance` array. FRAMEWORK: MasterVerification carries AcceptanceDispositions (parsed tolerantly; unknown/missing status -> Unmet so a vague verdict gates RED), RunOutcomeKeystone.Evaluate gains ratifiedCriteria and refuses success unless EVERY criterion is met or justified-N/A (criteria present but NO dispositions = FAILED — the exact hole); empty criteria fall back to the change+green gate so fix-bug with no expectation is untouched. Plan-presence: GeneratePlan now enforces ResponseFormat.Json (gpt-5.1 had returned a PROSE numbered list -> PlanParser null -> silent empty Approval/open-questions gate) + tolerant legacy parse + PlanParser.SalvageProse (numbered/bulleted list -> steps). Completion is a LOOP (the master strives to deliver), the keystone the backstop (it cannot fake) — abort/honest-RED is the last resort, never the mechanism. 3288 green (12 new: keystone acceptance gate incl. no-dispositions + N/A-without-reason + graceful-degrade + all-met, verdict disposition parse + unknown-status default, prose salvage, tolerant parse; every PipelineHarness green verdict now carries dispositions). Skill ships via a version bump + embedded-pin update (operator release step). -> .agentsmith/phases/done/p0340-acceptance-driven-completion.yaml"
    p0336c: "COLLAPSE PER-REPO PER-TOOLCHAIN SANDBOXES + ALIGN FOOTPRINT (backend). One sandbox per (repo, RESOLVED toolchain image) at the per-field MAX resource envelope, was one per (repo, image, resources). Same-image contexts of a repo build SEQUENTIALLY under the single agentic loop, so the p0268 per-resource pod split bought no parallelism and only inflated the reserved footprint — collapse to one max-sized pod (a genuine image/SDK difference like net8/net9 still separates). PipelineSandboxCoordinator groups by ToolchainImage only + merges resources via new ResourceEnvelope.Max (Contracts.Sandbox); the dead GroupKey/ResourceSlug/Sanitize helpers removed. RunFootprintCalculator (p0336) aligned to the SAME per-(repo,image) grouping — it emitted one pod PER CONTEXT while the coordinator grouped by toolchain, so admission over-reserved (the DAP run computed 9 pods/33Gi but ~6 ran); now the reserved footprint equals what spawns. Trade-off: the merged pod takes the max envelope (slight over-provision) but net footprint far smaller, zero latency cost (sequential builds). The pre-existing p0268 SameImageDifferentResources_Splits test inverted to assert the collapse. Verified: after the operator's encrypter net9->net8 migration all 5 DAP-Server contexts are net8 -> ONE Server sandbox + BackgroundWorker + orchestrator instead of 5+. 3115 backend green (6 new: ResourceEnvelope max, footprint collapse + max-envelope + distinct-image split, coordinator collapse). -> .agentsmith/phases/done/p0336c-collapse-toolchain-sandboxes.yaml"
    p0336b: "CONTEXT-LEVEL SCOPING (backend, follow-up to p0336 — the optimisation the spec itself defers). The scope classifier now names affected CONTEXTS within each kept repo (reply extended {repos:[...]} -> +{contexts:{repo:[ctx,...]}}, optional; RepoScopeParser + prompt), a pure ContextScopeEvaluator narrows one level below RepoScopeEvaluator (same conservative keep-all fallback: no verdict / low confidence / unknown context / empty-or-full subset / single-context repo -> keep ALL), ScopeReposHandler publishes ContextKeys.ScopedContexts + records the drop as a PlanDecision, and PipelineSandboxCoordinator filters discoveries by the scoped set BEFORE the toolchain GroupBy — so a repo's shed context is a whole sandbox fewer. ABSENCE of a repo entry keeps ALL its contexts (critical: a mid-run ensure_repo_sandbox escalation to an unscoped repo still provisions); a filter that would empty a kept repo to zero sandboxes is ignored. Dropped contexts surface via the scope DECISION (DecisionLoggedEvent -> dashboard), NOT a footprint DB write — the spawned orchestrator has no DB channel (p0327/p0330); the p0336 CapacityFootprintPanel dropped-list stays a forward-compatible hook. ScopedContexts operates below ContextKeys.Repos so none of the ~19 Repos consumers change. 3104 backend green (11 new: evaluator fallbacks, parser contexts, coordinator drop + escalation-keep-all). -> .agentsmith/phases/done/p0336b-context-level-scoping.yaml"
    p0336: "PREDICTABLE CAPACITY — CORE + VISIBILITY (backend + dashboard). A run's COMPLETE pod footprint is computed ONCE at admission from the remote context inventory (RunFootprintCalculator: repos -> toolchain-group sandboxes at their RESOLVED LIMITs + orchestrator — real groups, so DAP's 3 repos = 4 sandboxes, not a project.Repos.Count estimate), persisted job-scoped on a RunCapacity ledger row (FootprintJson + summable cpu/mem totals + Reserved flag), and reserved ATOMICALLY against the app budget BEFORE the claim — a run starts only if its full footprint fits, else queues with a visible FIFO position + reason. Invariant sum(reserved) <= budget; released on terminal status (RunEventApplier.FinishRunAsync, the single choke point; a waiting state keeps its reservation) or on delete (p0337 satellite). CHALLENGED the spec: (1) the p0331 inventory is built mid-pipeline not pre-checkout, so the calculator does the remote reads at admission itself + the pump reads the PERSISTED footprint (no per-tick remote reads); (2) reserve LIMITs not requests, budget EXPLICIT + fail-open when unset (not 'default = k8s quota' which mixes requests/limits) — k8s ResourceQuota stays the atomic backstop at pod-create; the advisory ISandboxCapacityProbe is replaced by the ledger gate at both admission sites. Footprint visible on the run detail (CapacityFootprintPanel: pods + per-pod limit + total vs budget + FIFO position + dropped list) + inline queued-row reason. Reservation is CONSERVATIVE (full pre-scope footprint = safe upper bound); context-level scoping (accurate shrink + dropped-context population) sliced to p0336b. 3093 backend + 344 dashboard green (11 new: footprint calc, budget ledger reserve/sum/release/roundtrip, admission, panel). -> .agentsmith/phases/done/p0336-predictable-capacity.yaml"
    p0337: "DELETE A RUN (backend + dashboard). RunDeletionRepository removes the Run + its 7 non-cascading children + the satellites (ActiveRun lease, QueuedTicket, RunCheckpoint, RunExpectation, DialogueAnswers, RunCapacity) in ONE transaction (new IUnitOfWork.BeginTransactionAsync). Satellites keyed by RUN id (ActiveRun.RunId, QueuedTicket.ReservedRunId), NEVER by (Project,TicketId) — so a re-triggered ticket's newer run keeps its lease when an older run is deleted. RunDeleter force-clears a non-terminal run first via the p0330 path (IJobSpawner.TerminateAsync + lease release + queue removal); a FAILED kill KEEPS the record (PodTerminationFailed -> 502) so a delete never orphans a live pod. Bulk 'clear terminal runs' (terminal-only, never force-kills). DELETE endpoints behind the UI-API gate (separate RunDeletionEndpoints, not the always-on RunControlEndpoints); a RunsChanged nudge drops the run on every dashboard's next refetch. UI: hover-revealed per-row delete + detail-header delete (two-click confirm, no modal primitive) + 'clear finished' bulk. Tracker ticket untouched. Split into focused classes over growing RunRepository/RunControlEndpoints past the 120-line limit. 6 backend + 3 dashboard tests. -> .agentsmith/phases/done/p0337-delete-run.yaml"
    p0338: "HOMEPAGE 'Get started' 404 — EXTERNAL, tracking-only. Verified live 2026-07-14: agent-smith.org's 2 'Get started' hero links (nav + footer) point at docs.agent-smith.org/getting-started/ -> 404; the 3rd (hero) already correct at /get-it-running/install/; all other outbound docs links resolve. Target /get-it-running/first-run/ confirmed live. The fix belongs in the agent-smith.org marketing-site source (a SEPARATE repo, not in this checkout and not available locally) — no code change is possible here; closed as tracking so the exact fix is recorded for whoever owns that repo. -> .agentsmith/phases/done/p0338-homepage-get-started-404.yaml"
    p0335: "DOCS MIRROR p0162-p0333c + THE p0324-p0329 BATCH; RUN-FIRST STRUCTURE RE-VERIFIED (docs). Delta table (.agentsmith/notes/p0335-doc-delta.md): 197 phases audited from done-phase specs — 145 user-visible mapped to pages, 52 internal-only justified. GOLDEN PATH re-verified against source (CLI Program.cs+Commands/, agentsmith.example.yml, config models, deploy/): fix/feature take --ticket/--project (the quoted natural-language form was fiction), --headless not --auto-approve, no AGENTSMITH_CONFIG env var, webhook routes are POST /webhook (+/webhook/{github,gitlab,jira}) on 8081 with secrets in GITHUB_WEBHOOK_SECRET/GITLAB_WEBHOOK_TOKEN/AZDO_WEBHOOK_SECRET env vars (Jira: jira_trigger.secret) — the trackers.webhook_secret key never existed; 0.60.1 + legacy sandbox:/orchestrator: pins → single deployment: 0.108.0 (p0281c); skills: pin blocks removed (p0325 embedded); docker-compose/k8s pages rewritten to the real deploy/ artifacts (agent-smith-server image, migrate one-shot/init-container, /app/config, dashboard profile port 3000); install/first-run lead with doctor+demo; first-run trace mirrors the real FixBug preset (ScopeRepos, NegotiateExpectation, PlanOpenQuestions, AgenticMaster). NEW PAGES: how-it-works/spec-dialogue.md (p0315*-p0318), how-it-works/expectations.md (p0327/p0328/p0329), reference/operations/capacity.md (p0268/p0269a/p0320a-d/p0330/p0331/p0332), reference/operations/dashboard.md (the p0169*-p0247 arc + p0292/p0293 diagnostics + p0266/p0270b/p0271 config explorer), reference/pipelines/pr-review.md (p0167a-c). UPDATED: lifecycle (DB-lease claim, ScopeRepos, expectation, keystone + regression-aware gate, draft PRs on red), methodology (p0179b master collapse/p0216/p0241/p0273/p0276), security-scan (p0277/p0278/p0279/p0333/b/c), cost-tracking (p0323 cached share per call 0%=alarm, p0274 pricing, p0332 capacity-time), all 4 tracker pages + repos pages (p0281a/b connections + terse tracker-owned shape, p0296 GitLab self-contained, p0300a lifecycle_status_names, p0318 needs_clarification_status, p0261 failed_status), labels/polling/webhooks/cli trigger pages, multi-agent-orchestration (p0177 sub-agents), pipelines index (real preset diagram), ai-providers (p0187 OAuth tokens, p0188 rate_limit, cached-share pointer). REFERENCE DEDUPE: 13 pages deleted (setup/README, slack-setup, label-triggers, polling, polling-vs-webhooks, dashboard, webhooks/*4, host-it/index, skills/source-modes, baselines/ide-buddy) after merging unique facts into canonical pages; event-schema-policy.md → reference/architecture/ (the orphan got a nav home); run-logs kept as labeled archive (heavy inbound links); mkdocs nav mirrors it all. README: embedded skills, demo/doctor quickstart, pr-review + expectation/spec-dialogue capabilities, voice kept. mkdocs build --strict GREEN (0 warnings), no orphan pages. NOT verified live: no binaries executed, no screenshots taken (existing kept, none fabricated). -> .agentsmith/phases/done/p0335-docs-mirror-and-structure.yaml"
    p0329: "EXPECTATION REPLAY GOLDENS — EVAL MECHANICS + RATIFICATION METRICS (backend + dashboard). Measures p0328 against reality in two channels. EVALS (tests/AgentSmith.PipelineHarness/Evals): versioned fixture format (snake_case JSON: ticket + context_hints.code_map + gold expectation in the p0328 ExpectationDraft shape, validated by the production ExpectationDraftValidator) under Fixtures/ExpectationGoldens/; ANONYMIZATION ENFORCED TWICE — ExpectationFixtureIngestion refuses to write and ExpectationFixtureLoader refuses to load any fixture failing the gate (mandatory fixture-local attestation {attested,by} + generic in-code fingerprint patterns: emails, non-placeholder URLs (example.*/localhost allowed), hosting-org paths + extensible per-directory deny-patterns.txt; NO customer strings in code per repo policy). ExpectationEvalHarness replays each golden through the REAL ExpectationDrafter (env chat client + EmbeddedPromptCatalog, composed directly — eval never ships in the product image); ExpectationEvalJudge compares draft vs gold PER ASSERTION: the LLM only maps gold→draft indices, matched/missed/hallucinated DERIVED deterministically (unparseable judge reply = all-missed, honest). Report artifact (md+json, header pins model id + skills pin, deterministic filename per version pair) → tests/AgentSmith.PipelineHarness/Reports/expectation-goldens/, committed so prompt/pin changes show as diffs. TIER: rides the existing LiveLLM convention (Category=LiveLLM ONLY + loud env-key skip) — excluded from CI (Category!=LiveLLM) and from the fast harness filter (verified). LLM-free tier: fixture load/anonymization + scripted draft+judge→report shape green. SCOPE (operator-approved ruling): seed fixtures are REAL historical tickets only the operator can provide — ONE clearly-synthetic example ships so the mechanics are executable; 'baseline numbers recorded' = documented operator step (ingest via ExpectationFixtureIngestion → dotnet test --filter Category=LiveLLM → comm