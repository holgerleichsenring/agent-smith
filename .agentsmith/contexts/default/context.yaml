    p0328: "EXPECTATION NEGOTIATION — RATIFIED SOLL BLOCK AS THE RUN'S ACCEPTANCE CONTRACT (backend; skills-repo {ExpectationSection} consumption = sibling PR). NegotiateExpectation joins fix-bug + add-feature AFTER AnalyzeCode, BEFORE EnsurePrerequisites/GeneratePlan: the master drafts a schema-capped Soll block from ticket + analysis (ExpectationDraft { Observed, Expected≤5 one-sentence assertions, Constraints≤3, OpenQuestion≤1 with concrete A/B } — caps as type constants, ExpectationDraftValidator rejects overflow BACK to the model with the validation message, 3 bounded retries then the step fails loudly; drafting prompt is a BACKEND prompt resource expectation-drafting-system.md, NOT a skills fetch — p0325 offline guarantee, logged deviation). RATIFICATION: ExpectationQuestionBuilder → QuestionType.Approval DialogQuestion through the p0327 DialogueAskGate (hot wait → checkpoint/park for free; draft published to context BEFORE the ask so the resume is LLM-free — restored draft, no re-draft, pinned) + SIMULTANEOUS tracker comment via keyed IExpectationCommentTemplate (markdown/Jira variants, ExpectationCommentMarkers anchor, fail-soft, posted once behind a context flag). Answers: approve verbatim | edited text parsed back into the schema DETERMINISTICALLY (ExpectationEditParser: canonical ExpectationMarkdown sections or JSON; caps validate human edits too) | reject fails the step; unparseable answers fail with guidance. Outcome (verbatim/edited/rejected/unratified + Levenshtein edit distance — the p0329 raw material) persists via ExpectationRatifiedEvent → RunExpectation row (unique RunId upsert; spawned-orchestrator event-stream constraint). HEADLESS auto-ratifies stamped 'unratified'; ratification TIMEOUT auto-ratifies 'unratified' too (visible degradation — the code gate stays ApprovalHandler whose silence rejects); timeout rides dialogue.approval_timeout_seconds. CONTRACT FLOW: {ExpectationSection} joins MasterPromptTokens (bound on every render path — absent placeholder = no-op, old skills pins unchanged), agent-plan-system.md renders it, PR body gains the assertions-as-checkboxes section (ExpectationPrBodySection), result.md the acceptance-contract section. SLICED OPENLY: tracker-reply-as-ratification needs a parked-ticket comment watcher feeding the p0327 inbox → p0328b (anchor already in the comment). p0164a requirement RULED SATISFIED by p0315c approval blocks + p0327 ask — not implemented. Harness proof: fix-bug drafts → parks → restart → EDITED answer → resume ratifies edited (no LLM) → second park at Approval → approve → ONE run row success; RunExpectations outcome=edited, distance>0. 3064 unit + 74 harness fast. -> .agentsmith/phases/done/p0328-expectation-negotiation.yaml"
    p0326: "AGENT-SMITH DEMO — THE WHOLE LOOP ON A BUNDLED SAMPLE PROJECT (backend + CLI). `agentsmith demo`: preflight subset → materialize → real fix-bug run → local commit + printed diff; the ONLY credential is an LLM key (no tracker, repo remote, Docker or Redis — verified: one-shot CLI composition wires Redis only in spawned-job mode, sandbox is in-process). SAMPLE: tiny C# solution (PriceCalculator strict-> boundary bug + pinned failing xunit test + .agentsmith contexts meta) checked in as PLAIN SOURCES under Infrastructure.Core/Resources/DemoSampleProject/, tar'd at build time (3-line Exec, no network) and embedded like the p0325 skills tarball (Infrastructure.Core so the harness tests the real resource; NB: $(IntermediateOutputPath) is empty at csproj-body evaluation — use $(BaseIntermediateOutputPath)). DemoWorkspaceMaterializer (extractor + LocalGitProcessInitializer, host git via Process — no sandbox exists yet) git-inits with one baseline commit. INLINE TICKET: PipelineRequest.InlineTicket + ContextKeys.InlineTicket; FetchTicketHandler materializes it BEFORE the p0322a null-TicketId skip (provider never touched, TicketFetchedEvent still fires); TicketId stays null so lease/tracker writes are structurally skipped; CommitAndPRHandler skips FinalizeTicket on inline runs. NO-REMOTE RECORD-ONLY: SandboxGitOperations.CommitAndPushStagedAsync now commits-without-push when RepoType.Local has no 'origin' (`git remote` probe) — the graceful path did NOT exist; LocalSourceProvider message reworded ('commit recorded on branch', was falsely 'branch pushed'). CLI: DemoCommand → DemoExecutor (p0324 preflight SUBSET config-schema/llm-reachable/sandbox-spawn/infra, explicitly composed PreflightRunner — no skipped-check wall; fail-with-hints before tokens) → DemoRunner (ephemeral project via the p0281d AgentName seam + SourcePath, headless) → DemoResultPresenter (git diff HEAD~1 + next-steps). first-run.md leads with the demo (step 1), real tracker is step 2. 3052 unit + 74 harness fast. -> .agentsmith/phases/done/p0326-golden-path-demo.yaml"
    p0327: "DURABLE DIALOGUE — CHECKPOINT AT THE ASK, RESUME ON THE ANSWER (backend + dashboard). A run waiting on a DialogQuestion now survives restarts and multi-day silences. HYBRID WAIT: DialogueAskGate keeps the hot in-memory wait below dialogue.hot_wait_seconds (default 600); past it an eligible ticket run checkpoints — RunCheckpointedEvent (event stream: a spawned orchestrator's only DB channel, p0330 lesson) carries the pending question + the executor's LIVE step cursor (full PipelineCommand records incl. spliced follow-ups, published per-batch as ContextKeys.RemainingCommands) + the serialized context (PipelineContextSerializer: {key,type,json} entries, live objects excluded — Sandboxes/SandboxCoordinator/pricing/catalog re-established on resume; narrowed Repos WINS over standard seeding). The run parks as waiting_for_input (modeled exactly on 'queued': FinishedAt null, RunStarted promotes the row back), the worker task ends, sandboxes release (cattle; CheckoutSource+SetupRegistryAuth prepended to the resume cursor). LEASE: released at checkpoint (the finally), re-claimed at resume via the reserved-run-id path — reapers need no exemption because a parked run holds NOTHING (pinned). DURABLE INBOX: DialogueAnswerEntry UNIQUE(jobId,questionId) = first-wins; the server transport (DurableDialogueTransport) writes inbox first, hot stream second; Slack/Teams button fallbacks now ALSO publish the dialogue envelope (found en route: the bus envelope read as an EMPTY answer on dialogue waits). RESUME: leader-elected DialogueResumeSweeper (15s) matches inbox answers + expired deadlines (persisted DefaultAnswer applies headless — approval default is 'reject') against pending checkpoints → RunResumer enqueues an IsResume capacity-queue entry reusing the run row; the pump launches it lease+direct-enqueue, skipping trigger-status re-validation (a mid-run ticket sits in its working status). ApprovalHandler's interactive path routes through the gate (dialogue-durable approvals; headless auto-approve unchanged; Console.ReadLine retired). Dialogue identity = jobId ?? runId (in-process server runs had NO working ask before). DASHBOARD: waiting_for_input first-class (violet 'input' NodeStatus, filter chip, RunRow 'waiting for input', cancellable), PendingQuestionCard renders the question + POSTs /api/runs/{id}/answer. Harness proof: fix-bug parks mid-approval, harness disposed + rebuilt over the same SQLite (restart by construction), answer→sweeper→pump→resumed request completes — ONE run row. 3004 unit + 73 harness fast. -> .agentsmith/phases/done/p0327-durable-dialogue-resume.yaml"
    p0324: "AGENT-SMITH DOCTOR — ACTIVE PREFLIGHT (backend). Every historically silent misconfiguration is a named, actively-probed check with a fix hint: config-schema (parse + validator + empty-resolved ${SECRET}s), llm-reachable (real per-agent completion probe; surfaces configured rate_limit vs the conservative subscription default 5req/20k, names the p0235 network-timeout class), tracker-auth (real tracker read + webhook shared-secret presence per platform; tracker-side registration/scope probing needs new ITicketProvider vocabulary -> p0324b planned), repo-access (ls-remote-equivalent per remote repo), skills-catalog (pin resolves, loader loads — an over-200-char master description fails HERE with the 'Prompt resource not found' explanation instead of mid-run; required NameMap masters present), sandbox-spawn, infra (Redis + DB; persistence probe now also fails on pending migrations — the server never migrates itself). Contract: IPreflightCheck/IPreflightRunner in Contracts, checks in Application behind the EXISTING p0292/p0293 probe seams (unit tests script pass/fail per check, no live infra); composition-specific probes: CLI = real spawn+exec round-trip via ISandboxFactory + REDIS_URL-scoped infra, server = IJobSpawner probe + shared multiplexer/DbContext. CLI: `agentsmith doctor` (--json for CI), exit 0 green / 1 any failure. Server: same runner at startup WARN-ONLY (BackgroundService), results logged with fix hints + surfaced on /health as preflight{status,failures[{name,message,fix_hint}]} ('pending' until run). A skipped check is honest (feature unconfigured + reason), never a fail. -> .agentsmith/phases/done/p0324-doctor-preflight.yaml"
    p0333c: "SKIP GENERATED CODE IN STATIC-PATTERN SCAN (backend). The live 'LLM Output in SQL Query' FP class fired on a generated TypeScript API client emitted into a .cs file. PatternFileMatcher now skips self-declared generated files (Roslyn <auto-generated> marker, first 5 lines) for non-'secrets' patterns — secret patterns still run so a credential baked into generated output still trips (no secret-detection trade-off). Detection trusts the file's own declaration, not path/name heuristics or an LLM. Closes the residual case p0333's read-set suppression misses (generated FP in an unread file). Pattern-tightening itself (also fired on a hand-written MediatR handler) is skills-repo work -> p0334. 3 tests. -> .agentsmith/phases/done/p0333c-skip-generated-code-static-scan.yaml"
    p0333b: "GIT-HISTORY SECRET SEVERITY (backend). History-only secrets were emitted as Medium and fell off MergeMasterFindings' High+ promotion cliff — the exact GitHub-comparable signal (secrets) was silently lost from delivery. Root: GitHistoryScanHandler severity ternary (High:Medium) contradicted SecurityFindingsFormatter's own counts (history-only=critical, still-in-tree=high). Fixed to history-only=Critical, still-in-tree=High; both stay High+ so neither is dropped. A committed secret requires rotation regardless of working-tree presence; history-only is the higher risk. 2 tests. Decision also records Tier-2 (CollectMasterFindings convergence) as SUPERSEDED by p0333, not deferred. -> .agentsmith/phases/done/p0333b-git-history-secret-severity.yaml"
    p0330: "CANCEL IS PERSISTENT STATE + ALWAYS ENFORCED (backend + dashboard). Root: RunCancellationRegistry is a per-process in-memory dictionary — a spawned orchestrator pod could structurally NEVER receive a cancel; the endpoint stale-cleared the card while the pod ran on. Now: CancelAsync persists CancelRequested+CancelReason+CancelDeadlineAt SYNCHRONOUSLY (ExecuteUpdate, first deadline wins); IJobSpawner.TerminateAsync (k8s DeleteNamespacedJob Foreground — the spawned pod runs in-process sandboxes so the whole footprint dies; Docker force-remove); CancelEnforcer (leader-elected, 15s) kills at the DURABLE deadline (survives restart), finalizes via the event path, releases the lease, terminalizes the ticket (CancelledTicketFinalizer, failed_status chain, fail-soft); pre-start gates in PipelineQueueConsumer.RunOneAsync + CapacityQueuePump.TickAsync (IRunCancelStateReader); queued-cancel also terminalizes the ticket (no re-poll); FinishRunAsync is set-once on FinishedAt (late RunFinished cannot overwrite cancelled, late queued cannot resurrect). runId->jobId link did not exist — RunStartedEvent gained optional JobId (event stream is the pod's only DB channel), Runs.JobId+CancelDeadlineAt migration. UI: CancelRequestedBadge independent of status (amber cancelling… while live, muted hint when ended success/failed), queued removed from TERMINAL_STATUSES, cancel button for queued+running. -> .agentsmith/phases/done/p0330-cancel-is-state-and-enforced.yaml"
    p0331: "TICKET-SCOPED PROVISIONING (backend). Understand first, then provision: ScopeReposHandler (after FetchTicket, code-changing presets only) builds a remote per-repo context inventory (ResolveAllAsync, cached at ContextKeys.RemoteContextInventory — EnsureSandboxesAsync consumes it instead of re-reading; meta.purpose surfaced), then ONE TaskType.Planning LLM call (GeneratePlan plumbing, strict-JSON tolerant parse, 0.7 confidence floor) narrows ContextKeys.Repos — the single verified seam that cascades to checkout/sandboxes/commit/PR. Fallback to ALL repos on LLM error/parse fail/unknown repo/empty/low confidence; scope+rationale recorded via the decisions channel (result.md + dashboard for free); CLI --repo wins structurally (single-repo skip). Escalation valve: ensure_repo_sandbox master tool (coding masters only) — live coordinator self-published at ContextKeys.SandboxCoordinator, own single-sandbox RunFootprint probe with HONEST deny string, FilesystemToolHost.AddSandbox with copy-on-write runner map (lock-free reads for p0280 sub-agents), late checkout via SandboxRepoCloner extracted from CheckoutSourceHandler (same branch resolution), Repos-widening reverted on failed spawn. Admission stays pessimistic on project.Repos.Count (p0331b named follow-up). DAP case: 1 sandbox instead of 4. -> .agentsmith/phases/done/p0331-ticket-scoped-provisioning.yaml"
    p0332: "COST-HONEST CAPACITY (backend + dashboard + operator docs). Principle: minimize reservation x duration — quota on limits reserved the worst case (5 default pods = 20Gi used at a fraction of real usage). Probe pin test locks the verified requests-only-quota behavior (Evaluate skips keys absent from Hard — zero code needed); docs/host-it/kubernetes.md documents the quota shape (requests.cpu/requests.memory/pods, worked 8cpu/20Gi example, honest-requests eviction warning, pods = deterministic backpressure) as a COORDINATED OPERATOR STEP; deploy/k8s/8-deployment-server.yaml ships JobSpawner__Resources (100m/500m, 512Mi/2Gi — the orchestrator compiles nothing and is the longest-lived pod). write_context_yaml resources paragraph rewritten to normally-omit/outlier-only (clamp stays). Reserved resource-time per run: SandboxCreatedEvent + MemoryRequest (trailing optional), RunSandbox lifetimes (+migration), RunSnapshot.ReservedGiMinutes, run-detail renders reserved N.N Gi-min next to LLM cost — LABELED as reservation, never as measured usage or money. Bonus fix: JobSpawnerOptions.Resources no longer aliases the ResourceLimits.Default singleton (config binding mutated the global default in place). -> .agentsmith/phases/done/p0332-cost-honest-capacity.yaml"
    p0333: "MERGE RESPECTS MASTER READ-SET (backend). MergeMasterFindings promoted every High+ raw scanner fact the master didn't address at (File,StartLine) — but couldn't tell 'master reviewed and dismissed' from 'master never covered', so low-precision static-pattern FPs got laundered into CRITICALs (verified live 2026-07-13: 9 description-less 'LLM Output in SQL Query' criticals on files the master had read via ReadFile+GrepInFile and left unflagged). Fix: extracted the merge into static MasterFindingsMerger; a Role==static-pattern-scanner fact whose file is in MasterReadPaths is now an implicit rejection and suppressed. git-history secrets + dependency CVEs NEVER suppressed by read-set (reading current source refutes neither a historical leak nor a vulnerable package). Read-path match is normalized segment-boundary suffix (absorbs the sandbox 'default/' workdir prefix vs repo-relative scanner File). Empty read-set suppresses nothing -> p0277 promote-all-uncovered safety net intact. Honest log reports suppressed-as-reviewed count; 6 new deterministic handler tests + full suite (2959) green. -> .agentsmith/phases/done/p0333-merge-respects-master-readset.yaml"
    p0323: "PROMPT-CACHING REVIVAL + CACHED-SHARE OBSERVABILITY (backend + skills-repo #118). The p0007 Anthropic strategy (PromptCaching=AutomaticToolsAndSystem) died SILENTLY in the p0119a M.E.AI migration — no live call set it, CacheConfig/CacheTypeResolver were orphaned, PromptPrefixBuilder's claimed breakpoint never applied. Revived via ChatOptions.RawRepresentationFactory returning native MessageParameters with PromptCaching (SDK's SetCacheControls stamps cache_control ephemeral on last system block + last tool — exact p0007 semantics), driven by CacheTypeResolver(agent.Cache) so cache.is_enabled=false sends nothing; ClaudeContextCompactor same. SECOND silent kill found en route: the tghamm adapter emits cache counts under PascalCase AdditionalCounts keys while all readers (EventPublishingChatClient, PipelineCostTracker, ClaudeCostTracker) read snake_case since p0176b — cached was 0 everywhere even where it worked; readers accept both, cost math corrected (Anthropic input_tokens EXCLUDES cache reads — no subtraction; only OpenAI cached_tokens is a subset). OBSERVABILITY: LlmCallFinishedEvent + RunLlmCall (+migration) carry CachedTokensIn/CacheCreationTokensIn, dashboard LLM rows render '· N% cached' — an always-0 share is now a visible alarm, not an invisible regression. Prefix order restored principles-first (agent-plan-system.md here; coding/api-security/security masters via skills #118, which also adds the mandatory stack.image to the bootstrap example — image-less stacks error since #383). -> .agentsmith/phases/done/p0323-prompt-caching-revival.yaml"
    p0322a: "REAL x/y RUN PROGRESS + INIT TICKET TITLE (backend). The REST /api/runs snapshot derived StepIndex AND TotalSteps from the same RunStep rows (one row per started step -> max(index) == count, forever x/x). Run.TotalSteps int? (+migration) now persists the producer's live StepStartedEvent.TotalSteps as a max (it GROWS mid-run with BootstrapDispatch's spliced rounds — RunStartedEvent.PlannedSteps would undercount); mapper falls back to Steps.Count for pre-migration rows. TITLE: TicketTitle is written only by TicketFetchedEvent and init-project was the one ticket-triggered preset without FetchTicket — added (after PipelineNameInitializer), with FetchTicketContext.TicketId made nullable so ticketless CLI init skips cleanly (builder threw KeyNotFoundException before the handler could guard). -> .agentsmith/phases/done/p0322a-run-progress-and-init-title.yaml"
    p0322b: "AUTHORITATIVE SANDBOX-REPO ATTRIBUTION + SPEAKING CONTEXT-NAME KEYS (backend). Live 3-repo re-init: a multi-context repo got ZERO bootstrap rounds — BootstrapDiscoverHandler.BelongsToRepo matched only 'repo' and 'repo/', not the p0268 multi-group form 'repo-lang-size' (same bug class SandboxTargets fixed in p0249). Shared SandboxTargets.KeyBelongsToRepo now consults ContextKeys.SandboxRepos (the coordinator's authoritative map) first; string decoding only as map-absent fallback. NAMING: the group key differs by toolchain image but the composed key omitted it and showed lang+size (identical across groups) -> collision -> '-2' backstop. ComposeForGroup now takes the representative discovery's ContextName: multi-group keys read '{repo}-{contextName}' / '{contextName}' (sanitized), single-group unchanged; EnsureUniqueKey stays as backstop. -> .agentsmith/phases/done/p0322b-sandbox-repo-attribution-and-names.yaml"
    p0322c: "NO PR FOR RUN-RECORD-ONLY INIT DIFFS + HONEST COMMIT FAILURES (backend). The 2026-07-10 ghost PR: WriteRunResult seeds EVERY repo's sandbox with the run-record, defeating the empty-commit guard, so a repo with zero bootstrap output still committed+pushed+PR'd (real sequential AzDO id, content = only .agentsmith/runs/). InitCommitHandler now stages, lists staged names (existing GetStagedFileNamesAsync), and returns SkippedNoChanges without commit/push/PR when every path is under .agentsmith/runs/ (RunRecordPaths.IsUnderRunsDir — the broader IsRunRecordPath matches all of .agentsmith/ and would block real init PRs). Change pipelines untouched (run-record force-staged into code PRs by design, keystone requires real changes). With p0321 this makes the no-change re-init outcome REACHABLE: done_status, zero commits, zero PRs. HONESTY: SandboxGitOperations.CommitAsync returned false on ANY non-zero exit and a hardcoded 'nothing to commit' rethrow masked every real commit failure as clean-tree; now the canonical phrase must appear in git's actual output (stdout OutputContent or stderr), anything else throws with the real git output — CommitAndPRHandler gets honest failures for free. -> .agentsmith/phases/done/p0322c-runrecord-pr-gate-and-honest-commit-errors.yaml"
    p0320a: "PIPELINE-AWARE SANDBOX SIZING + RESOURCE CLAMP (backend). Root of the 2026-07-09 init storm: #376 made init-project actually write context.yaml, so p0268 started applying the LLM build sizing (cpu_limit 2 / 4Gi) to sandboxes that only clone+write files. ISandboxResourceResolver.Resolve is now pipeline-aware: only ExpectsCodeChanges presets (fix-bug, fix-no-test, add-feature, phase-execution) consume stack.resources; everything else (init, scans, legal, mad — and null/unknown pipeline) gets ResourceLimits.LightProfile (100m/500m, 256Mi/1Gi); operator project override still wins layer-1 for all pipelines. LLM-authored quantities are CLAMPED (not rejected) to SandboxOptions.MaxCpuLimit '2' / MaxMemoryLimit '6Gi' with a WARN; write_context_yaml guidance rewritten balanced-vs-cost (request≈typical, limit≈modest headroom, ceiling named; heavy cpu_limit example dropped 2 -> 1). -> .agentsmith/phases/done/p0320a-pipeline-aware-sandbox-sizing.yaml"
    p0320b: "FULL-FOOTPRINT CAPACITY ADMISSION (backend). The p0269a pre-flight probed ONE sandbox; a 3-repo run needs orchestrator + 3 sandboxes (defaults alone: 4x4Gi = the whole 16Gi quota). New RunFootprint { Orchestrator?, Sandboxes[] } replaces the single-ResourceLimits probe argument: k8s probe sums per quota key across all pods (pods/count-pods = total), Docker requires running + Sandboxes.Count <= cap, SpawnPipelineRunsUseCase probes orchestrator (IOrchestratorResourceResolver, nullable for in-process) + repos.Count x pipeline-aware default. TOCTOU (context.yaml discovered mid-run exceeding the admission assumption) remains the backstop, made graceful in p0320c. -> .agentsmith/phases/done/p0320b-admission-footprint-math.yaml"
    p0320c: "PERSISTENT FIFO CAPACITY QUEUE, SINGLE-ROW QUEUED RUNS (backend). Replaces the invisible retry storm (claim -> quota 403 -> run row 'queued' -> lease released -> poller re-claims -> NEW row per attempt). QueuedTicket table (identity Id = FIFO order, UNIQUE(Project,TicketId), ReservedRunId, InitialContextJson) + EF migration; SpawnPipelineRunsUseCase is the single funnel: probe-denied OR not-head-behind-nonempty-queue -> upsert entry + ONE direct-inserted 'queued' Run row (no lease, no claim), strict FIFO no overtaking; head+admitted -> claim reusing the reserved run id (ClaimRequest.ExistingRunId -> PipelineRequest.RunId -> RunEventApplier upsert: the queued row BECOMES the running row). TOCTOU backstop: RunFinished status='queued' keeps FinishedAt null and upserts the queue entry (InitialContextJson null = poller-launched only). CapacityQueuePump (Server, 15s, leader-elected): re-validates native status via tracker (operator moved it -> drop + cancel row), probes RunFootprint, claims head. Cancel on a queued run deletes the entry + terminal RunFinished(cancelled). Holds NO lease and no lifecycle transition — zero interaction with EnqueuedReconciler/ActiveRunReaper. -> .agentsmith/phases/done/p0320c-capacity-queue-fifo.yaml"
    p0320d: "QUEUED RUNS FIRST-CLASS IN THE DASHBOARD (dashboard + server endpoints). RunSnapshot.QueuePosition (computed at query time from QueuedTicket rank via ReservedRunId — never persisted; the head moves). NodeStatus gained first-class 'queued' (amber Clock, static): RunRow renders 'queued · #N' + waiting reason instead of the misleading stepIndex/totalSteps '2/2', queued filter chip added, DetailPane/RailRow/ExecutionNode/TimingGutter extended. Queued rows live in the ACTIVE run set (FinishedAt null). -> .agentsmith/phases/done/p0320d-queued-run-visualization.yaml"
    p0321: "INIT-PROJECT TERMINALIZES ITS TICKET WITHOUT REQUIRING A PR (backend). The loop: InitCommitHandler gated the done_status writeback on an opened PR; a re-init on a bootstrapped repo commits nothing (SkippedNoChanges) -> no PR -> no writeback -> poller re-claims forever. Finalize now fires on ticketId + CommandResult.IsSuccess (all-failed init still takes the error path), summary distinguishes PR-opened vs 'no changes — already bootstrapped'. Intentional re-init (framework bump) = operator moves the ticket back to a trigger status; every outcome now moves the status. -> .agentsmith/phases/done/p0321-init-rerun-and-writeback.yaml"
    p0315: "CONVERSATIONAL DESIGN & DELIVERY PARTNER (parent) — series COMPLETE: all six slices shipped (a session, b design-partner-master, e outcome resolution, f real ticket creation, c /create-phase filing, d /execute-phase execution). Chat thread -> grounded answer / bug / phase / epic -> confirmed -> filed as tracker ticket(s) -> executed by the normal pipeline, spec-first, no IDE. -> .agentsmith/phases/done/p0315-conversational-spec-dialog.yaml"
    p0315d: "/EXECUTE-PHASE: PHASE-EXECUTION PIPELINE RUNS SPEC-FIRST FROM PHASE TICKETS (backend, slice 5/5 of p0315 — series complete). ROUTING BY TICKET KIND: the `phase` label (the p0315c filing artifact, PhaseTicketRenderer.PhaseLabel) is hard-bound in ProjectResolver — the single chokepoint the poller AND all four webhook handlers converge on — to the new phase-execution preset, BEFORE pipeline_from_label (whose strict filter would silently drop the unmapped framework-owned label); ClaimPreChecker whitelists it as label-triggered and TrackerDiscoveryQueryBuilder adds `phase` to the server-side TriggerLabels guard; every other ticket routes byte-identical (bug -> fix-bug proven). EXTRACT: PhaseSpecFromTicket (Application/PhaseExecution) inverts the p0315c renderer — ONE fenced ```yaml block -> production SpecDraftValidator -> PhaseDraft; the Azure DevOps variant (System.Description stores markdown->HTML, fence comes back as <pre><code class=\"language-yaml\"> with entities) decodes via WebUtility.HtmlDecode + ValidateYaml, round-trip pinned with the SAME Markdig pipeline the provider uses. PRESET PipelinePresets.PhaseExecution [LoadCatalog, FetchTicket, CheckoutSource, SetupRegistryAuth, BootstrapCheck/Gate, LoadCodingPrinciples/Context, AnalyzeCode, EnsurePrerequisites, PhaseSpecGate, AgenticMaster, MasterOpenQuestions, WritePhaseRecord, WriteRunResult, CommitAndPR, PrCrossLink]: no GeneratePlan/Approval/PlanOpenQuestions (the spec IS the plan and was operator-confirmed in-thread before filing; PhaseSpecGate fails loud on a broken artifact BEFORE master tokens), no PipelineNameInitializer (pinned-catalog enum, spec-dialog precedent). THE MASTER EXECUTES THE SPEC — no C# per-step loop engine: PhaseSpecGate publishes the spec's ordered steps as ContextKeys.Plan (PhaseSpecPlanFactory) so they render through the EXISTING 'Approved plan — execute this' contract of the pinned coding-agent-master (works on every operator pin, no skills bump), and PhaseExecutionPromptFactory builds the user prompt: spec yaml VERBATIM inside the p0316 untrusted delimiters + done-criteria section ('verify EACH criterion out loud before the verdict') + PlanAnswers rendered authoritative on a re-triggered run; phase-execution is in CodeChangingPresets AND GreenTestPresets so the git+verdict keystone stays the hard gate. CLARIFY (p0318 transport, park + fresh run — an ephemeral run container cannot suspend across a human round-trip): ask_human on a phase run is TicketClarificationToolHost (captures the FIRST question, tells the master to STOP), AgenticMasterHandler returns awaiting_user_input, and MasterOpenQuestions (sibling of PlanOpenQuestionsHandler over the SAME IPlanOpenQuestionsPoster) posts the anchored open-questions comment + parks the ticket in needs_clarification_status atomically (FinalizeAsync) and sets OpenQuestionsAwaitingAnswer so the executor short-circuits (no record, no PR); the human's answer + status move re-trigger a fresh run (honest residual: a comment posted while still parked is status-gated out — p0317 on main hydrates comment threads at FetchTicket and closes that; not duplicated here). DOGFOOD: WritePhaseRecord (after the clarification step, so a parked run never records done) writes the executed spec to .agentsmith/phases/done/{phaseId}-{slug}.yaml in every repo's sandbox tree — force-staged into the PR as a run-record path, deliberately NOT a code change (cannot fake the keystone). Tests 2810/2810 unit + 69/69 harness fast tier: the five spec-named tests = 2 ProjectResolver routing, PhaseSpecFromTicket extract (+HTML/invalid variants), and 2 end-to-end through the REAL composition (recording ticket provider serving a genuine renderer-built phase ticket; green path proves prompt contract + phases/done record + keystone success, ask_human path proves the atomic park + short-circuit); +PhaseSpecPlanFactory pins the steps->approved-plan render at the production BuildPlanSection. -> .agentsmith/phases/done/p0315d-phase-execution-pipeline.yaml"
    p0315c: "/CREATE-PHASE FILES CONFIRMED OUTCOMES AS TRACKER TICKETS (backend + server + skills-repo, slice 4/5 of p0315). A confirmed outcome now becomes REAL tickets in the active scope's tracker. PREMISE FIX EN ROUTE: the spec's 'existing ITicketProvider create path' did not exist (throwing default since p57c, zero implementations) — sliced out and shipped first as p0315f, then built this phase on the real path. APPROVAL GATE (edit/reject delta): ConfirmationResult is now a union — explicit approve tokens file, explicit reject tokens file NOTHING and say so, ANY other reply is an edit note (OutcomeEditRequested), silence times out. The confirmation renders through the EXISTING p0058 approval surface (SlackTypedQuestionBlockBuilder.BuildApprovalBlocks / TeamsQuestionCardBuilder.BuildApproval) — IPlatformAdapter.AskTypedQuestionAsync gained a threadId so the blocks land threaded; the confirmer posts them itself, marks the pending question, and bridges a button click onto the dialogue transport where the SAME wait receives thread-text answers (two input surfaces, one wait; p0164a was never implemented — this IS the deployed blocks path). EDIT ITERATES via the turn machinery: the flow returns OutcomeFlowEditRequested(note), the router reloads the durable state (the note is already the transcript's last user turn) and re-runs the design turn; design-partner-master v1.2.0 gained the 'Operator edits' section (re-emit the FULL corrected block; skills branch feat/p0315b-design-partner). RENDER: PhaseTicketRenderer (Application) — ticket = '{phaseId}: {goal}' title + human-first markdown summary (## Goal/Why/Scope/Requires read from the draft's own yaml) + exactly ONE fenced ```yaml block holding the spec VERBATIM + the `phase` label; THIS IS THE p0315d CONTRACT (PhaseSpecFromTicket inverts it; proven in tests with the production SpecDraftValidator). CREATE: TicketFilingOutcomeSink (replaces SessionStoreOutcomeSink in the ONE DI registration) — durable-first (SetConfirmed → file → ClearConfirmed on full success; failure keeps ConfirmedOutcomeJson for retry and posts the exact error), OutcomeTicketFiler resolves the provider from the scope's project via AgentSmithConfig + ITicketProviderFactory; bug → fix-bug shape (title + body + '## Acceptance criteria' section, NO label — mirrors the chat create-ticket path), phase → one phase ticket, epic → parent FIRST then children sequentially (each body carries 'Parent: <ref>', requires: edges stay in the child yaml) + ONE parent comment listing filed slices — body references on ALL trackers, honestly, because ITicketProvider has no linking vocabulary; a mid-epic failure reports exactly what WAS created (FilingReport). All ticket references (web URL where derivable, else #id) post to the thread AND the durable dialogue trail (assistant transcript turn). Tests 2809/2809 unit + 66/66 harness fast tier: the five spec-named CreatePhase_*/PhaseTicketRenderer_* tests drive the REAL sink over a migrated per-test SQLite with recording fakes only at the tracker + chat HTTP boundaries; +edit-iterates router test over real SQLite; the p0315e resolution five moved their question observable to the adapter surface. -> .agentsmith/phases/done/p0315c-create-phase-ticket.yaml"
    p0315f: "REAL TICKET CREATION IN ALL FOUR TRACKER PROVIDERS (backend). Sliced out of p0315c when its 'existing create path' premise proved false: ITicketProvider.CreateAsync had been a NotSupportedException interface default since p57c and NO provider ever implemented it — WriteTicketsHandler and CreateTicketIntentHandler were dead paths on every tracker. CreateAsync is now an ABSTRACT contract member (title, description, labels) returning CreatedTicket(TicketId, WebUrl?, Reference = url-or-#id honest degrade) — capability honesty in the type system, not a throwing default nobody reads; a create-less provider (future Email, p0141) must state its NotSupportedException in code. Implementations: GitHub Octokit Issue.Create (BuildNewIssue, html_url); GitLab POST /projects/{path}/issues (labels csv, iid + web_url); Jira POST endpoints.create (NEW operator-overridable JiraEndpoints template, default /rest/api/3/issue) with ProjectKey required (fail-loud ConfigurationException), issuetype 'Task', labels, and the description as LINE-PRESERVING ADF (new JiraAdfRenderer.FromMultilineText — one paragraph per line, the exact inverse of JiraAdfParser.ExtractText, so a fenced yaml block in a created body reads back intact for p0315d); AzDO CreateWorkItemAsync JSON-patch (BuildCreatePatch: Title, Description markdown→HTML like System.History, System.Tags '; '-joined) as type 'Task' (the only type in every process template), TICKET WRITE audit like every AzDO mutation, web URL {org}/{project}/_workitems/edit/{id}. Callers migrated to the single overload + real references (WrittenTickets now carries URLs, chat confirmation links the ticket). Tests: GitLab/Jira at the HTTP boundary (RecordingHandler), GitHub/AzDO pin the pure payload/URL builders (no SDK seam — no shim invented), Jira ADF round-trip pinned, WriteTickets_UsesCreatedTicketReference, both test fakes implement the new member. -> .agentsmith/phases/done/p0315f-provider-ticket-create.yaml"
    p0315e: "TYPED OUTCOME RESOLUTION + EPIC DECOMPOSITION (backend + server + skills-repo, slice 3/5 of p0315). A spec-dialog turn now terminates in a typed OutcomeProposal — AnswerOutcome | BugOutcome(fix-bug ticket shape) | PhaseOutcome(schema-valid draft) | EpicOutcome(parent + ordered children with requires: edges) — PROPOSED and confirmed in-thread before anything routes, so an LLM misclassification is caught, not executed. WIRE PROTOCOL (deployed-pin compatible): plain prose = answer (default path; any pre-p0315e master pin degrades to today's behavior); ONE bare ```yaml block = phase (the p0315b draft contract, byte-identical); ONE ```outcome fenced yaml block = bug {title, description, acceptance_criteria?} or epic {parent, children[]}; mixing block kinds or >1 outcome block is invalid. OutcomeProposalResolver (+ BugOutcomeParser / EpicOutcomeParser / PhaseDraftReader / RequiresEdgeChecker / OutcomeYamlReader) generalizes the p0315b draft gate inside AgenticMasterHandler (GateSpecOutcomeAsync: same one-re-prompt-with-exact-error protocol; a second failure becomes an honest notice AND degrades to AnswerOutcome so nothing routes); every epic child AND the parent validate individually against phase-spec.schema.json (new ISpecDraftValidator.ValidateYaml), requires edges checked for consistency (a phase-id-shaped entry must name a SIBLING — parent/unknown/cycle rejected, free-text preconditions pass per schema; >=2 children or it is just a phase). The proposal travels ContextKeys.SpecDialogOutcome -> SpecDialogReplySlot.Outcome (CollectSpecDialogReply fails loud when absent) -> SpecDialogTurnResult(Reply, Outcome). CONFIRM: SpecDialogOutcomeFlow (called by the router inside the turn gate) shows the outcome (+ epic slice shape) as DialogQuestion(QuestionType.Approval) over the p0315b machinery (transport jobId=session id, SpecDialogQuestionPump relays threaded, pending registry routes the thread's next message as the answer); ONLY explicit approval tokens confirm (deliberate inverse of AskCommandHandler's reject-list — a wrong artifact costs more than one extra chat turn), 15-min timeout, pending cleared on every exit so a timed-out confirmation cannot swallow the next design message. ROUTE (the p0315c seam): IOutcomeSink receives only CONFIRMED non-answer proposals; the shipped default SessionStoreOutcomeSink is honest — persists ConfirmedOutcomeJson on the durable SpecDialogSession (migration AddSpecDialogConfirmedOutcome; kind-discriminated round-trippable JSON, the handoff p0315c files from) and posts 'stored, nothing filed yet — filing ships with /create-phase (p0315c)'; NO fake tickets; p0315c swaps ONE registration (bug -> fix-bug ticket, phase/epic -> phase ticket(s) via ITicketProvider). SKILLS REPO (branch feat/p0315b-design-partner): design-partner-master v1.1.0 — four typed outcomes with bug/epic ```outcome emission specs, slice-like-the-methodology epic rules, description re-fit under the 180 cap. Tests 2798/2798 unit + 60/60 harness fast tier (5 spec-named end-to-end through the REAL composition: answer-no-artifact / bug-routes-fix-bug / single-phase / epic-with-linked-requires-shown-in-thread / sink-only-after-explicit-approval, with an in-memory dialogue bridge + recording sink at the named Redis/p0315c boundaries; +13 resolver protocol/edge tests, +3 durable outcome-store tests over real migrated SQLite). -> .agentsmith/phases/done/p0315e-outcome-resolution-decomposition.yaml"
    p0315b: "DESIGN-PARTNER-MASTER + TIERED CODE GROUNDING (backend + server + skills-repo, slice 2/5 of p0315). A follow-up in an open /spec thread now gets a REAL design answer: SpecDialogRouter hands the turn to SpecDialogTurnRunner, which runs the new spec-dialog preset [LoadCatalog, LoadCachedCodeMap, AgenticMaster, CollectSpecDialogReply] IN-PROCESS via ExecutePipelineUseCase (no container per turn), seeding transcript + lazy sandboxes + dialogue job id + a SpecDialogReplySlot through PipelineRequest.Context; the reply is persisted as an assistant turn and delivered threaded. GROUNDING IS TIERED: (1) LoadCachedCodeMapHandler publishes ContextKeys.CodeMap from the CACHED ProjectMap (new hash-free IProjectMapStore.ListByPrefixAsync — Redis SCAN over the namespaced prefix; disk store honestly empty (hashed dir names); misses reported inline so the master escalates instead of guessing) — structural questions spin NOTHING; (2) ISourceScopeSandbox/SourceScopeSandbox — a per-repo LAZY wrapper over the production ISandboxFactory + SandboxSpecBuilder (language:null -> generic buildpack-deps:bookworm-scm, no toolchain build) that materialises (spawn + git clone) only on the first content read and expresses READ-ONLY in the step vocabulary (ReadFile/ListFiles/Grep/DirectoryTree served; Run/WriteFile refused as failed StepResults); per-TURN lifetime — the turn runner disposes (cross-turn reuse rejected: an idle sandbox belongs to no active run and the orphan reaper would eat it, p0238 class). AgenticMasterHandler gains the spec-dialog branch KEYED ON PIPELINE NAME (an output_schema value outside the loader's closed set would break every deployed skills pin — the master deliberately declares none): SpecDialogPromptFactory renders the transcript, AgenticToolSurface.SpecDialog = content reads (minus find_files, which shells a Run step) + ask_human, and GateSpecDraftAsync validates a drafted fenced yaml phase spec against the embedded phase-spec.schema.json (SpecDraftValidator: YAML->JSON->JsonSchema.Net) — invalid re-prompts ONCE with the exact error (p0255/p0263 nudge pattern), still-invalid is replaced by an honest notice, NEVER surfaced raw. ask_human is LIVE: DialogueJobId=session id, a per-turn SpecDialogQuestionPump relays job:{id}:out questions threaded (fixed en route: RedisMessageBus parsed the stream type case-sensitively and silently dropped every lowercase dialogue-transport question), and the thread's next message publishes the answer (in-memory pending registry + turn gate; a busy turn's extra messages are recorded + acknowledged). No PipelineNameInitializer in the preset (pipeline_name enum lives in the operator-pinned skills catalog — requiring a new value would break every existing pin; spec-dialog runs no skill activation). SKILLS REPO (branch feat/p0315b-design-partner, a7abf5b): _masters/design-partner-master/SKILL.md v1.0.0 — converse tersely, tier-1 first, draft only when the outcome is a phase, ask_human only on genuine ambiguity. Tests 2921/2921 (+4 spec-named harness tests driving the REAL server composition end-to-end: NoSandbox / SpinsReadOnlySandbox / SchemaValidDraft / InvalidDraft-reprompted-never-raw, +4 lazy sandbox, +6 draft validator, +4 step handlers). -> .agentsmith/phases/done/p0315b-design-partner-master.yaml"
    p0315a: "SPEC-DIALOG SESSION (server, slice 1/5 of p0315). A persistent, per-THREAD design conversation with an active scope: '/spec' in a Slack thread (thread_ts, extracted by SlackPayloadExtractor) or Teams conversation (conversation.id) opens a session scoped to a project + repo set from the config catalog (SpecDialogScopeResolver: explicit '/spec <project>' pick, single-project default, else choice prompt); follow-ups in an open thread append user turns to a running transcript; '/spec list' shows open sessions, '/spec resume <id>' re-binds a session into the current thread, '/spec new' forks (close + fresh session, same scope). DURABILITY IS THE LOAD-BEARING DECISION: the spec said reuse the Redis ConversationStateManager, but volatile Redis (45-min TTL + flush-on-restart incident class) must never be the only holder of a design transcript — sessions live as SpecDialogSession rows in the p0246 relational system-of-record (migration AddSpecDialogSessions, unique SessionId resume handle, (Platform,ThreadId) index, transcript/repos as JSON columns) via SpecDialogSessionRepository over the scoped IUnitOfWork; no Redis write-through. ConversationState gains the spec-mandated shape (Mode=RunJob|SpecDialog, ThreadId, Transcript of user/assistant turns, ActiveScope) shared by both flows. Routing: SpecDialogRouter is the FIRST branch in SlackMessageDispatcher.DispatchAsync (new optional threadId+platform params; Slack/Teams endpoints pass them) — /spec commands and open-thread follow-ups never reach the IntentEngine, everything else falls through byte-identical (run path keeps its historical 'slack' platform label, surfaced as a follow-up design question). IPlatformAdapter.SendInfoAsync gains a threadId param (Slack: thread_ts; Teams: conversation id already thread-scoped) so replies stream threaded. Turn replies are session-aware receipts — the grounded design answer is p0315b. ServerDiLifetimeTests/NonDiCtorRuleTests now mirror AddRelationalPersistence (production has wired it always since p0246g). Tests 2762/2762 (+4 routing over real migrated SQLite incl. two-thread isolation + resume, +3 durable-store, +12 parser). -> .agentsmith/phases/done/p0315a-spec-dialog-session.yaml"
    p0167a: "PR-REVIEW PRESET 1/3 (backend). New pr-review pipeline preset: agent-smith PERFORMS the review (distinct from p0025's react-to-review-comments loop). PRESET (spec-drift mapped: FetchPullRequest folded into AnalyzePrDiff, retired BootstrapProject -> BootstrapCheck+BootstrapGate, AnalyzeProject == AnalyzeCode, LoadSkills added before Triage): LoadCatalog, PipelineNameInitializer, CheckoutSource (PR head via CheckoutBranch), BootstrapCheck/Gate, LoadCodingPrinciples, LoadContext, AnalyzeCode, AnalyzePrDiff, LoadSkills, Triage, RunReviewPhase (deliberately multi-phase — NOT the p0179 master collapse; p0167b's review skills are phase-scoped SkillRound emitters), CompilePrReviewFindings, WriteRunResult, PostPrComments (last two are p0167c handlers; preset parked on the contract test's KnownBrokenPresets, meta-test forces removal in c). Registered Structured / non-code-changing / skills-path skills/pr-review. WEBHOOKS: GitHubPrEvent/GitLabMrEvent/AzureDevOpsPrEvent handlers route pr-opened + pr-synchronize (GitLab: update REQUIRES oldrev so label/title edits don't trigger; AzDO: created/updated filtered to status=active — operator scopes the service hook to source-branch updates) via shared PrReviewRouteResolver: repo URL must match a configured project repo (normalized host+path; unmatched -> NotHandled+reason), a pipeline_from_label PR-label match overrides the pr-review default (the operator opt-out), dispatch via the legacy TriggerInput path with project name embedded + PR coordinates in InitialContext (PrNumber/PrHead/PrBase/PrAuthor/CheckoutBranch/SourceOverrideRepo — the last scopes Repos to the PR's repo). ANALYZE: AnalyzePrDiffHandler (new IPrDiffProviderFactory activates the dormant GitHub/GitLab/AzDO IPrDiffProviders) + UnifiedDiffParser (pure format parser: hunks with old/new line numbers from @@ headers, binary files metadata-only) publish ContextKeys.PrDiff (Domain PrDiffAnalysis/PrDiffFile/PrHunk/PrDiffLine) + authoritative PrHead/PrBase. Tests 2772/2772 (+25: preset shape/registration, 3x webhook handlers incl. label-override + unconfigured-repo, diff parse added/removed/context + multi-hunk + binary + sha overwrite). Residual manual: live open-a-test-PR webhook smoke (needs deployed webhook; routing proven by unit tests). -> .agentsmith/phases/done/p0167a-pr-review-preset.yaml"
    p0167b: "PR-REVIEW SKILLS 2/3 (cross-repo + backend). The four review skills the pr-review preset dispatches in its Review phase, plus the plumbing the spec implied but never named. SKILLS (agent-smith-skills feat/p0167b-pr-review-skills e3d2960, releases as 3.19.0 via release-please — spec's '2.8.0 tagged' is stale, operator merges+tags): skills/pr-review/{style,correctness,test-coverage,security-overlap}-reviewer, all role=judge output_schema=observation activates_when pipeline_name=\"pr-review\" (judge IS the review-phase slot — DeterministicTriageSelector fills Review.Reviewers from judges; no orchestration block so DiscussionRoundExecutor parses observations — structured executor never would). style: coding-principles (Domain Rules) only, never blocking; correctness: highest tier, blocking needs confidence>=70 + concrete failure scenario; test-coverage: diff vs ProjectMap-derived Existing Tests block, public-API-untested=high/private-helper=low; security-overlap: prompt-level role-mapper over the skills/security catalog dimensions scoped to changed lines (wrap-not-duplicate; NO C# cross-catalog dispatch — ISkillCallRuntime is the generic runtime every round already uses). concept-vocabulary pipeline_name enum += pr-review (SetEnum fence would throw on every run otherwise; also harness fixture + FallbackMinimal). BACKEND: (1) ObservationLineRange (Start,End) on SkillObservation, parsed from line_range 'start..end' (object/number drift tolerated in RawObservation), StartLine/EndLine backfilled only when unset, p0151b SourceAnchorValidator clears LineRange with File; observation-schema.md (embedded + skills repo) documents it. (2) PrReviewSkillRound command + PrReviewSkillPromptStrategy/PrDiffPromptRenderer inject PR coordinates + ContextKeys.PrDiff hunks with NEW-file line numbers (spec-implied: p0167a assigned PrDiff consumption to 'the pr-review skill rounds (p0167b)' but no prompt path carried it); GetSkillRoundCommandName('pr-review'), handler/context/builder/DI mirror the Security idiom. (3) confidence_threshold per-pipeline (pipelines: entry, 0-100 validated at load, default const 70 on ResolvedPipelineConfig) -> SkillResponseParser.ParseAndDowngrade(threshold) read from ResolvedPipeline by DiscussionRoundExecutor + VerifyRoundCoordinator; example yml + schema. TESTS 2800/2800 (+28): line_range round-trips/drift/downgrade, threshold default/lower/raise + resolver carry, roster parse via real YamlSkillLoader against the skills checkout (TestSkillsRoot pattern, skips when catalog lacks pr-review — green in-session via AGENTSMITH_TEST_SKILLS_DIR), activation filter excludes foreign-pipeline skills + judges land as Review reviewers. pr-review stays on KnownBrokenPresets until p0167c. Residual: operator merges/tags skills PR; live build-smoke (deliberate violation -> style observation with line_range) needs p0167c's comment posting — proven at parse/activation level. -> .agentsmith/phases/done/p0167b-pr-review-skills.yaml"
    p0167c: "PR-REVIEW OUTPUT 3/3 (backend). pr-review now DELIVERS: skill observations -> idempotent PR comments; pr-review REMOVED from KnownBrokenPresets (meta-test enforced the removal). COMPILE (CompilePrReviewFindingsHandler + PrReviewFindingSelector/PrReviewCommentRenderer, real-composition tested): excludes runtime execution markers via ExecutionLimitCategories (NOT a hard-coded four-skill-name list — a fifth review skill needs no C# change), validates every anchor against ContextKeys.PrDiff new-side lines (GitHub review-create 422s the WHOLE batch on one off-diff line, so bad anchors fold instead of killing the batch), groups by file+line_range (same-anchor findings merge into one comment, most severe first), caps 25 inline; excess + unanchored fold into the summary as 'Remaining N finding(s)'. Summary links result.md as run id + .agentsmith/runs/{runId}/result.md (spec's agentsmith:// MCP URI doesn't exist and there is no outbound dashboard base-URL config; renderer is the single change site when p0166c/p0169 land). Zero observations still compile a clean-review summary. Output: Domain PrReviewSummary(TopLevelComment, InlineComments<PrReviewInlineComment>) behind new ContextKeys.PrReviewSummary. POST (PostPrCommentsHandler): stamps '<!-- agentsmith:pr-review:{file}:{line} -->' / ':summary' markers at dispatch (idempotency convention lives in ONE class), then delete-marked-then-post via extended IPrCommentProvider (PostReviewBatchAsync + DeleteCommentsByMarkerAsync; PostCommentAsync unchanged for the dialogue trail). PROVIDERS (drift note: spec's GitHubPrCommentProvider.cs files are the existing GitHub/GitLab/AzureRepos SOURCE providers): GitHub = ONE raw Connection.Post review-create with line/side anchors (Octokit 14 typed API only speaks diff positions) + summary as deletable issue comment (submitted review bodies can't be deleted); GitLab = positioned MR discussion per inline (diff_refs fetched once; API-rejected position degrades to a plain note with marker intact) + paginated notes delete; AzDO = right-file-anchored CommentThread per inline + context-free summary thread + thread-comment delete. Tests 2806/2806 AgentSmith.Tests (+14: grouping/severity sort, 40 obs -> 25 inline + 'Remaining 15', off-diff/unanchored fold, execution-marker filter, clean summary, marker stamp, delete-then-post order, zero-findings summary-only, unsupported-repo fail, GitHub one-call batch payload + no-inline path, GitLab positioned batch + marker delete, AzDO thread anchors) + harness 51/51. Residual: live end-to-end smoke (open test PR, watch comments land) needs deployed webhook + skills 3.19.0 tag — preset shape, handler behavior and provider payloads proven by tests; GitHub/AzDO delete loops covered via GitLab-shape + handler-order tests (Octokit response models have no public ctors). -> .agentsmith/phases/done/p0167c-pr-review-output.yaml"
    p0317: "TICKET CONVERSATION + ATTACHMENTS REACH THE MASTER (backend + skills, requires p0316). The whole ticket now feeds the run: (1) COMMENTS — ITicketProvider.GetCommentsAsync (default empty) + TicketComment(Author, CreatedAt, Body); Jira reads the same /comment endpoint it posts to (ADF flattened via JiraAdfParser), GitLab the notes endpoint (system notes filtered), GitHub Octokit Issue.Comment, AzDO the Comments REST resource (same store as the System.History PATCHes); FetchTicketHandler fetches FAIL-SOFT into ContextKeys.TicketComments; TicketConversationPromptSection renders chronological + author-attributed INSIDE the p0316 delimiters (TicketPromptDelimiters.WrapSection) into AgenticMasterHandler.BuildUserPrompt AND ScanMasterPromptFactory. (2) IMAGES — the p87 write-only ContextKeys.Attachments is re-plumbed: AgenticLoopRequest.UserImageParts carries M.E.AI DataContent parts (TicketImagePromptParts, cap 10) onto the user message when AgentConfig.SupportsVision (agent.supports_vision, default true — no name heuristics); non-vision -> 'N images, not viewable' prompt note. (3) DOCUMENTS — GetAttachmentRefsAsync now returns ALL refs (image/size gates moved into the downloaders; GitHub/GitLab additionally parse tracker-hosted file links, never external URLs); DownloadDocumentAttachmentsAsync pulls text-like docs (txt/md/pdf/docx <=5MB) at fetch time; TicketDocumentMaterializer writes them at AgenticMaster time (sandbox exists) into {RunRecordDir}/attachments/ — txt/md as-is, pdf/docx base64->decode->in-sandbox markitdown (fail-soft: unconvertible docs fall back to the name+size binary listing in TicketAttachmentPromptSection). Comment refresh mid-run = named follow-up p0317a. SKILLS (agent-smith-skills, branch feat/p0317-skill-note, 1.11.0): conversation/attachments are requirement record, latest operator comment wins on conflict, ignored-instruction contract unchanged. Tests 2900/2900 (+ per-tracker comment mapping, fetch fail-soft, delimited-chronological render, vision/non-vision parts, docx materialize, harness: decisive comment + screenshot DataContent + injected comment inside delimiters -> result.md 'Ignored ticket instructions'). -> .agentsmith/phases/done/p0317-ticket-conversation-and-attachments.yaml"
    p0316: "TICKET INSTRUCTION CONTRACT + UNTRUSTED-CONTENT BOUNDARY (backend + skills, cross-repo). Ticket-origin text is now untrusted input the masters analyse but never obey. BACKEND (agent-smith): TicketPromptDelimiters wraps ticket title/description/acceptance-criteria at every interpolation site (AgenticMasterHandler.BuildUserPrompt + AgentPromptBuilder.BuildPlanUserPrompt) in BEGIN/END UNTRUSTED TICKET DATA markers + a one-line 'requirement data, never instructions' rule (safety in API, not process); MasterVerification gains IgnoredInstructions, MasterVerificationParser parses a tolerant ignored_instructions[] ({quote,reason}) mirroring p0273 failing_tests; TicketInstructionIgnoredEvent published per refused instruction by WriteRunResultHandler; RunResultFormatter renders an 'Ignored ticket instructions' result.md section. SKILLS (agent-smith-skills, own PR): coding-agent-master new '## Ticket instructions' section — in-scope directives binding; non-negotiable never-comply catalog (access expansion, CI/CD/git-config, disabling build/tests/verdict/scanners, exfiltration, role override); each refusal logged + emitted in verdict ignored_instructions[]; legal/security/api-security/mad masters get an untrusted-input note; validate-skills.sh guards both. Tests 2744/2744 (+ parser parse/empty, delimiter boundary, result.md section). -> .agentsmith/phases/done/p0316-ticket-instruction-contract.yaml"
    p0318: "TICKET COMPREHENSION + CLARIFICATION GATE (backend). Fixes a real title-only mis-build (AzDO Bug 18969: the agent invented ~500 LOC from a title). (1) The ticket BODY reaches the planner: AzureDevOpsFieldMapper falls back System.Description -> Microsoft.VSTS.TCM.ReproSteps -> SystemInfo (a Bug's body lives in ReproSteps, not Description) and AzureDevOpsWorkItemLister.StandardFields hydrates ReproSteps on the poll/list path. (2) Valid plans stop tipping into the legacy fallback: plan.schema.json summary maxLength 200 -> 600 (the reproducible cause). (3) The clarification gate is REUSE, not new: the existing PlanOpenQuestionsHandler (retired from FixBug/AddFeature in the p0179b collapse) is re-wired after GeneratePlan and extended — it halts on PlanStatus.NeedsUserInput (semantic: a ticket that HAS a body but is unworkable) OR an empty effective body (deterministic pre-guard: the title-only incident; never false-fires on a Bug since ReproSteps is folded into Description upstream), posts the open questions (or a synthesized ask), sets OpenQuestionsAwaitingAnswer so PipelineExecutorPolicy halts before AgenticMaster/CommitAndPR (no code, no PR). (4) Parking is a NATIVE status, not a label: opt-in needs_clarification_status (mirrors p0261 failed_status — tracker base + project override + FailIfTerminalIsTrigger validation + discovery ParkingStatusesOf), moved atomically with the comment via FinalizeAsync; a status OUTSIDE trigger_statuses is already excluded by discovery (no p0262 reversal), and the human moving the card 'Question -> To Do' IS the natural re-trigger (a label would strand tickets — clearing it is not an obvious action). Unset -> gate posts + halts but does not park. DEFERRED to p0318b (no silent defer): preserving a real needs_user_input across a strict-parse failure (the rest of step-2b, which conflicts with p0276's best-effort GeneratePlan) + the RealCompositionHarness end-to-end proof. Tests 2739/2739 (+ mapper ReproSteps fallback, summary-cap 600, gate empty-body + park-status, discovery parking). -> .agentsmith/phases/done/p0318-ticket-comprehension-and-clarification-gate.yaml"
    p0300c: "POLLER/DISCOVERY + RUN-LIFECYCLE HARDENING (backend). Discovery now filters by the agent-smith TRIGGER label, not just the routing tag: p0283b pushed status + the PROJECT routing tag server-side, but that tag is a broad business tag so every ticket carrying it was fetched, hydrated and TicketScanned/TicketSkipped-spammed each poll then dropped in-process for lacking a pipeline_from_label trigger. Fix is provider-capability-tiered — AzureDevOpsDiscoveryWiqlBuilder AND-s [System.Tags] CONTAINS 'agent-smith:' (prefix substring covers every agent-smith:* trigger+lifecycle label, unconditional, no key resolution); JiraDiscoveryJqlBuilder AND-s labels IN (<tracker's pipeline_from_label keys>, carried on new DiscoveryQuery.TriggerLabels from TrackerDiscoveryQueryBuilder); GitLab/GitHub keep the documented in-process filter (label params AND-only, no prefix, repo-scoped = bounded). EnqueuedReconciler now routes each enqueued ticket through IEnvelopeProjectResolver (the poller's matcher) before EnqueueAsync — on a shared tracker (many projects, one org tracker) ListByLifecycleStatusAsync returns EVERY project's enqueued tickets, so the old per-project loop duplicated a ticket onto every project → a second sandbox set that 403s on the k8s memory quota; resolving also yields the correct pipeline (dropped the 'fix-bug' guess, swapped IPipelineConfigResolver→IEnvelopeProjectResolver). RelationalPersistenceExtensions ConfigureWarnings downgrades EF's built-in RelationalEventId.ConnectionError to Warning so a poll-timeout-cancelled agentsmith.db connection stops logging a misleading FAIL (the SqliteTuningInterceptor still Errors genuine failures). CommitAndPRHandler hoists the RunOutcomeKeystone above the PR loop and opens a red-verdict run's PR as a DRAFT with a 'Verification red' body banner (visible, non-mergeable, not a vanished run) — ISourceProvider.CreatePullRequestAsync gains an optional isDraft (GitHub NewPullRequest.Draft, AzDO GitPullRequest.IsDraft, GitLab 'Draft: ' title prefix). Tests 2739/2739 (+5 spec tests: AzDo prefix guard, Jira labels-IN, reconciler cross-project no-dup, EF ConnectionError→Warning wiring, red-build draft PR). -> .agentsmith/phases/done/p0300c-poller-discovery-and-run-lifecycle-hardening.yaml"
    p0269a: "CAPACITY-AWARE ADMISSION (server, slice of p0269). Two tickets that don't fit together are now processed SEQUENTIALLY via a PROACTIVE gate: SpawnPipelineRunsUseCase asks ISandboxCapacityProbe (k8s reads the namespace ResourceQuota hard-vs-used; Docker counts labelled sandbox containers vs a max_concurrent_sandboxes cap, default 2; InProcess/CLI Unbounded admits) with the p0268 project-level footprint BEFORE claiming — no fit => ClaimOutcome.Queued WITHOUT claiming, ticket stays in trigger status, next poll retries (the poller re-discovery loop IS the sequencer, no new scheduler). k8s TOCTOU fallback (looks-like-it-fits-but-doesn't): the quota-Forbidden pod-create is a STRUCTURED 403 mapped at the KubernetesSandboxFactory boundary to a typed CapacityExhaustedException; PipelineExecutor skips HandleFatalFailureAsync for that type (native status NOT terminalized) and ExecutePipelineUseCase publishes RunFinished status='queued' (not failed) + releases the lease so the EnqueuedReconciler re-enqueues. Docker without limits has NO create-time signal (OOM is later, indistinguishable from a crash → no reactive guess, a real OOM stays an honest fail; feedback_no_heuristic_for_missing_data). RBAC: server SA gains resourcequotas get/list. NO ticket comment (operator: not wanted). Tests: full backend suite 2733 green (+ probe hard-vs-used math, quota-message mapping vs RBAC-403, Docker cap, admission-defer-no-claim, executor requeue-not-terminalize). -> .agentsmith/phases/done/p0269a-capacity-admission.yaml"
    p0269b: "QUEUED RUN RENDERING (dashboard, slice of p0269). RunCard renders status='queued' as a calm 'queued — waiting for capacity' state (amber tone, terminal so no cancel button — the ticket re-runs automatically); runStatus.toNodeStatus maps 'queued' to the 'wait' glyph. System-view TicketTriggered 'Queued' outcome is visible via the existing generic triggered-event rendering (bespoke styling left as low-value polish, logged in decisions, not silently dropped). Tests: full dashboard suite 316 green (+ RunCard queued label/no-cancel, toNodeStatus queued->wait); pnpm build green. -> .agentsmith/phases/done/p0269b-queued-run-rendering.yaml"
    p0300b: "SILENT-DEGRADATION HARDENING (backend). Closed the swallowed-error paths flagged in the 2026-07-05 gap analysis. NucleiSpawner.BuildEndpointUrls: swagger-parse failure now logs WARN + sets NucleiResult.Degraded/DegradedReason (scan still runs base-URL-only, but the partial coverage is visible, not silently clean). SpectralSpawner.ParseJsonOutput: non-JSON output logs the raw head at WARN and THROWS (Spectral always emits JSON when healthy, so returning empty falsely reported zero findings) — fail-loud. DeliverFindingsHandler.ResolveOutputDir: WARN per unwritable candidate + WARN on temp-dir fallback (was bare catch). Verified the p0128 concern is ALREADY handled — MergeMasterFindingsHandler keeps raw scanner findings on an unparseable master answer, pinned by MergeMasterFindings_UnparseableAnswer_LeavesRawObservationsUntouched. Audited VerifyRoundHandler: still wired (SkillRunHandlersExtensions + IVerifyRoundCoordinator), not dead — kept. Tests 2717/2717, Harness 51/51. -> .agentsmith/phases/done/p0300b-silent-degradation-hardening.yaml"
    p0300a: "TRACKER PARITY — Jira native workflow transitions (backend). GitHub/GitLab/Jira/AzDO lifecycle search was ALREADY implemented (all four override ListByLifecycleStatusAsync via label/tag search; the gap analysis misread the empty interface default) — so p0300a reduced to Jira native transitions. New opt-in: a lifecycle_status_names map on the Jira tracker (config presence = native mode, not auto-probe — you cannot map internal claim states to arbitrary workflow status names without the operator naming them). Native path drives JiraTransitioner (GET /transitions -> match by mapped status name -> POST); JiraTransitioner now returns bool so an unmapped state or no-matching-transition falls back to the label transition — labels stay the always-available record carrier, so a lifecycle change is never silently lost. Removed the dead 'Native-mode lands in p95c' Failed stub. Config flows RawTrackerEntry -> TrackerConnection -> JiraTicketConnection -> factory-built JiraLifecycleStatusMap; unknown lifecycle keys warn. Tests 2717/2717 (+native mapped/unmapped/no-match + catalog native-mode + TryParseName). -> .agentsmith/phases/done/p0300a-tracker-parity.yaml"
    p0299: "MULTI-SANDBOX COMMIT CONSOLIDATION (backend). Completes the p0249 fix at the commit layer: SandboxesForRepo already returns ALL of a repo's sandboxes, but CommitAndPRHandler/InitCommitHandler committed only matches[0] — so a mixed-stack monorepo (e.g. backend dotnet + frontend angular = two toolchain pods, two independent clones of the same repo) silently dropped every edit that landed in a non-primary sandbox. Fix: new SandboxGitOperations.ConsolidateSecondarySandboxesAsync folds each secondary sandbox's staged diff into the primary before commit — StageAll on the secondary, GetStagedDiff, write it to an untracked .git/agentsmith-consolidate.patch in the primary (via ISandboxFileReaderFactory; RunStepAsync has no stdin), then git apply. Best-effort (a bad hunk is logged not thrown, so the primary's own edits survive); single-sandbox repos take an early return (matches.Count<=1) and behave exactly as before. Both handlers call it and info-log 'consolidated N secondary sandbox(es)'. SandboxGitOperations now takes ISandboxFileReaderFactory; 5 test construction sites + a StubSandboxFileReaderFactory helper updated. Component paths are disjoint (backend/ vs frontend/) so applies are conflict-free; one atomic commit+push → one clean PR (idempotent via p0298), no non-fast-forward push races. AgentSmith.Tests 2702/2702. -> .agentsmith/phases/done/p0299-multi-sandbox-commit-consolidation.yaml"
    p0298: "IDEMPOTENT CreatePullRequestAsync for GitLab + GitHub (backend). A ticket re-run whose branch already has an open PR/MR failed at the PR step: GitLab did a blind POST (409 'Another open merge request already exists') and GitHub's Octokit PullRequest.Create threw 422 ('A pull request already exists'), both propagating to CommitAndPRHandler/InitCommitHandler → OpenStatus.Failed. AzureRepos already handled this (catch TF401179 → FindExistingPrUrlAsync); mirrored it: GitLab branches on response 409 → GET /merge_requests?source_branch=<b>&state=opened → existing web_url; GitHub catches ApiValidationException 'already exists' → PullRequest.GetAllForRepository(head owner:branch, State=Open) → existing HtmlUrl. Reuse = OpenStatus.Opened, not Failed; body not refreshed (branch push already updates commits). Local stays a no-op. Tests: GitLab wire (create + 409→reuse), GitHub detection predicate (internal). AgentSmith.Tests 2700/2700. -> .agentsmith/phases/done/p0298-idempotent-create-pull-request.yaml"
    p0297: "GITLAB PROJECT-ID DOUBLE-ENCODE FIX (backend). Root cause of the workforce monorepo verify failure that survived the branch + GITLAB_URL fixes: GitLabSourceConnection.ProjectPath is factory-URL-escaped (namespace%2Fname), and the probe/default-branch calls used it raw (correct), but ListDirectory/TryReadFile/PostComment/UpdatePullRequestBody re-escaped it (Uri.EscapeDataString) → %252F → GitLab 404 → .agentsmith/contexts listing returned empty → SandboxLanguageResolver synth-defaulted to 'default' → verify failed 'contexts/default/context.yaml not present'. Flat user/repo escapes to a no-op so only deeply-nested subgroups (gms/s1/scheduling/workforce) hit it; the probe used the raw path so connection-diagnostics showed GitLab OK. Fix: use _projectPath raw at all 4 sites. The TryReadFile test built the connection with a RAW path (group/repo) — disagreeing with the factory and hiding the double-encode; aligned it to group%2Frepo + added a ListDirectory single-encode wire test. AgentSmith.Tests 2696/2696. -> .agentsmith/phases/done/p0297-gitlab-projectpath-double-encode.yaml"
    p0296: "SELF-CONTAINED GITLAB ADDRESSING + QUIET DB CANCELLATIONS (backend). Live-debug hardening from the workforce session. (1) SourceProviderFactory.CreateGitLab now derives the GitLab API base URL from the repo url's own scheme+authority (new internal ResolveGitLabTarget) instead of GITLAB_URL ?? gitlab.com — a self-managed intranet url (git.intranet.gms-online.de/...) no longer silently talks to gitlab.com and 401s on .agentsmith/contexts; GITLAB_URL demoted to an optional override for sub-path installs. GitHub already did this. Tracker GitLab factories left (operator uses Jira; different semantics). (2) SqliteTuningInterceptor.LogFailure downgrades OperationCanceledException to Debug — an aborted-request/shutdown DB-open cancel is expected, not a FAIL-with-stacktrace; real SqliteException/other stay Error. AgentSmith.Tests 2695/2695. -> .agentsmith/phases/done/p0296-selfcontained-gitlab-and-quiet-cancels.yaml"
    p0294: "ROBUST LLM-JSON RESPONSES (backend). init-project stopped failing at Discover/AnalyzeCode when Sonnet 4.6 wraps its JSON in a prose preamble ('N'/'T' is an invalid start of a value). Two guaranteed fixes: (1) ProjectMapJsonReader + DiscoveryOutputParser now try strict parse first, then the first balanced {...} the existing TolerantJsonObjectScanner yields (same pattern as MergeMasterFindings/Consolidation) — a prose-wrapped object parses; (2) ProjectAnalyzer + BootstrapDiscoverHandler log the truncated raw response on parse failure (the 'check logs for raw responses' message was never actually logging it; parsers stay pure per coding-principles, logging in the callers). Structured output: a wire test proved Anthropic.SDK 5.10.0 DOES forward ChatOptions.ResponseFormat as output_config.format json_schema (contradicting the p0185-pin doubt) — but wiring the nested ProjectMap/DiscoveryOutput schemas live is a 400-regression risk unverifiable offline, so sliced to p0295. AgentSmith.Tests 2690/2690, Harness 51/51. -> .agentsmith/phases/done/p0294-robust-llm-json-responses.yaml"
    p0293: "CONNECTIVITY PROBES — full coverage on /system/connections (backend + dashboard). Extends p0292 so every runtime connection is probeable, not just repos/trackers. Agents: IChatClientFactory.ProbeAsync (DEFAULT interface member; ChatClientFactory overrides) builds the BARE provider client + sends a 1-token request — catches bad key / wrong Azure deployment / dead endpoint; ChatClientFactory.cs is exempted in ChatClientCallScopeRuleTests since it emits no LlmCall event. Sandbox: IJobSpawner.ProbeAsync — Docker System.PingAsync / K8s ListNamespacedPod in the spawner's own namespace (permission-aligned). Infra: IInfraConnectivityProbe — Redis PING + AgentSmithDbContext.CanConnectAsync via IServiceScopeFactory (scoped DbContext, singleton probe). Chat: IChatConnectivityProbe — Slack auth.test / Teams Bot-Framework token, only when credentials are set. All join p0292's ProbeTarget→ConnectionStatus path with a new Category (service/agent/infra/chat); dashboard groups the list by category, agent group carries a 'tiny LLM call' cost note. Container registry EXCLUDED (deploy infra). Tests: backend 2685 green (+11: chat-factory probe ok/throw/no-builder, diagnostics enumerate+categories+slack+redis), dashboard 314 green (+1 grouping/cost-note). -> .agentsmith/phases/done/p0293-connectivity-probes.yaml"
    p0292: "CONNECTION DIAGNOSTICS (backend + dashboard). Active connectivity testing for every configured repo + tracker, plus an honest webhook panel — the ACTIVE complement to ConfigView's static 'how it's wired'. Backend: ProbeAsync added as a REQUIRED member on ISourceProvider + ITicketProvider (ConnectionProbeResult{Ok,LatencyMs,Error}); every provider implements its cheapest read-only authenticated round-trip (GitHub Repository.Get, GitLab GET project, AzDO GetRepository / WIQL id=0, Jira GET /rest/api/3/myself) and never throws — failures become Error. No ListOpenAsync-based default (would report false 'ok' for non-listing providers). ConnectionDiagnosticsService enumerates config.Repos (skips Local) + config.Trackers; GET /api/diagnostics/connections lists them WITHOUT probing (on-demand only, to spare rate limits), POST /api/diagnostics/connections/{name}/probe runs one probe; both gated by AGENTSMITH_UI_API_ENABLED. Webhooks are inbound → no active test: WebhookDeliveryTracker records last-seen per platform in a Redis hash (advisory; degrades to 'never seen'), and the panel shows secret-configured (env for github/gitlab/azuredevops, per-project JiraTrigger.Secret for jira) + last delivery. Dashboard: new /system/connections page (AppRail + SystemView slug), diagnosticsApi.ts, ConnectionsView with StatusPill + per-row Test + 'Test all' (client-side fan-out) + WebhookPanel. Renumbered from the stale p0284-connection-diagnostics draft (p0284 was already merged as jira-endpoints-overridable). Tests: backend 2674 green (+8: diagnostics enumerate/skip-Local/probe/webhook-secret, GitLab probe ok/401/transport), dashboard 313 green (+3: list/test-click/webhook-panel). -> .agentsmith/phases/done/p0292-connection-diagnostics.yaml"
    p0285: "STATIC CONNECTION REPO REFS (backend config loader). An exact (wildcard-free) connection/<name> repo ref now resolves DETERMINISTICALLY via a new IConnectionRepoUrlBuilder — URL built from the connection's type+org/project(+name), byte-identical to the discovery providers — so a project can list a clear, bounded repo set that loads even when the glob expander is absent (no discovery round-trip). Glob refs (pattern has '*') keep the discovery path. ResolveRepos partitions exact vs glob/exclude; RepoGlobRef gains IsGlob. Optional per-repo default_branch override via an object entry {repo, default_branch} — RawProjectEntry.Repos is now List<RawRepoRef> with a custom IYamlTypeConverter (scalar→Ref, mapping→Ref+branch; preserves all plain-string configs). DefaultBranch may stay null → source providers resolve the repo's real default at clone (matches discovery). Schema project.repos → oneOf string|{repo,default_branch}; docs updated. Build clean; AgentSmith.Tests 2665/2665, Sandbox.Agent 86/86, Harness 51/51, p0285 tests 7/7. Verified in an isolated worktree off main. -> .agentsmith/phases/done/p0285-static-connection-repo-refs.yaml"
    p0283b: "TICKET-DISCOVERY COMPOSED QUERY (backend). Replaced p0283a's status-only narrowing + the leaky `statusCategory != Done` (which re-read agent-smith's own done_status 'In Review' — NOT category Done) with a query composed PER routed project from its per-tracker trigger (TriggerSelectionHelper.ByTrackerType): a structured DiscoveryQuery (DiscoveryBranch{statuses, criterion} + config-derived parking statuses), one branch per project, OR'd, translated by per-provider builders. AzDO pushes the FULL branch `[System.State] IN (...) AND ([System.Tags] CONTAINS | [System.AreaPath] UNDER)` (Tags CONTAINS verified case-insensitive full-tag = parity with the p0140a in-process matcher); ALL providers push the resolution TAG too (Jira labels=, GitHub ListByLabels, GitLab labels=) — status-only does NOT solve the scaling case (1000 tag-less tickets in a trigger status are still fetched + discarded). JQL labels= is exact/case-sensitive but the operator sets both config tag and ticket label, so they align; the in-process matcher stays the net. Positive allowlist → done/failed parking statuses (union across the tracker's projects; verified only those two terminalize the native status — working=comment-only, cancel=lease-only) appear in no branch, so a finished ticket is never re-read; a broad branch (inexpressible criterion / empty statuses) excludes parking explicitly. Build logic EXTRACTED to an injectable TrackerDiscoveryQueryBuilder (SRP; keeps the poller from bloating; unit-tested directly). MaxBranches=25 collapse-to-broad backstop. ListClaimableAsync(DiscoveryQuery) REPLACES ListOpenByStatusesAsync (deleted, no shim); GitHub/GitLab narrow by open+tag via AllTagLabelsOrNull (p0283c folded in). Also fixed a JQL precedence bug — the project scope wraps the OR-body in parens. LOG cleanup alongside: CORS always allows loopback origins (dashboard is operator-local, so :3002 works without env), TicketProviderFactory.Create logs one line not three, ConfigFileRead deduped to real file changes (not every poll), and Microsoft.AspNetCore.Http.Result filtered to Warning. Tests: full suite green (2666). -> .agentsmith/phases/done/p0283b-composed-discovery-query.yaml"
    p0283a: "TICKET-DISCOVERY SCALING + 2 BUGFIXES (backend; landed this session, code-only — no spec). Discovery fetched ALL open tickets then filtered in-process; at 1000+ that floods streaming/UI and silently truncated (Jira first-page=100, AzDO top:50). Added: real paging + a hard cap with warn-log to all 4 providers (no silent truncation); before/after debug logging of the actual query (JQL/WIQL/URL) + result at every provider call site; status-only narrowing (SUPERSEDED by p0283b's composed query). Plus two operational bugfixes that survive: CORS multi-origin + any-loopback-in-dev (dashboard was single-origin :3000, so :3002 was rejected), and a SqliteTuningInterceptor (WAL + busy_timeout to stop concurrent-access lock failures + log the REAL exception on connection-failure instead of the opaque EF `Database.Connection` line). -> code-only (no spec file)"
    p0281a: "p0281 slice — CONNECTIONS + OUT-OF-BAND REPO DISCOVERY + GLOB (backend Contracts/Core/Infrastructure/Server + schema + sample). A `connections:` catalog holds host/org/auth ONCE (azure_devops=org+project, github=owner, gitlab=group, +host override); repos are DISCOVERED under a connection via the provider REST API (AzureDevOps/GitHub/GitLab providers, paginated, default-branch from the provider) and a project selects them with `connection/glob` (+ `!exclude`), coexisting with the legacy repos: catalog (escape hatch). KEY ARCHITECTURE (refined from the spec's 'API call in the load path' premise, operator-approved): discovery is OUT-OF-BAND — LoadConfig is sync + called per-webhook/poll (~30 sites), so a background RepoDiscoveryRefreshHostedService warms (on-start) + refreshes (5-min) a per-connection snapshot (InMemoryConnectionRepoSnapshot hot cache + DiskConnectionRepoSnapshotStore durable last-good); the sync RepoGlobExpander only READS the snapshot, blocking ONCE on a cold connection via the refresher (live discovery → snapshot+durable; failure → last-good stale-warn; cold → fail-loud). Resolved set logged per connection so glob drift is visible. ConfigCatalogResolver gained an OPTIONAL RepoGlobExpander (null in test `new()`s → legacy-only; DI injects the real one, ValidateOnBuild green). Disk-only durable store for server+CLI (Redis follow-up only for multi-replica). Auth via fixed env vars per host type (matches SourceProviderFactory). LIVE-VERIFIED with .env creds: ADO discovered 96 repos for the real org, GitHub 13 for the owner, correct default branches + clone URLs + pagination. Tests: full suite green (2651, +15: glob matcher/ref parse/expander include-exclude/cold-trigger/unknown-connection/repo-build + refresher success/last-good-fallback/cold-fail-loud). -> .agentsmith/phases/done/p0281a-connections-repo-discovery.yaml"
    p0281d: "p0281 slice — PROJECTLESS CLI SCANS (backend CLI + use case + sample). PipelineRequest gained optional AgentName; ExecutePipelineUseCase.ResolveProject branches on it — AgentName (from --agent) builds an EPHEMERAL ResolvedProject (named agent from the agents: catalog + ONE synthetic local repo at --source-path, no tracker/catalog-repo lookup), else the legacy ProjectName->projects: catalog path unchanged. Ephemeral build is a pure private static mapping (no new ctor dep, no test-construction churn); the synthetic repo reuses the existing source-checkout path and mirrors the retired cicd-noop placeholder (passive scan -> /var/empty empty path; active -> --source-path). api-scan + security-scan gained --agent; security-scan's --project lost IsRequired with a runtime one-of guard; --project stays working (deprecated) and --agent wins when both given. The noop-source repo + stub scan projects are no longer needed to run a scan (their removal is p0281e). Tests: full suite green (2636, +3: ephemeral-from-source-path / agent-wins-over-project / unknown-agent-throws). CLI dry-run smoke confirmed: security-scan --agent w/o --project works, api-scan --agent prints the pipeline, neither-flag errors cleanly. -> .agentsmith/phases/done/p0281d-projectless-cli-scans.yaml"
    p0281c: "p0281 slice — DEPLOYMENT VERSION PIN (backend + schema + sample). One top-level `deployment: {registry, version}` feeds BOTH the orchestrator container image and the sandbox-agent image (same release tag → one knob, not two kept in sync). New DeploymentDefaultsApplier runs on the raw config in the loader and FILLS the legacy SandboxGlobalConfig/OrchestratorGlobalConfig image fields from deployment ONLY where unset — so the two image resolvers stay byte-for-byte unchanged and a present legacy block (sandbox.agent_version / orchestrator.{registry,version}) still WINS (back-compat). Sandbox registry treated as unset when empty OR == built-in default so deployment.registry has authority over the unconfigured default. Per-project orchestrator image override DROPPED: OrchestratorImageResolver resolves from the global pin only + warns when a project declares orchestrator.registry/version (orchestrator.resources stays per-project); the 2 override tests flipped to assert override-ignored/global-wins. Example: top-level sandbox+orchestrator image blocks collapsed to one `deployment:` pin. Tests: full suite green (2633, +6 applier: deployment feeds both / legacy orchestrator+sandbox win / registry-default-superseded / no-deployment-untouched). -> .agentsmith/phases/done/p0281c-deployment-version-pin.yaml"
    p0281b: "p0281 slice — TRACKER OWNS THE WORKFLOW (backend + schema + sample). New EffectiveTriggerBuilder runs on the RAW config before ProjectConfigNormalizer and materializes each project's effective *Trigger from (tracker workflow + flat resolution shorthand + any explicit project override), so all ~10 webhook handlers/pollers/validators read the pre-merged trigger unchanged. TrackerConnection/RawTrackerEntry gain trigger_statuses/failed_status/pipeline_from_label (done_status/polling/open_states already there); a project now needs only `resolution: {strategy-key: value}` (key = tag|area_path|repo|to_address) and the trigger TYPE is inferred from tracker.type. Merge is field-by-field project->tracker->built-in; trigger_statuses falls back to the tracker's existing open_states (the DRY win — no field repeated). done_status inherits only in the no-wrapper case (YamlDotNet can't tell omitted from the non-null 'In Review' default); an explicit wrapper = explicit mode (still loads identically, back-compat). Unknown resolution key throws. NO per-wrapper deprecation warning (the wrapper is the supported override, not legacy). Example config: acme-platform converted to the terse shape (workflow moved onto acme-ado tracker). Tests: full suite green (2628, +18: EffectiveTriggerBuilder inherit/override/shorthand-per-strategy/type-inference/open_states-fallback/unknown-throws/legacy-wrapper-identical). -> .agentsmith/phases/done/p0281b-tracker-owns-workflow.yaml"
    p0280: "FUNCTIONAL spawn_agents — fan-out for scan AND coding masters (backend). The p0177 sub-agent path was a scaffold wired into NOTHING: children got hosts: Array.Empty (no tools), no IRunEventReader impl existed, no observation events were ever published, read_sub_agent_observations had nothing to read, and neither SpawnAgentToolHost nor the reader was ever constructed — yet both masters' SKILLs advertise spawn_agents (a lie to the model). Completed it. KEY DESIGN: children SHARE the master's FilesystemToolHost (made thread-safe), so every child read lands in the master's fs.ReadPaths and every child write in its GetChanges() — the p0279 source-anchoring + the CommitAndPR git keystone include children's work with ZERO plumbing (collapses the reviewer-#3 child-read-set aggregation into 'they share the instance'). Child detail flows via a new in-memory scoped IChildAnswerStore (subAgentId->final answer), NOT the never-built Redis IRunEventReader: SubAgentRunner stores each child's answer; read_sub_agent_observations (repointed at the store) returns it; the master pulls children's findings back and SYNTHESISES (central refute/dedup preserved). SubAgentContext now carries the granted ChildTools + the store; SubAgentRunner.BuildLoopRequest uses ChildTools (fixes hosts: Array.Empty); children never get spawn_agents (no recursion). AgenticMasterHandler appends spawn_agents + read_sub_agent_observations to BOTH the scan Review surface (read-only children) and the coding ReadWriteWithHuman surface (read/write children), gated on LoopLimitsConfig.MaxSubAgentsPerRun > 0 (default 20). Coding fan-out: children write disjoint pieces into the shared sandbox working tree, the master verifies. EstimateCostUsd left 0m (run-total cost is correct via the shared tracker; per-child USD is cosmetic). SKILLs already advertise spawn_agents — now TRUE, no skills change. Redis per-child event timeline for the dashboard is a separate optional follow-up. Tests: full suite green (2610 + 51 + 86), +9 (thread-safe concurrent fs / child gets granted tools / child answer stored / reader returns store answer / scan+coding+disabled surfaces). 110 preset dry-runs green; coding path (fix-bug harness) green."
    p0279: "SCAN DEPTH (A-lite) + SOURCE ANCHORING (backend + skills). Two fresh current-main runs proved p0278 deployed but THIN: the scan master read ~4 cross-cutting files, 921/8192 output tokens, 0 endpoint handlers, then stopped; findings claimed analyzed_from_source but carried no file:line ('2/2 missing a file'). FIX has two halves. (A-lite) COVERAGE re-drive: FilesystemToolHost now tracks distinct read paths; AgenticMasterHandler's scan branch, if the master read < agent.scan_min_source_reads (default 6) source files, re-prompts ONCE via IScanMasterPromptFactory.BuildCoverageNudge (inventory the FULL surface, review each area, read its code) and re-collects. Read-count signal (not 0-sub-agents) catches the real 'read 4 then stop' case; honest — prevents a near-empty pass, does NOT guarantee every class checked. (B) ANCHORING: api-security-master Output gains file+start_line (it had api_path but no source location, so code-anchored findings couldn't carry a location); AgenticMasterHandler publishes ContextKeys.MasterReadPaths; CollectMasterFindings + MergeMasterFindings thread it into ObservationParser.TryParseWithoutIds(readPaths) so an analyzed_from_source claim on a file the master never read downgrades to potential. The match is a LENIENT ReadPathNormalizer (normalized-equal / '/'-aligned segment-suffix / basename) because read paths are repo/sandbox-prefixed while the model writes free-form files — exact match would false-downgrade legit findings (reviewer #4). PARALLEL FAN-OUT was DEFERRED to p0280 after a premise-check: the p0177 child machinery is a skeleton (SubAgentRunner.BuildLoopRequest passes hosts: Array.Empty → children get no tools), so real fan-out is a subsystem completion, not an add. Skills (api 1.2.1→1.2.2, security 1.1.1→1.1.2, agent-smith-skills PR #105): file/start_line + both masters scrubbed of language/framework artifact terms (no controller/.cs/Startup) — methodology speaks only of responsibilities, holds for any stack; enforced by an explicit denylist (controller/startup/asp/angular/spring/django/rails/express/dotnet/program.cs/extensions) while handler/cli/job/endpoint/middleware stay allowed (reviewer #5). NOTE: skill-content guard is a manual grep (cross-repo gap, same class as the 200-char description cap); the 8 behavioural tests are automated. Tests: full suite green (2603 + 51 + 86), 110 PipelinePreset dry-run tests green (all presets), coding path untouched. Coordinated skills bump must be pinned to deliver."
    p0278: "SCAN MASTER INPUT + FRAMING (backend-only). A live api-security run after p0267/p0277 came back 0 findings AND green — hollow: the master made 3 tool calls (DirectoryTree x2, `dotnet test`), 131 output tokens, emitted no observation array. Two root causes, both in AgenticMasterHandler, which is hardwired for the CODING contract: (1) the master was BLIND to the scanner outputs — nothing reads NucleiResult/ZapResult/SpectralResult or the OpenAPI spec into the prompt (p0179d retired CompressApiScanFindings, the only feeder), so the 195 Nuclei + 4 ZAP findings were silently discarded; the p0267 premise 'raw results stay prompt-only INPUTS to the master' was never implemented. (2) the master got the coding USER PROMPT ('implement your change + verify build/tests') + the read-write tool surface (the 'read-only' Plan set still includes run_command!), so gpt-5.1 ran `dotnet test` and concluded 'nothing to change'. FIX (backend): gate scan-vs-coding in AgenticMasterHandler on output_schema == observation (reuse p0267 IMasterOutputSchemaResolver). For a scan master: user prompt = new IScanMasterPromptFactory (scanner findings inline via ApiScanFindingsCompressor for api / formatted SkillObservations for security, + the compressed swagger for api, + 'review the source, emit your observation array, do NOT modify code / run build or tests'); tools = new AgenticToolSurface.Review = the BootstrapDiscover filesystem set (the ONLY one without run_command/http_request/write) + log_decision; the verdict-nudge + verdict warning are skipped. Coding path is byte-for-byte unchanged when isScanMaster is false. Skills: VERIFIED already aligned — the 1.2.1/1.1.1 methodology rewrites already frame inputs as 'handed to you / in the pipeline context' with no findings.json/read-sandbox wording, so NO skills change + no bump needed. Tests: full suite green (2589 + 51 + 86), +7 named (scan master review-prompt+read-only-tools / coding master unchanged / scan no apply-or-verdict-nudge / factory api includes Nuclei+ZAP+spec / factory security formats raw observations / factory always forbids code-changes+build / Review surface read-only no write/run). NOTE: this proves the master is FED + FRAMED right; finding QUALITY needs a live run (operator). The cicd-noop-source repo-name cosmetic stays out of scope."
    p0277: "SECURITY-SCAN MASTER-TRIAGE DELIVERY (backend + security-master skill). Same orphaned-master-output class as p0267, masked: the security-scan preset had NO consumer of the master's answer, so the security-master's triage (dedup/prioritization/FP-suppression) was discarded and DeliverFindings shipped the RAW scanner dump (StaticPattern/GitHistory/DependencyAudit AppendObservations) as if final. The master even wrote a findings.json nothing reads — doubly dead. FIX is REFINE-WITH-SAFETY-NET, not pure replace (the code scanners carry HARD evidence — file:line, secrets, CVEs — that an LLM omission must never silently drop): a DISTINCT MergeMasterFindings step (security-scan only, reuses p0267's IMasterOutputSchemaResolver + MasterAnswer/MasterSkillName) sets SkillObservations = master-curated array + every uncovered High+ deterministic raw fact; low/medium scanner noise the master does not re-state is suppressed. Collision identity = (File,StartLine) only (Role/Description excluded — master rephrases), master wins on collision (recalibrate), uncovered High+ ships verbatim. EMPTY-BUT-VALID [] (merge+suppress) vs UNPARSEABLE (skip, full raw fallback, no regression) are separated via tolerant ParseArray array-ness detection because TryParseWithoutIds returns null for both. SecuritySnapshotWriter repointed at the pre-merge raw set (ContextKeys.RawScannerObservations, stashed by the merge; falls back to SkillObservations) so the git-based SecurityTrend stays raw-vs-raw consistent (no phantom delta); DeliverFindings + SpawnFix keep reading the merged set. Skill (security-master 1.0.0→1.1.0, separate agent-smith-skills PR #101): same five-phase methodology as api-security-master 1.2.0 (Inventory→Hypothesize→Verify→Refute→Synthesize), observation-array Output + output_schema: observation, findings.json removed; told the High+ deterministic facts ship on their own (don't re-list; override only by addressing the same file:line + log_decision). Stacked on p0267 (#319) since it requires that plumbing. Tests: full suite green (2582 + 51 + 86), +8 named (uncovered-High survives / low suppressed / same-location collision prefers master / empty-but-valid keeps High suppresses low / unparseable leaves raw / coding-schema skips / snapshot counts raw not merged / preset orders merge between master and deliver). NOTE: requires the coordinated security-master skills bump pinned to deliver the triaged report in production."
    p0267: "API-SECURITY FINDINGS DELIVERY (backend + api-security-master skill). An api-security scan always reported 0 findings: p0179d collapsed the pipeline to one AgenticMaster step, the master triaged into a findings.json nothing reads, and DeliverFindings reads ONLY ContextKeys.SkillObservations (empty) — structural, not model-fitness (gpt-4.1 + gpt-5.1 both 0). The Spawn handlers store RAW Nuclei/Spectral/ZAP results only (they never AppendObservations, unlike the code-scan StaticPattern/GitHistory/DependencyAudit handlers — that asymmetry was the bug). FIX: a DISCRETE CollectMasterFindings step between AgenticMaster and DeliverFindings scrapes the master's final answer (an observation-JSON array, the judge-skill shape) into SkillObservations via the existing ObservationParser.TryParseWithoutIds (TryParse, NOT Parse — no fallback finding invented, so a real 0-triage stays an honest 0). AgenticMasterHandler now publishes MasterAnswer + MasterSkillName (two unconditional Sets, no branch — coding path untouched). The scrape is gated on the master's declared output_schema == observation (new IMasterOutputSchemaResolver, by name) NOT on pipeline name, so a coding master (code+verdict, diff schema) is structurally never scraped. Raw tool results stay PROMPT-only — Spectral OpenAPI-lint never reaches delivery as a High. Skill (api-security-master 1.0.0→1.1.0, separate agent-smith-skills PR): Output contract is now a single observation-array (severity/category/api_path/evidence_mode/description, ≤500-char), output_schema: observation added, findings.json removed, evidence_mode fixed to the valid enum set. Tests: full suite green (2574 + 51 + 86), +4 named (handler appends from observation JSON / appends nothing on no-JSON / skips a coding-schema master / preset orders CollectMasterFindings between master and deliver). NOTE: requires the coordinated skills bump pinned for the api-security scan to deliver in production."
    p0276: "PLAN BEFORE EXECUTION (backend + coding-agent-master skill). The plan was produced INSIDE the master (p0179b collapse), so it appeared late and the Approval gate had nothing concrete to show ('approve a blank cheque'). Now GeneratePlan runs BEFORE Approval in fix-bug/add-feature (partly reversing p0179b, deliberately): the existing GeneratePlanHandler (it only ran in SkillManager) generates the plan, ApprovalHandler already renders it, and AgenticMasterHandler renders it into a {PlanSection} the master EXECUTES (validate + refine, don't re-plan) instead of planning from scratch. KEY robustness: GeneratePlan is now BEST-EFFORT in coding presets — an unparseable planner response logs a warning and the run continues without a Plan (master plans itself, {PlanSection} empty), instead of throwing (which the composition harness proved would fail every run). Skill (coding-agent-master 1.7.0→1.8.0, separate repo): {PlanSection} placeholder + Phase 1 'if an approved plan is provided, execute+validate+refine it, else plan from scratch'. Tests: flipped the 2 p0179b guard tests (FixBug/AddFeature now ASSERT GeneratePlan before Approval); added a planner FIFO slot to the 4 real-change harness tests (GeneratePlan legitimately drains one LLM response before the master, like the analyzer); +2 BuildPlanSection unit tests (renders summary+ordered steps / empty when absent). Follow-up p0276a: hand the master the structured ProjectMap so it skips its own re-exploration. Full suite green (2570 + 86 + 51)."
    p0275: "RUN-DETAIL STEP SKELETON (backend + dashboard). The run-detail step rail was rebuilt from an evictable event stream (scopeBuffer 2000-event FIFO), so on a master-heavy run the early StepStarted events got evicted and the first steps VANISHED mid-run (the operator's 'die werden kurz angezeigt und sind dann weg'). Root fix per the operator's framing 'steps are STRUCTURE, not events — known before and after': RunStartedEvent now carries PlannedSteps (the resolved preset's ordered CommandDisplayNames, from PipelinePresets.TryResolve), and the dashboard SEEDS its step map from that (seedPlannedSteps, index = preset position + 1 = executionCount) BEFORE ingesting live events. Live StepStarted overwrites the seed (live wins); StepFinished attaches to a seeded bucket whose Started was evicted instead of dropping the step. The skeleton is thus stable from t=0 and fully decoupled from the run buffer; detail events stay cappable. Back-compat: absent plannedSteps (pre-p0275 events) → event-only, unchanged. SCOPE: shipped the no-vanishing skeleton (the correctness bug, vitest-testable); the VISUAL rework — dissolve Overview into the one list, Architecture→Sandboxes step, Plan/Result as in-sequence nodes, sticky-bottom auto-follow — is carved to NAMED follow-up p0275a because it has design latitude and needs the dashboard running to verify (not shipped blind). Tests: backend 2568 green; dashboard 310 green (+2: early-steps-survive-eviction, no-planned-steps-fallback)."
    p0273: "REGRESSION-AWARE VERIFICATION + DURABLE-ON-RED (backend + coding-agent-master skill). Two fixes. (1) The keystone no longer fails a run on ANY red test — it gates on REGRESSIONS (green→red). The agent reports two RAW failing-test lists on its verdict — baseline (failing at HEAD before edits) + final (after) — and the FRAMEWORK computes new-failures = final \\ baseline; a test red in both lists is pre-existing and never blocks. 'Unrelated' is measured, never the agent's prose claim (the v3.14.0 escape hatch that let a pre-existing red sink every run). MasterVerification gained nullable FailingTests + BaselineFailingTests (defaulted, back-compat); MasterVerificationParser reads failing_tests/baseline_failing_tests arrays; RunOutcomeKeystone.EvaluateTests uses regression logic when the lists are present, else the ORIGINAL binary gate (so shipping the backend before the skill is safe — behaves as today until a list-emitting skill is pinned). Build-fail and unparseable-verdict still block unconditionally. (2) Durable-on-red: forensics showed CommitAndPRHandler opens the PR (pushes the branch) BEFORE the keystone — the work was never lost, it just sat behind a 'failed' step reading as 'nothing happened'; the keystone-fail result now SURFACES the opened PR url(s) so the operator can review/take over (ticket stays unfinalized). Skill (coding-agent-master, separate repo): Phase 3 captures the baseline (git stash → run suite → pop), Phase 4 verdict emits failing_tests + baseline_failing_tests, and the 'stop on pre-existing red' bullet now says PROVE it via the baseline, don't assert it. Follow-up p0273a: framework-owned baseline (run the discovered test command at HEAD) to close the residual 'agent could pad the baseline' trust + an opt-out for known-green repos. Tests: full suite green (2568 +8: keystone pre-existing-no-block / new-regression-blocks / build-fail-blocks / back-compat binary; parser reads + tolerates-absent lists)."
    p0274: "CONFIG-AWARE LIVE LLM PRICING (backend). Per-LLM-call cost rendered $0.0000 despite tracked tokens + config pricing, because the LIVE path (EventPublishingChatClient, built by ChatClientFactory) resolved through a BARE defaults-only ModelPricingResolver that ignored the agent's `pricing` config and lacked gpt-5.1 (and the longest-prefix fallback can't bridge gpt-5.1→gpt-4.1, different family) → null → 0. The run-SUMMARY path (PipelineCostTracker) already read config correctly — a divergence between two code paths with the same intent. FIX: a shared OverlayModelPricingResolver (Contracts) layers a PricingConfig over any base resolver (override exact + longest-prefix, then base defaults), used by BOTH paths — ChatClientFactory wraps it from agent.Pricing at the EventPublishingChatClient site, and PipelineCostTracker's private ResolvePricing was DELETED and replaced by the same overlay (cost arithmetic untouched). So a config-priced model can no longer be $0 live while the summary shows a real number. Also added gpt-5.1 to DefaultPricing (verified Azure 1.25/10.0/0.13) so the built-in fallback isn't a year behind; config still wins; no other unverified model prices invented. Layering kept clean (overlay in Contracts → Infra factory uses only the interface). Tests: full suite green (2560 +5: overlay prices config-only model, override beats default, null-config delegates, unknown→null, gpt-5.1 incl. date-suffixed resolves)."
    p0245: "PER-LANGUAGE TOOLCHAIN IMAGE CONFIG (backend). An operator can now pin a sandbox toolchain image PER LANGUAGE in agentsmith.yml (projects.<name>.sandbox.images: { <slug>: <image> }), merged over the SandboxSpecBuilder code-default table per key — the polyglot-safe hook that was missing (whole-project sandbox.toolchain_image is too coarse for a repo that is both node AND dotnet). NEW: SandboxConfig.Images (Dictionary<string,string>?). SandboxSpecBuilder.ResolveImage gained a per-language layer, placed ABOVE the LLM-named context.image (p0265) — operator authority beats the LLM guess, the same precedence p0268 set for resources (corrected the original spec's 'below context.image' wording, which predated p0265). Full order: project toolchain_image > images[lang] > context.image (validated) > code table > generic fallback. Matched case-insensitively (mirrors the OrdinalIgnoreCase code table); empty value falls through. No signature/call-site changes — the map rides on the ResolvedProject the builder already holds; resolution stays in the private ResolveImage via a pure helper. Declaration not magic: no runtime install, no version inference (images are pulled on spawn already). agentsmith.schema.json (project sandbox.images) + example.yml document it. Tests: full suite green (2554), +5 (configured-image beats code-default + beats context.image; toolchain_image still wins outright; case-insensitive key; unmatched language falls through to the table)."
    p0272: "SANDBOX SECRET INJECTION (backend, k8s). Operator-declared credentials now reach the k8s sandbox pod — env vars via secretKeyRef and secret keys mounted read-only as files — so a stack whose build/test must authenticate to an external system can. Driver: a Salesforce repo whose 'compile' is a server-side validate-deploy needing `sf org login jwt` (client-id+username as env, a private key as a FILE). Generalizes the existing GitTokenSecretRef path: credentials reach the pod ONLY as k8s Secret references, NEVER in a Step/Redis payload or context.yaml, never in the LLM's view. NEW config: projects.<name>.sandbox.secrets { env: {NAME: 'secretName:key'}, files: [{mount,secret,key}] } (SandboxSecrets/SandboxSecretFile). SandboxSecretsResolver (mirrors ISandboxResourceResolver, optional ctor arg) parses it onto typed spec carriers ResolvedSandboxSecrets{Env:SecretEnvBinding[],Files:SecretFileMount[]}; a malformed 'secretName:key' THROWS at spec-build (operator config = fail-fast, NOT the p0268 LLM validate-then-fallback). PodSpecBuilder injects each env as secretKeyRef (shared SecretEnvVar helper with GIT_TOKEN) and each file as a per-file Secret volume + VolumeMount with SubPath=basename (single file at the exact path, read-only). The auth COMMAND is NOT new code — it lives in context.yaml prerequisites as `sh -c \"sf org login jwt … $SF_CLIENT_ID …\"`, run by the existing EnsurePrerequisitesHandler before the agent in the same pod (~/.sfdx persists to the agent's deploy step). `sh -c` is mandatory + documented: the handler tokenizes (CommandLineStringSplitter) and ProcessRunner uses UseShellExecute=false, so $VAR only expands when sh is the process. ALSO fixed a latent schema gap: context.schema.json (root additionalProperties:false) never declared `prerequisites` — now added with the auth-command pattern. k8s only (Docker/InProcess ignore SandboxSpec.Secrets; follow-up p0272a). agentsmith.schema.json + example.yml document sandbox.secrets. Tests: full suite green (2549 AgentSmith.Tests + 86 + 51), +5 (PodSpecBuilder secretKeyRef/file-mount/no-secrets-baseline, SandboxSpecBuilder map-onto-spec + malformed-throws)."
    p0268: "PER-STACK SANDBOX SIZING (backend). Sandbox CPU/memory now sized from LLM-authored context.yaml `stack.resources` (concrete k8s quantities) as a layer BETWEEN the operator project override and the global default — so a dotnet+Roslyn build keeps its 4Gi while a passive/bookworm scan in the SAME project asks for a fraction, and a 6 CPU/10Gi namespace quota holds far more than ~2 concurrent runs. Resource-analogue of p0265, same flow (ContextYamlStack/Summary -> ContextYamlSerializer -> RemoteContextDiscovery -> SandboxLanguageResolver -> SandboxSpecBuilder.Build -> SandboxResourceResolver) and same 'LLM decides, agent-smith only validates' rule — no regex/magic-string lang-or-tool detection in code. The raw four-field block (ContextYamlStackResources, all-nullable) flows UNPARSED to the resolver, the single validate+map+WARN gate: precedence project ?? validated-context ?? global; a PARTIAL (not all four) or parse-invalid block is rejected WHOLE and falls to global with a WARN (never silent, never to project). Validation reuses the spawner's quantity parse, EXTRACTED to AgentSmith.Contracts/Sandbox/KubernetesQuantity (TryParse, bool) so Application validates with the same logic Server sizes with — ResourceLimitsDockerExtensions now delegates (no second parser/regex). Sandbox grouping key became (image, resources); SandboxKeyComposer.ComposeForGroup gained a size slug ('2-4gi' vs '500m-512mi') + a numeric backstop + a per-(repo,group-identity) cache so same-image/different-size contexts split into distinct pods without dropping the second and EnsureSandboxesAsync stays idempotent. WriteContextYaml prompt documents stack.resources with worked heavy/light example values. ALSO fixed the p0265 schema gap: context.schema.json stack block (additionalProperties:false) now declares stack.image AND stack.resources. Tests: 2501 unit green (+8: KubernetesQuantity, serializer round-trip, resolver context-layer incl. partial/invalid WARN, key composer, coordinator same-image-different-size split)."
    p0271: "CONFIG DETAIL SHEET (server + dashboard). Replaced the System → Config topology graph + global-defaults grid with a project combobox + ONE dense hierarchical detail sheet per project — answering the operator's 'just colourful pictures' critique (the graph rendered N identical columns because every project shares the same agent/tracker). Deleted ConfigGraph + ConfigDetail; new ProjectSelect (native combobox, default first project) drives ProjectDetailPanel, which looks up the selected project's agent/repos/tracker from the snapshot and renders labelled sections: Agent (model/type/tuning), Repositories (each with FULL url + org/project/branch), Tracker (type/url/project + how-it-tracks: trigger statuses / done / failed / polling cadence / comment keyword), Resolved settings (effective values, each with a now-QUIET muted provenance hint instead of a coloured badge). The config read-events stream stays below. Backend: ConfigRepo gains Url+Organization+Project (operator: full URL is not sensitive here, only secrets are — widens p0266 host-only), ConfigTracker gains Url, ConfigTrigger gains PollingIntervalSeconds+CommentKeyword; still an allow-list (Auth/ApiKeySecret/ConnectionString never mapped — redaction test asserts no secret in repo/tracker JSON). NOT a raw YAML dump (would re-expose secret refs + scans worse). Tests: 2514 backend (repo full-url/no-auth + tracker url/trigger-config) + 308 dashboard (ProjectSelect change + ProjectDetailPanel repo-urls/tracker-config/per-run) green; build + drift + lint green."
    p0270b: "CONFIG EXPLORER → EXPLAINER (dashboard). Reworked System → Config from a static catalog into a read-only explainer on p0270a's materialized payload, answering the operator critique of p0266 (pretty but says nothing / nothing clickable / defaults not where applied / tracker tags unclear). Selection-driven master/detail: clicking a project in ConfigGraph highlights its subgraph and opens ProjectDetailPanel with the fully resolved, UNTRUNCATED config; every effective sandbox/orchestrator/cost-cap/agent value shows a ProvenanceBadge (override=amber / default / per-run); run-resolved fields (toolchain image) render the literal 'resolved per run' with no fabricated value, resolutionError shown in a rose note; tracker states render BY ROLE (triggers/done/failed + polling) instead of raw pills; the global Defaults grid demoted to a collapsed disclosure. Pure render over the materialized object — no second resolution in the frontend. dsh-* tokens only (dsh-body font-semibold where strong weight wanted; dsh-body-strong is not a token); p0217 drift guard green. Tests: 312 dashboard green (ProjectDetailPanel provenance/per-run/role + ConfigGraph click-selects)."
    p0270a: "MATERIALIZE RESOLVED CONFIG (backend, ersetzend). Replaced the scattered on-demand override arithmetic with ONE IConfigResolver/ConfigResolutionPass: deleted SandboxGlobalConfig.ResolveStepTimeout/ResolveRunCommandTimeout + PipelineCostCapConfig.ResolveFor (moved in); the pass COMPOSES the per-aspect resolvers (resources/agent-image/orchestrator-image) so their arithmetic stays single-source. Run path reads through it (SandboxSpecBuilder step timeout, ExecutePipelineUseCase run_command timeout + cost cap); dashboard reads the same via Materialize() → ResolvedConfig, so no second resolution can drift. Each effective value carries provenance (ResolvedValue<T>{Value,Source: global-default|project-override|run-resolved}) in the SAME object the runtime consumes. Tier A (timeouts/resources/images/cost-cap, agentsmith.yml-derivable) compiled; Tier B (toolchain image from context.yaml/LLM) marked run-resolved, never fabricated. KEY behaviour-preservation: granular ResolveStepTimeout/ResolveRunCommandTimeout (cheap, never throw) for the run path vs full Resolve() (eager images) used only by the resilient Materialize() — the PipelineE2E real-composition harness caught that calling full Resolve() for a timeout forced an orchestrator-image throw on every run; the split restores lazy-at-spawn timing. Materialize() lazy + per-project try/catch (ResolutionError) so observing config never crashes the server; run path keeps fail-loud-at-spawn. /api/config now returns the materialized projection (provenance + trigger semantics: trigger_statuses/done/failed/polling), still a redacted allow-list, still AGENTSMITH_UI_API_ENABLED-gated. Tests: 2513 backend green incl. ConfigResolutionPass characterization + real-composition E2E (presets run end-to-end) + CliShapedDi (real CLI graph resolves) + ServerDi ValidateOnBuild."
    p0266: "DASHBOARD CONFIG EXPLORER (server + dashboard). A read-only System → Config view that visualises the resolved agent-smith config and everything reachable around it — the config-time complement to the per-run TopologyGraph. Backend: GET /api/config (mapped only inside Program.cs's AGENTSMITH_UI_API_ENABLED block, like the run/catalog endpoints) returns a redacted ConfigSnapshot built by ConfigSnapshotMapper — an explicit ALLOW-LIST DTO (Services/Config/ConfigSnapshot.cs + ConfigGlobals.cs) that never references Secrets / ApiKeySecret / RepoConnection.Auth / TrackerConnection.Auth / PersistenceConfig.ConnectionString, so the endpoint structurally cannot leak a secret it never maps (the redaction test serialises the snapshot to JSON and asserts no secret value appears). Repo URLs reduced to host only; persistence surfaced as KIND only. Reachability edges (project → agent/tracker/repo/pipeline) computed by ConfigEdgeBuilder; agent NAME recovered by reference-equality against config.Agents (resolver reuses the catalog instance). Frontend: configApi.ts (typed redacted DTO) + ConfigGraph.tsx (hand-rolled SVG in the TopologyGraph idiom, status-neutral, kind-coloured, shared entities duplicated per project column for a knot-free layout) + ConfigDetail.tsx (globals KvCards + redacted agent/repo/tracker cards via Card/Badge/SectionLabel) composed by ConfigView above the existing config read-events stream in SystemView. dsh-* tokens only (p0217 drift guard green). Dropped the planned UiApiDisabled_Returns404 test — gating is structural, no WebApplicationFactory harness exists (decisions/p0266.yaml). Tests: 2509 backend + 308 dashboard green."
    p0265: "LLM-NAMED TOOLCHAIN IMAGE (backend). The analyzer/context-generator LLM now names the exact sandbox image in context.yaml `stack.image`, and agent-smith consumes it OVER the hardcoded language→image table. Fixes the net8-repo bug: bare 'dotnet'/'csharp' resolved to sdk:9.0, which builds net8.0 but cannot RUN its tests (8.0 runtime/testhost absent) → verification sank. Also unblocks frameworks with no table row (Angular → node:20-bookworm) with no agent-smith glue. Flow: ContextYamlSummary/ContextYamlStack gain Image; ContextYamlSerializer reads stack.image; RemoteContextDiscovery gains ToolchainImage; SandboxLanguageResolver carries it; SandboxSpecBuilder.Build(contextImage) resolves override → validated context image → table → fallback. Validation = supply-chain gate (trusted registry: mcr.microsoft.com/ghcr.io/Docker-Hub-official-library) AND git-bearing tag (shared GitBearingImagePatterns, now single source with the p0194 test); on reject WARN + fall back (no silent defer). No naming/regex heuristic in agent-smith — the LLM decides, agent-smith only validates (feedback_no_language_specific_parsers + feedback_safety_in_api_not_process). PipelineSandboxCoordinator passes the image at all 3 Build sites. Tests: 19 SandboxSpecBuilder image tests + suite green (the 2 pre-existing PipelineHarness FixBug failures are unrelated — fail identically on clean HEAD). Paired skill: context-generator-master emits stack.image (separate agent-smith-skills PR)."
    p0264: "SYSTEM-STREAM UI POLISH (frontend). Three operator-reported bugs in the watch-loop event stream (shared EventDrawer → Tracker polling + Config reads + every subsystem): (1) the kind tag was jammed against the timestamp ('10:08:48DECISION') — 'HH:MM:SS' mono overflowed its w-14 box into the gap; widened timestamp + tag to w-20, gap-2.5→3. (2) the 'Xs ago' freshness didn't COUNT — useSubsystemActivity captured nowMs once per render (useMemo([events])); added a 1s useNowTick() fed into the memo so both the rail label and the detail pane tick live without a refresh. (3) the dense rows read too small — bumped one dsh rung (mono dsh-mono 12→dsh-body 14, body text-sm 14→dsh-h3 16), dsh-* tokens only so the p0217 typography-drift guard stays green. Tests: 303 dashboard green incl. a fake-timer test (freshness 2s→5s on a 3s advance, no new events)."
    p0263: "VERDICT-NUDGE — model-fitness salvage for a missing Phase 4 verdict. A real run (gpt-4.1, ticket 18838) changed + committed source but emitted no parseable ```verdict block, so the RunOutcomeKeystone refused success ('did not emit a verification verdict'). The skill is correct (v3.13.2 has Phase 4) — the gap is the model skipping the closing artifact. Sibling to the p0255 apply-drive: AgenticMasterHandler now, after parsing the verdict, calls ShouldNudgeForVerdict(pipelineName, verification) = (verification is null ∧ pipeline ExpectsGreenTests) and if true re-prompts the master ONCE via loopRunner with BuildVerdictNudge ('changed source but did NOT emit the required Phase 4 verdict; do NOT edit further; build, run tests, emit ONLY the verdict block'), then re-parses. Bounded; the git + verdict keystone still gates. The durable lever stays the model (gpt-4.1 → gpt-5-codex, the only codex model that speaks agent-smith's chat-completions API; 5.1+/5.2/5.3-codex are Responses-only). Tests 2491 green (pure predicate + a sequenced-loop handler test proving the nudge re-prompts and the nudge-pass verdict is honored)."
    p0262: "STATUS RECOGNIZER — derive, don't store. Finished the redesign opened by p0261: the ticket lifecycle status is now DERIVED from the two reliable sources (native ticket status ∈ trigger_statuses = wants work; the ActiveRun lease = running now; Runs = history), and the lifecycle TAGS drive NO decision — pure markers. Removed: the drift-prone TicketLifecycles table (+ entity/config/DbSet/repository + a DropTicketLifecycles EF migration), the DbAuthoritativeTicketStatusTransitioner + factory + the Decorate wrap, the whole StaleJobDetector (+ its p0260 DB-gate), and LifecyclePollFilter. Tag writes are now UNCONDITIONAL in all 4 platform transitioners (dropped the from/Matches precondition — a marker needs none; ETag/rev still guards atomicity), which is what let DbAuthoritative's re-anchor go. The poller (TrackerPoller) skips a candidate while ANY lease is present (in-flight); the claim (SingleClaimRegionExecutor) is lease-only (dropped the ReadCurrent gate — the lease INSERT is the sole single-run guard); recovery of a dead run is entirely the ActiveRunReaper's — it now CANCELS the run (registry + RunCancelRequestedEvent, moved from StaleJobDetector) then releases the lease. Run-end coordinator no longer reads current to anchor the terminal write. Native status is the re-run episode watermark (terminal → reopen = new episode); no separate watermark. The in-progress↔pending loop/thrash class is gone at the root, not gated. Net: less code. Tests 2486 green (incl. unconditional-write matrix across all platforms, poller held-lease skip, reaper cancels-then-releases, claim lease-only). Enqueued/InProgress are no longer read anywhere for claimability."
    p0261: "FAILED-STATUS TERMINALIZATION + tags no longer decisive for triggering. The foundational lifecycle bug (predates relational, masked by the agent-smith:failed tag): only SUCCESS terminalized the native ticket status (FinalizeAsync→done_status); FAILURE posted a comment only and left the ticket New/Active, indistinguishable from untouched. Now: a configurable failed_status (WebhookTriggerConfig.FailedStatus, inherited by all 4 providers; unset→falls back to done_status) is surfaced via ContextKeys.FailedStatus, and PipelineErrorHandler's failure path calls FinalizeAsync(failedStatus) (comment+native-status move in one step, mirroring success) — best-effort, so a deleted ticket can't fail the run/PR. The working-status stays comment-only. SECOND half (they only work together): LifecyclePollFilter no longer excludes Done/Failed — they are status MARKERS, not a trigger criterion; triggering rests on the native status (TrackerPoller.IsStatusAllowed gates trigger_statuses) + the run lease (sole guard since p0251/p0252). So reopen-to-a-trigger-status is the natural re-run. Config guard (ProjectConfigNormalizer): done/failed ∈ trigger_statuses → throw (guaranteed loop); empty trigger_statuses → warn (gate degrades to label-only). Enqueued/InProgress tag-gate kept as a belt; full removal + recognizer + drop TicketLifecycles → p0262. Tests 2505 green."
    p0259: "CANCEL-UX terminal status (backend+frontend). A cancel now reads as a cancel, not a failure: operator/watchdog cancels publish RunFinished(status=cancelled) (ResolveCancelStatus, unit-tested), while a vanished sandbox stays 'failed' so the OOM cause is not hidden behind a calm label. RunCancelRequestedEvent is no longer trail-only — RunEventApplier persists CancelRequested+CancelReason onto the run row, so a navigated/reloaded detail view (read from the DB projection via RunSnapshotMapper) shows 'cancelling…' instead of 'cancel' (the field is the fix, not a snapshot-timing band-aid). The stale-zombie clear also publishes 'cancelled'. Frontend: NodeStatus gains a fifth member 'cancel' (compiler enumerates every palette switch); toNodeStatus/mapResultStatus map 'cancelled'→'cancel'; RunCard makes it terminal (no cancel button) with a neutral badge; the detail view shows a calm slate cancel banner instead of the rose ✕. StatusIcon restyled lighter (soft-tint circle + outline lucide icons, running spins) to answer the 'pompous' note, with Ban as the dedicated cancel glyph — broad restyle flagged for operator review. Tests: backend 2494 (ResolveCancelStatus reason→status; projector persists CancelRequested + terminates cancelled), dashboard 302 (cancel glyph distinct from fail, toNodeStatus mapping, cancelled card has no cancel button)."
    p0253: "RUN-RESULT FIDELITY (steps 1-3,5; step 4 sliced to p0256): result.md no longer contradicts the RunOutcomeKeystone. RunCostSectionWriter's hardcoded 'result: success' now reflects the verdict; RunResultFormatter excludes `.agentsmith/` run-record artifacts from Changed Files + count via the shared RunRecordPaths.IsRunRecordPath (CommitAndPRHandler adopts the same — one 'real code change' definition); WriteRunResultHandler computes the keystone verdict EARLY (recordedChange proxy; the git-authoritative keystone in CommitAndPR stays the hard gate) since result.md is rendered before that step. Canonical-path (step 3): the skill already writes plan→{RunRecordDir} + the framework relocates a loose plan.md — no change needed; the agent's bare-path deviation is model-fitness (p0255). Step 4 (always open a record PR on spend) needs a live sandbox repro → p0256. Tests: meta-only+failure→result:failed+0 changes; real edit→success+listed. 2484 backend + 298 dashboard green."
    p0255: "MASTER PLANS BUT DOES NOT EXECUTE: forensics confirmed the coding-agent-master SKILL is already correct (instructs plan→{RunRecordDir}, forbids zero-edit finish) — gpt-4.1 ignored it (correct plan.md, 0 source writes). So it's MODEL-fitness, not a skill/framework defect. Framework apply-drive added: after the master returns, if the preset expects code (ExpectsCodeChanges) but only run-record artifacts were written, re-prompt the master ONCE with a focused 'apply your plan now' nudge (BuildApplyNudge) and re-read changes; the git-authoritative keystone stays the final gate. Trigger extracted as pure ShouldDriveApply (5 unit tests). Model choice (move off gpt-4.1) surfaced as the operator's lever, not silently changed."
    p0254: "SESSION LOOSE ENDS closed: (1) committed the /system/tracker SignalR fix (SystemBacklog batch + List<object> polymorphic serialization + client single-render pushMany + ScopeBuffer dedup) — code committed; live deploy-verify (rebuild server+dashboard) is the operator's step. (2) De-flaked the two parallel-load tests deterministically: PipelineRunWatchdogTests now drives ScanOnceAsync (made internal) directly instead of racing RunAsync against a 100ms token; NoLibGit2SharpInGraphTests.SafeGetTypes catches ALL load exceptions (a sibling test loading an assembly threw non-ReflectionTypeLoadException). These two were the recurring red across p0251/p0252. Full suite green."
    p0252: "RETIRE the Redis job heartbeat as a liveness source (closes 'ein Weg' — one authoritative liveness signal = the DB ActiveRun lease). Deleted IJobHeartbeatService + JobHeartbeatService + NullJobHeartbeatService entirely: EnqueuedReconciler and StaleJobDetector now read lease freshness (shared StaleJobDetector.LeaseFreshFor), the claim drops MarkClaimedAsync, the lifecycle coordinator drops heartbeat.Start. KEY design fix (validated, operator-approved): AttachRunAsync is now an UPSERT — the legacy/PR-comment spawn carries a TicketId and goes InProgress but never claims, so UPDATE-only left it leaseless and the now-removed heartbeat was its only stale-protection; insert-if-absent makes EVERY in-flight run lease-backed, so StaleJobDetector can never cancel a live leaseless run, and direct-spawns gain single-run + reaping (supersedes p0242's 'PR-comment exempt'). Kept the sandbox-agent HeartbeatLoop (different, in-sandbox signal). New SQLite tests: AttachRun-on-absent inserts a fresh lease, AttachRun-on-existing updates in place (no 2nd row); reconciler + stale-detector retargeted to lease freshness. 139/139 focused subset green; full suite 2476/2477 with the lone red a pre-existing parallel-load flake (NoLibGit2Sharp / PipelineRunWatchdog, both green in isolation, both unrelated)."
    p0251: "DB-AUTHORITATIVE CLAIM — closed the recurring 'AlreadyClaimed → ticket stuck pending' that needed manual clearing 3x in one session. SingleClaimRegionExecutor gated the claim on the VOLATILE Redis heartbeat (heartbeat.IsAliveAsync) BEFORE the DB lease; removed that pre-check so the DB ActiveRun UNIQUE lease (p0246b, released on finish via p0242, always-on server-side via p0246g) is the SOLE single-run guard — survives a label revert AND a Redis flush. CORRECTED the spec's premise: the Redis heartbeat DOES have a release-on-finish (JobHeartbeatService compare-and-delete on the lifecycle-scope dispose, PipelineExecutor await using); it lingers only in an edge case (a run that never starts leaves MarkClaimedAsync's 'claimed' bridge, which the run-id compare-and-delete cannot clear), and as a hard gate that linger blocked the next claim. Kept MarkClaimedAsync as a liveness HINT for StaleJobDetector (gated behind DB-lease freshness) + EnqueuedReconciler. Regression pinned: lingering heartbeat + free lease → Claimed; lease held → AlreadyClaimed regardless of heartbeat; concurrent single-run already proven on real SQLite (ActiveRunLeaseTests). 2478 backend green (+2 new claim-path tests; lone red is the pre-existing NoLibGit2Sharp parallel-load flake, green in isolation). Heartbeat full retirement carved to p0252."
    p0209c: "Rollup views: Cost + Today's-activity KPI grids as Rollups rail items (slugs cost/today on /system/[[...slug]]); RollupCards is the prop-driven .kcard grid wired by RollupCardsView; reuses existing rollup data via costKpis (useCostRollup: today/7d/calls-7d) and activityKpis (SystemActivitySnapshot: scanned/triggered/skipped/poll-cycles/webhooks-received/actioned) — restyle + relocate only, no new backend/aggregation"
