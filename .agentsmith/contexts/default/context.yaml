    p0159c: "MkDocs Material re-skin via overrides.css mapping md-* vars to DESIGN.md tokens; rewrote index with lifecycle SVG, multi-repo page, fixed high-severity doc drift"
    p0160: "Docs restructure: nav cut to six task-oriented sections, 20 new pages, fictional TodoList anchor, skills-catalog page, Holger-voice rewrites"
    p0157a: "Replaced positional credential strings with sealed provider Connection records across all source/ticket/transitioner providers and factories"
    p0157b: "Made DataFlowReadGate a scoped DI service with per-step IDisposable, and path read/write guards stateless with per-call args"
