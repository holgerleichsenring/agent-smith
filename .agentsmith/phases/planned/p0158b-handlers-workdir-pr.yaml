# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0158b
goal: |
  Second slice of p0158: deliver true multi-repo unified-run behaviour on the
  consumer side. Workdir layout changes from `/work/` to
  `/work/{repo-key}/` with one subdirectory per configured repo. Checkout /
  branch / commit / PR-open handlers iterate ContextKeys.Repos instead of
  reading Repos[0]. PR cross-linking is implemented as two-pass open-then-
  PATCH across GitHub, GitLab, and Azure DevOps. The CLI gains `--repo NAME`
  on every source-using command and rejects `--source-*` overrides without
  `--repo` on multi-repo projects. p0140e metrics counters that were
  per-repo collapse to per-ticket. The smoke test passes for both monorepo
  and multi-repo projects.

requires: ["p0158a"]

supersedes: []

scope:
  in: |
    (1) Domain entity:
        - Repository: SandboxWorkPath ("/work") stays as the sandbox root;
          new static helper WorkPathFor(string repoName) returns
          "/work/{repoName}". Repository ctor gains an optional localPath
          parameter; LocalPath becomes an init property (default
          SandboxWorkPath).

    (2) Handlers — workdir layout + per-repo iteration:
        - CheckoutSourceHandler: iterates ContextKeys.Repos. For each
          repo: mkdir -p /work/{name}, then `git clone <url> .` with
          WorkingDirectory=/work/{name}, then per-repo branch switch.
          Publishes the primary Repository (Repos[0]) on
          ContextKeys.Repository for downstream skills; multi-repo skills
          read ContextKeys.Repos directly.
        - TryCheckoutSourceHandler: same pattern. Local-mode bind-mount
          still bypasses clone; layout remains /work/{name}/ per
          consistency.
        - CheckoutStepFactory (new, internal): extracted step builders
          (mkdir, clone, checkout, checkout -b) parameterised by target
          dir. Keeps CheckoutSourceHandler under 120 LOC.
        - CommitAndPRHandler: iterates Repos; opens PR only for repos
          with staged changes. Branch name `agentsmith/ticket-{id}` in
          every repo with changes.
        - InitCommitHandler: same iteration pattern, init scaffolding
          per repo.
        - PersistWorkBranchHandler: iterates Repos; pushes per repo.

    (3) PR cross-linking (two-pass):
        - Pass 1: open every PR with a provisional body that includes a
          marker line `<!-- agentsmith:sibling-prs -->`.
        - Pass 2: after all pass-1 opens have settled, PATCH each opened
          PR's body to replace the marker with the sibling URL list.
          Failed pass-1 opens surface as `(open failed)` entries in
          surviving siblings' bodies.
        - Single-PR runs skip pass-2.
        - New IPullRequestBodyPatcher contract (per platform); GitHub
          PATCH /repos/{owner}/{repo}/pulls/{n}, Azure DevOps
          updatePullRequest, GitLab PUT /merge_requests/{iid}.

    (4) Context types — per-repo collections:
        - CheckoutSourceContext: gains IReadOnlyList<RepoConnection>
          Configs alongside the existing Config (= primary).
          Backward-compatible additive change.
        - Same shape for CommitAndPRContext, InitCommitContext,
          PersistWorkBranchContext.
        - Builders read ContextKeys.Repos and pass both fields.

    (5) Toolchain refinement:
        - PipelineSandboxCoordinator: confirm Repos[0]+fall-through is
          honoured at fast path (operator composite image still wins).
        - Document precedence in code XML-doc.

    (6) CLI:
        - `--repo NAME` option added to FixCommand, FeatureCommand,
          ApiScanCommand, SecurityScanCommand, InitCommand,
          AutonomousCommand, RunCommand, LegalCommand.
        - SourceOptions.ApplyTo: emit ContextKeys.SourceOverrideRepo
          (already read by ExecutePipelineUseCase since p0158a) when
          --repo is present.
        - Reject `--source-*` without `--repo NAME` on multi-repo
          projects with a clear error pointing at the project name and
          its repo count.

    (7) p0140e metrics:
        - Per-repo enqueue counter (incremented N times per ticket pre-
          p0158): collapses to one increment per ticket. Drop the
          per-repo counter site; keep the per-ticket count.
        - spawn-all-matched-projects counter stays valid; empty-plan
          skip counter stays valid.
        - p0140e operator docs updated to reflect unified-run model.

    (8) Tests (~20 new + ~30 fixture updates):
        - Checkout_PlacesEachRepo_InRunRootSubdirectory_KeyedByRepoName
        - BranchCreate_SameName_AppliedToEveryCheckedOutRepo
        - PrOpen_SkipsRepo_WithNoStagedChanges
        - PrCrossLinks_TwoPass_AllOpenedPrBodies_PatchedWithSiblingUrls
        - PrCrossLinks_FailedOpen_ShownAsOpenFailed_InSurvivingSiblingBodies
        - PrCrossLinks_SinglePrRun_SkipsPass2
        - Sandbox_PicksToolchain_FromFirstRepoWithResolvableImage
        - Sandbox_NoRepoResolvesImage_FallsBackToGenericImage
        - Sandbox_OperatorCompositeImage_WinsOverAutoDetect
        - Cli_RepoOption_ScopesRunToOneRepo
        - Cli_RepoOption_UnknownName_Throws_WithKnownReposList
        - Cli_RepoOption_OnSingleRepoProject_MatchingName_NoOp
        - Cli_SourceFlags_RejectedOnMultiRepo_WithoutRepoOption
        - Monorepo_WorkdirLayout_IsRunRoot_PlusOneRepoSubdir_NotFlat
        - EnqueuedReconciler_OnMultiRepoProject_EmitsOneRequest_NotNAsBefore
        - Fixture updates: every CheckoutSource / CommitAndPR / InitCommit
          / PersistWorkBranch test that seeded a single RepoConnection
          must now seed a Repos list and assert per-repo behaviour.

    (9) Cleanup:
        - CHANGELOG entry: fan-out removal, workdir layout change for
          single-repo projects (NOT layout-compatible with pre-p0158
          runs).

  out: |
    - Host-side source cache (bare/mirror clones, worktree-add per run):
      separate follow-up phase.
    - api-security-scan ticket-driven migration: separate follow-up phase.
    - Multi-toolchain composite-image sandbox (per-repo sandbox switching
      mid-run): separate follow-up phase.
    - Cross-PR dependency declaration / CI-level coordination beyond
      cross-linking URLs in PR bodies: out of scope.

decisions:
  - key: "PR cross-link two-pass uses an HTML-comment marker
      `<!-- agentsmith:sibling-prs -->` in the pass-1 body. — pass-2 finds
      the marker line and replaces it with the rendered sibling list.
      Marker survives manual edits to other parts of the body (reviewers
      can edit freely outside the marker section). — alternatives: replace
      the whole body in pass-2 (rejected: clobbers manual edits); store
      sibling URLs in a separate Issue/Comment thread (rejected: harder
      for reviewers to find than the PR body)."

  - key: "Repository.LocalPath becomes per-instance (was: const-derived).
      — for a multi-repo run, each Repository instance carries its own
      in-sandbox path (`/work/{name}`). The const SandboxWorkPath stays
      for callers that need the sandbox root (e.g. sandbox factory).
      Existing single-arg ctor calls in tests stay compatible via the
      optional parameter defaulting to SandboxWorkPath. — alternatives:
      static Map(repoName→path) lookup (rejected: requires every caller
      to know the repo name); keep LocalPath = SandboxWorkPath and route
      per-repo paths via a separate dictionary on the pipeline context
      (rejected: weak coupling, callers would have two places to look)."

  - key: "Context types grow a list field (Configs) alongside the existing
      Config (primary). Builders fill both; handlers iterate Configs.
      — additive change, preserves callers and tests that only consume
      Config. The handler-side iteration becomes the new behaviour
      without breaking the Context type's public contract. — alternatives:
      replace Config with Configs (rejected: breaks every test fixture);
      switch handlers to read ContextKeys.Repos directly bypassing the
      Context (rejected: weakens the Context-as-contract pattern that
      runs through every other handler)."

steps:
  - id: domain
    action: "Repository entity: LocalPath becomes per-instance with
      optional ctor parameter (default SandboxWorkPath); add static
      WorkPathFor(string repoName)."
    modify:
      - "src/AgentSmith.Domain/Entities/Repository.cs"

  - id: handlers-checkout
    action: "Extract CheckoutStepFactory (mkdir/clone/checkout/checkout-b
      step builders parameterised by target dir). Rewrite
      CheckoutSourceHandler to iterate ContextKeys.Repos. Rewrite
      TryCheckoutSourceHandler likewise."
    new:
      - "src/AgentSmith.Application/Services/Handlers/CheckoutStepFactory.cs"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/CheckoutSourceHandler.cs"
      - "src/AgentSmith.Application/Services/Handlers/TryCheckoutSourceHandler.cs"

  - id: handlers-commit-pr
    action: "CommitAndPRHandler, InitCommitHandler, PersistWorkBranchHandler:
      iterate Configs from the context. Per-repo branch creation, staged-
      changes detection, PR-open. Verify class names against current
      source (handler split may differ from sketch)."
    modify:
      - "src/AgentSmith.Application/Services/Handlers/CommitAndPRHandler.cs"
      - "src/AgentSmith.Application/Services/Handlers/InitCommitHandler.cs"
      - "src/AgentSmith.Application/Services/Handlers/PersistWorkBranchHandler.cs"

  - id: context-types
    action: "CheckoutSourceContext, CommitAndPRContext, InitCommitContext,
      PersistWorkBranchContext: add IReadOnlyList<RepoConnection> Configs
      alongside the existing Config (= primary). Builders fill both."
    modify:
      - "src/AgentSmith.Application/Models/CheckoutSourceContext.cs"
      - "src/AgentSmith.Application/Models/TryCheckoutSourceContext.cs"
      - "src/AgentSmith.Application/Models/CommitAndPRContext.cs"
      - "src/AgentSmith.Application/Models/InitCommitContext.cs"
      - "src/AgentSmith.Application/Models/PersistWorkBranchContext.cs"
      - "src/AgentSmith.Application/Services/Builders/SourceContextBuilders.cs"
      - "src/AgentSmith.Application/Services/Builders/PersistWorkBranchContextBuilder.cs"
      - "src/AgentSmith.Application/Services/Builders/PlanExecutionContextBuilders.cs"

  - id: pr-cross-link
    action: "Add IPullRequestBodyPatcher per platform (GitHub PATCH,
      AzureDevOps updatePullRequest, GitLab PUT). Pass-2 orchestrator
      runs after CommitAndPRHandler completes its per-repo loop: collect
      opened PR URLs, render sibling list, PATCH each body replacing the
      marker. Single-PR runs skip pass-2."
    new:
      - "src/AgentSmith.Contracts/Providers/IPullRequestBodyPatcher.cs"
      - "src/AgentSmith.Infrastructure/Services/Providers/PullRequests/*BodyPatcher.cs (per platform)"

  - id: cli
    action: "Add `--repo NAME` to SourceOptions and wire it through eight
      source-using commands. Emit ContextKeys.SourceOverrideRepo on the
      request context. Reject `--source-*` without `--repo` on
      multi-repo projects with a clear error."
    modify:
      - "src/AgentSmith.Cli/Commands/SourceOptions.cs"
      - "src/AgentSmith.Cli/Commands/FixCommand.cs"
      - "src/AgentSmith.Cli/Commands/FeatureCommand.cs"
      - "src/AgentSmith.Cli/Commands/ApiScanCommand.cs"
      - "src/AgentSmith.Cli/Commands/SecurityScanCommand.cs"
      - "src/AgentSmith.Cli/Commands/InitCommand.cs"
      - "src/AgentSmith.Cli/Commands/AutonomousCommand.cs"
      - "src/AgentSmith.Cli/Commands/RunCommand.cs"
      - "src/AgentSmith.Cli/Commands/LegalCommand.cs"

  - id: metrics
    action: "Collapse per-repo enqueue counter sites (none remain in
      SpawnPipelineRunsUseCase / SpawnRegionExecutor after p0158a, but
      verify p0140e counter definitions). Update p0140e operator docs."
    modify:
      - "docs/ (p0140e operator docs)"

  - id: tests
    action: "Add the new spec-driven scenarios listed in scope.in (8).
      Update fixtures for every handler test that seeded a single repo."
    modify:
      - "tests/AgentSmith.Tests/Commands/CheckoutSourceHandlerTests.cs"
      - "tests/AgentSmith.Tests/Commands/CommitAndPRHandlerTests.cs"
      - "tests/AgentSmith.Tests/Commands/InitCommitHandlerTests.cs"
      - "tests/AgentSmith.Tests/Commands/PersistWorkBranchHandlerTests.cs"
      - "tests/AgentSmith.Tests/Cli/ (new tests for --repo / --source-*)"
      - "tests/AgentSmith.Tests/Services/Lifecycle/EnqueuedReconcilerTests.cs"

  - id: cleanup
    action: "CHANGELOG entry: workdir layout for single-repo projects is
      NOT compatible with pre-p0158a runs (one level deeper). PR cross-
      link two-pass behaviour documented for operators."
    modify:
      - "CHANGELOG.md"

tests:
  - "Checkout_PlacesEachRepo_InRunRootSubdirectory_KeyedByRepoName"
  - "Checkout_LocalProvider_KeepsBindMountLayout_PerRepoSubdir"
  - "BranchCreate_SameName_AppliedToEveryCheckedOutRepo"
  - "PrOpen_SkipsRepo_WithNoStagedChanges"
  - "PrCrossLinks_TwoPass_AllOpenedPrBodies_PatchedWithSiblingUrls"
  - "PrCrossLinks_FailedOpen_ShownAsOpenFailed_InSurvivingSiblingBodies"
  - "PrCrossLinks_SinglePrRun_SkipsPass2"
  - "Sandbox_PicksToolchain_FromFirstRepoWithResolvableImage"
  - "Sandbox_NoRepoResolvesImage_FallsBackToGenericImage"
  - "Sandbox_OperatorCompositeImage_WinsOverAutoDetect"
  - "Cli_RepoOption_ScopesRunToOneRepo"
  - "Cli_RepoOption_UnknownName_Throws_WithKnownReposList"
  - "Cli_RepoOption_OnSingleRepoProject_MatchingName_NoOp"
  - "Cli_SourceFlags_RejectedOnMultiRepo_WithoutRepoOption"
  - "Monorepo_WorkdirLayout_IsRunRoot_PlusOneRepoSubdir_NotFlat"
  - "EnqueuedReconciler_OnMultiRepoProject_EmitsOneRequest_NotNAsBefore"

done:
  - "Workdir layout: {run-root}/{repo-key}/ in every run, single-repo and
     multi-repo alike."
  - "CheckoutSource/TryCheckout/CommitAndPR/InitCommit/PersistWorkBranch
     handlers iterate Repos; per-repo branch name `agentsmith/ticket-{id}`."
  - "PR open skips repos with no staged changes."
  - "PR cross-link two-pass: every PR body lists its siblings; pass-2
     skipped for single-PR runs; failed opens surface as `(open failed)`."
  - "CLI `--repo NAME` on the eight source-using commands; unknown name
     throws with known-repos list; `--source-*` rejected without `--repo`
     on multi-repo projects."
  - "p0140e per-repo enqueue counter sites collapsed; operator docs
     reflect unified-run."
  - "Full unit test suite green; /smoke green (queue-mode) for fix-bug,
     security-scan, api-security-scan, against both a monorepo project and
     a multi-repo project."
  - "CHANGELOG notes workdir layout change and PR cross-link behaviour."
