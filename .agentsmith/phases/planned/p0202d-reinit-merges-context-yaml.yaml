# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0202d-reinit-merges-context-yaml
goal: |
  Make re-running init-project the migration path for ci.install_command (and
  any future auto-detectable context.yaml field) — safely. Two problems today:

  1. No scale path. p0202a put install_command in context.yaml (durable,
     operator-owned), but populating it across an estate means hand-editing
     every non-dotnet context. That doesn't scale to dozens of repos.

  2. Re-init is destructive. On a repo that already has context.yaml, the
     BootstrapRound producer regenerates it from SOURCE (read source ->
     WriteFile context.yaml) and never reads the existing file — so re-running
     init OVERWRITES operator edits, clobbering exactly the durable
     customizations p0202a relies on (including a hand-set install_command).

  Fix both at once: on re-init the producer reads the existing context.yaml,
  PRESERVES operator-authored content, and MERGES in missing auto-detectable
  fields — ci.install_command first (detected from the package manager:
  package-lock.json -> npm ci, requirements.txt -> pip install, go.mod ->
  go mod download, ...). Re-running init across the estate then backfills
  install_command with zero hand-editing and zero loss of customization.

requires:
  - p0202a-install-command-operator-override-layer
  - p0161d-bootstrap-discover-read-only-first-pass

scope:
  in: |
    - BootstrapRound re-init path: inject the EXISTING context.yaml content into
      the producer prompt and instruct preserve-and-merge — operator-authored
      fields are kept verbatim; only missing/empty fields are filled. The handler
      already distinguishes re-init (BootstrapDiscover projects existing contexts)
      from cold-init; thread that signal so the round knows to merge vs generate.

    - ci.install_command detection during the merge: the LLM infers the install
      idiom from the component's lockfile/manifest and writes it when absent.
      An operator-set value is never overwritten.

    - Cross-repo: project-bootstrap SKILL.md gains the preserve-and-merge
      contract for the re-init case (the cold-init / generate-from-scratch
      behaviour is unchanged).

  out: |
    agentsmith.yml central install_command default — a different mechanism the
    operator considered and did not choose; the durable per-context value is the
    design. Not in scope.

    Multi-repo batch orchestration — the operator scripts N per-repo init runs;
    the framework still does one repo per run. No new fan-out machinery.

    coding-principles.md is regenerated by the same producer and has the same
    clobber risk on re-init. Same merge mechanism should cover it; folded in if
    cheap, otherwise named as the immediate follow-on (NOT silently ignored).

decisions:
  - key: "Merge/preserve over regenerate on re-init. The whole point of p0202a (context.yaml is durable, survives re-analysis) is violated if re-init overwrites operator edits. Cold-init still generates from scratch; only re-init merges."
  - key: "ci.install_command is auto-detected from the package manager during the merge (package-lock.json -> npm ci, etc.), so migrating an estate is 'run init', not 'hand-edit each repo'. Operator override always wins — a set value is never overwritten."
  - key: "One repo per init run; bulk migration is the operator scripting the runs. No new multi-repo orchestration — keeps the change to the producer's merge semantics."

steps:
  - id: thread-reinit-signal
    action: "Carry the re-init vs cold-init signal (and the existing context.yaml content) from BootstrapDiscover/Dispatch into BootstrapRound"
    modify:
      - "src/backend/AgentSmith.Application/Services/Handlers/BootstrapDiscoverHandler.cs"
      - "src/backend/AgentSmith.Application/Services/Handlers/BootstrapDispatchHandler.cs"
      - "src/backend/AgentSmith.Application/Services/Handlers/BootstrapRoundHandler.cs"
  - id: merge-aware-prompt
    action: "BootstrapPromptFactory: on re-init, inject existing context.yaml + preserve-and-merge instructions; backfill ci.install_command when absent"
    modify:
      - "src/backend/AgentSmith.Application/Services/BootstrapPromptFactory.cs"
  - id: skill-merge-contract
    action: "project-bootstrap SKILL.md: preserve operator content on re-init, backfill ci.install_command (cross-repo: agent-smith-skills)"
  - id: tests
    new:
      - "re-init merge: operator-set fields preserved; missing ci.install_command backfilled; operator-set install_command NOT overwritten"
      - "cold-init unchanged: generate-from-scratch path still emits a full context.yaml"

tests:
  - "BootstrapRound_ReInit_PreservesOperatorAuthoredFields"
  - "BootstrapRound_ReInit_BackfillsMissingInstallCommand"
  - "BootstrapRound_ReInit_DoesNotOverwriteOperatorSetInstallCommand"
  - "BootstrapRound_ColdInit_GeneratesFullContextYaml_Unchanged"

done:
  - "Re-running init on a repo with an existing context.yaml preserves every operator-authored field — no clobber."
  - "A missing ci.install_command is backfilled from the detected package manager; an operator-set one is left untouched."
  - "Running init across the estate backfills install_command with zero hand-editing and zero loss of customization."
  - "coding-principles.md clobber-on-re-init is either covered by the same merge or named as the immediate follow-on."
