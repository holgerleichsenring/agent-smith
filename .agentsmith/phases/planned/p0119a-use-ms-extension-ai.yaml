done:
  - "Microsoft.Extensions.AI pinned EXACT to latest stable below 10.4.1 (sibling packages .OpenAI and .Ollama in lockstep). Csproj comment documents the constraint and links to tghamm/Anthropic.SDK#197. Anthropic.SDK (tghamm), GenerativeAI.Microsoft (Gemini) added. End-of-phase validation step confirms all 5 adapters round-trip with tool-calls in AAD-DEV."
  - "5 provider classes deleted (Claude, OpenAI, Azure OpenAI, Gemini, Ollama AgentProviders). 4 AgenticLoop classes deleted. 4 AgenticAnalyzer adapter classes from p0110a deleted. 4 ToolDefinitions files deleted."
  - "ILlmClient surface completely removed: ILlmClient interface, ILlmClientFactory interface, AnthropicLlmClient, OpenAiLlmClient, AzureOpenAiLlmClient, LlmClientFactory, TrackingLlmClient decorator, and the LlmResponse record — all deleted. No adapter, no shim, no backward-compat layer."
  - "All ~20 ILlmClient caller sites migrated directly to IChatClientFactory.Create + GetStreamingResponseAsync — handlers (BootstrapProject / BootstrapDocument / MetaFileBootstrapper / ConvergenceCheck / EvaluateSkills / FilterRound / SkillRound* / PlanConsolidator / GateRetryCoordinator / CompileKnowledge / QueryKnowledge / Triage / AgenticExecute), generators (Context / CodeMap / CodingPrinciples), triage strategies (Legacy / Structured), TriageOutputProducer, LlmIntentParser (Application + Server)."
  - "Provider-neutral interfaces (ITriageStrategy, ITriageOutputProducer, IGateRetryCoordinator, IContextGenerator, ICodeMapGenerator, ICodingPrinciplesGenerator) reshaped: methods drop the ILlmClient parameter; implementations take IChatClientFactory in ctor and resolve the right TaskType internally."
  - "PipelineCostTracker.Track signature changed from Track(LlmResponse) to Track(ChatResponse). Each migrated caller calls it explicitly after each ChatResponse; the TrackingLlmClient decorator path is gone."
  - "Single SandboxToolHost class with 7 [Description]-annotated methods. AIFunctionFactory.Create generates schemas. GetAllTools / GetScoutTools as the only tool-set definitions."
  - "IChatClientFactory replaces IAgentProviderFactory + IAgenticAnalyzerFactory + ILlmClientFactory. Per-task IChatClient routing via ConfigBasedModelRegistry (renamed semantically but YAML schema unchanged)."
  - "AgenticExecuteHandler, ScoutAgent, ProjectAnalyzer all call IChatClient.GetStreamingResponseAsync (NOT GetResponseAsync) and aggregate updates server-side to a final ChatResponse. FunctionInvokingChatClient handles the tool-loop within the streaming enumeration. The 4× duplicated max-iterations-25 logic now lives in one place (ChatOptions.MaximumIterationsPerRequest)."
  - "Streaming foundation in place: every IChatClient call site uses GetStreamingResponseAsync. Token-tracking and compaction operate on the aggregated final ChatResponse, semantically identical to non-streaming. IProgressReporter event model unchanged in V1 — no live token rendering yet, but the API layer is ready for it without a second migration."
  - "Cost-tracker hierarchy from p0119 adapted: per-provider Track(ChatResponse) reads UsageDetails + AdditionalCounts. CacheHitRate populated correctly across all 5 providers. PipelineCostTracker no longer over-states OpenAi/Azure costs."
  - "All 5 providers (including Ollama) supported equally — no asymmetric feature gaps from the abstraction."
  - "DI cleaned: AddAiClients() replaces AddAgentProviders(). Single registration entry point. ILlmClient and all its associated registrations removed."
  - "Manual smoke tested across all 5 provider types in AAD-DEV. Token counts realistic. Cache-hit-rate visible in result.md. Security-scan / bootstrap / triage paths all validated end-to-end through IChatClientFactory."
  - "Tests: ~6+3+1 deleted (factories incl. LlmClientFactory, analyzer-adapters, agentic-loops, ToolExecutor variants, TrackingLlmClient), ~15-20 updated (handler / generator / triage / intent-parser tests switched from ILlmClient mocks to IChatClientFactory mocks), ~4 new (M.E.AI smoke per provider, cost-tracker-via-UsageDetails, AgenticExecuteHandlerMeai, ScoutAgentMeai). All existing pipeline tests stay green."
  - "Docs: ai-clients.md as new architecture page (covers the no-adapter migration choice), layers.md updated, decisions.md entry honest about the scale of the deletion (~2500 lines)."
