# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0166a
goal: |
  Stand up the MCP-server side of Agent Smith. New project AgentSmith.McpServer
  exposes the 10 pipeline presets as MCP tools via the standard JSON-RPC over
  HTTP + SSE transport. tools/list returns each preset with an auto-generated
  input schema; tools/call dispatching lands in p0166b.

  MCP-server presence is the single biggest distribution lever as of 2026:
  97M monthly SDK downloads, 78% enterprise adoption (per May 2026 industry
  survey), and ChatGPT / Gemini / Cursor / Windsurf / Zed / JetBrains all
  consume MCP-server tools. Exposing pipelines as MCP tools means another
  agent can call agent-smith from its own loop.

requires: []

scope:
  in: |
    (1) New project AgentSmith.McpServer (referenced from Server's Program.cs
        as an optional hosted service, ENV-gated via AGENTSMITH_MCP_ENABLED).

    (2) JSON-RPC over HTTP transport: POST /mcp endpoint accepts MCP-shaped
        JSON-RPC requests. SSE notifications endpoint /mcp/events for
        streaming progress (used by p0166c).

    (3) tools/list returns every PipelinePreset name + description +
        auto-generated input schema derived from PipelineRequest fields
        (ticketId, projectName, repo overrides, headless, …).

    (4) Server discovery metadata: GET / returns the standard MCP server
        info JSON (name, version from version.txt, capabilities,
        instructions).

    (5) Logging + protocol-violation rejection (return JSON-RPC error -32600
        for malformed requests, -32601 for unknown methods).

    (6) MCP protocol version matches modelcontextprotocol.io spec v0.1
        (current at time of writing). Spec ref pinned in code comment with
        version + date for easy bump.

  out: |
    tools/call dispatching — slice [[p0166b]].
    SSE notification streaming for in-progress runs — slice [[p0166c]].
    Quality-bar manifest + signature verification + registry submission —
    slice [[p0166d]].
    Authentication. The MCP endpoint is unauthenticated in this slice;
    operator deploys behind an auth proxy. Native auth is the post-MVP
    follow-up.

decisions:
  - key: |
      Auto-generate tool input schemas from PipelineRequest, not hand-write —
      Reason: adding a new pipeline preset already requires touching one
      file; forcing a parallel MCP schema would be a maintenance burden and
      a drift risk. Schema generation reads PipelineRequest properties via
      reflection at startup. alternatives: hand-written schemas (rejected:
      drift); schema-first with code-gen (rejected: tooling weight not
      justified for 10 presets).

  - key: |
      Optional hosted service gated by AGENTSMITH_MCP_ENABLED — Reason: not
      every Agent Smith deployment wants an open MCP endpoint. Opt-in via
      env var keeps the surface small for operators who only need
      webhook + chat. alternatives: always-on (rejected: surface expansion);
      separate binary (rejected: deployment complexity).

  - key: |
      JSON-RPC over HTTP + SSE, not stdio transport — Reason: stdio fits
      local-only consumers (Claude Desktop, IDE plugins). HTTP + SSE works
      across network boundaries and is the production-deployment transport.
      A future slice can add stdio bridge if local-use demand surfaces.
      alternatives: stdio (rejected: limits to local consumers);
      WebSocket (rejected: SSE simpler + sufficient).

steps:
  - id: project
    action: |
      Create AgentSmith.McpServer project. Reference Contracts + Application.
      .csproj + ProjectReferences set up; AgentSmith.sln updated.
    new:
      - "src/AgentSmith.McpServer/AgentSmith.McpServer.csproj"
      - "src/AgentSmith.McpServer/Class1.cs (placeholder, deleted in scope below)"

  - id: transport
    action: |
      McpEndpoints maps POST /mcp on the Server's WebApplication. JSON-RPC
      request/response types. Method dispatch table (initialize / tools/list /
      …). Unknown method returns -32601.
    new:
      - "src/AgentSmith.McpServer/Transport/McpEndpoints.cs"
      - "src/AgentSmith.McpServer/Transport/JsonRpcRequest.cs"
      - "src/AgentSmith.McpServer/Transport/JsonRpcResponse.cs"
      - "src/AgentSmith.McpServer/Transport/JsonRpcError.cs"
      - "src/AgentSmith.McpServer/Transport/McpMethodDispatcher.cs"

  - id: tools-list
    action: |
      ToolsListHandler enumerates PipelinePresets.All, maps each to an
      McpTool with schema generated by PipelineRequestSchemaGenerator.
    new:
      - "src/AgentSmith.McpServer/Handlers/ToolsListHandler.cs"
      - "src/AgentSmith.McpServer/Models/McpTool.cs"
      - "src/AgentSmith.McpServer/Services/PipelineRequestSchemaGenerator.cs"

  - id: server-info
    action: |
      GET / returns MCP server info JSON. Version sourced from version.txt
      (existing file).
    new:
      - "src/AgentSmith.McpServer/Handlers/ServerInfoHandler.cs"

  - id: di-wiring
    action: |
      ServiceCollectionExtensions.AddMcpServer registers handlers + transport.
      Program.cs reads AGENTSMITH_MCP_ENABLED; calls AddMcpServer +
      MapMcpEndpoints when true.
    new:
      - "src/AgentSmith.McpServer/Extensions/ServiceCollectionExtensions.cs"
    modify:
      - "src/AgentSmith.Server/Program.cs"

  - id: tests
    action: |
      Unit tests for schema generation + dispatch. Integration tests via
      WebApplicationFactory hitting /mcp.
    new:
      - "tests/AgentSmith.McpServer.Tests/AgentSmith.McpServer.Tests.csproj"
      - "tests/AgentSmith.McpServer.Tests/ToolsListHandlerTests.cs"
      - "tests/AgentSmith.McpServer.Tests/JsonRpcDispatchTests.cs"
      - "tests/AgentSmith.McpServer.Tests/Integration/McpEndpointSmokeTests.cs"

tests:
  - "ToolsList_ReturnsTenPresetsWithInputSchemas"
  - "McpDispatch_UnknownMethod_ReturnsJsonRpcError32601"
  - "McpDispatch_MalformedRequest_ReturnsJsonRpcError32600"
  - "ServerInfo_ReturnsVersionAndCapabilities"
  - "PipelineRequestSchemaGenerator_TicketIdFieldRequired"
  - "PipelineRequestSchemaGenerator_HeadlessFieldOptionalBool"

done:
  - "AgentSmith.McpServer project + tests project compile + green."
  - "GET / returns valid MCP server info JSON."
  - "POST /mcp tools/list returns 10 tools with schemas."
  - "JSON-RPC error codes for malformed + unknown methods."
  - "AGENTSMITH_MCP_ENABLED gates the endpoint registration."
  - "Smoke: `curl http://localhost:8081/mcp -d '{...tools/list...}' | jq` returns the expected tool array."
