# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0179b-role-taxonomy-removal
goal: |
  Retire the role-routing taxonomy and the Triage→SkillRound→
  Convergence coordination machinery that p0177 made redundant. After
  p0179a the master prompts live as role:master skills; after this
  slice the per-investigator role schema, the choreography handlers
  that consumed it, and the pipeline preset entries that wired them
  together are all gone. RoleSkillDefinition shrinks to the minimum
  shape a skill needs to be loaded and resolved by name.

  The four-role investigator/judge/planner/filter pattern (and the
  Lead/Analyst/Reviewer/Filter enum that backs it) reflected a
  world where small skills handed off to each other through a
  bus-driven router. With master-decides + sub-agents the four-slot
  hand-off is dead weight; the master spawns named sub-agents at the
  right grain on its own.

requires:
  - p0179-pipeline-and-skill-collapse
  - p0179a-master-prompt-as-skill

scope:
  in: |
    RoleSkillDefinition flattens to: Name, DisplayName, Emoji,
    Description, Triggers, Rules, Source, SkillDirectory,
    OutputSchema (master-only). Retired fields: Role, Category,
    InvestigatorMode, SurveyScope, ScopeHint, BlockCondition, Loop,
    ActivatesWhen, ConvergenceCriteria, Orchestration. Master skills
    keep OutputSchema because the master's output is a downstream
    pipeline contract (next-step / result.md / cost summary consume
    it); investigator skills are gone so the per-investigator
    output_schema has no home.

    SkillRole enum retires (Lead/Analyst/Reviewer/Filter/Master) →
    Master-only constant or remove the enum entirely; consumers
    rewire. ISkillBodyResolver.ResolveBody loses the SkillRole
    parameter — single body, single resolution.

    Retired classes (entire files):
      - ITriageStrategy + every implementation (StaticTriage,
        LlmTriage, RuleBasedTriage, TwoStageTriage)
      - ActivationSkillFilter
      - ConvergenceEvaluator + IConvergenceEvaluator
      - DiscussionRoundToolPolicy
      - SkillRoundHandler family (SkillRoundHandler,
        SkillRoundStartedHandler, SkillRoundCompletedHandler,
        SkillRoundDispatcher, FilterRoundCaller, GateRoundCaller)
      - SwitchSkillHandler + ISwitchSkillCommand
      - GateRetryCoordinator + IGateRetryCoordinator
      - CompressSecurityFindingsHandler + ICompressSecurityFindings
      - PlanConsolidator + IPlanConsolidator (lived for SkillRound
        plan merge; master-decides removes the need)
      - StructuredOutputInstructionBuilder (per-role structured
        output instructions; masters bring their own contract)

    Retired pipeline step types (PipelineStep enum / preset YAML
    keys): Triage, SkillRound, SkillRoundStarted,
    SkillRoundCompleted, ConvergenceCheck, SwitchSkill,
    CompressSecurityFindings. Pipeline presets (api-scan,
    security-scan, fix-bug, add-feature, fix-no-test,
    mad-discussion, skill-manager, legal-analysis) shed every
    occurrence of those keys; the residual coordination for
    mad-discussion stays as Triage-shaped entries until p0179e
    rewires it (slice e replaces them, this slice leaves
    mad-discussion's coordination steps untouched).

    Retired prompt resources from AgentSmith.Application/Prompts/
    Resources/: triage-system.md, triage-structured-system.md,
    triage-structured-user.md, convergence-system.md,
    evaluate-skills-system.md, plan-consolidator-system.md,
    plan-consolidator-user.md.

    Concept-vocabulary entries that backed ActivatesWhen
    expressions (concept-vocabulary.yaml in agentsmith-skills) are
    audited: entries whose only purpose was activation filtering
    retire; entries still used elsewhere stay.

    Per-skill SKILL.md frontmatter cleanup in agentsmith-skills:
    role:, category:, investigator_mode:, survey_scope:,
    scope_hint:, block_condition:, loop:, output_schema: (except
    for master skills), activates_when:, convergence_criteria:
    are tombstoned (kept as comments for one release with a
    pointer to the migration note, then removed in a follow-up
    release of the skills repo).

    All tests in tests/AgentSmith.Tests that name a retired type
    are deleted (not converted) — the behaviour they pinned no
    longer exists.

  out: |
    The investigator skills themselves (33+ files in agentsmith-
    skills/skills/{coding,security,api-security,legal,
    skill-manager,autonomous,mad}) — they stay on disk with the
    tombstone frontmatter. Slices d and e replace their RUNTIME
    role; this slice removes the schema-side machinery only.
    Self-generated skills by the master → p0178.
    mad-discussion's Triage-shaped coordination steps → p0179e
    rewires them. This slice leaves them alone so mad-discussion
    keeps running until e ships.
    Dashboard renderer changes for retired event/step types →
    follow-up (drift detector will scream; the renderer changes
    are mechanical and land alongside e).

decisions:
  - key: |
      RoleSkillDefinition.OutputSchema stays — but only carries
      meaning when role=master (post-flatten: when the skill is
      under skills/_masters/). Reason: the master's output is a
      downstream pipeline contract; non-master skills have no
      consumer for the field after slice b. alternatives: drop
      OutputSchema entirely (rejected — pipeline-next-step
      contract needs typed handoff); keep on every skill
      (rejected — investigator skills are gone).
  - key: |
      Retired classes are DELETED, not marked [Obsolete]. Reason:
      [[feedback_no_wrapper_shims]] — bridging to dead types creates
      ghost call sites that look alive in IDE search. The compiler
      is the migration tool; consumers either get rewritten or
      they're proof their pipeline was already dead.
      alternatives: [Obsolete] for one release (rejected — drags
      the cleanup into two PRs and lets retired types accumulate
      stale references).
  - key: |
      Pipeline preset YAMLs lose the retired step entries
      in-place (one preset per PR commit) rather than rewriting
      preset.yaml whole. Reason: per-preset diffs review-cleanly;
      operators reading the PR see "fix-bug lost Triage step" not
      "config/presets/ rewrote everything". alternatives: single
      preset-rewrite commit (rejected — diff buries the per-preset
      structural change in noise).
  - key: |
      Slice b touches agentsmith-skills (tombstone frontmatter on
      every existing investigator skill) but does NOT delete the
      skill directories. Reason: dashboard wiki + run history
      reference these names; deletion breaks historical retrieval.
      Tombstone is a frontmatter field pointing at the absorbing
      master skill (added later by d/e); for slice b the pointer
      is empty (no master yet for most domains) and gets filled
      in by d/e.

steps:
  - id: flatten-role-skill-definition
    action: |
      Remove from RoleSkillDefinition: Role, Category,
      InvestigatorMode, SurveyScope, ScopeHint, BlockCondition,
      Loop, ActivatesWhen, ConvergenceCriteria, Orchestration.
      Reflection-asserted in a new test
      (RoleSkillDefinition_HasOnlyAllowedFields). SkillMdParser
      stops parsing the retired frontmatter keys (logs a single
      INFO if it sees them; no error — tombstone phase).
    modify:
      - "src/backend/AgentSmith.Contracts/Models/Configuration/RoleSkillDefinition.cs"
      - "src/backend/AgentSmith.Infrastructure.Core/Services/SkillMdParser.cs"
      - "src/backend/AgentSmith.Infrastructure.Core/Services/NewFormatSkillValidator.cs"
    new:
      - "tests/AgentSmith.Tests/Contracts/RoleSkillDefinitionShapeTests.cs"
  - id: retire-skill-role-enum
    action: |
      Collapse SkillRole to a single Master member (or remove the
      enum and rewire ISkillBodyResolver to accept no role).
      ISkillBodyResolver.ResolveBody(skill) signature change.
    modify:
      - "src/backend/AgentSmith.Contracts/Models/Skills/SkillRole.cs"
      - "src/backend/AgentSmith.Contracts/Services/ISkillBodyResolver.cs"
      - "src/backend/AgentSmith.Infrastructure.Core/Services/SkillBodyResolver.cs"
      - "src/backend/AgentSmith.Application/Prompts/SkillCatalogPromptCatalog.cs"
  - id: retire-triage
    action: |
      Delete ITriageStrategy + every implementation, every test,
      every consumer. Triage step removed from PipelineStep enum
      + every preset. Note: mad-discussion's Triage step kept
      until p0179e; that one keeps a temporary
      MadDiscussionTriageStrategy until slice e rewires.
    modify:
      - "src/backend/AgentSmith.Application/Services/Triage/* (DELETED)"
      - "src/backend/AgentSmith.Contracts/Services/ITriageStrategy.cs (DELETED)"
      - "config/presets/*.yaml — Triage entries removed"
  - id: retire-skill-round-family
    action: |
      Delete SkillRoundHandler, SkillRoundStartedHandler,
      SkillRoundCompletedHandler, SkillRoundDispatcher,
      FilterRoundCaller, GateRoundCaller, ActivationSkillFilter.
      Pipeline step types retire. Presets lose all SkillRound*
      entries.
  - id: retire-convergence
    action: |
      Delete ConvergenceEvaluator + IConvergenceEvaluator + tests.
      ConvergenceCheck step type retires from PipelineStep enum +
      all presets. Drop convergence-system.md embedded resource.
  - id: retire-switch-skill
    action: |
      Delete SwitchSkillHandler + ISwitchSkillCommand + tests.
      SwitchSkill pipeline step type retires from enum + presets.
  - id: retire-gate-coordinator
    action: |
      Delete GateRetryCoordinator + IGateRetryCoordinator + tests.
      Gate retry decision moves to master loop (already handled by
      AgenticLoopRunner in p0177).
  - id: retire-compress-findings
    action: |
      Delete CompressSecurityFindingsHandler +
      ICompressSecurityFindings + tests.
      CompressSecurityFindings pipeline step type retires from
      enum + every preset.
  - id: retire-plan-consolidator
    action: |
      Delete PlanConsolidator + IPlanConsolidator + tests.
      Embedded resources plan-consolidator-system.md +
      plan-consolidator-user.md deleted.
  - id: retire-structured-output-instruction-builder
    action: |
      Delete StructuredOutputInstructionBuilder; consumers
      (master prompt builder family) rewire to master skill's
      Rules body for output instructions.
  - id: retire-discussion-round-tool-policy
    action: |
      Delete DiscussionRoundToolPolicy + tests. Pipeline tool
      policy graph rewires.
  - id: tombstone-investigator-skills
    action: |
      In agentsmith-skills (branch feat/p0179b-tombstone): add
      tombstone: true frontmatter field + absorbed_by: '' (empty
      pointer, d/e fill it in) on every per-role investigator
      skill under skills/{coding,security,api-security,legal,
      skill-manager,autonomous,mad}. Update SKILL.md parser
      contract in agentsmith-skills's own schema.
  - id: pipeline-preset-cleanup
    action: |
      One commit per preset YAML — drop the retired step entries.
      Presets touched: fix-bug, fix-no-test, add-feature,
      api-scan, security-scan, skill-manager, legal-analysis.
      mad-discussion untouched (e handles it).
  - id: verify
    action: |
      dotnet build + dotnet test green. pnpm build + pnpm test
      green (TS drift detector may flag retired event types if
      enum codes were tied to retired steps — fix in the same
      slice). grep for retired class names in src/backend returns
      no hits. grep for retired pipeline step keys in config/
      returns hits only in mad-discussion's preset.

tests:
  - "RoleSkillDefinition_HasOnlyAllowedFields_ReflectionEnforced"
  - "SkillRole_OnlyMasterRemains_Or_EnumRemoved"
  - "NewFormatSkillValidator_AcceptsFlattenedSchema"
  - "NewFormatSkillValidator_RejectsRetiredFrontmatterKeys_AsTombstoneInfo"
  - "PipelineStep_RetiredSteps_NotDefined"
  - "ApiScanPreset_HasNoTriageOrSkillRoundOrCompressEntries"
  - "SecurityScanPreset_HasNoTriageOrSkillRoundOrCompressEntries"
  - "FixBugPreset_HasNoSkillRoundOrConvergenceOrSwitchSkillEntries"
  - "AddFeaturePreset_HasNoSkillRoundOrConvergenceOrSwitchSkillEntries"
  - "FixNoTestPreset_HasNoSkillRoundOrConvergenceOrSwitchSkillEntries"
  - "MadDiscussionPreset_RetainsTriageAsLegacyForP0179e"
  - "SkillCatalog_LoadsTombstonedSkill_WithoutError"

done:
  - "RoleSkillDefinition flattened to {Name, DisplayName, Emoji, Description, Triggers, Rules, Source, SkillDirectory, OutputSchema}."
  - "SkillRole enum either retired or collapsed to Master-only."
  - "All retired classes (Triage, SkillRound family, ConvergenceEvaluator, SwitchSkill, GateRetryCoordinator, CompressSecurityFindings, PlanConsolidator, StructuredOutputInstructionBuilder, DiscussionRoundToolPolicy) deleted."
  - "All pipeline presets except mad-discussion shed Triage/SkillRound/ConvergenceCheck/SwitchSkill/Compress entries; mad-discussion keeps them for p0179e."
  - "Retired prompt resources deleted from AgentSmith.Application/Prompts/Resources/."
  - "agentsmith-skills investigator skills tombstoned via frontmatter (PR open against skills repo)."
  - "dotnet build + dotnet test + pnpm build + pnpm test green. grep for retired type/step names is clean outside mad-discussion."
