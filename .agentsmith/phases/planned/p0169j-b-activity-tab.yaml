# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0169j-b-activity-tab
goal: |
  Replace the developer-debug FilterRail (16 event-type checkboxes,
  L1/L2/L3 jargon) with a human Activity tab: chronological event
  timeline, 5 pill-style toggle groups, failure rows surface the
  reason inline so an operator who sees "step 6 failed" gets the
  WHY without digging through server logs.

  Closes the diagnostic gap the user hit on the project-discovery
  skill-drop run: dashboard said "BootstrapDiscover failed" but
  not "because no skill with output_schema=discovery was loaded
  after silent skill-validation drop".

requires:
  - p0169f-topology-ui
  - p0169g-filter-rail-and-l3-tools
  - p0169h-event-trail-tree

scope:
  in: |
    DASHBOARD (src/dashboard/src/app/jobs/[id]):

    (1) New Activity tab routed via ?tab=activity, alongside the
        existing Topology + Trail tabs. Default tab unchanged
        (Topology).

    (2) Five pill toggles in a single horizontal row replace the
        three-section L1/L2/L3 FilterRail:
          - [ All ] [ Decisions ] [ Tools ] [ LLM ] [ Sandbox ] [ Gates ]
        Maps to existing EventType groups:
          - Decisions: TriageRoute + DecisionLogged
          - Tools: ToolCall + ToolResult
          - LLM: LlmCallStarted + LlmCallFinished
          - Sandbox: SandboxCommand + SandboxOutput + SandboxResult
            + SandboxCreated + SandboxDisposed
          - Gates: GateChecked
        The L1 lifecycle events (RunStarted/RunFinished/StepStarted/
        StepFinished) are always-visible — they're the chronological
        scaffold.

    (3) Power-user toggle "show event types" reveals the full 16-type
        FilterRail underneath for debug work. Default off.

    (4) ActivityRow per event, chronological:
          12:56:34  ◇  Triage         backend-developer-planner   Lead
          12:56:38  ◆  Decision       Architecture: chose X over Y
                                      "because the cache invalidation..."
          12:56:41  ↗  LLM start      claude-sonnet · planner · 2.1k in
          12:57:03  ↘  LLM done       1.4k out · $0.04 · 22s
          12:57:08  ✕  Gate fail      bootstrap: missing context.yaml in worker
        Failure rows (StepFinished status=failed, GateChecked passed=false,
        ToolResult ok=false) render in rose with the reason text visible
        without a click. Click expands to full payload (re-uses
        TrailNodeDetailPane's payload renderers).

    (5) When a StepFinished arrives with status=failed AND the next
        event-stream entry is a DecisionLogged or GateChecked within
        2 seconds, ActivityList auto-pairs them — so "step 6 failed"
        + "Gate fail: missing skill" render as a single composite
        ErrorRow with reason inline. Heuristic, not contract — when
        no nearby explanation exists, the row renders alone with
        "(see server logs)" hint.

    (6) URL search-param ?activity=Decisions,Tools encodes the active
        pill set; absence = all on. Pill toggle calls router.replace.

  out: |
    Activity tab does NOT replace the existing FilterRail in this
    slice — it lives alongside as a new tab. FilterRail removal is a
    follow-up after operator feedback confirms the pills cover the
    diagnostic surface.
    Search-in-events. Out — pill filtering + URL persistence is the
    affordance today; full-text search if operators ask.
    Server-side event-reason enrichment. Out — pairing happens
    client-side from the existing event stream.

decisions:
  - key: |
      Five pills, not three (L1/L2/L3) — Reason: L1/L2/L3 is the
      internal contract from p0169e. Operators don't care about
      semantic layers; they care about what kind of activity the
      agent did. Decisions / Tools / LLM / Sandbox / Gates is the
      operator vocabulary; the L-numbers stay in the backend
      contract. alternatives: keep L1/L2/L3 labels (rejected —
      developer leakage); free-form filter expression (rejected —
      overkill for the diagnostic surface).

  - key: |
      Failure-pairing heuristic, not server-side correlation —
      Reason: StepFinished + GateChecked / DecisionLogged are
      separate events with no parent-id today. Adding correlation
      would re-open the p0169e contract for projection-only work.
      A 2-second temporal-proximity heuristic catches the common
      case (gate fails, step fails immediately after); rare misses
      render as standalone rows with a hint. alternatives: extend
      events with a correlation_id (deferred — separate phase if
      heuristic misses too often); no pairing (rejected — the gap
      the user explicitly hit).

  - key: |
      Activity tab as new addition, not FilterRail replacement —
      Reason: FilterRail still serves the Trail tab (its filtering
      is consumed by SandboxBox + RunToolsPanel). Ripping it out
      here would force coupled rework. Activity gets its own pills;
      FilterRail's removal happens after the Activity surface
      proves itself. alternatives: rip + replace (rejected — too
      big a swing); keep both (this — accepted churn for one slice).

steps:
  - id: activity-pills
    action: |
      ActivityPills component + ?activity= URL persistence helper.
      Five pill groups + ALL toggle.
    new:
      - "src/dashboard/src/lib/activityPillQuery.ts"
      - "src/dashboard/src/components/jobs/ActivityPills.tsx"
      - "src/dashboard/src/lib/__tests__/activityPillQuery.test.ts"

  - id: failure-pairing
    action: |
      Client-side pairer: walks the event array, when a
      StepFinished status=failed is followed within 2s by a
      DecisionLogged or GateChecked passed=false, fold them into
      a composite ActivityErrorRow. Pure function, fully tested.
    new:
      - "src/dashboard/src/lib/ActivityErrorPairer.ts"
      - "src/dashboard/src/lib/__tests__/ActivityErrorPairer.test.ts"

  - id: activity-rows
    action: |
      ActivityRow + ActivityErrorRow components rendering each event
      type. Re-use TrailNodeDetailPane's payload renderers for
      click-to-expand. Failure rows render reason inline.
    new:
      - "src/dashboard/src/components/jobs/ActivityRow.tsx"
      - "src/dashboard/src/components/jobs/ActivityErrorRow.tsx"
      - "src/dashboard/src/components/jobs/__tests__/ActivityRow.test.tsx"
      - "src/dashboard/src/components/jobs/__tests__/ActivityErrorRow.test.tsx"

  - id: activity-tab
    action: |
      ActivityTab orchestrator: consumes useRunEvents, applies pill
      filter, runs ActivityErrorPairer, renders rows. Power-user
      "show event types" toggle reveals the legacy FilterRail.
    new:
      - "src/dashboard/src/components/jobs/ActivityTab.tsx"
      - "src/dashboard/src/components/jobs/__tests__/ActivityTab.test.tsx"
    modify:
      - "src/dashboard/src/app/jobs/[id]/page.tsx"

  - id: verify
    action: |
      pnpm test green. pnpm build green. Manual smoke: trigger a
      failing run, switch to Activity tab, see the failure reason
      inline without clicking into the trail.

tests:
  - "ActivityPills_DefaultLoad_AllPillsActive"
  - "ActivityPills_TogglingOneOff_WritesUrlSearchParam"
  - "ActivityPills_UrlActivityParam_RestoresPillStateOnRefresh"
  - "ActivityErrorPairer_StepFailedFollowedByGateFail_PairsIntoErrorRow"
  - "ActivityErrorPairer_StepFailedWithNoNearbyExplanation_RendersStandalone"
  - "ActivityErrorPairer_DecisionMoreThan2sAfterFailure_NotPaired"
  - "ActivityRow_DecisionLogged_RendersChoseAndReason"
  - "ActivityRow_LlmCallFinished_RendersTokensCostDuration"
  - "ActivityErrorRow_GateFail_ReasonVisibleInline_NoClickRequired"
  - "ActivityErrorRow_ClickExpands_ShowsPayloadDetail"
  - "ActivityTab_PillFilter_HidesEventsOutsideActivePills"
  - "ActivityTab_PowerToggle_RevealsLegacyFilterRail"

done:
  - "Activity tab routed via ?tab=activity; default tab unchanged."
  - "Five pills (Decisions / Tools / LLM / Sandbox / Gates) replace L1/L2/L3 jargon."
  - "Failure rows show reason inline; click expands to payload."
  - "ActivityErrorPairer folds step-fail + nearby explanation into composite ErrorRow."
  - "?activity=… URL params round-trip; defaults encoded by absence."
  - "Power-user toggle 'show event types' reveals the legacy FilterRail."
  - "Vitest suite green. pnpm build green."
  - "Manual smoke: failing run shows reason inline in Activity tab."
