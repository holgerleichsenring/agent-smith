phase: p0282a
goal: "Coding-principles stage 1: convert behavior statics (~13 services, PipelineResolver et al.) to DI services with interfaces + injected loggers, locked by rule test"

applies_to: backend

requires: []

decisions:
  - "Census 2026-06: 43 public-static-with-methods, ~13 are behavior services; pure data/extension holders stay static"
  - "Lock = NoStaticServicesRuleTests with EMPTY allowlist at completion — the census is the burn-down list"

steps:
