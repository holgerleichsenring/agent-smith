    action: "Convert the ~13 behavior statics to sealed DI services with I-interfaces + ILogger<T> injection (PipelineResolver is exhibit A: static routing with null-passed optional ILogger); transient default per code-quality bar"
  - id: shrink-allowlist
    action: "Empty the allowlist as conversions land"

tests:
  - "NoStaticServices_BehaviorStaticOutsideAllowlist_Fails"
  - "PipelineResolver_ResolvesViaDI_WithRealLogger"

done:
  - "Allowlist empty; rule test locks the principle"
  - "Full suite green; no manual new-with-logger constructions introduced"
