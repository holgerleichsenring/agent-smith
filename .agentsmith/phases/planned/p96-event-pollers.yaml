# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p96
goal: "Label-idempotent pollers for all four platforms — replaces or supplements webhooks for environments without inbound network access. Uses the same claim-then-enqueue contract as webhooks."
requires: ["p95a", "p95b", "p95c"]

decisions:
  - key: "Pollers are label-idempotent, not time-cursored. Query: 'all tickets with trigger label in status Pending'. No last-sync timestamp needed — the ticket status itself decides whether to act."
  - key: "Two independent Redis leases: agentsmith:leader:poller (who polls) and agentsmith:leader:housekeeping (who runs EnqueuedReconciler + StaleJobDetector). Both 30s TTL, renewed every 10s. A single replica can hold both. This distributes work across replicas without leaving a gap during failover."
  - key: "Non-leader replicas remain active workers — they pull from Redis queue and execute pipelines. Worker role is independent of leadership."
  - key: "Sharding explicitly rejected — too much operator burden. One poller-leader polls all configured platforms."
  - key: "Polling across platforms runs in parallel (Task.WhenAll with per-poller timeout + exception isolation). One slow platform does not delay others."
  - key: "Each platform has its own IEventPoller implementation. Per-platform rate limiting via Polly. One listing request per poll cycle (not one per ticket)."
  - key: "Pollers call TicketClaimService.ClaimAsync — same code path as webhooks. No direct enqueueing."
  - key: "Polling is opt-in per pipeline/project in config. Webhook and poller can coexist (both idempotent — whoever claims first wins, second gets AlreadyClaimed)."
  - key: "Poll interval configurable per project (default 60s). Jitter ±10% to avoid thundering herd across projects."

steps:
  - id: poller-interface
    action: "IEventPoller abstraction — one method, returns tickets to claim"
    new:
      - "Contracts/Services/IEventPoller.cs: PollAsync(ct) → IReadOnlyList<ClaimRequest>"
      - "Contracts/Services/PollerMetadata.cs: record (PlatformName, ProjectName, IntervalSeconds)"
    action_detail:
      - "PollAsync returns the candidates found. Orchestration (calling TicketClaimService) is the host's job — keeps pollers focused on discovery."

  - id: platform-pollers
    action: "Concrete IEventPoller per platform — each lists tickets by label+status in a single API call"
    new:
      - "Services/Polling/GitHubIssuePoller.cs: GET /repos/{owner}/{repo}/issues?labels={trigger}&state=open — filter by status label locally."
      - "Services/Polling/GitLabIssuePoller.cs: GET /projects/{id}/issues?labels={trigger}&state=opened"
      - "Services/Polling/AzureDevOpsWorkItemPoller.cs: WIQL query — SELECT [System.Id] FROM WorkItems WHERE [System.Tags] CONTAINS '{trigger}' AND [System.State] IN ('New','Active')"
      - "Services/Polling/JiraIssuePoller.cs: JQL search — project={key} AND labels={trigger} AND status in ({pendingStatuses})"
    action_detail:
      - "Each poller owns its rate limiter (Polly RateLimiter policy), sized to platform limits (Jira 10/s, GitHub 5000/h, etc.)."
      - "Each poller returns ClaimRequest list with (platform, projectName, ticketId, pipelineName)."
      - "Pipeline resolution: from trigger label suffix via config pipeline_from_label mapping (same mechanism as p84)."

  - id: leader-election
    action: "Two independent Redis leases — poller-leader and housekeeping-leader"
    new:
      - "Services/Polling/RedisLeaderLease.cs: TryAcquireAsync(key, ttl) / RenewAsync / ReleaseAsync using SET key value NX EX ttl + Lua renewal script (CAS to prevent renewing a lease we no longer hold)."
      - "Services/Polling/LeaderElectedHostedService.cs: parameterized by lease key and work callback. Holds the lease, invokes the callback when leader, idles otherwise. Two instances registered — one for agentsmith:leader:poller, one for agentsmith:leader:housekeeping."
    modify:
      - "From p95: EnqueuedReconciler and StaleJobDetector no longer run unconditionally on every replica. They become work callbacks inside the housekeeping LeaderElectedHostedService. Single replica deployments still work (the one replica holds both leases)."

  - id: poller-host
    action: "PollerHostedService orchestrates the poll cycle on the leader — platforms run in parallel"
    new:
      - "Services/Polling/PollerHostedService.cs: work callback for the poller LeaderElectedHostedService. Per cycle, invokes all configured IEventPoller.PollAsync via Task.WhenAll with per-poller timeout (default 20s). Each returned ClaimRequest is handed to TicketClaimService.ClaimAsync."
    action_detail:
      - "Per-cycle flow: for each poller → Task.Run(PollAsync) with CancellationTokenSource(20s). Task.WhenAll awaits all. Per-poller exceptions and timeouts are caught and logged; one failing platform does not prevent the others' claims from being processed."
      - "Claim processing after WhenAll is sequential per cycle — keeps Redis claim-lock contention predictable. ClaimAsync is fast (few hundred ms worst case), so this is not a bottleneck."
      - "Sleep between cycles: configured interval + jitter. Jitter is per-project, not global — prevents alignment across projects even when all use the same interval."
      - "Graceful shutdown: on cancellation, await current cycle's WhenAll (bounded by the 20s timeout), then release lease."

  - id: config-schema
    action: "Per-project poller configuration"
    modify:
      - "agentsmith.yml schema: add polling section per project with enabled (bool, default false), interval_seconds (default 60), jitter_percent (default 10)."
      - "ProjectConfig.cs: PollingConfig property, defaults mean 'disabled — webhook only'."
      - "DI registration: register an IEventPoller per (project, platform) pair where polling.enabled=true."

  - id: observability
    action: "Metrics and logs for poll cycles"
    modify:
      - "PollerHostedService: emit structured log per cycle with platform, project, candidates_found, claimed, already_claimed, rejected, failed, duration_ms."
      - "RedisLeaderLease: emit log on leader change (acquired/lost/renewed)."
      - "OpenTelemetry counters: poll.cycle{platform,project,result}, poll.candidates{platform,project}, leader.state{acquired|released}."

  - id: docs
    action: "Setup documentation — when to use polling vs webhook"
    new:
      - "docs/setup/polling.md: conceptual overview, per-platform config examples, troubleshooting (stuck leader, rate-limit breaches, orphaned Enqueued tickets)."
      - "docs/setup/polling-vs-webhooks.md: decision matrix covering network egress-only environments, latency tradeoffs, cost considerations."
    modify:
      - "docs/setup/README.md: link polling docs prominently for private-K8s deployments."

  - id: verify
    action: "dotnet build && dotnet test — all existing tests green, polling disabled by default so no behavioral change for webhook users"

tests:
  - "GitHubIssuePoller_ReturnsOnlyPendingLabeledIssues"
  - "GitLabIssuePoller_ReturnsOnlyPendingLabeledIssues"
  - "AzureDevOpsWorkItemPoller_WIQLFilter_MatchesPendingTaggedItems"
  - "JiraIssuePoller_JQLFilter_MatchesPendingLabeledIssues"
  - "RedisLeaderLease_FirstCallerAcquires_SecondCallerBlocked"
  - "RedisLeaderLease_LeaderCrashes_LeaseExpires_FollowerAcquires"
  - "RedisLeaderLease_Renewal_ExtendsLease"
  - "RedisLeaderLease_RenewalAfterLoss_DoesNotOverwriteNewHolder (CAS check)"
  - "LeaderElectedHostedService_TwoInstancesWithDifferentKeys_BothLeadable (poller + housekeeping)"
  - "PollerHostedService_AsLeader_InvokesAllConfiguredPollers"
  - "PollerHostedService_AsFollower_DoesNotPoll"
  - "PollerHostedService_OnePlatformTimesOut_OthersStillComplete (parallel isolation)"
  - "PollerHostedService_OnePlatformThrows_OthersStillComplete"
  - "PollerHostedService_CandidateAlreadyClaimed_LogsAndContinues (webhook-poller coexistence)"
  - "PollerHostedService_JitterApplied_CyclesDoNotAlign"
  - "HousekeepingLeaderedService_OnlyLeaderRunsReconciler"
  - "HousekeepingLeaderedService_LeaderDies_FollowerTakesOverWithin30s"
  - "PollingConfig_Disabled_NoPollerRegistered"

done:
  - "IEventPoller exists for all four platforms (GitHub, GitLab, AzDO, Jira)."
  - "Two independent Redis leases control work distribution: poller-leader and housekeeping-leader. Single-replica deployments still function (same pod holds both)."
  - "Housekeeping services from p95 (EnqueuedReconciler, StaleJobDetector) move from unconditional-on-every-replica to leader-only — reduces N-fold API calls across replicas. Leader failover within 30s on pod crash closes any gap."
  - "Platform polls run in parallel per cycle with 20s per-poller timeout. A hanging Jira API call does not delay GitHub/GitLab/AzDO cycles."
  - "Non-leader replicas continue to pull jobs from Redis queue and execute pipelines — worker role is independent of leadership."
  - "Webhook and poller fully interchangeable: disabling webhooks and enabling polling produces equivalent behavior with higher latency but no inbound network requirement."
  - "Coexistence works: when both fire for the same ticket, TicketClaimService serializes — one wins, the other gets AlreadyClaimed cleanly."
  - "Per-project polling config; disabled by default (backward compatible)."
  - "Rate-limit-aware: no platform quota gets blown through a tight poll cycle."
  - "docs/setup/polling.md and polling-vs-webhooks.md published."
  - "dotnet build zero warnings, all tests green."
