phase: p40b
goal: "Extract ticket and source providers from Infrastructure into dedicated deployable projects — GitHub, AzureDevOps, GitLab, Jira"
steps:
  - id: github
    action: "Create AgentSmith.Providers.GitHub project"
    new:
      - "GitHubTicketProvider: ITicketProvider"
      - "GitHubSourceProvider: ISourceProvider"
      - "GitHubStorageReader: IStorageReader"
      - "GitHubProviderOptions: { Token, BaseUrl }"
      - "services.AddGitHubProviders(configuration)"
  - id: azdo
    action: "Create AgentSmith.Providers.AzureDevOps project"
    new:
      - "AzureDevOpsTicketProvider: ITicketProvider"
      - "AzureReposSourceProvider: ISourceProvider"
      - "services.AddAzureDevOpsProviders(configuration)"
  - id: jira
    action: "Create AgentSmith.Providers.Jira project"
    new:
      - "JiraTicketProvider: ITicketProvider"
      - "services.AddJiraProvider(configuration)"
  - id: gitlab
    action: "Create AgentSmith.Providers.GitLab project"
    new:
      - "GitLabTicketProvider: ITicketProvider"
      - "GitLabSourceProvider: ISourceProvider"
      - "services.AddGitLabProviders(configuration)"
  - id: cleanup
    action: "Remove provider classes from Infrastructure, update sln and Cli references"
    modify: ["AgentSmith.sln", "AgentSmith.Cli.csproj"]
done:
  - "All 4 provider projects created and building"
  - "Zero provider classes remain in Infrastructure"
  - "Each provider has its own Add{Name}Providers() extension"
  - "Host only references providers it needs"
  - "All existing tests pass"
