phase: p25
goal: "Read PR review comments, make changes, push new commits — PR becomes a conversation, not one-shot"
steps:
  - id: listener
    action: "Add GetPullRequestReviewsAsync to ISourceProvider"
    new:
      - "ReviewComment: { Id, Author, Body, FilePath?, LineNumber?, CreatedAt }"
    modify: ["ISourceProvider: implement for GitHub (Octokit), GitLab (MR notes), AzDO (PR threads)"]
  - id: pipeline
    action: "Add review feedback mini-pipeline: FetchReviews → AnalyzeReviews → PlanRevisions → Execute → Test → PushCommit → ReplyToReviews"
    new:
      - "IReviewAnalyzer"
      - "ReviewPipelineExecutor"
  - id: triggers
    action: "Add webhook (pull_request_review), Slack ('fix PR comments on #58'), polling fallback"
  - id: guardrails
    action: "Max review iterations (default 3), authorized reviewers only, never force-push"
done:
  - "Read PR reviews from GitHub, GitLab, Azure DevOps"
  - "Classify review comments (actionable / question / approval / nit)"
  - "Execute changes based on review feedback"
  - "Push new commits to existing PR branch"
  - "Reply to review comments with explanation"
  - "Webhook trigger for PR review events"
  - "Slack trigger"
  - "Max iteration guardrail"
