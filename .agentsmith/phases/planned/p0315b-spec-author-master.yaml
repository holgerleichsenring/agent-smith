# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0315b
goal: "spec-author-master + draft loop: turn a design conversation into a schema-valid phase spec, asking clarifying questions when scope is ambiguous"

applies_to: backend + skills-repo

requires:
  - p0315a

decisions:
  - "New master skill spec-author-master in agent-smith-skills/_masters (agentskills-spec-compliant per p0313); runs via the existing AgenticMasterHandler, so no new loop engine"
  - "Master is grounded: it gets the code map + existing phase list (for next-number + dedup against planned/done) + coding-principles, same context assembly the coding master uses"
  - "Clarifying questions go through the EXISTING ask_human/IDialogueTransport path back into the Slack/Teams thread — the same typed-question infra p0058/p0164a use"
  - "Draft must validate against phase-spec.schema.json before it is shown; an invalid draft re-prompts the master, it never surfaces raw"

steps:
  - id: master-skill
    action: "Author spec-author-master SKILL.md: role=master, drafts a phase spec (goal/applies_to/requires/decisions/steps/tests/done) from the transcript; terse per feedback_phase_specs_terse; asks ask_human on genuine ambiguity"
    new:
      - "agent-smith-skills/_masters/spec-author-master/SKILL.md"
  - id: pipeline
    action: "spec-dialog pipeline preset: assemble context (code map + phase list + principles), run AgenticMasterHandler with spec-author-master, multi-turn via IDialogueTransport, emit the draft into the p0315a transcript"
    new:
      - "PipelinePresets.SpecDialog"
  - id: validate
    action: "Validate the drafted YAML against phase-spec.schema.json; on failure re-prompt the master with the validation error (fail-loud, never surface raw)"

tests:
  - "SpecAuthor_AmbiguousScope_AsksClarifyingQuestion"
  - "SpecAuthor_CompleteInput_ProducesSchemaValidDraft"
  - "SpecAuthor_NextNumber_AvoidsCollisionWithPlannedAndDone"
  - "SpecAuthor_InvalidDraft_Reprompted_NotSurfacedRaw"

done:
  - "A design thread yields a schema-valid phase YAML with a correct next phase number; ambiguous scope triggers a clarifying question in-thread"
