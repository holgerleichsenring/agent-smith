# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0151c
goal: "Make the running observation list visible to downstream skills, and
  add a pull-based dispatch mechanism so a skill can request follow-up
  depth that the orchestrator grants subject to the pipeline cost
  budget.

  Today each skill runs against the same baseline inputs (swagger,
  scanner findings, skill-specific context) without seeing what
  preceding skills already discovered. The result is generic output
  even when a prior skill has already located the exact code site —
  the downstream skill cannot leverage that observation and either
  rediscovers from scratch (token waste) or restates the same finding
  in less specific terms (signal dilution).

  Decentralised verification per the umbrella decision means every
  skill has tools and may verify itself — but if the bus is empty, the
  default behaviour is wasteful rediscovery. The bus turns each prior
  observation into a hint with a file:line anchor the downstream skill
  can confirm with a single Read call rather than full Grep + Read."

requires: ["p0151b"]

scope:
  in: |
    (1) Observation bus visibility. The prompt assembled by
        ApiSkillPromptStrategy (and any pipeline-equivalent strategy)
        appends a compact JSON section: 'observations_so_far' — the
        list of SkillObservation records emitted by skills that have
        already run in this pipeline, projected to the location-bearing
        fields (id, role, concern, severity, file, start_line, api_path,
        schema_name, description, evidence_mode). Suggestion and
        rationale + details are omitted to keep tokens down. Skills are
        told in their SKILL.md (p0151e) that they may treat any
        observation with file:line as a verifiable hint.

    (2) DispatchRequest as a typed observation extension. A new optional
        record SkillObservation.DispatchRequest { skill, focus, reason }
        — when present, signals the orchestrator that this skill
        finished but wants a specific follow-up. The field is part of
        the observation, not a side-channel, so it survives the same
        validator + parser path.

    (3) DispatchCoordinator (new) inspects the latest round's
        observations for DispatchRequest entries. For each request it
        consults the pipeline cost tracker (PipelineCostTracker — also
        modified in p0151d for caps) — if the projected cost of one
        more skill round leaves headroom under the cap and the dispatch
        depth ≤ 2, the coordinator enqueues an ApiSecuritySkillRoundCommand
        (or pipeline-appropriate equivalent) targeting the requested
        skill with a context-key containing the focus + reason. Otherwise
        the coordinator emits a typed observation 'dispatch_skipped'
        with the reason (budget_exhausted, depth_cap, unknown_skill).

    (4) Dispatch-depth tracking via a pipeline context concept
        'dispatch_depth' incremented on each dispatched follow-up,
        decremented when the follow-up finishes. Cap = 2.

  out: |
    Parallel skill execution. Bus is built sequentially after each
    skill round; concurrent skills would race on bus content. Sequential
    keeps semantics simple; parallelism is a later optimisation per the
    umbrella decision.

    Skill-to-skill direct push. A skill cannot call another skill
    directly — only emit a DispatchRequest. Orchestrator is the only
    component with cost-budget authority.

    Bus projection control by the skill. Every skill receives the same
    projection. Per-skill customisation is over-engineering and would
    cement a coupling that the catalog rewrite (p0151f) intentionally
    avoids.

decisions:
  - key: |
      Bus carries observations, not raw scanner output. — Scanner output
      flows separately via the api-scan compressor (modified in p0151g).
      The bus is the post-skill stream of judged claims; the scanner
      stream is the pre-skill stream of unjudged inputs. Mixing them
      would re-introduce the prose-narrative coupling we are removing.
      alternatives: bus = everything (rejected: token blow-up and
      schema mush).

  - key: |
      Pull-based dispatch via observation field, not via a new tool. —
      A skill cannot trigger work it does not know the budget for.
      Emitting a request and letting the orchestrator decide keeps the
      protocol simple and the budget enforceable. alternatives:
      DispatchSkill tool (rejected: gives the LLM direct fan-out
      capability, which is the failure mode we are protecting against).

  - key: |
      Depth cap = 2. — One follow-up is reasonable (specialist confirms
      a recon hint with deeper read). Two is the rare case where the
      confirmed finding spawns a related angle. Three is already
      pathological — at that point the original skill catalog is mis-
      designed. alternatives: configurable depth (rejected: knob without
      observable use case); no cap (rejected: see above).

steps:
  - id: prompt-bus
    action: "ApiSkillPromptStrategy assembles observations_so_far from the pipeline context's running observation list. Compact JSON. Other pipelines' prompt strategies follow the same pattern."
    modify:
      - "src/AgentSmith.Application/Services/Prompts/ApiSkillPromptStrategy.cs"
      - "src/AgentSmith.Application/Services/Prompts/SkillPromptStrategy.cs (or whatever the discussion-path strategy is named after p0147d)"
    new:
      - "src/AgentSmith.Application/Services/Prompts/ObservationBusProjector.cs"

  - id: dispatch-request
    action: "Add DispatchRequest record + field on SkillObservation. ObservationParser maps it through. Bus projection excludes it (consumer-facing concern, not bus-share concern)."
    new:
      - "src/AgentSmith.Contracts/Models/SkillDispatchRequest.cs"
    modify:
      - "src/AgentSmith.Contracts/Models/SkillObservation.cs"
      - "src/AgentSmith.Application/Services/Handlers/RawObservation.cs"
      - "src/AgentSmith.Application/Services/Handlers/ObservationNormalizer.cs"

  - id: coordinator
    action: "DispatchCoordinator inspects new observations for DispatchRequest, checks budget + depth, enqueues ApiSecuritySkillRoundCommand or pipeline-equivalent. Lives in Application/Services/SkillRounds."
    new:
      - "src/AgentSmith.Application/Services/SkillRounds/DispatchCoordinator.cs"
      - "src/AgentSmith.Application/Services/SkillRounds/IDispatchCoordinator.cs"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/ApiSkillRoundHandler.cs (call coordinator after each round)"
      - "src/AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs (DI registration)"

  - id: depth-context
    action: "Add 'dispatch_depth' to ContextKeys + concept vocabulary. Coordinator increments/decrements."
    modify:
      - "src/AgentSmith.Application/Models/ContextKeys.cs"
      - "(cross-repo agent-smith-skills) skills/concept-vocabulary.yaml — add dispatch_depth int concept"

  - id: tests
    action: "Coordinator behaviour under various budget + depth scenarios; bus projection correctness."
    new:
      - "tests/AgentSmith.Tests/Prompts/ObservationBusProjectorTests.cs"
      - "tests/AgentSmith.Tests/SkillRounds/DispatchCoordinatorTests.cs"
      - "tests/AgentSmith.Tests/SkillRounds/DispatchDepthCapTests.cs"
      - "tests/AgentSmith.Tests/Handlers/SkillObservationDispatchRequestParseTests.cs"

tests:
  - "ObservationBusProjector_NoObservations_EmitsEmptyArray"
  - "ObservationBusProjector_ManyObservations_OmitsRationaleAndSuggestion"
  - "ObservationBusProjector_AnalyzedFromSourceObservation_KeepsFileAndStartLine"
  - "ApiSkillPromptStrategy_LaterSkillRound_ReceivesEarlierRoundsObservations"
  - "DispatchCoordinator_NoDispatchRequest_NoEnqueue"
  - "DispatchCoordinator_DispatchRequestUnderBudget_EnqueuesRound"
  - "DispatchCoordinator_DispatchRequestBudgetExhausted_EmitsSkipObservation"
  - "DispatchCoordinator_DispatchRequestAtDepthCap_EmitsSkipObservation"
  - "DispatchCoordinator_DispatchRequestUnknownSkill_EmitsSkipObservation"
  - "DispatchCoordinator_NestedDispatch_RespectsDepthIncrement"

done:
  - "Smoke against Sample api-security-scan: the second skill round's prompt contains observations_so_far populated from the first round."
  - "A planted DispatchRequest in a test response triggers exactly one follow-up round (verifiable via the pipeline command log)."
  - "A planted DispatchRequest with the pipeline cost budget exhausted produces a 'dispatch_skipped' observation and no enqueue."
  - "Full test suite green; /smoke green for api-scan + security-scan + fix-bug pipelines."
