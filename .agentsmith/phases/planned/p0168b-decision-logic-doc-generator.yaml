# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0168b
goal: |
  Generate a human-readable Decision-Logic Document per pipeline preset.
  Article 13 of the EU AI Act requires "concise, clear, relevant and
  accessible" information on how the system makes decisions. This phase
  ships a deterministic doc generator that produces, per preset, a
  description of:
  - Inputs the pipeline reads (ticket fields, config, code map)
  - Decisions the pipeline makes (triage, skill activation, approval gate)
  - Outputs it produces (PR, comments, observations)
  - Human oversight points (approval gates, dialogue questions)
  - Cost + model boundaries

  Generator is template-driven, zero LLM calls — token-free per the
  operator's "self-test without extra LLM cost" requirement.

requires: ["p0168a"]

scope:
  in: |
    (1) Generator reads from existing static sources:
        - PipelinePresets.{Name}.cs for the step sequence
        - Skill catalog metadata (SKILL.md frontmatter) for skill
          activation rules + role + phase
        - ContextKeys + PipelineRequest field metadata for inputs
        - PipelineDefinition / config schema for operator-tunable boundaries
        - ProjectMap shape for what the agent learns about the repo

    (2) One markdown file per preset:
        docs/compliance/decision-logic/{preset-name}.md
        Generated by `scripts/build-decision-logic.sh`. The script runs
        as part of the docs CI workflow.

    (3) Per-preset doc structure (template):
        - Header: name, version, last-generated timestamp
        - Inputs section: enumerated context keys + source
        - Decision points: each step in the sequence with the question
          it answers + the criteria + the human-oversight option (if any)
        - Outputs: artifacts written, channels notified
        - Boundaries: max cost per run, model fallback chain,
          allowed-external-hosts (from p0163a)
        - Risk dimensions: enumerated SkillObservation.Category values
          this preset emits

    (4) Inclusion in compliance bundle: p0168a's exporter adds the
        per-preset decision-logic.md for the run's pipeline to every
        bundle.

    (5) CI gate: a docs job runs the generator on every push, fails the
        build if the generated content drifts from the committed version
        (auto-commit not in scope; the build failure forces a manual
        regeneration commit).

  out: |
    Risk-event log endpoint — slice [[p0168c]].
    Article-by-article mapping — slice [[p0168d]].
    LLM-generated narrative descriptions. Out — template-only, the
    'why' is in the spec / phase YAML, not regenerated each build.
    Per-skill decision-logic docs. Out — preset-level is the
    granularity regulators audit at.

decisions:
  - key: |
      Template-driven generator, no LLM — Reason: token-free testing
      requirement (operator-level). Plus: deterministic generation
      means audit-tooling consumers can diff doc against version
      to detect material changes. alternatives: LLM narrative
      (rejected: cost + non-determinism for an audit doc); hand-written
      (rejected: drift).

  - key: |
      Per-preset, not per-run — Reason: the *logic* is the preset;
      the *run* is an execution of that logic. Regulators care about
      the logic. Per-run details belong in compliance bundle
      (which references this doc + the run's tool-call-trail).
      alternatives: per-run docs (rejected: explosion of files,
      same logic).

  - key: |
      CI drift gate, not auto-commit — Reason: auto-commit on docs CI
      tends to fight humans; forced regeneration as a separate commit
      means PRs that change pipeline logic carry the doc change in
      reviewable form. alternatives: auto-commit (rejected: noisy);
      no gate (rejected: drift).

steps:
  - id: generator
    action: |
      DecisionLogicDocGenerator reads preset + skill metadata,
      emits markdown per a Razor-style or string-template format.
    new:
      - "scripts/build-decision-logic.sh"
      - "scripts/decision-logic-generator/AgentSmith.Tools.DecisionLogic.csproj"
      - "scripts/decision-logic-generator/Program.cs"
      - "scripts/decision-logic-generator/PresetReader.cs"
      - "scripts/decision-logic-generator/MarkdownEmitter.cs"

  - id: docs-output
    action: |
      Generated docs land in docs/compliance/decision-logic/.
      mkdocs.yml nav added.
    new:
      - "docs/compliance/decision-logic/.gitkeep"
    modify:
      - "mkdocs.yml"

  - id: ci-gate
    action: |
      docs.yml workflow runs build-decision-logic.sh; fails on diff.
    modify:
      - ".github/workflows/docs.yml"

  - id: collector-plugin
    action: |
      DecisionLogicArtifactCollector implements
      IComplianceArtifactCollector (from p0168a) and adds the
      per-preset markdown to compliance bundles.
    new:
      - "src/AgentSmith.Application/Services/Compliance/DecisionLogicArtifactCollector.cs"
    modify:
      - "src/AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs"

  - id: tests
    action: |
      Snapshot tests against committed markdown for each preset.
    new:
      - "tests/AgentSmith.Tests/Compliance/DecisionLogicGeneratorSnapshotTests.cs"

tests:
  - "DecisionLogic_FixBugPreset_SnapshotMatches"
  - "DecisionLogic_AddFeaturePreset_SnapshotMatches"
  - "DecisionLogic_PrReviewPreset_SnapshotMatches"
  - "DecisionLogic_SecurityScanPreset_SnapshotMatches"
  - "DecisionLogic_ApiSecurityScanPreset_SnapshotMatches"
  - "DecisionLogic_AutonomousPreset_SnapshotMatches"
  - "DecisionLogic_MissingPreset_ExitsWithDiagnostic"

done:
  - "build-decision-logic.sh generates per-preset markdown deterministically."
  - "10 preset docs committed under docs/compliance/decision-logic/."
  - "Compliance bundle includes the run's preset doc."
  - "CI drift gate green; future preset changes break the build until docs regenerated."
  - "Snapshot tests green."
