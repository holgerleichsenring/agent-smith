# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0111
goal: "Skills declare multiple roles via extended SKILL.md frontmatter; triage assigns role+phase per ticket using keyed positive/negative criteria; deterministic single-call triage with single-line JSON output and token-grammar rationale"

requires: ["p57a", "p64", "p86"]

decisions:
  - key: "Frontmatter is YAML, body is Markdown — strict separation. Triage reads only frontmatter (cheap), body sections (as_lead/as_analyst/as_reviewer) are loaded only when role assigned."
  - key: "Roles are not skill-static but assigned per run by triage — same skill (architect) may be lead in ticket A, reviewer in ticket B, analyst in ticket C. Roles a skill can take are declared in roles_supported."
  - key: "Activation criteria are keyed (key + desc) — LLM references keys, not free text. Schema validation rejects unknown keys. Eliminates 'likely/probably' speculation in triage rationale."
  - key: "Roles reduced to four: lead, analyst, reviewer, filter. Old gate split into reviewer (post-execute, evidence-required) and filter (list-reducer). Executor moves out of skill roles into pipeline-step type."
  - key: "Triage is one LLM call producing single-line JSON — no multi-stage triage. Schema validation enforces only declared roles per skill, only declared keys per skill, length cap on rationale."
  - key: "Rationale uses token grammar '<role>=<skill>:<key>;' and '-<skill>:<key>;' — max 300 chars, no free prose. Each token references a declared activation or role_assignment key."
  - key: "Phases are explicit pipeline structure (plan, agentic_step, review, final). Triage assigns skill+role per phase. Pipeline DSL no longer hardcodes skill names; skill set is determined by triage from skills_path."
  - key: "Lead is authoritative — its plan output becomes the contract reviewers compare against in the review phase. Reviewer-as-architect compares actual code against own plan from earlier in same run."
  - key: "_index/<category>.yaml is build artifact aggregating frontmatter of all skills in category. Triage reads only this index, never individual SKILL.md files. Generated by SkillLoader on startup or watch."
  - key: "Skill bodies use {{ref:<id>}} placeholders resolved against frontmatter.references. Lazy-loaded only when a skill is activated for a role. Keeps top-level body small under 5000-token target."
  - key: "Confidence (0-100) is the single hedging-control mechanism — no separate forbidden_phrases enforcement. A low Confidence is the LLM's legitimate signal of uncertainty; a high Confidence with hedging language is a rare inconsistency, accepted as-is. The Confidence threshold filter (Blocking=true requires Confidence>=70) makes hedging structurally irrelevant where it matters: in blocking decisions."
  - key: "Triage output format validation (no markdown, no newlines in JSON) is separate from skill content rules — kept in triage-system.yaml's forbidden_in_output as a format-discipline mechanism. Format violations trigger retry with stricter prompt; not the same machinery as content rules."

  - key: "JSON output single-line by mandate — explicit prompt rule plus parser strict mode. Pretty-printing is debug-only flag, never default."
  - key: "Ticket-level skip flags (agent-smith:skip:<skill>, agent-smith:no-test-adaption) read by triage as hard overrides — bypass skill regardless of activation match."
  - key: "p57a SKILL.md format preserved — additions are frontmatter-only extensions, body still standard markdown. Imported third-party skills work without modification."

  - key: "Claude Sonnet 4.6 is the primary optimization target — skills are written and tuned for this model. Other providers (Claude Haiku/Opus, OpenAI, Gemini, Ollama) are supported best-effort but not guaranteed quality-equivalent. Documented openly to avoid the model-agnostic illusion. Format-level differences alone do not explain cross-model performance gaps; skill content (wording, examples, reasoning style) is genuinely model-specific."
  - key: "Per-provider skill overrides supported as optional fallback path — SkillLoader looks for SKILL.<provider>.md (e.g. SKILL.openai.md, SKILL.gemini.md) before falling back to SKILL.md. No override needed for default operation; an operator who wants provider-specific tuning can author one without framework changes. We ship zero overrides initially — the mechanism exists, the maintenance burden is opt-in."

  - key: "PipelinePhase enum has only Plan, Review, Final — AgenticStep is a pipeline step type executed by the PipelineExecutor between Plan and Review, not a phase that takes triage skill assignments. Skills participate in Plan (analyst, lead) and Review (reviewer) phases only. Filter runs in Final."

  - key: "ProjectMapExcerpt is concept-based, not stack-specific — uses a controlled vocabulary of project concerns (persistence, listeners, background_jobs, authentication, etc.) that abstract over stack. Same vocabulary works for dotnet+postgres, F#+Akka, Salesforce-Apex, Lua-plugins, embedded firmware. Skills reference concepts in activation keys, not stack tokens. Concept vocabulary is data (skills/concept-vocabulary.yaml), not code — operators can extend it."
  - key: "ProjectAnalyzer (from p0110b) populates concept list during project analysis — LLM matches project against vocabulary, persists in .agentsmith/project-map.json. ProjectMapExcerptBuilder projects on the narrower triage-input schema (~10-15 concepts + stack + type + test_capability + ci_capability)."

  - key: "No legacy fallback at any point. p0111a's SkillLoader is strict from day one — SKILL.md without roles_supported is rejected with a migration hint. The b → a sequencing guarantees that when the strict loader lands, all shipped skills already carry the new frontmatter (because p0111b rewrote them). No permissive-mode toggle, no two-mode SkillLoader, no migration window. Pre-1.0 software, backward compatibility creates more bugs than it prevents."

  - key: "Sub-phase order is b → a → c → d (NOT alphabetical). p0111b rewrites all shipped skills with new frontmatter (old SkillLoader keeps reading them as a YAML side-effect — fields it does not know are simply ignored, so the running pipeline is unaffected). p0111a then adds the new strict SkillLoader, reading the fields the skills already carry. p0111c lands the new TriageHandler + PipelineExecutor + presets. p0111d adds provider override mechanism. Each sub-phase merges independently with green tests. Big-bang single PR is possible but discouraged."

steps:

  - id: contracts
    action: "Define new skill metadata records and triage IO contracts"
    new:
      - "SkillRole: enum { Lead, Analyst, Reviewer, Filter }"
      - "PipelinePhase: enum { Plan, Review, Final } — AgenticStep is a pipeline step type, not a phase"
      - "ActivationKey: { Key:string, Desc:string }"
      - "ActivationCriteria: { Positive:ActivationKey[], Negative:ActivationKey[] }"
      - "RoleAssignment: { Role:SkillRole, Criteria:ActivationCriteria }"
      - "OutputContract: { SchemaRef:string, MaxObservations:int, MaxCharsPerField:int, OutputType:Dictionary<SkillRole,OutputForm> }"
      - "OutputForm: enum { List, Plan, Artifact } — what shape the role's output takes; reviewers/analysts produce List, lead produces Plan, filter produces List or Artifact"
      - "SkillReference: { Id:string, Path:string }"
      - "SkillDefinition: extend with { RolesSupported:SkillRole[], Activation:ActivationCriteria, RoleAssignments:RoleAssignment[], References:SkillReference[], OutputContract:OutputContract, AsLeadPrompt:string?, AsAnalystPrompt:string?, AsReviewerPrompt:string? }"
      - "ProjectConcept: { Key:string, Desc:string } — entry in concept vocabulary"
      - "TestCapability: { HasTestSetup:bool, TestCommand:string?, RunnableInPipeline:bool }"
      - "CiCapability: { HasPipeline:bool, DeploymentTarget:string? }"
      - "ProjectMapExcerpt: { Stack:string[], Type:string, Concepts:string[], TestCapability, CiCapability }"
      - "TriageInput: { Ticket:string, ProjectMapExcerpt:ProjectMapExcerpt, AvailableSkills:SkillIndexEntry[], Phases:PipelinePhase[], TicketLabels:string[] }"
      - "TriageOutput: { Phases:Dictionary<PipelinePhase, PhaseAssignment>, Confidence:int, Rationale:string }"
      - "PhaseAssignment: { Lead:string?, Analysts:string[], Reviewers:string[], Filter:string? } — Lead/Analysts only valid for Plan; Reviewers only for Review; Filter only for Final"
      - "SkillIndexEntry: compact projection of SkillDefinition for triage prompt input"
    path: "AgentSmith.Contracts/Models/Skills/"

  - id: skill-loader
    action: "Extend SkillLoader to parse new frontmatter fields and build category index. Strict — no legacy fallback."
    modify:
      - "SkillLoader: parse roles_supported, activation, role_assignment, references, output_contract from frontmatter YAML"
      - "SkillLoader: extract as_lead, as_analyst, as_reviewer sections from markdown body by H2 header"
      - "SkillLoader: validate frontmatter — every key referenced in role_assignment must exist in activation; references[].id must be unique; activation positive keys must reference concepts from skills/concept-vocabulary.yaml"
      - "SkillLoader: SKILL.md without roles_supported is REJECTED with migration hint pointing to docs/configuration/skills/migration.md"
    new:
      - "SkillIndexBuilder: aggregates frontmatter of all skills in a category into _index/<category>.yaml on load or file change"
      - "SkillBodyResolver: lazy-loads as_<role> section + resolves {{ref:<id>}} placeholders against references files when skill is activated"
      - "ConceptVocabulary: { Concepts:Dictionary<string,ProjectConcept> } — loaded from skills/concept-vocabulary.yaml at startup"
      - "ConceptVocabularyValidator: checks activation keys reference known concepts; warns on unknown concepts (not error — vocabulary can extend)"
    path: "AgentSmith.Application/Skills/"

  - id: triage-rewrite
    action: "Replace TriageHandler logic with role+phase assignment using keyed criteria and single-line JSON output"
    modify:
      - "TriageHandler: build TriageInput from ticket + ProjectMapExcerpt + _index/<category>.yaml + Ticket.Labels"
      - "TriageHandler: load triage-system.yaml prompt + render with TriageInput as YAML body"
      - "TriageHandler: parse single-line JSON response, validate against TriageOutput schema, retry once on parse failure with stricter prompt"
      - "TriageHandler: enforce — every role assignment must reference a skill whose roles_supported contains that role; every rationale token's key must exist in the cited skill's activation or role_assignment keys"
      - "TriageHandler: ticket labels of form 'agent-smith:skip:<skill>' remove that skill from any role; 'agent-smith:no-test-adaption' removes tester from all roles"
      - "TriageHandler: skip entirely for pipeline_type=discussion (legal-analysis, mad-discussion) — keep p64 LLM-triage for discussion pipelines"
    new:
      - "ProjectMapExcerptBuilder: reads .agentsmith/project-map.json (from p0110b), projects on TriageInput.ProjectMapExcerpt schema, extracts concepts from full project map by matching against vocabulary"
      - "TriageOutputValidator: schema + key-existence checks, returns TriageValidationResult"
      - "TriageRationaleParser: parses token grammar into structured RationaleEntry[] for audit/logging"
    path: "AgentSmith.Application/Triage/"

  - id: prompts
    action: "Author triage instruction and input templates"
    new:
      - "Resources/Prompts/triage-system.yaml: instruction with decision_procedure, tie_breaks, label_overrides, rationale_grammar, forbidden_in_output, output_schema fields"
      - "Resources/Prompts/triage-user.yaml: input template with {{ticket}}, {{project_map_excerpt}}, {{available_skills}}, {{phases}}, {{labels}}"
      - "Resources/Schemas/triage-output.schema.json: JSON schema for TriageOutput with regex on rationale, length caps, enum role/phase values"
      - "Resources/Schemas/skill-observation.schema.json: aligned with p86, adds ForbiddenPhrasesViolation marker"
    path: "AgentSmith.Application/Resources/"

  - id: provider-overrides
    action: "Add optional per-provider skill override mechanism — SKILL.<provider>.md takes precedence over SKILL.md when present and active provider matches"
    modify:
      - "SkillLoader: when loading a skill directory, look for SKILL.<provider>.md matching the active provider (claude, openai, gemini, ollama) first; fall back to SKILL.md if not present. Frontmatter merging: provider override replaces the body and any frontmatter fields it declares; fields not present in override inherit from base SKILL.md."
      - "SkillLoader: log INFO when a provider override is loaded ('skill X uses claude-specific override'). Helps operators see which skills have provider-specific tuning."
    new:
      - "ProviderOverrideResolver: resolves which SKILL file to use given (skill_directory, active_provider). Returns the override path if present, else the base path."
    constraints:
      - "Zero overrides ship in this phase — the mechanism is the deliverable, not specific tuning. Operators or follow-up phases author overrides on demand."
      - "Override files are valid SKILL.md format (same frontmatter + body structure). No new format invented."
      - "Validation: override frontmatter must declare the same name and roles_supported as base; otherwise SkillLoader rejects with clear error."
    path: "AgentSmith.Application/Skills/"

  - id: pipeline-executor
    action: "Pipeline iterates phases; per phase executes triage-assigned skill+role pairs"
    modify:
      - "PipelineExecutor: phase-aware loop — for each PipelinePhase in pipeline definition, call SkillRoundHandler with triage-assigned (skill, role) pairs. Order: Plan → AgenticStep (Code-step, no triage) → Review → Final"
      - "PipelineExecutor: lead output of plan phase stored in Context.PlanArtifact, injected into review-phase reviewer prompts as {{plan}}. PlanArtifact is nullable — reviewers handle null case (no lead-plan-comparison, generic review only)"
      - "SkillRoundHandlerBase: select prompt body section by assigned role (as_lead | as_analyst | as_reviewer); filter role uses dedicated FilterRoundHandler"
      - "SkillRoundHandlerBase: enforce Confidence threshold (Blocking=true requires Confidence>=70) — if Confidence below threshold but Blocking=true, automatically downgraded to Blocking=false with log warning"
    new:
      - "FilterRoundHandler: takes List<SkillObservation>, returns reduced list, no veto"
      - "PlanArtifact: { LeadSkill:string?, Observations:SkillObservation[], CreatedAt:DateTimeOffset } — input to reviewers, nullable when no lead assigned"
    path: "AgentSmith.Application/Pipeline/"

  - id: pipeline-presets
    action: "Update fix-bug, add-feature, security-scan, api-scan presets to phase-based structure"
    modify:
      - "PipelinePresets.fix-bug: triage_phases [Plan, Review, Final], between Plan and Review the AgenticStep handler runs (writes code)"
      - "PipelinePresets.add-feature: triage_phases [Plan, Review, Final], same as fix-bug"
      - "PipelinePresets.security-scan: triage_phases [Plan, Review, Final] — no AgenticStep, scans only"
      - "PipelinePresets.api-scan: triage_phases [Plan, Review, Final]"
      - "PipelinePresets: legal-analysis and mad-discussion remain discussion-pipeline (pipeline_type=discussion), TriageHandler skipped, p64 LLM-triage retained"
    path: "AgentSmith.Application/Configuration/"

  - id: skill-migration
    action: "Migrate agent-smith-skills/skills/coding/* and agent-smith-skills/skills/security/* to new frontmatter format. Also seed concept vocabulary."
    modify:
      - "agent-smith-skills/skills/coding/architect: roles_supported=[lead, analyst, reviewer], activation+role_assignment per design, body split into as_lead/as_analyst/as_reviewer"
      - "agent-smith-skills/skills/coding/tester: roles_supported=[analyst, reviewer], no lead — pre-execute is analyst (planning), post-execute is reviewer (evidence-based)"
      - "agent-smith-skills/skills/coding/security-reviewer: roles_supported=[analyst, reviewer]"
      - "agent-smith-skills/skills/coding/backend-developer, frontend-developer, devops, product-owner: roles_supported=[analyst, reviewer where applicable]"
      - "agent-smith-skills/skills/coding/dba: roles_supported=[lead, analyst, reviewer] — lead when DB migration is primary"
      - "agent-smith-skills/skills/security/false-positive-filter: roles_supported=[filter]"
      - "agent-smith-skills/skills/security/* contributors: roles_supported=[analyst]"
      - "agent-smith-skills/skills/security/chain-analyst: rename role from executor to final-analyst, roles_supported=[analyst] in Final phase"
    new:
      - "agent-smith-skills/skills/concept-vocabulary.yaml: controlled vocabulary of project concepts (persistence, listeners, background_jobs, external_apis, authentication, authorization, ui_rendering, cli_interface, configuration_management, infrastructure_definition, public_api, schedulers, file_io, cryptography). Each entry has key + desc. Operators can extend."
      - "agent-smith-skills/skills/coding/architect/references/ddd-patterns.md"
      - "agent-smith-skills/skills/coding/architect/references/anti-patterns.yaml"
      - "agent-smith-skills/skills/_index/coding.yaml (build artifact, generated by SkillIndexBuilder, gitignored)"
      - "agent-smith-skills/skills/_index/security.yaml (build artifact, gitignored)"

  - id: docs
    action: "Update docs site for new role model and triage behavior"
    modify:
      - "docs/concepts/multi-agent-orchestration.md: replace four-role model with new lead/analyst/reviewer/filter; document phase model (Plan/Review/Final + AgenticStep as pipeline step); show triage example for frontend-bug vs db-migration"
      - "docs/configuration/skills/: extended SKILL.md frontmatter reference, lazy body loading, references/ directory, role_assignment with activation keys, no legacy fallback"
    new:
      - "docs/concepts/triage.md: NEW — token grammar, rationale format, schema validation, ticket label overrides, project concept vocabulary"
      - "docs/configuration/skills/migration.md: NEW — how to migrate a SKILL.md to the new frontmatter, before/after examples, common pitfalls"
      - "docs/configuration/concept-vocabulary.md: NEW — what concepts are, how to extend the vocabulary, how skills reference concepts in activation keys"

  - id: verify
    action: "dotnet build && dotnet test; manual e2e on AuthPort regression ticket"

tests:
  - "SkillLoader_FrontmatterWithRolesSupported_ParsesAllRoles"
  - "SkillLoader_MissingRolesSupported_RejectsWithMigrationHint"
  - "SkillLoader_RoleAssignmentReferencesUnknownKey_ThrowsValidation"
  - "SkillLoader_DuplicateReferenceId_ThrowsValidation"
  - "SkillLoader_ActivationKeyReferencesUnknownConcept_LogsWarning"
  - "SkillIndexBuilder_AggregatesFrontmatterOnly_NoBodies"
  - "SkillBodyResolver_RoleAssigned_LoadsMatchingSection"
  - "SkillBodyResolver_RefPlaceholder_ResolvesAgainstReferencesFile"
  - "ConceptVocabulary_LoadsFromYaml_ParsesAllConcepts"
  - "ProjectMapExcerptBuilder_DotnetWithDb_ProducesPersistenceConcept"
  - "ProjectMapExcerptBuilder_FrontendOnly_OmitsPersistence"
  - "ProjectMapExcerptBuilder_SalesforceProject_StillProducesValidExcerpt"
  - "TriageHandler_FrontendBugTicket_AssignsArchitectAsLeadAndReviewer"
  - "TriageHandler_DbMigrationTicket_AssignsDbaAsLead_ArchitectAsAnalystAndReviewer"
  - "TriageHandler_PureBugfixTicket_DoesNotActivateArchitect"
  - "TriageHandler_TicketWithSkipLabel_OmitsSkill"
  - "TriageHandler_NoTestAdaptionLabel_RemovesTesterFromAllRoles"
  - "TriageHandler_DiscussionPipelineType_SkipsTriageHandler"
  - "TriageOutputValidator_RoleNotInRolesSupported_RejectsOutput"
  - "TriageOutputValidator_RationaleKeyNotInSkill_RejectsOutput"
  - "TriageOutputValidator_RationaleExceedsMaxLength_RejectsOutput"
  - "TriageOutputValidator_OutputContainsNewlines_RejectsOutput"
  - "TriageRationaleParser_TokenGrammar_ProducesStructuredEntries"
  - "TriageHandler_FirstParseFailure_RetriesWithStricterPrompt"
  - "TriageHandler_SecondParseFailure_LogsAndFailsCleanly"
  - "PipelineExecutor_PlanPhaseLeadOutput_InjectedIntoReviewers"
  - "PipelineExecutor_NoLeadAssigned_ReviewersHandleNullPlanArtifact"
  - "SkillRoundHandler_BlockingTrueAndConfidenceBelow70_DowngradesToBlockingFalse"
  - "FilterRoundHandler_EmptyList_DoesNotStopPipeline"
  - "AuthPortRegression_PreExecuteTesterAsAnalyst_NoSpeculativeVeto"
  - "ProviderOverrideResolver_OverrideExists_ReturnsOverridePath"
  - "ProviderOverrideResolver_OverrideMissing_FallsBackToBase"
  - "ProviderOverrideResolver_DifferentProvider_IgnoresUnrelatedOverrides"
  - "SkillLoader_OverrideWithMismatchedName_RejectsWithClearError"
  - "SkillLoader_OverrideWithMismatchedRolesSupported_RejectsWithClearError"
  - "SkillLoader_OverrideLoaded_LogsInfo"
  - "SkillLoader_OverrideOmitsField_InheritsFromBaseFrontmatter"

done:
  - "SKILL.md frontmatter accepts roles_supported, activation, role_assignment, references, output_contract"
  - "SkillLoader is strict — SKILL.md without roles_supported is rejected with migration hint; no permissive fallback"
  - "SkillLoader builds _index/<category>.yaml as build artifact, never read by runtime triage from per-skill files"
  - "Skill body sections (as_lead, as_analyst, as_reviewer) lazy-loaded only on role assignment"
  - "{{ref:<id>}} placeholders resolved against references files at body-render time"
  - "concept-vocabulary.yaml loaded at startup; activation positive keys validated against vocabulary (warning on unknown)"
  - "ProjectMapExcerptBuilder produces concept list from project-map.json — works for dotnet, F#, Salesforce, embedded projects"
  - "Triage is one LLM call producing single-line JSON validated against schema"
  - "Triage rationale uses token grammar with declared keys only — schema rejects unknown keys"
  - "Triage assigns architect as lead+reviewer in frontend-bug ticket; as analyst+reviewer in db-migration ticket"
  - "Triage skipped entirely for discussion pipelines (legal-analysis, mad-discussion)"
  - "Tester pre-execute is analyst (no veto power); tester post-execute is reviewer (evidence-required)"
  - "Ticket labels agent-smith:skip:<skill> and agent-smith:no-test-adaption respected as hard overrides"
  - "Confidence threshold filter: Blocking=true requires Confidence>=70, otherwise auto-downgraded to Blocking=false with log"
  - "Lead plan output injected into review-phase reviewer prompts as {{plan}}; reviewers handle null plan case"
  - "AuthPort regression: pre-execute tester produces analyst observations (Blocking=false), no 'likely' speculation, pipeline proceeds to AgenticStep"
  - "All shipped skills migrated in p0111b — no SKILL.md without roles_supported remains"
  - "agent-smith-skills/skills/coding/* and security/* migrated; legal/* and mad/* unchanged (discussion pipelines)"
  - "SkillLoader resolves SKILL.<provider>.md before SKILL.md when active provider matches; falls back to base on miss"
  - "Override frontmatter merging: declared fields replace base, omitted fields inherit; mismatched name or roles_supported rejected"
  - "Zero overrides shipped — mechanism is the deliverable, not specific tuning"
  - "docs/concepts/multi-agent-orchestration.md, docs/concepts/triage.md, docs/configuration/skills/migration.md, docs/configuration/concept-vocabulary.md created or updated"
  - "docs/configuration/skills/: documents Claude Sonnet as primary optimization target, other providers supported best-effort, optional per-provider overrides for opt-in tuning"
  - "dotnet build zero warnings, dotnet test green"