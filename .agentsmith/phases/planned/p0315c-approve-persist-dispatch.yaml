# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0315c
goal: "Close the loop: approve/edit/reject the drafted phase in-thread, then save it to phases/planned/ or dispatch it to a run via the existing pipeline"

applies_to: backend + server

requires:
  - p0315b

decisions:
  - "Approval reuses DialogQuestion(QuestionType.Approval) + the Slack/Teams Approval blocks/cards — the same gate p0164a wires for plan-approval; choices: save / execute / edit / reject"
  - "Typed phase-spec write mirrors WriteContextYamlToolHost (p0193): schema-validated, next-number-resolved write to phases/planned/pXXX-slug.yaml — no free-form filesystem write"
  - "'execute' hands the drafted phase to the EXISTING claim-service/dispatch (the fix-bug/add-feature execution path); no parallel executor — the drafted spec becomes the run's context"
  - "Everything lands in the run record + dialogue trail (audit): who discussed, what was drafted, who approved, what dispatched"

steps:
  - id: approval
    action: "After p0315b's draft, ask an Approval question in-thread (save / execute / edit / reject); 'edit' re-prompts spec-author-master with the operator's feedback (bounded iterations)"
  - id: persist
    action: "WritePhaseSpecToolHost: typed, schema-validated write to phases/planned/pXXX-slug.yaml with next-number resolution (mirror of WriteContextYamlToolHost)"
    new:
      - "WritePhaseSpecToolHost"
  - id: dispatch
    action: "'execute' dispatches the drafted phase through the claim-service into the normal execution pipeline; the thread gets the run link + live status via IPlatformAdapter"

tests:
  - "Approve_Save_WritesSchemaValidPhaseToPlanned"
  - "Approve_Execute_DispatchesThroughClaimService"
  - "Approve_Edit_RepromptsMasterWithFeedback"
  - "Approve_Reject_ClosesThreadNoArtifact"
  - "WritePhaseSpec_InvalidDraft_Rejected"

done:
  - "Approve->save writes a schema-valid phase to phases/planned/; approve->execute starts a real run and posts its link in-thread; edit iterates; reject leaves nothing behind; all captured in the dialogue trail"
