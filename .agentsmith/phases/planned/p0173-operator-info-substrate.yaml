# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0173-operator-info-substrate
goal: |
  Make everything Agent Smith does BEFORE a run-id exists visible on the
  dashboard. p0169e's event backbone is run-scoped: producers only publish
  into run:{runId}:events once a run exists. Everything that happens
  before that — ticket polling cycles, webhook receivers, chat-channel
  ingestion, trigger evaluation per ticket, config-file reads, skill
  catalog loads — is invisible. The operator sees a list of recent runs
  and nothing else: no system status, no activity statistics, no
  per-channel breakdown, no answer to "why did this ticket trigger and
  that one didn't".

  Same shape as p0169e, different scope. Same envelope contract, new
  stream key (system-level instead of run-scoped). Four
  independently-shippable slices:

  - p0173a: SystemEvent backbone — parallel to RunEvent. New stream key
    system:events, new IEventPublisher.PublishSystemAsync (or sibling
    abstraction; decision in slice), new SignalR SubscribeSystem hub
    method, producer-completeness test pattern lifted from p0169e.
    No producer instrumentation yet — just the pipe.
  - p0173b: Poller + webhook instrumentation. PollCycleStarted /
    Finished, TicketScanned, TicketSkipped (with reason), TicketTriggered,
    WebhookReceived (with was-actioned + skip-reason). Wired through
    TrackerPoller + the 14 IWebhookHandler implementations as
    decorators.
  - p0173c: Chat + config + skill catalog instrumentation.
    ChatMessageReceived (metadata only — no content; security boundary
    matches p0169e's promptHash decision), ConfigFileRead, SkillCatalog
    Loaded (companion to p0169j-b1's CatalogIssueEvent which covers
    the drops), ConceptVocabularyLoaded.
  - p0173d: Dashboard system view. SystemStatusCard (last-poll per
    source + provider status), TodayActivityCard (scanned / triggered
    / skipped / runs-started / success rate / cost), ChannelBreakdown,
    TriggerLog (recent skipped tickets with reason), Cost-rollup
    projection. Driven from SubscribeSystem + XRANGE replay of the
    system stream.

  Ship order: a → b → c → d. a is the prerequisite pipe; b is the
  highest-value diagnostic (the "why didn't my ticket trigger" answer);
  c adds chat + config visibility once the contract is stable; d is
  the surface that consumes all of the above.

requires:
  - p0169e-event-backbone
  - p0169f-topology-ui
  - p0169j-b1-failure-reason-events

scope:
  in: |
    Umbrella spec only — the four slices are independently shippable.
    Each slice carries its own scope/decisions/done.

  out: |
    Persistence beyond Redis TTL for system events. Same shape as
    p0169j-a is for run events — out of this umbrella, named follow-up
    when needed.
    Multi-instance SignalR backplane for the system hub. Same
    constraint as p0169e — deferred until replicas > 1 is an
    operational ask.
    Chat message content in events. Out by design — security boundary,
    matches p0169e's promptHash decision. Decided in slice c.
    Historical search across system events older than the retention
    window. Out — addressed alongside p0169j-a follow-up if/when ops
    asks for it.

decisions:
  - key: |
      Four slices (a + b + c + d), not one phase — Reason: a is the
      contract pipe (no producer instrumentation, no UI); b is the
      highest-value diagnostic surface (poller + webhook); c is
      additive instrumentation (chat + config + catalog) once the
      contract is proven by b's producers; d is the consumer view.
      Splitting lets each slice carry its own decisions.yaml + review
      surface, and lets the operator gate progress on whichever
      slice answers the current diagnostic gap. Same anti-bundle
      argument as p0169j's umbrella decision.
      alternatives: one mega-phase (rejected — couples backend
      contract change with three producer integrations and one UI
      surface in a single PR, complicates review); a+b+c then d
      (rejected — d's KPIs depend on c's producers; better to ship
      d after c is in place so the cards don't render placeholders).

  - key: |
      System backbone as a parallel SystemEvent base, not RunId="system"
      sentinel — flagged for operator review at slice a. Slice a's
      decisions.yaml owns the choice; the umbrella records it here so
      consumers downstream can plan against the contract shape.

  - key: |
      Ship order a → b → c → d — Reason: a is the prerequisite contract
      pipe (slice b cannot instrument anything without IEventPublisher
      .PublishSystemAsync). b before c because the operator's stated
      pain ("why didn't this ticket trigger?") is on the poller +
      webhook path; chat / config / catalog visibility is additive
      polish. d last because the dashboard cards depend on the events
      from b + c — shipping d on top of an incomplete producer set
      would mean rendering placeholder KPIs.
      alternatives: d first (rejected — cards render empty); c before
      b (rejected — chat visibility doesn't answer the "ticket didn't
      trigger" question; webhook + poller does).

steps: []  # umbrella — see slice specs for actual steps

tests: []  # umbrella — slices ship their own

done:
  - "p0173a shipped: system event backbone (SystemEvent base + RedisSystemEventPublisher + ISystemEventPublisher + JobsHub.SubscribeSystem + producer-completeness test pattern) with no producer instrumentation."
  - "p0173b shipped: TrackerPoller + 14 IWebhookHandler implementations emit poll-cycle and ticket-scanned/skipped/triggered + webhook-received events."
  - "p0173c shipped: SlackEventEndpointHandler + TeamsEndpoints + LoadContextHandler + LoadCodingPrinciplesHandler + YamlConfigurationLoader + YamlSkillLoader + ConceptVocabularyLoader emit chat-received / config-read / skill-catalog-loaded events. No chat message content leaves the hub."
  - "p0173d shipped: dashboard /system route renders SystemStatusCard + TodayActivityCard + ChannelBreakdown + TriggerLog + Cost-rollup, driven from SubscribeSystem + XRANGE replay."
