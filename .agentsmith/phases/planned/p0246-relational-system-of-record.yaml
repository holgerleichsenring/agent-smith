# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0246
goal: |
  Give the server/orchestrator a relational system-of-record for run + ticket
  LIFECYCLE and HISTORY. Today there is none: Redis holds live/ephemeral state
  (heartbeats, runs:active, claim-locks, event streams, 24h artifact slots) and
  the runs list lives in server RAM (JobsBroadcaster) — so a restart loses
  history and a Redis flush dissolves the very guards that prevent the run-swarm
  (the p0238/p0242 problem class). A relational DB makes the single-run invariant
  a UNIQUE CONSTRAINT (by construction), makes history durable + queryable, and
  demotes Redis to a pure cache / event-bus. Server-mode only — the CLI single-
  binary story is untouched.

applies_to: "backend (server persistence) — NOT the CLI"

requires:
  - p0239-deterministic-verification-harness  # the test base to prove it

decisions:
  - key: "Server-mode only. The interactive CLI stays Redis-/DB-less (Console transport, in-memory + disk stores, in-process sandbox); the spawned-job CLI uses Redis only as TRANSPORT. No single-binary regression — verified in ServiceProviderFactory."
  - key: "The DB is the system-of-record for run/ticket lifecycle + history; Redis is demoted to cache + ephemeral + event-bus (live event streams, dialogue, progress, ProjectMap cache). A Redis flush must no longer lose authoritative state."
  - key: "Single-run-per-ticket becomes a DB UNIQUE INDEX on the active run for (project, ticket); claim is an atomic INSERT (constraint violation = AlreadyClaimed). This SUPERSEDES p0242's heartbeat-span / k8s-pod-liveness / grace-window mechanism, and demotes p0238's heartbeat to liveness/progress (no longer the guard). p0242 is re-scoped to 'enforce single-run + liveness via the DB', built on this phase."
  - key: "Durable, queryable history: runs survive restart AND Redis flush; the dashboard reads real history (search/paginate, cost + trend rollups) instead of the in-RAM JobsBroadcaster window; the decision/event trail can persist for the audit paper-trail (EU AI Act angle)."
  - key: "Provider-abstracted via EF Core behind the existing store interfaces (swap the server registration like RedisExtensions does). DB choice is a config/provider decision — the compose already ships sqlserver (unused); Postgres is the portable OSS default, SQLite an embedded option. Decide in the design step; do not hardcode one."

steps:
  - id: schema
    action: "EF Core DbContext + migrations: runs (id, project, ticket, status, started/finished, cost, summary, pr_urls, …), ticket-lifecycle, optional event/decision trail. Unique index on (project, ticket) WHERE status='active'."
  - id: stores
    action: "DB-backed implementations behind the run/ticket-lifecycle interfaces; server registration swaps to them (CLI keeps in-memory/disk). Keep IRunArtifactStore's 24h markdown slots in Redis OR move to DB — decide."
  - id: single-run
    action: "Atomic claim = INSERT active run; constraint violation -> AlreadyClaimed. Remove reliance on the revertible lifecycle label + heartbeat for the INVARIANT (heartbeat stays for liveness only)."
  - id: history-ui
    action: "Dashboard runs list + detail read from the DB (durable, queryable); cost/trend rollups from SQL. JobsBroadcaster becomes a live-overlay cache, not the source."
  - id: redis-demotion
    action: "Redis = cache/ephemeral/event-bus only; a flush loses no authoritative state (closes the empty-Redis reap-storm by construction)."
  - id: tests
    action: "Harness coverage: concurrent claims for one ticket -> exactly one active run (constraint); restart/flush preserves history; CLI single-binary path still has no DB/Redis dependency."

done:
  - "Two concurrent claims for the same ticket yield exactly ONE active run, enforced by the DB constraint (proven by a concurrent-claim test) — no heartbeat dance."
  - "Run history survives a server restart AND a Redis flush; the dashboard reads it from the DB."
  - "A flushed Redis loses no authoritative run/ticket state (no reap-storm, no respawn)."
  - "The interactive CLI still builds + runs with no DB and no Redis."
  - "Build + full suite green."

notes: |
  Re-scopes p0242 (its heartbeat/k8s-liveness approach is replaced by the DB
  constraint) and demotes p0238's heartbeat to liveness-only. Sequence: needs
  p0239 (the harness) as the test base; lands before the re-scoped p0242 and
  before the feature work (p0167 PR-review, p0166 MCP). Orthogonal to execution-
  correctness (keystone, rooting, runtime, harness fidelity) — a DB fixes the
  lifecycle/history layer, not the agent's behaviour.
