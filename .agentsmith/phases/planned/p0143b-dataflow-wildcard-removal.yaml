# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0143b
goal: "Close the DataFlow half of p0143 that was deferred. Replace the `*` wildcard
  in DataFlowReadGate with per-preset explicit edges so handlers can't accidentally
  read undeclared context keys. Today the wildcard matches everything — the gate is
  effectively warn-only even when enforce=true."

requires: ["p0143", "p0144"]

scope:
  in: |
    (1) DataFlowReadMode enum (Enforce / Warn / Discover) replaces the bool
        enforce flag on DataFlowReadGate. Discover mode logs every wildcard
        match with (preset, fromStep, toStep, contextKey) tuples so an
        operator smoke against all 10 presets generates the migration
        edge-set data-driven instead of manual handler audit.

    (2) DataFlowDiscoveryAggregator collects Discover-mode tuples in-memory
        and writes a JSON sidecar to .agentsmith/runs/<run-id>/dataflow-
        discovery.json at pipeline end (wired via IPipelineLifecycleCoordinator
        like PipelineCostTracker).

    (3) Per-preset explicit edges in the 10 *DataFlow.cs classes. Each one
        implements IPhaseDataFlow directly (no inheritance), declaring the
        full (FromPhaseStep, ToPhaseStep, ContextKeys[]) edge list from the
        Discover smoke output.

    (4) Wildcard branches removed from DataFlowReadGate (today's lines 59
        + 70). PermissivePhaseDataFlow base class deleted. New
        PhaseDataFlowConfigValidator called from each *DataFlow.cs ctor
        fails fast if any edge declares "*" — defence in depth against
        wildcard drift.

    (5) PipelineDataFlowConfig binds both legacy `enforce: true|false` and
        new `mode: enforce|warn|discover` (custom IYamlTypeConverter for
        backwards compat). Default flips to Enforce in bundled
        config/agentsmith.yml; agentsmith.example.yml stays Warn for soft
        operator migration.

    (6) PerPresetDataFlowEdgeTests: theory over PipelinePresets.Names that
        runs synthetic Steps through each preset's DataFlow under
        enforce=true and asserts zero violations. Regression guard for
        future handler changes that introduce undeclared reads.

  out: |
    Operator-facing YAML edge declaration (pipeline_data_flow stays
    `mode: ...` only; operator-side custom edges live in code via
    IPhaseDataFlow implementations).

    Full-handler integration tests under enforce=true (synthetic Steps
    cover declared-vs-current-reads drift; the production gap "handler
    reads a key in production that the test stub doesn't" is covered by
    the Discover smoke in scope item 1).

    Hard removal of `pipeline_data_flow.enforce` setting (stays bindable
    for operator configs still on enforce=false).

decisions:
  - key: |
      Three-mode enum (Enforce / Warn / Discover) on the gate itself, not
      a feature-flag or separate Discovery tool. Reason: same gate
      code-path must run in all three modes to avoid divergence.
      -- alternatives: separate DiscoveryReadGate (rejected: code-path
      divergence).
  - key: |
      Per-preset edges in C# (not YAML). Reason: PipelinePresets, handlers,
      ContextKeys all live in C#; co-locating the edge declarations keeps
      Rename ContextKey / Find-References working. -- alternatives: YAML
      edges (rejected: notation count grows + IDE tools don't see drift).
  - key: |
      Wildcard rejection at *DataFlow.cs ctor time, not at pipeline run.
      Reason: fail-fast catches the issue in CI / dev-loop; run-time
      failure scatters the error surface. Same pattern p0125c uses for
      vocab fence.
  - key: |
      config/agentsmith.yml defaults to Enforce; agentsmith.example.yml
      stays Warn. Reason: agent-smith's own smoke runs need Strict to
      catch regressions; operator setup should not crash on Custom-
      Pipelines at first run. Operator docs describe the warn→discover→
      enforce migration path.
  - key: |
      PermissivePhaseDataFlow base class hard-deleted (no [Obsolete]
      window). Reason: with the ctor-time validator the wildcard cannot
      land via inheritance; an [Obsolete] window would allow accidental
      re-use during "quick fix" PRs. Operator code that subclassed it
      breaks at compile-time with a clear error.

steps:
  - id: read-mode-enum
    action: "Replace bool enforce with DataFlowReadMode enum (Enforce / Warn / Discover)"
    new:
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowReadMode.cs: enum (~15 lines)."
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowDiscoveryAggregator.cs: ~80 lines, IPipelineLifecycleCoordinator-wired sidecar emitter."
    modify:
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowReadGate.cs: ctor takes DataFlowReadMode mode. Discover branch emits info log + AddEntry on the aggregator; Warn + Enforce branches preserve existing behaviour."
      - "src/AgentSmith.Contracts/Models/Configuration/PipelineDataFlowConfig.cs: Enforce bool replaced by Mode property; custom IYamlTypeConverter maps legacy `enforce: true|false` → `mode: Enforce|Warn`."
      - "src/AgentSmith.Application/Services/PipelineExecutor.cs: pass Mode (not Enforce) when constructing the gate."

  - id: discover-smoke
    action: "Operator smoke against all 10 presets in Discover mode; aggregate edge set per preset"
    modify:
      - "config/agentsmith.yml: temporarily set `pipeline_data_flow.mode: discover` for the smoke run."
    new:
      - ".agentsmith/runs/dataflow-discovery-aggregate.md: PR-evidence file (not committed) with the aggregated edge set per preset."

  - id: per-preset-edges
    action: "Each of the 10 *DataFlow.cs classes declares explicit edges, no wildcard"
    modify:
      - "src/AgentSmith.Application/PipelineDataFlows/FixBugDataFlow.cs: implements IPhaseDataFlow directly; explicit edges from Discover smoke."
      - "src/AgentSmith.Application/PipelineDataFlows/FixNoTestDataFlow.cs: same."
      - "src/AgentSmith.Application/PipelineDataFlows/AddFeatureDataFlow.cs: same."
      - "src/AgentSmith.Application/PipelineDataFlows/InitProjectDataFlow.cs: same."
      - "src/AgentSmith.Application/PipelineDataFlows/SecurityScanDataFlow.cs: same."
      - "src/AgentSmith.Application/PipelineDataFlows/ApiSecurityScanDataFlow.cs: same."
      - "src/AgentSmith.Application/PipelineDataFlows/MadDiscussionDataFlow.cs: same."
      - "src/AgentSmith.Application/PipelineDataFlows/LegalAnalysisDataFlow.cs: same."
      - "src/AgentSmith.Application/PipelineDataFlows/SkillManagerDataFlow.cs: same (new shape post-p0144)."
      - "src/AgentSmith.Application/PipelineDataFlows/AutonomousDataFlow.cs: same (new shape post-p0144)."

  - id: wildcard-removal
    action: "Remove wildcard branches + delete PermissivePhaseDataFlow + add ctor validator"
    modify:
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowReadGate.cs: lines 59 + 70 wildcard checks deleted."
    new:
      - "src/AgentSmith.Application/Services/Pipeline/PhaseDataFlowConfigValidator.cs: ~40 lines, static Validate(IPhaseDataFlow) throws on `*` in ContextKeys or ToPhaseStep. Called from each *DataFlow.cs ctor."
    delete:
      - "src/AgentSmith.Application/PipelineDataFlows/PermissivePhaseDataFlow.cs"

  - id: default-flip
    action: "Strict default in bundled config; operator example stays warn"
    modify:
      - "config/agentsmith.yml: `pipeline_data_flow.mode: enforce`."
      - "config/agentsmith.example.yml: stays `pipeline_data_flow.mode: warn`."
    new:
      - "docs/configuration/dataflow-modes.md: ~100 lines documenting the three modes + operator migration path."

  - id: tests
    action: "Per-preset edge coverage + validator + mode wiring + backwards-compat binding"
    new:
      - "tests/AgentSmith.Tests/PipelineDataFlows/PerPresetDataFlowEdgeTests.cs: Theory over PipelinePresets.Names, synthetic Steps under enforce=true, assert 0 violations."
      - "tests/AgentSmith.Tests/Pipeline/PhaseDataFlowConfigValidatorTests.cs: 5 tests."
      - "tests/AgentSmith.Tests/Pipeline/DataFlowReadGateDiscoveryModeTests.cs: 4 tests."
      - "tests/AgentSmith.Tests/Pipeline/DataFlowDiscoveryAggregatorTests.cs: 3 tests."
      - "tests/AgentSmith.Tests/Configuration/PipelineDataFlowConfigBindingTests.cs: 5 tests (legacy + new + 3 mode values)."

tests:
  - "DataFlowReadGate_DiscoverMode_EmitsInfoLog"
  - "DataFlowReadGate_DiscoverMode_AggregatorReceivesEntry"
  - "DataFlowReadGate_DiscoverMode_DoesNotEmitWarn"
  - "DataFlowReadGate_DiscoverMode_NoThrow"
  - "DataFlowDiscoveryAggregator_AddEntry_NewTuple_Stored"
  - "DataFlowDiscoveryAggregator_AddEntry_DuplicateTuple_Deduped"
  - "DataFlowDiscoveryAggregator_FlushToFile_WritesJsonSidecar"
  - "PhaseDataFlowConfigValidator_NoWildcards_DoesNotThrow"
  - "PhaseDataFlowConfigValidator_ContextKeysWildcard_ThrowsWithEdgeName"
  - "PhaseDataFlowConfigValidator_ToPhaseStepWildcard_ThrowsWithEdgeName"
  - "PhaseDataFlowConfigValidator_BothWildcards_ThrowsListingBoth"
  - "PhaseDataFlowConfigValidator_ExplicitEdges_DoesNotThrow"
  - "PipelineDataFlowConfigBinding_LegacyEnforceTrue_MapsToModeEnforce"
  - "PipelineDataFlowConfigBinding_LegacyEnforceFalse_MapsToModeWarn"
  - "PipelineDataFlowConfigBinding_NewModeEnforce_BindsDirectly"
  - "PipelineDataFlowConfigBinding_NewModeWarn_BindsDirectly"
  - "PipelineDataFlowConfigBinding_NewModeDiscover_BindsDirectly"
  - "PerPresetDataFlowEdgeTests_AllPresets_AllSyntheticReadsCovered"

done:
  - "DataFlowReadMode enum (Enforce / Warn / Discover) replaces bool enforce; PipelineDataFlowConfig binds both legacy and new YAML forms"
  - "DataFlowReadGate has zero wildcard branches; explicit per-preset edges are the only match path"
  - "PhaseDataFlowConfigValidator throws fail-fast at *DataFlow.cs ctor time on any wildcard"
  - "PermissivePhaseDataFlow base class DELETED; each of the 10 *DataFlow.cs classes implements IPhaseDataFlow directly with explicit edges"
  - "DataFlowDiscoveryAggregator writes .agentsmith/runs/<run-id>/dataflow-discovery.json sidecar in Discover mode"
  - "config/agentsmith.yml defaults to mode=enforce; config/agentsmith.example.yml stays mode=warn"
  - "docs/configuration/dataflow-modes.md describes the three modes + operator migration path"
  - "~21 new tests passing; existing test pack adapted; smoke against agent-smith under enforce=true completes for all 10 presets with zero violations"
