# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0143b
goal: "Schließt die DataFlow-Hälfte von p0143 die als deferred markiert wurde. Entfernt den `*`-Wildcard-Mechanismus aus DataFlowReadGate damit Handler nicht versehentlich Context-Keys lesen können, die kein vorheriger Step explizit produziert hat. Heute matched der Wildcard alles (auch wenn FixBugDataFlow + AddFeatureDataFlow daneben explizite Edges deklarieren) — der Gate ist effektiv warn-only. Post-p0143b deklariert jedes der 10 *DataFlow.cs Klassen explizit welche ContextKeys von welchem Producer-Step welcher Consumer-Step lesen darf; PermissivePhaseDataFlow base wird gelöscht; die Wildcard-Branches in DataFlowReadGate (Zeilen 59 + 70) fallen weg; per-preset Edge-Coverage-Tests fangen Drift ab."

requires: ["p0143", "p0144"]

scope:
  in: |
    (1) Edge-Discovery via Shadow-Log. Statt jeden Handler manuell zu auditieren (welche
        `pipeline.Get<T>(ContextKeys.X)` / `pipeline.TryGet<T>(ContextKeys.Y)` calls macht
        er?) fügt p0143b einen Discovery-Modus zu DataFlowReadGate hinzu: wenn der
        Wildcard heute matched, log mit Severity Info statt Warning, plus alle Details
        (active step, key, candidate producer steps from the preset's command sequence).
        Operator-Smoke gegen agent-smith selbst (fix-bug + add-feature + fix-no-test +
        init-project + security-scan + api-security-scan + mad-discussion + legal-analysis
        + autonomous + skill-manager) generiert das vollständige Edge-Set für jede
        Preset/Step-Kombination. Output ist eine `dataflow-discovery.log` Datei per
        Pipeline-Run; Aggregation per Preset gibt die explizite Edge-Liste.

    (2) Per-Preset Edge-Deklaration. Die 10 *DataFlow.cs Klassen (FixBugDataFlow,
        FixNoTestDataFlow, AddFeatureDataFlow, InitProjectDataFlow, SecurityScanDataFlow,
        ApiSecurityScanDataFlow, MadDiscussionDataFlow, LegalAnalysisDataFlow,
        SkillManagerDataFlow, AutonomousDataFlow) deklarieren ihre Edges:Liste explizit,
        ohne den `Wildcard`-Einstieg. Jeder Edge ist eine `new PhaseDataFlowEdge(
        fromPhaseStep: "X", toPhaseStep: "Y", contextKeys: [...])` mit konkreten
        ContextKey-Namen. Aus der p0143b-Discovery-Phase generiert; manuelles Trimmen
        zum Eliminieren von test-only Read-Patterns die in Produktion nie firen.

    (3) Wildcard-Mechanik aus DataFlowReadGate entfernen. Lines 59 + 70 (EdgeCoversKey
        Wildcard-Check + EdgeAppliesToActiveStep Wildcard-Check) fallen weg. Mit den
        expliziten per-preset Edges ist der Wildcard nicht mehr nötig; sein Verbleib
        würde Operator-Configs die `*`-Edges deklarieren silently tolerieren. Defense-
        in-depth: ein neuer `PhaseDataFlowConfigValidator` (Application/Services/
        Pipeline) wirft beim Konstruktor jeder *DataFlow.cs Klasse wenn ein Edge `*`
        in ContextKeys oder ToPhaseStep enthält — fail-fast statt silent ignore.

    (4) PermissivePhaseDataFlow base class löschen. Jeder ehemaliger Subclass wird
        sealed mit `IPhaseDataFlow` direkt implementiert; die `protected static
        readonly PhaseDataFlowEdge Wildcard` Bequemlichkeit löscht mit. Damit
        können auch operator-side custom DataFlows keinen Wildcard mehr deklarieren
        ohne explizite Begründung im Code-Review.

    (5) Default-flip von `enforce: false` auf `enforce: true` in bundled
        config/agentsmith.yml. p0143b shippt mit der Garantie dass jede preset-step
        Kombination einen passenden Edge hat — enforce=true ist sicher. Operator-
        configs die ihre eigenen Pipelines mit Custom-Steps haben behalten
        enforce=false als opt-in für die Übergangszeit (die Schema kann es weiter)
        und kriegen Warning-Logs für undeklarierte Reads die ihnen den Migration-
        Pfad zeigen.

    (6) Per-Preset Edge-Coverage Tests. Neue Test-Klasse `PerPresetDataFlowEdgeTests`
        unter tests/AgentSmith.Tests/PipelineDataFlows fährt einen synthetischen
        Pipeline-Run pro Preset durch DataFlowReadGate (enforce=true, real
        IPhaseDataFlow von DI) und assertet 0 Violations. Stub-Handler liefern
        Standard-Pipeline-Context-Belegung; die Tests sind Regression-Guard für
        zukünftige Handler-Änderungen die einen neuen ContextKey-Read einführen
        ohne den Edge zu pflegen.

  out: |
    Operator-Config-Edge-Deklaration in YAML. Die `pipeline_data_flow` YAML-Sektion
    bleibt heute auf `enforce: bool` beschränkt; Custom-Edge-Deklaration in YAML ist
    out of scope. Operator-spezifische Edges leben weiterhin in Code (`IPhaseDataFlow`-
    Implementierungen registriert per DI). Eine YAML-Edge-Schema wäre ein eigenes
    Folge-Thema sobald Operator-Evidence dafür existiert.

    Edge-Coverage gegen die echten Production-Handler statt synthetische Stubs.
    PerPresetDataFlowEdgeTests fährt synthetische Steps durch — das fängt deklarierte-
    Edges-vs-aktuelle-Reads-Mismatch ab, aber NICHT "Handler X liest in Production
    einen Key der im Test-Stub gar nicht ausgelesen wird". Die Discovery-Smoke-Phase
    (Scope 1) deckt diesen Fall ab; sie ist eine bewusste pre-Merge Operator-Aktion,
    kein automatisierter Test-Pack.

    Generalisierung zu IResourceReadGate / IRunStateReadGate. Heute ist
    IPipelineContextReadGate auf PipelineContext.Get/TryGet spezialisiert; eine
    Generalisierung auf andere Read-Gateways (RunStateConcepts.Get/SetEnum, Sandbox-
    file-reads, Redis-state) ist eigenes Konzept — out of scope für eine
    Wildcard-Tightening-Phase.

    Removal von `pipeline_data_flow.enforce` setting komplett. Auch nach p0143b
    bleibt das Setting bindbar weil operator-side Configs noch enforce=false haben
    können (siehe oben). Hard removal ist ein Folge-Phase Aufgabe sobald
    Operator-Evidence zeigt dass enforce=true global stabil ist.

decisions:
  - key: |
      Discovery-Smoke als Pflicht-Schritt im Spec, nicht als optionale Operator-
      Hilfe. Reason: manuell jeden Handler auditieren (10 Presets × ~12 Steps × ~3
      Reads each = ~360 audits) ist fehleranfällig — ein vergessener Read bricht
      die Pipeline post-merge silently weil enforce=true sofort wirft. Discovery-
      Smoke macht den Audit datengetrieben: jeder Pipeline-Run gegen agent-smith
      selbst zeigt alle tatsächlich passierten Reads. Spec-Schritt 1 verlangt
      diese Runs als pre-merge Gate. -- alternatives: manueller Handler-Audit
      (rejected: fehleranfällig, hoher Aufwand); enforce=false als default bei
      ship (rejected: defeats den Zweck der Wildcard-Removal).
  - key: |
      DataFlowReadGate Discovery-Modus als dritter Modus neben enforce + warn-
      only, nicht als Special-Build-Flag oder als separater Tool. Reason: die
      Discovery-Logs brauchen ALLE Codepfade durch den realen Gate — feature-
      flag oder separater Tool würde divergieren. Drei-Modus-Enum
      (`Enforce`, `Warn`, `Discover`) am Gate selbst hält die Logik in einer
      Klasse. -- alternatives: separater DiscoveryReadGate Tool (rejected:
      Codepfad-Divergenz); compile-time #if (rejected: erschwert das Smoke-
      Testen).
  - key: |
      Per-Preset Edges als reine C# (kein YAML / kein DSL). Reason: PipelinePresets,
      Handler, ContextKeys leben in C#; die Edge-Deklaration daneben in C# hält
      die Refactoring-Tools (Rename ContextKey, Find-References) am Laufen.
      Operator-side Custom-Pipelines die eigene DataFlows brauchen können
      eigene IPhaseDataFlow-Klassen registrieren. -- alternatives: YAML-Edges
      (rejected: ohne IDE-Tool-Support divergiert die Wahrheit zwischen YAML
      und C#-Handler); DSL (rejected: ein vierter Notation neben PipelinePresets,
      Handler, ContextKeys).
  - key: |
      Wildcard-Rejection zur Konstruktor-Zeit des DataFlow-Objekts, nicht erst
      bei Pipeline-Run. Reason: fail-fast bei DI-Boot fängt das Problem in CI/
      dev-loop ab; fail-at-first-read würde die Fehler-Surface auf zufällige
      Run-Zeitpunkte schieben. Neue `PhaseDataFlowConfigValidator.Validate` läuft
      in jedem *DataFlow.cs Ctor (statisches Read der Edges-Liste reicht).
      -- alternatives: Validate bei DI-Resolve (rejected: separater Lifecycle-
      Punkt); silent ignore + warn (rejected: macht Wildcard-Drift wieder
      möglich).
  - key: |
      Default-flip enforce=false → enforce=true in der gebundelten
      config/agentsmith.yml, NICHT in der agentsmith.example.yml. Reason: die
      gebundelte config ist die self-test config für agent-smith's eigene
      Smoke-Runs; sie sollte den strengsten Mode haben. agentsmith.example.yml
      bleibt enforce=false damit operator beim ersten Setup nicht ihre Custom-
      Pipelines mit DataFlow-Violations crashen. Eine separate Operator-Doc
      erklärt den Migrations-Pfad. -- alternatives: beide flippen (rejected:
      Operator-Setup-Friction); nur agentsmith.example.yml flippen (rejected:
      agent-smith's Self-Test bleibt warn-only — wir bemerken Regressions
      nicht in unserem eigenen Smoke).
  - key: |
      PerPresetDataFlowEdgeTests sind synthetische Stub-Steps, NICHT real-handler
      integration. Reason: real-handler integration heißt full DI-Container +
      ChatClientFactory mocks + SkillCallRuntime + ProjectMap stubs etc. — pro
      Preset ein 200-Zeilen-Setup. Synthetische Steps reichen für "deklarierte
      Edges decken die Standard-Read-Patterns ab" (was real-handler täten); das
      verbleibende Gap (Handler liest in Production einen Key der im Test nicht
      ausgelesen wird) deckt die Discovery-Smoke aus Scope 1 ab. -- alternatives:
      Full-Handler-Integration-Tests (rejected: Wartung explodiert pro
      Handler-Refactoring); skip Tests (rejected: zukünftige Handler-Änderungen
      brechen DataFlow-Edges silent).
  - key: |
      PermissivePhaseDataFlow base class komplett löschen, nicht [Obsolete]-
      Window. Reason: Wildcard-Verbleib in der Codebase macht es trivial für
      future Drift ("ich erweitere FixBug mit einem schnellen Wildcard-Edge")
      auch wenn der Validator es zur Konstruktor-Zeit wirft — die [Obsolete]
      attribute macht das nicht kompiliert-broken. Hard delete + ctor-validator
      ist redundante Defense-in-depth. Operator-side Code der davon erbt
      bricht zum Compile-Zeitpunkt mit klarer Fehlermeldung. -- alternatives:
      [Obsolete] mit error: true (rejected: gleiche Schmerzen wie Löschung
      ohne den Code-Hygiene-Gewinn); soft-deprecate (rejected: bequemes
      Wildcard-Re-add wenn jemand "nur kurz fixen" will).

steps:
  - id: discovery-mode
    action: "DataFlowReadGate gewinnt einen Discover-Modus + Edge-Discovery-Log-Format"
    modify:
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowReadGate.cs: ctor `bool enforce` ersetzt durch `DataFlowReadMode mode` (neue enum: Enforce / Warn / Discover). Im Discover-Modus: matched Wildcard → emit info-log mit `[DataFlow-Discovery] preset={preset} step={activeStep} read={key} producers=[{candidate steps from _flow.Edges where ToPhaseStep matches}]`. Warn-Branche bleibt erhalten als zweite Existenzfunktion für operator-side custom presets. Enforce-Branche wirft (heute existierende Logik)."
    new:
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowReadMode.cs: enum `public enum DataFlowReadMode { Enforce, Warn, Discover }`. Eine Datei. ~15 Zeilen."
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowDiscoveryAggregator.cs: ~80 Zeilen. Sammelt Discovery-Log-Einträge zu (preset, fromStep, toStep, contextKey)-Tupeln in einem in-memory Set; emit als JSON-Sidecar an `.agentsmith/runs/<run-id>/dataflow-discovery.json` am Pipeline-Ende. Wird über IPipelineLifecycleCoordinator-Hook gewired (analog zu PipelineCostTracker)."

  - id: enforce-mode-wiring
    action: "PipelineExecutor liest pipeline_data_flow.mode aus Config (neuer enum statt bool)"
    modify:
      - "src/AgentSmith.Contracts/Models/Configuration/PipelineDataFlowConfig.cs: `bool Enforce { get; init; }` wird ersetzt durch `DataFlowReadMode Mode { get; init; } = DataFlowReadMode.Warn` (Default Warn für Backwards-Compat mit operator-configs die nur Enforce true/false binden). Custom IYamlTypeConverter mapped Legacy-YAML `enforce: true` → `mode: Enforce`, `enforce: false` → `mode: Warn`. Neue YAML-Form ist `mode: enforce|warn|discover`."
      - "src/AgentSmith.Application/Services/PipelineExecutor.cs: line 325 (`new DataFlowReadGate(...)`-Aufruf) gibt jetzt `config.Mode` statt `config.Enforce` weiter."

  - id: per-preset-edges
    action: "Jede der 10 *DataFlow.cs Klassen deklariert ihre Edges explizit ohne Wildcard"
    modify:
      - "src/AgentSmith.Application/PipelineDataFlows/FixBugDataFlow.cs: extends `IPhaseDataFlow` direkt (nicht mehr `PermissivePhaseDataFlow`); Edges-Liste enthält die explizite per-step Producer-Consumer-Map basierend auf der Discovery-Smoke gegen agent-smith selbst. Geschätzt ~15-25 Edges pro Preset (jeder Consumer-Step deklariert seine Reads). Detail-Inhalt wird in Schritt discovery-smoke-execution generiert."
      - "src/AgentSmith.Application/PipelineDataFlows/FixNoTestDataFlow.cs: analog."
      - "src/AgentSmith.Application/PipelineDataFlows/AddFeatureDataFlow.cs: analog (heute hat es schon einige explizite Edges + den Wildcard; Wildcard fällt weg, explizite Edges expandieren)."
      - "src/AgentSmith.Application/PipelineDataFlows/InitProjectDataFlow.cs: analog."
      - "src/AgentSmith.Application/PipelineDataFlows/SecurityScanDataFlow.cs: analog."
      - "src/AgentSmith.Application/PipelineDataFlows/ApiSecurityScanDataFlow.cs: analog."
      - "src/AgentSmith.Application/PipelineDataFlows/MadDiscussionDataFlow.cs: analog."
      - "src/AgentSmith.Application/PipelineDataFlows/LegalAnalysisDataFlow.cs: analog."
      - "src/AgentSmith.Application/PipelineDataFlows/SkillManagerDataFlow.cs: analog (NEU für p0144's unfenced shape: PipelineNameInitializer → LoadSkills → LoadContext → Triage → SkillRound → ConvergenceCheck → CompileDiscussion → GeneratePlan → Approval → AgenticExecute → WriteRunResult)."
      - "src/AgentSmith.Application/PipelineDataFlows/AutonomousDataFlow.cs: analog (NEU für p0144's unfenced shape)."

  - id: discovery-smoke-execution
    action: "Operator-Smoke gegen alle 10 Presets im Discover-Modus; Aggregation des Edge-Sets pro Preset"
    new:
      - "config/agentsmith.yml: `pipeline_data_flow.mode: discover` (temporär für den Smoke-Run); zurück auf `mode: enforce` nach Edge-Deklaration in Schritt per-preset-edges."
      - ".agentsmith/runs/dataflow-discovery-aggregate.md: Operator-erzeugte Markdown-Datei mit dem aggregierten Edge-Set pro Preset (geschrieben im PR-Beschreibung als Audit-Spur). Nicht committed; nur als Evidence im PR."

  - id: wildcard-removal
    action: "DataFlowReadGate-Wildcard-Branches löschen + PhaseDataFlowConfigValidator + PermissivePhaseDataFlow base class löschen"
    modify:
      - "src/AgentSmith.Application/Services/Pipeline/DataFlowReadGate.cs: lines 59 (`edge.ContextKeys.Contains(\"*\", ...)`) + 70 (`edge.ToPhaseStep == \"*\"`) komplett gelöscht. Wildcard-matching-Pfad existiert nicht mehr."
    new:
      - "src/AgentSmith.Application/Services/Pipeline/PhaseDataFlowConfigValidator.cs: ~40 Zeilen. Static method `Validate(IPhaseDataFlow flow)` wirft `InvalidOperationException` wenn irgendein Edge `*` in ContextKeys ODER in ToPhaseStep enthält. Wird im Ctor jedes neuen *DataFlow.cs-Subclasses aufgerufen (eine Zeile am Ende: `PhaseDataFlowConfigValidator.Validate(this);`)."
    delete:
      - "src/AgentSmith.Application/PipelineDataFlows/PermissivePhaseDataFlow.cs: gelöscht."

  - id: default-flip
    action: "Bundled agent-smith config flippt auf enforce, agentsmith.example.yml bleibt auf warn"
    modify:
      - "config/agentsmith.yml: `pipeline_data_flow.mode: enforce` (final nach Discovery)."
      - "config/agentsmith.example.yml: bleibt `pipeline_data_flow.mode: warn` (operator-friendly default — soft migration für Custom-Pipelines)."
      - "docs/configuration/dataflow-modes.md: neue Doc (~100 Zeilen). Erklärt die drei Modi, wann jeder sinnvoll ist, Migrations-Pfad für Operator-Configs (`warn` → Logs analysieren → eigene IPhaseDataFlow declarations → `enforce`), Discovery-Modus für Audit von Custom-Pipelines."

  - id: tests
    action: "Per-Preset Edge-Coverage + Validator + Mode-Wiring + Backwards-Compat-Binding"
    new:
      - "tests/AgentSmith.Tests/PipelineDataFlows/PerPresetDataFlowEdgeTests.cs: ~200 Zeilen. Theory über jede der 10 PipelinePresets.Names: konstruiere die entsprechende *DataFlow.cs Instanz, fahre einen synthetischen Run durch DataFlowReadGate(Enforce) mit Stub-Steps die die Standard-ContextKey-Read-Patterns simulieren, assert 0 Violations. Regression-Guard für zukünftige Handler-Refactorings."
      - "tests/AgentSmith.Tests/Pipeline/PhaseDataFlowConfigValidatorTests.cs: 5 Tests. Validate_NoWildcards_DoesNotThrow; Validate_ContextKeysWildcard_ThrowsWithEdgeName; Validate_ToPhaseStepWildcard_ThrowsWithEdgeName; Validate_BothWildcards_ThrowsListingBoth; Validate_ExplicitEdges_DoesNotThrow."
      - "tests/AgentSmith.Tests/Pipeline/DataFlowReadGateDiscoveryModeTests.cs: 4 Tests. OnRead_DiscoverMode_NoThrow_EmitsInfoLog; OnRead_DiscoverMode_LogIncludesPresetActiveStepKeyProducers; OnRead_DiscoverMode_DoesNotEmitWarn; OnRead_DiscoverMode_AggregatorReceivesEntry."
      - "tests/AgentSmith.Tests/Pipeline/DataFlowDiscoveryAggregatorTests.cs: 3 Tests. AddEntry_NewTuple_Stored; AddEntry_DuplicateTuple_DedupedInSet; FlushToFile_WritesJsonSidecarToRunsDir."
      - "tests/AgentSmith.Tests/Configuration/PipelineDataFlowConfigBindingTests.cs: 4 Tests. Bind_LegacyEnforceTrue_MapsToModeEnforce; Bind_LegacyEnforceFalse_MapsToModeWarn; Bind_NewModeEnforce_BindsDirectly; Bind_NewModeWarn_BindsDirectly; Bind_NewModeDiscover_BindsDirectly."
    modify:
      - "tests/AgentSmith.Tests/PipelineDataFlows/*-DataFlowTests.cs (any existing per-preset DataFlow tests): adapt to assert explicit edges instead of wildcard inheritance."

