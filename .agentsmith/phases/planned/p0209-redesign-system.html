<!-- Agent Smith — unified left-rail app shell · System as master/detail -->
<style>
  :root{
    --canvas:#fffefb; --ink:#201515; --ink-soft:#574e4a; --ink-faint:#857d77; --ink-ghost:#b3aca5;
    --primary:#22c55e; --primary-deep:#16a34a;
    --amber:#d97706; --rose:#e11d48; --rose-bg:#fdeef1; --rose-border:#f3c0cb;
    --line:#eae5dd; --line-soft:#f3efe8; --card:#fff; --hover:#faf8f3; --sel:#eef9f2;
    --green-bg:#e9f8ef; --amber-bg:#fcf4e8;
    --r:12px;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","IBM Plex Mono",Menlo,monospace;
    --sans:Inter,-apple-system,"Segoe UI",system-ui,sans-serif;
  }
  @media (prefers-reduced-motion: no-preference){.pulse{animation:p 1.7s ease-in-out infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}}
  *{box-sizing:border-box}
  .as{font-family:var(--sans);color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;line-height:1.5;font-size:14px;
    display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  /* ---- left app rail ---- */
  .rail{border-right:1px solid var(--line);padding:18px 0;display:flex;flex-direction:column;gap:2px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;padding:0 20px 8px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--primary)}
  .brand .conn{margin-left:auto;font-size:0}.brand .conn i{display:block;width:8px;height:8px;border-radius:50%;background:var(--primary)}
  .sec{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-ghost);font-weight:700;padding:16px 20px 6px}
  .item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;user-select:none;border-left:3px solid transparent;font-size:14px}
  .item:hover{background:var(--hover)}
  .item.sel{background:var(--sel);border-left-color:var(--primary)}
  .item.sel .ilbl{color:var(--primary-deep);font-weight:600}
  .idot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--ink-ghost)}
  .idot.live{background:var(--primary)}.idot.idle{background:var(--ink-ghost)}
  .ilbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ifresh{font-size:11.5px;color:var(--ink-ghost);font-family:var(--mono);flex:0 0 auto}

  /* ---- main ---- */
  .main{max-height:100vh;overflow-y:auto;padding:30px 34px 60px}
  .h1{font-size:26px;font-weight:680;letter-spacing:-.015em;margin:0 0 3px}
  .lede{font-size:14.5px;color:var(--ink-faint);margin-bottom:24px;max-width:720px}

  /* subsystem detail header */
  .dtitle{font-size:21px;font-weight:660;display:flex;align-items:center;gap:11px}
  .pill{font-size:12px;padding:3px 11px;border-radius:20px;font-weight:600}
  .pill.live{background:var(--green-bg);color:var(--primary-deep)}
  .pill.idle{background:var(--line-soft);color:var(--ink-faint)}
  .dfresh{font-size:13px;color:var(--ink-faint);margin-left:auto;font-family:var(--mono)}
  .tail{font-family:var(--mono);font-size:13px;color:var(--ink-soft);background:#faf8f4;border:1px solid var(--line);
    border-radius:9px;padding:11px 14px;margin:14px 0 20px;display:flex;gap:10px;align-items:center}
  .tail .arr{color:var(--ink-ghost)}.tail .tm{margin-left:auto;color:var(--ink-faint)}
  .hr{height:1px;background:var(--line);margin:0 0 18px}

  /* event drawer (shared) */
  .filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
  .fchip{font-size:13px;padding:5px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);cursor:pointer;user-select:none}
  .fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .fsort{font-size:12px;color:var(--ink-faint);cursor:pointer;padding:5px 11px;border:1px solid var(--line);border-radius:20px;background:var(--card)}
  .fsearch{margin-left:auto}.fsearch input{font-family:var(--sans);font-size:13px;border:1px solid var(--line);border-radius:20px;padding:6px 13px;width:190px;outline:none;color:var(--ink)}
  .fsearch input:focus{border-color:var(--primary)}
  .evs{overflow-y:auto}.evs.full{max-height:48vh;border:1px solid var(--line-soft);border-radius:9px;padding:0 8px}
  .ev{display:flex;gap:13px;padding:9px 4px;border-bottom:1px solid var(--line-soft);font-size:13.5px;align-items:baseline}
  .ev:last-child{border-bottom:0}
  .ev .tm{font-family:var(--mono);font-size:12px;color:var(--ink-faint);flex:0 0 62px}
  .ev .tag{font-family:var(--mono);font-size:10.5px;font-weight:700;flex:0 0 56px;text-transform:uppercase;letter-spacing:.03em}
  .ev .bdy{flex:1;color:var(--ink-soft);min-width:0}
  .ev code{font-family:var(--mono);font-size:12px;background:var(--line-soft);padding:1px 6px;border-radius:5px}
  .tag.obs{color:#7c3aed}.tag.file{color:var(--primary-deep)}.tag.poll{color:#0891b2}.tag.cat{color:var(--amber)}
  .showall{font-size:13px;color:var(--primary-deep);cursor:pointer;user-select:none;padding:13px 0 2px;display:inline-flex;gap:6px;align-items:center;font-weight:550}
  .showall:hover{text-decoration:underline}
  .empty{font-size:14px;color:var(--ink-faint);padding:30px 0;text-align:center}

  /* rollup panels */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:8px}
  .kcard{border:1px solid var(--line);border-radius:var(--r);padding:18px 20px}
  .kcard .k{font-size:13px;color:var(--ink-faint);margin-bottom:7px}
  .kcard .v{font-size:30px;font-weight:680;letter-spacing:-.02em}

  /* runs list (reused, ADO style) */
  .runlist{border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .run{display:grid;grid-template-columns:28px 1fr 132px 100px;align-items:center;gap:16px;padding:15px 20px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .run:last-child{border-bottom:0}.run:hover{background:var(--hover)}
  .rico{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
  .rico.ok{background:var(--primary-deep)}.rico.fail{background:var(--rose)}.rico.run{background:var(--amber)}
  .rtitle{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rmeta{font-size:13px;color:var(--ink-faint);margin-top:2px}
  .rmeta .id{font-family:var(--mono);font-size:12.5px;background:var(--line-soft);padding:1px 7px;border-radius:5px;margin-right:7px;color:var(--ink-soft)}
  .rprog{font-size:12.5px;font-family:var(--mono);color:var(--ink-soft)}
  .rwhen{text-align:right;font-size:13px;color:var(--ink-faint)}.rwhen .d{font-family:var(--mono);font-size:12px;color:var(--ink-ghost);display:block;margin-top:3px}
</style>

<div class="as">
  <nav class="rail" id="rail"></nav>
  <main class="main" id="main"></main>
</div>

<script>
(function(){
  const mk=(tm,kind,html)=>({tm,kind,html});
  // ---- subsystem model ----
  const subsystems={
    tracker:{label:'Tracker · ticket polling', live:true, fresh:'42s ago',
      tail:['19:09:30','poll done · sample-cloud-dev · 49 polled · 0 matched · 0 spawned · 269ms'],
      evs:[
        mk('19:09:30','poll','poll done · <code>sample-cloud-dev</code> · 49 polled · 0 matched · 269ms'),
        mk('19:09:30','obs','scan · sample-cloud-dev/#1043 · [Pair-Programming, Triage, Refinement]'),
        mk('19:09:30','obs','skip · #1043 · no project trigger matched'),
        mk('19:09:30','obs','scan · sample-cloud-dev/#1044 · [Internal, Weekly]'),
        mk('19:09:30','obs','skip · #1044 · no project trigger matched'),
        mk('19:08:30','poll','poll done · 49 polled · 0 matched · 271ms'),
        mk('19:07:30','poll','poll done · 49 polled · 0 matched · 264ms'),
        mk('19:06:30','poll','poll done · 49 polled · 0 matched · 258ms'),
        mk('19:05:30','poll','poll done · 49 polled · 0 matched · 280ms'),
        mk('19:04:30','poll','poll done · 49 polled · 0 matched · 263ms'),
      ]},
    webhooks:{label:'Webhooks', live:false, fresh:'—', tail:null, evs:[]},
    chat:{label:'Chat dispatchers', live:false, fresh:'—', tail:null, evs:[]},
    config:{label:'Config file reads', live:true, fresh:'now',
      tail:['19:10:12','read /app/config/agentsmith.yml (7219B)'],
      evs:[
        mk('19:10:12','file','read <code>/app/config/agentsmith.yml</code> (7219B)'),
        mk('19:09:12','file','read <code>/app/config/agentsmith.yml</code> (7219B)'),
        mk('19:08:12','file','read <code>/app/config/agentsmith.yml</code> (7219B)'),
        mk('19:07:12','file','read <code>/app/config/agentsmith.yml</code> (7219B)'),
        mk('19:06:12','file','read <code>/app/config/agentsmith.yml</code> (7219B)'),
      ]},
    catalog:{label:'Skill catalog & vocabulary', live:false, fresh:'14m ago',
      tail:['18:56:00','catalog resolved · v3.7.0 · 74 concepts · 19 skills · 6 masters · warm cache'],
      evs:[ mk('18:56:00','cat','catalog resolved · <code>v3.7.0</code> · 74 concepts · 19 skills · 6 masters · warm cache') ]},
  };
  const TAGS={obs:'obs',file:'file',poll:'poll',cat:'catalog'};

  // ---- runs (for the Runs item) ----
  const runs=[
    {st:'run', t:'Fix-no-test: AuthController coverage', id:'#18803', meta:'fix-no-test · 2 repos', step:'7/16', ago:'now', dur:'running'},
    {st:'fail',t:'agent smith: Fix the controller response types', id:'#1042', meta:'fix-bug · 5 repos', step:'failed 11/18', ago:'2h ago', dur:'4m 18s'},
    {st:'ok',  t:'Security scan: Sample', id:'#18712', meta:'security-scan · 1 repo', step:'done', ago:'5h ago', dur:'6m 02s'},
    {st:'ok',  t:'Add feature: bulk token revocation', id:'#18698', meta:'add-feature · 3 repos', step:'done', ago:'8h ago', dur:'8m 44s'},
    {st:'fail',t:'API scan: ConsumerApi swagger drift', id:'#18655', meta:'api-scan · 1 repo', step:'failed 5/13', ago:'11h ago', dur:'2m 11s'},
  ];

  // ---- left rail ----
  const rail=document.getElementById('rail'), main=document.getElementById('main');
  let sel='tracker';
  const NAV=[
    {sec:'Runs'}, {id:'runs', label:'Runs', area:true},
    {sec:'System'},
    {id:'tracker'},{id:'webhooks'},{id:'chat'},{id:'config'},{id:'catalog'},
    {sec:'Rollups'}, {id:'cost', label:'Cost'},{id:'today', label:"Today's activity"},
  ];
  function paintRail(){
    rail.innerHTML=`<div class="brand"><span class="dot"></span>agent-smith<span class="conn"><i></i></span></div>`+
      NAV.map(n=>{
        if(n.sec)return `<div class="sec">${n.sec}</div>`;
        const s=subsystems[n.id];
        const label=n.label||(s?s.label:n.id);
        const live=s?s.live:false;
        const fresh=s?s.fresh:'';
        const dotCls=n.area?'live':(live?'live':'idle');
        return `<div class="item ${sel===n.id?'sel':''}" data-id="${n.id}">
          <span class="idot ${dotCls}"></span><span class="ilbl">${label}</span>
          ${fresh&&fresh!=='—'?`<span class="ifresh">${fresh}</span>`:''}</div>`;
      }).join('');
    rail.querySelectorAll('.item').forEach(it=>it.onclick=()=>{sel=it.dataset.id;paintRail();renderMain();});
  }

  function drawer(container,evs){
    const G=[['all','All'],['poll','Polls'],['obs','Obs'],['file','Files'],['cat','Catalog']];
    const st={active:new Set(['all']),q:'',sort:'new',all:false},CAP=8;
    const w=document.createElement('div');
    w.innerHTML=`<div class="filters">${G.map(([k,l])=>`<span class="fchip ${k==='all'?'on':''}" data-k="${k}">${l}</span>`).join('')}
      <span class="fsort" data-sort>newest ↓</span><span class="fsearch"><input placeholder="filter content…"></span></div>
      <div class="evs"></div><div class="showall"></div>`;
    container.appendChild(w);
    const eb=w.querySelector('.evs'),sa=w.querySelector('.showall'),fl=w.querySelector('.filters');
    function r(){let l=evs.slice();
      if(!st.active.has('all'))l=l.filter(e=>st.active.has(e.kind));
      if(st.q)l=l.filter(e=>e.html.toLowerCase().includes(st.q));
      l.sort((a,b)=>st.sort==='new'?b.tm.localeCompare(a.tm):a.tm.localeCompare(b.tm));
      const tot=l.length,sh=st.all?l:l.slice(0,CAP);
      eb.className='evs '+(st.all?'full':'');
      eb.innerHTML=sh.length?sh.map(e=>`<div class="ev"><span class="tm">${e.tm}</span><span class="tag ${e.kind}">${TAGS[e.kind]}</span><span class="bdy">${e.html}</span></div>`).join(''):'<div class="empty">No events in window.</div>';
      sa.style.display=tot>CAP?'inline-flex':'none';sa.innerHTML=st.all?'▴ show fewer':`▾ show all ${tot} events`;}
    fl.querySelectorAll('.fchip').forEach(c=>c.onclick=()=>{const k=c.dataset.k;
      if(k==='all')st.active=new Set(['all']);else{st.active.delete('all');st.active.has(k)?st.active.delete(k):st.active.add(k);if(!st.active.size)st.active.add('all');}
      fl.querySelectorAll('.fchip').forEach(x=>x.classList.toggle('on',st.active.has(x.dataset.k)));r();});
    fl.querySelector('input').oninput=e=>{st.q=e.target.value.toLowerCase();r();};
    fl.querySelector('[data-sort]').onclick=e=>{st.sort=st.sort==='new'?'old':'new';e.target.textContent=st.sort==='new'?'newest ↓':'oldest ↑';r();};
    sa.onclick=()=>{st.all=!st.all;r();};r();
  }

  function renderMain(){
    main.innerHTML='';
    if(sel==='runs'){
      main.innerHTML=`<div class="h1">Runs</div><div class="lede">live — newest first.</div>`;
      const box=document.createElement('div');box.className='runlist';
      box.innerHTML=runs.map(r=>{const ic=r.st==='ok'?'<span class="rico ok">✓</span>':r.st==='fail'?'<span class="rico fail">✕</span>':'<span class="rico run pulse">●</span>';
        return `<div class="run">${ic}<div><div class="rtitle">${r.t}</div><div class="rmeta"><span class="id">${r.id}</span>${r.meta}</div></div>
          <div class="rprog">${r.step}</div><div class="rwhen">${r.ago}<span class="d">${r.dur}</span></div></div>`;}).join('');
      main.appendChild(box);return;
    }
    if(sel==='cost'){
      main.innerHTML=`<div class="h1">Cost</div><div class="lede">LLM spend across windows.</div>
        <div class="cards">
          <div class="kcard"><div class="k">Today</div><div class="v">$2.44</div></div>
          <div class="kcard"><div class="k">7 days</div><div class="v">$18.07</div></div>
          <div class="kcard"><div class="k">30 days</div><div class="v">$72.91</div></div>
          <div class="kcard"><div class="k">LLM calls · today</div><div class="v">242</div></div>
          <div class="kcard"><div class="k">LLM calls · 7d</div><div class="v">1,914</div></div>
          <div class="kcard"><div class="k">Avg $/run</div><div class="v">$3.04</div></div>
        </div>`;return;
    }
    if(sel==='today'){
      main.innerHTML=`<div class="h1">Today's activity</div><div class="lede">Server-side rollup.</div>
        <div class="cards">
          <div class="kcard"><div class="k">Tickets scanned</div><div class="v">4838</div></div>
          <div class="kcard"><div class="k">Tickets triggered</div><div class="v">3</div></div>
          <div class="kcard"><div class="k">Tickets skipped</div><div class="v">4835</div></div>
          <div class="kcard"><div class="k">Poll cycles</div><div class="v">104</div></div>
          <div class="kcard"><div class="k">Webhooks received</div><div class="v">0</div></div>
          <div class="kcard"><div class="k">Runs spawned</div><div class="v">3</div></div>
        </div>`;return;
    }
    // subsystem detail
    const s=subsystems[sel];
    main.innerHTML=`<div class="lede" style="margin-bottom:6px;font-size:12.5px;color:var(--ink-ghost);font-family:var(--mono)">System ›</div>
      <div class="dtitle">${s.label}<span class="pill ${s.live?'live':'idle'}">${s.live?'active':'idle'}</span><span class="dfresh">${s.fresh==='—'?'no recent activity':s.fresh}</span></div>`;
    if(s.tail){const t=document.createElement('div');t.className='tail';t.innerHTML=`<span class="arr">↳</span><span>${s.tail[1]}</span><span class="tm">${s.tail[0]}</span>`;main.appendChild(t);}
    else{main.insertAdjacentHTML('beforeend','<div style="height:18px"></div>');}
    const hr=document.createElement('div');hr.className='hr';main.appendChild(hr);
    if(s.evs.length)drawer(main,s.evs);
    else main.insertAdjacentHTML('beforeend','<div class="empty">No activity in the freshness window. This subsystem is event-driven and idle right now.</div>');
  }

  paintRail();renderMain();
})();
</script>
