# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0151h
goal: "Validation gate. Re-run the api-security-scan against the Sample
  target and compare the output to the IDE-buddy baseline session that
  produced source-anchored, factually correct analysis. The umbrella
  ships when this validation passes.

  Acceptance is not 'does it produce findings' (the baseline did, three
  of them, one wrong) — acceptance is 'are findings grounded in
  verifiable anchors and are obvious hallucinations gone'. The baseline
  comparison is a checklist applied to the new run's output, not a
  text-diff against the IDE-buddy transcript."

requires: ["p0151a", "p0151b", "p0151c", "p0151d", "p0151e", "p0151f", "p0151g"]

scope:
  in: |
    (1) docs/baselines/Sample-ide-buddy.md — captures the IDE-buddy
        session findings as a reference list with verifiable anchors:
        - UserPermissionCache: AddScoped (no cross-request leak)
        - JWT validation: AddMicrosoftIdentityWebApi defaults secure
        - Raw SQL: two hits in DatabaseValidator.cs, both
          parameterless (parameterless SQL, not vulnerable)
        - Dockerfile: review for non-root user, healthcheck
        - appsettings*: review for non-placeholder secrets
        - Controllers: all 22 have [Authorize] or stricter
        Each entry has a stable anchor (file:line or controller:attr)
        so the new run's output can be compared mechanically.

    (2) Sample smoke harness extension. The /smoke target already
        runs api-scan against Sample; extend it to assert:
        - No observation emits 'evidence_mode: analyzed_from_source'
          without a file in its trace ReadSet (covered by p0151b's
          validator; smoke verifies it kicks in on a real run).
        - The trace has tool_calls > 0 for every Plan-phase skill.
        - The final report contains at least one observation citing a
          file:line under RHS.Sample.API/ or RHS.Sample.Application/.
        - No observation mentions 'JWT expiry too long' or 'no
          issuer/audience checks' (the specific halluciniation from
          the baseline).
        - At least one observation cites a Nuclei template_id (from
          p0151g) OR explicitly notes 'no scanner findings of
          interest' as a Confirmed observation.

    (3) Operator-facing summary in the run output: a 'verification'
        section that prints which of the above assertions passed and
        which failed. Helps operators triage when an underlying
        sub-phase regresses.

  out: |
    Cross-pipeline validation (fix-bug, implement-feature). Those
    pipelines have their own success criteria; this sub-phase is
    api-security-scan-specific because that is the pipeline whose
    baseline we measured against. Each sub-phase from p0151a-g
    independently asserts /smoke green for the other pipelines.

    Quantitative quality metrics (recall, precision against a hand-
    labelled vulnerability list). Future work — requires curated
    ground truth that we do not have today. The IDE-buddy reference
    is a qualitative bar.

    Replacing /smoke. The existing smoke target stays; this is an
    extension specific to the api-security-scan + Sample case.

decisions:
  - key: |
      Checklist-style assertions rather than transcript-diff. — The
      IDE-buddy session is one possible high-quality output; ours
      will differ in wording, ordering, and which specific anchors
      it cites. Asserting on structural properties (every finding
      anchored, no specific halluciniation) is robust; asserting on
      text equivalence would lock us into IDE-buddy's specific
      output. alternatives: text similarity threshold (rejected:
      noise + brittle).

  - key: |
      Run the validation as a /smoke extension, not a unit test. —
      The validation needs a live Sample + the full pipeline + a
      real LLM call. Unit tests cannot reach this; integration tests
      could but would slow the regular suite. /smoke is the right
      home — operator-invoked, network-required. alternatives: CI
      stage with mocked LLM (rejected: cannot verify factual
      correctness without a real LLM); manual operator check
      (rejected: too easy to skip after a refactor).

  - key: |
      Baseline doc is committed to the repo. — Future contributors
      need a stable target to develop against. Anchors in the
      baseline file are stable (paths + attributes), so the doc
      stays accurate across Sample refactors longer than a
      transcript would. alternatives: external doc (rejected: drift);
      no baseline (rejected: claim of quality is unverifiable).

steps:
  - id: baseline-doc
    action: "Write docs/baselines/Sample-ide-buddy.md. Each entry: what the IDE-buddy found, where in source, what would constitute hallucination, what would constitute a missed finding."
    new:
      - "docs/baselines/Sample-ide-buddy.md"

  - id: smoke-extension
    action: "Extend the smoke harness with an api-security-scan-Sample verification block. Output passes/fails per assertion in the final summary."
    modify:
      - "src/AgentSmith.Cli/Commands/SmokeCommand.cs (or wherever /smoke entry lives)"
    new:
      - "src/AgentSmith.Cli/Smoke/ApiSecurityScanSampleVerifier.cs"

  - id: run-output-verification-section
    action: "DeliverFindings (or SummaryOutputStrategy) gains a verification section when the Sample target is detected; prints pass/fail per assertion. Operator sees this in the run output, not buried in CI logs."
    modify:
      - "src/AgentSmith.Infrastructure/Services/Output/SummaryOutputStrategy.cs"

  - id: tests
    action: "Verifier unit tests with synthetic inputs (happy path; hallucination injected; missing tool_calls; missing anchor)."
    new:
      - "tests/AgentSmith.Tests/Smoke/ApiSecurityScanSampleVerifierTests.cs"

tests:
  - "Verifier_AllFindingsAnchored_AsserionsPass"
  - "Verifier_FindingWithoutAnchor_AssertionFails"
  - "Verifier_TraceHasZeroToolCalls_AssertionFails"
  - "Verifier_JwtHallucinationInFindings_AssertionFails"
  - "Verifier_ScannerTemplateIdCited_AssertionPasses"
  - "Verifier_NoScannerOfInterestNote_AssertionPasses"

done:
  - "docs/baselines/Sample-ide-buddy.md exists and is referenced from the api-security-scan section of the main README."
  - "/smoke against Sample api-security-scan prints a verification section; all assertions pass."
  - "Running with deliberately-injected hallucination (e.g. a stub skill emitting 'JWT expiry too long') causes the smoke to fail with the specific assertion named."
  - "Operator-visible: the final summary footer includes 'verification: 6/6 passed' (or the specific failing items if not)."
  - "Full test suite green; /smoke green for api-scan + security-scan + fix-bug pipelines."
