# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0179c-coding-pipeline-collapse
goal: |
  Collapse fix-bug, add-feature, fix-no-test and skill-manager
  pipelines to a single AgenticMaster step that loads the
  coding-agent-master skill (from p0179a) and runs Plan / Execute /
  Verify as internal phase sections. The master decides phase
  transitions and re-loop on its own Verify output. AgenticExecute
  Handler renames to AgenticMasterHandler and emits
  MasterPhaseStartedEvent / MasterPhaseCompletedEvent per phase
  transition. VerifyRoundHandler + VerifyRoundCoordinator retire —
  their re-loop role lives inside the master now.

requires:
  - p0179-pipeline-and-skill-collapse
  - p0179a-master-prompt-as-skill
  - p0179b-role-taxonomy-removal

scope:
  in: |
    AgenticExecuteHandler → AgenticMasterHandler (rename). Handler
    runs the master skill body via AgenticLoopRunner (p0177).
    Master skill body contains three named phase sections:
    Plan / Execute / Verify. Master tracks which phase it is in
    via a tool-host-emitted enter_phase(phase) call OR via section
    markers in the body — the handler emits
    MasterPhaseStartedEvent / MasterPhaseCompletedEvent on each
    transition.

    New event records (p0173e contract): MasterPhaseStartedEvent,
    MasterPhaseCompletedEvent. EventType codes 80..81 (away from
    p0177's 60..65 sub-agent range; leaves 70..7N for p0179e's
    L2MadMaster range). Frozen JSON fixtures committed under
    tests/AgentSmith.Tests/Events/fixtures/events/L2Master/.

    Pipeline presets fix-bug / add-feature / fix-no-test /
    skill-manager rewritten:
      OLD: Approval → AgenticExecute → SkillRound* → Convergence
           → VerifyRound → ... (the choreography)
      NEW: Approval → AgenticMaster → done.
    Each preset's AgenticMaster step references the
    coding-agent-master skill name; the master prompt does the
    rest.

    VerifyRoundHandler + VerifyRoundCoordinator deleted. Their
    re-loop role (Execute again on blocking Verify observation)
    moves into the master: the master reads its own Verify
    output and decides whether to re-enter Execute. The handler
    side just runs the loop until the master signals done.

    Master prompt update (cross-repo to agentsmith-skills,
    branch feat/p0179c-coding-master-phases): the
    coding-agent-master SKILL.md body grows
    "## Plan Phase", "## Execute Phase", "## Verify Phase"
    sections + a "## Phase Transitions" rule block explaining
    when to enter_phase and when to declare done.

    enter_phase tool host (new): EnterPhaseToolHost (IToolHost).
    One tool enter_phase(phase: "plan"|"execute"|"verify"|"done").
    Handler validates the transition, emits
    MasterPhaseStartedEvent / MasterPhaseCompletedEvent on the
    bus. Available to coding-agent-master (and any other master
    that opts into phased operation via tool policy).

    Tool policy update: PhaseAwareToolPolicy wraps the existing
    per-pipeline policy. Phase-restricted tools (write-file
    during Plan = blocked; spawn_agents during Verify = blocked)
    are filtered by the policy based on the master's last
    enter_phase call. Defensive — the master is also told this
    in its prompt body; the policy is the safety net.

  out: |
    api-scan / security-scan / legal-analysis collapse → p0179d.
    mad-discussion → p0179e.
    External master skills for non-coding pipelines (api-security-
    master, security-master, legal-analyst-master) → p0179d/e.
    Dashboard rendering of MasterPhase* events → follow-up
    (drift detector flags; renderer changes mechanical).
    Cache-control architecture for the master across phases →
    p0178 (cache_control breakpoints would naturally fall at
    phase boundaries but the cache design is its own slice).

decisions:
  - key: |
      enter_phase is a tool, not a structured-output field on the
      master's reply. Reason: the LLM emits free-form text plus
      tool calls in the AgenticLoopRunner; threading a structured
      "phase" field would break the existing one-prefix master
      protocol and force every master to render structured JSON.
      A tool call is the same dispatch path the master already
      uses for spawn_agents. alternatives: structured field on
      every master reply (rejected — protocol bloat); section-
      marker text matching (rejected — fragile, master must agree
      with the parser regex).
  - key: |
      Phase-aware tool policy is defensive, not load-bearing. The
      master prompt body carries the rule "write files only
      during Execute"; the policy filters as a backstop. Reason:
      [[feedback_safety_in_api_not_process]] — the dangerous
      default (the master calling spawn_agents during Verify by
      mistake) gets fixed in the policy, not in a warning comment.
  - key: |
      The handler emits MasterPhaseStartedEvent at enter_phase and
      MasterPhaseCompletedEvent at the NEXT enter_phase (or at
      AgenticMaster step completion for the last phase). Reason:
      duration metrics need both start and end; deriving end from
      next-start keeps the master's protocol single-event.
      alternatives: master emits both events (rejected — doubles
      protocol surface, master could forget); handler infers end
      from inactivity (rejected — timing-dependent flake).

steps:
  - id: master-phase-event-records
    action: |
      Add MasterPhaseStartedEvent, MasterPhaseCompletedEvent under
      AgentSmith.Contracts/Events (p0173e contract); each
      implements IDomainEvent. EventType codes 80..81. Frozen JSON
      fixtures committed.
    new:
      - "src/backend/AgentSmith.Contracts/Events/L2MasterPhaseEvents.cs"
      - "tests/AgentSmith.Tests/Events/fixtures/events/L2Master/MasterPhaseStartedEvent.json"
      - "tests/AgentSmith.Tests/Events/fixtures/events/L2Master/MasterPhaseCompletedEvent.json"
  - id: enter-phase-tool-host
    action: |
      EnterPhaseToolHost: one tool enter_phase(phase). Validates
      transition (plan → execute, execute → verify, verify →
      execute|done). On valid transition, emits
      MasterPhaseCompletedEvent for prior phase (if any) and
      MasterPhaseStartedEvent for new phase. Persists current
      phase per-run via a scoped MasterPhaseTracker service.
    new:
      - "src/backend/AgentSmith.Application/Services/Tools/EnterPhaseToolHost.cs"
      - "src/backend/AgentSmith.Application/Services/Loop/MasterPhaseTracker.cs"
      - "tests/AgentSmith.Tests/Application/Services/Tools/EnterPhaseToolHostTests.cs"
  - id: phase-aware-tool-policy
    action: |
      PhaseAwareToolPolicy wraps the per-pipeline policy. Reads
      current phase from MasterPhaseTracker; filters tool list
      per phase rules (Plan: no write-file/spawn_agents; Execute:
      all tools; Verify: read-only + spawn_agents allowed).
      Falls back to wrapped policy if no current phase
      (non-phased master).
    new:
      - "src/backend/AgentSmith.Application/Services/Tools/PhaseAwareToolPolicy.cs"
      - "tests/AgentSmith.Tests/Application/Services/Tools/PhaseAwareToolPolicyTests.cs"
  - id: rename-handler
    action: |
      Git mv AgenticExecuteHandler → AgenticMasterHandler. Same
      file content; rename only. Update DI registration + step
      type binding.
    modify:
      - "src/backend/AgentSmith.Application/Services/Handlers/AgenticExecuteHandler.cs (RENAMED)"
      - "src/backend/AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs"
  - id: pipeline-step-rename
    action: |
      PipelineStep.AgenticExecute → AgenticMaster (or add
      AgenticMaster alongside, retire AgenticExecute in same
      slice). Step-to-handler binding updated.
  - id: cross-repo-master-skill-phases
    action: |
      agentsmith-skills branch feat/p0179c-coding-master-phases:
      coding-agent-master SKILL.md gains
      "## Plan Phase", "## Execute Phase", "## Verify Phase",
      "## Phase Transitions" sections. Master prompt updated to
      use enter_phase tool calls.
  - id: rewrite-coding-presets
    action: |
      fix-bug, add-feature, fix-no-test, skill-manager preset
      YAMLs rewritten: collapse to Approval → AgenticMaster.
      One commit per preset.
    modify:
      - "config/presets/fix-bug.yaml"
      - "config/presets/add-feature.yaml"
      - "config/presets/fix-no-test.yaml"
      - "config/presets/skill-manager.yaml"
  - id: retire-verify-round
    action: |
      Delete VerifyRoundHandler + VerifyRoundCoordinator +
      IVerifyRoundCoordinator + tests. PipelineStep.VerifyRound
      retires from enum + every preset.
    modify:
      - "src/backend/AgentSmith.Application/Services/VerifyRoundCoordinator.cs (DELETED)"
      - "src/backend/AgentSmith.Application/Services/Handlers/VerifyRoundHandler.cs (DELETED)"
      - "src/backend/AgentSmith.Contracts/Services/IVerifyRoundCoordinator.cs (DELETED)"
  - id: verify
    action: |
      dotnet build + dotnet test green. pnpm build + pnpm test
      green (drift detector includes the new L2Master events).
      grep for VerifyRound in src/backend returns no hits.

tests:
  - "MasterPhaseStarted_Completed_RoundTripThroughEnvelope"
  - "MasterPhaseStarted_Completed_FrozenFixturesDeserialize"
  - "EnterPhaseTool_ValidTransition_Plan_To_Execute_Emits_BothEvents"
  - "EnterPhaseTool_InvalidTransition_Verify_To_Plan_Rejected"
  - "EnterPhaseTool_FinalDoneTransition_EmitsCompletedForPriorPhase"
  - "MasterPhaseTracker_Scoped_OneInstancePerRun"
  - "PhaseAwareToolPolicy_PlanPhase_BlocksWriteFile"
  - "PhaseAwareToolPolicy_ExecutePhase_AllowsWriteAndSpawn"
  - "PhaseAwareToolPolicy_VerifyPhase_AllowsReadAndSpawn_BlocksWrite"
  - "PhaseAwareToolPolicy_NoCurrentPhase_FallsBackToWrappedPolicy"
  - "AgenticMasterHandler_OldName_NotResolvable_Reflection"
  - "FixBugPreset_HasOnlyApprovalAndAgenticMaster"
  - "AddFeaturePreset_HasOnlyApprovalAndAgenticMaster"
  - "FixNoTestPreset_HasOnlyApprovalAndAgenticMaster"
  - "SkillManagerPreset_HasOnlyApprovalAndAgenticMaster"

done:
  - "AgenticExecuteHandler renamed to AgenticMasterHandler; one shared handler runs the master skill for every collapsed pipeline."
  - "MasterPhaseStartedEvent / MasterPhaseCompletedEvent ship under p0173e contract (EventType 80..81); frozen fixtures committed."
  - "enter_phase tool host + MasterPhaseTracker + PhaseAwareToolPolicy ship; master prompt drives phase transitions via tool calls."
  - "fix-bug / add-feature / fix-no-test / skill-manager presets collapsed to Approval → AgenticMaster (one preset per commit)."
  - "VerifyRoundHandler + VerifyRoundCoordinator + IVerifyRoundCoordinator retired; PipelineStep.VerifyRound removed."
  - "coding-agent-master skill body updated cross-repo with Plan/Execute/Verify phase sections + transition rules."
  - "dotnet build + dotnet test + pnpm build + pnpm test all green."
