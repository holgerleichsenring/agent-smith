# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0169j-a-frozen-trail-persistence
goal: |
  Event stream survives past the 2-hour Redis TTL. WriteRunResultHandler
  dumps the per-run XRANGE to .agentsmith/runs/{runId}/events.jsonl at
  RunFinished; JobsHub.GetTrail falls back to the JSONL when the
  Redis stream is gone. Trail + Activity tabs become durable —
  "open the run from yesterday" works.

requires:
  - p0169e-event-backbone
  - p0169h-event-trail-tree

scope:
  in: |
    BACKEND (src/backend/AgentSmith.Application + .Server):

    (1) New FrozenTrailWriter service in Application.Services.Events
        consumes IConnectionMultiplexer + IRunsRootResolver. Method
        FreezeAsync(runId, runDir, ct) reads XRANGE over the per-run
        stream, serialises one RunEvent per line as JSON via the
        existing EventEnvelopeSerializer (one envelope per line —
        same format as the in-stream payload, NOT a re-shape), writes
        to {runDir}/events.jsonl. Idempotent: existing file is
        overwritten.

    (2) WriteRunResultHandler invokes FrozenTrailWriter.FreezeAsync at
        the end of its run, after result.md + plan.md are written.
        Best-effort: failure to freeze logs a warning, doesn't fail
        the run (result.md is the durable artefact; events.jsonl is
        the bonus).

    (3) TrailReader gains FallbackToFrozenAsync(runId, runsRoot, ct):
        when ReadAllAsync returns empty (stream missing or TTL-expired),
        reads events.jsonl line-by-line, deserialises via the same
        envelope, returns the array. Empty-or-missing file → empty
        result.

    (4) JobsHub.GetTrail composes: read Redis first, then fallback to
        frozen. Result is the union (live stream wins for races, but
        post-finish the stream is gone so frozen IS the result).

    (5) New JobsHub.ListHistoricalRuns(limit?) method walks the
        runs-root, returns the last N RunId directories (sorted
        descending by mtime). Backs a future "search older runs"
        Overview affordance — not exposed in the UI in this slice;
        the contract lands so a UI follow-up can consume it without
        a server change.

    DASHBOARD (src/dashboard/src/lib + hooks):

    (6) useTrail hook falls back to a "frozen" badge when the trail
        deserialised event count > 0 but no RunStarted/Finished is
        in the events (stream-expired indicator). Badge renders in
        the Trail tab header: "(frozen) — read from disk".

  out: |
    UI for ListHistoricalRuns — out of scope, contract-only. Overview's
    Recent-50 stays at 50 in this slice; pagination/older-runs lookup
    is a follow-up.
    events.jsonl compression. Out — typical run is < 1MB; gzip wins
    are not worth the read-side complexity.
    Backfill of pre-p0169j-a runs. Out — operators who care can
    re-emit by tailing the existing Redis state before TTL; new runs
    after this phase freeze automatically.
    Indexing for search. Out — file-walk over runs-root is fast enough
    for 50–500 historical runs; if operators hit thousands, separate
    phase.

decisions:
  - key: |
      JSONL of envelope-format, not a re-shaped JSON — Reason: the
      events.jsonl IS the stream, frozen. Re-shaping (e.g. flatten
      envelope into typed-event JSON) would couple the frozen format
      to the in-stream format twice — once in EventEnvelopeSerializer
      and once in FrozenTrailWriter. JSONL means one line = one
      stream entry's payload, ready to feed back through the same
      deserializer. alternatives: typed-event JSON array (rejected —
      double serialization story, drift risk); SQLite (rejected —
      durable-row overkill for read-once trails); Parquet (rejected —
      same).

  - key: |
      Best-effort freeze, not run-failing — Reason: result.md is the
      load-bearing artefact (operators read this, write skills against
      it). events.jsonl is the diagnostic bonus. A freeze failure
      (disk full, permissions, path race) shouldn't fail the whole
      run; warn and move on. The next freeze attempt — on the next
      run — succeeds. alternatives: hard-fail (rejected — over-strict
      for diagnostic data); silent skip (rejected — operators want
      to know if their archive is incomplete; WARN logs surface it).

  - key: |
      Fallback composition: Redis first, then frozen — Reason: during
      a live run the stream is the source of truth; the frozen file
      doesn't exist yet (or is from a previous run). After
      RunFinished + 2h, the stream is gone and the frozen file is
      authoritative. The "first non-empty wins" rule covers both
      cases without explicit state. alternatives: time-based switch
      (rejected — fragile, clock-dependent); union with dedup
      (rejected — events.jsonl IS the stream, no dedup needed).

  - key: |
      'frozen' UI badge instead of full read-only mode — Reason: the
      tabs all work identically — same events, same renderers. The
      only thing operators need to know is "this trail is from disk,
      not live". A small badge in the Trail tab header carries that
      hint without forcing a different UX path. alternatives: full
      read-only mode (rejected — same events, same tabs work fine);
      no indicator (rejected — operators silently confused on stale
      timestamps).

steps:
  - id: frozen-writer
    action: |
      FrozenTrailWriter service + unit tests against a mocked
      IConnectionMultiplexer + temp-dir IRunsRootResolver stub.
    new:
      - "src/backend/AgentSmith.Application/Services/Events/FrozenTrailWriter.cs"
      - "src/backend/AgentSmith.Application/Services/Events/IFrozenTrailWriter.cs"
      - "tests/AgentSmith.Tests/Events/FrozenTrailWriterTests.cs"
    modify:
      - "src/backend/AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs"

  - id: write-run-result-integration
    action: |
      WriteRunResultHandler invokes FrozenTrailWriter at the end of
      ExecuteAsync, after result.md is written. Best-effort try/catch
      with WARN log.
    modify:
      - "src/backend/AgentSmith.Application/Services/Handlers/WriteRunResultHandler.cs"
    new:
      - "tests/AgentSmith.Tests/Handlers/WriteRunResultFreezeIntegrationTests.cs"

  - id: trail-reader-fallback
    action: |
      TrailReader.ReadAllAsync composes Redis + frozen. New
      FrozenTrailReader sibling reads events.jsonl per line. Six
      new tests over the composition matrix (Redis-only, frozen-only,
      both-empty, malformed-line, partial-corruption, big-file).
    new:
      - "src/backend/AgentSmith.Server/Services/Events/FrozenTrailReader.cs"
      - "tests/AgentSmith.Tests/Hubs/TrailReaderFallbackTests.cs"
    modify:
      - "src/backend/AgentSmith.Server/Services/Events/TrailReader.cs"

  - id: list-historical
    action: |
      ListHistoricalRuns hub method + HistoricalRunIndex service that
      walks runs-root once per call. Returns last-N runIds sorted by
      mtime desc.
    new:
      - "src/backend/AgentSmith.Server/Services/Events/HistoricalRunIndex.cs"
      - "tests/AgentSmith.Tests/Hubs/HistoricalRunIndexTests.cs"
    modify:
      - "src/backend/AgentSmith.Server/Hubs/JobsHub.cs"
      - "src/backend/AgentSmith.Server/Program.cs"

  - id: dashboard-frozen-badge
    action: |
      Trail tab header gains a small "(frozen — disk)" badge when
      the events array has > 0 entries but no RunStarted within.
      Pure visual; no behaviour change.
    new:
      - "src/dashboard/src/components/jobs/FrozenTrailBadge.tsx"
    modify:
      - "src/dashboard/src/components/jobs/TrailTab.tsx"

  - id: verify
    action: |
      dotnet build + dotnet test green. pnpm build + pnpm test green.
      Manual smoke: trigger a run, let it finish, wait > 2 hours OR
      run `redis-cli DEL run:{id}:events` to force the stream gone;
      open the run in Trail tab — events still load, "(frozen)" badge
      visible.

tests:
  - "FrozenTrailWriter_StreamWithEvents_WritesJsonlOnePerLine"
  - "FrozenTrailWriter_EmptyStream_WritesEmptyFile"
  - "FrozenTrailWriter_FailedDiskWrite_DoesNotThrow"
  - "FrozenTrailWriter_IdempotentRewrite_OverwritesExistingFile"
  - "FrozenTrailReader_ReadsLineByLine_PreservesOrder"
  - "FrozenTrailReader_MalformedLine_SkipsAndContinues"
  - "TrailReader_RedisHasEvents_ReturnsLiveEvents_NoFallback"
  - "TrailReader_RedisEmpty_FrozenExists_ReturnsFrozenEvents"
  - "TrailReader_BothEmpty_ReturnsEmpty"
  - "WriteRunResult_AfterMainWrite_TriggersFreeze"
  - "HistoricalRunIndex_RunsRootWithMultiple_ReturnsLastNByMtime"
  - "FrozenTrailBadge_NoRunStartedInEvents_BadgeVisible"

done:
  - "FrozenTrailWriter ships; WriteRunResultHandler calls it post-result.md."
  - "events.jsonl format = one EventEnvelopeSerializer payload per line."
  - "Best-effort freeze: failures logged WARN, run unaffected."
  - "TrailReader composes Redis + frozen; live wins, frozen fallback works."
  - "ListHistoricalRuns hub method returns runs-root index (UI consumer is p0169j follow-up)."
  - "Dashboard 'frozen' badge appears when events come from disk."
  - "Backend + dashboard tests green."
  - "Manual smoke: forced-expired stream still surfaces the trail from disk."
