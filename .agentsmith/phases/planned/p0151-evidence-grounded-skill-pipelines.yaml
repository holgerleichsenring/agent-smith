# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0151
goal: "Umbrella for the runtime-level fixes that make every pipeline's skills
  actually use their tools and ground every claim in verifiable evidence.

  Baseline observation: an api-security-scan against Sample produced 3
  findings — none source-anchored, one factually wrong (claimed weak JWT
  validation against an identity-library stack whose defaults are
  secure). A side-by-side IDE-buddy run with full tool access produced
  source-anchored, factually correct analysis on the same target. The
  delta is not a single bug; it is a stack of pipeline-agnostic gaps:
  (1) LoopTraceCollector is instantiated but never receives Append* calls,
  so 'tool_calls=0' is unconditional and no operator can tell whether
  tools were used; (2) AnalyzedFromSource is a free claim — no validator
  checks the cited file was actually read; (3) the EvidenceMode JSON
  convention is camelCase while skills emit snake_case, silently
  downgrading to Potential; (4) source-reviewer judge skills fail to
  load because block_condition is hard-required even for observation-
  emitting judges; (5) RunCommand exists per p0145 but only in
  Investigator-phase tool surfaces — directory inventory work in Plan /
  Survey reinvents it via stitched Glob calls; (6) the running
  observation list is not visible to downstream skills, so each skill
  rediscovers from scratch or hallucinates; (7) no configurable per-
  pipeline cost cap attached to the PerSkillBreakdown that p0132 already
  produces; (8) scanner findings are pre-compressed to prose before any
  LLM sees them, destroying the template_id / matched_at anchors that
  would let a specialist correlate them to code.

  Every gap above is shared across fix-bug, implement-feature,
  security-scan, api-security-scan, and any future pipeline that runs
  skills. The umbrella is therefore framed as runtime infrastructure
  with api-security-scan as the proving ground — the catalog rewrite
  lives in one sub-phase; the other six are infrastructure that any
  pipeline immediately inherits."

requires: ["p0148"]

scope:
  in: |
    Runtime instrumentation and contracts (pipeline-agnostic):
    (a) LoopTraceCollector wired into the actual LLM + tool call sites
        so skill_call_trace reflects reality. RunCommand (existing per
        p0145) enabled in the Plan / Survey tool-policy compositions —
        no new BashToolHost class; the existing tool surface gains
        access in additional phases. System prompt prefix amended once
        (in the prompt strategy) to state the source-anchoring
        obligation — the same rule that the validator in 151b enforces
        mechanically.
    (b) Skill output contract tightened: EvidenceMode JSON convention
        unified on snake_case end-to-end; new validator rule —
        AnalyzedFromSource observations require their `file` to appear
        in this skill call's ReadSet (captured by the trace collector
        from 151a). Observations with other evidence_modes (Potential,
        Confirmed) are anchored by other fields (api_path, schema_name,
        scanner template_id) OR by a clear description for design-level
        findings — the ReadSet rule applies only to AnalyzedFromSource.
        Source-reviewer judges (auth-config, controller-implementation,
        upload-validator) are unblocked by making block_condition
        optional when output_schema=observation.
    (c) Observation bus (passive read): every skill receives the running
        observation list (compact JSON, location fields only) as part of
        its prompt. Skills consume prior observations as hints but
        verify with their own tools. No dispatch protocol yet — the
        dispatch (a skill asking the orchestrator for a follow-up
        round) is split into deferred p0151i, gated on whether 151h
        shows passive-read alone hit the quality bar.
    (d) Configurable per-pipeline cost cap hooked into PipelineCostTracker's
        existing PerSkillBreakdown (p0132a/b). Default $5 / 500k tokens,
        overridable in agentsmith.yml. The breakdown already projects
        cumulative cost; the cap is a threshold check on that
        projection. Hard abort with a typed observation when reached;
        partial output still delivered.

    Pipeline catalog work (api-security-scan as proving ground):
    (e) api-security-scan skill catalog rewritten into recon + specialist
        + final synthesizer roles. All skills follow the existing
        p0127c format — no new SKILL.md sections, no new frontmatter
        fields. Skill behavior is enforced by the runtime contract
        from (a)-(b), not by per-skill prompt boilerplate.
    (f) Scanner-pipeline refactor: stop the destructive prose compression
        of Nuclei / ZAP / Spectral results. Keep top-N with structured
        anchors (template_id, matched_at, severity) via deterministic
        selection. New scanner-correlation-judge specialist either
        maps scanner findings to code locations (AnalyzedFromSource
        with file:line) or confirms them via api_path + template_id
        when no code lookup applies.

    Validation:
    (g) Re-scan against the IDE-buddy reference snapshot. Acceptance:
        every AnalyzedFromSource observation has its file in the trace
        ReadSet; observations with other evidence_modes have their
        natural anchors (api_path, schema_name, scanner template_id);
        the previously hallucinated identity-library finding does not
        recur; operator sees non-zero tool_calls in skill traces for
        every round whose tool-policy returns a non-empty ToolSet;
        sample of fix-bug + security-scan smokes show the same
        source-anchored discipline in their AnalyzedFromSource
        observations (proves the infrastructure is pipeline-agnostic).

  out: |
    Skill self-dispatch protocol. Split into deferred p0151i — runs
    only if 151h (note: kept as the numbered slot for validation, but
    physically the validation phase is now g; the dispatch phase is i)
    shows passive observation bus alone fell short of the quality bar.
    Pull-based, budget-aware, depth-capped; specs in p0151i.

    SKILL.md body format sections (Input / Goal / Tools / Budget /
    Output / Drop-If / Followup). Each duplicates an existing mechanism
    (tool-policy, loop_limits, activates_when, frontmatter description,
    output_schema). Adding them as enforced sections re-opens the
    p0127a 'one-format-fits-all' question that p0127c hard-cut over.
    The skill contract stays at the p0127c format.

    Wave / parallel skill execution within a pipeline. Premature
    optimization — keep skills running sequentially first, parallelize
    only after we can measure the cost / quality trade-off. p0097's
    batch parallelism within a round is unaffected (different axis).

    LLM-defined skill catalogs. The skill catalog stays a fixed,
    curated asset; the LLM does not invent its own skills.
    Reproducibility of scans matters more than emergent flexibility.

    Rewriting the fix-bug / implement-feature / security-scan catalogs.
    Those benefit automatically from (a)-(d); their own catalog
    refinements are out of scope and become separate phases when
    needed.

    New scanner integrations (e.g. semgrep, trufflehog). The scanner-
    pipeline refactor in (f) is about preserving anchors of existing
    scanners, not adding more.

decisions:
  - key: |
      Decentralized verification (every skill has tools and verifies)
      over a single recon-producer feeding the rest. — A central recon
      at the root of the pipeline creates one hallucination point that
      contaminates all downstream skills. With decentralized verification
      every claim is independently grounded; the operator can trace each
      observation to a specific Read/Grep call. alternatives: central
      recon (rejected: single point of failure for correctness);
      mixed (rejected: ambiguity about which claims need re-verification).

  - key: |
      Observations as the only inter-skill communication channel; no
      new SKILL.md format. — Observations already carry file /
      start_line / api_path; they are themselves the 'where to look'
      map. Compact JSON between rounds; skill bodies stay at the p0127c
      format. The runtime (151a-b) enforces the contract, not 44+
      SKILL.md files. alternatives: body-section enforcement (rejected:
      reintroduces dual-format problem p0127c just closed); frontmatter
      additions (rejected: duplicates activates_when / tool-policy /
      loop_limits).

  - key: |
      Source-anchored validator enforced mechanically via ReadSet, only
      for AnalyzedFromSource. — An AnalyzedFromSource observation must
      cite a `file` that was read by this skill call. Other evidence
      modes (Potential, Confirmed) keep their natural anchors
      (api_path, schema_name, scanner template_id) — a swagger-only
      design finding or a scanner-template-id confirmation does not
      need a file. alternatives: every-finding-needs-file (rejected:
      scanner findings + design critiques are legitimate without source
      anchors); prompt-only instruction (rejected: LLMs ignore soft
      instructions); file-exists check (rejected: hallucination-
      permeable).

  - key: |
      Dispatch protocol deferred to p0151i. — 80% of the inter-skill
      leverage falls out of passive bus visibility (the next skill
      sees prior findings with anchors it can confirm). The dispatch
      protocol adds budget coupling, depth caps, and a new typed
      observation field — non-trivial. Gate it on whether 151h shows
      passive alone hit the quality bar. alternatives: ship in one
      phase (rejected: budget / depth-cap protocol design deserves its
      own validation cycle).

  - key: |
      Sequential skill execution first; parallel waves deferred. —
      'Too early optimization is the root of all evil.' Once we have
      working source-anchored output sequentially, we can measure
      whether parallelism pays. p0097's intra-round batch parallelism
      is a different axis and stays active. alternatives: 2-wave
      parallel (rejected for now: optimization without proven
      baseline).

  - key: |
      No new BashToolHost; enable existing RunCommand in more phases.
      — FilesystemToolHost.RunCommand from p0145 already runs shell
      commands via /bin/sh -c inside the sandbox. The Plan / Survey
      tool-policy compositions need it added, not a new host class.
      alternatives: new BashToolHost (rejected: reinvents existing
      code; would need to be deleted in 6 months); Glob-extension with
      directory listing (rejected: reinvents Bash badly).

  - key: |
      $5 / 500k tokens default cost cap, configurable per pipeline,
      checked against PerSkillBreakdown projections. — Configurable
      means an operator can raise it for deep audits without code
      change. Hooking into PerSkillBreakdown rather than a parallel
      signal keeps cost accounting in one place per p0132.
      alternatives: hardcoded cap (rejected: rigid); separate
      IPipelineBudgetExhaustedSignal (rejected: parallel mechanism to
      PerSkillBreakdown — same bug as pre-p0148 ToolSet plumbing).

  - key: |
      api-security-scan as the proving ground; not a special case. —
      Catalog rewrite lives in p0151e. The other six sub-phases are
      pipeline-agnostic infrastructure. fix-bug + security-scan
      validation samples in p0151h prove the umbrella's pipeline-
      agnostic thesis (if those pipelines do not show source-anchored
      improvement, the thesis is wrong and the umbrella was a
      disguised api-security-fix).

steps:
  - id: write-sub-phases
    action: "Author the seven sub-phase specs (a-h, skipping e which was replaced — see decisions). Sub-phases are sequential per the requires chain; p0151i (dispatch protocol) is deferred and gated on p0151h outcomes."
    new:
      - ".agentsmith/phases/planned/p0151a-trace-wiring-and-runcommand-enablement.yaml"
      - ".agentsmith/phases/planned/p0151b-source-anchored-observation-contract.yaml"
      - ".agentsmith/phases/planned/p0151c-observation-bus-passive-read.yaml"
      - ".agentsmith/phases/planned/p0151d-pipeline-cost-cap-on-perskill-breakdown.yaml"
      - ".agentsmith/phases/planned/p0151f-api-security-skill-catalog-rewrite.yaml"
      - ".agentsmith/phases/planned/p0151g-scanner-pipeline-anchor-preservation.yaml"
      - ".agentsmith/phases/planned/p0151h-ide-buddy-baseline-validation.yaml"
      - ".agentsmith/phases/planned/p0151i-dispatch-protocol-and-followup.yaml (deferred — implement only if 151h shows passive bus alone fell short)"

tests:
  - "(umbrella has no tests; each sub-phase tests its slice)"

done:
  - "Seven sub-phase specs (a-h, skipping e slot) land in .agentsmith/phases/planned/; p0151i parked as deferred."
  - "Sub-phases a-h implemented and merged."
  - "Smoke against api-security-scan Sample target: every AnalyzedFromSource observation has its `file` in the trace ReadSet; tool_calls > 0 for every skill round whose tool-policy returns a non-empty ToolSet."
  - "Smoke against fix-bug + security-scan: sample inspection of backend-developer-judge / security-reviewer-judge AnalyzedFromSource observations shows source-anchored discipline — proves pipeline-agnostic infrastructure (umbrella thesis holds)."
  - "grep -rn 'AppendLlmCall\\|AppendToolCall' src/AgentSmith.Application/Services/Loop/RetryCoordinator.cs returns Append* call sites (not just LoopTraceCollector instantiation)."
  - "Operator-visible cost-cap config documented in docs/configuration/."
