# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0162a
goal: |
  Fix the Slack/Teams cross-wiring bug exposed by code inspection on 2026-05-26.
  `SlackMessageDispatcher` injects singular `IPlatformAdapter` (line 21), so MS DI
  returns the LAST registration. In Program.cs:57-58 `AddSlackAdapter().AddTeamsAdapter()`
  runs in that order — so the dispatcher always calls TeamsApiClient, even when the
  inbound message is from Slack. `TeamsInteractionHandler` (line 20) has the same
  defect via the same DI singleton.

  Same phase also fixes the silent-fail mode: both adapters register unconditionally
  even when their credentials env-vars are empty. First chat call → 401 from a wrong
  endpoint with no startup signal.

requires: []

scope:
  in: |
    (1) Rename `SlackMessageDispatcher` → `ChatMessageDispatcher` (it is platform-agnostic;
        the Slack prefix is a naming smell from p0058).

    (2) `ChatMessageDispatcher` ctor takes `IEnumerable<IPlatformAdapter>` + builds a
        Dictionary<string,IPlatformAdapter> keyed by Platform (same pattern as
        BusMessageRouter). Dispatch sites accept a `platform` string parameter.

    (3) Two call sites updated:
        - SlackEventEndpointHandler passes "slack"
        - TeamsEndpoints passes "teams"
        - SlackInteractionHandler / TeamsInteractionHandler resolve their adapter
          by platform key (no singular `IPlatformAdapter` left in Server).

    (4) `AddSlackAdapter` / `AddTeamsAdapter` extension methods become conditional:
        return early (no registration) when the required env vars are empty. Each
        logs ONE WARN line at startup naming the missing vars. Program.cs always
        calls both — the methods decide.

    (5) Architecture test asserts no `IPlatformAdapter` parameter survives as a
        singular (non-IEnumerable) constructor parameter anywhere under
        src/AgentSmith.Server/.

  out: |
    End-to-end Slack/Teams smoke test — separate slice [[p0162b]].
    Removing the old `SlackMessageDispatcher` type name from logs/tests — covered
    by p0162b's smoke verification pass.

decisions:
  - key: |
      Rename to `ChatMessageDispatcher` not `MessageDispatcher` — Reason: avoid
      collision with `SlackMessageDispatcher` references in 5 existing files;
      "Chat" is the established domain term (ChatAdaptersExtensions, IPlatformAdapter
      doc-comment). alternatives: keep name (rejected: per [[feedback_no_wrapper_shims]]
      and the naming is actively misleading); `IntentDispatcher` (rejected: it does
      more than intent routing — error/clarification paths use `adapter` too).

  - key: |
      Conditional registration via early-return inside Add{Slack,Teams}Adapter,
      not via Program.cs feature flags — Reason: keeps Program.cs flag-free and
      lets future adapters (WhatsApp, Discord) follow the same self-gating pattern.
      The WARN log is the operator's signal. alternatives: Configuration.GetValue
      flags (rejected: another knob), throw on missing vars (rejected: breaks
      single-platform deployments where only one of two is configured).

  - key: |
      Architecture-test guards future regressions — Reason: this defect existed
      since p0058b (Nov 2025) and was only found by manual inspection 6 months
      later. A failing build is the only durable fix. alternatives: code-review
      checklist (rejected: humans miss it); runtime DI assertion (rejected:
      AddSingleton-overwrites pattern doesn't throw, it silently keeps the
      last-registered binding).

steps:
  - id: rename
    action: |
      Rename `SlackMessageDispatcher` to `ChatMessageDispatcher`. Move from
      Adapters/ to Services/ (cross-platform now). Update all 5 referring
      files via Edit (not search-and-replace — verify call site by call site).
    rename:
      - "src/AgentSmith.Server/Services/Adapters/SlackMessageDispatcher.cs → src/AgentSmith.Server/Services/ChatMessageDispatcher.cs"
    modify:
      - "src/AgentSmith.Server/Extensions/SlackEventEndpointHandler.cs"
      - "src/AgentSmith.Server/Extensions/TeamsEndpoints.cs"
      - "src/AgentSmith.Server/Services/Adapters/SlackInteractionHandler.cs"
      - "src/AgentSmith.Server/Services/Adapters/TeamsInteractionHandler.cs"
      - "src/AgentSmith.Server/Services/Handlers/IntentExtensions.cs"

  - id: dispatch-by-platform
    action: |
      `ChatMessageDispatcher` ctor takes `IEnumerable<IPlatformAdapter>`. Build
      a platform→adapter map at construction (same pattern as BusMessageRouter).
      Public dispatch methods gain `string platform` parameter. Error paths
      (SendErrorSafeAsync) resolve via the same map.
    modify:
      - "src/AgentSmith.Server/Services/ChatMessageDispatcher.cs"
      - "src/AgentSmith.Server/Services/Adapters/SlackInteractionHandler.cs (resolve by 'slack')"
      - "src/AgentSmith.Server/Services/Adapters/TeamsInteractionHandler.cs (resolve by 'teams')"

  - id: conditional-registration
    action: |
      AddSlackAdapter early-returns when SLACK_BOT_TOKEN or SLACK_SIGNING_SECRET
      is empty; logs WARN listing missing var. AddTeamsAdapter same for TEAMS_APP_ID
      / TEAMS_APP_PASSWORD / TEAMS_TENANT_ID. Both methods become callable but
      no-op on incomplete config.
    modify:
      - "src/AgentSmith.Server/Services/Adapters/ChatAdaptersExtensions.cs"

  - id: architecture-test
    action: |
      New architecture test asserts no Server-namespace type has a non-IEnumerable
      `IPlatformAdapter` parameter on any constructor.
    new:
      - "tests/AgentSmith.Tests/Architecture/PlatformAdapterCardinalityTests.cs"

tests:
  - "ChatMessageDispatcher_ResolvesSlackAdapterFromPlatformKey"
  - "ChatMessageDispatcher_ResolvesTeamsAdapterFromPlatformKey"
  - "ChatMessageDispatcher_UnknownPlatform_LogsWarningAndReturnsEarly"
  - "AddSlackAdapter_MissingBotToken_SkipsRegistrationAndLogsWarn"
  - "AddTeamsAdapter_MissingAppId_SkipsRegistrationAndLogsWarn"
  - "PlatformAdapterCardinality_NoSingularIPlatformAdapterCtorParameter"

done:
  - "ChatMessageDispatcher accepts IEnumerable<IPlatformAdapter> and dispatches by platform key."
  - "SlackInteractionHandler / TeamsInteractionHandler resolve their adapter by platform string."
  - "AddSlackAdapter / AddTeamsAdapter skip registration when ENV credentials are empty (WARN logged)."
  - "Architecture test green; no singular IPlatformAdapter parameter survives in Server/."
  - "Full main test suite green."
  - "ServerDiLifetimeTests green (DI tree resolves with both adapters missing)."
