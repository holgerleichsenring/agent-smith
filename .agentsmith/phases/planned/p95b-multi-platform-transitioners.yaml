# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p95b
goal: "Extend the claim-then-enqueue spine from GitHub-only (p95a) to all four platforms. Adds GitLab, AzDO, and Jira transitioners; adds ITicketProvider.ListByStatusAsync for the reconciler (p95c). Ends the platform branch in WebhookRequestProcessor — all structured webhooks go through the claim service."
requires: ["p95a"]

decisions:
  - key: "GitLab transitions use label add/remove via labels_events API. Optimistic concurrency via the event timestamp — if labels_events show a later modification than the snapshot we read, return PreconditionFailed."
  - key: "Azure DevOps transitions use PATCH /workitems/{id} with System.Tags add/remove and a `rev` check header (optimistic concurrency). 412 on rev mismatch → PreconditionFailed."
  - key: "Jira has two modes, decided once at startup per project and cached in JiraWorkflowCatalog: Native-mode if the workflow exposes pending/enqueued statuses as real transitions; Label-mode otherwise. Label-mode uses an additional SETNX lock scoped to the label PATCH (agentsmith:jira-label-lock:{ticketId}, 10s TTL) on top of the global claim-lock, because Jira label updates are not atomic."
  - key: "JiraWorkflowCatalog probes GET /rest/api/3/project/{key}/statuses at bootstrap. Failure to probe falls back to Label-mode with a warning log — no hard fail, webhooks must keep working."
  - key: "ITicketProvider gains ListByStatusAsync(TicketLifecycleStatus, ct). Default implementation returns empty — only providers that implement it (all 4 in this phase) participate in reconciliation. Keeps interface backward-compatible for test doubles."
  - key: "WebhookRequestProcessor's Cli-side branch collapses: all structured webhooks go through ClaimService. The legacy ExecuteStructuredAsync fire-and-forget code path is deleted."

steps:
  - id: list-by-status
    action: "ITicketProvider.ListByStatusAsync for the reconciler"
    modify:
      - "Contracts/Providers/ITicketProvider.cs: add `Task<IReadOnlyList<Ticket>> ListByStatusAsync(TicketLifecycleStatus status, CancellationToken ct) => empty-default`."
      - "GitHubTicketProvider, GitLabTicketProvider, AzureDevOpsTicketProvider, JiraTicketProvider: implement the method using each platform's label/tag search API."

  - id: gitlab-transitioner
    action: "GitLabTicketStatusTransitioner"
    new:
      - "Infrastructure/Services/Providers/Tickets/GitLabTicketStatusTransitioner.cs: label PUT via /projects/{id}/issues/{iid}, concurrency via labels_events snapshot timestamp. <120 lines."

  - id: azuredevops-transitioner
    action: "AzureDevOpsTicketStatusTransitioner"
    new:
      - "Infrastructure/Services/Providers/Tickets/AzureDevOpsTicketStatusTransitioner.cs: JSON PATCH on /workitems/{id} with /fields/System.Tags add+remove + If-Match rev header. <120 lines."

  - id: jira-transitioner
    action: "JiraTicketStatusTransitioner with native/label catalog"
    new:
      - "Infrastructure/Services/Providers/Tickets/JiraTicketStatusTransitioner.cs: delegates to JiraWorkflowCatalog.GetModeForProject; native mode POSTs /transitions; label mode PATCHes fields.labels under an extra SETNX lock. <120 lines."
      - "Infrastructure/Services/Providers/Tickets/JiraWorkflowCatalog.cs: startup probe of /project/{key}/statuses, caches (projectKey → Native | Label). ProbeAsync wired into the Cli --server startup. <120 lines."

  - id: factory-wiring
    action: "TicketStatusTransitionerFactory switches on all 4 types"
    modify:
      - "Infrastructure/Services/Providers/Tickets/TicketStatusTransitionerFactory.cs: replace the GitHub-only switch with full switch (AzureDevOps, GitLab, GitHub, Jira)."

  - id: webhook-collapse
    action: "Collapse platform branch in WebhookRequestProcessor"
    modify:
      - "WebhookRequestProcessor.cs: remove the 'if GitHub then ClaimService else legacy' branch — all structured results go through ClaimService."
      - "WebhookRequestProcessor.cs: delete the now-unused ExecuteStructuredAsync method."

  - id: verify
    action: "dotnet build && dotnet test — 0 new warnings, all tests green"

tests:
  - "GitLabTicketStatusTransitioner_HappyPath_ReturnsSucceeded"
  - "GitLabTicketStatusTransitioner_LabelEventNewerThanSnapshot_ReturnsPreconditionFailed"
  - "AzureDevOpsTicketStatusTransitioner_HappyPath_ReturnsSucceeded"
  - "AzureDevOpsTicketStatusTransitioner_RevMismatch_ReturnsPreconditionFailed"
  - "JiraTicketStatusTransitioner_NativeMode_UsesTransitionsApi"
  - "JiraTicketStatusTransitioner_LabelMode_UsesBothClaimLockAndLabelLock"
  - "JiraWorkflowCatalog_NativeStatusesPresent_SelectsNativeMode"
  - "JiraWorkflowCatalog_NativeStatusesAbsent_SelectsLabelMode"
  - "JiraWorkflowCatalog_ProbeFails_FallsBackToLabelModeWithWarning"
  - "ITicketProvider_ListByStatusAsync_PerPlatform_ReturnsMatchingTickets (one case per platform)"
  - "WebhookRequestProcessor_NonGitHub_NowGoesThroughClaimService"
  - "WebhookRequestProcessor_LegacyMethodRemoved (compilation test implicit)"

done:
  - "All four platforms have ITicketStatusTransitioner with atomic transitions."
  - "JiraWorkflowCatalog probes at startup; webhooks survive probe failures."
  - "ITicketProvider.ListByStatusAsync is implemented on all 4 platforms (required by p95c reconciler)."
  - "WebhookRequestProcessor has a single path: structured webhook → ClaimService. Legacy fire-and-forget is gone."
  - "dotnet build 0 warnings, all tests green."
