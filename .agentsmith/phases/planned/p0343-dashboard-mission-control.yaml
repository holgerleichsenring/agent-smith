# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0343
goal: "Dashboard home becomes a state-ranked mission control for tickets-worked-as-jobs — Needs-you first (answer inline, the run resumes without leaving the list), then Running / Queued / Finished — built on the SHIPPING agent-smith skin (repo-root DESIGN.md), establishing the shell + section vocabulary p0344/p0345 reuse"

applies_to: dashboard

requires: []  # consumes existing types: expectations/ratification (acceptance), PendingQuestion (dialogue), RunFootprint (capacity). NOTE: the p0341 progress ledger is backend-only today — no client type/component yet (greenfield here)

decisions:
  - key: "ADOPT the existing shipping identity — the repo-root DESIGN.md is the visual contract (warm-cream canvas #fffefb, coffee-ink #201515, Smith-green #22c55e as BOTH the CTA and the success/proven signal, Inter + IBM Plex Mono for code, 12px radius, card-terminal-panel). This redesign is STRUCTURE, not a re-skin — the contribution is state-ranking / story / content-mode differentiation / honest states, all skin-independent. Any NEW token goes through DESIGN.md frontmatter -> `pnpm gen:tokens` (writes src/dashboard/src/styles/tokens.json) mirrored into globals.css @theme — never hand-edit tokens.json. Operator surface stays LIGHT-ONLY (no data-theme mechanism); only card-terminal-panel is dark. Green stays disciplined: reserved for CTA + proven/merged, never scattered decoratively."
  - key: "Four content modes (metric field-blocks / operational rows / reading two-col / form FK-pickers) — every surface names its mode; a block whose header would just repeat the nav label gets a slim uppercase-Inter eyebrow rule, not another card"
  - key: "State-ranked layout: what needs the operator leads. Needs-you rows expand INLINE with quick-reply options + free text and resume the run from the list — zero-navigation answering is the core UX promise"
  - key: "Answering wires to the existing durable-dialogue endpoints (p0327) — no new channel; plan approvals are the same surface as questions"
  - key: "Each Running row carries a mini story-spine (5 dots = ticket/plan/build/verify/outcome) — the fleet is readable without opening a run"
  - key: "Queued rows show the p0336 admission reason (needs N pods · M free at ~T · position) — capacity waits are explained, never silent"
  - key: "App shell (left nav, Runs|Configuration tabs, tracker-inflow status) is built here once and reused by p0344/p0345"

steps:
  - id: design-system
    action: "Reuse the existing token pipeline + shell; add only what the redesign needs. Any new token lands in repo-root DESIGN.md frontmatter, regenerated via gen:tokens + mirrored into globals.css @theme (no hand-edited tokens.json, no new theming)"
    modify:
      - "src/components/shell/AppRail.tsx: add the Runs|Configuration tab group + the monitor sub-sections (Needs-you/Running/Queued/Finished counts) + tracker-inflow status"
      - "repo-root DESIGN.md frontmatter: add any missing status/semantic tokens the mission control needs (amber-working, rose-failed washes) if not already expressible from primary/ink"
  - id: runs-sections
    action: "Replace the flat runs table with the four state-ranked sections (operational-row mode) + metric strip (needs-you / running / queued / finished / capacity / cost-today)"
    new:
      - "RunsMissionControl page: NeedsYouSection, RunningSection (spine rows), QueuedSection (admission reason), FinishedSection (honest outcomes incl. stopped + draft PR)"
      - "StorySpine: 5-dot beat indicator"
  - id: inline-answer
    action: "Needs-you rows expand inline: agent questions with quick-reply options + free-text context; submit answers via the dialogue API and resume the run"
    new:
      - "InlineAnswerPanel: renders open questions, posts answers, optimistic resume state"
  - id: live-updates
    action: "Sections update live (poll or existing SSE) — inflow pill shows last ticket pickup; counts in nav stay current"

tests:
  - "MissionControl_SectionsOrdered_NeedsYouFirst"
  - "NeedsYouRow_AnswerSubmitted_RunResumesWithoutNavigation"
  - "RunningRow_Spine_ReflectsBeatFromRunState"
  - "QueuedRow_ShowsAdmissionReasonFromCapacityFootprint"
  - "NewTokens_GeneratedFromDesignMd_MatchGlobalsTheme"

done:
  - "Dashboard home (app/page.tsx) shows the four state-ranked sections with the metric strip; the old RunsList/RunRow flat table is gone"
  - "An open question is answerable inline and the run resumes — verified end-to-end against a fixture run (via the existing PendingQuestion + dialogue path)"
  - "Uses the shipping agent-smith skin (repo-root DESIGN.md); any new token flows through gen:tokens (tokens.json not hand-edited); shell (AppRail) extended, reused-ready for p0344/p0345"
  - "Operator surface stays light-only; dashboard build (incl. gen:tokens) + vitest suite green"
