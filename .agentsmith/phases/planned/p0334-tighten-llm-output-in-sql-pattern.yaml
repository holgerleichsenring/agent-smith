# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0334
goal: "Tighten the over-broad ai-security 'llm-output-in-sql' pattern (agent-smith-skills repo): it fired as CRITICAL on a hand-written MediatR handler and a generated API client with no SQL and no LLM output — pure keyword coincidence"

applies_to: skills-repo (agent-smith-skills, patterns/ai-security.yaml)

