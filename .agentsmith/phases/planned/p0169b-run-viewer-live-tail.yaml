# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0169b
goal: |
  Add live tailing to the Job-Viewer UI (p0169a): in-progress jobs show
  streaming progress + sandbox stdout + skill observations as they
  happen, without refreshing the page. Closes the "watch the agent work"
  experience gap that Devin 2.2 + Windsurf 2.0 Agent Command Center
  turned into a 2026 expectation.

  Deliberately AFTER p0169a's static viewer is demo-stable. Live streams
  can break mid-demo in ways static rendering cannot. First customer
  demo runs against pre-recorded jobs; live-trigger is the second-demo
  move once the static path has run reliably ten times.

  Reuses the same Redis pub/sub channel BusMessageRouter (for chat) and
  McpBusSubscriber (p0166c, for MCP clients) already consume — so the
  in-process subscriber pattern is established.

requires: ["p0169a", "p0166c"]

scope:
  in: |
    (1) GET /ui/jobs/<id>/stream → SSE endpoint streaming the same
        bus messages as p0166c's /mcp/events but formatted for the UI
        renderer (HTML-fragment events, not JSON-RPC notifications).

    (2) Job-detail page (from p0169a) detects "in-progress" status
        (result.md frontmatter status field not in done/failed),
        opens an EventSource via vanilla JS (no framework), appends
        formatted fragments to a live-log panel + updates the progress
        bar.

    (3) Event types rendered:
        - progress → updates progress bar + commandName subtitle
        - tool_call → adds line item with tool name + truncated args
        - skill_observation → adds collapsible block with severity badge
        - done → flips status badge to done, freezes log, shows PR link
        - error → flips status badge to error, shows diagnostic

    (4) Reconnect on disconnect (EventSource native retry) +
        backoff cap (10s) + visible reconnect indicator.

    (5) Completed runs (status in done/failed at page load) skip the
        SSE connection — they're static. Re-loaded if operator clicks
        a "replay" button which streams from a buffered backlog (last
        N events kept in the Redis channel for 5 min).

    (6) Detail page now also shows the existing JSON artifacts
        (cost-summary.json, tool-call-trail.json) as collapsible
        sections (raw view, not visualized yet — that's p0169c).

  out: |
    Tool-call trail tree visualization — slice [[p0169c]].
    Screen recording — optional [[p0169d]].
    Multi-run dashboard / status overview. Out — list-page is plain.
    Two-way interaction from UI (clicking "answer" on an approval).
    Out — dialogue answers route through chat / MCP, not the UI.
    Read-only is the contract for this slice.

decisions:
  - key: |
      Vanilla EventSource, no JS framework — Reason: matches the
      p0169a no-SPA decision. Adds ~50 lines of JS for the subscribe
      + DOM-append loop. alternatives: HTMX (rejected: dep weight
      for one feature); React (rejected: same).

  - key: |
      Server-side HTML-fragment events vs JSON-event-then-client-render —
      Reason: server already has the formatting code (Markdig +
      progress-card renderers from p0169a); emitting fragments keeps
      logic on the server. JS just appends. alternatives: JSON-then-
      JS-render (rejected: duplicate renderers).

  - key: |
      Replay button reads buffered backlog, not from disk — Reason:
      the bus messages have shapes the renderer understands; disk
      artifacts (tool-call-trail.json) require an extra mapping step.
      A 5-min Redis TTL on bus messages covers the typical "I just
      missed the run" case. Operators who want full replay use the
      static view. alternatives: full disk replay (rejected: extra
      mapping for a power-user feature).

steps:
  - id: sse-endpoint
    action: |
      UiStreamEndpoint maps GET /ui/jobs/{id}/stream. Subscribes to
      Redis bus channel; renders fragments via existing renderers.
    new:
      - "src/AgentSmith.Server/Ui/Streaming/UiStreamEndpoint.cs"
      - "src/AgentSmith.Server/Ui/Streaming/UiBusFragmentRenderer.cs"

  - id: job-detail-js
    action: |
      Page-level JS in Jobs/Detail.cshtml. EventSource + DOM-append +
      reconnect indicator + replay button.
    modify:
      - "src/AgentSmith.Server/Ui/Pages/Jobs/Detail.cshtml"
      - "src/AgentSmith.Server/Ui/Pages/Jobs/Detail.cshtml.cs"
    new:
      - "src/AgentSmith.Server/wwwroot/js/job-detail-live.js"

  - id: status-detect
    action: |
      RunStatusReader (separate concern from RunDirectoryBrowser)
      parses result.md frontmatter status field; emits an enum
      (Running / Done / Failed / Unknown).
    new:
      - "src/AgentSmith.Server/Ui/Services/RunStatusReader.cs"

  - id: artifacts-section
    action: |
      Run-detail page renders cost-summary + tool-call-trail JSON in
      collapsible <details> sections (browser-native, no JS needed).
    modify:
      - "src/AgentSmith.Server/Ui/Pages/Jobs/Detail.cshtml"

  - id: ttl-on-bus
    action: |
      Verify (and document inline) the 5-min TTL on the per-run
      Redis bus channel. Set if missing.
    modify:
      - "src/AgentSmith.Infrastructure/Services/Bus/RedisMessageBus.cs"

  - id: tests
    action: |
      Integration tests via WebApplicationFactory + Redis emulator
      (existing testcontainer pattern). Cover: SSE event sequence,
      reconnect after server-side disconnect, completed-run path
      skips stream.
    new:
      - "tests/AgentSmith.Tests/Ui/Streaming/UiStreamEndpointTests.cs"
      - "tests/AgentSmith.Tests/Ui/Services/RunStatusReaderTests.cs"

tests:
  - "UiStream_PublishedProgressMessage_EmittedAsProgressFragment"
  - "UiStream_PublishedDoneMessage_EmittedAsDoneFragmentWithPrUrl"
  - "UiStream_ConnectionClose_UnsubscribesAndCleansUp"
  - "RunStatusReader_ResultMdWithStatusRunning_ReturnsRunningEnum"
  - "JobDetail_CompletedRun_NoSseConnectionRequested"
  - "RedisBusChannel_TtlSetToFiveMinutes"

done:
  - "GET /ui/jobs/<id>/stream streams HTML fragments per bus message."
  - "Run-detail page live-updates for in-progress runs; static for completed."
  - "Reconnect-on-disconnect indicator works (verified manually)."
  - "Replay button works for runs within the 5-min backlog window."
  - "Smoke: trigger a fix-bug run, open the run page in a browser; watch progress bar advance + observations appear without page refresh."
