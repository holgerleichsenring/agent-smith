# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0147e
goal: "PipelineExecutor is 503 lines and owns: command-step iteration, per-step
  exception handling, sandbox lifecycle wiring, cost tracking, lifecycle
  marking, progress reporting, dynamic-command-insertion (Triage / phase
  advance). Six responsibilities in one class — Single Responsibility
  violated six ways. Decompose into IPipelineStepRunner +
  IPipelineErrorHandler + IPipelineSandboxCoordinator, with PipelineExecutor
  shrinking to a thin orchestrator that wires the pieces together."

requires: []

scope:
  in: |
    (1) IPipelineStepRunner. One responsibility: execute a single named
        command via CommandExecutor + emit progress events. Inputs: command
        name, PipelineContext, CancellationToken. Output: CommandResult.

    (2) IPipelineErrorHandler. One responsibility: classify exceptions
        thrown during step execution, decide continue/abort, emit the right
        lifecycle marker. The decisions:199 "per-command exception handling"
        decision lives here.

    (3) IPipelineSandboxCoordinator. One responsibility: lazy sandbox boot
        + dispose. Today's inline ISandbox setup + tear-down inside the
        executor's main loop.

    (4) Dynamic-command-insertion (TriageCommand returning follow-up
        commands via CommandResult.OkAndContinueWith) — keep this in
        PipelineExecutor since it's the orchestrator's loop variable.

    (5) PipelineExecutor.ExecuteAsync target: ≤80 lines. Builds the
        execution context, walks the (possibly extended) command list,
        delegates each step to IPipelineStepRunner, hands exceptions to
        IPipelineErrorHandler, asks IPipelineSandboxCoordinator for
        sandbox setup on first sandbox-requiring step.

  out: |
    Pipeline preset definitions (PipelinePresets.cs). Separate concern.

    Cost tracking deep-internals (PipelineCostTracker). Stays as-is; the
    executor just sets up cost-tracking lifecycle, not the math.

    PipelineLifecycleCoordinator. Stays as-is; the executor calls into it.

decisions:
  - key: |
      Three sub-services, not five. Reason: progress reporting is a one-line
      pass-through to IProgressReporter; lifecycle marking is one line to
      IPipelineLifecycleCoordinator. Those don't need their own service
      layer. The three I'm extracting (step-runner / error-handler /
      sandbox-coordinator) each have non-trivial logic worth isolating.
  - key: |
      Keep dynamic-command-insertion in the executor. Reason: the
      mid-loop list extension is part of the iteration logic itself; moving
      it out would either require call-back hell or a custom iterator.
      The executor's job IS to walk the command list, so it owns the list
      mutability.
  - key: |
      Migrate via parallel-class technique: write the new shape as
      PipelineExecutorV2 alongside the existing one, swap DI once tests
      pass, delete the old. Reason: 503-line files are the kind of risky
      refactor where mid-flight bugs are hard to spot in a diff;
      parallel-class makes the diff side-by-side. -- alternatives: in-place
      refactor (rejected: too easy to lose a corner case in one giant diff).

steps:
  - id: contracts-and-services
    action: "Add the three interfaces in Contracts + their implementations."
    new:
      - "src/AgentSmith.Contracts/Services/IPipelineStepRunner.cs"
      - "src/AgentSmith.Contracts/Services/IPipelineErrorHandler.cs"
      - "src/AgentSmith.Contracts/Services/IPipelineSandboxCoordinator.cs"
      - "src/AgentSmith.Application/Services/PipelineStepRunner.cs"
      - "src/AgentSmith.Application/Services/PipelineErrorHandler.cs"
      - "src/AgentSmith.Application/Services/PipelineSandboxCoordinator.cs"

  - id: parallel-executor
    action: "Write PipelineExecutor's replacement (call it the new shape; rename old to PipelineExecutorLegacy for the duration). Both registered behind a feature flag; default = new shape. After 1-2 release cycles with no regressions, delete the legacy."
    new:
      - "src/AgentSmith.Application/Services/PipelineExecutor.cs (rewritten)"
    delete:
      - "src/AgentSmith.Application/Services/PipelineExecutorLegacy.cs (after stabilisation)"

  - id: ci-coverage
    action: "Each new service has its own test pack: step-runner exception isolation, error-handler classification, sandbox-coordinator lazy boot."

tests:
  - "Full pipeline test suite runs against both legacy and new executor (Theory parametrisation), asserts identical outcomes per preset."
  - "Step-runner test: command throws → result is CommandResult.Fail with stack info, next step still runs."
  - "Error-handler test: each known exception type → correct lifecycle mark."
  - "Sandbox-coordinator test: sandbox boot deferred until first sandbox-requiring step; disposed exactly once."

done:
  - "PipelineExecutor.ExecuteAsync ≤80 lines."
  - "Three new services tested in isolation + via the executor's parametrised suite."
  - "Existing pipeline tests green on the new executor."
  - "Legacy executor deleted after one release cycle of co-existence (separate cleanup commit)."
