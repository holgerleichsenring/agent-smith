# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0132
goal: "Post-D7: migrate SkillRoundHandlerBase + FilterRoundHandler + VerifyRoundHandler to dispatch through SkillCallRuntime. PerSkillBreakdown lights up in production. Verifiers gain tool access (build/test verifiers can actually run commands). Closes the consumer-migration debt deferred since p0126c."

requires: ["p0126", "p0127c", "p0129c", "p0131"]

scope:
  in: "Three slices: (a) SkillRoundHandlerBase migration — the discussion-mode skill-call path (used by all coding pipelines except verify) routes through SkillCallRuntime instead of calling IChatClient directly. The base class becomes a thin orchestrator: builds the SkillCallRequest with phase + investigator_mode + output_schema from the resolved RoleSkillDefinition, hands it to ISkillCallRuntime.ExecuteAsync, translates the SkillCallResult back to CommandResult. The runtime owns: limit enforcement (LoopLimitsConfig), cost-tracking scope (BeginCall / EndCall populates PerSkillBreakdown), retry on failed_parse / failed_validation (RetryCoordinator), structured loop trace, outcome classification. ChatClientFactory's hardcoded 25 iteration default goes away — every call gets the resolved cap from ResolveToolCallCap. PerSkillBreakdown finally surfaces in production runs (was empty since p0126c). The Run-result presenter renders the breakdown table that's been waiting since p0128a's WriteRunResultHandler extension. (b) FilterRoundHandler + VerifyRoundHandler migration — same pattern: build SkillCallRequest, dispatch via runtime, translate result. FilterRoundHandler's batched LLM calls (p0124) each become a SkillCallRequest with batch context as part of the prompt parts; per-batch cost attributes correctly to the filter skill rather than rolling up unattributed. VerifyRoundHandler's per-verifier loop becomes a sequence of SkillCallRequests. (c) Verifier tool access — VerifyRoundHandler's SkillCallRequest gains a ToolSet (the existing ToolKit.GetToolsFor(SkillExecutionPhase.Verify, mode)). Build-verifier + test-verifier from p0129b can now invoke RunCommand to execute the actual build/test (closing the deferred-execution gap) instead of LLM-only static analysis. Architecture-verifier + scope-verifier ignore the tool-set as before (their bodies don't use bash). The existing Test command in the FixBug preset becomes redundant for the verifier-runs-build case but stays for now; deletion is a follow-up if operators confirm verifiers replace it cleanly."
  out: "Removal of the post-verify Test command in FixBug preset — keep both during the rollout window so verifier failures + downstream Test failures are independently observable. Migration of AgenticExecuteHandler (the implementer's agentic loop) to SkillCallRuntime — that loop has its own SandboxToolHost wiring + iteration semantics that don't fit the runtime's chat-then-result shape; AgenticExecute stays on its current path. Wildcard removal from PermissivePhaseDataFlow + per-preset edge tightening — separate p0133-or-similar phase. Provider-specific SkillCallRuntime tuning (e.g. different limits for Anthropic vs OpenAI) — out of scope; the runtime sees a single LoopLimitsConfig regardless of provider. Replay-from-persisted-trace — the LoopTraceCollector's structured log goes to ILogger, not yet to a persisted artifact under .agentsmith/runs/<run-id>/traces/."

decisions:
  - key: "Three slices by handler-family, not by capability. Reason: SkillRoundHandlerBase descendants share a base class — migrating them all in one slice keeps that refactor coherent. FilterRoundHandler + VerifyRoundHandler are structurally similar but distinct from SkillRoundHandlerBase (filter loops batches; verify loops verifiers); same-shape migration. Verifier tool-access in (c) is a capability-add that depends on (b) landing — needs VerifyRoundHandler already on the runtime to plug ToolSet into the SkillCallRequest. -- alternatives: slice by capability (rejected: would split SkillRoundHandlerBase across multiple phases); one big migration (rejected: too much surface area for one PR; risk of mixed-cause regressions)."
  - key: "AgenticExecuteHandler (implementer) stays off SkillCallRuntime. Reason: AgenticExecute already has its own agentic-loop wiring with FunctionInvokingChatClient + SandboxToolHost passing all 7 tools; iteration cap is the existing 25; cost tracks via the existing PipelineCostTracker.Track(response). Migrating it to SkillCallRuntime would mean rebuilding the tool-host integration in the runtime's interface; the runtime is shaped for skill-round semantics (input → response → output validation), not for write-the-whole-implementation agentic loops. The two loops solve different problems; keeping them separate is correct. -- alternatives: unified runtime for all loops (rejected: forces a one-size shape on two semantically different loops); migrate AgenticExecute and feature-detect (rejected: extra branching in the runtime for one caller)."
  - key: "ChatClientFactory's literal 25 iteration default removed in slice (a). Reason: the optional `int? maxIterations = null` parameter shipped in p0126a as a transition shim. Post-(a), every caller goes through SkillCallRuntime which always passes a resolved cap. The literal becomes unreachable; a dead default is a maintenance hazard. -- alternatives: keep the default for safety (rejected: dead code rots; the runtime's cap resolution covers every caller); set to 0 / throw (rejected: same maintenance hazard, just louder)."
  - key: "Verifier tool-access in (c) lets verifiers actually run commands — closes the p0129b deferred infrastructure. Reason: build-verifier + test-verifier from p0129b ship as LLM-only static analysis (no tool access) because VerifyRoundHandler in p0129a didn't pass tools through. With (b) routing verify through the runtime + (c) attaching ToolKit.GetToolsFor(Verify), build-verifier's SKILL.md body can instruct the LLM to invoke RunCommand against the resolved BuildCommand from ProjectDetector, parse the output, emit observations. The static-analysis path stays valid as a fast pre-check — verifiers can do both depending on their body. -- alternatives: ship tool-access without runtime migration (rejected: would build a parallel tool-passing path for verifiers only, throwaway when migration eventually happens); skip tool-access entirely (rejected: keeps build/test verifiers permanently in static-analysis mode, which the operator-evidence will likely show is insufficient for the high-value cases)."
  - key: "PerSkillBreakdown surface stays as it is — Markdown section in result.md, no separate cost.json sidecar. Reason: p0128a wired WriteRunResultHandler to render PerSkillBreakdown when non-empty. Post-(a), it's non-empty for every run. Adding a structured cost.json artifact is a separate observability concern; the Markdown rendering covers operator-readable use cases. -- alternatives: add cost.json sidecar (deferred: only worthwhile when CI integrations need machine-parseable cost data)."

steps:
  - id: slice-a-pointer
    action: "p0132a — SkillRoundHandlerBase consumer migration"
    new:
      - "Spec: written when the user requests implementation. Sketch: SkillRoundHandlerBase.ExecuteRoundAsync rebuilt as runtime.ExecuteAsync(BuildSkillCallRequest(...)); SkillCallResult → CommandResult translator; ChatClientFactory.Create literal-25 default removed; WriteRunResultHandler PerSkillBreakdown rendering verified end-to-end; ~25 test-pack adjustments (existing handler tests now run through stub-runtime instead of stub-chat)."

  - id: slice-b-pointer
    action: "p0132b — FilterRoundHandler + VerifyRoundHandler migration"
    new:
      - "Spec: written when p0132a lands. Sketch: FilterRoundHandler's per-batch loop becomes per-batch runtime.ExecuteAsync; VerifyRoundHandler's per-verifier loop similarly; existing batched-filter + verify-flow tests adapt to runtime stubs. Cost-attribution per-batch and per-verifier lights up in PerSkillBreakdown."

  - id: slice-c-pointer
    action: "p0132c — Verifier tool access"
    new:
      - "Spec: written when p0132b lands. Sketch: VerifyRoundHandler's SkillCallRequest gains ToolSet from ToolKit.GetToolsFor(Verify, mode); build-verifier + test-verifier SKILL.md bodies updated (agent-smith-skills 2.x → next minor) to instruct LLM to invoke RunCommand for actual build/test execution; the existing Test command in FixBug preset stays during rollout window (deletion deferred); ProjectBuildCommandResolver finally has a consumer + lands here."

tests:
  - "See per-slice specs"

done:
  - "p0132a + b + c all land"
  - "SkillRoundHandlerBase descendants + FilterRoundHandler + VerifyRoundHandler all dispatch through SkillCallRuntime"
  - "PerSkillBreakdown is non-empty in every fix-bug / feature-implementation / security-scan / api-security-scan / mad-discussion run; renders in result.md per WriteRunResultHandler's existing wiring"
  - "ChatClientFactory.Create no longer carries the literal 25 iteration default; every call passes through ResolveToolCallCap"
  - "Build-verifier + test-verifier (post-c) actually run the project's build/tests via RunCommand and parse the output into observations"
  - "AgenticExecuteHandler stays on its current FunctionInvokingChatClient + SandboxToolHost path (intentional)"
  - "Existing test pack adapted to stub-runtime patterns; no regressions"
  - "Smoke run against agent-smith itself shows the per-skill cost breakdown in result.md and verifier-driven build/test output"
