# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0117
goal: "Finish what p0116 deferred: Docker sandbox backend (DockerSandboxFactory + DockerSandbox via Docker.DotNet), GenerateTestsHandler + GenerateDocsHandler sandbox migration, TRX result-file parsing in TestHandler, full CheckoutSourceHandler migration (drop hybrid server-side LibGit2Sharp clone, push branch via Step) AND drop LibGit2Sharp as a project dependency, GrepToolHandler migrated to a Step kind so the entire ToolExecutor goes through the sandbox, AnalyzeCodeCommand's agentic analyzer migrated to ISandbox so it reads files from /work in K8s and from the local checkout in CLI, legacy ToolExecutor fallback removal once every caller threads ISandbox, Helm chart updates for sandbox RBAC + securityContext, AND Redis-stream cleanup so per-pipeline event streams don't leak. p0116 landed the K8s + InProcess + Wire foundation under explicit Option-C scope reduction; p0117 closes the remaining sandbox-architecture gaps."

requires: ["p0116"]

scope:
  in: "DockerSandboxFactory + DockerSandbox in Server (Docker.DotNet, container spec mirroring K8s pod with shared volume + agent-loader+toolchain pair, force-remove on dispose). GenerateTestsHandler + GenerateDocsHandler pull ISandbox from PipelineContext (replace sandbox=null), drop server-side Process.Start. TestHandler parses TRX file from /work/test-results, returns structured pass/fail counts. CheckoutSourceHandler drops the hybrid mode: LibGit2Sharp removed, git clone is the only Step, branch + commit + push migrated to Step-based git invocations against /work, server-side filesystem is no longer touched for source. PersistWorkBranchHandler + CommitAndPRHandler migrated alongside (Repository.LocalPath becomes a sandbox-managed concept, not a server-pod path). LibGit2Sharp removed from the project graph entirely: GitHubSourceProvider / GitLabSourceProvider / AzureReposSourceProvider / LocalSourceProvider's clone path either delegated to the sandbox via a Step or trivialized; LibGit2Sharp PackageReference deleted from all csproj files. New StepKind.Grep added in Wire so the LLM grep tool also goes through the sandbox; GrepToolHandler migrated; SandboxToolHandler.GrepAsync replaces the server-side regex search; legacy GrepToolHandler deleted. AnalyzeCodeCommand sandbox migration: ProjectAnalyzer's IAgenticAnalyzer (today reads files from the Server-Pod's /tmp/agentsmith/.../<repo> via in-process tool handlers) routes its read_file / list_files / grep tool calls through ISandbox so the analyzer's view of the source matches the rest of the pipeline (K8s: /work in the sandbox pod; CLI: local path via InProcessSandbox). Without this, after CheckoutSourceHandler stops touching the Server-Pod's filesystem the analyzer would have nothing to read. ScoutAgent migration: ToolExecutor's legacy repositoryPath constructor branch deleted once ScoutAgent + ProjectAnalyzer both thread a sandbox. Auto-detect updated to consider /var/run/docker.sock as the trigger for DockerSandboxFactory between KUBERNETES_SERVICE_HOST and inprocess fallback. Helm chart at deploy/helm/agentsmith (new) including role.yaml with sandbox RBAC, securityContext template variables, sandbox image tag. Redis-stream cleanup: agent-side XADD with MAXLEN ~ to bound per-pipeline event-stream growth + Server-side DEL of all three sandbox keys (sandbox:{jobId}:in / :events / :results) on Sandbox.DisposeAsync so streams don't leak after pipeline completion. Tests: ~50 new (Docker mocks, TRX parser, CheckoutSource Step-only flow, Generate*Handler sandbox routing, ProjectAnalyzer sandbox path, ScoutAgent sandbox path, MAXLEN trimming + key DEL on dispose, grep step, source-provider clone-without-LibGit2Sharp)."
  out: "Sandbox pooling/reuse across pipelines. Pre-spawn parallel to FetchTicket. Mid-step cancellation beyond pod-delete-as-hammer. Multi-step parallelism. Heartbeat / mid-pipeline recovery. Operator-customizable nodeSelector/tolerations/imagePullSecrets — Helm overrides cover the common cases, full pod-spec passthrough is a separate phase."

decisions:
  - key: "Docker backend keeps API surface aligned with K8s. DockerSandboxFactory creates two containers sharing a named volume; agent-loader copies /agent into the volume, toolchain runs with command=['/shared/agent']. Use Docker.DotNet for the API surface (already a documented choice; rejected ProcessStart-shelling-out-to-docker-cli for the same reasons p0019a chose Docker.DotNet over docker run shell-outs)."
  - key: "TRX parsing uses the .NET-builtin XML reader against /work/test-results/*.trx. Pull <Counters passed=... failed=... /> + <UnitTestResult outcome=Failed> for the failure list. Surface as structured Counters in CommandResult.Detail; full per-test breakdown lands in TestResults context as JSON."
  - key: "CheckoutSourceHandler full migration removes the hybrid mode introduced as a V1 acknowledged-limitation in p0116. After p0117: Repository.LocalPath becomes a logical /work-relative concept. CommitAndPRHandler builds branch+commit+push as Step{Kind=Run, Command='git', Args=...} against the same sandbox. PersistWorkBranchHandler likewise. Backward compat: nothing — by p0117 every code path goes through the sandbox; no callers depend on a server-side checkout."
  - key: "LibGit2Sharp leaves the project graph in p0117 as a hard cut, not as a transitive-only dependency. Once CheckoutSourceHandler + CommitAndPRHandler + PersistWorkBranchHandler are pure-Step the only remaining LibGit2Sharp callers are the four ISourceProvider implementations (GitHub / GitLab / AzureRepos / Local), each of which today does an in-process clone returning a Repository{LocalPath}. Migration: each provider's CheckoutAsync returns a Repository carrying the URL + auth materials only; the clone itself happens inside the sandbox via the existing CheckoutSourceHandler git-clone Step. LocalSourceProvider trivializes to a no-op (the LLM works on /work directly; the local path is bind-mounted in InProcessSandbox / DockerSandbox, copied in via initContainer for KubernetesSandbox via a follow-up — for V1 LocalSourceProvider in K8s mode is documented as unsupported). LibGit2Sharp PackageReference deleted from AgentSmith.Infrastructure + AgentSmith.Application + transitive consumers; native libgit2 binaries no longer ship in the Server image (~9 MB image-size win). Decision rationale: keeping LibGit2Sharp around 'just in case the source-provider abstraction needs it' would be premature flexibility — every concrete caller already routes through the sandbox; the abstraction layer should drop the dep too."
  - key: "GrepToolHandler migrates to a Step kind, NOT kept as server-side as the prior draft of this spec proposed. Rationale: the LLM grep tool today does Directory.GetFiles + Regex against the server filesystem. After p0117 the server filesystem isn't where the source lives — /work is. Two options: (a) leak server-side filesystem semantics into the tool (broken: empty results because /work is in another container); (b) add StepKind.Grep with Path / Pattern / Glob / MaxMatches and let the agent use ripgrep (or System.IO + Regex when ripgrep is absent in the toolchain image). Option (b) keeps the abstraction clean. Wire: StepKind.Grep + Step gains optional Pattern (string?) + Glob (string?) + MaxMatches (int?, default 200). Agent-side: GrepStepHandler (parallel structure to FileStepHandler) shells out to `rg --json` if available, falls back to managed System.IO + Regex. SandboxToolHandler.GrepAsync builds the Step and parses the JSON output. Server-side GrepToolHandler deleted. Bounds: MaxMatches default 200 (matches the existing cap), result truncated with a Stderr StepEvent like ListFiles."
  - key: "ToolExecutor's legacy repositoryPath constructor branch goes away. After ScoutAgent migration the only constructor takes ISandbox + supporting deps. FileToolHandler + CommandRunner + GrepToolHandler all deleted; SandboxToolHandler is the only handler for the five tools (read_file / write_file / list_files / run_command / grep). GrepToolHandler is migrated rather than kept as a separate concern — see the StepKind.Grep decision."
  - key: "ScoutAgent migration. Today ScoutAgent constructs its own ToolExecutor with repository.LocalPath. Post-p0117: ScoutAgent receives ISandbox via constructor + uses sandbox-routed ToolExecutor. AgentExecutionContextFactory.TryRunScoutAsync passes through the sandbox parameter."
  - key: "ProjectAnalyzer (AnalyzeCodeCommand) sandbox migration. Principle from the operator: analysis must run where the code is — in K8s that's the sandbox pod's /work, in CLI that's the local InProcessSandbox temp dir. Today AnalyzeProjectHandler builds an AzureOpenAiAgenticAnalyzer (or OpenAi/Claude/Gemini variant) that exposes read_file / list_files / grep tools to the LLM via in-process ToolCallHandler implementations rooted at repository.LocalPath (the Server-Pod's /tmp/agentsmith/.../<repo> from the LibGit2Sharp clone). After p0117's checkout-source-pure-step removes that server-side checkout, those handlers would have nothing to read. The analyzer therefore needs the same ISandbox treatment as AgenticExecuteHandler: tool calls go through SandboxToolHandler, file paths resolve relative to /work, the LLM iterates against the same source view the actual change-implementation phase will see later. This also closes a subtle correctness bug already latent today: with the Server-Pod's checkout under /tmp and the AgenticExecuteHandler's ToolExecutor reading from the SAME path (when sandbox is null), analyzer + executor see the same files only by coincidence; in K8s + sandbox mode the analyzer reads server-side files while AgenticExecute reads sandbox /work — divergent views silently. Post-migration both phases share one source-of-truth path."
  - key: "DockerSandboxFactory auto-detect via /var/run/docker.sock existence. Slot in between KUBERNETES_SERVICE_HOST and inprocess: K8s > Docker.sock > InProcess. SANDBOX_TYPE=docker explicit override always wins. Operators on Docker Desktop / Linux dev machines automatically land on Docker without flags."
  - key: "Helm chart structure mirrors deploy/k8s/ flat-numbered YAMLs but as templates. role.yaml gets ${sandbox.rbac} block driven by values.yaml: enable: true (default) | false. securityContext template: {fsGroup: 1000, runAsUser: nullable}. agentsmith.image.tag controls server image; sandbox.agent.image.tag controls the carrier image; both default to chart appVersion. The helm/ directory is NEW — chart did not exist before p0117."
  - key: "Generate{Tests,Docs}Handler migration is mechanical. The handlers today call provider.ExecutePlanAsync(..., sandbox: null). Replace null with context.Pipeline.TryGet<ISandbox>(ContextKeys.Sandbox, ...). One-line change each + their tests' mock setups update to pass non-null sandboxes through. The mock signature is already 8-arg from p0116, so no test-mock plumbing changes needed."
  - key: "Redis-stream cleanup uses BOTH bounded XADD and disposal-time DEL — they solve different problems. (1) MAXLEN ~ N on every XADD bounds in-flight memory pressure when one step emits a very chatty subprocess (think `npm install` with 50k lines of output). The agent already has soft-batching and a Channel<T> buffer with DropOldest, but the Redis stream itself can still balloon during a single long step. MAXLEN ~ 10000 (approximate trimming, ~5% slack for Redis radix-tree efficiency) per stream caps that without slowing XADD measurably. (2) DEL on Sandbox.DisposeAsync removes all three keys (sandbox:{jobId}:in, :events, :results) so completed pipelines don't leave debris in Redis. Without DEL, even a working MAXLEN leaves up to 10k events × N pipelines × bytes-per-event sitting in Redis indefinitely. The DEL goes through SandboxRedisChannel.DisposeAsync (which today returns ValueTask.CompletedTask). Belt-and-suspenders: if the Server-Pod crashes mid-pipeline, the K8s OwnerReference deletes the Sandbox-Pod but the Redis keys would remain — a follow-up phase adds a SCAN-based reaper hosted-service that cleans up sandbox:* keys older than N hours, not in p0117 scope."

steps:
  - id: docker-sandbox
    action: "Implement DockerSandboxFactory + DockerSandbox in Server"
    new:
      - "src/AgentSmith.Server/Services/Sandbox/DockerSandboxFactory.cs: Docker.DotNet implementation. CreateAsync builds shared volume name agentsmith-sandbox-{jobId}, creates two containers, starts toolchain, returns DockerSandbox."
      - "src/AgentSmith.Server/Services/Sandbox/DockerSandbox.cs: ISandbox impl mirroring KubernetesSandbox shape with DockerClient. DisposeAsync removes both containers + volume."
      - "src/AgentSmith.Server/Services/Sandbox/DockerContainerSpecBuilder.cs: builds CreateContainerParameters for agent-loader + toolchain pair."
    modify:
      - "src/AgentSmith.Server/Extensions/SandboxServiceCollectionExtensions.cs: extend ResolveBackend to consider /var/run/docker.sock; add SandboxBackend.Docker case + RegisterDocker helper."
      - "src/AgentSmith.Server/AgentSmith.Server.csproj: add Docker.DotNet PackageReference."
    new_files_tests:
      - "tests/AgentSmith.Tests/Sandbox/DockerSandboxFactoryTests.cs: mocked DockerClient. Container spec correct (image / command / volumes / env). DisposeAsync removes containers + volume."
      - "tests/AgentSmith.Tests/Sandbox/SandboxBackendDetectionTests.cs (extend): docker.sock present → Docker; SANDBOX_TYPE=docker overrides everything."

  - id: generate-handlers-sandbox
    action: "GenerateTestsHandler + GenerateDocsHandler thread sandbox from context"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/GenerateTestsHandler.cs: replace sandbox: null with context.Pipeline.TryGet<ISandbox>(ContextKeys.Sandbox, out var sb) ? sb : null."
      - "src/AgentSmith.Application/Services/Handlers/GenerateDocsHandler.cs: same change."
    new_files_tests:
      - "tests/AgentSmith.Tests/Commands/GenerateTestsHandlerSandboxTests.cs: pipeline with non-null sandbox → provider receives sandbox; pipeline without sandbox → provider receives null."
      - "tests/AgentSmith.Tests/Commands/GenerateDocsHandlerSandboxTests.cs: same pattern."

  - id: trx-parsing
    action: "TestHandler parses TRX result files for structured pass/fail data"
    new:
      - "src/AgentSmith.Application/Services/Builders/TrxResultParser.cs: XML reader against /work/test-results/*.trx. Returns TrxSummary { TotalCount, PassedCount, FailedCount, IList<FailedTest> }."
    modify:
      - "src/AgentSmith.Application/Services/Handlers/TestHandler.cs: after RunInSandboxAsync, when test command was dotnet test --logger trx --results-directory /work/test-results, push a Step{Kind=ReadFile} for the latest TRX, parse via TrxResultParser, store TrxSummary in ContextKeys.TestResults instead of raw stdout."
    new_files_tests:
      - "tests/AgentSmith.Tests/Services/Builders/TrxResultParserTests.cs: known TRX fixture → correct counts; failure list extracted with class + method names."
      - "tests/AgentSmith.Tests/Commands/TestHandlerTrxTests.cs: sandbox returns ReadFile success → handler parses TRX → TestResults populated with structured summary."

  - id: checkout-source-pure-step
    action: "Drop CheckoutSourceHandler hybrid mode; git clone + branch + push are Steps, no LibGit2Sharp"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/CheckoutSourceHandler.cs: only push the git clone Step; remove LibGit2Sharp call. Return CommandResult with /work as the implicit working directory."
      - "src/AgentSmith.Application/Services/Handlers/CommitAndPRHandler.cs: branch + commit + push migrated to Steps. Construct git config / git add / git commit / git push as Step.Kind=Run."
      - "src/AgentSmith.Application/Services/Handlers/PersistWorkBranchHandler.cs: same migration. WIP commit + push via Steps."
      - "src/AgentSmith.Domain/Entities/Repository.cs: LocalPath becomes a relative-to-/work concept (or removed entirely if no caller still needs it as an absolute path)."
    new_files_tests:
      - "tests/AgentSmith.Tests/Handlers/CheckoutSourceHandlerStepOnlyTests.cs: mocked sandbox. ExecuteAsync pushes one Step with git clone; LibGit2Sharp not called (no source provider mock interactions)."
      - "tests/AgentSmith.Tests/Handlers/CommitAndPRHandlerSandboxTests.cs: branch + commit + push as Steps; no Process.Start; no LibGit2Sharp."

  - id: grep-step
    action: "Migrate grep tool to a Step kind so the entire ToolExecutor goes through the sandbox"
    new:
      - "src/AgentSmith.Sandbox.Wire/StepKind.cs: extend enum with Grep = 5. Step record gains optional Pattern (string?), Glob (string?), MaxMatches (int?). Step.Validate() new branch: Grep requires non-empty Pattern AND non-empty Path; MaxMatches defaults to 200 if null."
      - "src/AgentSmith.Sandbox.Wire/SizeLimits.cs: add GrepMaxMatches = 200 constant matching the existing GrepToolHandler cap."
      - "src/AgentSmith.Sandbox.Agent/Services/GrepStepHandler.cs: new handler. Tries `rg --json --max-count {MaxMatches} --glob {Glob} {Pattern} {Path}` first; falls back to managed System.IO.Directory.EnumerateFiles + Regex when ripgrep is absent (toolchain images without rg). Returns JSON array of {file, line, text} via Result.OutputContent. Truncates at MaxMatches, emits Stderr StepEvent on truncate (same shape as ListFiles)."
    modify:
      - "src/AgentSmith.Sandbox.Agent/Services/StepExecutor.cs: branch on Kind for Grep → GrepStepHandler.HandleAsync."
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/SandboxToolHandler.cs: add GrepAsync(input, ct) — builds Step{Kind=Grep, Path, Pattern, Glob, MaxMatches}, returns Result.OutputContent verbatim. Wire ExecuteAsync(\"grep\", ...) to GrepAsync when sandbox is set."
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/ToolExecutor.cs: when sandbox-mode is the only mode (after tool-executor-cleanup step), grep routes through SandboxToolHandler. The (now-deleted) repository-path mode no longer exists, so there's no legacy branch."
    delete:
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/GrepToolHandler.cs: superseded by SandboxToolHandler.GrepAsync + GrepStepHandler."
    new_files_tests:
      - "tests/AgentSmith.Sandbox.Agent.Tests/Services/GrepStepHandlerTests.cs: ripgrep available → JSON parsed correctly. Ripgrep absent → managed fallback returns equivalent results. MaxMatches respected; truncation event emitted. Pattern with special-regex characters escaped correctly. Empty results return [] not error."
      - "tests/AgentSmith.Sandbox.Agent.Tests/Models/StepValidateTests.cs (extend): Grep with empty Pattern → invalid; Grep with null Path → invalid; Grep with both → valid; MaxMatches null → defaults to 200."
      - "tests/AgentSmith.Tests/Services/SandboxToolHandlerGrepTests.cs: mocked ISandbox returns OutputContent JSON → SandboxToolHandler.GrepAsync formats it for the LLM correctly."

  - id: libgit2sharp-removal
    action: "Drop LibGit2Sharp from the project graph; ISourceProvider clones happen inside the sandbox"
    modify:
      - "src/AgentSmith.Infrastructure/Services/Providers/Source/GitHubSourceProvider.cs: CheckoutAsync no longer calls Repository.Clone. Returns Repository{Url, AuthMaterials, /work as logical path}. The actual git clone happens via CheckoutSourceHandler's Step (already in this phase under checkout-source-pure-step)."
      - "src/AgentSmith.Infrastructure/Services/Providers/Source/GitLabSourceProvider.cs: same migration."
      - "src/AgentSmith.Infrastructure/Services/Providers/Source/AzureReposSourceProvider.cs: same migration."
      - "src/AgentSmith.Infrastructure/Services/Providers/Source/LocalSourceProvider.cs: trivializes — local repo path becomes a property of the Sandbox bind-mount config, not a clone target. Document KubernetesSandbox + LocalSourceProvider as unsupported for V1 (LocalSourceProvider in-cluster needs an initContainer copy, deferred). InProcessSandbox + DockerSandbox bind-mount the local path into /work."
      - "src/AgentSmith.Domain/Entities/Repository.cs: drop the LibGit2Sharp.Repository wrapper. Becomes a record(Url, Branch?, AuthMaterials?, LocalPath = '/work')."
      - "src/AgentSmith.Infrastructure/AgentSmith.Infrastructure.csproj: remove LibGit2Sharp PackageReference."
      - "src/AgentSmith.Application/AgentSmith.Application.csproj: remove LibGit2Sharp PackageReference if present."
      - "src/AgentSmith.Server/AgentSmith.Server.csproj: remove LibGit2Sharp PackageReference if present."
      - "Any remaining `using LibGit2Sharp;` directives across the codebase: remove. Server image gets ~9 MB smaller (native libgit2 binary no longer shipped)."
    new_files_tests:
      - "tests/AgentSmith.Tests/Providers/Source/GitHubSourceProviderTests.cs (extend): CheckoutAsync returns Repository with no LibGit2Sharp interaction; no native-binary loading observable."
      - "tests/AgentSmith.Tests/Providers/Source/LocalSourceProviderTests.cs: InProcessSandbox bind-mount path resolves correctly; KubernetesSandbox + LocalSourceProvider combination throws NotSupportedException with a clear operator message."
      - "tests/AgentSmith.Tests/Integration/NoLibGit2SharpInGraphTests.cs: load AgentSmith.Server's runtime closure via reflection; assert no type from LibGit2Sharp namespace is present. Regression-guard against silent re-adding via transitive deps."

  - id: project-analyzer-sandbox
    action: "ProjectAnalyzer (AnalyzeCodeCommand) routes its agentic-analyzer tool calls through ISandbox"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/AnalyzeProjectHandler.cs: pull ISandbox from PipelineContext (ContextKeys.Sandbox); fail fast with a clear error if absent (analyzer cannot work without a code-bearing sandbox after p0117)."
      - "src/AgentSmith.Application/Services/ProjectAnalyzer.cs: takes ISandbox in its constructor (or per-call) and threads it down to the IToolCallHandler given to IAgenticAnalyzer.AnalyzeAsync."
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/Adapters/AnalyzerToolCallHandler.cs (or whichever IToolCallHandler the analyzer uses today): build read_file / list_files / grep tool implementations that delegate to SandboxToolHandler instead of repository.LocalPath. Same five-tool surface as the executor's SandboxToolHandler — single source-of-truth path. K8s: tools resolve to /work in the sandbox pod. CLI: tools resolve to InProcessSandbox's working dir. Server-Pod's local filesystem is no longer touched."
      - "src/AgentSmith.Infrastructure/Services/Factories/AgenticAnalyzerFactory.cs: thread ISandbox through to the analyzer instances when the consumer passes one; document fail-fast for sandbox-required analyzers."
    new_files_tests:
      - "tests/AgentSmith.Tests/Application/AnalyzeProjectHandlerSandboxTests.cs: mocked ISandbox; analyzer's read_file tool call routes through sandbox.RunStepAsync with Step.Kind=ReadFile and Path resolves under /work; absence of sandbox in pipeline context → handler returns Fail."
      - "tests/AgentSmith.Tests/Providers/Agent/AnalyzerToolCallHandlerSandboxTests.cs: each of the five tool surfaces (read_file / list_files / grep / etc.) builds the correct Step Kind and forwards Result.OutputContent verbatim to the LLM."

  - id: tool-executor-cleanup
    action: "Delete legacy fallback path now that every caller threads sandbox"
    modify:
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/ToolExecutor.cs: drop the (no-sandbox) constructor overload. Single constructor: ToolExecutor(ISandbox sandbox, ILogger, FileReadTracker?, IProgressReporter?, ...). All five tools (read_file / write_file / list_files / run_command / grep) route through SandboxToolHandler exclusively."
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/ScoutAgent.cs: takes ISandbox + uses SandboxToolHandler exclusively."
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/AgentExecutionContextFactory.cs: TryRunScoutAsync passes sandbox to ScoutAgent."
    delete:
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/FileToolHandler.cs: replaced by SandboxToolHandler."
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/CommandRunner.cs: replaced by SandboxToolHandler.RunCommandAsync. Move IsBlockedCommand into SandboxToolHandler as a static helper."

  - id: helm-chart
    action: "First Helm chart for the project"
    new:
      - "deploy/helm/agentsmith/Chart.yaml: appVersion = 0.x, name agentsmith."
      - "deploy/helm/agentsmith/values.yaml: image.tag, sandbox.agent.image.tag, sandbox.rbac.enabled, sandbox.securityContext.fsGroup, redis.url, ingress.host."
      - "deploy/helm/agentsmith/templates/serviceaccount.yaml + role.yaml + rolebinding.yaml: mirrors deploy/k8s/2-rbac.yaml; sandbox RBAC gated by values.sandbox.rbac.enabled."
      - "deploy/helm/agentsmith/templates/configmap.yaml + secret.yaml + service.yaml + deployment.yaml + ingress.yaml: parameterized versions of deploy/k8s/3-9."
      - "deploy/helm/agentsmith/README.md: chart usage, value reference, sandbox RBAC opt-out."

  - id: redis-stream-cleanup
    action: "Bounded XADD + key DEL on dispose so per-pipeline streams don't leak"
    new:
      - "src/AgentSmith.Sandbox.Wire/StreamLimits.cs: static class with EventStreamMaxLength = 10000 (approximate-trim target). Lives in Wire so both Agent (XADD writer) and Server (DEL caller) reference the same constant — bumping the limit is one source-edit + Wire version bump."
    modify:
      - "src/AgentSmith.Sandbox.Agent/Services/RedisEventChannel.cs: XADD via StreamAddAsync gains a MaxLength + UseApproximateMaxLength=true argument set to StreamLimits.EventStreamMaxLength. Existing pipeline-batch + retry behavior unchanged. Add a unit test asserting that a flooded stream stays bounded near the cap."
      - "src/AgentSmith.Server/Services/Sandbox/SandboxRedisChannel.cs: DisposeAsync (currently returns ValueTask.CompletedTask) issues KeyDeleteAsync for all three sandbox keys: RedisKeys.InputKey(_jobId), RedisKeys.EventsKey(_jobId), RedisKeys.ResultsKey(_jobId). Best-effort: catch + log Redis-side errors so dispose never throws and never blocks pipeline shutdown. The DEL fires AFTER the channel has stopped consuming so no in-flight callers hit a deleted stream."
      - "src/AgentSmith.Server/Services/Sandbox/KubernetesSandbox.cs + InProcessSandbox.cs: DisposeAsync ordering — channel.DisposeAsync (which now DELs the keys) runs AFTER the Shutdown step is pushed and the process / pod has exited gracefully. The InProcessSandbox path needs the same treatment for DI parity (it shares the same SandboxRedisChannel ownership model only when running with a Redis multiplexer; the pure-in-process path with no Redis is a no-op)."
    new_files_tests:
      - "tests/AgentSmith.Sandbox.Agent.Tests/Services/RedisEventChannelMaxLengthTests.cs (Testcontainers): emit 50k events through the batched XADD path; assert XLEN stays within ~5% of StreamLimits.EventStreamMaxLength."
      - "tests/AgentSmith.Tests/Sandbox/SandboxRedisChannelDisposeTests.cs (Testcontainers): seed all three keys; DisposeAsync; assert all three keys are gone via KeyExistsAsync. Negative case: Redis temporarily down on dispose — DisposeAsync logs and returns without throwing."

  - id: docs
    action: "Documentation for the deferred work"
    modify:
      - "docs/concepts/sandbox-architecture.md: drop the V1-limitations section; replace with operational notes."
      - "docs/configuration/sandbox.md (new): values.yaml reference, image-pinning, sandbox RBAC opt-out, securityContext customization."
      - "docs/mkdocs.yml: nav entry for sandbox configuration page."

done:
  - "DockerSandboxFactory + DockerSandbox in Server. /var/run/docker.sock auto-detect. Mocked-DockerClient tests cover spec construction + cleanup."
  - "GenerateTestsHandler + GenerateDocsHandler pull ISandbox from PipelineContext. Test mocks updated."
  - "TestHandler parses TRX into TrxSummary; TestResults context key holds structured data instead of raw stdout."
  - "CheckoutSourceHandler is pure-Step. CommitAndPRHandler + PersistWorkBranchHandler migrated. LibGit2Sharp no longer reached during a pipeline run (kept only as a transitive dep until the source-provider abstraction's checkout path also moves)."
  - "ProjectAnalyzer (AnalyzeCodeCommand) routes its agentic-analyzer tool calls through ISandbox — analyzer + executor share one source-of-truth path (K8s: /work in the sandbox pod; CLI: InProcessSandbox's working dir). Server-Pod's local filesystem no longer holds the source after p0117."
  - "ToolExecutor has a single sandbox-required constructor. FileToolHandler + CommandRunner + GrepToolHandler deleted; ScoutAgent + ProjectAnalyzer both use SandboxToolHandler. All five LLM tools (read_file / write_file / list_files / run_command / grep) route through Wire-typed Steps."
  - "StepKind.Grep added in Wire with bounded MaxMatches default. GrepStepHandler in the Agent uses ripgrep when available with managed System.IO + Regex fallback. Truncation event emitted on cap."
  - "LibGit2Sharp removed from every csproj in the project. No `using LibGit2Sharp;` left. ISourceProvider implementations return Repository records carrying URL + auth, not in-process clones. Server image ~9 MB smaller. Regression-guard test asserts no LibGit2Sharp type loaded into the runtime closure."
  - "Redis-stream cleanup: agent XADDs are bounded by StreamLimits.EventStreamMaxLength (10000, approximate). SandboxRedisChannel.DisposeAsync DELs all three sandbox keys; failures log-and-continue instead of throwing. Testcontainers-backed regression tests cover both the bound + the cleanup."
  - "Helm chart at deploy/helm/agentsmith with sandbox RBAC + securityContext template values. README documents opt-outs."
  - "Docs: sandbox-architecture.md V1-limitations replaced; new sandbox configuration page; mkdocs nav updated."
  - "Tests: ~50 new, all existing green. dotnet build zero warnings."
