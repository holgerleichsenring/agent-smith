# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0315a
goal: "Spec-dialog session: a persistent, per-thread design conversation with an active scope; multiple threads run in parallel and each resumes where it left off"

applies_to: server

requires: []

decisions:
  - "Reuse ConversationStateManager/Repository — add a SpecDialog mode + running transcript, not a second store; key by chat thread id so parallel design threads are naturally isolated"
  - "Active scope (project + repo set) is chosen at session start from the existing connection/project catalog; it scopes every downstream grounding + the eventual ticket's tracker"
  - "Entry via /spec (or a designated discuss-channel); a hard topic pivot inside a thread offers `/spec new` rather than mixing two phases in one transcript"

steps:
  - id: mode
    action: "Add ConversationMode.SpecDialog + Transcript (ordered user/assistant turns) + ActiveScope (project + repos) to ConversationState; manager opens/continues/closes/forks a spec-dialog thread keyed by thread id"
    modify:
      - "ConversationState: Mode + Transcript + ActiveScope"
      - "ConversationStateManager: open/continue/close/fork spec-dialog"
  - id: scope
    action: "Session start resolves ActiveScope from the connection/project catalog (explicit pick, or single-project default)"
  - id: intent
    action: "BusMessageRouter routes /spec + follow-ups in an open thread to the SpecDialog branch; normal chat + run-triggers untouched"
    modify:
      - "BusMessageRouter: SpecDialog branch"
  - id: commands
    action: "/spec list (open sessions), /spec resume <id>, /spec new; replies stream via IPlatformAdapter.SendInfoAsync, threaded"

tests:
  - "Router_SpecCommand_OpensScopedThread"
  - "Router_TwoThreads_KeepIndependentTranscripts"
  - "Router_ResumeThread_ContinuesWhereLeftOff"
  - "Router_NormalMessage_StillRoutesToRunTrigger"

done:
  - "Two parallel /spec threads keep separate transcripts + scopes and each resumes correctly; normal chat/run-triggers unchanged"
