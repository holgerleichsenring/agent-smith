# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0312
goal: "Retire the 7 legacy skill-taxonomy dirs (88 skills) from agent-smith-skills after migrating the last backend references — _masters + patterns/ + baselines/ remain"

applies_to: backend + skills-repo

requires: []

decisions:
  - "NOT a blind rm: backend still reads legacy dirs — ResolvedProject.SkillsPath defaults to skills/coding, skill-manager preset uses the skill-manager-* catalog, init-project bootstrap emits a SkillRound against skills/coding; migrate consumers first, delete second"
  - "baselines/ survives (api-headers.yaml is real scanner input); patterns/ survives (scanner patterns, not taxonomy); _index/ (empty) dies"
  - "Tarball content change = MAJOR version bump (4.0.0); consumers pin versions so nothing breaks unread"

steps:
  - id: consumer-audit
    action: "Enumerate every backend read of legacy skill paths/roles (SkillsPath default, skill-manager preset, init-project/bootstrap rounds, YamlSkillLoader catalog scan, MadDiscussion on-disk comment)"
  - id: migrate-skill-manager
    action: "skill-manager preset: collapse to a master (skill-manager-master in _masters) or retire the preset — decide with operator; no legacy-catalog SkillRound remains"
  - id: migrate-bootstrap
    action: "init-project/bootstrap: route through context-generator-master / project-analyzer-master instead of skills/coding rounds; drop the SkillsPath default or point it at _masters"
  - id: delete
    action: "agent-smith-skills: delete api-security/ autonomous/ coding/ legal/ mad/ security/ skill-manager/ _index/; keep concept-vocabulary.yaml only if still loaded (audit says); package.sh + README updated; release 4.0.0"
  - id: smoke
    action: "Full smoke (fix-bug, security-scan, api-scan, init-project, skill-manager-or-successor) against the 4.0.0 tarball"

tests:
  - "SkillCatalog_Load400Tarball_NoLegacyPathReads"
  - "InitProject_WithoutSkillsCodingDir_Bootstraps"
  - "SkillManagerSuccessor_RunsWithoutLegacyCatalog"

done:
  - "grep in backend finds zero references to the 7 legacy dirs"
  - "4.0.0 tarball ships only _masters + patterns + baselines (+vocabulary if audited as live)"
  - "All pipeline smokes green against 4.0.0"
