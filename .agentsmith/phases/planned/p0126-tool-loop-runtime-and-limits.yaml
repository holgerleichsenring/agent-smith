# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0126
goal: "Skill-call runtime that wraps M.E.AI's existing FunctionInvokingChatClient with hard limits, a five-state outcome, per-skill cost tracking, and read-scope enforcement. Skills can read code instead of guessing — the Bug-18693 class of failures stops here."

requires: ["p0124"]

scope:
  in: "(1) SkillCallRuntime wraps the existing FunctionInvokingChatClient (M.E.AI 10.4.0, pinned) with the new contract. The wrapper takes a SkillCallRequest (skill name, role, phase, prompt parts, tool-set, limits) and returns a SkillCallResult (outcome enum, output text, cost summary, loop trace). The underlying FunctionInvokingChatClient is unchanged — its internal tool-loop still drives the chat; the wrapper observes the loop and enforces limits around it. M.E.AI's `MaximumIterationsPerRequest` is the only hard stop on the loop; SkillCallRuntime sets it per-call from ResolveToolCallCap. ChatClientFactory.Create gains an optional iteration-cap parameter; SkillCallRuntime always passes its resolved value; legacy callers without the parameter keep the existing 25 default unchanged (no fallback constant added — the literal default stays inline). (2) Five-state outcome: SkillCallOutcome enum (`Ok | Incomplete | FailedParse | FailedValidation | FailedRuntime`). SkillCallResult carries the outcome plus context. CommandResult.IsSuccess is unchanged (Ok and Incomplete both map to true; the three Failed states map to false with a structured reason). Translation between SkillCallResult and CommandResult belongs to whoever calls SkillCallRuntime; in p0126 nobody does, so the translation lands in p0127 alongside the consumer migration. (3) Hard limits in agentsmith.yml under a new `limits:` section, bound to LoopLimitsConfig via the Options pattern. Defaults: max_tool_calls_per_skill=30, max_tool_calls_per_investigator=10, max_tool_calls_per_verifier=20, max_llm_calls_per_skill=15, max_input_tokens_per_skill_call=200000, max_output_tokens_per_skill_call=16000, max_seconds_per_skill_call=300, max_concurrent_skill_calls=10. The runtime resolves the right cap based on the SkillExecutionPhase + investigator-mode passed in the request. (4) SkillExecutionPhase enum (new) with the nine values from Phase A: `Plan, Review, Implementation, Verify, Discuss, Investigate, Filter, Synthesize, Bootstrap`. Used for tool-set selection, limit resolution, and downstream phase-aware logic. The existing PipelinePhase enum (Plan/Review/Final) is preserved — it's the triage-output grouping, not the per-skill phase. SkillExecutionPhase is finer-grained and lives next to the runtime. Mapping from existing handlers to SkillExecutionPhase values lands in p0127, not here. (5) Per-skill cost tracking: PipelineCostTracker grows a BeginCall(skillName, role, phase) / EndCall() API. Inside a Begin/End scope, the existing Track(ChatResponse) calls are attributed to the active call. The pipeline-total properties stay (TotalInputTokens, etc.); a new PerSkillBreakdown property exposes a list of CallCostRecords (skillName, role, phase, inputTokens, outputTokens, cacheTokens, toolCallCount, llmCallCount, durationMs). Run results emit the breakdown alongside the existing totals. (6) Read-scope enforcement: PathReadGuard wraps GitIgnoreResolver and validates every file path that flows into a path-aware tool (ReadFile, Grep, ListFiles). The guard rejects paths outside the working repo, paths matching .gitignore, and the .git directory itself. Violations return a structured tool error that goes back into the loop as a tool result — the LLM sees 'path X is outside scope' and adapts. SandboxToolHost gains the guard via constructor injection; the path-aware tools call guard.AssertReadable(path) before doing IO. WriteFile gets a stricter guard (PathWriteGuard) that today defers to the same logic plus additional Implementation-phase + freed-plan-files restrictions — Implementation/Bootstrap phase check is wired here; the freed-plan-files restriction lands in p0128 (D4) when Plan schema persistence exists. RunCommand is gated by SkillExecutionPhase: only Implementation and Verify phases see it in their tool-set; other phases get a tool-set without RunCommand. (7) Tool registry parameterized by phase: SandboxToolHost's existing GetAllTools() / GetScoutTools() pair is generalized to GetToolsFor(SkillExecutionPhase phase, InvestigatorMode? mode). The mapping is centralized in a new ToolKit class; the dispatch from the new SkillCallRuntime to the right tool-set is one line. Today's behavior preserved: any caller that doesn't pass a phase falls back to GetAllTools(). (8) Per-skill loop trace: the runtime captures a structured trace of the loop session — each LLM call (input-token-count, output-token-count, time, model) and each tool call (tool name, args summary, duration, success/failure) — and emits it as a structured log entry at INFO level on skill completion. The trace is a list of LoopTraceEntry records carried in SkillCallResult and logged via the existing ILogger surface. (9) Re-try logic: failed_parse triggers one re-try with the hint 'last output was not valid JSON'; failed_validation triggers one re-try with the concrete validation error. Re-try happens inside the runtime, transparent to callers. After the re-try, persistent failures escalate per Phase B (in solo phases: end pipeline; in parallel phases: skill-call recorded as failed in the run aggregate). The escalation path itself is wired in the calling handler — runtime returns the outcome, caller decides. (10) Concurrency cap: SemaphoreSlim at the pipeline level, sized from max_concurrent_skill_calls. The runtime acquires a permit before starting a skill call, releases on completion. Per-pipeline-run scoping (each run has its own semaphore instance) keeps cross-run contention out — provider rate-limits are an external concern."
  out: "No consumer migration. No handler in the codebase uses SkillCallRuntime when p0126 ships. SkillRoundHandlerBase descendants keep their current behavior unchanged; PipelineCostTracker.PerSkillBreakdown stays empty in production runs until p0127 wires the first consumer. The runtime is exercised by its test pack; that's the proof of correctness for this phase. No half-migration, no opt-in flag, no Phase property on SkillRoundHandlerBase, no run-result presenter changes. No replacement of FunctionInvokingChatClient or upgrade past M.E.AI 10.4.0 — the pin holds (Anthropic.SDK#197, Ollama 5.4.24 lockstep). Building a parallel tool-loop would mean rebuilding what M.E.AI already does; the value is in the wrapper. No skill-format migration — SKILL.md files keep their current frontmatter; per-phase tool-set application requires the new format with explicit role/phase, which lands in p0127 (D3). No Plan-restricted write enforcement — the rule 'WriteFile only on files in the freed plan' depends on Plan schema persistence, which is p0128 (D4). p0126 wires the Implementation/Bootstrap phase gate on WriteFile; the file-list restriction comes later. No Verify phase pipeline wiring — that's p0129 (D5). The runtime knows about Verify, the limits are configured for it, but no current pipeline routes to a Verify-phase skill call. No init-project pipeline — that's p0130 (D6). No new LogDecision / AskHuman tools — they stay as-is, available to all phases for now. Whether they survive D3 (skill format migration) or get replaced by the open_questions mechanism is a D3 decision. No provider-specific tool-call serialization fixes — the four chat-client builders (Claude, OpenAI/Azure-OpenAI, Gemini, Ollama) handle this today; the wrapper sits above them. Provider-specific bugs that the integration smoke surfaces (the p0119a → p0120 pattern) are filed as a follow-up phase, expected as p0126b — those bugs are not in p0126's scope."

decisions:
  - key: "Wrap M.E.AI's FunctionInvokingChatClient, do not replace it. Reason: M.E.AI 10.4.0 already provides a correct tool-using loop with per-provider serialization handled by the framework. Replacing it would mean rebuilding tool-call dispatch for four chat-client builders, with the version pin keeping us locked to M.E.AI's API surface anyway. The cap (`MaximumIterationsPerRequest = 25`) becomes a per-call value driven by configuration; the rest of the loop mechanics stay. The work is enforcement (limits, scope) and observability (cost, trace, outcome), not loop machinery."
  - key: "Five-state outcome is a new contract type, not a CommandResult variant. Reason: CommandResult is the Domain-level success/fail envelope used everywhere in the pipeline; widening it to carry skill-call-specific states would push runtime concepts into Domain. SkillCallResult lives in Application alongside the runtime, carries the outcome enum plus context, and the calling handler translates to CommandResult at the boundary. CommandResult.IsSuccess maps Ok+Incomplete to true (output is usable, possibly with a warning); the three Failed states map to false with a typed reason."
  - key: "SkillExecutionPhase is a new enum, not an extension of PipelinePhase. Reason: PipelinePhase (Plan/Review/Final) is the triage-output grouping — three coarse buckets that drive command expansion. The new model has nine phases that are skill-execution-context concepts. Conflating the two would force every triage decision to choose among nine values when only three are meaningful at that level. Two enums for two distinct concerns; the mapping is one-to-many (a triage Final phase contains skills running in Implementation, Investigate, Filter, or Synthesize execution-phase context)."
  - key: "Limits live in agentsmith.yml under a new `limits:` section, bound via Options pattern. Reason: agentsmith.yml is already the operator-facing config and already uses YamlDotNet binding for AgentSmithConfig. Adding a `limits:` section follows the existing convention. The Options pattern lets the runtime inject IOptions<LoopLimitsConfig> in DI without a global static. Limits are global defaults (per Phase B); per-project overrides explicitly out — the design choice is that projects that need different limits write a different pipeline, not tune the global runtime."
  - key: "Read-scope enforcement is a wrapper around the existing GitIgnoreResolver, not a new ignore engine. Reason: GitIgnoreResolver already loads .gitignore correctly via the Ignore NuGet package. Wrapping it in PathReadGuard adds the repo-boundary check (no paths outside the working repo) and the .git-directory exclusion. The two-layer split is intentional: GitIgnoreResolver answers `is this path .gitignored?`; PathReadGuard answers `is this path readable for a skill?`. The guard's contract — return a structured tool error that flows back into the loop — keeps the LLM informed instead of hard-failing the call."
  - key: "RunCommand (bash) is phase-gated, not skill-gated. Reason: Phase B says bash is for Implementation and Verify only. The runtime applies this at tool-set selection time: GetToolsFor(Implementation) and GetToolsFor(Verify) include RunCommand; other phases get a set without it. This means a skill running in a Plan phase context can't even reference RunCommand — the function isn't in the chat options. Cleaner than per-call validation that the LLM might try to invoke a forbidden tool. The same logic applies to WriteFile (Implementation + Bootstrap only)."
  - key: "Per-skill cost tracking via Begin/End scopes, not by adding skill identity to every Track call. Reason: PipelineCostTracker.Track(ChatResponse) is called in deeply nested code paths (the M.E.AI integration). Threading skill name through every call site is invasive. Begin/End on a stack of active calls is local: the runtime opens a scope at skill-call start, closes it at end; any Track call inside the scope is attributed automatically. Reentrancy isn't a concern because skill calls don't nest — one skill, one scope, one record. The breakdown is exposed on PipelineCostTracker as a read-only IReadOnlyList<CallCostRecord> so consumers (run-result rendering, ticket writeback) get it without new APIs."
  - key: "Loop trace is a structured log line, not a persisted artifact. Reason: same calculus as p0125's concept snapshot — operators want grep-able run-time evidence, not a persisted file per call. The trace lives in SkillCallResult for in-memory consumers (the calling handler logs it; cost-tracker stamps it on the call record). Persisting traces to .agentsmith/runs/<run-id>/traces/<call-id>.json is justified once we have a persistence-target convention (p0128, D4 territory). The structured log gets us 80% of the value at zero new persistence."
  - key: "Concurrency cap is per-pipeline-run, not global. Reason: each pipeline run gets its own SemaphoreSlim instance, sized from max_concurrent_skill_calls. Cross-run rate-limit contention is an external concern (Anthropic / OpenAI per-account quotas) — solving it inside our runtime would require provider-aware throttling that drifts from the providers' published guidance. Inside one run, parallel skill calls (e.g. n=8 investigators in security-scan) get throttled by the local semaphore; that's the failure mode we're protecting against."
  - key: "Re-try logic on failed_parse / failed_validation is one round, deterministic, in the runtime — not in the calling handler. Reason: the re-try is mechanical (append a hint to the message thread, call again), and putting it in every handler that consumes a skill output would mean five copies of the same logic. The runtime owns the parse/validation step (because it knows the SkillCallRequest's expected schema) and owns the re-try. Persistent failure (after one re-try) returns the failed outcome; the handler decides what to do with it (escalate, mark non-blocking, etc.) — the runtime has no opinion on policy."
  - key: "Runtime is built and tested in p0126; consumer migration is p0127's job. No halfway state. Reason: opt-in migration would require scaffolding (a Phase virtual on SkillRoundHandlerBase, a fallback constant pattern in ChatClientFactory, run-result presenter changes that hit empty PerSkillBreakdown values for 1-2 weeks) that all gets ripped out in p0127 anyway. Building it costs days of plumbing for zero observable improvement, because no consumer goes through the runtime in p0126. Cleaner: ship the runtime correct in isolation, exercised by its 50+ tests and a stub-IChatClient integration test; let p0127 wire all consumers in one motion when handler structure is changing for the format migration. PerSkillBreakdown is empty in production runs until p0127 lands — that's fine, the existing pipeline-total cost reporting keeps working unchanged. The only ChatClientFactory change is an additive optional parameter for per-call iteration cap; legacy callers still get the existing 25 default with no new fallback machinery."
  - key: "SkillCallRuntime composes five collaborator classes, not one God-class. Reason: same class-size discipline as the rest of the codebase (p0125 ran into the same trap and split). The split: (a) SkillCallRuntime — orchestrator, owns the public ExecuteAsync and the begin/end lifecycle on PipelineCostTracker; (b) LimitEnforcer — tracks tokens-in / tokens-out / wall-clock during the call, raises Incomplete when caps are crossed (counts of tool calls and LLM rounds are recorded but not separately enforced — see the M.E.AI source-of-truth decision); (c) RetryCoordinator — wraps a single chat invocation with the failed_parse / failed_validation re-try logic, owns the retry-hint message; (d) LoopTraceCollector — captures LlmCall and ToolCall entries, emits the structured log on completion, owns ArgsSummary truncation; (e) OutcomeClassifier — pure function from (response present, parse OK, validation OK, exception type, limit hit) to a SkillCallOutcome value. Each class fits in ~80–150 lines and is independently testable. SkillCallRuntime composes them; no single class carries the full state machine."
  - key: "M.E.AI is the source of truth for the loop's hard stop; our counters report. Reason: M.E.AI's FunctionInvokingChatClient already enforces MaximumIterationsPerRequest. Setting it per-call to ResolveToolCallCap(phase, mode) — values 30 / 10 / 20 from Phase B's MaxToolCallsPerSkill / MaxToolCallsPerInvestigator / MaxToolCallsPerVerifier — gives us the per-phase cap without duplicating the enforcement. M.E.AI's 'iteration' is one LLM call plus its tool executions; in our skills the iteration-to-tool-call ratio is 1:1 to 1:few, and the 30/10/20 numbers are already calibrated for that. MaxLlmCallsPerSkill (15 in Phase B) is observational — recorded in CallCostRecord for retrospective analysis, not enforced separately. What we do enforce ourselves: token caps (M.E.AI doesn't expose those), wall-clock cap, concurrency cap. Two stop conditions racing inside one loop creates ordering bugs; one source of truth per concern keeps it boring."

steps:
  - id: skill-call-contract
    action: "Introduce SkillCallRequest/SkillCallResult/SkillCallOutcome contracts"
    new:
      - "src/AgentSmith.Application/Models/SkillCallRequest.cs: sealed record. Properties: SkillName (string), Role (string, e.g. 'planner'/'judge'/'investigator'), Phase (SkillExecutionPhase), InvestigatorMode (string?, e.g. 'verify_hint'/'survey'/'verify_diff' — null when role is not investigator), PromptParts (IReadOnlyList<ChatMessage>), ToolSet (IReadOnlyList<AIFunction>), AgentConfig (AgentConfig), TaskType (TaskType), CancellationToken (CancellationToken)."
      - "src/AgentSmith.Application/Models/SkillCallResult.cs: sealed record. Properties: Outcome (SkillCallOutcome), Output (string? — null on FailedRuntime), Cost (CallCostRecord), Trace (IReadOnlyList<LoopTraceEntry>), FailureReason (string? — set on Failed* outcomes; structured reason: validation error, parse error, exception type)."
      - "src/AgentSmith.Application/Models/SkillCallOutcome.cs: enum with Ok=0, Incomplete=1, FailedParse=2, FailedValidation=3, FailedRuntime=4."
      - "src/AgentSmith.Application/Models/SkillExecutionPhase.cs: enum with Plan, Review, Implementation, Verify, Discuss, Investigate, Filter, Synthesize, Bootstrap."
      - "src/AgentSmith.Application/Models/CallCostRecord.cs: sealed record. Properties: SkillName, Role, Phase (SkillExecutionPhase), InputTokens (long), OutputTokens (long), CacheCreateTokens (long), CacheReadTokens (long), ToolCallCount (int), LlmCallCount (int), DurationMs (long), StartedAt (DateTimeOffset)."
      - "src/AgentSmith.Application/Models/LoopTraceEntry.cs: sealed record discriminated union (LlmCall / ToolCall variants). LlmCall: ModelName, InputTokens, OutputTokens, DurationMs. ToolCall: ToolName, ArgsSummary (string, ≤200 chars), Success (bool), DurationMs, ErrorMessage (string?)."

  - id: limits-config-binding
    action: "LoopLimitsConfig + agentsmith.yml binding via Options pattern"
    new:
      - "src/AgentSmith.Contracts/Models/Configuration/LoopLimitsConfig.cs: POCO bound to agentsmith.yml `limits:` section. Properties match defaults from Phase B: MaxToolCallsPerSkill (30), MaxToolCallsPerInvestigator (10), MaxToolCallsPerVerifier (20), MaxLlmCallsPerSkill (15), MaxInputTokensPerSkillCall (200_000), MaxOutputTokensPerSkillCall (16_000), MaxSecondsPerSkillCall (300), MaxConcurrentSkillCalls (10). Method ResolveToolCallCap(phase, investigatorMode) returns the right cap based on the phase and mode (verify_diff → MaxToolCallsPerVerifier; verify_hint/survey → MaxToolCallsPerInvestigator; otherwise → MaxToolCallsPerSkill). MaxLlmCallsPerSkill is recorded in CallCostRecord but not enforced separately — see decision."
    modify:
      - "config/agentsmith.yml: add `limits:` section at root with the eight Phase-B defaults. Documented inline (YAML comments) per limit. The max_concurrent_skill_calls comment notes the cap is per pipeline run — 'with N parallel runs the effective concurrency is 10 × N; if provider rate limits become a problem, downscale here or add a Polly-layer at the IChatClient seam.'"
      - "src/AgentSmith.Contracts/Models/Configuration/AgentSmithConfig.cs: add `Limits: LoopLimitsConfig` property; YamlDotNet binds it from the new section."
      - "src/AgentSmith.Infrastructure/Extensions/ServiceCollectionExtensions.cs: register LoopLimitsConfig via Options pattern."

  - id: chatclient-factory-iteration-cap-parameter
    action: "ChatClientFactory.Create gains an optional per-call iteration cap"
    modify:
      - "src/AgentSmith.Infrastructure/Services/Factories/ChatClientFactory.cs: extend Create with an optional `int? maxIterations = null` parameter. When null, the existing literal 25 at line 47 stays in place (legacy callers unchanged). When provided, the wrapper uses that value as MaximumIterationsPerRequest. No new constants, no fallback path — one literal default, one optional override."
      - "src/AgentSmith.Contracts/Services/IChatClientFactory.cs: add the optional parameter to the Create method signature. Existing implementations and callers continue working without changes."

  - id: limit-enforcer
    action: "LimitEnforcer tracks tokens, wall-clock, and counters during a skill call"
    new:
      - "src/AgentSmith.Application/Services/Loop/LimitEnforcer.cs: ~120 lines. Constructor takes LoopLimitsConfig + a CancellationTokenSource. Methods: RecordLlmCall(inputTokens, outputTokens) — accumulates token totals, increments LlmCallCount, returns LimitDecision (Continue or Cap with reason); RecordToolCall(toolName, durationMs, success) — increments ToolCallCount, no separate enforcement; CheckTimeLimit() — verifies elapsed < MaxSecondsPerSkillCall, signals the CTS if exceeded. Properties: ElapsedMs, ToolCallCount, LlmCallCount, AccumulatedInputTokens, AccumulatedOutputTokens. The enforcer is constructed per skill call by SkillCallRuntime, used and discarded."

  - id: retry-coordinator
    action: "RetryCoordinator wraps a single chat invocation with one failed_parse/failed_validation retry"
    new:
      - "src/AgentSmith.Application/Services/Loop/RetryCoordinator.cs: ~80 lines. Method `Task<RetryOutcome> InvokeAsync(IChatClient chat, IList<ChatMessage> messages, ChatOptions options, ISkillOutputValidator validator, CancellationToken ct)`. Calls chat.GetResponseAsync once; on parse failure, appends 'last output was not valid JSON' hint and retries once; on validation failure, appends the validator's concrete error and retries once. Returns the final output and a typed reason if it still failed. Owns the retry-hint message format (single source of truth)."
      - "src/AgentSmith.Application/Services/Loop/ISkillOutputValidator.cs: minimal interface — `ValidationResult Validate(string output)`. SkillCallRuntime constructs the validator from SkillCallRequest's expected output schema (today: pass-through validator that always succeeds — schema validation lands in p0128 alongside Plan/Diff schemas; for p0126 the validator surface exists so the retry path is reachable, but the only built-in validator is the no-op)."

  - id: loop-trace-collector
    action: "LoopTraceCollector builds the structured trace and emits it on completion"
    new:
      - "src/AgentSmith.Application/Services/Loop/LoopTraceCollector.cs: ~90 lines. Methods: AppendLlmCall(model, inputTokens, outputTokens, durationMs); AppendToolCall(toolName, argsJson, durationMs, success, errorMessage). Internal: ArgsSummary truncates argsJson to 200 chars (preserving the leading object boundary, appending `…`). Method `IReadOnlyList<LoopTraceEntry> Build()` returns the captured trace; `EmitLog(ILogger logger, string skillName)` writes a structured log entry at INFO level — keys: skillName, llmCalls, toolCalls, durationMs, entries (compact representation)."

  - id: outcome-classifier
    action: "OutcomeClassifier maps post-call state to SkillCallOutcome"
    new:
      - "src/AgentSmith.Application/Services/Loop/OutcomeClassifier.cs: ~50 lines. Pure function. Method `SkillCallOutcome Classify(ClassificationInput input)` where input carries: ResponsePresent (bool), ParseSuccess (bool), ValidationSuccess (bool), CaughtException (Exception?), LimitHit (LimitDecision?). Mapping per Phase B: exception → FailedRuntime; limit hit with response → Incomplete; parse failure after retry → FailedParse; validation failure after retry → FailedValidation; otherwise → Ok. Tested independently of the runtime."

  - id: concurrency-gate
    action: "PipelineConcurrencyGate enforces max_concurrent_skill_calls per run via SemaphoreSlim"
    new:
      - "src/AgentSmith.Application/Services/Loop/PipelineConcurrencyGate.cs: scoped service holding a SemaphoreSlim sized from LoopLimitsConfig.MaxConcurrentSkillCalls at construction. Methods: `Task<IDisposable> AcquireAsync(CancellationToken)` returns a release-on-dispose handle; the semaphore is per-DI-scope so each pipeline run has its own. SkillCallRuntime wraps each ExecuteAsync in `await using var permit = await gate.AcquireAsync(ct);`."
    modify:
      - "src/AgentSmith.Infrastructure/Extensions/ServiceCollectionExtensions.cs: register PipelineConcurrencyGate as scoped (one per pipeline-run DI scope)."

  - id: skill-call-runtime-orchestrator
    action: "SkillCallRuntime composes the five collaborators into the public ExecuteAsync flow"
    new:
      - "src/AgentSmith.Application/Services/Loop/ISkillCallRuntime.cs: interface. Method `Task<SkillCallResult> ExecuteAsync(SkillCallRequest request, CancellationToken cancellationToken)`."
      - "src/AgentSmith.Application/Services/Loop/SkillCallRuntime.cs: ~150 lines. Constructor injects IChatClientFactory, PipelineCostTracker, PipelineConcurrencyGate, LoopLimitsConfig, ILogger. ExecuteAsync flow: (1) acquire concurrency permit; (2) BeginCall on cost tracker, opening SkillCallScope; (3) construct LimitEnforcer + LoopTraceCollector + OutcomeClassifier + RetryCoordinator + ISkillOutputValidator; (4) compute MaximumIterationsPerRequest from LoopLimitsConfig.ResolveToolCallCap(request.Phase, request.InvestigatorMode); (5) get IChatClient via factory.Create(agent, taskType, maxIterations: cap); (6) call retry coordinator to invoke chat; (7) collect trace entries during the call (via instrumented IChatClient or by inspecting ChatResponse); (8) classify outcome; (9) emit trace log; (10) finalize cost record; (11) return SkillCallResult. The class delegates all substantive work to the collaborators — its body is sequencing, not logic."
      - "src/AgentSmith.Application/Services/Loop/SkillCallScope.cs: IDisposable scope returned by PipelineCostTracker.BeginCall. Constructor takes (skillName, role, phase, tracker, startedAt). Dispose finalizes the CallCostRecord (using the tracker's accumulated tokens, the LimitEnforcer's counters, and the elapsed time) and adds it to the tracker's PerSkillBreakdown list."
    modify:
      - "src/AgentSmith.Infrastructure/Extensions/ServiceCollectionExtensions.cs: register ISkillCallRuntime as scoped (one per pipeline run)."

  - id: per-skill-cost-tracking
    action: "PipelineCostTracker grows Begin/End per-skill scopes and exposes the breakdown"
    modify:
      - "src/AgentSmith.Application/Services/PipelineCostTracker.cs: add internal `SkillCallScope BeginCall(string skillName, string role, SkillExecutionPhase phase)` returning the scope; add `EndCall(SkillCallScope scope, ...)` finalizing into a CallCostRecord. Track(ChatResponse) attributes input/output/cache tokens to the active scope (when one exists; otherwise to the existing pipeline-total fields only). New property `IReadOnlyList<CallCostRecord> PerSkillBreakdown { get; }`. Existing pipeline-total properties (TotalInputTokens, etc.) keep their semantics — sum across all calls plus any non-scoped Track activity."

  - id: read-scope-enforcement
    action: "PathReadGuard / PathWriteGuard wrap GitIgnoreResolver; SandboxToolHost path-aware tools call them"
    new:
      - "src/AgentSmith.Application/Services/Tools/PathReadGuard.cs: constructor takes IGitIgnoreResolver, repoRootProvider (returns the working repo path). Method `Result AssertReadable(string path)` returns Ok or a structured error (path-outside-repo / path-gitignored / path-in-dot-git). Tool errors flow back into the loop via the M.E.AI tool-result envelope."
      - "src/AgentSmith.Application/Services/Tools/PathWriteGuard.cs: constructor takes PathReadGuard + a SkillExecutionPhase. AssertWritable(path) wraps AssertReadable + checks phase ∈ {Implementation, Bootstrap}. Bootstrap phase gates the path further to only the two bootstrap files (`.agentsmith/context.yaml`, `.agentsmith/coding-principles.md`). Implementation-phase additional 'must be in approved Plan files' check is deferred to p0128."
    modify:
      - "src/AgentSmith.Application/Services/Tools/SandboxToolHost.cs: constructor accepts IPathReadGuard and IPathWriteGuard (passed by SkillCallRuntime per-call). ReadFile, Grep, ListFiles call PathReadGuard.AssertReadable on the input path before invoking the underlying sandbox. WriteFile calls PathWriteGuard.AssertWritable. RunCommand has no path arg — phase-gated at tool-set selection time, not via guard. Existing tool-method shapes and error formatting preserved."

  - id: tool-kit-per-phase
    action: "ToolKit centralizes phase-keyed tool sets; SkillCallRuntime requests per-phase set"
    new:
      - "src/AgentSmith.Application/Services/Tools/ToolKit.cs: constructor takes SandboxToolHost. Method `IReadOnlyList<AIFunction> GetToolsFor(SkillExecutionPhase phase, string? investigatorMode)` returns the tool list for that phase. Per-phase mapping: Plan / Review / Discuss / Filter / Synthesize → [ReadFile, Grep, ListFiles, LogDecision, AskHuman] (read-only + escalation). Investigate / Verify → [ReadFile, Grep, ListFiles, LogDecision, AskHuman, RunCommand]. Implementation → all 7 tools. Bootstrap → [ReadFile, Grep, ListFiles, WriteFile, LogDecision, AskHuman]. Default fallback (phase=null) → all 7 (preserves today's behavior for non-migrated callers)."
    modify:
      - "src/AgentSmith.Application/Services/Tools/SandboxToolHostExtensions.cs: GetAllTools() and GetScoutTools() preserved for callers that haven't migrated to ToolKit. ToolKit is the new entry point; the two extension methods become thin wrappers (GetAllTools = ToolKit.GetToolsFor(null), GetScoutTools = ToolKit.GetToolsFor(Plan, null))."

  - id: tests
    action: "Test pack: limits, outcomes, cost tracking, scope guards, tool-kit, runtime integration"
    new:
      - "tests/AgentSmith.Tests/Loop/SkillCallRuntimeLimitTests.cs: ExecuteAsync_ToolCallLimitReached_ReturnsIncomplete; ExecuteAsync_LlmCallLimitReached_ReturnsIncomplete; ExecuteAsync_TokenLimitReached_ReturnsIncomplete; ExecuteAsync_TimeLimitReached_ReturnsIncomplete; ExecuteAsync_ConcurrencyLimitReached_BlocksUntilSlotAvailable; ExecuteAsync_VerifyPhase_UsesVerifierToolCallCap; ExecuteAsync_InvestigatorPhase_UsesInvestigatorToolCallCap."
      - "tests/AgentSmith.Tests/Loop/SkillCallOutcomeTests.cs: ExecuteAsync_ValidJsonOutput_ReturnsOk; ExecuteAsync_InvalidJson_RetriesOnce_ThenFailedParse; ExecuteAsync_SchemaViolation_RetriesOnce_ThenFailedValidation; ExecuteAsync_ToolCrash_ReturnsFailedRuntime; ExecuteAsync_NetworkException_ReturnsFailedRuntime; ExecuteAsync_FailedParse_RetryHintIncluded; ExecuteAsync_FailedValidation_RetryHintIncludesConcreteError."
      - "tests/AgentSmith.Tests/Loop/SkillCallCostTrackingTests.cs: BeginCall_AccumulatesInputAndOutputTokensInPerSkillBreakdown; BeginCall_PreservesPipelineTotals; BeginCall_NestedCallsAreNotSupported_SecondCallReplacesFirstScope (assert defensive — if it ever happens, the second wins, but log warning); PerSkillBreakdown_OrderedByStartTime; CallCostRecord_DurationMatchesScopeLifetime."
