done:
  - "SkillCallRequest, SkillCallResult, SkillCallOutcome, SkillExecutionPhase, CallCostRecord, LoopTraceEntry contracts exist in Application.Models"
  - "LoopLimitsConfig binds from agentsmith.yml `limits:` section with all eight defaults; ResolveToolCallCap returns the right value per phase + investigator mode; max_concurrent_skill_calls inline comment explains the per-run scope and the operator option of downscaling or adding a Polly-layer if provider rate limits get hit"
  - "ChatClientFactory.Create accepts an optional iteration cap; legacy callers see no behavior change (the existing 25 default stays inline); SkillCallRuntime always passes a resolved value"
  - "Five collaborator classes built and tested independently: LimitEnforcer, RetryCoordinator, LoopTraceCollector, OutcomeClassifier, PipelineConcurrencyGate. SkillCallRuntime composes them in ExecuteAsync; no class exceeds ~150 lines"
  - "Five-state outcome behaves correctly: ok / incomplete / failed_parse (one re-try then escalate) / failed_validation (one re-try then escalate) / failed_runtime — driven by OutcomeClassifier's pure mapping function and RetryCoordinator's single-retry policy"
  - "M.E.AI's MaximumIterationsPerRequest is the only hard stop on the loop, set per-call from ResolveToolCallCap. LimitEnforcer's tool-call and LLM-call counters are observational (recorded in CallCostRecord, not separately enforced). Token caps, wall-clock cap, concurrency cap are enforced by us"
  - "PipelineCostTracker exposes PerSkillBreakdown alongside existing pipeline totals; per-skill tokens, tool-call counts, durations attribute correctly inside SkillCallScope"
  - "PathReadGuard rejects paths outside the repo, .gitignored paths, and .git directory contents; PathWriteGuard gates by phase (Implementation/Bootstrap only) and by Bootstrap-files restriction in Bootstrap phase"
  - "ToolKit returns phase-keyed tool sets per the documented mapping; legacy callers that don't pass a phase get all tools (compat preserved)"
  - "PipelineConcurrencyGate enforces max_concurrent_skill_calls per pipeline run via SemaphoreSlim, scoped per DI scope"
  - "Loop trace captures each LLM call and tool call; LoopTraceCollector emits the structured log on completion at INFO level"
  - "No consumer of SkillCallRuntime in p0126. SkillRoundHandlerBase descendants run unchanged. PerSkillBreakdown is empty in production runs until p0127 wires the first consumer — that's expected, not a regression"
  - "All 68 new tests pass (45 runtime + outcome + cost + scope + tool-kit + config + integration; 23 collaborator tests across LimitEnforcer / RetryCoordinator / LoopTraceCollector / OutcomeClassifier)"
  - "All existing tests pass (no regressions)"
  - "M.E.AI 10.4.0 pin preserved; Anthropic.SDK 5.10.0, OllamaSharp 5.4.24 unchanged; integration smoke against all five providers (Claude, OpenAI, Azure-OpenAI, Gemini, Ollama) confirms the wrapper doesn't break tool-call serialization. Provider-specific bugs surfaced by the smoke (if any) are filed for p0126b — not blocking p0126 acceptance"
