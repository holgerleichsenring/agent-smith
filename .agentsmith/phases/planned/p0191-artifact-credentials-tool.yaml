# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0191-artifact-credentials-tool
goal: |
  Coding runs in private orgs hit private package feeds (Azure
  Artifacts, GitHub Packages, JFrog, private npm, …). Without auth
  in the sandbox the toolchain fails — `dotnet restore` returns
  NU1301, `npm install` returns EAUTH, `pip install` 401s. p0189
  made these failures visible in the dashboard stream; this phase
  makes them resolvable.

  Design choice: do NOT build a per-language config-rewrite shim
  inside the toolchain images. The agent already has read/write/run
  tools and already knows every package-manager's auth surface from
  its training. Hand it the credentials and let it apply them in
  whatever shape the toolchain needs — `dotnet nuget add source -u
  -p`, an `.npmrc` token line, a `pip.conf` block, whatever.

  Two-piece delivery:
    1. `registries:` block in agentsmith.yml (flat list of
       host + username + token references).
    2. `get_artifact_credentials` tool host — agent calls it on
       demand when it sees an auth-flavoured package-manager error.

  No language-specific C# code, no toolchain-image changes, no
  pre-emptive config mutation at sandbox start. Credentials only
  flow into the LLM context when the agent asks for them.

requires:
  - p0189-context-yaml-parse-errors-and-stream-in-tree

scope:
  in: |
    Config schema:
      registries:
        - host: pkgs.dev.azure.com
          username: any
          token: ${azure_artifacts_token}
        - host: my-company.jfrog.io
          username: ci
          token: ${jfrog_npm_token}
    Empty / absent block is fine (no private feeds).
    Tokens reference `secrets:` entries via the existing
    ${name} substitution.

    GetArtifactCredentialsToolHost (IToolHost) exposes ONE tool:
      get_artifact_credentials(
        host_filter?: string,    // optional, e.g. "pkgs.dev.azure.com"
        registry_name?: string,  // optional, future-use; left for now
      )
      → returns JSON: [{host, username, token}, ...]
    When host_filter is set, suffix-match the host (so
    "dev.azure.com" matches any *.dev.azure.com entry). When unset,
    returns every configured registry — the agent decides.

    Wiring:
      - Registered in ToolKit.AllHostsActivePolicy alongside the
        existing read/write/run hosts. Available to master AND
        sub-agents (auth is needed in any phase that runs
        toolchain commands).
      - DI: AddSingleton via the existing tool-host registration
        block.

    Master prompt (cross-repo, agentsmith-skills coding-agent-master
    1.2.0 → 1.3.0): a 4-line section under the existing
    "Repository-prefixed paths" block:

      ## Private package feeds
      When a package-manager command fails with NU1301 / EAUTH /
      401 / "unauthorized", call `get_artifact_credentials`
      (optionally with a host_filter from the failing URL) and
      apply the returned token via the toolchain's native flow —
      `dotnet nuget add source -u … -p …`, `.npmrc` `_authToken=`,
      `pip.conf` `[global] extra-index-url`, etc.

    Tests:
      - GetArtifactCredentialsToolHost_ReturnsAllConfiguredRegistries
      - GetArtifactCredentialsToolHost_HostFilterSuffixMatch
      - GetArtifactCredentialsToolHost_HostFilterNoMatch_ReturnsEmpty
      - GetArtifactCredentialsToolHost_NoRegistriesConfigured_ReturnsEmpty
      - YamlConfigurationLoaderTests: registries block round-trips
        with secret substitution.

  out: |
    Per-toolchain "auth-shim" baked into the sandbox image — out;
    that was the previous design iteration the operator rejected.
    The point of this phase is that the agent IS the shim.
    Per-repo registry mapping (this repo uses these specific
    registries) — out. Flat list; agent matches on demand.
    Multi-token-per-host (different tokens for read vs publish) —
    out for now; agent gets the configured token, that's it. If
    operators need multiple tokens for the same host we'll widen
    later.
    Credential rotation / short-lived tokens — out; static tokens
    only. OIDC federation is a future phase.
    Audit-log emission of credential fetches as a typed event —
    out for the first slice. The tool call shows up in the existing
    ToolCall event stream with args_summary="host_filter=…"; the
    response body is not on-stream.

decisions:
  - key: |
      Tool, not prompt-injected credentials. Reason: pull-on-demand
      keeps tokens out of the initial LLM context (and out of the
      prompt cache key), so a session that never hits a private
      feed never sees the credentials. Smaller secret-leakage
      surface; smaller context window.
  - key: |
      One flat host→token list, not a per-repo mapping. Reason: a
      repo's nuget.config / .npmrc already declares which feeds it
      uses — that's the source of truth, agent reads it natively.
      A per-repo mapping in agentsmith.yml would duplicate that
      knowledge and drift.
  - key: |
      Tool response body NOT on the SandboxOutput / ToolResult
      event stream. Reason: credentials must not land in the
      Dashboard's L3 ring buffer or in Redis. Implementation:
      the tool result envelope drops result_body to a 4-char
      stub (`[set]`) for this specific tool host; the agent
      still gets the real body in its in-process chat completion
      response.
  - key: |
      Suffix match for host_filter, not strict equality. Reason:
      package-manager error messages often quote the full feed
      URL (e.g. `https://pkgs.dev.azure.com/RhenusITPD/.../v3/index.json`);
      the agent can pass the hostname `pkgs.dev.azure.com` and get
      a match without parsing subpaths.

steps:
  - id: schema
    action: |
      Add Registries property to AgentSmithConfig + new
      RegistryConfig record (Host, Username, Token). Wire through
      YamlConfigurationLoader; secret substitution flows via the
      existing ${name} resolver.
    modify:
      - "src/backend/AgentSmith.Contracts/Models/Configuration/AgentSmithConfig.cs"
      - "src/backend/AgentSmith.Infrastructure/Services/YamlConfigurationLoader.cs"
    new:
      - "src/backend/AgentSmith.Contracts/Models/Configuration/RegistryConfig.cs"

  - id: tool-host
    action: |
      GetArtifactCredentialsToolHost : IToolHost. Constructor takes
      IReadOnlyList<RegistryConfig>. GetTools returns one
      AIFunction wrapping a private async method that does suffix
      match + JSON serialise.
    new:
      - "src/backend/AgentSmith.Application/Services/Tools/GetArtifactCredentialsToolHost.cs"

  - id: tool-result-redaction
    action: |
      ToolResultEvent emission for this specific tool host
      replaces ResultBody with the stub "[set]" so credentials
      do not land on the event stream. Cleanest mechanism: the
      tool host implements a marker interface ISensitiveToolHost
      which the EventPublishingChatClient (or wherever the tool
      result event is built) honours by redacting.
    modify:
      - "src/backend/AgentSmith.Infrastructure/Services/Events/EventPublishingChatClient.cs"
    new:
      - "src/backend/AgentSmith.Contracts/Services/ISensitiveToolHost.cs"

  - id: wiring
    action: |
      Register GetArtifactCredentialsToolHost in DI and in
      AllHostsActivePolicy. Master + sub-agents both see it.
    modify:
      - "src/backend/AgentSmith.Application/Services/Tools/AllHostsActivePolicy.cs"
      - "src/backend/AgentSmith.Application/ServiceCollectionExtensions.cs (or wherever tool hosts are registered)"

  - id: tests
    action: |
      Unit tests for the tool host (4 named in scope.tests),
      YamlConfigurationLoaderTests addition for the registries
      block, ToolResultEvent redaction test for the
      ISensitiveToolHost marker.
    new:
      - "tests/AgentSmith.Tests/Tools/GetArtifactCredentialsToolHostTests.cs"
      - "tests/AgentSmith.Tests/Events/SensitiveToolResultRedactionTests.cs"
    modify:
      - "tests/AgentSmith.Tests/Configuration/YamlConfigurationLoaderTests.cs (path may differ)"

  - id: master-prompt
    action: |
      Cross-repo: agentsmith-skills coding-agent-master 1.2.0 →
      1.3.0 adds the "Private package feeds" 4-line section.
      Same skill bump pattern as p0179h. agentsmith.yml
      skills.version pin moves to the new catalog version once
      the skills PR merges.
    modify:
      - "(agentsmith-skills) skills/_masters/coding-agent-master/SKILL.md"
      - "(agentsmith) agentsmith.yml — skills.version pin bump"

  - id: verify
    action: |
      dotnet build + dotnet test green. Smoke against the
      operator's stack: trigger a coding ticket on an
      AuthPort-style repo with private NuGet feeds, watch the
      execution tree, confirm:
      (a) test step initially fails with NU1301 (visible in
          embedded SandboxBox stdout per p0189),
      (b) agent calls get_artifact_credentials in a follow-up
          loop iteration,
      (c) agent runs `dotnet nuget add source` (or patches the
          repo's NuGet.Config) using the returned token,
      (d) test step re-runs and succeeds.

tests:
  - "GetArtifactCredentialsToolHost_ReturnsAllConfiguredRegistries"
  - "GetArtifactCredentialsToolHost_HostFilterSuffixMatch"
  - "GetArtifactCredentialsToolHost_HostFilterNoMatch_ReturnsEmpty"
  - "GetArtifactCredentialsToolHost_NoRegistriesConfigured_ReturnsEmpty"
  - "YamlConfigurationLoader_RegistriesBlock_RoundTripsWithSecretSubstitution"
  - "ToolResultEvent_SensitiveToolHost_RedactsResultBody"

done:
  - "registries: block in agentsmith.yml schema, with secret substitution."
  - "get_artifact_credentials tool host registered + available to master and sub-agents."
  - "Tool result body redacted in the ToolResultEvent stream (credentials never on the dashboard ring)."
  - "Master prompt updated cross-repo; agentsmith.yml skills version pin moved."
  - "Smoke: a ticket with private-feed dependencies completes its test step end-to-end."
