# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0159c
goal: "Re-skin the MkDocs Material documentation site (`docs/`) to the
  Zapier-structured / Smith-green design system from p0159a, and fix the
  concept-and-configuration content that drifted across p0140 / p0145 /
  p0151 / p0153 / p0154 / p0155 / p0156 / p0158. Material picks up the
  shared `tokens.css`; a slim `overrides.css` maps Material's palette /
  font slots to the same custom properties so both sites share one
  visual language. Adds the new `concepts/multi-repo-pipelines.md` page
  that didn't exist before (one ticket -> N sandboxes -> N PRs is the
  single biggest piece of story missing from docs)."

requires: ["p0159a"]

scope:
  in: |
    (1) `docs/stylesheets/tokens.css` (generated by p0159a's build
        script) wired into `mkdocs.yml` via `extra_css`. A slim
        companion `docs/stylesheets/overrides.css` maps Material's
        `--md-primary-fg-color`, `--md-accent-fg-color`,
        `--md-typeset-color`, font-family slots, code-block colors,
        admonition borders to the corresponding `var(--color-…)` /
        `var(--typography-…)` tokens. Light mode uses cream canvas;
        dark mode uses ink-dark canvas via the same tokens'
        polarity-flipped values.

    (2) Material theme palette config in `mkdocs.yml` updated: primary
        scheme uses Smith-green accent; font block points at Inter
        (loaded via tokens.css @font-face, not Material's Google Fonts
        proxy — keeps font loading consistent with website/).

    (3) `docs/index.md` rewrites the hero section: embeds
        `lifecycle.svg` (copied from p0159b into `docs/assets/`)
        via `<img>` (Material sanitises inline `<style>`/`<script>`),
        followed by the 14-step fix-bug walkthrough matching current
        handler order in `.agentsmith/context.yaml`. Quick-Links table
        gets a new `Multi-Repo Projects` row.

    (4) Concept-page drift audit. For each of these files, read the
        current state, compare against the named code source-of-truth,
        replace only blocks that disagree:
        - `concepts/sandbox-architecture.md` -> verify against
          `SandboxSpecBuilder` + `KubernetesSandboxFactory` + p0136 /
          p0145 / p0158e (per-repo sandbox + path-prefix routing).
        - `concepts/sandbox-agent.md` -> verify against
          `AgentSmith.Sandbox.Wire/Step.cs` + `SizeLimits.cs`.
        - `concepts/multi-agent-orchestration.md` -> verify against
          current `SkillRoundCommand` + `FilterRoundCommand` + triage.
        - `concepts/pipeline-system.md` -> verify against current
          `PipelinePresets.FixBug` and the unified-run model from p0158.
        - `concepts/triage.md` -> verify against current triage step.
        - `concepts/multi-skill.md` -> verify against skill loader.
        - `concepts/phases-and-runs.md` -> run-id is
          `{yyyy-MM-ddTHH-mm-ss}-{4hex}-{slug}` (p0156), `runs:` block
          in context.yaml, not r{NN}.
        - `concepts/ticket-lifecycle.md` -> single ClaimRequest per
          ticket (p0158a), not per-repo.

    (5) Configuration-page drift audit. For each of these files, every
        YAML / code block validated against
        `src/AgentSmith.Contracts/Configuration/*.cs` plus a
        freshly-run smoke `agentsmith.yml`:
        - `configuration/agentsmith-yml.md`
        - `configuration/multi-repo.md`
        - `configuration/project-resolution.md`
        - `configuration/tools.md` (must reflect p0153 / p0154
          tool-surface — web_fetch present, grep/glob/list_files
          aliases gone, MCP-parity primitives documented).

    (6) New page `concepts/multi-repo-pipelines.md` — one ticket, N
        sandboxes, N PRs. Embeds `lifecycle.svg`, links to
        `configuration/multi-repo.md`, explains `RepoResolver` +
        path-prefix dispatch + `agentsmith/ticket-{N}` branch
        coherence. Replaces the gap where this story only lives in
        p0140 + p0158 spec text.

    (7) Audit-trail note `.agentsmith/notes/p0159c-doc-drift-audit.md`
        — short list of every touched file + the one-line drift each
        fix corrected. Working artefact for the next refresh; not
        for the published docs site.

  out: |
    - Eleventy landing site. That's p0159b.
    - Run-log pages (`run-log-*.md`) — out of scope; their content is
      historical and reads fine as-is.
    - Auto-generated config reference from C# types — separate phase
      if we want that. Manual sync only.
    - Translations / i18n — English-only per policy.
    - Adding new pipelines or features to the docs — document what
      exists today; new work belongs to its own phase.

decisions:
  - key: "Material theme stays — palette / fonts overridden via
      tokens.css + overrides.css, not a custom theme. — Material is
      well-maintained, has search / nav features we benefit from,
      and the override surface is small. Swapping generators is
      months of work for no user-visible win."

  - key: "Lifecycle SVG embedded as `<img>` in docs, inlined in the
      landing. — Material sanitises inline `<style>` and `<script>`
      blocks; CSS animations on inline SVG don't survive. Static
      image is fine for docs; the landing keeps the interactive
      inlined version."

  - key: "Drift audit verifies against the running code, not against
      older docs. — Per [[feedback_challenge_premises]]. At this
      refactor pace, docs lie before code does."

  - key: "Light mode default for docs; dark mode toggle still ships
      via Material's built-in toggle. — Developer docs need to print
      and clip cleanly to other tools; cream-canvas default is
      friendlier than ink-dark default. Material's dark scheme reads
      the same custom properties' polarity-flipped values via the
      `[data-md-color-scheme=slate]` selector mapping in
      overrides.css."

  - key: "New `concepts/multi-repo-pipelines.md` exists because no
      single concept page today tells the one-ticket-many-PRs story
      end to end. Pieces are scattered across p0140 spec,
      `configuration/multi-repo.md`, and p0158 commit messages. The
      landing's hero diagram demands a docs landing target."

steps:
  - id: theme
    action: "Wire `tokens.css` (output of p0159a's build script) and
      a new `overrides.css` into `mkdocs.yml` via `extra_css`.
      `overrides.css` maps Material's CSS variables to the shared
      tokens for both color schemes. Update `mkdocs.yml` palette
      block: primary scheme uses Smith-green accent."
    new:
      - "docs/stylesheets/overrides.css"
    modify:
      - "docs/mkdocs.yml"

  - id: index-hero
    action: "Rewrite `docs/index.md`. Embed `<img src=assets/lifecycle.svg>`
      at the top. Update the inline 14-step fix-bug walkthrough to
      match current handler order. Add `Multi-Repo Projects` row to
      the Quick Links table. Copy `lifecycle.svg` from
      `website/src/static/` to `docs/assets/`."
    new:
      - "docs/assets/lifecycle.svg"
    modify:
      - "docs/index.md"

  - id: concept-drift
    action: "Read-and-fix pass over the eight concept pages listed
      in scope (1). For each: verify against the named source of
      truth in `src/`. Replace only blocks that disagree. Note each
      drift fix in the audit notes file (step `notes`)."
    modify:
      - "docs/concepts/sandbox-architecture.md"
      - "docs/concepts/sandbox-agent.md"
      - "docs/concepts/multi-agent-orchestration.md"
      - "docs/concepts/pipeline-system.md"
      - "docs/concepts/triage.md"
      - "docs/concepts/multi-skill.md"
      - "docs/concepts/phases-and-runs.md"
      - "docs/concepts/ticket-lifecycle.md"

  - id: config-drift
    action: "Read-and-fix pass over the four configuration pages.
      Source of truth: `src/AgentSmith.Contracts/Configuration/*.cs`
      + freshly-run smoke `agentsmith.yml`. Tools page must reflect
      p0153 / p0154."
    modify:
      - "docs/configuration/agentsmith-yml.md"
      - "docs/configuration/multi-repo.md"
      - "docs/configuration/project-resolution.md"
      - "docs/configuration/tools.md"

  - id: multi-repo-page
    action: "Write `concepts/multi-repo-pipelines.md`. Embeds the
      lifecycle SVG. Sections: 'One ticket, N sandboxes',
      'Path-prefix dispatch', 'Branch coherence across repos',
      'Cross-linked PRs'. Add to `mkdocs.yml` nav under Concepts."
    new:
      - "docs/concepts/multi-repo-pipelines.md"
    modify:
      - "docs/mkdocs.yml"

  - id: notes
    action: "Write `.agentsmith/notes/p0159c-doc-drift-audit.md`.
      One section per touched file, one line per drift fixed,
      pointing at the code source-of-truth that decided it."
    new:
      - ".agentsmith/notes/p0159c-doc-drift-audit.md"

  - id: verify
    action: "`mkdocs build --strict` from `docs/` must pass (no
      broken links, no missing nav entries). Manual browser walk:
      home page renders the lifecycle SVG, theme reads cream / green
      / coffee in light mode and ink-dark / green in dark mode,
      every touched concept and configuration page renders without
      stale references to old code paths. Per
      [[feedback_finish_what_you_start]] this step is the gate —
      nothing ships until both build and walk are clean."

tests: []

done:
  - "`mkdocs build --strict` passes."
  - "Material theme reads cream + Smith-green in light mode, ink-dark
    + Smith-green in dark mode, via shared tokens.css + overrides.css."
  - "`docs/index.md` embeds the lifecycle SVG; 14-step walkthrough
    matches current handlers; Multi-Repo Projects row in Quick Links."
  - "Eight concept pages and four configuration pages verified
    against named code source-of-truth; diffs minimal where docs
    already matched."
  - "`concepts/multi-repo-pipelines.md` exists and is linked from
    `mkdocs.yml`."
  - "`.agentsmith/notes/p0159c-doc-drift-audit.md` documents every
    touched file with a one-line drift summary."
  - "Manual browser walk: light-mode + dark-mode toggle works; all
    pages render; no console errors."
