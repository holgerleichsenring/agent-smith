# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0140c
goal: "Restructure pollers from per-project to per-tracker. Today each of the four pollers (GitHubIssuePoller / GitLabIssuePoller / AzureDevOpsWorkItemPoller / JiraIssuePoller) is instantiated once per project that has polling enabled, and they receive an already-resolved ResolvedProject in their constructor. Post-p0140c each poller is instantiated once per tracker connection with polling enabled, pulls all open tickets from that tracker, and routes each pulled ticket through p0140a's ProjectResolver and p0140b's SpawnPipelineRunsUseCase. Result: when N projects share one tracker, polling load drops from N pulls to 1 pull per interval. Per-project trigger_statuses is no longer used by the poller (it pulls broadly) — instead it becomes a SECOND filter applied per-match by the spawner path so a project only fires when the ticket's status is in its trigger_statuses list."

requires: ["p0140b"]

scope:
  in: |
    (1) Poller-ctor surface change. All four pollers in src/AgentSmith.Application/Services/Polling/
        change their constructor signature: drop `string projectName` + `ResolvedProject projectConfig`,
        add `TrackerConnection tracker`. Each poller now knows ONLY about its tracker connection
        (auth, organization, URL, type) — it has no notion of "which project owns this ticket"
        because that decision moves entirely to ProjectResolver.

    (2) Per-tracker DI registration. src/AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs
        (or wherever pollers are registered today — confirm at execution time via grep on
        "Poller" + "IHostedService") replaces the per-project enumeration with a per-tracker one:
        `foreach (var tracker in config.Trackers.Values where tracker.Polling.Enabled)` and
        registers one IHostedService instance per tracker. Polling-enabled is a per-tracker flag
        — see step "tracker-polling-config" below for the schema addition.

    (3) Per-tracker polling config. Polling.Enabled / Interval / Jitter live today on
        ResolvedProject.Polling (per-project). For per-tracker pollers we need the polling
        settings on the tracker. Add `polling: { enabled, interval_seconds, jitter_percent }` block
        to the tracker schema (config/agentsmith.schema.json) and TrackerConnection record.
        Existing ResolvedProject.Polling stays for backwards-compat but is IGNORED by the new
        per-tracker pollers (existing field is logged as a deprecation warning at config-load if
        set; validator emits a warning, not an error). Operators migrate by moving the polling
        block from project to tracker.

    (4) Polling-loop body migration. Each poller's loop today:
          a. tracker.client.PullOpenTickets() (or equivalent fetch)
          b. for each ticket: pipeline = PipelineResolver.Resolve(trigger, t.Labels) ?? "fix-bug"
          c. enqueue ClaimRequest / PipelineRequest directly
        Post-p0140c:
          a. tracker.client.PullOpenTickets() — UNCHANGED, but now ALL open tickets across all
             projects sharing this tracker
          b. for each ticket:
             i.   envelope = BuildIncomingTicketEnvelope(ticket, trackerType) — uses the same
                  per-platform envelope-builder helper introduced in p0140b
                  (src/AgentSmith.Server/Services/Webhooks/WebhookEnvelopeBuilders.cs)
             ii.  matches = projectResolver.Resolve(config, envelope)
             iii. for each match: project = config.Projects[match.ProjectName]; check that
                  ticket.Status is in project's trigger.TriggerStatuses (if non-empty); if yes,
                  spawnPipelineRunsUseCase.ExecuteAsync(project, match.PipelineName, envelope, ct)
             iv.  zero-match handling: structured log (as in p0140b), no comment from the
                  polling path even when tracker.ZeroMatchComment is true — commenting on every
                  unmatched polled ticket would be noisy (most open tickets in a multi-tenant
                  tracker are not agent-smith work). The comment-on-zero-match contract stays
                  webhook-only.

    (5) Already-seen / dedupe handling. Pollers today don't re-process a ticket that's already
        in-flight or recently completed. Inspect the polling lifecycle (TicketClaimService /
        TicketLifecycleStatus reads) and KEEP whatever dedupe path exists today — adapt only
        the ctor surface, not the dedupe logic. If today's dedupe lives in TicketClaimService
        and is project-keyed, switch to (tracker, ticket-id) key. Document the change in
        decisions.md.

    (6) StartupSummaryLogger update. src/AgentSmith.Server/Services/StartupSummaryLogger.cs at
        line 29 currently formats per-project polling source info. Adapt to list per-tracker
        polling: "Polling tracker {Name} ({Type}) every {Interval}s for projects [a, b, c]"
        where the projects-list is derived from `config.Projects.Values.Where(p => p.Tracker.Name == tracker.Name)`.

    (7) Test pack. (a) Each poller's test file in tests/AgentSmith.Tests/Services/Polling/
        adapts to the new ctor — substitute the TrackerConnection-only constructor + add a
        stubbed ProjectResolver + stubbed SpawnPipelineRunsUseCase. The existing behavior tests
        (label-matching, polling-interval, jitter) stay green with adapted setup. (b) New tests
        per platform: PollingViaResolver_TwoProjectsShareTracker_TicketWithAlphaTag_SpawnsOnlyAlpha;
        PollingViaResolver_TicketStatusNotInProjectTriggerStatuses_SkipsProject;
        PollingViaResolver_ZeroMatch_LogsStructuredEventNoComment;
        PollingViaResolver_TwoProjectsMatchSameTicket_BothSpawn. (c) Per-tracker polling-config
        binding tests: TrackerConnection_PollingBlockBinds_FromYaml + per-project Polling block
        is logged as deprecated.

  out: |
    Removal of ResolvedProject.Polling. The field stays as a deprecated-but-tolerated input for
    one release; the cleanup is its own follow-up phase once operator configs are migrated.

    Webhook handler changes. p0140b already migrated all 11 handlers. p0140c only touches polling.

    .Repo shim removal. The pollers don't use .Repo today; the per-tracker pollers don't either
    (they operate on tracker + envelope). Shim removal is p0140d's job.

    Metrics counters. p0140e.

    Renaming Pollers from "{Platform}IssuePoller" to "{Platform}TrackerPoller" to reflect the
    new per-tracker semantics. Tempting but invasive — file-rename across the test pack +
    decision-doc references. Stick with the existing names; the per-tracker behavior is
    documented in the class XML doc-comment.

decisions:
  - key: "Pollers go per-tracker, not per-(tracker, project) pair. Reason: the only thing a
      poller needs to know about a tracker is how to authenticate and which endpoints to pull.
      Pulling per-(tracker, project) pair would duplicate the pull when N projects share a tracker
      — the exact symptom this slice exists to solve. Per-tracker keeps the pull minimal; the
      per-project filtering happens at the ProjectResolver match step + the trigger_statuses
      secondary filter."
  - key: "Polling block moves from ResolvedProject.Polling to TrackerConnection.Polling.
      Per-tracker pollers need per-tracker polling cadence — different trackers can pull at
      different intervals. Keeping a per-project polling block as the input shape would mean a
      tracker with N projects has N conflicting polling configs; that ambiguity isn't worth
      preserving. Deprecate the project-level block (warn at load, ignore for polling) and
      remove in a follow-up."
  - key: "Trigger-statuses filtering moves from poller to spawner-path. Today pollers pre-filter
      tickets by trigger.TriggerStatuses before enqueueing. Post-p0140c the per-tracker poller
      pulls all open tickets (because it doesn't know which project's trigger_statuses to
      consult), and the per-match spawn step checks the trigger_statuses of the matched
      project's trigger block. Tickets that match the resolver but fall outside trigger_statuses
      are dropped with a structured log. Slightly broader pull, more accurate routing."
  - key: "Zero-match polling-path is log-only (never comments) even when tracker.ZeroMatchComment
      is true. Reason: in a multi-tenant tracker the open-tickets pool is overwhelmingly NOT
      agent-smith work. Commenting on every unmatched polled ticket would generate operator
      noise that defeats the dashboard. The comment-on-zero-match flag remains webhook-only —
      a webhook event is an explicit signal that the operator wired SOMETHING to fire, so a
      zero-match comment there is forensically valuable. Polling is a discovery sweep, and
      most discoveries are negatives."
  - key: "Dedupe key stays whatever it is today (likely (project, ticket-id) via
      TicketClaimService). Reason: the dedupe logic was tested and battle-hardened in earlier
      phases; redesigning it here would expand scope. The key changes from (project, ticket-id)
      to (tracker, ticket-id) — tracker is the right granularity because a ticket-id is unique
      within one tracker — but the mechanism (Redis claim lock, lifecycle status reads, etc.)
      stays."

steps:
  - id: tracker-polling-config
    action: "Add polling block to TrackerConnection + schema; deprecate project-level Polling"
    modify:
      - "config/agentsmith.schema.json: tracker $def gains optional `polling: { enabled: bool, interval_seconds: int, jitter_percent: int }` block. Validator does not require it (tracker without polling = no polling for that tracker)."
      - "src/AgentSmith.Contracts/Models/Configuration/TrackerConnection.cs: new property `PollingConfig Polling { get; init; } = new();` using the existing PollingConfig record."
      - "src/AgentSmith.Infrastructure.Core/Services/Configuration/TrackerCatalogBuilder.cs (or RawTrackerEntry — confirm path): bind the new polling block from YAML."
    new:
      - "src/AgentSmith.Application/Services/Configuration/PollingConfigDeprecationWarner.cs: ~30 lines. Service called after config load; emits a structured warning log for every project that has a non-default Polling block (Enabled=true OR Interval!=0). 'Project {X} declares project-level polling — p0140c moved polling to trackers. Move the polling: block to tracker {Y}.'"
      - "Register PollingConfigDeprecationWarner in ServiceCollectionExtensions; invoke it from the same Server startup gate that runs AgentSmithConfigValidator."

  - id: poller-ctor-surface
    action: "Change all four pollers' ctors from per-project to per-tracker"
    modify:
      - "src/AgentSmith.Application/Services/Polling/GitHubIssuePoller.cs: ctor drops `string projectName, ResolvedProject projectConfig`; adds `TrackerConnection tracker`. Stored as `_tracker`. The polling-interval read switches from projectConfig.Polling to _tracker.Polling."
      - "src/AgentSmith.Application/Services/Polling/GitLabIssuePoller.cs: same."
      - "src/AgentSmith.Application/Services/Polling/AzureDevOpsWorkItemPoller.cs: same."
      - "src/AgentSmith.Application/Services/Polling/JiraIssuePoller.cs: same."

  - id: poller-loop-body
    action: "Migrate poll loop body from direct enqueue to envelope + ProjectResolver + SpawnPipelineRunsUseCase"
    modify:
      - "Per poller: replace `var pipeline = PipelineResolver.Resolve(trigger, t.Labels) ?? \"fix-bug\"; await Enqueue(...)` with `var envelope = WebhookEnvelopeBuilders.BuildFor{Platform}(ticket, tracker); var matches = projectResolver.Resolve(_config, envelope); foreach (var match in matches) { var project = _config.Projects[match.ProjectName]; var trigger = SelectTriggerFor(project, _tracker.Type); if (trigger.TriggerStatuses.Count == 0 || trigger.TriggerStatuses.Contains(ticket.Status, StringComparer.OrdinalIgnoreCase)) { await _spawn.ExecuteAsync(project, match.PipelineName, envelope, ct); } else { _logger.LogInformation(\"polling-status-filter: ticket {Id} status '{Status}' not in trigger_statuses [{List}] for project '{P}' — skip\", ticket.Id, ticket.Status, string.Join(\",\", trigger.TriggerStatuses), project.Name); } }`."
      - "Pollers gain ctor deps: AgentSmithConfig (via IConfigurationLoader or IOptions; confirm at execution time), ProjectResolver, ISpawnPipelineRunsUseCase, ILogger<T>."
    new:
      - "src/AgentSmith.Application/Services/Polling/TriggerSelectionHelper.cs: ~25 lines. Static helper `SelectTriggerFor(ResolvedProject project, TrackerType type)` returns the right WebhookTriggerConfig (project.GithubTrigger / GitlabTrigger / AzuredevopsTrigger / JiraTrigger) or an empty default when null. Used by both poller and (optionally) ProjectResolver internals; keep DRY."

  - id: di-rewire
    action: "Polling DI registration switches from per-project to per-tracker"
    modify:
      - "src/AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs OR src/AgentSmith.Server/Extensions/* (confirm at execution time via grep for `AddHostedService.*Poller` and `IHostedService.*Polling`): per-tracker registration loop. Pseudo: `foreach (var (name, tracker) in config.Trackers) { if (!tracker.Polling.Enabled) continue; services.AddHostedService(sp => CreatePoller(tracker, sp)); }` where CreatePoller switches on tracker.Type to instantiate the right poller class."
      - "Remove the old per-project polling-hosted-service registration loop."

  - id: startup-summary
    action: "StartupSummaryLogger shows per-tracker polling with the projects-sharing-tracker list"
    modify:
      - "src/AgentSmith.Server/Services/StartupSummaryLogger.cs: rewrite the polling section. For each tracker with Polling.Enabled, emit `Polling tracker '{tracker.Name}' ({tracker.Type}) every {interval}s — serving projects: {list}` where list is the comma-joined project names that reference this tracker. If a project declared project-level polling (deprecated), include `[deprecated project-level polling on {project} ignored]` in the log line."

  - id: tests
    action: "Adapt existing per-poller tests, add per-tracker behavior tests"
    modify:
      - "tests/AgentSmith.Tests/Services/Polling/GitHubIssuePollerTests.cs: ctor adapts to TrackerConnection; existing tests stay semantically equivalent (label-matching, jitter, interval honored)."
      - "tests/AgentSmith.Tests/Services/Polling/GitLabIssuePollerTests.cs: same."
      - "tests/AgentSmith.Tests/Services/Polling/AzureDevOpsWorkItemPollerTests.cs: same."
      - "tests/AgentSmith.Tests/Services/Polling/JiraIssuePollerTests.cs: same."
    new:
      - "tests/AgentSmith.Tests/Services/Polling/PerTrackerPollerRoutingTests.cs: ~6 tests. PollingViaResolver_TwoProjectsShareTracker_TicketWithAlphaTag_SpawnsOnlyAlpha; PollingViaResolver_TicketStatusNotInProjectTriggerStatuses_SkipsProject; PollingViaResolver_ZeroMatch_LogsStructuredEventNoComment; PollingViaResolver_TwoProjectsMatchSameTicket_BothSpawn; PollingViaResolver_DedupesProcessedTickets_PerTrackerKey; PollingViaResolver_TrackerWithNoMatchingProjects_NoSpawns."
      - "tests/AgentSmith.Tests/Configuration/TrackerPollingConfigBindingTests.cs: ~3 tests. TrackerConnection_PollingBlockBinds_FromYaml; TrackerConnection_PollingBlockOmitted_DefaultsToDisabled; ConfigLoad_ProjectLevelPolling_EmitsDeprecationWarning."

tests:
  - "GitHubIssuePoller_CtorTakesTrackerConnection_NotProject"
  - "GitLabIssuePoller_CtorTakesTrackerConnection_NotProject"
  - "AzureDevOpsWorkItemPoller_CtorTakesTrackerConnection_NotProject"
  - "JiraIssuePoller_CtorTakesTrackerConnection_NotProject"
  - "PollingViaResolver_TwoProjectsShareTracker_TicketWithAlphaTag_SpawnsOnlyAlpha"
  - "PollingViaResolver_TicketStatusNotInProjectTriggerStatuses_SkipsProject"
  - "PollingViaResolver_ZeroMatch_LogsStructuredEventNoComment"
  - "PollingViaResolver_TwoProjectsMatchSameTicket_BothSpawn"
  - "PollingViaResolver_DedupesProcessedTickets_PerTrackerKey"
  - "PollingViaResolver_TrackerWithNoMatchingProjects_NoSpawns"
  - "TrackerConnection_PollingBlockBinds_FromYaml"
  - "TrackerConnection_PollingBlockOmitted_DefaultsToDisabled"
  - "ConfigLoad_ProjectLevelPolling_EmitsDeprecationWarning"
  - "StartupSummaryLogger_PerTrackerPolling_ListsServingProjects"

done:
  - "All four pollers take TrackerConnection in their constructor; no poller references ResolvedProject"
  - "Polling DI registration is per-tracker; one IHostedService per polling-enabled tracker"
  - "TrackerConnection has a Polling block; schema accepts polling: under tracker"
  - "ResolvedProject.Polling at load is logged as deprecated (warning only, not error)"
  - "Each poller's loop builds IncomingTicketEnvelope, calls ProjectResolver, calls SpawnPipelineRunsUseCase per match"
  - "Per-match trigger_statuses filter applied; tickets falling outside it are dropped with a structured log entry"
  - "Polling zero-match path logs only — does NOT comment even when tracker.ZeroMatchComment is true"
  - "StartupSummaryLogger groups polling display per tracker with the projects-served list"
  - "Existing per-poller behavior tests adapt to the new ctor; ~10 new tests cover per-tracker routing behavior"
  - "Dogfood agentsmith.yml updates: move existing project-level polling block on todo-list-azuredevops to its tracker (todo-list-ado); validator no longer warns"
  - "All existing tests green, no regression in baseline"
