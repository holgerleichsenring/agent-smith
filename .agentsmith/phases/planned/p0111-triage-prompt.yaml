role: triage_agent
task: assign skills to roles in pipeline phases
output_format: single_line_json
output_schema_ref: triage-output.schema.json

decision_procedure:
  step_1_relevance:
    for_each: skill in available_skills
    activate_iff:
      - at_least_one_match: skill.activation.positive vs ticket
      - no_match: skill.activation.negative vs ticket

  step_2_role_assignment:
    for_each: relevant_skill
    candidate_roles: skill.roles_supported
    assign_iff:
      - at_least_one_match: skill.role_assignment[role].positive vs ticket
      - no_match: skill.role_assignment[role].negative vs ticket

  step_3_phase_distribution:
    plan:
      lead: at_most_one
      analysts: zero_or_more
    review:
      reviewers: zero_or_more
    final:
      filter: zero_or_one

tie_breaks:
  multiple_lead_candidates:
    rule: pick_skill_with_most_central_positive_keys
    fallback: alphabetical_by_skill_name
    document_with_key: tiebreak_alpha

label_overrides:
  pattern: "agent-smith:skip:<skill>"
  effect: remove_from_all_roles
  precedence: hard_override

  pattern: "agent-smith:no-test-adaption"
  effect: remove_skill[tester]_from_all_roles
  precedence: hard_override

rationale_grammar:
  format: "<role>=<skill>:<key>;"
  negative_format: "-<skill>:<key>;"
  max_chars: 300
  key_constraint: must_exist_in_skill.activation_or_role_assignment_keys
  invented_keys: rejected_by_validation

confidence_scale:
  90_100: clear_mapping_no_ambiguity
  70_89: clear_mapping_minor_uncertainty
  50_69: ambiguous
  below_50: do_not_proceed_request_clarification

forbidden_in_output:
  - markdown
  - newlines_in_json
  - explanation_outside_rationale
  - keys_not_declared_by_cited_skill
  - roles_not_in_skill.roles_supported