# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0140b
goal: "Wire up the actual multi-repo fan-out. All 11 webhook handlers in src/AgentSmith.Server/Services/Webhooks/ stop using their per-handler static FindProject and instead build an IncomingTicketEnvelope, call the p0140a ProjectResolver, and hand each resolved (project, pipeline) pair to a new SpawnPipelineRunsUseCase that enqueues one PipelineRequest per repo in the project's Repos list. After p0140b a single ticket on a multi-repo project produces N parallel pipeline runs; a ticket matching no project drops with a structured log; a ticket matching multiple projects spawns all of them."

requires: ["p0140a"]

scope:
  in: |
    (1) SpawnPipelineRunsUseCase (src/AgentSmith.Application/Services/Spawning/). Takes a
        ResolvedProject + pipeline name + IncomingTicketEnvelope. For each repo in
        project.Repos: builds a PipelineRequest (today's IRedisJobQueue payload shape) carrying
        the resolved repo identity, the resolved pipeline name, the ticket envelope's TicketId
        and InitialContext. Enqueues each request via IRedisJobQueue.EnqueueAsync.

    (2) Per-pipeline-overrides (agent + skills_path) actually applied. PipelineConfigResolver
        already merges PipelineDefinition.Agent and SkillsPath into ResolvedPipelineConfig; the
        SpawnPipelineRunsUseCase ensures the enqueued PipelineRequest carries enough context for
        the consumer side (PipelineExecutor) to look up the right pipeline config.

    (3) Webhook handler migration (11 handlers in src/AgentSmith.Server/Services/Webhooks/).
        Each handler today does:
          var (projectName, trigger) = FindProject(config, repoUrlOrPayload);
          if (projectName is null) return WebhookResult.NotHandled;
          ... build WebhookResult ...
        Post-p0140b each handler does:
          var envelope = BuildEnvelope(payload);
          var matches = await projectResolver.ResolveAsync(config, envelope);
          if (matches.Count == 0) { logger.StructuredZeroMatch(envelope);
              if (tracker.ZeroMatchComment && provider.SupportsComments)
                  await provider.UpdateStatusAsync(envelope.TicketId, ZeroMatchText, ct);
              return WebhookResult.NotHandled; }
          foreach (var match in matches)
              await spawnPipelineRunsUseCase.ExecuteAsync(match.Project, match.Pipeline, envelope, ct);
          return WebhookResult.Handled;
        The 11 handlers: GitHubIssueWebhookHandler, GitHubIssueCommentWebhookHandler (+
        PR-label variants), GitLabIssueWebhookHandler, GitLabIssueCommentWebhookHandler,
        GitLabMrCommentWebhookHandler, GitLabMrLabelWebhookHandler,
        AzureDevOpsWorkItemWebhookHandler, AzureDevOpsWorkItemCommentWebhookHandler,
        AzureDevOpsPrCommentWebhookHandler, JiraCommentWebhookHandler,
        JiraAssigneeWebhookHandler.

    (4) Zero-match handling. Always emit a structured info-level log entry with
        { event: 'zero_match', tracker, ticket_id, ticket_url, labels, area_path, to_address }.
        Only when tracker.ZeroMatchComment == true AND provider.SupportsComments == true, also
        post a tracker comment 'no agent-smith project matched this ticket'. The capability check
        is explicit, not try/catch.

    (5) Writeback gains repo identity. CommitAndPRHandler + InitCommitHandler append the
        repo name (RepoConnection.Name) to the comment-summary text so a ticket receiving N
        comments from N sibling runs reads cleanly. Format: '## Agent Smith - Completed in
        <repo-name>'.

    (6) Tests (~12 new). SpawnPipelineRunsUseCaseTests: one-repo enqueues one, three-repos
        enqueues three, override-agent honored, override-skills-path honored. WebhookHandler
        zero-match tests (one per handler-family is enough): logs structured event,
        opted-in tracker writes comment, opted-in-but-no-SupportsComments writes only log.
        Multi-repo end-to-end smoke: a ticket on a 3-repo project produces 3 PipelineRequest
        enqueues. Single-repo regression: today's flows produce bit-for-bit identical request
        shape.

  out: |
    Pollers. Polling-side migration to per-tracker resolution is p0140c — currently pollers
    receive ResolvedProject from DI per-project, structurally unchanged in p0140b.

    ResolvedProject.Repo shim removal. The 18 consumer sites still use .Repo. The shim
    asserts Repos.Count == 1; since p0140b's SpawnPipelineRunsUseCase enqueues one
    PipelineRequest per repo, each consumer ResolvedProject (the one PipelineExecutor sees
    inside a single run) effectively has one repo. Multi-repo behaviour works without
    touching the shim. Shim removal is p0140d.

    Metrics counters (agent_smith_ambiguous_resolution_total,
    agent_smith_pipeline_skipped_as_irrelevant_total) and the metrics infrastructure
    introduction (System.Diagnostics.Metrics). p0140e.

    Docs (multi-repo.md, project-resolution.md). Land with p0140e — once the full picture
    is stable, the docs make sense to write.

decisions:
  - key: "Per-PipelineRequest enqueue is one-per-repo, materialised at SpawnPipelineRunsUseCase
      time, not at consumer time. Reason: keeps the consumer side (PipelineExecutor) on the
      single-repo model the .Repo shim assumes. Each enqueued request carries one repo's
      worth of context; downstream sees no multi-repo at all. This is what makes the
      .Repo shim removal a separate phase (p0140d) rather than a blocker."
  - key: "Webhook handlers fan out to SpawnPipelineRunsUseCase, NOT directly to
      IRedisJobQueue. Reason: SpawnPipelineRunsUseCase encapsulates the per-repo loop +
      the override resolution. Bypassing it from a handler would duplicate that logic in
      11 places."
  - key: "Repo-identity in writeback comment goes here, not in p0140a. Reason: today (and in
      p0140a) a ticket receives at most one comment per run; repo identity in the comment is
      noise. Starting in p0140b a ticket can receive N comments — at that point repo
      identity is essential for readability. Coupling the comment change to the fan-out change
      keeps the motive obvious."
  - key: "Zero-match comment defaults off. Multi-tenant trackers are the realistic majority.
      Single-tenant operators opt in via tracker.ZeroMatchComment = true. (Matches p0140a
      schema decision; p0140b is where the default takes effect at runtime.)"

steps:
  - id: spawn-usecase
    action: "SpawnPipelineRunsUseCase that turns a (project, pipeline, envelope) into N PipelineRequest enqueues"
    new:
      - "src/AgentSmith.Application/Services/Spawning/SpawnPipelineRunsUseCase.cs: ctor IRedisJobQueue + IPipelineConfigResolver. ExecuteAsync(ResolvedProject, string pipelineName, IncomingTicketEnvelope, ct): for each RepoConnection in project.Repos: build PipelineRequest with ProjectName=project.Name, PipelineName=pipelineName, TicketId from envelope.TicketId, Context=BuildInitialContext(envelope, repo). Enqueue via _jobQueue.EnqueueAsync(request, ct)."

  - id: webhook-migration
    action: "Migrate all 11 webhook handlers to envelope + ProjectResolver + SpawnPipelineRunsUseCase"
    modify:
      - "src/AgentSmith.Server/Services/Webhooks/GitHubIssueWebhookHandler.cs: ctor gains IProjectResolver + ISpawnPipelineRunsUseCase + ITicketProviderFactory + ILogger. Replace FindProject + ClaimRequest flow with BuildEnvelope + ResolveAsync + ZeroMatchHandle + Spawn loop."
      - "src/AgentSmith.Server/Services/Webhooks/GitHubIssueCommentWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/GitLabIssueWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/GitLabIssueCommentWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/GitLabMrCommentWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/GitLabMrLabelWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/AzureDevOpsWorkItemWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/AzureDevOpsWorkItemCommentWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/AzureDevOpsPrCommentWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/JiraCommentWebhookHandler.cs: same pattern."
      - "src/AgentSmith.Server/Services/Webhooks/JiraAssigneeWebhookHandler.cs: same pattern."
    new:
      - "src/AgentSmith.Server/Services/Webhooks/WebhookEnvelopeBuilders.cs: per-platform helper functions to build IncomingTicketEnvelope from each handler's payload type. Keeps the handlers thin and concentrates payload-shape knowledge in one file."

  - id: writeback-repo-identity
    action: "Add repo name to CommitAndPR + InitCommit writeback comment summaries"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/CommitAndPRHandler.cs: include context.RepoConnection.Name in the summary header (## Agent Smith - Completed in {repoName})."
      - "src/AgentSmith.Application/Services/Handlers/InitCommitHandler.cs: same pattern."

  - id: tests
    action: "SpawnPipelineRunsUseCase + 4 representative webhook-handler zero-match tests + multi-repo end-to-end smoke"
    new:
      - "tests/AgentSmith.Tests/Spawning/SpawnPipelineRunsUseCaseTests.cs: 4 tests. OneRepo_EnqueuesOneRun, ThreeRepos_EnqueuesThreeRunsInParallel, PipelineWithAgentOverride_RequestCarriesOverride, PipelineWithoutOverride_RequestCarriesProjectDefault."
      - "tests/AgentSmith.Tests/Webhooks/WebhookZeroMatchTests.cs: 4 tests (one per tracker family). DropsTicket_AndLogsStructuredEvent for github/gitlab/azuredevops/jira. ZeroMatchCommentOptIn + SupportsComments → comment also written. ZeroMatchCommentOptIn but provider.SupportsComments=false → log only, no crash."
      - "tests/AgentSmith.Tests/EndToEnd/MultiRepoSmokeTests.cs: 1 test. ThreeRepos_OneTicket_EnqueuesThreePipelineRequests."
      - "tests/AgentSmith.Tests/EndToEnd/SingleRepoRegressionTests.cs: 1 test per tracker family. Asserts the pre-p0140b request shape is preserved bit-for-bit for single-repo projects."
    modify:
      - "tests/AgentSmith.Tests/Webhooks/*.cs: every existing handler-test adapts to inject IProjectResolver mock + ISpawnPipelineRunsUseCase mock; assertions move from 'ClaimRequest with project X' to 'spawnUseCase invoked with project X'."

tests:
  - "SpawnPipelineRuns_OneRepo_EnqueuesOneRun"
  - "SpawnPipelineRuns_ThreeRepos_EnqueuesThreeRunsInParallel"
  - "SpawnPipelineRuns_PipelineWithAgentOverride_RequestCarriesOverride"
  - "SpawnPipelineRuns_PipelineWithoutOverride_RequestCarriesProjectDefault"
  - "WebhookHandler_GitHub_ZeroMatch_DropsTicket_AndLogsStructuredEvent"
  - "WebhookHandler_GitLab_ZeroMatch_DropsTicket_AndLogsStructuredEvent"
  - "WebhookHandler_AzureDevOps_ZeroMatch_DropsTicket_AndLogsStructuredEvent"
  - "WebhookHandler_Jira_ZeroMatch_DropsTicket_AndLogsStructuredEvent"
  - "WebhookHandler_ZeroMatch_TrackerOptedIn_AlsoWritesComment"
  - "WebhookHandler_ZeroMatch_TrackerOptedIn_ButSupportsCommentsFalse_LogsOnlyNoCrash"
  - "MultiRepoSmoke_ThreeRepos_OneTicket_EnqueuesThreePipelineRequests"
  - "SingleRepoRegression_AgentSmith_ProducesIdenticalRequestShapeAsPreP0140b"

done:
  - "SpawnPipelineRunsUseCase exists, is DI-registered, and is the only place that enqueues PipelineRequest from a webhook envelope"
  - "All 11 webhook handlers route through IProjectResolver + ISpawnPipelineRunsUseCase; no handler retains the static FindProject pattern"
  - "Zero-match: always structured-logged; optionally also commented per tracker.ZeroMatchComment + provider.SupportsComments"
  - "Multi-match: every matched project's pipeline gets enqueued (deliberate, per p0140-umbrella decision)"
  - "CommitAndPR + InitCommit writeback include repo name in the summary"
  - "Multi-repo end-to-end smoke green: 3 repos → 3 PipelineRequest enqueues"
  - "Single-repo regression green: agent-smith project produces identical request shape to pre-p0140b"
  - "All existing webhook tests adapted, no regression in baseline test count"
  - "Pollers still per-project (p0140c). .Repo shim still in place (p0140d). No metrics yet (p0140e)."
