# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0115
goal: "AgentSmith.Sandbox.Agent — a standalone .NET single-file executable that runs inside a sandbox container, reads Steps from Redis, executes them as shell commands, and streams output/result back to Redis. Pure worker component — knows nothing about providers, tickets, or pipelines. Shipped as a single toolchain-agnostic carrier image (`agent-smith-sandbox-agent`) that injects the binary into any official toolchain image via an init-container in the sandbox pod (Server-side wiring lands in p0116). V1 proves the pattern against the dotnet toolchain."

requires: []

scope:
  in: "Agent binary, JobLoop, StepExecutor, Redis wire format (Step/StepEvent/StepResult as JSON), Dockerfile for the carrier image agent-smith-sandbox-agent:1.0 (~80 MB, minimal base, ENTRYPOINT copies binary to a shared volume), unit tests against an in-process Redis mock, one integration test against a real Redis (Testcontainers), CI build that publishes the carrier image to Docker Hub, a smoke test proving the init-container injection works against an unmodified mcr.microsoft.com/dotnet/sdk:8.0 pod."
  out: "Server-pod-side SandboxFactory and the actual K8s Pod object construction (lands in p0116). Migration of AgenticExecuteHandler / TestHandler (lands in p0116). Cancellation/heartbeat (post-demo, not now). Pre-baked per-toolchain images of any kind — we never build those; the init-container pattern means operators bring their own toolchain image unmodified."

decisions:
  - key: "Self-contained single-file build, NOT trimmed. Same pattern as p52 used for the CLI: PublishSingleFile=true, SelfContained=true, IncludeNativeLibrariesForSelfExtract=true, PublishTrimmed=false. Trimming breaks StackExchange.Redis reflection paths. ~70 MB binary, runs on any Linux with glibc 2.28+ (all current distros)."

  - key: "Redis is the only I/O channel. No HTTP server in the agent, no gRPC endpoints, no file drop. Three Redis keys per job: sandbox:{jobId}:in (LIST — Server pushes Steps via LPUSH, Agent pulls via BRPOP), sandbox:{jobId}:events (STREAM — Agent pushes stdout/stderr lines via XADD), sandbox:{jobId}:results (LIST — Agent pushes StepResult JSON via LPUSH after each Step). Streams for output because they are ordered, persistent, and range-readable; lists for input/result because BRPOP/LPOP are atomic enough and no range read is needed."

  - key: "Wire format is JSON via System.Text.Json — no Protobuf, no MessagePack. Per-job volume is small (KB range for steps, MB range for stdout streams); performance isn't the bottleneck. JSON is trivially debuggable with `redis-cli LRANGE`, which matters more during the demo phase than a 5% size saving. Records are versioned via an explicit top-level `schemaVersion` field, V1 = 1."

  - key: "Step format is minimal: { schemaVersion, stepId (GUID), kind (enum: Run | Shutdown, default Run), command (string?), args (string[]?), workingDirectory (string?), env (Dict<string,string>?), timeoutSeconds (int, default 600) }. No 'type' field, no plugin system, no built-in actions. For Kind=Run, command/args are required (validation in JobLoop). For Kind=Shutdown, command/args are ignored. Every Run step is a shell command. `git clone` is just as much a Step as `dotnet test`. If the Server pod wants something more specialized, it composes the command itself and sends it that way."

  - key: "Source-tree acquisition is NOT an agent concept. The agent only knows 'process steps'. /work starts as an empty emptyDir volume. Pipelines with a repo: the Server pod sends a `git clone` as Step #1. Pipelines without a repo: the Server pod sends the first real Step directly. This keeps the agent fully source-agnostic and composable — same pattern for every source (GitHub, AzDO, GitLab, local tar via cp, …)."

  - key: "Git credentials flow via pod env vars, NOT via step.Env. Reasoning: step.Env lands in the Redis stream and is readable through `redis-cli`; pod env is only visible via `kubectl describe` (RBAC-gated). The Server pod creates the sandbox pod with `env: [{ name: GIT_TOKEN, valueFrom: { secretKeyRef: { name: agentsmith-secrets, key: github-token } } }]`. Process.Start inherits pod env to children automatically. Step #1 (clone) uses git's inline credential.helper: `git -c credential.helper='!f() { echo \"username=x-access-token\"; echo \"password=$GIT_TOKEN\"; }; f' clone https://github.com/foo/bar.git .`. The token never lands in stdout, never in step.Env, never in Redis."

  - key: "StepExecutor streams events soft-batched: 50 lines OR 100 ms — whichever fires first. Final flush at step end is guaranteed. The executor accumulates into a List<StepEvent> buffer behind a lock. Timer 100 ms + threshold 50 → Buffer.ToArray() → onEvents (note the plural!). The batch is handed to RedisJobBus.EnqueueEventsBatch (sync, TryWrite into the channel) — a background consumer task in RedisJobBus then aggregates via StackExchange.Redis IBatch and pushes one round-trip instead of N (see resilience decision below). Stdout and stderr readers both write into the same buffer (interleaved-output ordering is best-effort, sufficient for the demo). Reduces XADD rate by a factor of ~50 on verbose output without compromising the live-progress feel (100 ms is visually imperceptible)."

  - key: "Redis-blip resilience via an in-memory Channel<StepEvent> with capacity 1000 inside RedisJobBus. One producer (StepExecutor pushes events into the channel), one consumer task (issues XADDs in batches). On XADD failure: 3 retries with backoff (200 ms, 1 s, 5 s), then drop + log warn. On channel-full (TryWrite=false): drop oldest, log warn. The agent only crashes on total Redis unreachability >30 s (ConnectionMultiplexer's ConnectRetry limit then kicks in). DisposeAsync flushes pending events before returning. Protects 5-minute builds against 200 ms network hiccups without killing the agent."

  - key: "Working directory per job is /work (hardcoded, not configurable). emptyDir volume mounted from outside, owned by the agent process. Steps that don't specify a workingDirectory run in /work. Not /tmp, because some containers lock /tmp against writes. Not the HOME directory, because that varies per base image."

  - key: "Run-once mode is the only mode. The agent accepts steps until it receives one with Kind=Shutdown. Then exit 0. No daemon mode, no multi-job pooling. Pipeline lifetime = pod lifetime = agent lifetime. Matches AzDO's --once pattern and is easier to reason about than any variant with job switching."

  - key: "Per-step timeout, no job timeout. If a step doesn't finish within 600 s, the agent kills the process (SIGTERM, then SIGKILL after a 10 s grace) and pushes a StepResult with ExitCode=-1, TimedOut=true. Job-level timeouts are the Server pod's responsibility — it can push a Kind=Shutdown step and then delete the pod via the K8s API. That's Server territory, not agent territory."

  - key: "On crash: the agent catches unhandled exceptions in Main, logs to stderr (which lands in K8s logs), exits non-zero. No 'try to clean up' path. If the agent dies, the pod dies; the Server pod sees Pod.Status=Failed and treats it as a pipeline failure. Robust over complex."

  - key: "Redis connection: StackExchange.Redis (existing dependency), ConnectionMultiplexer with AbortOnConnectFail=false and 5 reconnect attempts. If Redis is unreachable for 30 s (ConnectRetry limit hit), the agent exits with an error — at that point we assume the whole cluster has a bigger problem. Shorter blips are absorbed by the channel buffer + retry loop (see the resilience decision above). Connection string comes from the --redis-url argument or the REDIS_URL env var, in that order."

  - key: "Logging: Microsoft.Extensions.Logging with the Console provider (existing dependency, same pattern as the rest of the codebase). Per step: Info level for start/end, Debug level for each stdout line (otherwise it floods the pod logs). --verbose flag enables Debug on the console too."

  - key: "ONE carrier image, NOT pre-baked toolchain images. We ship exactly one image: agent-smith-sandbox-agent. Its sole responsibility is to deliver the self-contained binary into the sandbox pod. The Server pod (p0116) constructs each sandbox Pod with TWO containers sharing an emptyDir volume mounted at /shared: (1) initContainer using agent-smith-sandbox-agent — its ENTRYPOINT copies the agent binary from /agent to /shared/agent and exits 0; (2) main container using the UNMODIFIED official toolchain image of choice (mcr.microsoft.com/dotnet/sdk:8.0, node:20, mcr.microsoft.com/openjdk/jdk:21-ubuntu, salesforce/cli:latest, …) with command: ['/shared/agent']. Rejected alternative — pre-baked sandbox-dotnet / sandbox-node / sandbox-java images: would force us to track upstream toolchain releases per language, would saddle operators with our base-image opinions, and would multiply our maintenance surface with every new toolchain. With the init-container pattern: we maintain ONE image; toolchain updates flow automatically from upstream; operator-custom toolchains work without our involvement; new languages need zero changes from us."

  - key: "Carrier image base: minimal — distroless (gcr.io/distroless/base-debian12) preferred over alpine because the self-contained .NET binary targets glibc and would need musl-bridging on alpine. Distroless lacks a shell, so the ENTRYPOINT must be a directly-executed binary; we ship a tiny shell-free copy step by setting ENTRYPOINT to a static binary. Concretely: stage 1 builds the self-contained linux-x64 agent (independent of p52 because this is its own csproj); stage 2 is gcr.io/distroless/base-debian12 with COPY --from=build /publish/AgentSmith.Sandbox.Agent /agent and a copy-helper. Decision deferred to implementation: either (a) include /bin/cp from a busybox stage at known path, or (b) write the copy as a 30-line standalone .NET tool that ships alongside the agent — pick whichever produces a smaller image at build time. Target image size: ~80 MB (vs ~900 MB for the rejected pre-baked SDK approach)."

  - key: "CI publish via GitHub Action (extension of p43a). New matrix entry in docker-publish.yml that builds the carrier image and publishes it to Docker Hub as holgerleichsenring/agent-smith-sandbox-agent:{tag}. Tag strategy identical to existing images: latest on main, semver on v* tags. Multi-arch linux/amd64 + linux/arm64. ONE image only — no -dotnet/-node/-java variants ever (see image-build decision above)."

  - key: "Tests: agent logic against an in-process mock of IDatabase (StackExchange.Redis interface) — that makes JobLoop and StepExecutor unit-testable without a real Redis. Plus ONE integration test that spins up a real Redis container via Testcontainers and runs a complete job end-to-end (push step → wait for events → assert result). That's the safety net proving the wire format actually works."

steps:
  - id: project-skeleton
    action: "Create the new project, wire it into the solution, configure the csproj"
    new:
      - "src/AgentSmith.Sandbox.Agent/AgentSmith.Sandbox.Agent.csproj: net8.0, OutputType=Exe, RootNamespace=AgentSmith.Sandbox.Agent, PublishSingleFile/SelfContained/IncludeNativeLibrariesForSelfExtract per p52, ProjectReferences to Contracts (for constants / logging setup if needed), PackageReferences: StackExchange.Redis (existing version), Microsoft.Extensions.Logging.Console, System.CommandLine."
    modify:
      - "AgentSmith.sln: add the project under solution folder 'src'."

  - id: wire-format
    action: "Define records for Step / StepEvent / StepResult"
    new:
      - "src/AgentSmith.Sandbox.Agent/Models/Step.cs: sealed record Step(int SchemaVersion, Guid StepId, StepKind Kind, string? Command, IReadOnlyList<string>? Args, string? WorkingDirectory, IReadOnlyDictionary<string, string>? Env, int TimeoutSeconds) plus enum StepKind { Run, Shutdown }. Static factory: public static Step Shutdown(Guid id) => new(1, id, StepKind.Shutdown, null, null, null, null, 0). Default Kind=Run for backward compat in case the Server pod sends old steps without a kind field (System.Text.Json deserializes a missing enum to the 0 value = Run). For Kind=Run, command/args are required; JobLoop validates before dispatching to StepExecutor."
      - "src/AgentSmith.Sandbox.Agent/Models/StepEvent.cs: sealed record StepEvent(int SchemaVersion, Guid StepId, StepEventKind Kind, string Line, DateTimeOffset Timestamp). Enum StepEventKind { Stdout, Stderr, Started, Completed }."
      - "src/AgentSmith.Sandbox.Agent/Models/StepResult.cs: sealed record StepResult(int SchemaVersion, Guid StepId, int ExitCode, bool TimedOut, double DurationSeconds, string? ErrorMessage)."
      - "src/AgentSmith.Sandbox.Agent/Models/RedisKeys.cs: static class with InputKey(string jobId), EventsKey(string jobId), ResultsKey(string jobId) returning 'sandbox:{jobId}:in' / ':events' / ':results'. Single source of truth so the Server pod (in p0116) and the agent use the same keys."
    new_files_tests:
      - "tests/AgentSmith.Sandbox.Agent.Tests/Models/StepSerializationTests.cs: Step round-trips through System.Text.Json. SchemaVersion field is preserved. Step.Shutdown(id) round-trips with Kind=Shutdown. A Step JSON without a kind field deserializes to Kind=Run (backward compat for old Server pods)."

  - id: step-executor
    action: "Process.Start wrapper that runs a Step and streams events soft-batched"
    new:
      - "src/AgentSmith.Sandbox.Agent/StepExecutor.cs: class with method `Task<StepResult> ExecuteAsync(Step step, Func<IReadOnlyList<StepEvent>, Task> onEvents, CancellationToken ct)` — note the PLURAL: onEvents takes a batch of events, not single events. Validates step.Kind == Run (Shutdown belongs in JobLoop, not StepExecutor). Starts a ProcessStartInfo with RedirectStandardOutput/Error=true, UseShellExecute=false. Reads stdout/stderr in two separate tasks line-by-line (StreamReader.ReadLineAsync); each line is appended to a shared List<StepEvent> buffer behind a lock. A third task (flush loop) checks every 100 ms OR when Buffer.Count >= 50 → Buffer.ToArray() → onEvents(batch); empties the buffer under the lock. Final flush at step end is guaranteed (in finally). Working directory is set to step.WorkingDirectory ?? \"/work\". Env vars from step.Env are added on top of the inherited environment (so pod env like GIT_TOKEN remains available). Timeout via Task.WhenAny against Task.Delay(step.TimeoutSeconds * 1000); on timeout Process.Kill(entireProcessTree: true), wait 10 s, return StepResult with TimedOut=true. A 'Started' event is pushed into the buffer before Process.Start, a 'Completed' event after exit (so both flow through the same batch path)."
    new_files_tests:
      - "tests/AgentSmith.Sandbox.Agent.Tests/StepExecutorTests.cs: tests against real subprocesses: 'echo hello' produces an onEvents batch containing a stdout event with Line='hello' and ExitCode=0. 'sh -c \"echo err >&2\"' produces a stderr event. 'sh -c \"sleep 5\"' with TimeoutSeconds=1 produces a StepResult with TimedOut=true and Duration<2s. WorkingDirectory is honored ('pwd' in /tmp returns /tmp). Env vars are set ('sh -c \"echo $FOO\"' with Env={FOO=bar} prints 'bar'). Batch behavior: 'sh -c \"for i in $(seq 1 50); do echo line$i; done\"' (50 lines in fast succession) produces 1 batch of 50 events (threshold trigger). 'sh -c \"echo a; sleep 0.2; echo b\"' produces 2 batches of 1 event each (timer trigger). Step.Shutdown(id) as input → ArgumentException or InvalidOperationException (validation, doesn't belong here)."

  - id: redis-bus
    action: "Wrapper around StackExchange.Redis for the three Redis keys, with in-memory buffering + retry for resilience"
    new:
      - "src/AgentSmith.Sandbox.Agent/RedisJobBus.cs: class with ConnectionMultiplexer + IDatabase + IAsyncDisposable. Internally constructs a Channel<(string jobId, StepEvent[])> with BoundedChannelOptions { Capacity = 1000, FullMode = DropOldest }. On connect, starts a background consumer task that reads from the channel and pushes to the events stream via IBatch.StreamAddAsync (multiple XADDs per round-trip). Methods: `Task<Step?> WaitForStepAsync(string jobId, TimeSpan timeout, CancellationToken ct)` (LMPOP / BRPOP polling), `void EnqueueEventsBatch(string jobId, IReadOnlyList<StepEvent> events)` (TryWrite onto the channel; on full → drop oldest + log warn), `Task PushResultAsync(string jobId, StepResult r)` (LPUSH onto the results list, sync because there's only one result per step). Per batch the consumer task does 3 retries with backoff (200 ms, 1 s, 5 s); on final failure → drop + log warn (no crash). DisposeAsync: Channel.Writer.Complete(), wait for consumer task to drain (max 10 s), then ConnectionMultiplexer.Dispose. Construction via static `Task<RedisJobBus> ConnectAsync(string redisUrl, ILogger logger, CancellationToken ct)` with AbortOnConnectFail=false, ConnectRetry=5."
    new_files_tests:
      - "tests/AgentSmith.Sandbox.Agent.Tests/RedisJobBusTests.cs: integration test using Testcontainers.Redis. Push step via raw LPUSH (simulating the Server pod), assert WaitForStepAsync returns it. EnqueueEventsBatch + DisposeAsync → events readable via XRANGE. A batch of 100 events lands as 1 IBatch round-trip (observable via Redis MONITOR or by timing — best-effort). PushResultAsync is readable via LRANGE. WaitForStepAsync with timeout returns null after the timeout (instead of hanging). Channel-full behavior: 1500 events in fast succession → no exception, oldest are dropped, the warn log is observable (via a TestLogger). DisposeAsync flushes pending events before returning (assert via stream length after DisposeAsync)."

  - id: job-loop
    action: "Main loop: pull step, execute, push result, repeat until Kind=Shutdown"
    new:
      - "src/AgentSmith.Sandbox.Agent/JobLoop.cs: class with `Task<int> RunAsync(string jobId, RedisJobBus bus, StepExecutor executor, ILogger logger, CancellationToken ct)`. Loop: WaitForStepAsync(60 s timeout). On null: log warn 'no step received', loop again (max 5 times, then exit code 2). On step.Kind == Shutdown: log info, exit code 0. On step.Kind == Run with Command null/empty: log error, push StepResult with ExitCode=-1 + ErrorMessage, loop again (validation failure is a step failure, not a loop failure). Otherwise: ExecuteAsync, with onEvents → bus.EnqueueEventsBatch. After completion: bus.PushResultAsync. Loop again."
    new_files_tests:
      - "tests/AgentSmith.Sandbox.Agent.Tests/JobLoopTests.cs: with mocked RedisJobBus + mocked StepExecutor. Three Run steps followed by Step.Shutdown(id) → loop processes all three in order, pushes three results, exit 0. A step that returns TimedOut=true → loop continues (timeout is a step failure, not a loop failure). A Run step without Command → StepResult with ExitCode=-1 is pushed, loop continues, no StepExecutor call. No step in 60 s × 5 → exit 2. Cancellation via the CancellationToken → exit through the OperationCanceledException path."

  - id: program-entrypoint
    action: "Main method: parse args, wire everything up, start the JobLoop"
    new:
      - "src/AgentSmith.Sandbox.Agent/Program.cs: ~50 lines. System.CommandLine setup with --redis-url (default from REDIS_URL env), --job-id (required), --verbose (flag). Logger builder (console provider, --verbose=Debug, otherwise Info). Try: bus = await RedisJobBus.ConnectAsync(...). executor = new StepExecutor(...). loop = new JobLoop(...). Cancel token from Console.CancelKeyPress. exitCode = await loop.RunAsync(...). Catch unhandled → log error, exit 3. Important: dispose everything via IDisposable correctly, otherwise Redis connections leak on shutdown."

  - id: dockerfile-agent
    action: "Multi-stage Dockerfile for the carrier image agent-smith-sandbox-agent"
    new:
      - "src/AgentSmith.Sandbox.Agent/Dockerfile: stage 1 (build) — mcr.microsoft.com/dotnet/sdk:8.0, COPY src/, dotnet publish AgentSmith.Sandbox.Agent.csproj -c Release -r linux-x64 --self-contained -o /publish. Stage 2 (carrier) — gcr.io/distroless/base-debian12, COPY --from=build /publish/AgentSmith.Sandbox.Agent /agent. The image's sole job is to make the binary available at /agent so an init-container can `cp /agent /shared/agent` into the shared volume. ENTRYPOINT decision (deferred to implementation): option A — copy /bin/cp from a busybox stage to /cp and use ENTRYPOINT [\"/cp\", \"/agent\", \"/shared/agent\"]; option B — write a 30-line standalone .NET copy tool (Inject) compiled into the same publish output and ENTRYPOINT [\"/agent\", \"--inject\", \"/shared/agent\"] (agent itself supports a self-copy mode). Pick whichever yields the smallest image. Target: ~80 MB. NO USER directive in the carrier — the runtime user comes from the toolchain main container; the init-container writes to a shared volume that needs to be world-writable or owned by the same UID as the main container (Server pod handles that via fsGroup or initContainer runAsUser)."
      - "src/AgentSmith.Sandbox.Agent/.dockerignore: bin/, obj/, *.user."

  - id: ci-publish
    action: "Extend the GitHub Action to build and publish the agent-smith-sandbox-agent carrier image"
    modify:
      - ".github/workflows/docker-publish.yml: extend the existing matrix in the 'docker' job with a third entry { image: agent-smith-sandbox-agent, dockerfile: src/AgentSmith.Sandbox.Agent/Dockerfile }. Build context = repo root (same as the other two entries). Tags: holgerleichsenring/agent-smith-sandbox-agent:latest on main, holgerleichsenring/agent-smith-sandbox-agent:{semver} on v* tags via the existing metadata-action. Multi-arch linux/amd64 + linux/arm64 (already configured in the existing job). ONE image only — no -dotnet/-node/-java variants. Operator picks the toolchain by referencing an upstream image as the main container in their pod spec."
    action_detail:
      - "Mechanically: add the matrix entry to the existing 'docker' job; do not create a parallel job. The existing job already covers QEMU, Buildx, Docker Hub login, metadata, multi-arch — all reusable as-is."
      - "OPTIONAL — extend update-dockerhub-description job with a third entry for the new image so its Docker Hub page renders deploy/DOCKERHUB_DESCRIPTION.md. Skip if the existing description is too CLI/Server-specific; in that case open a follow-up to write a sandbox-agent-specific description."

  - id: docs
    action: "Architecture documentation for the sandbox component and the init-container injection pattern"
    new:
      - "docs/concepts/sandbox-agent.md sections: (1) What the sandbox is — a worker inside a pod. (2) What it isn't — no provider/pipeline knowledge, no pre-baked toolchain. (3) The init-container injection pattern with an ASCII pod diagram (initContainer agent-smith-sandbox-agent → emptyDir /shared → main container running an unmodified upstream toolchain image with command [/shared/agent]) and a complete YAML snippet of a sample sandbox Pod that the Server pod will produce in p0116. (4) Why init-container, not pre-baked images — explicitly call out the rejected alternative (sandbox-dotnet/sandbox-node) and the rationale (one image to maintain, upstream toolchain updates flow automatically, operator-custom toolchains supported, new languages need zero changes from us). (5) Redis wire format — Step / StepEvent / StepResult example JSON. (6) Lifecycle — init → BRPOP → execute → push events → push result → repeat → shutdown. (7) Local debugging — run the agent in a docker-compose two-container setup against an upstream image to mimic the K8s init-container pattern, plus a pure docker run --rm against a local Redis."
    modify:
      - "docs/mkdocs.yml: add 'Sandbox Agent' under Concepts."
      - ".agentsmith/context.yaml: add the p0115 entry — 'AgentSmith.Sandbox.Agent — standalone worker binary plus carrier image agent-smith-sandbox-agent:1.0; init-container injection pattern (toolchain-agnostic) documented'."

  - id: validation
    action: "Two smoke tests: agent-only against a local Redis, and end-to-end init-container injection against an unmodified dotnet SDK image"
    action_detail:
      - "Smoke 1 (agent-only — fast loop): docker run --rm -d -p 6379:6379 redis:7-alpine"
      - "dotnet run --project src/AgentSmith.Sandbox.Agent -- --redis-url redis://localhost:6379 --job-id smoke-test --verbose"
      - "in a second terminal: redis-cli LPUSH sandbox:smoke-test:in '{\"schemaVersion\":1,\"stepId\":\"00000000-0000-0000-0000-000000000001\",\"kind\":\"Run\",\"command\":\"echo\",\"args\":[\"hello\"],\"workingDirectory\":null,\"env\":null,\"timeoutSeconds\":10}'"
      - "redis-cli XRANGE sandbox:smoke-test:events - + → see a stdout event with Line='hello' (within ~100 ms of the push, thanks to the soft-batch timer)"
      - "redis-cli LRANGE sandbox:smoke-test:results 0 -1 → see a StepResult with ExitCode=0"
      - "redis-cli LPUSH sandbox:smoke-test:in '{\"schemaVersion\":1,\"stepId\":\"00000000-0000-0000-0000-000000000002\",\"kind\":\"Shutdown\"}'"
      - "Agent terminates with exit 0."
      - "Smoke 2 (init-container injection — proves the carrier-image pattern): docker build -t agent-smith-sandbox-agent:smoke -f src/AgentSmith.Sandbox.Agent/Dockerfile ."
      - "docker volume create as-shared (or: use a host bind-mount in /tmp/as-shared)"
      - "docker run --rm -v as-shared:/shared agent-smith-sandbox-agent:smoke   → exits 0 after copying /agent to /shared/agent (this is the init-container behavior)"
      - "ls /var/lib/docker/volumes/as-shared/_data/agent (or /tmp/as-shared/agent)  → file exists, executable bit set"
      - "docker run --rm --network=host -v as-shared:/shared mcr.microsoft.com/dotnet/sdk:8.0 /shared/agent --redis-url redis://localhost:6379 --job-id inject-smoke --verbose   → agent boots inside the unmodified SDK image, talks to Redis, processes a step (push a step from the host as in Smoke 1), exits 0 on Shutdown."
      - "If Smoke 2 succeeds against an unmodified upstream image, the init-container pattern is validated end-to-end without ever touching K8s."

done:
  - "src/AgentSmith.Sandbox.Agent is a runnable, tested console app that talks to Redis."
  - "Wire format is serializable via System.Text.Json, schemaVersion=1 documented. Step.Kind is an enum (Run | Shutdown), default Run for backward compat."
  - "JobLoop processes Run steps in order until Kind=Shutdown or the idle timeout. Run steps without a Command are pushed as a step failure (ExitCode=-1) and the loop continues."
  - "StepExecutor streams stdout/stderr soft-batched (50 lines OR 100 ms, whichever first), respects timeouts, can kill the process tree, and guarantees a final flush at step end."
  - "RedisJobBus buffers events into Channel<T> (capacity 1000, DropOldest); the consumer task pushes via IBatch + 3 retries (200 ms / 1 s / 5 s). Absorbs Redis blips up to ~30 s without crashing the agent."
  - "Source-tree acquisition is EXPLICITLY not the agent's responsibility — the Server pod composes it as Step #1 (typically `git clone` with an inline credential.helper against pod env GIT_TOKEN). /work starts empty."
  - "src/AgentSmith.Sandbox.Agent/Dockerfile builds the carrier image agent-smith-sandbox-agent on a minimal base (~80 MB target). The image's only job is to deliver the binary at /agent so an init-container can copy it into a shared volume; it ships NO toolchain."
  - "GitHub Action matrix entry publishes holgerleichsenring/agent-smith-sandbox-agent:latest on main and semver tags on v* — exactly one image, no per-toolchain variants."
  - "Smoke 1 (agent-only against local Redis) works end-to-end."
  - "Smoke 2 (init-container injection) proves the carrier image makes the agent runnable inside an UNMODIFIED mcr.microsoft.com/dotnet/sdk:8.0 container via shared volume — the pattern p0116 will use in K8s."
  - "Unit tests + one integration test (Testcontainers) cover the core paths."
  - "docs/concepts/sandbox-agent.md explains the architecture and the wire format."
  - "Server-pod / pipeline migration is EXPLICITLY NOT PART of this phase. The agent is standalone-testable; everything else lands in p0116."
