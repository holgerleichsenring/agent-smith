# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0367-event-volume-and-load-resilience
goal: |
  A single run emits ~1350 events, overwhelmingly SandboxCommand + SandboxResult
  (one pair per tool call), and JobsBroadcaster fans EVERY run event to the Run
  SignalR group — so every open run-detail viewer is pushed the full tool-call
  firehose, and every event is also persisted. With several runs at once this
  saturates the server (the observed ECONNREFUSED bursts) and floods the client.
  Cut the volume at the source and keep the server answering connections under
  concurrent load, WITHOUT losing the meaningful signal. Assume multiple runs run
  simultaneously; the operator's window must stay responsive.

applies_to: "server"

requires:
  - p0361
  - p0363

scope:
  in: |
    Stop flooding the Run group with per-tool-call noise:
      - The Run group carries only lifecycle/meaning: StepStarted/Finished,
        LlmCallFinished, DecisionLogged, RunStoryRecorded, SandboxCreated/Disposed,
        RunStarted/Finished, GateChecked, verdict/budget. High-frequency
        SandboxCommand/SandboxResult go ONLY to the per-sandbox group (already
        on-demand via ExpandSandbox), NOT to the Run group. A run-detail view with
        no sandbox drawer open therefore receives O(steps) not O(tool-calls).
      - Optionally a periodic coalesced "sandbox activity" counter to the Run group
        (e.g. one rollup per second: "N commands, last: <cmd>") so the beat still
        shows life without the firehose.
    Persistence policy (decide what the DB keeps):
      - Keep every meaningful event (the lifecycle set above) — the DB stays the
        system-of-record for run history and the metrics.
      - SandboxCommand/SandboxResult: keep them (they back the tool-usage metrics)
        but batch the writes (one transaction per N or per interval) instead of a
        row per event on the hot path; they never drove the UI, so their write must
        not compete with the broadcast.
      - Do NOT turn raw command stdout/build output into a per-line event stream
        (it would multiply volume and is what breaks the UI). Capture build/test
        output compactly: truncated tail, persisted on the RunEvent as a payload
        field or a dedicated RunArtifact, primarily on failure — so build errors are
        finally inspectable (they are lost today) without a firehose.
    Server stays answering under load:
      - The broadcast + persist hot path must be non-blocking and back-pressure
        safe: fan-out failures to one slow/dead client must not stall the loop for
        others (per-send timeout / fire-and-forget with drop-logging).
      - Confirm/raise the Kestrel + SignalR limits that let concurrent runs + tabs
        connect (MaximumParallelInvocationsPerClient, connection backlog) so the
        server does not REFUSE connections; the ECONNREFUSED must not recur.
  out: |
    Dashboard reconnect/re-subscribe (p0366 — the client half). Transport change
    (SignalR stays). A metrics UI panel / date-time display (separate follow-up).

decisions:
  - key: |
      Route by frequency, not by type-blindness: the Run group is a MEANING channel
      (what a human watches), the Sandbox group is the DETAIL channel (opt-in via
      ExpandSandbox). Per-tool-call events belong only to the detail channel; that
      alone removes ~95% of the Run-group traffic (1350 -> ~50 per run).
  - key: |
      Persist tool-call events but off the broadcast hot path (batched writes), and
      capture build/test output compactly (tail, on failure) as an artifact rather
      than a per-line event stream — the stdout firehose is exactly what the operator
      said breaks the UI, so it must never become events.
  - key: |
      One slow/broken client connection must never stall fan-out for the others —
      the shared broadcast loop sends per-client with a bounded timeout and drops on
      failure (logged), so a saturated proxy connection cannot cascade into a
      server-wide stall / connection refusal.

tests:
  - "Broadcaster_SandboxCommandResult_NotSentToRunGroup"
  - "Broadcaster_LifecycleEvent_SentToRunGroup"
  - "Broadcaster_SandboxDetail_OnlyToSandboxGroupWhenExpanded"
  - "Persistence_ToolCallEvents_WrittenBatchedOffHotPath"
  - "BuildOutput_CapturedAsCompactArtifact_OnFailure"
  - "Broadcaster_OneStalledClient_DoesNotBlockOthers"
  - "RunGroupTraffic_PerRun_IsOrderOfSteps_NotToolCalls"

done:
  - "A run-detail view with no sandbox open receives O(steps) events per run, not O(tool-calls); the full detail is still available on ExpandSandbox."
  - "Tool-call events are still persisted (metrics intact) but written batched, off the broadcast path; build/test output is captured compactly and is inspectable on failure."
  - "A stalled client connection is dropped without stalling fan-out for others; concurrent runs + tabs connect without the server refusing connections."
