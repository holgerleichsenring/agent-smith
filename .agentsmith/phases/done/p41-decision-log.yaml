# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p41
goal: "Automatic decision logging — every architectural/tooling/implementation decision recorded at the moment it is made, in decisions.md"
decisions:
  - key: "Tell-don't-ask — handlers always call LogAsync, never check repo existence; impl decides behavior"
  - key: "Two implementations via DI — FileDecisionLogger (file write) vs InMemoryDecisionLogger (no-op for non-repo pipelines)"
  - key: "SemaphoreSlim(1,1) for thread safety on concurrent pipeline runs"
  - key: "Agent delivers pre-formatted markdown — no parsing needed"
  - key: "repoPath nullable — FileDecisionLogger skips file write if null"
  - key: "Decisions flow through PipelineContext to result.md — works for non-repo pipelines too"
steps:
  - id: contracts
    action: "Add IDecisionLogger interface and DecisionCategory enum"
    new:
      - "IDecisionLogger: { LogAsync(repoPath?, category, decision) }"
      - "DecisionCategory: Architecture | Tooling | Implementation | TradeOff"
      - "PlanDecision: { Category:string, Decision:string }"
    modify:
      - "ContextKeys: add Decisions"
  - id: domain
    action: "Extend Plan entity with Decisions property"
    new: ["PlanDecision record"]
    modify: ["Plan: add IReadOnlyList<PlanDecision> Decisions"]
  - id: infra
    action: "Implement loggers, extend parsers and tools"
    new:
      - "FileDecisionLogger: writes to .agentsmith/decisions.md with SemaphoreSlim"
      - "InMemoryDecisionLogger: no-op for non-repo pipelines"
    modify:
      - "PlanParser: parse optional decisions array from JSON"
      - "AgentPromptBuilder: plan prompt requests decisions, execution prompt instructs log_decision tool"
      - "ToolDefinitions, OpenAiToolDefinitions, GeminiToolDefinitions: add log_decision tool"
      - "ToolExecutor: add log_decision case, _decisions list, GetDecisions()"
      - "AgentExecutionResult: add Decisions property"
      - "ClaudeAgentProvider, OpenAiAgentProvider, GeminiAgentProvider: pass decisions through"
  - id: handlers
    action: "Wire decision logging into pipeline handlers"
    modify:
      - "GeneratePlanHandler: tell-don't-ask logging + pipeline storage"
      - "AgenticExecuteHandler: tell-don't-ask logging + pipeline storage"
      - "RunResultFormatter: AppendDecisions grouped by category"
      - "WriteRunResultHandler: read decisions from pipeline"
      - "MetaFileBootstrapper: create empty decisions.md template"
      - "Infrastructure.Core ServiceCollectionExtensions: register FileDecisionLogger"
tests:
  - "FileDecisionLoggerTests — write, append, new section, thread safety, null repoPath"
  - "InMemoryDecisionLoggerTests — no-op completes"
  - "PlanParserTests — decisions parsing, missing decisions graceful"
  - "ToolExecutorTests — log_decision stores and returns confirmation"
  - "GeneratePlanHandlerTests — decisions via IDecisionLogger + pipeline storage"
  - "AgenticExecuteHandlerTests — decisions via IDecisionLogger + pipeline storage"
  - "WriteRunResultHandlerTests — decisions section in result.md"
  - "BootstrapProjectHandlerTests — decisions.md template created"
done:
  - "All 466 tests green"
  - "decisions.md accumulates across project lifetime, never overwritten"
