# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0072
goal: "Auto-start pipeline when Jira issue assigned to Agent Smith — pipeline resolved from issue labels with configurable default"
requires: ["p0016", "p0043e"]
decisions:
  - Dedicated /webhook/jira endpoint: "Jira has no event-type header, avoids ambiguity with GitHub/GitLab"
  - Handler returns WebhookResult, not IJobEnqueuer: "matches existing dispatch pattern"
  - ServerContext for config path: "bridges gap between DI and config loading interface"
  - Signature validation in WebhookListener not handler: "consistent with all other platforms"
  - Secret optional: "acceptable for internal networks"
steps:
  - id: config
    action: "Add JiraTriggerConfig to ProjectConfig"
    new:
      - "JiraTriggerConfig: { AssigneeName, Secret?, PipelineFromLabel, DefaultPipeline }"
      - "ServerContext: { ConfigPath }"
    modify: ["ProjectConfig.cs"]
  - id: handler
    action: "Add JiraAssigneeWebhookHandler — matches assignee name, resolves pipeline from labels"
    new: ["JiraAssigneeWebhookHandler: IWebhookHandler"]
  - id: listener
    action: "Add /webhook/jira route, Jira event type extraction from payload body, signature validation"
    modify: ["WebhookListener.cs", "WebhookSignatureValidator.cs"]
  - id: di
    action: "Register handler + optional ServerContext in ServiceProviderFactory"
    modify: ["ServiceProviderFactory.cs", "ServerCommand.cs"]
tests:
  - "HandleAsync_AssigneeMatchesConfig_EnqueuesJob"
  - "HandleAsync_AssigneeDoesNotMatch_ReturnsIgnored"
  - "HandleAsync_NotAnAssigneeChange_ReturnsIgnored"
  - "HandleAsync_LabelMatchesPipelineMap_UsesMappedPipeline"
  - "HandleAsync_NoLabelMatch_UsesDefaultPipeline"
  - "HandleAsync_NoLabels_UsesDefaultPipeline"
  - "HandleAsync_MultipleLabels_ConfigOrderWins"
  - "HandleAsync_SecretMissing_SkipsVerification"
  - "HandleAsync_SecretConfigured_HeaderMissing_ReturnsUnauthorized"
done:
  - "JiraTriggerConfig added to ProjectConfig"
  - "JiraAssigneeWebhookHandler implements IWebhookHandler"
  - "Assignee name matching is case-insensitive"
  - "Pipeline resolved via label map, falls back to default_pipeline"
  - "Secret verification skipped when not configured"
  - "/webhook/jira route added"
  - "Handler registered in DI"
  - "agentsmith.yml example includes jira_trigger block"
  - "All 9 tests pass (873 tests, 0 failures)"
