# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0014
goal: "Automatic trigger — GitHub Action on issue label + self-hosted webhook listener"
requires: ["p0010", "p0013"]
decisions:
  - key: "Both variants — GitHub Action for zero-infra, webhook for self-hosted/K8s"
  - key: "Webhook uses HttpListener — no ASP.NET dependency needed"
  - key: "Trigger label defaults to 'agent-smith', configurable"
  - key: "Each webhook request spawns async task (non-blocking), returns 202"
steps:
  - id: github-action
    action: "Create workflow triggered by issues.labeled with 'agent-smith'"
    new:
      - ".github/workflows/agent-smith.yml: checkout → setup .NET → build → run --headless"
  - id: webhook-listener
    action: "Implement --server mode with HTTP endpoint"
    new:
      - "WebhookListener: HttpListener, POST /webhook + GET /health"
    modify:
      - "Program.cs: add --server and --port options, input arg now optional"
  - id: docker-compose
    action: "Add agentsmith-server service alongside one-shot agentsmith"
    modify:
      - "docker-compose.yml: separate agentsmith (one-shot) and agentsmith-server (persistent) services"
      - "Dockerfile: add EXPOSE 8080"
  - id: verify
    action: "dotnet build && dotnet test"
done:
  - "GitHub Action triggers on issues.labeled event"
  - "WebhookListener handles POST /webhook and GET /health"
  - "--server mode with graceful shutdown"
  - "docker-compose.yml has both one-shot and server services"
