# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0079
goal: "Restructure api-security-scan skills around attacker perspectives with passive mode (schema) and active mode (authenticated HTTP probing)"
requires: ["p0045", "p0064", "p0078"]
decisions:
  - key: "Skills represent attacker perspectives, not knowledge domains — low-privilege-attacker replaces auth-tester etc."
  - key: "Passive mode always runs (schema/static only), active mode requires credentials config"
  - key: "Findings carry evidence_mode: confirmed | potential — confirmed only when backed by http_probe response"
  - key: "chain-analyst runs after all contributors, receives all findings, reasons about chains — no HTTP access itself"
  - key: "Credentials are username+password — pipeline handles login and token refresh, no static tokens in config"
  - key: "Personas: anonymous, user1, user2, admin — all optional, skills degrade gracefully when persona missing"
  - key: "http_probe is a new tool — authenticated HTTP call executed by ApiSkillRoundHandler between skill rounds"
  - key: "Existing skills replaced: auth-tester, api-design-auditor, dast-analyst, false-positive-filter, api-vuln-analyst"

steps:
  - id: personas-config
    action: "Extend api-security-scan config with optional personas block"
    modify:
      - "agentsmith.yml: add optional credentials block under api-security-scan pipeline"
      - "PipelineContext: add Personas dict (persona name → bearer token, populated by session handler)"
      - "ContextKeys.cs: add Personas, ActiveMode"

  - id: session-handler
    action: "New SessionSetupHandler — authenticates configured personas before triage, stores tokens in pipeline"
    new:
      - "SessionSetupHandler: POST to auth endpoint per persona, cache token, set ContextKeys.ActiveMode=true"
      - "ISessionProvider: detects login flow from swagger (Bearer/Cookie/Basic), performs login request"
    modify:
      - "ApiSecurityScanPipeline: insert SessionSetupCommand before ApiSecurityTriageCommand"
      - "CommandNames.cs: add SessionSetup"

  - id: http-probe-tool
    action: "New HttpProbeRunner — authenticated HTTP call usable by active skills via ApiSkillRoundHandler"
    new:
      - "HttpProbeRunner: executes HTTP request with persona token, returns status + headers + body"
      - "HttpProbeResult: { Persona, Method, Url, StatusCode, ResponseHeaders, ResponseBody, DurationMs }"
    modify:
      - "ContextKeys.cs: add HttpProbeResults"
      - "ApiSkillRoundHandler.cs: parse probe requests from skill output, execute via HttpProbeRunner, feed results into next round"

  - id: attacker-skills
    action: "Replace existing api-security skill files with attacker-perspective skills"
    delete:
      - "config/skills/api-security/auth-tester/"
      - "config/skills/api-security/api-design-auditor/"
      - "config/skills/api-security/dast-analyst/"
      - "config/skills/api-security/false-positive-filter/"
      - "config/skills/api-security/api-vuln-analyst/"
    new:
      - "config/skills/api-security/recon-analyst/ — passive, no personas. What is visible from outside? Endpoints, headers, version disclosure, unauthenticated surface."
      - "config/skills/api-security/low-privilege-attacker/ — passive+active, needs user1. State-changing endpoints accessible beyond role. Passive: schema inference. Active: http_probe with user1 on resources owned by others."
      - "config/skills/api-security/idor-prober/ — passive+active, needs user1+user2. Sequential IDs. Passive: flag guessable IDs in schema. Active: cross-user resource probing."
      - "config/skills/api-security/anonymous-attacker/ — passive+active, no auth. Unauthenticated endpoints, rate limiting, shareToken entropy, resource exhaustion."
      - "config/skills/api-security/input-abuser/ — passive+active, needs user1. Missing validation constraints. Passive: schema gaps. Active: malformed input, wrong MIME types, oversized payloads."
      - "config/skills/api-security/response-analyst/ — passive+active, needs user1+admin. Over-exposed response data. Passive: schema analysis. Active: compare user1 vs admin responses."
      - "config/skills/api-security/chain-analyst/ — executor, no personas, runs after all contributors. Reasons about attack chains across all findings. Assigns final severity including chain-escalation."

  - id: evidence-mode
    action: "Add EvidenceMode to ApiSecurityFinding"
    modify:
      - "ApiSecurityFinding.cs: add EvidenceMode enum (Confirmed | Potential)"
      - "ApiScanFindingsFormatter.cs: include evidence_mode in all output formats"

  - id: triage-update
    action: "Update ApiSecurityTriageHandler for new skill set and active mode signals"
    modify:
      - "ApiSecurityTriageHandler.cs: add signals — hasAnonymousEndpoints, hasFileUploadEndpoints, hasDeleteOnHierarchicalResources, hasIncrementalIdPaths"
      - "ApiSecurityTriageHandler.cs: skip active-only skills when ActiveMode=false"

  - id: cli-update
    action: "Extend api-scan CLI with credential options"
    modify:
      - "ApiScanCommand.cs: add --admin-user, --admin-pass, --user1-user, --user1-pass, --user2-user, --user2-pass"
      - "ApiScanCommand.cs: print mode at startup — passive mode or active mode (N personas)"

tests:
  - "SessionSetupHandler_WithValidCredentials_StoresTokensInPipeline"
  - "SessionSetupHandler_WithNoCredentials_SetsActiveModeToFalse"
  - "HttpProbeRunner_WithPersonaToken_SendsAuthenticatedRequest"
  - "ApiSecurityTriageHandler_WithActiveMode_IncludesActiveSkills"
  - "ApiSecurityTriageHandler_WithPassiveMode_ExcludesActiveOnlySkills"
  - "ApiScanFindingsFormatter_ConfirmedFinding_ShowsEvidenceMode"
  - "ApiScanFindingsFormatter_PotentialFinding_ShowsEvidenceMode"

done:
  - "Passive mode runs end-to-end without credentials — all potential findings in output"
  - "Active mode with 3 personas runs end-to-end — confirmed findings where probed"
  - "chain-analyst receives all contributor findings and produces chained severity assessment"
  - "EvidenceMode field present on all findings in report output"
  - "HTTP 401 during active probing triggers re-auth, not pipeline failure"
  - "Missing personas cause affected skills to degrade to passive — no crash"
  - "dotnet build zero warnings, all tests green"
