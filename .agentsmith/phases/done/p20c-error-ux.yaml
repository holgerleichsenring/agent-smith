phase: p20c
goal: "Transform raw exceptions into actionable Slack error messages with retry/logs/contact buttons"
requires: ["p20a", "p20b"]
decisions:
  - error-formatter-pure: "ErrorFormatter.Humanize is pure regex pattern matching — no I/O, fully testable"
  - error-context-in-commandresult: "CommandResult extended with FailedStep, TotalSteps, StepName fields"
  - bus-message-extended: "BusMessage.Error now carries Step, Total, StepName alongside error text"
  - slack-block-kit: "SlackErrorBlockBuilder creates structured blocks with retry/abandon buttons"
  - buttons-optional: "View Logs omitted if no LOG_BASE_URL; Contact omitted if no OWNER_SLACK_USER_ID"
steps:
  - id: error-formatter
    action: "Create ErrorFormatter with regex-to-friendly-message rules and ErrorContext record"
    new: ["ErrorFormatter: regex rules for TF401179, 401, 403, 429, timeout, etc.", "ErrorContext { JobId, TicketNumber, Project, FailedStep, TotalSteps, StepName, RawError, LogUrl }"]
  - id: bus-message
    action: "Extend BusMessage.Error with step context fields"
    modify: ["BusMessage: Error factory includes step metadata", "IProgressReporter: ReportErrorAsync gets step/total/stepName params"]
  - id: slack-blocks
    action: "Create SlackErrorBlockBuilder with Block Kit buttons"
    new: ["SlackErrorBlockBuilder"]
  - id: retry-handler
    action: "Create SlackErrorActionHandler for retry/abandon button callbacks"
    new: ["SlackErrorActionHandler"]
    modify: ["SlackAdapter: SendErrorAsync uses Block Kit blocks"]
env-vars:
  - "OWNER_SLACK_USER_ID: Slack user ID for contact button (optional)"
  - "LOG_BASE_URL: base URL for log links (optional)"
done:
  - "Error message shows step number, ticket, project, friendly reason"
  - "Retry spawns new job; blocked if job already running"
  - "View Logs shows URL or kubectl hint"
  - "Contact button mentions owner"
  - "Optional buttons cleanly omitted when env vars not set"
  - "Raw exception never shown to user in Slack"
