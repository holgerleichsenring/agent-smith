phase: p54
goal: "Expand security-scan with static pattern matching, git history scanning, dependency auditing, and 4 new LLM specialist skills"
decisions:
  - key: "Static pattern scan is in-process regex — no Docker needed, fast, extensible via YAML"
  - key: "Git history scanning via LibGit2Sharp (already a dependency) — no new packages"
  - key: "Pattern definitions in config/patterns/*.yaml — extensible without code changes"
  - key: "History-only secrets elevated to CRITICAL — developers think they're removed"
  - key: "DependencyAudit auto-detects package manager, runs appropriate audit tool via ProcessToolRunner"
steps:
  - id: static-scan
    action: "Implement static pattern scanner"
    new:
      - "StaticPatternScanCommand + StaticPatternScanHandler"
      - "StaticPatternScanner: in-process regex against repo files"
      - "PatternDefinitionLoader: reads YAML pattern files"
      - "IStaticPatternScanner interface"
      - "PatternFinding: { File, Line, PatternId, Severity, Confidence, CWE, MatchedText }"
      - "config/patterns/secrets.yaml (50+ patterns: AWS, GitHub, Stripe, etc.)"
      - "config/patterns/injection.yaml (eval, innerHTML, SQL concat, pickle.loads)"
      - "config/patterns/ssrf.yaml (fetch, axios, http.get with user input)"
      - "config/patterns/config.yaml (Dockerfile :latest, K8s privileged, Terraform public S3)"
      - "config/patterns/compliance.yaml (PII patterns)"
      - "config/patterns/ai-security.yaml (prompt injection, unsafe output handling)"
  - id: git-history
    action: "Implement git history secret scanner"
    new:
      - "GitHistoryScanCommand + GitHistoryScanHandler"
      - "GitHistoryScanner: walks commit history via LibGit2Sharp"
      - "IGitHistoryScanner interface"
      - "HistoryFinding: { CommitHash, File, Line, PatternId, Severity, StillInWorkingTree }"
  - id: dep-audit
    action: "Implement dependency auditor"
    new:
      - "DependencyAuditCommand + DependencyAuditHandler"
      - "DependencyAuditor: detects ecosystem, runs audit tool"
      - "IDependencyAuditor interface"
      - "DependencyFinding: { Package, Version, CVE, Severity, FixVersion }"
    # Supported: npm audit, pip-audit, dotnet list package --vulnerable, govulncheck, bundle-audit
  - id: skills
    action: "Create 4 new specialist skills"
    new:
      - "config/skills/security/config-auditor.yaml — Dockerfile, K8s, Terraform, CI/CD"
      - "config/skills/security/supply-chain-auditor.yaml — dependencies, typosquatting"
      - "config/skills/security/compliance-checker.yaml — PII, GDPR, privacy"
      - "config/skills/security/ai-security-reviewer.yaml — OWASP LLM Top 10 + Agentic Top 10"
    modify:
      - "injection-checker.yaml: add SSRF, reference static findings"
      - "secrets-detector.yaml: reference git history findings"
      - "vuln-analyst.yaml: reference dependency findings"
      - "PipelinePresets: add 3 new commands before Triage"
done:
  - "StaticPatternScan produces findings with file/line/severity/CWE"
  - "Pattern definitions extensible via YAML without code changes"
  - "GitHistoryScan detects secrets in commit history, history-only marked CRITICAL"
  - "DependencyAudit detects package manager, runs appropriate audit"
  - "4 new LLM skills with OWASP mappings"
  - "50+ secret patterns, 20+ injection patterns"
  - "All commands skip gracefully if not applicable"
  - "dotnet build + dotnet test clean"
