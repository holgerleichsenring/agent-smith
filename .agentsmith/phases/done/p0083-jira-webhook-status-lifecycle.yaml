# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0083
goal: "Jira webhook with full lifecycle — trigger on assignee+label+status, transition after PR, re-trigger on reopen, comment trigger"
requires: ["p0072"]
decisions:
  - key: "Trigger requires all three: assignee match + label match + status in whitelist — prevents accidental runs"
  - key: "Status transition after PR uses Jira REST transitions API (already in JiraTicketProvider.CloseTicketAsync) — extract and reuse"
  - key: "Comment trigger (comment_created) is a second handler, not a mode in the existing one — separate event type, cleaner routing"
  - key: "Comment trigger also checks status whitelist — prevents triggering on closed tickets"
  - key: "done_status is resolved via transition name, not status ID — names are human-readable and portable across Jira projects"
  - key: "All pipelines are triggerbar — pipeline_from_label maps to any pipeline name, no hardcoded restrictions"

steps:
  - id: config
    action: "Extend JiraTriggerConfig with status lifecycle fields and comment trigger"
    modify:
      - "JiraTriggerConfig.cs: add TriggerStatuses (List<string>, default [Open]), DoneStatus (string, default In Review), CommentKeyword (string?, optional)"

  - id: status-check
    action: "Add status whitelist check to JiraAssigneeWebhookHandler before triggering"
    modify:
      - "JiraAssigneeWebhookHandler.cs: extract issue status from payload (issue.fields.status.name), reject if not in TriggerStatuses"

  - id: status-transition
    action: "Extract transition logic from JiraTicketProvider into reusable method, call after PR creation"
    modify:
      - "JiraTicketProvider.cs: extract TransitionToAsync(ticketId, statusName) from CloseTicketAsync, make it public"
      - "CommitAndPRHandler.cs: after PR, if jira_trigger.done_status configured, transition ticket to that status"

  - id: comment-handler
    action: "New handler for Jira comment_created events — triggers pipeline when comment contains keyword"
    new:
      - "JiraCommentWebhookHandler: handles comment_created, checks keyword + status whitelist + label, triggers pipeline"
    modify:
      - "WebhookPlatformDetector.cs: ensure comment_created event type is extracted correctly (jira:comment_created strip)"

  - id: config-example
    action: "Update agentsmith.yml example with new fields"
    modify:
      - "agentsmith.yml: add trigger_statuses, done_status, comment_keyword to jira_trigger example"

tests:
  - "JiraAssigneeWebhookHandler_StatusNotInWhitelist_DoesNotTrigger"
  - "JiraAssigneeWebhookHandler_StatusInWhitelist_Triggers"
  - "JiraAssigneeWebhookHandler_StatusCheckIsCaseInsensitive"
  - "JiraCommentWebhookHandler_KeywordPresent_StatusOpen_Triggers"
  - "JiraCommentWebhookHandler_KeywordPresent_StatusClosed_DoesNotTrigger"
  - "JiraCommentWebhookHandler_NoKeyword_DoesNotTrigger"
  - "JiraTicketProvider_TransitionToAsync_FindsAndExecutesTransition"
  - "CommitAndPRHandler_WithDoneStatus_TransitionsTicket"

done:
  - "Assignee webhook only triggers when issue status is in trigger_statuses"
  - "After PR, ticket transitions to done_status via Jira API"
  - "Comment with keyword triggers pipeline (status whitelist respected)"
  - "Re-opening ticket (status back to Open) allows re-trigger on next assignee/comment event"
  - "All pipeline names are valid targets via pipeline_from_label"
  - "dotnet build zero warnings, all tests green"
