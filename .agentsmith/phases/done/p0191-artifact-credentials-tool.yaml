# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0191-artifact-credentials-tool
goal: |
  Private package feeds (NuGet, npm, pip, …) need auth in the sandbox.
  Give the agent a tool to fetch credentials on demand; let it apply
  them via the toolchain's native flow. No per-language code in agent-
  smith. p0189 made the failure visible; this makes it resolvable.

requires:
  - p0189-context-yaml-parse-errors-and-stream-in-tree

scope:
  in: |
    Config — `registries:` list in agentsmith.yml:
      registries:
        - host: pkgs.dev.azure.com
          username: any
          token: ${azure_artifacts_token}

    Tool — `get_artifact_credentials(host_filter)` returns matching
    {host, username, token} entries. host_filter required when >1
    registry is configured. URL inputs are reduced to hostname.

    Match — dot-boundary subdomain: H == host_filter OR
    H endsWith "." + host_filter. NOT plain string-suffix.

    Tokens — must not persist beyond one round-trip:
      - ToolResultEvent body redacted to "[set]" via ISensitiveToolHost
        marker (no Redis / dashboard ring).
      - DelegatingChatClient rewrites prior-turn tool messages from
        sensitive hosts to "[set, applied turn N]" before re-sending
        so tokens leave the LLM provider's prompt cache after one
        iteration.
      - Compaction summarizer prompt forbids retaining literal tokens.
      - Audit: confirm IRunArtifactStore does not persist chat history.

    Master prompt (cross-repo, coding-agent-master 1.2.0 → 1.3.0):
      - Call get_artifact_credentials on NU1301 / EAUTH / 401.
      - Pass host_filter derived from the failing URL.
      - Apply at user-config level only (~/.nuget/NuGet/NuGet.Config,
        ~/.npmrc, ~/.config/pip/pip.conf, ~/.m2/settings.xml).
      - NEVER edit the repo's own config files (they get committed).

  out: |
    Toolchain-image auth shim — rejected design.
    Per-repo registry mapping — agent reads repo's native config.
    Multi-token-per-host (read vs publish) — single token only.
    Credential rotation / OIDC — static tokens only.
    Pre-commit secret scanner — separate slice (see p0192).

decisions:
  - key: "Pull-on-demand tool, not prompt injection — keeps tokens out of initial context + prompt cache prefix."
  - key: "Token scrubbed from conversation history after one round-trip via DelegatingChatClient + tool-call-id match."
  - key: "Dot-boundary subdomain match — string-suffix would let evil-dev.azure.com steal dev.azure.com tokens."
  - key: "host_filter required when >1 registry — silent over-disclosure is unrepresentable."
  - key: "Master prompt mandates user-config-level apply — repo-level edits leak via PR. Defense-in-depth scanner = p0192."

steps:
  - id: schema
    action: "registries: + RegistryConfig record; YamlConfigurationLoader wiring; ${secret} substitution."
    new:
      - "src/backend/AgentSmith.Contracts/Models/Configuration/RegistryConfig.cs"
    modify:
      - "src/backend/AgentSmith.Contracts/Models/Configuration/AgentSmithConfig.cs"
      - "src/backend/AgentSmith.Infrastructure/Services/YamlConfigurationLoader.cs"

  - id: tool-host
    action: "GetArtifactCredentialsToolHost : IToolHost, ISensitiveToolHost. Dot-boundary match. URL → hostname normalisation. Multi-registry-without-filter returns explicit error."
    new:
      - "src/backend/AgentSmith.Application/Services/Tools/GetArtifactCredentialsToolHost.cs"
      - "src/backend/AgentSmith.Contracts/Services/ISensitiveToolHost.cs"

  - id: result-redaction
    action: "EventPublishingChatClient redacts ToolResultEvent body to [set] for ISensitiveToolHost tools."
    modify:
      - "src/backend/AgentSmith.Infrastructure/Services/Events/EventPublishingChatClient.cs"

  - id: history-scrub
    action: "New SensitiveToolHistoryScrubChatClient (DelegatingChatClient) rewrites prior-turn Tool messages from sensitive hosts to [set, applied turn N] before each request."
    new:
      - "src/backend/AgentSmith.Infrastructure/Services/SensitiveToolHistoryScrubChatClient.cs"
    modify:
      - "src/backend/AgentSmith.Infrastructure/Services/Factories/ChatClientFactory.cs"

  - id: compaction-hardening
    action: "Summarizer prompt: one-line forbid-literal-tokens rule."
    modify:
      - "(prompt template path TBD during impl)"

  - id: wiring
    action: "DI + AllHostsActivePolicy registration. Master + sub-agents."
    modify:
      - "src/backend/AgentSmith.Application/Services/Tools/AllHostsActivePolicy.cs"
      - "(ServiceCollection registration site)"

  - id: tests
    new:
      - "tests/AgentSmith.Tests/Tools/GetArtifactCredentialsToolHostTests.cs"
      - "tests/AgentSmith.Tests/Events/SensitiveToolResultRedactionTests.cs"
      - "tests/AgentSmith.Tests/Infrastructure/SensitiveToolHistoryScrubChatClientTests.cs"
    modify:
      - "tests/AgentSmith.Tests/Configuration/YamlConfigurationLoaderTests.cs"

  - id: master-prompt
    action: "agentsmith-skills coding-agent-master 1.2.0 → 1.3.0; skills.version pin bump."
    modify:
      - "(cross-repo) skills/_masters/coding-agent-master/SKILL.md"
      - "agentsmith.yml"

  - id: verify
    action: |
      Build + tests green. Smoke: NU1301 → tool call → user-config
      apply → re-run succeeds. Confirm token absent from Redis stream
      AND from /work tree at commit time.

tests:
  - "GetArtifactCredentialsToolHost_ReturnsAllConfiguredRegistries_WhenSingleConfigured"
  - "GetArtifactCredentialsToolHost_HostFilterDotBoundaryMatch"
  - "GetArtifactCredentialsToolHost_DoesNotMatchPartialLabel"
  - "GetArtifactCredentialsToolHost_UrlInput_ReducesToHostname"
  - "GetArtifactCredentialsToolHost_MultipleRegistries_NoFilter_ReturnsError"
  - "YamlConfigurationLoader_RegistriesBlock_RoundTripsWithSecretSubstitution"
  - "ToolResultEvent_SensitiveToolHost_RedactsResultBody"
  - "SensitiveToolHistoryScrubChatClient_RewritesPriorTurnToolMessages"

done:
  - "registries: schema + secret substitution."
  - "get_artifact_credentials tool registered for master + sub-agents."
  - "Token scrubbed from event stream AND from conversation history after one turn."
  - "Master prompt mandates user-config-level apply."
  - "Smoke green: NU1301 resolved end-to-end without token in PR diff or Redis stream."
