done:
  - "SkillMdParser routes per frontmatter shape: roles_supported → legacy parser; role → new parser; both → SkillFormatException"
  - "SkillMdFrontmatter carries the eight new fields (Role, Category, InvestigatorMode, SurveyScope, ScopeHint, BlockCondition, Loop, OutputSchema); RoleSkillDefinition exposes them as nullable properties"
  - "New-format ParseNewFormat builds RoleSkillDefinition with body verbatim (no SkillBodySplitter), legacy fields null"
  - "ValidateStrict for new format enforces all Phase C rules; each violation throws SkillFormatException with file path + rule description"
  - "MergeFrontmatter merges the eight new fields under override-wins-falls-back-to-base; SurveyScope list is replaced wholesale, not element-merged"
  - "ValidateConceptsCommand checks category-on-verify_hint and block_condition-on-judge presence at build time; closed enum for category deferred to p0127c"
  - "Legacy SKILL.md files in agent-smith-skills (all 44 currently) parse unchanged through the legacy path"
  - "All 32 new tests pass"
  - "All existing tests pass (no regressions)"
  - "No skill content migrated yet — that's p0127c. No triage consumption — that's p0127b. p0126's SkillCallRuntime is not yet hooked up to triage; first consumer migration lands in p0127b"
