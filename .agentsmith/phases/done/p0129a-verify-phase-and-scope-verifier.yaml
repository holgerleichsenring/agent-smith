# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0129a
goal: "First slice of D5. RunVerifyPhase command added to fix-bug + add-feature presets after Implementation. VerifyRoundHandler dispatches verifier skills via the existing SkillRoundHandlerBase path, with ToolKit/Guards from p0126c. scope-verifier — first VerifyDiff investigator — flags Diff changes outside the freed Plan scope. Re-implementation loop on first blocking observation; escalation on second."

requires: ["p0126", "p0127c", "p0128c"]

scope:
  in: "(1) RunVerifyPhase command introduced. New CommandNames.RunVerifyPhase entry, paired with a new VerifyRoundHandler that descends from SkillRoundHandlerBase. The handler builds the prompt parts from the Diff (read via ContextKeys.DiffJson — populated by Implementation phase per p0128a) plus the freed Plan (ContextKeys.PlanJson), passes them to its skill-round logic. SandboxToolHost is constructed with ToolKit.GetToolsFor(SkillExecutionPhase.Verify, investigatorMode: 'verify_diff') — read-only tools plus RunCommand per p0126c's mapping. PathReadGuard wired with the working repo as scope; PathWriteGuard wired but unused in Verify (no WriteFile in the verify tool-set). Iteration cap from LoopLimitsConfig.MaxToolCallsPerVerifier (20). (2) Pipeline preset wiring. PipelinePresets.cs (the FixBug and AddFeature lists) gain a RunVerifyPhase entry inserted between RunFinalPhase and the existing post-implementation steps (CommitChanges / CommitAndPR). The preset list is the source of truth — both fix-bug and add-feature get the new entry; mad-discussion / scan / init-project presets are untouched (they don't produce a Diff to verify). (3) scope-verifier SKILL.md added to agent-smith-skills/skills/coding/scope-verifier/SKILL.md. New format (per p0127c): role=investigator, investigator_mode=verify_diff, output_schema=observation, activates_when='pipeline_name = \"fix-bug\" OR pipeline_name = \"feature-implementation\"'. Body instructs the LLM: read Plan.scope.files and the Diff.changes file list; for each Diff change whose file isn't in Plan.scope.files, decide whether it's a plausible test file for one of the Plan-scope files (judgment over the typical conventions across the project's primary language — `FooTests.cs` ↔ `Foo.cs` for C#, `Foo.test.ts` / `Foo.spec.ts` ↔ `Foo.ts` for TypeScript, `test_foo.py` ↔ `foo.py` for Python, separate test-project directories for any of those, plus whatever the project's actual layout suggests). If the change is plausibly a test for a scope file, allow it. Otherwise flag as blocking observation with concern=Scope, severity=High, citing the offending file and the Plan's declared scope. The LLM applies project judgment; the SKILL.md does not encode a regex or hardcode any single language's convention. (4) Re-implementation loop. VerifyRoundHandler emits CommandResult with InsertNext = [RunFinalPhase, RunVerifyPhase] when at least one verifier observation has blocking=true AND the per-pipeline VerifyRoundCount is 1. The PipelineExecutor.InsertFollowUps mechanism (p0034) inserts these after the current node; the agentic loop re-runs Implementation with the verify notes appended to its prompt (via a new ContextKeys.VerifyNotes that the Implementation prompt builder reads when present). VerifyRoundCount increments before each VerifyRoundHandler invocation; reaching 2 with blocking observations is the escalation path. (5) Escalation on second-fail. When VerifyRoundCount=2 and any verifier observation has blocking=true, VerifyRoundHandler returns CommandResult.Fail(message='Verify-phase escalation: second blocking observation; pipeline ends', notes=allVerifyObservations). The existing CommandResult.IsSuccess=false path surfaces the failure to the run result and triggers ticket-writeback (existing). Verify notes from both rounds are included in the writeback. (6) Data-flow edges (documentation only; not enforcement). FixBugPhaseDataFlow and AddFeaturePhaseDataFlow (the PermissivePhaseDataFlow subclasses from p0128c) gain explicit edges: { FromPhaseStep: 'Plan', ToPhaseStep: 'Verify', ContextKeys: ['PlanJson', 'Plan'] } and { FromPhaseStep: 'Implementation', ToPhaseStep: 'Verify', ContextKeys: ['DiffJson', 'CodeChanges'] }. The ('*','*','*') wildcard from p0128c stays in place — these explicit edges document the intended flow for the verify phase but block nothing, even at Enforce=true, because the wildcard matches first. Real enforcement (wildcard removal) is a post-D7 tightening phase. (7) Cross-repo: agent-smith-skills 2.0.0 → 2.1.0. Single new SKILL.md (scope-verifier); CHANGELOG entry; version.txt bump. agentsmith.yml skills pin → 2.1.0 in the paired PR."
  out: "build-verifier and test-verifier — that's p0129b. They need ProjectBuildCommandResolver and RunCommand integration with build/test output parsing; landing them now would couple p0129a to p0129b's infrastructure work. architecture-verifier — p0129c. Consumer migration of any handler to SkillCallRuntime — explicitly out per the parent decision; VerifyRoundHandler uses SkillRoundHandlerBase as today's handlers do. Diff record's CodeChange bridging — p0128c has Diff in place; verifier reads DiffJson directly (the JSON wire-format slot, populated by Implementation phase). VerifyNotes prompt-injection optimization — p0129a's bridging just appends VerifyNotes verbatim into the Implementation prompt's user message; structured note categorization is a future quality-pass concern. Verify-notes deduplication across rounds — round-2 verifiers typically re-emit round-1 findings plus possibly new ones, so the writeback can carry duplicates. Scope-verifier in p0129a alone keeps the duplication low (one concern, one finding per offending file), but the build/test verifiers in p0129b are higher-volume; dedup at the combine site lands in p0129b or p0129c. Real-flow data-flow enforcement (wildcard removal in PermissivePhaseDataFlow) — the explicit Plan→Verify and Implementation→Verify edges this slice declares are documentation only, not enforcement; that's a post-D7 tightening phase across all 10 presets. Verify-phase support in security-scan / api-security-scan / mad-discussion — out per parent decision; those pipelines have their own block-style synthesis (Filter/Synthesize) and don't produce a Diff. Removal of legacy CodeChange — D7. Tightening Enforce=true on the new data-flow edges — explicit edges land here, enforcement stays at the existing default; flipping enforce on individual presets is a subsequent tightening pass."

decisions:
  - key: "RunVerifyPhase is a new dedicated command, not a parameterized RunFinalPhase variant. Reason: RunFinalPhase already represents the implementer's agentic loop — adding a 'mode: verify' parameter would conflate two different roles in one command type. Cleaner: distinct command + handler with its own SkillRoundHandlerBase descendant. The handler is small (~80-100 lines, mostly prompt construction + the InsertNext decision), and the cost is one more entry in CommandNames + PipelinePresets.cs."
  - key: "Re-implementation re-runs RunFinalPhase, not a separate 'fix the diff' command. Reason: the implementer that produced the original Diff is the same role that produces the corrected Diff; spinning up a different command type for the second-pass would duplicate prompt-building. RunFinalPhase reads ContextKeys.VerifyNotes when present and incorporates them into its system prompt. Same agentic loop, additional context. The InsertNext sequence [RunFinalPhase, RunVerifyPhase] guarantees both run in order; PipelineExecutor's LinkedList handles the rest."
  - key: "VerifyRoundCount lives in PipelineContext (ContextKeys.VerifyRoundCount), not in the handler. Reason: handlers are stateless; the executor re-creates them per command. Counting via PipelineContext gives the next handler invocation the same number, and the InsertNext mechanism lets the executor's loop re-enter VerifyRoundHandler after the second RunFinalPhase. Counter increments before each invocation; reaches 2 when the second pass also fails."
  - key: "scope-verifier flags out-of-scope Diff files; test-file siblings allowed via LLM judgment, not a hardcoded regex. Reason: Phase A's example was Bug-18693 — 22-file blast radius from a single-file Plan. The verifier's job is to catch that. Tighter checks (line-count delta, change-magnitude metrics) are quality refinements; first-iteration goal is correctness on the obvious case. Test-file conventions vary per language: `FooTests.cs` ↔ `Foo.cs` (C#), `Foo.test.ts` / `Foo.spec.ts` ↔ `Foo.ts` (TypeScript), `test_foo.py` ↔ `foo.py` (Python), separate test-project directories under tests/ or test/ for any of the above, and project-specific layouts. Encoding all of them in SKILL.md as a regex would be brittle (new language, new convention, scope-verifier silently misses); leaving the heuristic to the LLM with a few worked examples is more honest. Ambiguous cases default to allowing the test (false-negative on a strict reading, but the alternative is operator noise on legitimate test files)."
  - key: "scope-verifier reads PlanJson + DiffJson, not the typed Plan + CodeChange records. Reason: the verifier skill's prompt receives JSON; the in-process record consumers (RunResultFormatter, etc.) are unaffected. PlanJson and DiffJson are the wire format set by p0128a; reading them keeps the verifier deterministic on the persisted format and decouples it from any future record-shape evolution. The handler reads JSON directly and passes it to the skill body via the prompt."
  - key: "VerifyNotes accumulates across both rounds; cleared at pipeline end. Reason: when escalation hits, the writeback to the ticket includes notes from round 1 + round 2 so the human sees the full progression. After pipeline end (success or escalation), VerifyNotes is dropped from the run result. Mid-run, the second RunFinalPhase reads only round-1 notes (round 2 hasn't run yet); after round-2 verify, the handler combines them into the Fail() message."
  - key: "Plan→Verify and Implementation→Verify edges document intended flows; they are not enforcement. Reason: PermissivePhaseDataFlow ships the ('*','*','*') wildcard from p0128c. Adding explicit edges next to the wildcard records the intended data flow but blocks nothing — the wildcard matches first regardless of Enforce setting. Real enforcement requires removing the wildcard, which is a sweep across all 10 preset PhaseDataFlows and is out of scope here. Wildcard removal + per-preset tightening lands in a dedicated phase after D7 once the verify-phase data-flow story has been observed in production. Until then: edges-as-documentation, no behavioural change for operators reading the warnings log."
  - key: "Skill bumps in cross-repo coupling per slice (2.1.0 for p0129a, 2.2.0 for p0129b, 2.3.0 for p0129c). Reason: p0125c established the version-pair discipline. Each slice that introduces a new SKILL.md bumps the minor version of agent-smith-skills and the agentsmith.yml pin in agent-smith. No major bump in p0129 — the underlying SKILL.md format is stable (set in 2.0.0); we're adding files, not changing the format."

steps:
  - id: command-and-handler
    action: "RunVerifyPhase command + VerifyRoundHandler descending from SkillRoundHandlerBase"
    new:
      - "src/AgentSmith.Application/Commands/RunVerifyPhaseCommand.cs: ICommandContext record. No payload — handler reads PlanJson/DiffJson/VerifyRoundCount from PipelineContext."
      - "src/AgentSmith.Application/Services/Handlers/VerifyRoundHandler.cs: ~120 lines. ICommandHandler<RunVerifyPhaseCommand>. ExecuteAsync: read PlanJson + DiffJson from context; increment VerifyRoundCount (init to 1 if missing); construct SandboxToolHost with ToolKit.GetToolsFor(SkillExecutionPhase.Verify, 'verify_diff'); construct PathReadGuard with the working repo path; build prompt parts (system prompt + 'You are a verify-phase investigator. Plan: <PlanJson>. Diff: <DiffJson>. Emit observations.' user message); call base class's skill-round dispatch (which uses FunctionInvokingChatClient via existing path); parse output as observations; check for any blocking=true; if so and VerifyRoundCount=1 → CommandResult.Ok with InsertNext=[RunFinalPhase, RunVerifyPhase] + VerifyNotes set in context; if so and VerifyRoundCount=2 → CommandResult.Fail with combined notes. No blocking observations → CommandResult.Ok, pipeline continues to CommitChanges."
    modify:
      - "src/AgentSmith.Contracts/Commands/CommandNames.cs: add RunVerifyPhase constant."
      - "src/AgentSmith.Contracts/Commands/ContextKeys.cs: add VerifyNotes (string), VerifyRoundCount (int), VerifyObservations (IReadOnlyList<SkillObservation>)."
      - "src/AgentSmith.Application/Extensions/ServiceCollectionExtensions.cs: register VerifyRoundHandler as ICommandHandler<RunVerifyPhaseCommand>."

  - id: pipeline-preset-wiring
    action: "FixBug + AddFeature presets gain RunVerifyPhase between RunFinalPhase and CommitChanges"
    modify:
      - "src/AgentSmith.Contracts/Commands/PipelinePresets.cs: in the FixBug list (line 13 area), insert RunVerifyPhase after RunFinalPhase and before the existing post-implementation step. Same insertion in AddFeature (line 46 area). FixNoTest is unchanged — a 'no tests' preset doesn't run test-verifier productively; whether to add Verify there is a future operator decision."

  - id: implementation-handler-reads-verify-notes
    action: "RunFinalPhase handler reads VerifyNotes when present and includes them in the implementer's system prompt"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/RunFinalPhaseHandler.cs (or whichever handler implements RunFinalPhase — locate during implementation; SkillRoundHandlerBase descendant): when ContextKeys.VerifyNotes is non-empty, prepend a section to the prompt: '## Prior verify-phase observations\\n<verify-notes verbatim>\\n## End verify observations\\nApply these to the next implementation pass.' No structural change to the handler beyond the prompt construction; VerifyNotes is a string."

  - id: data-flow-edges
    action: "FixBug + AddFeature PermissivePhaseDataFlow gain explicit Plan→Verify and Implementation→Verify edges"
    modify:
      - "src/AgentSmith.Application/Services/PhaseDataFlows/FixBugPhaseDataFlow.cs (or wherever the preset's PermissivePhaseDataFlow subclass lives — locate during implementation): add edges { From='Plan', To='Verify', Keys=['PlanJson', 'Plan'] } and { From='Implementation', To='Verify', Keys=['DiffJson', 'CodeChanges'] } alongside the existing wildcard."
      - "src/AgentSmith.Application/Services/PhaseDataFlows/AddFeaturePhaseDataFlow.cs (or equivalent name): same two edges added."

  - id: scope-verifier-skill
    action: "scope-verifier SKILL.md added in agent-smith-skills"
    new:
      - "[skills-repo] skills/coding/scope-verifier/SKILL.md: new-format SKILL.md per p0127c. Frontmatter: name=scope-verifier, version=1.0.0, description='Flag Diff changes outside the freed Plan scope', role=investigator, output_schema=observation, activates_when='pipeline_name = \"fix-bug\" OR pipeline_name = \"feature-implementation\"', investigator_mode=verify_diff. Body explains the rule in language-agnostic terms: each Diff.changes file must be in Plan.scope.files OR be a plausible test file for a Plan-scope file. Body lists worked examples across languages (C#: FooTests.cs ↔ Foo.cs; TypeScript: Foo.test.ts / Foo.spec.ts ↔ Foo.ts; Python: test_foo.py ↔ foo.py; separate test-project layouts) so the LLM has a calibration set, but the body explicitly says 'use project judgment — don't try to apply a single regex' and ends with 'when in doubt, allow the test file rather than block on a naming variant we didn't anticipate.' Output format: JSON array of observations with concern=Scope, severity=High, blocking=true on out-of-scope file, file=offending path, suggestion=add to Plan or remove from Diff."
      - "[skills-repo] CHANGELOG.md: prepend 2.1.0 entry summarizing the scope-verifier addition."
    modify:
      - "[skills-repo] version.txt: 2.0.0 → 2.1.0."
      - "config/agentsmith.yml: skills pin 2.0.0 → 2.1.0 in the paired PR."

  - id: tests
    action: "Test pack: handler, preset wiring, re-loop, escalation, data-flow edges, scope-verifier output validation"
    new:
      - "tests/AgentSmith.Tests/Handlers/VerifyRoundHandlerTests.cs: ExecuteAsync_NoBlockingObservations_ReturnsOkAndContinues; ExecuteAsync_OneBlockingObservationFirstRound_InsertsRunFinalPhaseAndRunVerifyPhase; ExecuteAsync_OneBlockingObservationFirstRound_SetsVerifyNotesInContext; ExecuteAsync_OneBlockingObservationSecondRound_ReturnsFailWithCombinedNotes; ExecuteAsync_VerifyRoundCountInitializesToOneWhenAbsent; ExecuteAsync_VerifyRoundCountIncrementsToTwoOnSecondInvocation; ExecuteAsync_PromptIncludesPlanJsonAndDiffJson; ExecuteAsync_SandboxToolHostConstructedWithVerifyPhaseToolSet (asserts ToolKit.GetToolsFor was called with SkillExecutionPhase.Verify); ExecuteAsync_NoPlanInContext_ReturnsFailWithMissingPlanError; ExecuteAsync_NoDiffInContext_ReturnsFailWithMissingDiffError."
      - "tests/AgentSmith.Tests/Pipelines/PipelinePresetsVerifyTests.cs: FixBug_Preset_ContainsRunVerifyPhase_AfterRunFinalPhase; AddFeature_Preset_ContainsRunVerifyPhase_AfterRunFinalPhase; FixNoTest_Preset_DoesNotContainRunVerifyPhase; SecurityScan_Preset_DoesNotContainRunVerifyPhase; MadDiscussion_Preset_DoesNotContainRunVerifyPhase; FixBug_RunVerifyPhase_PrecedesCommitChanges."
      - "tests/AgentSmith.Tests/Handlers/RunFinalPhaseVerifyNotesTests.cs: ExecuteAsync_VerifyNotesAbsent_PromptUnchanged; ExecuteAsync_VerifyNotesPresent_PromptIncludesNotesSection."
      - "tests/AgentSmith.Tests/PhaseDataFlows/FixBugPhaseDataFlowTests.cs: Edges_IncludePlanToVerify_WithPlanJsonAndPlanKeys; Edges_IncludeImplementationToVerify_WithDiffJsonAndCodeChangesKeys; Edges_StillIncludeWildcard."
      - "tests/AgentSmith.Tests/PhaseDataFlows/AddFeaturePhaseDataFlowTests.cs: same three tests against AddFeature."
      - "[skills-repo] tests/scope-verifier-fixture/: small fixture with Plan + Diff + expected observations, for the future skill-output integration tests in agent-smith. Path under skills repo, not run as part of agent-smith's test pack but available for replay."

