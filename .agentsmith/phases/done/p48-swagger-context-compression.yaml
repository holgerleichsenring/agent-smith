# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p48
goal: "Compress swagger context from 99k chars to ~15k in BuildDomainSection — 85% token reduction, 15x cost saving per api-scan run"
requires: ["p47"]
decisions:
  - key: "No new pipeline command — compression is a formatting concern inside the handler"
  - key: "Use already-parsed SwaggerSpec data, deduplicate schemas, strip content-type duplicates"
  - key: "Keep field names, types, enums, constraints — these are what skills analyze"
steps:
  - id: compress
    action: "Replace spec.RawJson with compressed representation in BuildDomainSection"
    modify:
      - "ApiSkillRoundHandler.BuildDomainSection: call CompressSwaggerSpec instead of dumping RawJson"
    # CompressSwaggerSpec: extract definitions/components.schemas once, reference by name,
    # flatten to {fieldName}: {type} {format?} {enum?} {nullable?} {constraints?},
    # strip content-type variants (keep first per response code)
done:
  - "Output < 20k chars for 33-endpoint API (was 99k)"
  - "Schemas deduplicated and listed once"
  - "Content-type duplicates removed"
  - "Field names, types, enums, constraints preserved"
  - "Unit tests for compression"
  - "dotnet build + dotnet test clean"
