# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0086
goal: "Typed inter-agent communication schema — SkillObservation replaces free-text DiscussionLog as the canonical output of every skill agent, eliminating exploratory agentic execution caused by unstructured plan input"
requires: ["p0034", "p0064"]

decisions:
  - key: "SkillObservation is the universal output contract — pipeline-agnostic (fix-bug, security, legal, api-scan all use the same type)"
  - key: "Finding remains unchanged — different concept (localized security/scan artifact) vs SkillObservation (conceptual analysis output)"
  - key: "ID is assigned by the framework, not the LLM — avoids hallucinated or colliding IDs from agents"
  - key: "RelatedTo and DeferTo are ConvergenceResult responsibilities, not SkillObservation — agents produce their own view, ConvergenceCheck produces relationships"
  - key: "ConvergenceResult replaces ConsolidatedPlan string — structured type enables mechanical plan generation without LLM free-text parsing"
  - key: "GeneratePlanHandler always runs — ConsolidatedPlan is input context, not a skip signal; discussion provides context, plan generator provides steps"
  - key: "Discussion pipelines use SkillObservation immediately — structured/hierarchical pipelines already have typed output via p0064, this phase targets discussion pipelines"
  - key: "Concern, Severity, Effort are enums with JsonStringEnumConverter — compile-time safety, LLM serializes as strings"
  - key: "Convergence is determined by LLM call with structured input — same effort as today, but deterministic output via ConvergenceResult"
  - key: "Partial valid JSON: take valid observations, skip broken ones with warning log — never discard entire round"

steps:
  - id: contracts
    action: "Define SkillObservation and ConvergenceResult records in AgentSmith.Contracts"
    new:
      - "SkillObservation: { Id, Role, Concern, Description, Suggestion, Blocking, Severity, Confidence, Rationale?, Location?, Effort? }"
      - "ConvergenceResult: { Consensus, Observations, Links, AdditionalRoles, Blocking, NonBlocking }"
      - "ObservationLink: { ObservationId, RelatedObservationId, Relationship } — relationship: duplicates|contradicts|depends-on|extends"
      - "ObservationConcern: enum — Correctness, Architecture, Performance, Security, Legal, Compliance, Risk"
      - "ObservationSeverity: enum — High, Medium, Low, Info"
      - "ObservationEffort: enum — Small, Medium, Large"
    path: "AgentSmith.Contracts/Models/"

  - id: context-keys
    action: "Add SkillObservations and ConvergenceResult keys to ContextKeys"
    modify:
      - "ContextKeys.cs: add SkillObservations (List<SkillObservation>), ConvergenceResult (ConvergenceResult)"

  - id: schema-in-prompts
    action: "Embed SkillObservation output contract in skill system prompts — C# record definition + one concrete few-shot example + instruction to respond only with JSON array"
    new:
      - "config/skills/observation-schema.md: C# record definition as pseudo-schema + one few-shot example of a 2-observation array — embedded in skill prompts at runtime"
    modify:
      - "SkillRoundHandlerBase.cs: inject observation-schema.md into system prompt before skill rules"

  - id: skill-round-handler
    action: "Update SkillRoundHandler to produce SkillObservation list instead of appending free text to DiscussionLog"
    modify:
      - "SkillRoundHandlerBase.cs: parse LLM response as List<SkillObservation> JSON, assign sequential IDs per role, store per-role in context under ContextKeys.SkillObservations"
      - "SkillRoundHandlerBase.cs: on invalid JSON — attempt partial parse, take valid observations, skip broken with ILogger.Warning, fallback to single observation wrapping raw text if nothing parseable"

  - id: convergence-prompt
    action: "Rewrite ConvergenceCheckHandler LLM prompt — from OBJECTION/AGREE free-text analysis to structured SkillObservation comparison producing ObservationLinks and consensus"
    modify:
      - "ConvergenceCheckHandler.cs: new system prompt instructs LLM to compare SkillObservations, detect duplicates/contradictions, output ConvergenceResult JSON"
      - "ConvergenceCheckHandler.cs: prompt includes ObservationLink relationship definitions and consensus rules"

  - id: convergence-handler
    action: "Update ConvergenceCheckHandler to consume SkillObservations and produce ConvergenceResult"
    modify:
      - "ConvergenceCheckHandler.cs: read all SkillObservations, send to LLM with structured prompt, parse ConvergenceResult JSON"
      - "ConvergenceCheckHandler.cs: populate AdditionalRoles from Observations where Concern has no matching active role"
      - "ConvergenceCheckHandler.cs: Consensus=true when all Blocking observations have Confidence >= 70 and no Blocking observations with same Concern contradict each other (per LLM ObservationLinks)"

  - id: generate-plan-handler
    action: "Extend GeneratePlanHandler to use ConvergenceResult.Blocking as structured input when present"
    modify:
      - "GeneratePlanHandler.cs: if ConvergenceResult present, use Blocking observations as plan input — each Blocking observation maps to a PlanStep"
      - "GeneratePlanHandler.cs: Suggestion → PlanStep.Action, Location → PlanStep.TargetFile, Effort → complexity hint"
      - "GeneratePlanHandler.cs: ConsolidatedPlan remains as additional context (existing behavior from 85a49b4)"

  - id: discussion-log-compat
    action: "Keep DiscussionLog populated from SkillObservations for CompileDiscussionHandler and discussion markdown — backward compat for mad-discussion pipeline"
    modify:
      - "SkillRoundHandlerBase.cs: after storing observations, also render them as formatted text and append to DiscussionLog"

tests:
  - "SkillObservation_IdAssignedByFramework_NotByLlm"
  - "SkillRoundHandler_ParsesJsonObservations_StoresInContext"
  - "SkillRoundHandler_InvalidJson_FallsBackToSingleObservation"
  - "SkillRoundHandler_PartialValidJson_TakesValidSkipsBroken"
  - "SkillRoundHandler_PopulatesDiscussionLogFromObservations"
  - "ConvergenceCheckHandler_DetectsContradictingObservations_ConsensusIsFalse"
  - "ConvergenceCheckHandler_AllNonBlocking_ConsensusIsTrue"
  - "ConvergenceCheckHandler_BlockingBelowConfidence70_ConsensusIsFalse"
  - "ConvergenceCheckHandler_MissingRoleForConcern_AddsToAdditionalRoles"
  - "ConvergenceCheckHandler_ProducesConvergenceResult_NotConsolidatedPlanString"
  - "GeneratePlanHandler_ConvergenceResultPresent_MapsBlockingToSteps"
  - "GeneratePlanHandler_NeverSkipsWhenConvergenceResultPresent"
  - "GeneratePlanHandler_SuggestionMapsToStepAction"
  - "GeneratePlanHandler_LocationMapsToTargetFile"
  - "ObservationConcern_IsEnum_WithExpectedValues"
  - "ObservationLink_RelationshipValues_AreConstrained"

done:
  - "SkillObservation and ConvergenceResult records in AgentSmith.Contracts with enum types"
  - "SkillRoundHandler produces SkillObservation JSON — not free text"
  - "SkillRoundHandler handles partial JSON gracefully — valid observations kept, broken skipped with warning"
  - "ConvergenceCheckHandler produces ConvergenceResult — not ConsolidatedPlan string"
  - "ConvergenceCheckHandler uses rewritten structured prompt for observation comparison"
  - "GeneratePlanHandler uses ConvergenceResult.Blocking as structured input — always produces PlanSteps"
  - "DiscussionLog still populated for backward compat (mad-discussion, discussion markdown)"
  - "C# record definition + few-shot example embedded in skill prompts"
  - "fix-bug pipeline: AgenticExecuteCommand receives plan with concrete steps (not 0 steps)"
  - "All existing tests green"
  - "All 16 new tests pass"
  - "dotnet build zero warnings"
