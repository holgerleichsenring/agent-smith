  - "All existing tests pass (no regressions)"
  - "observation-schema.md contains explicit severity allowlist + Nuclei mapping rule"
  - "All 16 api-security SKILL.md files have their per-skill Output format sections replaced with a single framework-pointer line"
  - "agent-smith-skills version.txt = 1.5.0; CHANGELOG.md has a 1.5.0 entry; dist/ contains the regenerated tarball + .sha256 sidecar"
  - "Two commits land: one in agent-smith repo (parser + schema + tests), one in agent-smith-skills repo (SKILL.md cleanup + version bump + dist)"
  - "Smoke run shows no parser warnings and a multi-entry findings list (operator-validated, deferred like p0119a/p0121)"
