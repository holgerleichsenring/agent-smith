# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0333b
goal: "Git-history secrets reach delivery: a history-only secret's observation severity was Medium and fell off MergeMasterFindings' High+ promotion cliff, silently losing exactly the GitHub-comparable signal — lift it to Critical so it survives"

applies_to: backend

requires: [p0333]

decisions:
  - "Verified root cause: GitHistoryScanHandler.cs:42 set Severity = StillInWorkingTree ? High : Medium, but SecurityFindingsFormatter.cs:90-91 counts history-only as CRITICAL and still-in-tree as HIGH. The observation severity contradicted the formatter AND, being Medium, was dropped by MergeMasterFindings' IsHighOrAbove filter. Fix aligns the observation with the formatter (history-only=Critical, still-in-tree=High); both stay High+ so neither is ever silently dropped"
  - "History-only (deleted-but-in-history) is the higher risk, not the lower: it is retrievable from history forever and usually forgotten-and-unrotated — GitHub Secret Scanning flags it regardless. Mapping it below the merge cliff was the actual defect"

steps:
  - id: lift-history-only-severity
    action: "GitHistoryScanHandler: history-only secret -> Critical, still-in-tree -> High (both High+); log counts already match this framing"
    modify:
      - "GitHistoryScanHandler.cs:42 severity ternary"

tests:
  - "Execute_HistoryOnlySecret_EmittedAsCriticalObservation"
  - "Execute_SecretStillInWorkingTree_EmittedAsHighObservation"

done:
  - "A history-only secret is emitted as Critical and survives the merge (test)"
  - "A still-in-tree secret is emitted as High (test)"
  - "Full suite green"
