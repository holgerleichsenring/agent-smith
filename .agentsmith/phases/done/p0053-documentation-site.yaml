    # Architecture (clean arch layers, project structure, extending)
    # Contributing (dev setup, coding principles, phase workflow)
done:
  - "MkDocs builds locally"
  - "All pipeline workflows documented with examples"
  - "GitHub Actions deploys to GitHub Pages"
  - "code.agent-smith.org resolves with SSL"
