    action: "Write documentation sections"
    # Getting Started (install, quick start fix, quick start api-scan)
    # Pipelines (fix-bug, security-scan, api-scan, legal-analysis, mad-discussion)
    # Concepts (pipeline system, phases & runs, multi-skill, decision logging, cost tracking)
    # Configuration (agentsmith.yml ref, skills YAML ref, tool config, model registry)
    # AI Providers (Claude, OpenAI, Gemini, Ollama, OpenAI-compatible)
    # CI/CD (Azure DevOps, GitHub Actions, GitLab CI, generic)
