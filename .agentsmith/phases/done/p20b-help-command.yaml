phase: p20b
goal: "Help command, greeting detection, unknown-input handling, and clarification flow"
requires: ["p20a"]
decisions:
  - help-hardcoded: "Help text is hardcoded in HelpHandler — commands are application-defined, not configurable"
  - greeting-in-regex: "hi/hello/hey/hallo caught in regex stage at zero AI cost"
  - clarification-in-redis: "Low-confidence suggestions stored via ClarificationStateManager with TTL; replay on Yes click avoids second AI call"
  - button-callbacks: "SlackInteractionHandler dispatches error:retry, error:abandon, and clarification button actions"
steps:
  - id: help-handler
    action: "Create HelpHandler with SendHelp, SendGreeting, SendUnknown, SendClarification"
    new: ["HelpHandler"]
  - id: greeting-regex
    action: "Add greeting + help patterns to ChatIntentParser regex stage"
    modify: ["ChatIntentParser: greeting regex patterns"]
  - id: clarification-state
    action: "Create ClarificationStateManager with Redis-backed pending clarification + TTL"
    new: ["ClarificationStateManager", "PendingClarification { SuggestedCommandType, TicketNumber, Project, OriginalInput }"]
  - id: dispatcher-wiring
    action: "Wire HelpHandler into Dispatcher, handle button callbacks"
    modify: ["SlackInteractionHandler: button callback routing", "ServiceCollectionExtensions: DI", "ChatIntent.cs: added GreetingIntent"]
done:
  - "help/? -> full capability message"
  - "hi/hello -> short greeting"
  - "unknown input -> I didn't understand + hint"
  - "low confidence -> clarification with Yes/Help buttons"
  - "Yes button replays stored intent; Help button shows help"
  - "no AI call for help, ?, greetings, or unknown"
