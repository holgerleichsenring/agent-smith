# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0192-pre-commit-secret-scan
goal: |
  Defense-in-depth for p0191. Even with the master prompt mandating
  user-config-level credential apply, a misbehaving agent could write
  a token into a repo file. CommitAndPRHandler must refuse the commit
  if the staged diff contains known secret patterns.

requires:
  - p0191-artifact-credentials-tool

scope:
  in: |
    Scanner runs in CommitAndPRHandler before `git commit`. Patterns:
      - Generic high-entropy strings in NuGet.Config <clearTextPassword>
      - npm `_authToken=` lines in .npmrc / package-lock
      - PAT formats: ghp_, sk-ant-, sk-, glpat-, AzureDevOps base64
      - Generic JWT shape (header.payload.signature)
    Match → abort commit, emit failure with file:line, surface in
    dashboard via existing failure-summary path.
  out: |
    Full Gitleaks / TruffleHog integration — too heavy for first slice.
    Pattern-based catch is enough for the realistic agent-leak case.
    Pre-edit blocking (refuse the write itself) — out; commit-time gate
    is the chokepoint where the leak would escape the sandbox.

decisions:
  - key: "Commit-time, not write-time — single chokepoint, simpler than instrumenting every file tool."
  - key: "Hand-rolled pattern set, not Gitleaks — keep dependency surface flat; expand on need."

steps:
  - id: scanner
    action: "SecretPatternScanner with the named pattern set; returns matches with file:line."
    new:
      - "src/backend/AgentSmith.Infrastructure/Services/SecretPatternScanner.cs"
  - id: commit-gate
    action: "CommitAndPRHandler invokes scanner on staged diff; abort + emit failure event on match."
    modify:
      - "(CommitAndPRHandler path)"
  - id: tests
    new:
      - "tests/AgentSmith.Tests/Infrastructure/SecretPatternScannerTests.cs"
      - "tests/AgentSmith.Tests/Handlers/CommitAndPRHandlerSecretGateTests.cs"

tests:
  - "SecretPatternScanner_DetectsNuGetClearTextPassword"
  - "SecretPatternScanner_DetectsNpmAuthToken"
  - "SecretPatternScanner_DetectsCommonPatTokens"
  - "CommitAndPRHandler_AbortsOnSecretMatch_EmitsFailure"

done:
  - "Commit aborts when staged diff contains a known secret pattern."
  - "Failure surfaces in the dashboard with file:line."
