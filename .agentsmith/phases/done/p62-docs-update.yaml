# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p62
goal: "Extend docs site with p58-p61 concepts — new pages for dialogue, knowledge base, PR comments, webhooks, security config, phase workflow"
requires: ["p53", "p58", "p59", "p60", "p61"]
steps:
  - id: nav
    action: "Extend mkdocs.yml navigation with new pages"
  - id: new-pages
    action: "Create 5 new docs pages"
    new:
      - "docs/concepts/interactive-dialogue.md"
      - "docs/concepts/knowledge-base.md"
      - "docs/integrations/pr-comments.md"
      - "docs/configuration/webhooks.md"
      - "docs/architecture/phase-workflow.md"
  - id: extend-pages
    action: "Extend 6 existing pages with new phase content"
    modify:
      - "docs/configuration/security-scan.md: add DAST, auto-fix, trend config"
      - "docs/pipelines/security-scan.md: add p60 sections"
      - "docs/concepts/phases-runs.md: mention wiki/"
      - "docs/concepts/decision-logging.md: link to knowledge-base"
      - "docs/pipelines/pr-review.md: connection to p59/p58"
done:
  - "mkdocs.yml navigation contains all new pages"
  - "All 5 new pages created with complete content"
  - "All 6 existing pages extended"
  - "Internal links correct"
  - "mkdocs build --strict passes (no broken links)"
