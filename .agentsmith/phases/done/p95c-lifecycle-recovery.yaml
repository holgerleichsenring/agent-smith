# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p95c
goal: "Crash-recovery and observability for the ticket lifecycle. Adds JobHeartbeatService, StaleJobDetector, EnqueuedReconciler; extends PipelineExecutor with Enqueued→InProgress→Done/Failed transitions; finalizes lifecycle config schema; adds OpenTelemetry counters."
requires: ["p95b"]

decisions:
  - key: "Heartbeats via Redis SETEX agentsmith:heartbeat:{ticketId} with 2min TTL, renewed every 30s by the running job. StaleJobDetector reverts InProgress-without-heartbeat to Pending every 1min — any replica can do it safely because transitions are atomic per platform."
  - key: "EnqueuedReconciler runs at startup and every 10min: for each project, list tickets in Enqueued status via ITicketProvider.ListByStatusAsync (added in p95b); if absent from queue and no heartbeat, re-enqueue. This covers Redis loss, crashed pods, and failed enqueues from p95a's ClaimService."
  - key: "Housekeeping (StaleJobDetector + EnqueuedReconciler) runs on every replica unconditionally in p95c. Leader-election for housekeeping is explicitly deferred to p96 (which introduces the lease primitive for the poller anyway). Duplicate work is cheap — atomic transitions serialize it."
  - key: "PipelineExecutor wraps execution with JobHeartbeatService.StartAsync/StopAsync and performs the Enqueued→InProgress transition on start, Done on success, Failed (with error comment) on failure. Failed keeps the ticket around for metrics; no auto-archival."
  - key: "Full lifecycle config lands here: per-project status_labels (pending/enqueued/in_progress/done/failed), reconciler_interval_minutes, heartbeat_ttl_seconds. Hardcoded labels from p95a become defaults."

steps:
  - id: heartbeat-service
    action: "Running jobs publish heartbeats; stale ones get reverted"
    new:
      - "Contracts/Services/IJobHeartbeatService.cs: StartAsync(ticketId) returns an IAsyncDisposable that stops renewal on dispose."
      - "Application/Services/Lifecycle/JobHeartbeatService.cs: renews Redis key every heartbeat_renewal_seconds with heartbeat_ttl_seconds TTL. Scoped to Cli --server process."
      - "Application/Services/Lifecycle/StaleJobDetector.cs: BackgroundService, every 1min lists InProgress tickets via ITicketProvider.ListByStatusAsync, checks heartbeat key, reverts to Pending if missing."

  - id: pipeline-executor-transitions
    action: "PipelineExecutor transitions the ticket and runs heartbeats around execution"
    modify:
      - "Application/Services/PipelineExecutor.cs: before the command loop, transition Enqueued → InProgress; start JobHeartbeatService. After the loop, on success transition to Done; on failure transition to Failed with an error comment. Use IAsyncDisposable for heartbeat."

  - id: enqueued-reconciler
    action: "Periodic reconciliation of ticket state vs queue state"
    new:
      - "Application/Services/Lifecycle/EnqueuedReconciler.cs: BackgroundService. On startup and every reconciler_interval_minutes: for each configured project list Enqueued tickets, compare against IRedisJobQueue contents + heartbeats, re-enqueue orphans, log every action."

  - id: full-config-schema
    action: "Lifecycle config per project"
    new:
      - "Contracts/Models/Configuration/LifecycleConfig.cs: StatusLabels (pending/enqueued/in_progress/done/failed with defaults), ReconcilerIntervalMinutes (default 10), HeartbeatTtlSeconds (default 120), HeartbeatRenewalSeconds (default 30)."
    modify:
      - "Contracts/Models/Configuration/ProjectConfig.cs: add Lifecycle property (default instance)."
      - "GitHubTicketStatusTransitioner (p95a) + other transitioners (p95b): replace hardcoded TicketStatusLabels with LifecycleConfig-provided labels."
      - "config/agentsmith.example.yml: document the lifecycle section under project config."

  - id: observability
    action: "Structured logging + OpenTelemetry counters"
    modify:
      - "TicketClaimService: already logs in p95a — add OTel counter claim.outcome{result}."
      - "PipelineQueueConsumer: emit structured log on each dequeue (queue depth, in-flight count) and completion. Counters queue.depth, queue.inflight."
      - "EnqueuedReconciler: counter reconciler.actions{type}."
      - "StaleJobDetector: counter heartbeat.stale."

  - id: verify
    action: "dotnet build && dotnet test — 0 new warnings, all tests green"

tests:
  - "JobHeartbeatService_RenewsKeyOnInterval"
  - "JobHeartbeatService_Disposal_StopsRenewal"
  - "StaleJobDetector_InProgressWithoutHeartbeat_RevertsToPending"
  - "StaleJobDetector_InProgressWithFreshHeartbeat_NoAction"
  - "PipelineExecutor_OnStart_TransitionsToInProgress"
  - "PipelineExecutor_OnSuccess_TransitionsToDone"
  - "PipelineExecutor_OnFailure_TransitionsToFailedWithComment"
  - "EnqueuedReconciler_TicketEnqueuedButQueueEmpty_ReEnqueues"
  - "EnqueuedReconciler_TicketEnqueuedAndInQueue_NoAction"
  - "EnqueuedReconciler_TicketEnqueuedWithFreshHeartbeat_NoAction"
  - "LifecycleConfig_Defaults_MatchP95aHardcodedLabels (no-regression guarantee)"

done:
  - "Crashed pods leave no zombie tickets — StaleJobDetector reverts InProgress-without-heartbeat within 1 minute."
  - "Redis can be lost and restarted — EnqueuedReconciler restores all Enqueued tickets within 10 minutes."
  - "Ticket lifecycle is visible on the ticket itself (Pending → Enqueued → InProgress → Done/Failed labels) — operators can inspect without accessing Redis or logs."
  - "Full lifecycle config schema published; backward compatible (defaults match p95a)."
  - "OpenTelemetry counters emit for claim outcomes, queue depth, reconciler actions, stale heartbeats."
  - "dotnet build 0 warnings, all tests green."
