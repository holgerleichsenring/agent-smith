# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0046
goal: "Replace free-text regex parsing with explicit CLI flags and LLM intent parsing for Slack — eliminate 'ticketless' concept, split oversized files"
decisions:
  - key: "CLI: explicit flags only, no free-text parsing — one verb per pipeline"
  - key: "Slack: LLM intent parsing via Haiku (~$0.001/intent) — not regex"
  - key: "No 'ticketless' concept — each pipeline type declares what it needs"
  - key: "Program.cs -> command registrations only, handler logic in dedicated classes"
  - key: "'run' kept as hidden deprecated command for one release"
steps:
  - id: cli-split
    action: "Split Program.cs (456 lines) into dedicated command files"
    new:
      - "Commands/FixCommand.cs, FeatureCommand.cs, InitCommand.cs, MadCommand.cs, LegalCommand.cs"
      - "Commands/SecurityScanCommand.cs, ApiScanCommand.cs, ServerCommand.cs"
      - "Commands/SharedOptions.cs — --config, --verbose, --dry-run, --project, --headless"
      - "Banner.cs, ServiceProviderFactory.cs, DryRunPrinter.cs"
    modify: ["Program.cs: shrink to ~30 lines"]
  - id: use-case
    action: "Refactor ExecutePipelineUseCase to accept PipelineRequest"
    new:
      - "PipelineRequest: { ProjectName, PipelineName, TicketId?, Context? }"
    modify:
      - "ExecutePipelineUseCase: one ExecuteAsync(PipelineRequest) — no regex, no ticketless split"
  - id: intent
    action: "Replace regex parsers with LLM intent parser"
    new:
      - "LlmIntentParser: Haiku call -> structured JSON -> PipelineRequest"
    modify:
      - "IIntentParser: return PipelineRequest"
      - "SlackMessageDispatcher: use LlmIntentParser"
    # Delete: RegexIntentParser.cs, ChatIntentParser.cs
done:
  - "Program.cs under 30 lines"
  - "Each command file under 120 lines"
  - "ExecutePipelineUseCase accepts PipelineRequest, no regex"
  - "All CLI verbs support --dry-run via DryRunPrinter"
  - "LlmIntentParser returns structured JSON via Haiku"
  - "No file over 120 lines in Host or Application layers"
