# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0104
goal: "api-scan: project-brief from context.yaml + coding-principles + code-map drives stack-aware skill prompts; deterministic finding↔handler correlation; controller-implementation review and security-headers audit done LLM-only, no new regex"

requires: ["p0102", "p0102a", "p0103a"]

decisions:
  - key: "Stack/arch knowledge comes from the target's .agentsmith/ files (context.yaml + coding-principles.md + code-map.yaml), not from regex detection — these files are canonical truth, maintained by the project, generated by Bootstrap (p0022/p0028). Skills are sprach-agnostisch im Code, projekt-aware im Prompt"
  - key: "Zero new regex patterns in this phase — pattern files (api-auth.yaml from p0102) earn their place only as fast-Null-FP markers like ValidateLifetime=false; controller-review and headers-audit are context-dependent and belong to the model. Adds-pattern-per-stack would scale linearly with frameworks and bias quality toward whatever ecosystem maintainers know best (today: .NET — api-auth.yaml is 100% .NET tokens despite advertising multi-stack)"
  - key: "Correlator stays deterministic — URL+method ↔ path-template is mechanics, sprachfrei. Putting an LLM in the matching loop is waste; LLM judgment happens after, with the correlation as data"
  - key: "All three features ship together — the two new skills depend on the correlator carrying handler+finding pairs and on the project-brief carrying stack info. Splitting would either ship reviewers without context (weak) or context with no consumer (no signal)"
  - key: "Expected security-header baseline lives in baselines/api-headers.yaml — pure config, not regex. Different orgs follow different standards (OWASP ASVS L1/L2, BSI, internal compliance). Customers override by replacing the file"
  - key: "Project-brief filtered before injection — context.yaml minus state.done/behavior.pipelines/integrations (irrelevant for code-review, ~70% of file). code-map.yaml full (always small). coding-principles.md loaded as-is if present, compacted by existing ClaudeContextCompactor only when oversized"
  - key: "Project-brief lives in cached prefix per p0102 — paid once per round, free for every skill iteration"
  - key: "coding-principles.md is optional and may carry project-specific security rules ('all endpoints need [Authorize]', 'no raw SQL', 'DTO mapping via Mapster only') — exactly the input controller-implementation-reviewer needs to distinguish project-consistent code from violations. Loaded silently if present, no warning if absent"
  - key: ".agentsmith/ resolution: relative to ContextKeys.SourcePath (the checked-out target), not AS working dir. Recursive lookup for mono-repos — first .agentsmith/ encountered under SourcePath wins. Without it: 'unknown stack' brief. Without that distinction the fallback path masks a bug: AS finds its own .agentsmith/ instead of the target's, all tests pass, no one notices"
  - key: "controller-implementation-reviewer gated on ApiSourceAvailable AND state-changing routes mapped — no source means nothing to review beyond what api-design-auditor already says from schema alone"
  - key: "security-headers-auditor runs in passive-no-source too — Nuclei/ZAP header findings are valuable on their own; source-side middleware excerpts upgrade quality but are not required"
  - key: "New 'headers' category in ApiScanFindingsCompressor — auth/design/runtime did not carve a clean slice for header-only findings, they drowned in DAST noise inside runtime"
  - key: "Overlap between ownership-checker and controller-implementation-reviewer is intentional — ownership-checker finds missing authorization predicates only; controller-reviewer covers validation, error-disclosure, DTO leaks, SQL injection patterns. false-positive-filter dedupes"
  - key: "Cross-stack verification happens in real scans against the existing project portfolio (Angular/TypeScript, .NET, Java, Python) — no synthetic fixtures built for this phase. Per-stack gaps observed in production are addressed by sharpening the project-brief or extending skill.md examples in follow-up phases, not by adding new regex"

steps:
  - id: load-project-context
    action: "Wire existing context loaders into api-security-scan; surface as project-brief in cached prefix"
    modify:
      - "PipelinePresets.ApiSecurityScan: insert LoadContext, LoadCodingPrinciples, LoadCodeMap after TryCheckoutSource (skip silently if .agentsmith/ absent)"
      - "LoadContextHandler / LoadCodingPrinciplesHandler / LoadCodeMapHandler: resolve .agentsmith/ relative to ContextKeys.SourcePath (the checked-out target), not the AS working directory. Recursive lookup for mono-repo layouts — first .agentsmith/ found under SourcePath wins (depth-first, lexical order). Path resolution shared via a small ProjectMetaResolver service so all three loaders agree on the same root"
      - "ApiSkillRoundHandler.BuildDomainSection: 'Project Brief' block at top of stable prefix — meta + stack + arch + quality.naming + quality.principles from context.yaml, code-map.yaml modules+key_classes, coding-principles.md when present (compacted via ClaudeContextCompactor only when oversized)"
      - "ProjectBriefBuilder (Application): filters context.yaml to relevant sections (drops state.done, behavior.pipelines, integrations), formats code-map as compact module list, includes coding-principles verbatim if loaded"
      - "Fallback path: when no .agentsmith/ found under SourcePath, brief reads 'Stack: unknown — review on source-snippets only'"

  - id: contracts
    action: "Carry handler↔finding correlation through the pipeline"
    new:
      - "FindingHandlerCorrelation: { FindingSource, FindingId, Severity, Method, Url, Handler: RouteHandlerLocation? }"
      - "ContextKeys.FindingHandlerCorrelations"

  - id: correlator
    action: "Deterministic finding↔handler matcher between CompressApiScanFindings and LoadSkills"
    new:
      - "IFindingHandlerCorrelator + FindingHandlerCorrelator (Infrastructure): templates routes to regex, matches Nuclei/ZAP finding URLs+methods, emits FindingHandlerCorrelation list"
      - "CorrelateFindingsHandler (Application): pulls NucleiResult/ZapResult/ApiCodeContext, writes FindingHandlerCorrelations"
      - "CommandNames.CorrelateFindings"
    modify:
      - "PipelinePresets.ApiSecurityScan: insert CorrelateFindings between CompressApiScanFindings and LoadSkills"

  - id: header-category
    action: "Carve headers out of the runtime category"
    modify:
      - "ApiScanFindingsCompressor.BuildCategorySlices: classify Nuclei/ZAP header-related findings into a new 'headers' slice (CSP, HSTS, X-Content-Type-Options, X-Frame-Options, Referrer-Policy, Permissions-Policy, Cookie flags)"
      - "ApiScanFindingsFormatter: IsHeaderNuclei + IsHeaderZap predicates by template-id/title patterns"

  - id: controller-reviewer-skill
    action: "controller-implementation-reviewer skill — LLM-only, no pattern file"
    new:
      - "skills/api-security/controller-implementation-reviewer/skill.md — covers input validation gaps, exception leakage to response body, DTO/entity over-exposure (passwordHash, internalId, stackTraces), SQL/NoSQL string concatenation, missing authorization annotations, transactional gaps, secret/PII in logs. Multi-stack examples in skill body (.NET / Express / FastAPI / Spring) — but the skill instructs the model to use the project-brief stack info to apply stack-correct idioms rather than rely on syntax-spotting"
    modify:
      - "ApiSkillRoundHandler.BuildPerSkillCodeSection: case 'controller-implementation-reviewer' → state-changing handler snippets + correlated findings for those handlers"
      - "ApiSecurityTriagePromptBuilder.SignalAnalysis: signal hasCorrelatedFindings"

  - id: headers-auditor-skill
    action: "security-headers-auditor skill — LLM + baseline config, no pattern file"
    new:
      - "skills/api-security/security-headers-auditor/skill.md — compares observed headers (Nuclei/ZAP) and source-side middleware registrations against expected baseline; reports missing, weak, and well-known-bad values"
      - "baselines/api-headers.yaml — expected header set (HSTS, CSP, X-Content-Type-Options, X-Frame-Options, Referrer-Policy, Permissions-Policy, Cookie flags), severity defaults, allowed value patterns. Pure config, no regex. Customer override replaces the file"
      - "IBaselineLoader + BaselineLoader (Infrastructure): loads baselines/*.yaml from current content root, with config-dir override on top"
    modify:
      - "ApiSkillRoundHandler.BuildPerSkillCodeSection: case 'security-headers-auditor' → AuthBootstrapFiles + SecurityMiddlewareRegistrations"
      - "ApiSkillRoundHandler.BuildPerSkillFindingsSection: skill consumes new 'headers' category slice"
      - "ApiSkillRoundHandler.BuildDomainSection: include api-headers baseline in cached prefix when headers-auditor active in round"
      - "ApiSecurityTriageHandler: include headers-auditor whenever headers slice non-empty OR ApiSourceAvailable=true"

  - id: triage
    action: "Wire new signals and skill gates"
    modify:
      - "ApiSecurityTriagePromptBuilder.SignalAnalysis: add hasCorrelatedFindings + hasHeaderFindings"
      - "ApiSecurityTriageHandler: gate controller-implementation-reviewer on hasStateChangingMapped, headers-auditor on hasHeaderFindings OR ApiSourceAvailable"

  - id: output
    action: "Surface correlation in output strategies"
    modify:
      - "ApiScanFindingsFormatter: when correlation present, render finding with endpoint + file:line"
      - "ConsoleOutputStrategy: file:line column when correlated"
      - "MarkdownOutputStrategy: link to file:line"
      - "SarifOutputStrategy: physicalLocation { artifactLocation, region } when correlated"

  - id: docs
    action: "Document new pipeline shape and skills"
    modify:
      - "docs/pipelines/api-security-scan.md: project-brief loading, correlator step, two new skills, headers category"
      - "docs/security/custom-baselines.md (new): example for baselines/api-headers.yaml override"
      - "docs/concepts/project-brief.md (new): how context.yaml + coding-principles + code-map drive multi-stack quality"

tests:
  - "ProjectBriefBuilder_FullContextYaml_FiltersOutStateAndBehavior"
  - "ProjectBriefBuilder_LargeCodingPrinciples_CompactsViaExistingCompactor"
  - "ProjectBriefBuilder_CodingPrinciplesAbsent_BriefStillBuilds"
  - "ProjectBriefBuilder_NoAgentsmithDir_BuildsUnknownStackBrief"
  - "ApiSkillRoundHandler_ProjectBrief_InCachedPrefix_NotPerSkill"
  - "PipelinePresets_ApiSecurityScan_LoadersAfterTryCheckoutSource"
  - "LoadContext_TargetWithAgentsmithDir_LoadsFromCheckedOutPath"
  - "LoadContext_MonorepoLayout_FindsAgentsmithInSubdir"
  - "LoadContext_NoAgentsmithUnderSourcePath_DoesNotFallBackToAsWorkingDir"
  - "ProjectMetaResolver_FirstHitWins_DepthFirstLexical"
  - "FindingHandlerCorrelator_NucleiFindingOnMappedRoute_AttachesHandler"
  - "FindingHandlerCorrelator_FindingUrlNotInRoutes_NoCorrelation"
  - "FindingHandlerCorrelator_PathTemplateWithIdSegment_MatchesConcreteUrl"
  - "FindingHandlerCorrelator_QueryStringStripped_MatchesPathOnly"
  - "FindingHandlerCorrelator_TrailingSlashNormalized_StillMatches"
  - "FindingHandlerCorrelator_MethodMismatch_NoCorrelation"
  - "FindingHandlerCorrelator_RouteConfidenceBelowThreshold_NoCorrelation"
  - "FindingHandlerCorrelator_NoApiCodeContext_EmitsEmptyCorrelations"
  - "CorrelateFindingsHandler_PassesCorrelationsToPipeline"
  - "PipelinePresets_ApiSecurityScan_CorrelateFindingsBetweenCompressAndLoadSkills"
  - "ApiScanFindingsCompressor_CspFinding_GoesToHeadersSlice"
  - "ApiScanFindingsCompressor_HstsFinding_GoesToHeadersSlice"
  - "ApiScanFindingsCompressor_BolaFinding_StaysInRuntimeSlice"
  - "ApiSkillRoundHandler_ControllerReviewer_ReceivesStateChangingHandlerSnippets"
  - "ApiSkillRoundHandler_ControllerReviewer_ReceivesCorrelatedFindings"
  - "ApiSkillRoundHandler_HeadersAuditor_ReceivesMiddlewareExcerpts"
  - "ApiSkillRoundHandler_HeadersAuditor_ReceivesHeadersSlice"
  - "ApiSkillRoundHandler_HeadersAuditor_ReceivesBaselineConfig"
  - "ApiSecurityTriage_HasStateChangingMapped_IncludesControllerReviewer"
  - "ApiSecurityTriage_HeadersSliceNonEmpty_IncludesHeadersAuditor_PassiveNoSource"
  - "ApiSecurityTriage_NoSource_NoHeaderFindings_ExcludesHeadersAuditor"
  - "BaselineLoader_DefaultBaseline_LoadsFromContentRoot"
  - "BaselineLoader_UserOverride_ReplacesDefault"
  - "ApiScanFindingsFormatter_CorrelatedFinding_RendersFileLine"
  - "SarifOutputStrategy_CorrelatedFinding_EmitsPhysicalLocation"

done:
  - "Project-brief loaded into cached prefix when target has .agentsmith/ under SourcePath; missing folder degrades to 'unknown stack' brief without failure"
  - ".agentsmith/ resolution verified against checked-out target (not AS working dir), monorepo subdir lookup confirmed"
  - "Correlator emits FindingHandlerCorrelation for every Nuclei/ZAP finding whose URL+method match a mapped route at conf ≥ 0.5; mismatches logged at debug"
  - "controller-implementation-reviewer flags exception-leakage, DTO over-exposure, SQL concat on a real .NET project from the portfolio — file:line rendered. (Other stacks verified opportunistically against existing portfolio scans; per-stack gaps tracked as follow-up phases, not ship blockers)"
  - "security-headers-auditor flags missing CSP/HSTS in passive-no-source mode using only Nuclei findings"
  - "security-headers-auditor flags weak CSP value with source-side middleware excerpt in code-aware mode"
  - "Headers slice carved out — runtime slice no longer contains header-only findings (snapshot diff verified)"
  - "Custom baselines/api-headers.yaml overrides built-in expected set (override-precedence test passes)"
  - "Correlated findings render endpoint + file:line in Console + Markdown + SARIF physicalLocation"
  - "Token-cost regression check: project-brief inflation < 15% per round vs. p0102 baseline (project-brief is in cached prefix, paid once)"
  - "dotnet build zero warnings, all tests green"
