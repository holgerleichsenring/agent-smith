# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0111b
goal: "Rewrite all coding/* and security/* skills in agent-smith-skills with extended SKILL.md frontmatter. Seeds concept-vocabulary, scaffolds _index/, updates READMEs."

requires: ["p57a"]

decisions:
  - key: "Skills are rewritten with the new frontmatter. The current SkillLoader keeps reading them via its existing tolerant YAML parser — fields it does not know are simply ignored. This is a YAML side-effect, not a backward-compatibility goal. Zero code change in agent-smith; this is a content rewrite in agent-smith-skills plus doc updates."
  - key: "Filter role's output mode lives nested in role_assignment.filter.output (values: list | artifact). Local to the filter trigger, not a top-level frontmatter field. false-positive-filter ships output: list, chain-analyst ships output: artifact."
  - key: "chain-analyst migrates to roles_supported=[filter] with output: artifact, replacing the deprecated executor role from p57a. Synthesizer-style condensation maps cleanly to filter's Final-stage list-reducer with the artifact output mode — no separate role-enum value needed."
  - key: "Major version bump (1.x → 2.0.0) for every migrated skill. Communicates semantic change in skill API contract (multi-role declaration, keyed activation). source.md unchanged — version field is the API marker for external skill consumers."
  - key: "Anchor-first migration — architect (lead+analyst+reviewer, broadest), tester (analyst+reviewer with phase differentiation, domain pattern), false-positive-filter (filter-only, narrowest). Three patterns established and reviewed before applying to remaining 15 skills."
  - key: "concept-vocabulary.yaml seed is a starting point, not final. Iterated as activation keys reveal needs (e.g. dba may require db_schema and db_migration as separate concepts). Stable list emerges only after all 18 skills migrated."
  - key: "Body 'You may NOT use these phrases' soft-prompts not copy-pasted across skills — added per skill where reviewer-style hedging-resistance matters (architect, security-reviewer); analyst-only skills typically omit. Soft prompt only, no validator enforcement (per p0111 Confidence-decision)."
  - key: "Docs scope split — p0111b documents the additive format (READMEs, configuration/skills.md). p0111c documents the new triage behavior (concepts/triage.md, migration guide, multi-agent-orchestration.md rewrite) when the model is active. Avoids documenting behavior that does not yet exist."
  - key: "Spec-PR (this file in agent-smith) and skills-PR (in agent-smith-skills) kept open until both ready, then merged simultaneously. Avoids 'spec landed but skills already revised it' race during iteration on activation keys and concept vocabulary."
  - key: "No permissive mode anywhere in p0111. Pre-1.0 software, no backward compatibility. p0111a's strict SkillLoader requires every skill to have the new frontmatter — p0111b guarantees that all shipped skills do, before p0111a lands."
  - key: "_index/ directory scaffolded with .gitkeep in p0111b — content (per-category build artifacts) generated by SkillIndexBuilder in p0111a. .gitignore lists /skills/_index/*.yaml so the artifacts stay out of git."

steps:
  - id: concept-vocabulary
    action: "Author initial concept-vocabulary.yaml — controlled vocabulary referenced from SKILL activation keys"
    new:
      - "agent-smith-skills/skills/concept-vocabulary.yaml: ~14 stack-agnostic concepts (persistence, listeners, background_jobs, external_apis, authentication, authorization, ui_rendering, cli_interface, configuration_management, infrastructure_definition, public_api, schedulers, file_io, cryptography). Each entry: {key, desc}. Operators may extend; ConceptVocabularyValidator (p0111a) warns on unknown concepts."

  - id: index-scaffolding
    action: "Create _index/ directory placeholder, gitignore generated artifacts"
    new:
      - "agent-smith-skills/skills/_index/.gitkeep: empty marker so directory exists in git"
    modify:
      - "agent-smith-skills/.gitignore: add '/skills/_index/*.yaml' (build artifact, generated by SkillIndexBuilder in p0111a)"

  - id: anchor-skills
    action: "Migrate three anchor skills first — review frontmatter before continuing to the remaining 15"
    modify:
      - "agent-smith-skills/skills/coding/architect/SKILL.md: roles_supported=[lead, analyst, reviewer], activation+role_assignment per p0111-architect-role-sample.md (forbidden_phrases dropped per Confidence-decision), version 2.0.0, body split into ## as_lead / ## as_analyst / ## as_reviewer"
      - "agent-smith-skills/skills/coding/tester/SKILL.md: roles_supported=[analyst, reviewer] (no lead), activation positives around testable code change, role_assignment.analyst (pre-execute planning) vs role_assignment.reviewer (post-execute evidence), version 2.0.0, body split into ## as_analyst / ## as_reviewer"
      - "agent-smith-skills/skills/security/false-positive-filter/SKILL.md: roles_supported=[filter], role_assignment.filter.output=list, activation around presence of security findings + scan-pipeline context, version 2.0.0, body single section ## as_filter"
    new:
      - "agent-smith-skills/skills/coding/architect/references/ddd-patterns.md: DDD pattern reference cited via {{ref:ddd-patterns}} from architect body"
      - "agent-smith-skills/skills/coding/architect/references/anti-patterns.yaml: anti-pattern reference cited via {{ref:anti-patterns}} from architect body"

  - id: remaining-skills
    action: "Migrate remaining 15 skills using anchor patterns. Iterate concept-vocabulary as activation keys reveal new concepts."
    modify:
      - "agent-smith-skills/skills/coding/backend-developer/SKILL.md: roles_supported=[analyst, reviewer], version 2.0.0"
      - "agent-smith-skills/skills/coding/dba/SKILL.md: roles_supported=[lead, analyst, reviewer] — lead when migration is primary, version 2.0.0"
      - "agent-smith-skills/skills/coding/devops/SKILL.md: roles_supported=[analyst, reviewer], version 2.0.0"
      - "agent-smith-skills/skills/coding/frontend-developer/SKILL.md: roles_supported=[analyst, reviewer], version 2.0.0"
      - "agent-smith-skills/skills/coding/product-owner/SKILL.md: roles_supported=[analyst], version 2.0.0"
      - "agent-smith-skills/skills/coding/security-reviewer/SKILL.md: roles_supported=[lead, analyst, reviewer] — lead when security fix is primary, version 2.0.0"
      - "agent-smith-skills/skills/security/ai-security-reviewer/SKILL.md: roles_supported=[analyst], version 2.0.0"
      - "agent-smith-skills/skills/security/auth-reviewer/SKILL.md: roles_supported=[analyst], version 2.0.0"
      - "agent-smith-skills/skills/security/chain-analyst/SKILL.md: roles_supported=[filter], role_assignment.filter.output=artifact (Final-stage synthesizer), version 2.0.0"
      - "agent-smith-skills/skills/security/compliance-checker/SKILL.md: roles_supported=[analyst], version 2.0.0"
      - "agent-smith-skills/skills/security/config-auditor/SKILL.md: roles_supported=[analyst], version 2.0.0"
      - "agent-smith-skills/skills/security/injection-checker/SKILL.md: roles_supported=[analyst], version 2.0.0"
      - "agent-smith-skills/skills/security/secrets-detector/SKILL.md: roles_supported=[analyst], version 2.0.0"
      - "agent-smith-skills/skills/security/supply-chain-auditor/SKILL.md: roles_supported=[analyst], version 2.0.0"

  - id: docs
    action: "Update READMEs and skills-configuration page with additive new-format reference"
    modify:
      - "agent-smith-skills/README.md: add 'Extended frontmatter (v2)' section — fields, semantics, link to architect+tester+false-positive-filter as live examples. Note that fields are ignored by the current loader and become active in p0111a/c."
      - "agent-smith/README.md: brief paragraph in skills section noting the multi-role model arrives via p0111. One sentence — no behavior description (deferred to p0111c docs)."
      - "agent-smith/docs/configuration/skills.md: add 'Extended frontmatter (introduced in p0111)' section, additive — current loader behavior described as unchanged, new fields documented as forward-looking."

  - id: verify
    action: "Validate that pre-p0111a SkillLoader still parses every migrated skill, vocabulary loads as YAML, no accidental breakage. dotnet build && dotnet test in agent-smith remain green (no agent-smith code changes)."

tests:
  - "Existing SkillLoaderTests + TriageHandlerTests in agent-smith remain green — confirms additive migration did not break the current loader"
  - "Static check (script): every migrated SKILL.md parses as YAML+Markdown without error"
  - "Static check (script): every key referenced in role_assignment exists in activation (catches typos before p0111a strict-mode lands)"
  - "Static check (script): references[].id values are unique within a skill"
  - "Static check (script): every concept referenced in activation positives exists in concept-vocabulary.yaml — fails the migration PR if a concept was forgotten"
  - "Manual smoke: run an existing pipeline (e.g. fix-bug on a sample ticket) against the migrated skills repo — pipeline completes, no skill-load errors"

done:
  - "agent-smith-skills/skills/concept-vocabulary.yaml committed with seed concepts (final list emerges from migration iteration)"
  - "agent-smith-skills/skills/_index/.gitkeep present; .gitignore excludes generated /skills/_index/*.yaml"
  - "All 8 coding/* skills migrated to v2.0.0 with new frontmatter (architect, backend-developer, dba, devops, frontend-developer, product-owner, security-reviewer, tester)"
  - "All 9 security/* skills migrated to v2.0.0 (ai-security-reviewer, auth-reviewer, chain-analyst, compliance-checker, config-auditor, false-positive-filter, injection-checker, secrets-detector, supply-chain-auditor)"
  - "chain-analyst's executor role replaced with filter+artifact output mode"
  - "architect/references/ddd-patterns.md and anti-patterns.yaml created and cited via {{ref:}} placeholders in architect body"
  - "Anchor skills (architect, tester, false-positive-filter) reviewed and approved before remaining 15 migrations begin"
  - "agent-smith-skills/README.md, agent-smith/README.md, agent-smith/docs/configuration/skills.md updated with additive new-format reference"
  - "agent-smith dotnet build + test remain green (no agent-smith code change in p0111b)"
  - "Spec-PR (this file) and skills-PR merged simultaneously to prevent stale-spec race"
