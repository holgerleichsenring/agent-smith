# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0070
goal: "Group decisions.md by phase/run context instead of category — add sourceLabel to IDecisionLogger, add workflow step to .claude/prompt.md"
steps:
  - id: interface
    action: "Add optional sourceLabel parameter to IDecisionLogger.LogAsync"
    modify:
      - "IDecisionLogger.cs: add string? sourceLabel"
  - id: file-logger
    action: "FileDecisionLogger uses sourceLabel as section header (## p0067: ...) when present, falls back to category"
    modify: ["FileDecisionLogger.cs"]
  - id: callers
    action: "GeneratePlanHandler and AgenticExecuteHandler pass ticket context as sourceLabel"
    modify: ["GeneratePlanHandler.cs", "AgenticExecuteHandler.cs"]
  - id: in-memory
    action: "InMemoryDecisionLogger matches updated interface"
    modify: ["InMemoryDecisionLogger.cs"]
  - id: workflow
    action: "Add decision logging step to .claude/prompt.md between tests and context.yaml update"
    modify: [".claude/prompt.md"]
  - id: seed
    action: "Create .agentsmith/decisions.md with p0066-p0068 decisions as reference"
    new: [".agentsmith/decisions.md"]
done:
  - "IDecisionLogger has optional sourceLabel parameter"
  - "FileDecisionLogger uses sourceLabel as section header when present"
  - "GeneratePlanHandler and AgenticExecuteHandler pass ticket context"
  - ".claude/prompt.md includes decision logging step"
  - "decisions.md created with p0066-p0068 decisions"
  - "Existing fix-bug pipeline still writes decisions (backward compat)"
  - "dotnet build + dotnet test pass"
