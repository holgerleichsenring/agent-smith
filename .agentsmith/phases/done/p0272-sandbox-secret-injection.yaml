# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0272
goal: |
  Inject operator-declared credentials into the k8s sandbox pod — arbitrary env
  vars and mounted secret files — so a stack whose build/test needs to talk to an
  external system can authenticate. Driver: a Salesforce repo whose "compile" is a
  server-side validate-deploy, needing `sf org login jwt` (client-id + username as
  env, a private key as a FILE). Today the pod gets ONLY JOB_ID/REDIS_URL and an
  optional GIT_TOKEN; there is no path for any other secret to reach the toolchain
  container.

applies_to: "server"

requires: []   # independent of p0265/p0268; reuses the proven GitTokenSecretRef pattern

decisions:
  - key: "Generalize the EXISTING GitTokenSecretRef path, do not invent a parallel one: credentials reach the pod ONLY as Kubernetes secretKeyRef (env) and Secret-volume mounts (files). They are NEVER embedded in the Step/Redis message — unlike the GIT_TOKEN step-env path (CheckoutStepFactory/GitTokenResolver) which serializes the plaintext token into Step.Env. An org login can deploy code; its key must not traverse Redis or appear in any step payload. The LLM never sees a value."
  - key: "The auth COMMAND is NOT new code. It lives in context.yaml `prerequisites` as `sh -c \"sf org login jwt --client-id $SF_CLIENT_ID --jwt-key-file /secrets/server.key --username $SF_USERNAME --alias devhub\"`, run by the existing EnsurePrerequisitesHandler before the agent gets control (same class as checkout — orchestrator-injected, deterministic). context.yaml carries only the command SHAPE (setup knowledge, like `npm ci`); the values stay in the operator's k8s Secret. No dedicated handler, no new pipeline command — a configurative auth step was considered and rejected as over-engineering."
  - key: "`sh -c` is REQUIRED, not stylistic: EnsurePrerequisitesHandler tokenizes the command via CommandLineStringSplitter and runs Command=tokens[0]/Args=rest, and ProcessRunner uses UseShellExecute=false — so `$SF_CLIENT_ID` only expands when `sh` is the process. Single quote level (the splitter is not a full shell; nested quotes break it). client-id/username have no spaces, so this is safe."
  - key: "JWT key is a MOUNTED FILE (`--jwt-key-file` wants a path), not a base64 env + decode-step — the latter is an unnecessary detour and leaves the decoded key on disk anyway."
  - key: "Secrets + which org are agentsmith.yml (operator authority, like GitTokenSecretRef), NOT context.yaml — the operator owns credentials, not the LLM (feedback_safety_in_api_not_process). A malformed mapping is an operator config error: reject at config load (fail fast), not a silent default and not the LLM validate-then-fallback pattern (that pattern is for LLM-authored fields)."
  - key: "Scope is the k8s provider (PodSpecBuilder). The Docker/InProcess provider is the CLI dev-tool (prod is k8s); it ignores secret-file mounts for now — named follow-up p0272a if a docker user needs it, not a silent drop (feedback_no_silent_defer). GitTokenSecretRef stays as the dedicated git path; this block is for arbitrary creds — no wrapper bridging the two (feedback_no_wrapper_shims)."

steps:
  - id: config-model
    action: "Add the operator secrets block to SandboxConfig and round-trip it from agentsmith.yml; document in schema + example."
    new:
      - "AgentSmith.Contracts/Models/Configuration/SandboxSecrets.cs: { Dictionary<string,string>? Env (value 'secretName:key'); IReadOnlyList<SandboxSecretFile>? Files }"
      - "AgentSmith.Contracts/Models/Configuration/SandboxSecretFile.cs: { string Mount; string Secret; string Key }"
    modify:
      - "AgentSmith.Contracts/Models/Configuration/SandboxConfig.cs: add Secrets (SandboxSecrets?)"
      - "config/agentsmith.schema.json: define sandbox.secrets (env map + files list) at top-level and projects.<name>.sandbox"
      - "config/agentsmith.example.yml: sample sandbox.secrets block for a Salesforce project"
  - id: spec-fields
    action: "SandboxSpec carries the resolved bindings; SandboxSpecBuilder.Build maps projectConfig.Sandbox.Secrets onto them (parse 'secretName:key' -> SecretRef; malformed -> throw at build/config time)."
    modify:
      - "AgentSmith.Contracts/Sandbox/SandboxSpec.cs: add IReadOnlyList<SecretEnvBinding>? SecretEnv, IReadOnlyList<SecretFileMount>? SecretFiles"
      - "AgentSmith.Application/Services/Builders/SandboxSpecBuilder.cs: populate the new fields from projectConfig.Sandbox?.Secrets"
    new:
      - "AgentSmith.Contracts/Sandbox/SecretEnvBinding.cs: (string EnvName, SecretRef Source)"
      - "AgentSmith.Contracts/Sandbox/SecretFileMount.cs: (string MountPath, SecretRef Source)"
  - id: pod-injection
    action: "PodSpecBuilder injects each SecretEnv as a secretKeyRef env var (mirroring the GIT_TOKEN block) and mounts each SecretFiles entry as a Secret volume + read-only VolumeMount at MountPath."
    modify:
      - "AgentSmith.Server/Services/Sandbox/PodSpecBuilder.cs: extend BuildEnv (secretKeyRef per binding) + BuildVolumes/BuildToolchainContainer (Secret volume + VolumeMount per file)"
  - id: prerequisites-pattern
    action: "Document the sf-login-via-prerequisites pattern (sh -c, references the injected env/file, never the values) — the one place the login lives. No handler code."
    modify:
      - ".agentsmith/context.schema.json: note in `prerequisites` description that it runs pre-agent and can carry an `sh -c` auth command referencing operator-injected secrets"
      - "docs: a short Salesforce example (agentsmith.yml secrets + context.yaml prerequisites + the k8s Secret the operator creates)"
  - id: build-and-tests
    action: "dotnet build + dotnet test green."
  - id: close
    action: "Decisions YAML, context.yaml update, move spec to done, single PR."

tests:
  - "PodSpecBuilder_SecretEnv_InjectsSecretKeyRefEnvVar"
  - "PodSpecBuilder_SecretFile_MountsSecretVolumeReadOnlyAtPath"
  - "SandboxSpecBuilder_SandboxSecrets_MapOntoSpecBindings"
  - "SandboxSpecBuilder_MalformedSecretRef_ThrowsAtConfigTime"
  - "PodSpecBuilder_NoSecrets_PodSpecUnchangedFromBaseline"

done:
  - "An operator declares sandbox.secrets (env + key file) in agentsmith.yml; the k8s sandbox pod gets those env vars via secretKeyRef and the key file mounted read-only — no value ever in a Step/Redis payload or in context.yaml."
  - "A Salesforce repo authenticates with `sf org login jwt` from context.yaml prerequisites (sh -c, referencing the injected env/file) and a later `sf project deploy validate` step runs against the persisted ~/.sfdx session in the same pod."
  - "Malformed secret mapping fails at config load with a clear error — never a silent default."
  - "GIT_TOKEN behaviour is unchanged; the Docker provider is unaffected (k8s-only scope, follow-up named)."
  - "dotnet build + dotnet test green."

notes: |
  The missing-capability half of the Salesforce story. The other halves already
  ship: image via projects.<name>.sandbox.toolchain_image (operator override beats
  the trust-gate, so a private sfdx image is fine) or per-language via p0245;
  sizing via context.yaml stack.resources (p0268) — Salesforce builds are CPU/net-
  bound, not RAM-bound, so size them SMALL (the heavy Apex compile runs server-side
  in the org).

  Why prerequisites and not a handler: the auth step is exactly what
  EnsurePrerequisitesHandler already does — one deterministic operator-given
  command run before the agent, in the same pod, with a persistent filesystem so
  ~/.sfdx survives to the agent's deploy step. Adding a typed
  EnsureSalesforceAuthHandler + pipeline command would re-implement that machinery
  for no gain. The trust boundary is held by the value/command split: command shape
  in context.yaml, values in the operator k8s Secret — never crossing.

  Operator setup (all operator-owned, none is agent-smith's job):
    kubectl create secret generic sf-creds \
      --from-literal=client-id=... --from-literal=username=... \
      --from-file=jwt-key=server.key
  agentsmith.yml:
    projects.my-sf-app.sandbox:
      toolchain_image: my-corp.azurecr.io/sfdx:20-bookworm   # node + sf + git
      secrets:
        env: { SF_CLIENT_ID: "sf-creds:client-id", SF_USERNAME: "sf-creds:username" }
        files: [ { mount: "/secrets/server.key", secret: "sf-creds", key: "jwt-key" } ]
  context.yaml:
    stack: { lang: node, resources: { cpu_request: "250m", cpu_limit: "1", memory_request: "512Mi", memory_limit: "2Gi" } }
    prerequisites: 'sh -c "sf org login jwt --client-id $SF_CLIENT_ID --jwt-key-file /secrets/server.key --username $SF_USERNAME --alias devhub"'
