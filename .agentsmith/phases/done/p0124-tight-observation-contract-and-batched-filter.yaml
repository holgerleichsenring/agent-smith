done:
  - "ObservationCaps.cs constants exist with documented values"
  - "SkillObservation has Details field; observation-schema.md documents the Description ≤500 / Details ≤4000 contract + channel split"
  - "ObservationParser truncates over-cap fields with diagnostic marker; observations always survive"
  - "Console / Summary render Description only; Markdown renders Description + Details; SARIF properties.detailed_message gets Details when present"
  - "TokenBudgetBatcher splits with deterministic batch size derived from caps"
  - "ResilientJsonObjectExtractor extracts complete objects from truncated arrays"
  - "ObservationParser.TryParseWithoutIds falls back to resilient extraction on JsonException"
  - "FilterRoundHandler.ApplyList loops over batches, concatenates results, appends Coverage-Incomplete observation on partial failure"
  - "agent-smith-skills 1.7.0 PR opened with 16 SKILL.md output hints reinforcing ≤500-char contract + Details usage; merged + tagged before operator smoke validation, BUT agent-smith p0124 itself works correctly against pre-1.7.0 skills via parser truncation (no hard version coupling)"
  - "FilterRoundHandler.RenderForFilter excludes Details from filter prompts; round-trip preserves Details on the filtered output"
  - "Per-batch log line emitted at INFO level with input count + expected output chars + actual response chars (verifiable via Filter_PerBatchLog_IncludesInputCountAndActualResponseChars)"
  - "All 29 new tests pass"
  - "All existing tests pass (no regressions)"
  - "Smoke run shows no parseable warnings, terse Console output, full Markdown body, no destructive failures, per-batch log lines visible in INFO output"
