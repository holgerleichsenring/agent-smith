  - "ObservationParser_TruncatesSuggestion_WhenOverCap"
  - "ObservationParser_TruncatesRationale_WhenOverCap"
  - "ObservationParser_TruncatesDetails_WhenOverCap"
  - "ObservationParser_UnderCap_NoTruncationApplied"
