phase: p13
goal: "Write results back to tickets — status updates, PR link, close on completion"
requires: ["p10"]
decisions:
  - key: "Default interface implementations for backward compatibility"
  - key: "Ticket operations are fire-and-forget — failures logged as warnings, never block pipeline"
  - key: "CommitAndPRHandler gets ITicketProviderFactory for posting summary"
steps:
  - id: provider-extensions
    action: "Add UpdateStatusAsync and CloseTicketAsync to ITicketProvider"
    modify:
      - "ITicketProvider: add UpdateStatusAsync(default => Task.CompletedTask), CloseTicketAsync(default => Task.CompletedTask)"
      - "GitHubTicketProvider: Issue.Comment.Create + Issue.Update(State=Closed)"
      - "AzureDevOpsTicketProvider: JsonPatchDocument for System.History + System.State"
  - id: pipeline-integration
    action: "PipelineExecutor posts status, CommitAndPRHandler posts summary + closes"
    modify:
      - "PipelineExecutor: add ITicketProviderFactory, post 'working on it' at start, post error on failure"
      - "CommitAndPRHandler: add ITicketProviderFactory, post summary with PR link, close ticket"
      - "CommitAndPRContext: add TicketConfig parameter"
      - "CommandContextFactory: pass project.Tickets to CommitAndPRContext"
  - id: verify
    action: "dotnet build && dotnet test"
tests:
  - "CommitAndPRHandler posts summary and closes ticket"
  - "CommitAndPRHandler tolerates ticket close failure"
  - "PipelineExecutor posts status update"
  - "PipelineExecutor tolerates status post failure"
done:
  - "Pipeline posts 'working on it' at start"
  - "Pipeline posts error details on failure"
  - "CommitAndPRHandler posts summary with PR link and closes ticket"
  - "Ticket operations never block the pipeline"
