done:
  - "Four JSON Schema files exist under .agentsmith/schemas/ (plan, diff, bootstrap, observation), pinned to Draft 2020-12, encoding Phase C field shapes and behaviour rules"
  - "JsonSchemaLoader parses and caches all four at boot; malformed schemas fail boot loudly"
  - "ISkillOutputValidator real implementations (PlanOutputValidator, DiffOutputValidator, BootstrapOutputValidator, ObservationOutputValidator) replace NoOp for skills with a declared output_schema; SkillOutputValidatorFactory resolves the right one"
  - "Plan record gains Scope, OpenQuestions, TestImpact, ConsumerImpact, Status fields without breaking existing constructions; Diff entity introduced as the typed in-process Diff representation"
  - "PlanParser supports both lax (legacy) and strict (schema-validating) modes; ParseStrict returns typed Plan or structured ValidationFailure"
  - "WriteRunResultHandler persists plan.json, diff.json, bootstrap.md to .agentsmith/runs/<run-id>/; PerSkillBreakdown renders into result.md when non-empty"
  - "RunArtifactStore (Redis-backed in production, in-memory in dev/tests) handles in-flight phase handoffs; PromoteToFilesystem moves data to durable storage at pipeline end; TTL 4 hours configurable in agentsmith.yml"
  - "JsonSchema.Net pinned exact in AgentSmith.Application.csproj; .NET 8, System.Text.Json compatibility preserved"
  - "All 53 new tests pass"
  - "All existing tests pass (no regressions); existing PlanParser.Parse behaviour unchanged for legacy callers"
  - "open_questions content is validated by the Plan schema but not yet round-tripped to humans — that's p0128b. Opt-in data-flow gating still pending — that's p0128c"
