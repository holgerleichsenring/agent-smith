# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p57c
goal: "Autonomous pipeline — Agent Smith observes a project, decides what should be improved, writes tickets without being told"
requires: ["p34", "p22", "p41"]
decisions:
  - key: "Output is tickets, not code — boundary can expand as trust grows"
  - key: "No tickets without convergence — if roles disagree after N rounds, no-consensus result + notification"
  - key: "project-vision.md written once by human — cannot be inferred from code"
  - key: "label agent-smith-autonomous signals agent-written tickets"
  - key: "Feedback loop: agent sees which tickets were acted on, adjusts future suggestions"
steps:
  - id: pipeline
    action: "Implement autonomous pipeline steps"
    new:
      - "LoadVisionHandler: reads project-vision.md (graceful if missing)"
      - "WriteTicketsHandler: creates tickets with label, priority from confidence + role agreement"
      - "LoadVisionContext, WriteTicketsContext"
      - "config/templates/project-vision.md: template for Bootstrap"
      - "config/skills/autonomous/: skill overrides for analysis mode"
    modify:
      - "CommandNames: add LoadVision, WriteTickets"
      - "PipelinePresets: add Autonomous preset"
      - "BootstrapProjectHandler: prompt for project-vision.md"
      - "CLI: add autonomous verb"
  - id: roles
    action: "Define autonomous analysis skill roles"
    # Architect: reads code-map, architecture decisions — drift from design?
    # Developer: reads coding-principles, recent PRs — recurring violations, tech debt?
    # Product Owner: reads project-vision.md, run history — planned but unstarted?
    # Security: reads last scan findings — accepted but unfixed?
    # Triage selects relevant roles per project
config: |
  projects.*.pipeline: autonomous
  projects.*.trigger.schedule: "0 8 * * 1"
  projects.*.autonomous:
    max_tickets: 3
    min_confidence: 7
    lookback_runs: 10
    roles: auto
done:
  - "agent-smith autonomous --project X runs end-to-end"
  - "SkillRounds run with 'what should be improved?' framing"
  - "ConvergenceCheck produces ranked top 3 findings"
  - "WriteTicketsHandler creates tickets with agent-smith-autonomous label"
  - "No tickets without convergence"
  - "Schedule trigger works"
  - "dotnet build + dotnet test clean"
