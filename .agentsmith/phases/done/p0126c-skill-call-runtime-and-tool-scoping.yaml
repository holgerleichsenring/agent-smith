done:
  - "IGitIgnoreResolver contract exists; existing GitIgnoreResolver implements it"
  - "PathReadGuard rejects paths outside the repo, .gitignored paths, and .git directory contents; PathWriteGuard gates by phase (Implementation/Bootstrap only) and Bootstrap-files restriction"
  - "ToolKit returns phase-keyed tool sets per the documented mapping; legacy callers without a phase get all tools"
  - "PipelineCostTracker exposes PerSkillBreakdown alongside existing pipeline totals; per-skill tokens, tool-call counts, durations attribute correctly inside SkillCallScope; nested BeginCall throws"
  - "SandboxToolHost optionally accepts IPathReadGuard + IPathWriteGuard; existing callers (passing nothing) see no behavior change"
  - "ISkillCallRuntime + SkillCallRuntime exist; ExecuteAsync composes the five collaborators (LimitEnforcer, RetryCoordinator, LoopTraceCollector, OutcomeClassifier, PipelineConcurrencyGate) per the documented flow; class fits ≤120 lines via private helpers"
  - "DI registers ISkillCallRuntime as scoped"
  - "All 35 new tests pass; all existing tests pass (no regressions)"
  - "No consumer of SkillCallRuntime in p0126c — SkillRoundHandlerBase descendants run unchanged. PerSkillBreakdown stays empty in production runs until p0127 wires the first consumer"
