# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p85
goal: "Webhook handlers return structured PipelineRequest instead of free-text — eliminate RegexIntentParser from webhook path"
requires: ["p83"]
decisions:
  - key: "WebhookResult carries optional PipelineRequest instead of TriggerInput string — handlers that know project+ticket+pipeline build it directly"
  - key: "TriggerInput string kept for backward compat (PR comment handlers may still pass free-form arguments) — processor tries PipelineRequest first, falls back to legacy string path"
  - key: "Webhook handlers resolve project name from config (they already load it) — no regex guessing needed"
  - key: "RegexIntentParser not deleted — still used by CLI free-text input. But webhook path bypasses it entirely"

steps:
  - id: webhook-result
    action: "Add optional PipelineRequest to WebhookResult"
    modify:
      - "WebhookResult: add PipelineRequest? Request field (nullable, default null)"

  - id: processor
    action: "WebhookRequestProcessor uses PipelineRequest directly when present, skipping legacy string path"
    modify:
      - "WebhookRequestProcessor.cs: if result.Request is not null, call ExecutePipelineUseCase.ExecuteAsync(PipelineRequest) directly"

  - id: jira-handlers
    action: "JiraAssigneeWebhookHandler and JiraCommentWebhookHandler build PipelineRequest with project name, ticket key, pipeline"
    modify:
      - "JiraAssigneeWebhookHandler.cs: return WebhookResult with PipelineRequest(projectName, pipeline, ticketId, Headless: true, Context: initialContext)"
      - "JiraCommentWebhookHandler.cs: same pattern"

  - id: issue-handlers
    action: "GitHubIssueWebhookHandler and AzureDevOpsWorkItemWebhookHandler build PipelineRequest"
    modify:
      - "GitHubIssueWebhookHandler.cs: resolve project from config by repo name, build PipelineRequest"
      - "AzureDevOpsWorkItemWebhookHandler.cs: resolve project from config by project id, build PipelineRequest"

  - id: mr-label-handler
    action: "GitLabMrLabelWebhookHandler builds PipelineRequest"
    modify:
      - "GitLabMrLabelWebhookHandler.cs: resolve project from config by project path, build PipelineRequest"

  - id: verify
    action: "dotnet build && dotnet test"

tests:
  - "JiraAssigneeWebhookHandler_Returns_PipelineRequest_WithCorrectFields"
  - "JiraCommentWebhookHandler_Returns_PipelineRequest_WithCorrectFields"
  - "GitHubIssueWebhookHandler_Returns_PipelineRequest_WithCorrectFields"
  - "AzureDevOpsWorkItemWebhookHandler_Returns_PipelineRequest_WithCorrectFields"
  - "WebhookRequestProcessor_WithPipelineRequest_SkipsLegacyPath"
  - "WebhookRequestProcessor_WithTriggerInputOnly_UsesLegacyPath"

done:
  - "Jira, GitHub issue, GitLab MR label, and Azure DevOps work item handlers return PipelineRequest"
  - "WebhookRequestProcessor calls ExecuteAsync(PipelineRequest) directly — no RegexIntentParser involved"
  - "PR comment handlers still use TriggerInput string (free-form arguments)"
  - "Legacy string path still works as fallback"
  - "dotnet build zero warnings, all tests green"
