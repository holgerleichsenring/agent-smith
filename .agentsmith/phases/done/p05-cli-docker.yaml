phase: p05
goal: "Deliverable CLI tool and Docker image — agentsmith 'fix #123 in todo-list'"
requires: ["p04"]
decisions:
  - key: "System.CommandLine — official .NET CLI framework, --help/--version for free"
  - key: "Multi-stage Docker build — SDK for build, runtime-only image <200MB"
  - key: "No sub-commands, no interactive shell — simple input→PR→exit"
steps:
  - id: cli
    action: "Refactor Program.cs to use System.CommandLine with args/options"
    modify:
      - "Program.cs: Argument<input>, --config, --dry-run, --verbose, --version"
  - id: docker
    action: "Create multi-stage Dockerfile and docker-compose.yml"
    new:
      - "Dockerfile: sdk:8.0 build → runtime:8.0 lean image"
      - ".dockerignore: exclude bin/, obj/, .git/, tests/"
      - "docker-compose.yml: env vars, config volume, SSH mount"
  - id: smoke-tests
    action: "DI integration test + CLI parsing validation"
    new:
      - "DiRegistrationTests: resolves all critical services from full DI container"
tests:
  - "AllServices_Resolvable"
  - "CLI --help exits 0"
  - "CLI without args exits 1"
done:
  - "agentsmith <input> [--config] [--dry-run] [--verbose] works"
  - "Docker image builds and runs"
  - "DI integration test passes"
