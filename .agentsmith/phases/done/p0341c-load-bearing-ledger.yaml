# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0341c
goal: "The coding master runs an OPEN, model-driven, VERIFIED loop — not a capped single-shot with salvage patches. It continues until the work is verified done (build/tests/acceptance) OR one meaningful fence is hit: a per-pipeline cost budget SIZED TO THE TICKET'S ESTIMATED COMPLEXITY. This replaces the two proxy fences that sink large runs today — the 25-iteration guillotine (it fires far below the money bound; the #19106 model self-terminated at ~iteration 10 with a 2-line ship) and any fixed re-drive count — with money + verification. The p0341 ledger becomes the loop's working memory and its RE-ENGAGEMENT signal (a model that quits early while budget and actionable steps remain is driven on); the p0340 keystone stops trusting the model's self-report. The framework is MODEL-AGNOSTIC BY CONSTRUCTION: it sizes the leash to the task and verifies the result — whether a given model converges within budget is an observed pass/fail, never a design-time 'is this model good enough' fence. HONESTY FIRST: the guaranteed deliverable is a truthful outcome (verified green, or an honest FAILED + partial PR when budget or verification says so) — never laundered green. Per-repo DECOMPOSITION is REJECTED: understanding cross-repo interconnections is the product, not the operator's job."

applies_to: "backend (AgenticMasterHandler open loop + in-loop budget check, AgenticLoopRunner/ChatClientFactory iteration ceiling, RepoScopeClassifier complexity tier, ConfigResolver + PipelineCostCapConfig effective-cap wiring, RunOutcomeKeystone, WriteContextYamlToolHost) + skills (coding-agent-master Phase 1)"

requires: [p0340, p0341]  # NOT p0341b — verified: the context compactors are dead code in the master path (no non-test constructor, no non-test caller, not DI-registered), so p0341b hardens a path that never runs. See the compaction-reality decision + the open fork.

scope:
  in: "Demote the master loop's 25-iteration cap to a large anti-runaway SAFETY ceiling (no longer the control). Make the EXISTING per-pipeline cost budget (PipelineCostCapConfig, p0151d — USD+token, per-pipeline override, IsBudgetExhausted) the binding fence by checking it INSIDE the master loop. Estimate a coarse complexity TIER on the scope-classification call already made, and map it to this run's effective cost cap. Keep the open loop re-engaging while forward progress AND budget remain (ledger not drained), with NO fixed re-drive count. Cross-check self-reported acceptance against the ledger + diff so a truncated run cannot self-report green. Shrink coding-agent-master Phase 1 to validate-and-execute the approved plan. Constrain WriteContextYamlToolHost.context_name to the discovered context keys."
  out: "Per-repo / task DECOMPOSITION (rejected — see goal). Changing compaction (p0341b owns the in-loop pin). The p0255 (zero-edits) + p0263 (no-verdict) salvage nudges keep their existing single-shot triggers — the open-loop re-engagement is the PARTIAL case, a sibling. Building a NEW cost-budget subsystem (p0151d's already exists — this wires + sizes it, it does not reinvent it). A second planning model / architect-editor split — the plan/execute split stays at the pipeline stage with the operator gate."

decisions:
  - key: "The fence is a per-pipeline COST BUDGET, not an iteration count and not a re-drive count. The budget mechanism ALREADY exists: PipelineCostCapConfig (p0151d) is a USD+token cap per pipeline run with a per-pipeline override ?? default (IConfigResolver 'Effective cost cap for a pipeline') and PipelineCostTracker.IsBudgetExhausted to short-circuit, surfaced as ExecutionLimitCategories.CostCapExhausted. The bug is that the 25-iteration cap (ChatClientFactory.MaxIterationsPerRequest, LimitEnforcer's own comment: 'MaximumIterationsPerRequest is the hard stop on the loop') sits UNDER the budget and guillotines the master loop before money can ever bind — and the budget is likely evaluated only BETWEEN pipeline steps, never inside the one AgenticMaster command where the whole coding loop lives. Fix: money becomes the binding fence, checked inside the loop; the iteration cap becomes a large anti-runaway safety net, not the control."
  - key: "Complexity is a TIER, not an estimated number. Piggyback on RepoScopeClassifier — the LLM call that already judges the ticket to pick repos/contexts — to also return a coarse tier (e.g. trivial|small|medium|large). A model cannot estimate its own effort in calls or dollars (false precision); a 4-way bucket it can do. The tier maps to this run's effective cost cap via the EXISTING per-pipeline override slot, set dynamically per ticket (bug→small cap, cross-repo migration→large cap). The estimate only sizes a CEILING — verification is the real judge of done — so a rough tier is acceptable BY DESIGN; it is never load-bearing for correctness. Absent/failed estimate => fall back to the static per-pipeline default (fail-safe)."
  - key: "Open loop, model-driven, VERIFIED — the Claude-Code loop shape. The loop runs until the model itself signals done (a final message with no tool call) OR the budget is exhausted; doneness is then judged against REALITY (build/tests/acceptance via the p0340 keystone), not the model's word. This is trust-WITH-verification bounded by cost, replacing agent-smith's inherited posture of distrusting the loop and fencing it with a proxy counter + a self-report gate."
  - key: "COMPACTION REALITY — verified, and it reframes 'open loop'. The OpenAiContextCompactor / ClaudeContextCompactor are dead code in the runtime: no non-test constructor, no non-test caller of CompactAsync/CompactIfNeededAsync, not DI-registered; the master runs through FunctionInvokingChatClient (ChatClientFactory.cs:112-114) which does NO context reduction. So a SINGLE open pass is bounded by the raw model context window, unmanaged — it cannot run to 200 iterations on a bulk 'replace-all-X across repo Y' step. 'Open loop' is therefore honestly a SEQUENCE of bounded re-engagement passes, not one long pass. FORK RESOLVED by the operator: the target frame is the interactive-harness frame (ONE continuous conversation that runs until verified-done, budget, or a question only the operator can answer) — so (A), real in-loop context management, is REQUIRED and specced as p0341d (re-attach the p0114 compaction logic, orphaned by the p0119a M.E.AI migration, as a DelegatingChatClient middleware). p0341c ships the loop mechanics that stand on their own (budget fence, gate, re-engage, guards); once p0341d lands, re-engagement DEMOTES to crash/timeout recovery — the pass-sequence is the safety net under the continuous loop, never the architecture."
  - key: "IN-PASS REMINDER INJECTION — install the checklist reflex mechanically, the way the interactive harness installs it in Claude: part of Claude-grade 'stringency' is not model discipline but HARNESS-INJECTED reminders (the todo list is re-surfaced into the conversation periodically). Reproduce that: every N tool iterations (config, e.g. 10) — and on drift signals (K iterations with reads but no edit, repeated near-identical greps) — inject the current ledger + a one-line 'you are not done until the checklist is drained; current step: X' as a synthetic message INSIDE the running pass. Same middleware seam as the budget check. This attacks early self-termination and shallow drift BEFORE re-engagement is ever needed — the cheapest stringency lever there is."
  - key: "STUCK => ASK, not FAILED — the target frame's terminal condition is 'a question the LLM cannot answer', so escalation is a FIRST-CLASS outcome, not a failure. The p0315d machinery already exists (ask_human / TicketClarificationToolHost: captured question → park awaiting_user_input → answer re-triggers the run). Wire it into the loop: a blocker that is an operator-decidable question becomes a parked question (never a ground-on-budget grind, never an honest-RED misuse); ShouldReengage is FALSE while an operator question is pending; the answered re-trigger resumes WARM (ledger + working-state persist in PipelineContext). Honest RED remains for genuine cannot-do; the skill instructs: when the blocker is a decision only the operator can make, ask instead of guessing."
  - key: "WARM re-engagement — reproduce COHERENCE, not just coverage. Resuming a cold pass from the ledger alone carries WHAT REMAINS, not WHAT WAS LEARNED (the handler signature chosen in repo A, the DI-registration shape committed in repo C, the consumer→Wolverine-handler mapping) — so each pass re-derives the cross-cutting invariants from the on-disk diff, which is exactly how a migration comes out non-empty but INCOHERENT (Mediator wired one way in one repo, another way in the next). A re-engagement pass must therefore prepend a compact WORKING-STATE block — decisions.md so far + the cross-repo invariants the run has committed to + the last build/test tail — alongside the ledger. The ledger is the checklist; the working-state block is the continuity."
  - key: "Re-engagement stays, bounded by BUDGET not a count. Removing the iteration cap does NOT stop early self-termination — the real failure shipped 2 lines and quit at ~iteration 10, far below 25 — so the ledger-not-drained => keep-going signal is still needed to re-engage a quitter. But it loops WHILE forward progress AND budget remain, with NO fixed re-drive number. Forward progress is a MEANINGFUL delta, not a trivially-satisfiable one: a newly-DONE ledger step, or a new edit that moves a verified signal (a repo that now builds, a test that now passes) — NOT merely '>=1 edit' (a shallow-but-nonzero pass must not count as progress). Measured as the CUMULATIVE delta across the pass (a pass ending mid-build or on an LLM/timeout exception is NOT zero-progress). Stop on: drained ledger, honest RED, budget exhausted, or a genuinely zero-forward-progress pass. This deletes MaxLedgerDrainRedrives entirely — the budget is the ceiling."
  - key: "MODEL-AGNOSTIC by construction — the correction to an earlier framing ('you can only open the loop as far as you trust the model'). The framework never asks at design time whether the model is good enough; it sizes the budget to the task and reports the verified outcome. A model that burns the migration budget and fails verification is an observable, actionable fact (the operator swaps the model), not a framework failure and not something the framework pre-judges. Trust is replaced by budget + verification."
  - key: "REVERSES p0341's 'the ledger is MEMORY, never a gate; never fails a run' — falsified by evidence (a real run left 18/21 steps pending and shipped). The ledger's remaining-actionable-steps become BOTH the re-engagement trigger and a keystone input. p0341's tool/seed/nudge/diagnostic machinery is unchanged; only its non-gating stance is."
  - key: "REVERSES p0340's keystone-is-byte-for-byte-frozen constraint. The acceptance gate reads verification.AcceptanceDispositions (the SELF-REPORT); a model truncated by early-stop and marking the untouched criteria Met is not lying, it is truncated — a framework problem. The gate now cross-checks STRICTLY on Met (a justified NotApplicable-with-evidence is NEVER downgraded for a pending step — a not-applicable criterion SHOULD have an untouched target). A Met whose seeded ledger step is still pending/in_progress, or whose PRESENT target is absent from the diff, is downgraded to unresolved. CLOSE THE TARGET-LESS HOLE: PlanStep.TargetFile is nullable and the seeder + the p0341 coverage diagnostic both SKIP target-less steps (ProgressLedgerCoverage.cs:25) — the hardest cross-repo steps are exactly the target-less ones, so a target-less Met must NOT auto-pass: require its step Done AND some diff in the step's declared repo/scope, else downgrade. Keystone stays pure + deterministic."
  - key: "coding-agent-master Phase 1 is 'separated AND duplicated': the pipeline already runs GeneratePlan + operator Approval and injects '## Approved plan — execute this' (BuildPlanSection), yet the skill still carries a full self-planning Phase 1 that is dead code whenever a ratified plan is present. Shrink it to 'validate the approved plan against the key files, report concrete blockers, otherwise EXECUTE it'; keep full self-planning ONLY as the fix-no-test fallback (no GeneratePlan stage). Removes the plan-twice ambiguity, frees the model's attention for execution, and lets the seeded ledger cohere. Necessary hygiene — NOT the load-bearing fix (the open loop + budget + gate are)."
  - key: "WriteContextYamlToolHost writes whatever context_name the model passes (no validation), so the model typed the example value 'default' instead of the discovered 'api' and authored a stray contexts/default/context.yaml even though discovery had correctly resolved [api, ...]. Constrain context_name to the discovered context keys for the target repo (reject/redirect an invented name when real contexts exist); the write tool is where the invariant belongs — safety in the API, not the prompt. Small isolatable sibling."

steps:
  - id: open-master-loop
    action: "Demote the master loop's iteration cap from the control to a large anti-runaway safety ceiling — the loop is no longer primarily bounded by it"
    modify:
      - "AgentConfig: add MaxMasterLoopIterations as a SAFETY ceiling well above today's 25 (e.g. 200), documented as an anti-runaway net, not the stopping control"
      - "AgenticLoopRunner.RunAsync / AgenticLoopRequest: pass it via chatClientFactory.Create(..., maxIterations:) — Create ALREADY takes int? maxIterations=null (ChatClientFactory.cs:66); today the master omits it and silently inherits the 25 default. One-argument change"
      - "SubAgentRunner.BuildLoopRequest (:121-141): thread a real child iteration budget instead of inheriting the 25 default — a sub-agent carrying a bulk 'replace-all-X across repo Y' chunk today hits 25 and stops, so the master cannot effectively fan out the exact bulk steps that most need it"
  - id: budget-is-the-fence
    action: "Make the per-pipeline cost budget the binding fence by checking it INSIDE the master loop, not only between pipeline steps"
    modify:
      - "Two granularities. BETWEEN passes: AgenticMasterHandler consults PipelineCostTracker.IsBudgetExhausted before each re-engagement (today costTracker.Track runs once after GetResponseAsync returns, :228, and IsBudgetExhausted is never consulted in the handler). WITHIN a pass: to bind a single runaway pass, a budget-checking middleware at TOOL-ITERATION granularity in the FunctionInvokingChatClient chain (cancels the loop when the running cost crosses the cap) — otherwise one pass is bounded only by the 200 safety ceiling, not money. Budget exhausted => stop cleanly, publish partial CodeChanges + the current ledger, keystone finalizes with the cost-cap-exhausted reason"
  - id: complexity-tier-budget
    action: "Estimate a coarse complexity tier on the scope-classification call and map it to this run's effective cost cap"
    new:
      - "A complexity tier (trivial|small|medium|large) on RepoScopeClassifier's output — the same LLM judgment that already picks repos/contexts, one added field"
      - "A tier→cost-cap map (config-overridable defaults) resolved into the run's effective PipelineCostCap"
    modify:
      - "RepoScopeClassifier: extend the ticket classification to also return the tier"
      - "ConfigResolver / cost-cap resolution: set the run's effective cap from tier→cap via the EXISTING per-pipeline override slot, dynamically per ticket; absent/failed tier => the static per-pipeline default"
  - id: in-pass-ledger-reminder
    action: "Inject the current ledger + a done-discipline line into the RUNNING pass every N tool iterations and on drift signals — the system-reminder analogue"
    new:
      - "A reminder-injecting middleware in the master's chat-client chain (same seam as the budget check): every N tool iterations (config, default 10) — or on drift (K iterations without an edit, repeated near-identical searches) — append a synthetic message carrying the rendered current ledger + 'you are not done until the checklist is drained; current step: X'"
  - id: ledger-drain-reengage
    action: "Re-engage the open loop (resumed from the ledger) while actionable pending steps AND budget remain and each pass makes forward progress; NO fixed re-drive count"
    new:
      - "ProgressLedger.ActionablePending (or an evaluator): pending|in_progress steps that are plan-seeded / target-bearing — the re-engagement signal"
      - "AgenticMasterHandler.ShouldReengage(pipelineName, ledger, verification, changes, budget): expects-code + >=1 actionable pending + not a failed/blocker verdict + budget not exhausted; pure + testable, mirrors ShouldDriveApply/ShouldNudgeForVerdict"
      - "A WORKING-STATE block builder: renders decisions.md so far + the run's committed cross-repo invariants + the last build/test tail into a compact carry, so a re-engagement pass resumes WARM (continuity), not just from the checklist (coverage). See the warm-reengagement decision"
    modify:
      - "AgenticMasterHandler.RunAsync: after the p0255/p0263 nudges, loop WHILE ShouldReengage holds AND the previous pass made MEANINGFUL forward progress (a newly-done step or a moved verified signal — not a bare edit; cumulative delta; an exception/timeout pass is not zero-progress), re-running loopRunner with a 'continue the checklist — these steps remain' nudge that prepends the current ledger (reuse LedgerNudgeSection) AND the working-state block; re-parse verdict + refresh changes + cost each pass. Stop on: drained ledger, honest RED, budget exhausted, a zero-forward-progress pass, or a PARKED OPERATOR QUESTION (the p0315d captured-question path keeps its existing precedence — it short-circuits BEFORE any nudge/re-engage, and ShouldReengage is false while a question is pending; the answered re-trigger resumes warm from PipelineContext). MaxLedgerDrainRedrives is NOT introduced — the budget is the ceiling"
  - id: keystone-acceptance-crosscheck
    action: "The acceptance gate cross-checks self-reported Met against the ledger's remaining steps + the diff — a truncated run cannot self-report green"
    modify:
      - "RunOutcomeKeystone.Evaluate / EvaluateAcceptance: accept the ledger (remaining actionable steps + per-step target/diff presence) as a new deterministic input; downgrade STRICTLY on Met (never a justified NotApplicable). Met + pending step => downgrade; Met + present-target absent from diff => downgrade; Met + TARGET-LESS step => require step Done AND some diff in the step's declared repo/scope, else downgrade. Pure — same inputs → same verdict"
      - "The keystone caller (CommitAndPRHandler / WriteRunResultHandler path): pass ContextKeys.ProgressLedger + the already-available diff signal; empty-ledger / no-contract runs fall through to today's behaviour unchanged"
  - id: lean-executor-phase1
    action: "Shrink coding-agent-master Phase 1 to validate-and-execute the approved plan; full self-planning only as the fix-no-test fallback"
    modify:
      - "skills/_masters/coding-agent-master/SKILL.md: replace the full Phase 1 self-planning prose with a short 'if an Approved plan section is present: validate it against the key files, report concrete blockers, else EXECUTE it — do not re-plan'; gate the from-scratch planning explicitly to 'no approved-plan section (fix-no-test)'; keep the fault-location / cross-repo guidance. Version bump + embedded pin"
      - "DO NOT over-correct into rigidity: the plan was ratified BEFORE the model saw the code, so explicitly LICENSE re-decomposition when the code contradicts the plan — refining HOW a step is carried out, splitting/merging steps, reordering — as normal execution (logged in decisions.md + reflected in the ledger), NOT as an exception needing a 'concrete blocker'. The bias is 'execute the approved intent'; the freedom is in the mechanics. Rigidity here would make the master LESS flexible than a from-scratch planner on exactly the cross-cutting migrations this phase targets"
      - "Add the ask-first discipline: when the blocker is a decision only the operator can make (ambiguous requirement, conflicting sources of truth, irreversible tradeoff), use ask_human / the captured-question path and STOP — do not guess, do not grind the budget, do not emit failed for a human-answerable question"
  - id: context-name-guard
    action: "Constrain WriteContextYamlToolHost.context_name to the discovered context keys so the model cannot author a stray 'default' when real contexts exist"
    modify:
      - "WriteContextYamlToolHost: validate context_name against the run's discovered context keys (ContextKeys.RemoteContextInventory / the resolved set for the target repo); an invented name when real contexts exist is rejected with a clear error listing the valid keys, or redirected to the single discovered context; a genuine bootstrap (only the synthetic default) is unaffected"

tests:
  - "OpenLoop_ModelKeepsCallingToolsPast25_NotGuillotined_BoundedBySafetyCeiling"
  - "OpenLoop_SafetyCeilingReached_StopsAsAntiRunaway"
  - "Budget_ExhaustedBetweenPasses_StopsAndFinalizesHonestly_CostCapExhausted"
  - "Budget_ToolIterationMiddleware_CancelsRunawaySinglePass"
  - "SubAgent_GivenRealIterationBudget_NotInheriting25"
  - "ComplexityTier_LargeTicket_MapsToLargeCap"
  - "ComplexityTier_Absent_FallsBackToStaticPipelineDefault"
  - "ComplexityTier_ReturnedOnScopeClassification_SingleCall"
  - "ShouldReengage_PartialLedgerActionableStepsAndBudgetRemain_True"
  - "ShouldReengage_BudgetExhausted_False"
  - "ShouldReengage_FailedVerdict_False_NotReDrivenIntoLoop"
  - "ShouldReengage_LedgerDrained_False"
  - "Reengage_ContinuesWhileForwardProgress_NotBoundedByFixedCount"
  - "Reengage_BareEditNoVerifiedSignal_NotCountedAsMeaningfulProgress"
  - "Reengage_ZeroForwardProgressPass_Stops"
  - "Reengage_PassEndedOnException_NotCountedAsZeroProgress"
  - "Reengage_NudgeCarriesWorkingStateBlock_NotJustLedger"
  - "Reengage_ResumesFromCurrentLedger_NotFromScratch"
  - "Reengage_PendingOperatorQuestion_ParksInsteadOfLooping"
  - "InPassReminder_InjectedEveryNIterations_CarriesCurrentLedger"
  - "InPassReminder_DriftSignalNoEditsForKIterations_TriggersInjection"
  - "Keystone_MetButLedgerStepPending_Downgraded"
  - "Keystone_MetPresentTargetAbsentFromDiff_Downgraded"
  - "Keystone_MetTargetLessStepNotDoneOrNoScopeDiff_Downgraded_NoAutoPass"
  - "Keystone_MetTargetLessStepDoneWithScopeDiff_Ok"
  - "Keystone_NotApplicableWithEvidencePendingStep_NotDowngraded_NoFalseRed"
  - "Keystone_EmptyLedger_BehaviourUnchanged_FallsThroughToP0340"
  - "ContextNameGuard_InventedDefaultWhenApiExists_Rejected"
  - "ContextNameGuard_DiscoveredKey_Accepted"
  - "ContextNameGuard_SyntheticDefaultOnlyBootstrap_Accepted"

done:
  - "The master loop is no longer bounded by the 25-iteration cap: a run whose model keeps calling tools runs past 25 up to a large safety ceiling — proven by a test; the cap is documented as an anti-runaway net, not the control"
  - "The per-pipeline cost budget binds the loop at two granularities: between re-engagement passes AND, via a tool-iteration middleware, within a single runaway pass; a run that exhausts its budget stops, ships its partial work, and is recorded as an honest cost-cap-exhausted outcome — proven by tests"
  - "A re-engagement pass resumes WARM: the nudge carries a working-state block (decisions + committed cross-repo invariants + last build/test tail) alongside the ledger, not the checklist alone — proven by a test; sub-agents get a real iteration budget instead of inheriting the 25 default"
  - "A coarse complexity tier is returned by the scope-classification call and sizes this run's effective cost cap (bug→small, cross-repo migration→large); an absent tier falls back to the static per-pipeline default — proven by tests"
  - "A run with actionable pending ledger steps, no honest RED, and budget remaining re-engages the open loop (resumed from the ledger) WHILE each pass makes forward progress, and stops on drained ledger / honest RED / budget exhausted / zero-progress; the stop is forward-progress + budget, never a fixed count; an exception-ended pass is not miscounted — proven by tests"
  - "The keystone downgrades STRICTLY a self-reported Met (never a justified NotApplicable) whose ledger step is pending, whose present target is absent from the diff, or which is target-less without a Done step + scope diff; empty-ledger / no-contract runs are byte-for-byte unchanged from p0340 — proven by tests"
  - "Under-delivery is HONEST: a budget/zero-progress/keystone stop with steps still pending records a FAILED naming the remaining steps (partial work still ships as a record PR) — never a laundered green"
  - "STUCK escalates instead of failing: an operator-decidable blocker parks the run as a question (p0315d path) and the answered re-trigger resumes warm; ShouldReengage never loops past a pending question — proven by a test"
  - "The running pass is nagged like the interactive harness nags Claude: the current ledger + done-discipline line is injected every N tool iterations and on drift — proven by tests"
  - "coding-agent-master Phase 1 no longer self-plans when an approved plan is injected; full self-planning survives only for the fix-no-test path; version bumped + embedded pin updated"
  - "WriteContextYamlToolHost rejects/redirects an invented context_name (e.g. 'default') when real contexts were discovered for the repo; bootstrap of the synthetic default is unaffected"
  - "Full backend suite green + skills-repo change lands with a version bump and the embedded pin updated"
