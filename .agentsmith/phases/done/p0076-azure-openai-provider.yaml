# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0076
goal: "Add Azure OpenAI as agent provider — reuses OpenAiAgentProvider, only client creation differs"

requires: ["p0011"]

decisions:
  - key: "inheritance over composition here — only CreateChatClient differs, classic Template Method"
  - key: "only 'deployment' and 'api_version' added to AgentConfig — api_key_secret and endpoint already exist"
  - key: "api_version defaults to 2025-01-01-preview in code, optional override in config"
  - key: "Azure.AI.OpenAI NuGet — official Microsoft package, AzureOpenAIClient handles URL+auth natively"

steps:
  - id: package
    action: "Add Azure.AI.OpenAI NuGet to AgentSmith.Infrastructure"

  - id: config
    action: "Add Deployment and ApiVersion to AgentConfig"
    modify:
      - "AgentConfig: add Deployment:string?, ApiVersion:string?"

  - id: base-class
    action: "Make CreateChatClient protected virtual in OpenAiAgentProvider, unseal the class"
    modify:
      - "OpenAiAgentProvider: unseal, make CreateChatClient protected virtual"

  - id: azure-provider
    action: "Create AzureOpenAiAgentProvider that overrides CreateChatClient"
    new:
      - "AzureOpenAiAgentProvider: extends OpenAiAgentProvider, overrides CreateChatClient with AzureOpenAIClient"

  - id: factory
    action: "Register azure-openai type in AgentProviderFactory"
    modify:
      - "AgentProviderFactory: add 'azure-openai' and 'azure' entries using CreateAzureOpenAi method"

  - id: verify
    action: "dotnet build && dotnet test"

tests:
  - "AgentProviderFactory_AzureOpenAiType_CreatesProvider"
  - "AgentProviderFactory_AzureType_CreatesProvider"
  - "AgentProviderFactory_AzureOpenAi_UsesDeploymentName"

done:
  - "type: azure-openai works in agentsmith.yml"
  - "deployment config field maps to Azure deployment name in URL"
  - "api-key auth used for Azure endpoints (not Bearer)"
  - "api_version defaults to 2025-01-01-preview, configurable"
  - "AzureOpenAiAgentProvider only overrides CreateChatClient — zero logic duplication"
  - "all existing tests green"
