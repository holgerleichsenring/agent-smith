# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p18
goal: "Multi-user chat gateway — Slack/Teams trigger agent runs via K8s Jobs + Redis Streams"
requires: ["p10"]
decisions:
  - key: "Each fix-ticket request spawns an ephemeral K8s Job — list/create handled directly"
  - key: "Redis Streams for async communication (job:{id}:out and job:{id}:in)"
  - key: "Redis without PV — messages are ephemeral, job lifetime = minutes"
  - key: "IProgressReporter gets RedisProgressReporter alongside existing ConsoleProgressReporter"
  - key: "ConversationStateManager enforces one active job per channel"
steps:
  - id: redis-bus
    action: "Implement IMessageBus and RedisMessageBus with stream protocol"
    new:
      - "IMessageBus: PublishAsync, SubscribeAsync"
      - "RedisMessageBus: Redis Streams, XADD/XREAD, consumer group 'dispatcher'"
      - "BusMessage: { type:progress|question|done|error, text, prUrl?, questionId? }"
  - id: progress-reporter
    action: "Add RedisProgressReporter for agent-to-dispatcher communication"
    new:
      - "RedisProgressReporter: publishes to job:{id}:out stream"
      - "CompositeProgressReporter: Console + Redis for Docker log visibility"
  - id: cli-extensions
    action: "Add --job-id, --redis-url, --channel-id, --platform CLI params"
    modify:
      - "Program.cs: add job-related CLI options, wire RedisProgressReporter when --job-id set"
  - id: dispatcher
    action: "Create AgentSmith.Server — ASP.NET Core Minimal API"
    new:
      - "AgentSmith.Server: new project"
      - "ChatIntentParser: parses fix/list/create intents"
      - "JobSpawner: creates K8s Jobs via KubernetesClient"
      - "ConversationStateManager: Redis key schema, one job per channel"
      - "ConversationState: record { JobId, ChannelId, UserId, Platform, Project, TicketId, StartedAt, PendingQuestionId? }"
      - "FastCommandExecutor: handles list/create without K8s job"
      - "MessageBusListener: Redis consumer group, routes to platform adapter"
  - id: slack-adapter
    action: "Implement Slack Events API integration"
    new:
      - "IPlatformAdapter: SendMessage, SendProgress, AskQuestion"
      - "SlackAdapter: Slack Web API (chat.postMessage, interactivity)"
  - id: k8s-manifests
    action: "Create K8s manifests for Dispatcher, Redis, Secrets"
done:
  - "Slack message triggers K8s Job"
  - "Progress messages appear in Slack in real time"
  - "Agent questions appear with Yes/No buttons"
  - "PR URL posted to Slack on completion"
  - "list/create intents handled without K8s Job"
  - "Local docker run without --job-id still works"
