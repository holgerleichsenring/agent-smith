# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0147f
goal: "Four ticket providers (Jira 394 / Azure DevOps 340 / GitLab 278 /
  GitHub 219 lines) all mix HTTP transport + field mapping + lifecycle
  transitions. Every provider is over the 120-line hard limit; Jira is over
  3x. They share enough shape that a uniform decomposition makes sense:
  per-provider IFieldMapper + ITransitioner extracted; the provider class
  thins to HTTP orchestration plus the per-platform endpoint URLs."

requires: []

scope:
  in: |
    (1) Define ITicketFieldMapper<TRaw, TCanonical> + ITicketTransitioner
        in Contracts. Per-provider concrete implementations:
        - JiraFieldMapper (ADF body rendering, JQL building, fields envelope).
        - AzureDevOpsFieldMapper (work-item field paths, rev concurrency).
        - GitLabFieldMapper (issue body markdown, labels API).
        - GitHubFieldMapper (issue body markdown, labels API).
        - Per-provider ITicketTransitioner already exists in some form
          (LockingTicketStatusTransitionerFactory references) — audit and
          align all four.

    (2) Each provider class becomes a thin HTTP orchestrator: HttpClient
        injection, per-endpoint method that calls the mapper +
        deserialises the response. Target: ≤120 lines per provider after
        the cut, ideally 60-90.

    (3) Common shape extraction (NOT inheritance — composition): a
        TicketProviderHttpClient helper that wraps HttpClient with auth +
        retry + standard error handling. Injected into every provider.

  out: |
    Adding new ticket platforms. Just refactoring the existing four.

    Lifecycle-status-transitioner refactor — that touches a separate but
    overlapping concern (LockedTicketStatusTransitioner, etc.). Phase
    p0147f-followup if scope grows.

decisions:
  - key: |
      Per-provider field mappers, not one polymorphic mapper. Reason:
      the four platforms' field shapes diverge enough that a single
      mapper would be a tagged-union nightmare (Jira's ADF body vs
      GitLab's markdown body vs ADO's revision-locked fields). Four
      mappers, each focused. -- alternatives: one polymorphic mapper
      (rejected: 'one class to handle all four platforms' is exactly
      the god-class principle violation).
  - key: |
      Don't introduce a TicketProviderBase. Composition over inheritance.
      The shared 'authed HTTP call + standard error handling' lives in
      a TicketProviderHttpClient helper that providers inject. A base
      class would re-create the god-class problem at the inheritance
      level.
  - key: |
      Migrate one provider at a time. Reason: each is a real customer
      surface; a single-file regression is the failure mode to avoid.
      Order: GitHub (smallest at 219) → GitLab (278) → ADO (340) →
      Jira (394). Each migration has its own commit / PR.

steps:
  - id: contracts
    action: "Define ITicketFieldMapper, ITicketTransitioner, TicketProviderHttpClient."
    new:
      - "src/AgentSmith.Contracts/Services/ITicketFieldMapper.cs"
      - "src/AgentSmith.Contracts/Services/ITicketTransitioner.cs (if not present)"
      - "src/AgentSmith.Infrastructure/Services/Providers/Tickets/TicketProviderHttpClient.cs"

  - id: github-first
    action: "GitHubTicketProvider refactor — smallest first, validates the shape."
    new:
      - "src/AgentSmith.Infrastructure/Services/Providers/Tickets/GitHubFieldMapper.cs"
    modify:
      - "src/AgentSmith.Infrastructure/Services/Providers/Tickets/GitHubTicketProvider.cs (target ≤90 lines)"

  - id: gitlab-then-ado-then-jira
    action: "Each provider in turn. After Jira lands, the family is uniform."
    new:
      - "src/AgentSmith.Infrastructure/Services/Providers/Tickets/GitLabFieldMapper.cs"
      - "src/AgentSmith.Infrastructure/Services/Providers/Tickets/AzureDevOpsFieldMapper.cs"
      - "src/AgentSmith.Infrastructure/Services/Providers/Tickets/JiraFieldMapper.cs"
      - "src/AgentSmith.Infrastructure/Services/Providers/Tickets/JiraAdfRenderer.cs (Jira-specific ADF body renderer)"
    modify:
      - "GitLabTicketProvider.cs, AzureDevOpsTicketProvider.cs, JiraTicketProvider.cs (each ≤120 lines)"

tests:
  - "Each field mapper has its own test pack against the platform's documented JSON shape."
  - "Existing provider integration tests pass unchanged (same external behaviour)."
  - "TicketProviderHttpClient retry + auth behaviour tested independently."

done:
  - "All four ticket-provider .cs files ≤120 lines."
  - "Four IFieldMapper implementations exist and are unit-tested."
  - "TicketProviderHttpClient handles auth + retry uniformly."
  - "Full provider test suite green; smoke against each platform unchanged."
