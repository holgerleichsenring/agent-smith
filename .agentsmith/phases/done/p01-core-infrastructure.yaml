phase: p01
goal: "Foundation — solution structure, domain entities, contracts (interfaces only), config loader"
decisions:
  - key: "Config models in Contracts — needed by multiple layers"
  - key: "YamlDotNet NamingConvention — snake_case YAML ↔ PascalCase C#"
  - key: "Lazy secret resolution — unset env vars not an error during loading"
  - key: "PipelineContext + ContextKeys are the only concrete types in Contracts"
steps:
  - id: solution
    action: "Create .NET 8 solution with all projects and references"
    new:
      - "AgentSmith.Domain: no dependencies"
      - "AgentSmith.Contracts: → Domain"
      - "AgentSmith.Application: → Contracts, Domain"
      - "AgentSmith.Infrastructure: → Contracts, Domain"
      - "AgentSmith.Cli: → Application, Infrastructure"
      - "AgentSmith.Tests: → Domain, Contracts, Infrastructure"
  - id: domain
    action: "Define domain entities, value objects, exceptions"
    new:
      - "TicketId: record { Value:string }"
      - "ProjectName: record { Value:string }"
      - "BranchName: record { Value:string, FromTicket() }"
      - "FilePath: record { Value:string, no absolute/.. }"
      - "CommandResult: record { Success:bool, Message:string, Exception? }"
      - "Ticket: { Id:TicketId, Title, Description, AcceptanceCriteria?, Status, Source }"
      - "Repository: { LocalPath, CurrentBranch:BranchName, RemoteUrl }"
      - "Plan: { Summary, Steps:IReadOnlyList<PlanStep>, RawResponse }"
      - "PlanStep: { Order:int, Description, TargetFile:FilePath?, ChangeType }"
      - "CodeChange: { Path:FilePath, Content, ChangeType }"
      - "CodeAnalysis: { FileStructure, Dependencies, Framework?, Language? }"
      - "AgentSmithException, TicketNotFoundException, ConfigurationException, ProviderException"
  - id: contracts
    action: "Define all interfaces — command pattern, providers, services, factories"
    new:
      - "ICommandContext: marker interface"
      - "ICommandHandler<TContext>: ExecuteAsync → CommandResult"
      - "ICommandExecutor: resolves handler via DI"
      - "PipelineContext: Dictionary-backed shared state (Set/Get/TryGet/Has)"
      - "ContextKeys: string constants (Ticket, Repository, Plan, etc.)"
      - "ITicketProvider: GetTicketAsync"
      - "ISourceProvider: CheckoutAsync, CreatePullRequestAsync, CommitAndPushAsync"
      - "IAgentProvider: GeneratePlanAsync, ExecutePlanAsync"
      - "IConfigurationLoader: LoadConfig"
      - "IPipelineExecutor: ExecuteAsync"
      - "IIntentParser: ParseAsync → ParsedIntent(TicketId, ProjectName)"
      - "ITicketProviderFactory, ISourceProviderFactory, IAgentProviderFactory"
  - id: config
    action: "Implement YAML config loader with env-var resolution"
    new:
      - "AgentSmithConfig: { Projects:Dict, Pipelines:Dict, Secrets:Dict }"
      - "ProjectConfig: { Source, Tickets, Agent, Pipeline, CodingPrinciplesPath? }"
      - "SourceConfig: { Type, Url?, Path?, Auth }"
      - "TicketConfig: { Type, Organization?, Project?, Url?, Auth }"
      - "AgentConfig: { Type, Model }"
      - "PipelineConfig: { Commands:List<string> }"
      - "YamlConfigurationLoader: IConfigurationLoader impl, resolves ${ENV_VAR}"
  - id: verify
    action: "dotnet build && dotnet test"
tests:
  - "LoadConfig_ValidYaml_ReturnsConfig"
  - "LoadConfig_FileNotFound_ThrowsConfigurationException"
  - "LoadConfig_InvalidYaml_ThrowsConfigurationException"
  - "LoadConfig_WithEnvVars_ResolvesPlaceholders"
  - "LoadConfig_ProjectHasAllFields_MapsCorrectly"
  - "LoadConfig_PipelineHasCommands_MapsCorrectly"
done:
  - "Solution compiles without errors"
  - "All domain entities, value objects, interfaces defined"
  - "Config loader reads YAML and returns typed config"
  - "At least 1 unit test (Config Loader)"
