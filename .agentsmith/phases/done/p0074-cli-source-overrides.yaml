# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0074
goal: "Make source config (type, url, auth) overridable via CLI arguments — replaces --repo with generic --source-type/--source-url/--source-auth"
decisions:
  - Four generic options replace --repo: "consistent across all source-using commands"
  - Applied in ExecutePipelineUseCase: "transparent to all downstream builders and handlers"
  - SecurityScanCommand drops --repo: "ScanRepoPath context key becomes obsolete"
  - Branch is nullable: "null means 'no explicit branch requested' — provider decides the default"
  - LocalSourceProvider uses HEAD when branch is null: "CI pipelines already have the right commit checked out"
steps:
  - id: contracts
    action: "Add SourceType, SourcePath, SourceUrl, SourceAuth to ContextKeys and ISourceConfigOverrider interface; make CheckoutAsync branch parameter nullable"
    new: ["ISourceConfigOverrider"]
    modify: ["ContextKeys.cs", "ISourceProvider.cs", "CheckoutSourceContext.cs"]
  - id: service
    action: "Add SourceConfigOverrider — field-by-field merge, CLI wins over config"
    new: ["SourceConfigOverrider"]
  - id: cli-options
    action: "Add shared SourceOptions (--source-type, --source-path, --source-url, --source-auth), wire into fix, feature, mad, security-scan, autonomous, init commands"
    new: ["SourceOptions"]
  - id: integration
    action: "Call ISourceConfigOverrider.Apply() in ExecutePipelineUseCase, remove --repo and ScanRepoPath"
    modify: ["ExecutePipelineUseCase", "SecurityScanCommand"]
  - id: nullable-branch
    action: "CheckoutSourceContextBuilder returns null when no explicit branch — LocalSourceProvider takes HEAD, remote providers fall back to main"
    modify: ["CheckoutSourceContextBuilder", "LocalSourceProvider", "GitHubSourceProvider", "GitLabSourceProvider", "AzureReposSourceProvider"]
done:
  - "--source-type, --source-path, --source-url, --source-auth available on source-using commands"
  - "CLI values override config values field-by-field"
  - "--repo removed from SecurityScanCommand"
  - "ScanRepoPath removed"
  - "ISourceConfigOverrider with DI registration"
  - "Local source with no explicit branch uses current HEAD (no-op checkout for CI)"
  - "dotnet build + dotnet test clean"
