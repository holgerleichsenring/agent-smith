# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p77
goal: "Fix skills_path resolution, ZAP exit code handling, ZAP container permissions, add verbose debug logging"

steps:
  - id: skills-path
    action: "LoadSkillsHandler must resolve skills_path relative to repo root, not hardcoded config/"
    modify:
      - "LoadSkillsHandler: resolve path relative to repository LocalPath from pipeline context"

  - id: zap-exit-code
    action: "ZAP exit codes 1-3 are valid results (info/warn/fail), not errors — only treat >3 as failure"
    modify:
      - "ZapSpawner: treat exit codes 0-3 as success, log severity level"

  - id: zap-permissions
    action: "Fix /zap/wrk directory permissions so zap user (UID 1000) can write reports"
    modify:
      - "TarArchiveBuilder: use mode 0777 for directories created via docker cp"

  - id: debug-logging
    action: "Add verbose debug logs at key decision points across pipeline handlers"
    modify:
      - "LoadSkillsHandler: log resolved path"
      - "ZapSpawner: log container args, exit code interpretation"
      - "SpawnNucleiHandler: log target URL and template count"
      - "BootstrapProjectHandler: log skip reasons"

  - id: verify
    action: "dotnet build && dotnet test"

done:
  - "skills_path resolves relative to repo root"
  - "ZAP exit codes 1-3 produce findings, not errors"
  - "ZAP container can write to /zap/wrk"
  - "verbose logging at all key decision points"
  - "all tests green"
