# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0333c
goal: "Static-pattern precision on generated code: self-declared generated files (Roslyn <auto-generated> convention) are regenerated from templates, so hand-review vuln patterns only produce noise there — skip them for non-secret patterns while keeping secret detection"

applies_to: backend

requires: [p0333]

decisions:
  - "Verified: the live FP class 'LLM Output in SQL Query' (pattern id llm-output-in-sql, Category ai-security) fired on a generated TypeScript API client emitted into a .cs file. p0333 already suppresses it WHEN the master reads the file; this closes the residual case where a generated FP sits in a file the master never opened"
  - "Category-aware, not wholesale: skip is limited to non-'secrets' patterns. Secret patterns (Category secrets) still run on generated output, because a credential baked into generated code is a real leak — so there is no secret-detection trade-off"
  - "Detection via the <auto-generated> self-declaration (first 5 lines), the same marker Roslyn analyzers honor — NOT a per-language/path heuristic. Generated code declares itself; we trust the declaration"
  - "The pattern itself is too broad (also fired on a hand-written MediatR handler) — but pattern definitions live in the agent-smith-skills repo, not here. Tightening llm-output-in-sql is a named skills-repo follow-up (p0334), out of scope for this backend change"

steps:
  - id: skip-generated-for-vuln-patterns
    action: "PatternFileMatcher: if a file self-declares <auto-generated>, scan it with secret-category patterns only; hand-written files keep full coverage"
    modify:
      - "PatternFileMatcher: effective-pattern selection + IsSelfDeclaredGenerated + SecretPatternsOnly helpers"

tests:
  - "ScanFile_GeneratedFile_SkipsVulnPatterns"
  - "ScanFile_GeneratedFile_StillRunsSecretPatterns"
  - "ScanFile_HandWrittenFile_RunsVulnPatterns"

done:
  - "A generated file no longer trips vuln patterns but still trips secret patterns (tests)"
  - "Hand-written files keep full pattern coverage (test)"
  - "Full suite green"
