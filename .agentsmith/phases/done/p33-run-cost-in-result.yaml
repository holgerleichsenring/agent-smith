# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p33
goal: "Persist token usage and cost data in result.md as YAML frontmatter — human-readable and machine-parseable"
decisions:
  - yaml-frontmatter: "Cost data as YAML between --- markers — parseable by YamlDotNet/yq, renders in GitHub/Markdown viewers"
  - cost-models-in-contracts: "RunCostSummary, PhaseCost, TokenUsageSummary moved to Contracts (needed by Application layer)"
steps:
  - id: move-models
    action: "Move RunCostSummary, PhaseCost, TokenUsageSummary from Infrastructure/Models to Contracts/Models"
  - id: store-cost
    action: "Store RunCostSummary in PipelineContext after agent execution"
    modify: ["ClaudeAgentProvider: store cost summary via ContextKeys.RunCostSummary"]
  - id: duration
    action: "Track execution duration via Stopwatch in AgenticExecuteHandler"
    modify: ["AgenticExecuteHandler: ContextKeys.RunDurationSeconds"]
  - id: extend-writer
    action: "WriteRunResultHandler generates YAML frontmatter with cost/token/duration data"
    modify: ["WriteRunResultHandler"]
frontmatter-fields:
  - "ticket, date, result, type, duration_seconds"
  - "tokens: { input, output, cache_read, total }"
  - "cost: { total_usd, phases: { scout: { model, input, output, turns, usd }, primary: { ... } } }"
tests:
  - "WriteRunResultHandler_WithCostData_GeneratesFrontmatter"
  - "WriteRunResultHandler_WithoutCostData_GracefulFallback"
  - "YAML frontmatter round-trip parseable"
done:
  - "result.md contains YAML frontmatter with token/cost/duration data"
  - "Works without cost data (graceful fallback)"
  - "Aggregatable across all runs/*/result.md"
