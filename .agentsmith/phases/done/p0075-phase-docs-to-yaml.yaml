# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0075
goal: "Convert all done+planned phase docs from chatty markdown to compact YAML spec format. ~10x token reduction."

decisions:
  - yaml-over-markdown: "structured input → structured output, prose only for human-facing results"
  - no-code-examples: "agent reads codebase directly — examples in docs are stale overhead"
  - type-signatures-kept: "{ Field:type } specs stay — they are contracts, not illustration"
  - action-not-do: "field name: action (single value or list)"
  - no-uniform-schema-required: "consistency is good, enforcement is not — agent understands both"
  - delete-originals: "git history is the archive — two formats in parallel causes confusion"
  - done-and-planned-only: "active phases stay as-is — content is still changing"

inputs:
  - .agentsmith/phases/done/p*.md    # 88 done phases
  - .agentsmith/phases/planned/p*.md # 5 planned phases
  - .agentsmith/context.yaml         # cross-reference state.done entries

outputs:
  - .agentsmith/phases/done/p*.yaml    # one yaml per done phase, replacing .md
  - .agentsmith/phases/planned/p*.yaml # one yaml per planned phase, replacing .md

target-format:
  required: [phase, goal]
  optional: [requires, decisions, steps, new, modify, rename, tests, done, packages, dep-graph, pipeline-presets]
  field-rules:
    goal: "one line, what + why"
    requires: "phase id or free text precondition"
    decisions: "key: reason — only non-obvious choices"
    steps:
      id: "short noun"
      action: "imperative, single line or list"
      new: "TypeName: description or { Field:type, ... }"
      modify: "TypeName: what changes"
      path: "project or folder hint"
    tests: "list of test method names, AAA naming convention"
    done: "list of verifiable completion criteria"

conversion-rules:
  - strip: [prose-intros, motivation-paragraphs, sequential-step-explanations, directory-trees]
  - keep: [type-signatures, interface-names, config-keys, test-names, done-criteria, decisions]
  - code-blocks: "keep only if they are commands (bash) or type specs — drop illustrative C# snippets"
  - size-target: "≤50 lines typical, ≤100 lines max — flag if conversion exceeds 100"

steps:
  - id: batch-convert
    action: "convert each p*.md to p*.yaml, delete original .md"
    order: "done phases first (p0001–p0073), then planned"
    per-file:
      - read source md
      - extract: [goal, requires, decisions, steps, tests, done]
      - discard: [prose, motivation, directory-trees, illustrative-code]
      - write yaml
      - delete md

  - id: verify
    action:
      - "grep all interface names and type signatures from originals (via git show HEAD~1)"
      - "verify they appear in the new yaml files"
      - "spot-check 5 converted files against originals — all key facts present"

constraints:
  - "do not invent decisions not present in source"
  - "do not lose type signatures or interface names"
  - "if source phase is ambiguous → keep ambiguity, do not resolve"
  - "one yaml per phase — no merging"

done:
  - all 93 p*.md replaced by p*.yaml (88 done + 5 planned)
  - each yaml ≤ 100 lines
  - no type signatures lost
  - no test names lost
  - no decisions lost
  - original .md files deleted (git history preserves them)
