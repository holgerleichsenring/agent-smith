# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p19
goal: "Full Kubernetes deployment — Dispatcher, Redis, RBAC, Kustomize overlays"
requires: ["p18"]
decisions:
  - key: "Redis without PersistentVolume — ephemeral messages, upgrade path via appendonly yes"
  - key: "Namespace-scoped RBAC — no cluster-wide permissions"
  - key: "Kustomize overlays for dev (imagePullPolicy:Never) and prod (Always, 2 replicas)"
  - key: "Separate Dockerfile for Dispatcher (ASP.NET Core, not CLI)"
steps:
  - id: dispatcher-dockerfile
    action: "Create Dispatcher Dockerfile — multi-stage, aspnet:8.0"
    new:
      - "Dockerfile.dispatcher: sdk:8.0 build → aspnet:8.0 runtime, non-root 'dispatcher' user"
  - id: redis
    action: "Create Redis Deployment + Service (no PV)"
    new:
      - "k8s/base/redis/deployment.yaml: redis:7-alpine, maxmemory 256mb, allkeys-lru"
      - "k8s/base/redis/service.yaml: ClusterIP port 6379"
  - id: secrets
    action: "Create K8s Secret schema + creation script"
    new:
      - "k8s/secret-template.yaml: all API keys, tokens, redis-url"
  - id: configmap
    action: "Create ConfigMap for agentsmith.yml"
    new:
      - "k8s/base/configmap/agentsmith-config.yaml"
  - id: dispatcher-deployment
    action: "Create Dispatcher Deployment + Service"
    new:
      - "k8s/base/dispatcher/deployment.yaml: serviceAccount, secrets, configMap volume, probes"
      - "k8s/base/dispatcher/service.yaml: ClusterIP port 8080"
  - id: rbac
    action: "Create ServiceAccount, Role, RoleBinding for Job spawning"
    new:
      - "k8s/base/rbac/serviceaccount.yaml"
      - "k8s/base/rbac/role.yaml: batch/jobs create/delete/get/list/watch"
      - "k8s/base/rbac/rolebinding.yaml"
  - id: kustomize
    action: "Create Kustomize base + dev/prod overlays"
    new:
      - "k8s/base/kustomization.yaml"
      - "k8s/overlays/dev/kustomization.yaml: imagePullPolicy:Never, 1 replica"
      - "k8s/overlays/prod/kustomization.yaml: imagePullPolicy:Always, 2 replicas, Ingress"
  - id: verify
    action: "kubectl apply -k k8s/overlays/dev"
done:
  - "kubectl apply -k k8s/overlays/dev brings up full stack"
  - "redis + dispatcher pods Running"
  - "/health returns 200"
  - "Slack message spawns K8s Job, progress appears in Slack"
  - "Job pod cleaned up after TTL"
