  - "FilesystemToolHost + LogDecisionToolHost + HumanToolHost implementieren IToolHost; jede Klasse ≤ 140 Zeilen; Tool-Method-Bodies sind 1:1-Migration aus SandboxToolHost (kein Verhaltens-Drift)"
  - "SandboxToolHost ist [Obsolete]-Facade; delegiert intern an ToolKit + die drei zerlegten Hosts; bestehende Caller funktionieren unverändert"
  - "IPipelineToolPolicy + AllHostsActivePolicy registriert; Default-Verhalten 'alle drei Hosts aktiv' für jede bekannte und unbekannte Pipeline"
  - "IToolKit.GetToolsFor erweitert um pipelineName-Parameter (erforderlich, '*' als Sentinel für Wildcard-Match); Komposition über IPipelineToolPolicy + die IEnumerable<IToolHost>-Instanzen"
