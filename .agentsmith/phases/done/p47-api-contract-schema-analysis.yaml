phase: p47
goal: "Add Spectral as second static analyzer for api-security-scan and rewrite api-design-auditor skill with full schema analysis"
requires: ["p45", "p19a"]
decisions:
  - key: "Spectral via Docker (stoplight/spectral:6), same IContainerRunner pattern as Nuclei"
  - key: "OWASP Spectral Ruleset as base config"
  - key: "Nuclei targets.txt approach kept — -openapi flag verified not to work as documented"
  - key: "Nuclei tags: api,auth,token,cors,ssl — NOT exposure,misconfig (caused timeout)"
steps:
  - id: spectral
    action: "Integrate Spectral as pipeline step"
    new:
      - "SpawnSpectralCommand: runs after Nuclei in pipeline"
      - "SpectralSpawner: mounts swagger.json + .spectral.yaml, parses JSON output"
      - "SpectralResult: { Findings, ErrorCount, WarnCount, DurationSeconds }"
      - "SpectralFinding: { Code, Message, Path, Severity, Line }"
      - "config/spectral/.spectral.yaml: extends @stoplight/spectral-owasp"
    modify:
      - "CommandNames: add SpawnSpectral"
      - "ContextKeys: add SpectralResult"
      - "PipelinePresets: insert SpawnSpectral after Nuclei"
  - id: skill-rewrite
    action: "Rewrite api-design-auditor with 6 check categories"
    modify:
      - "api-design-auditor.yaml: sensitive data in response schemas, enum opacity, REST semantics, route consistency, missing constraints, Spectral findings interpretation"
done:
  - "Spectral runs against swagger.json with OWASP ruleset"
  - "SpectralResult available in PipelineContext for skills"
  - "api-design-auditor detects sensitive data bundling, enum opacity, Spectral contextualization"
  - "dotnet build + dotnet test clean"
