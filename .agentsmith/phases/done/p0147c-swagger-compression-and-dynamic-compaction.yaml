# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0147c
goal: "Two related input-size robustness issues. (1) Sample's swagger spec
  was 291k chars in a recent run — close enough to the input cap to risk
  truncation in any handler that consumes it whole. Add a SwaggerSpecCompressor
  that strips example payloads / verbose descriptions / unused $ref expansions
  for specs over a threshold, keeping the path+method+schema shape intact.
  (2) Compaction today fires at fixed threshold_iterations (default 8)
  ignoring actual token use — a chatty skill at iteration 7 can blow the
  cap, a terse skill at iteration 10 wastes compaction budget. Flip to a
  token-based dynamic trigger."

requires: []

scope:
  in: |
    (1) SwaggerSpecCompressor (new). Input: parsed SwaggerSpec. Output:
        compressed SwaggerSpec with the same path/method/security-scheme
        shape but examples stripped, descriptions truncated, unused
        component schemas dropped. Activation: spec >100k chars triggers
        compression; under, pass-through.

    (2) LoadSwaggerHandler / SwaggerProvider chain plugs the compressor in
        between fetch and storage in ContextKeys.SwaggerSpec. Skills always
        see the (possibly compressed) shape; the full original spec is
        kept in ContextKeys.SwaggerSpecFull for skills that need it.

    (3) Compaction dynamic trigger: ClaudeContextCompactor /
        OpenAiContextCompactor.ShouldCompact takes the current accumulated
        token-count + the configured max_context_tokens, not just the
        iteration count. Existing threshold_iterations stays as a backup
        upper bound (fires even if token usage is low — defensive).

    (4) Per-agent CompactionConfig gains max_context_tokens_trigger_ratio
        (default 0.7); compaction fires when accumulated input tokens
        exceed ratio * max_context_tokens.

  out: |
    Swagger-spec semantic compression (e.g. drop endpoints the LLM hasn't
    queried). Out of scope — that's a per-skill optimization.

    Multi-call batching / parallel skill rounds. Separate concern.

decisions:
  - key: |
      Compress only above 100k chars threshold. Reason: typical project
      specs are 10-50k; compression adds processing cost + loses example
      payloads that LLMs use for schema understanding. Only kick in when
      the original would risk truncation. -- alternatives: always compress
      (rejected: information loss on small specs); never compress (rejected:
      the 291k Sample case is unsafe).
  - key: |
      Keep ContextKeys.SwaggerSpecFull. Skills that need full schema
      detail (response-analyst, recon-analyst) read from the full key;
      everyone else reads from the compressed default. Per-skill choice.
  - key: |
      Token-based trigger but keep iteration upper bound. Reason: token
      counts are estimates, not exact. A pathological prompt could keep
      iteration count low while pushing tokens over the cap; the iteration
      bound catches that. Defence in depth.

steps:
  - id: swagger-compressor
    action: "New SwaggerSpecCompressor service + threshold-gated wiring in LoadSwaggerHandler."
    new:
      - "src/AgentSmith.Application/Services/SwaggerSpecCompressor.cs"
      - "src/AgentSmith.Contracts/Services/ISwaggerSpecCompressor.cs"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/LoadSwaggerHandler.cs (run compressor between fetch and store; both keys populated)."
      - "src/AgentSmith.Contracts/Commands/ContextKeys.cs (add SwaggerSpecFull)."

  - id: dynamic-compaction-trigger
    action: "Both compactors take a token-counter + threshold ratio; iteration cap stays as upper bound."
    modify:
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/ClaudeContextCompactor.cs"
      - "src/AgentSmith.Infrastructure/Services/Providers/Agent/Compaction/OpenAiContextCompactor.cs"
      - "src/AgentSmith.Contracts/Models/Configuration/CompactionConfig.cs (add MaxContextTokensTriggerRatio)."

tests:
  - "SwaggerSpecCompressor under-threshold input: pass-through unchanged."
  - "SwaggerSpecCompressor over-threshold: same paths/methods, descriptions truncated, components pruned."
  - "Dynamic compaction trigger fires before iteration cap when tokens cross threshold; iteration cap still fires when tokens stay low."

done:
  - "SwaggerSpecCompressor + dynamic compaction trigger merged."
  - "Smoke against Sample spec (291k): compressed swagger flows through skill rounds without truncation warnings."
  - "Compaction triggers on token-pressure, not just iteration-count, in a deliberately chatty smoke run."
