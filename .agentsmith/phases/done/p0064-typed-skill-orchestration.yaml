# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0064
goal: "Replace free-form discussion with typed orchestration — skills declare role/position/output, orchestrator builds deterministic execution graph"
requires: ["p0057a", "p0055"]
decisions:
  - Three pipeline types (discussion/structured/hierarchical): "discussion keeps LLM triage, structured/hierarchical use deterministic graph"
  - runs_after accepts both role types and skill names: "coding pipeline has two gate stages with executor between them"
  - Parallel means no accumulated context: "each contributor runs independently with only its input slice"
  - Convergence only for discussion pipelines: "structured/hierarchical do single LLM call per skill, no rounds"
  - Skills without orchestration block default to contributor: "backward compatibility"
steps:
  - id: skill-graph
    action: "Add SkillGraphBuilder — builds deterministic execution graph from skill definitions"
    new:
      - "SkillGraphBuilder"
      - "SkillGraph: { Stages: ExecutionStage[] }"
      - "ExecutionStage: { Skills, IsGate, IsLead }"
      - "SkillOrchestration: { Role, RunsAfter, RunsBefore, Output, ParallelWith, InputCategories }"
  - id: roles
    action: "Implement four skill roles: contributor (list), lead (plan), gate (list|verdict), executor (artifact)"
    modify:
      - "SkillRoundHandlerBase.cs: role-aware execution"
      - "TriageHandlerBase.cs: skip for structured/hierarchical"
      - "SkillDefinition.cs: add SkillOrchestration field"
  - id: skill-loader
    action: "Parse orchestration block from agentsmith.md"
    modify: ["SkillLoader.cs"]
  - id: pipeline-type
    action: "Add pipeline type field to PipelinePresets"
    modify: ["PipelinePresets.cs"]
  - id: skill-configs
    action: "Update all 25 agentsmith.md files with orchestration block"
done:
  - "agentsmith.md orchestration block parsed by SkillLoader"
  - "SkillGraphBuilder builds deterministic execution graph"
  - "structured/hierarchical pipelines skip LLM triage"
  - "Contributors receive only their input slice"
  - "Gate blocks pipeline if output is empty"
  - "Lead receives only gate-filtered output"
  - "Executor receives lead plan, produces artifact"
  - "Discussion pipelines unchanged"
  - "All 25 agentsmith.md files updated"
  - "Token usage reduced ~80% for structured pipelines"
  - "false-positive-filter output flows into DeliverFindings"
