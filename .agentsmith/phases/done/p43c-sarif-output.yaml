phase: p43c
goal: "SARIF 2.1.0 output strategy, Markdown output, platform-specific upload (GitHub Security tab, GitLab artifact, AzDO Work Item), PR/MR summary comments"
requires: ["p43b"]
decisions:
  - key: "Severity mapping: HIGH->error, MEDIUM->warning, LOW->note"
  - key: "Rule IDs AS001-AS999 auto-generated per unique vulnerability type"
  - key: "GitLab SARIF as CI artifact gl-sast-report.json — requires customer .gitlab-ci.yml entry"
  - key: "AzDO has no native SARIF dashboard — post as Work Item comment + pipeline artifact"
steps:
  - id: strategies
    action: "Implement output strategies"
    new:
      - "SarifOutputStrategy: builds valid SARIF 2.1.0 from findings"
      - "MarkdownOutputStrategy: renders findings as table + summary"
      - "LocalFileOutputStrategy: refactored from p42 DeliverOutputHandler"
  - id: pr-comments
    action: "Add PR/MR comment posting"
    new:
      - "IPrCommentProvider: { PostCommentAsync(prIdentifier, markdown) }"
    modify:
      - "GitHubSourceProvider: implement IPrCommentProvider via Octokit"
      - "GitLabSourceProvider: implement IPrCommentProvider via API v4"
      - "AzureReposSourceProvider: implement IPrCommentProvider via GitHttpClient"
  - id: upload
    action: "Platform-specific SARIF upload"
    # GitHub: POST /repos/.../code-scanning/sarifs (requires security_events:write)
    # GitLab: write gl-sast-report.json as CI artifact
    # AzDO: Work Item comment + pipeline artifact
    # CLI: write findings.sarif + stdout summary
  - id: skill-format
    action: "Add structured output format requirement to security skills"
    modify:
      - "config/skills/security/*.yaml: require severity, file, start_line, end_line, title, description, confidence per finding"
done:
  - "SarifOutputStrategy produces valid SARIF 2.1.0"
  - "GitHub SARIF uploaded, appears in Security tab"
  - "PR/MR comment posted on all platforms"
  - "Zero findings -> 'No issues found' comment + empty SARIF"
  - "Skills emit structured output with file/line/severity/confidence"
