# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p20d
goal: "Real-time detail events from agentic loop as Slack thread replies under progress message"
requires: ["p20c"]
decisions:
  - fire-and-forget: "ReportDetailAsync errors swallowed — failed Slack call must never abort agentic loop"
  - thread-via-existing-ts: "SlackAdapter.SendDetailAsync uses existing _progressMessageTs as thread_ts — no new state"
  - bus-message-detail: "New BusMessageType.Detail on same job:{jobId}:out stream"
  - all-providers-instrumented: "ClaudeAgentProvider, OpenAiAgenticLoop, GeminiAgenticLoop all report details"
  - cli-debug-only: "ConsoleProgressReporter logs details at Debug level (--verbose)"
steps:
  - id: progress-reporter
    action: "Add ReportDetailAsync to IProgressReporter + Console/Redis implementations"
    modify: ["IProgressReporter", "ConsoleProgressReporter", "RedisProgressReporter"]
  - id: bus-message
    action: "Add Detail to BusMessageType + BusMessage.Detail factory"
    modify: ["BusMessage", "RedisMessageBus serialization"]
  - id: claude-provider
    action: "Instrument all AI providers and ToolExecutor with detail events"
    modify: ["ClaudeAgentProvider", "ToolExecutor", "AgenticLoop", "OpenAiAgenticLoop", "GeminiAgenticLoop", "ScoutAgent"]
  - id: slack-thread
    action: "Add IPlatformAdapter.SendDetailAsync + SlackAdapter thread implementation"
    modify: ["IPlatformAdapter", "SlackAdapter"]
  - id: dispatcher-wiring
    action: "Route Detail bus messages to adapter"
    modify: ["MessageBusListener"]
detail-events:
  - "Scout: analyzing/reading files/found N files"
  - "Agent: reading/writing files, running commands"
  - "Iteration N, context compacted, rate limited"
additional-fixes:
  - "Dispatcher fire-and-forget race: capture IServiceScopeFactory before Task.Run"
  - "ToolExecutor deadlock: WaitForExit before ReadToEnd with 60s timeout"
  - "TestHandler false positive: check for Microsoft.NET.Test.Sdk in .csproj"
  - "Dockerfile: runtime -> SDK for agentic loop (dotnet build/test)"
done:
  - "Slack thread appears under progress during step 7/9"
  - "Thread shows scout, file ops, commands, iterations"
  - "CLI --verbose shows detail lines"
  - "Failed SendDetailAsync does not abort pipeline"
  - "Detail events rate-throttled (no Slack rate limit errors)"
