done:
  - "DeterministicTriageSelector + SpecificityScorer + PresetRoleSlotResolver + RoleSlot + RoleSlotCatalog all exist in Application.Services.Triage"
  - "TriageOutputProducer has no IChatClientFactory dependency and no ITriageOutputValidator dependency; ProduceAsync is ~40 lines and delegates to DeterministicTriageSelector"
  - "TriageOutputValidator class deleted — vocabulary + role-slot validation is by construction"
  - "StructuredTriageStrategy.TriageAsync has no Parse/Validation catch blocks; the only remaining failure path is structured 'no activates_when match for required slots' with per-slot hint"
  - "DataFlowReadGate has no wildcard branches (lines 59 + 70 deleted); PhaseDataFlowConfigValidator rejects '*' in ContextKeys or ToPhaseStep at config-load with structured error message"
  - "Bundled config (config/agentsmith.example.yml + config/agentsmith.yml) PhaseDataFlowConfig blocks use explicit ContextKeys + ToPhaseStep — zero wildcard occurrences across all 8 presets"
  - "Operator-side configs that still carry '*' in PhaseDataFlowConfig fail-loud at YamlConfigurationLoader load with structured error message including per-preset suggestion"
