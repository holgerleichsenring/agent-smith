# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0061
goal: "Apply Karpathy knowledge-base pattern to codebases — compile runs into queryable wiki, add Q&A intent, wiki linting"
requires: ["p0041", "p0022", "p0058", "p0060"]
decisions:
  - Wiki commits go to default branch not PR branch: "wiki is project-wide knowledge, prevents merge conflicts"
  - No RAG/vectors: "readable markdown in Git, human-traceable"
  - QueryIntent requires @agent-smith prefix: "prevents collisions with ticket descriptions"
  - Query uses sparse checkout of .agentsmith/wiki/ only: "2-5 seconds vs 15-30 for full clone"
  - No container job for queries: "runs in dispatcher process, 5-15 seconds"
steps:
  - id: wiki-schema
    action: "Define wiki/ directory schema and index.md format"
  - id: compile-handler
    action: "Add CompileKnowledgeHandler — incremental LLM compilation of runs into wiki"
    new:
      - "CompileKnowledgeHandler: ICommandHandler<CompileKnowledgeContext>"
  - id: compile-cli
    action: "Add agent-smith compile-wiki CLI command with --full flag"
  - id: query-handler
    action: "Add QueryHandler + QueryIntent parser — sparse checkout, direct answer"
    new:
      - "QueryHandler"
      - "QueryIntent"
  - id: query-slack
    action: "Route @agent-smith queries via Slack intent detection"
  - id: wiki-lint
    action: "Add WikiLint health check — finds inconsistencies, gaps, suggests articles"
  - id: wiki-lint-fix
    action: "Add wiki-lint --fix for automatic remediation as PR"
tests:
  - "QueryHandler returns answer with source reference"
  - "CompileKnowledgeHandler incremental mode"
  - "Integration: 3 runs → compilation → query → correct answer"
done:
  - "Wiki directory created on first compile-wiki"
  - "CompileKnowledge runs incrementally, respecting rate limit config"
  - "Wiki commits go to default branch"
  - "compile-wiki --full rebuilds wiki completely"
  - "index.md automatically maintained with backlinks"
  - "QueryIntent recognized by dispatcher (@agent-smith prefix required)"
  - "Query answer in <15 seconds in Slack (sparse checkout)"
  - "Source reference in every answer"
  - "wiki-lint produces health report"
  - "Health report delivered via Slack"
  - "wiki-lint --fix creates PR with cleanups"
  - "Wiki survives code changes (no conflict with normal PRs)"
