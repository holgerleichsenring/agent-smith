# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0050
goal: "Multiple --output strategies per scan (comma-separated), configurable --output-dir, new summary output type"
requires: ["p0043c"]
decisions:
  - key: "console and summary always stdout, never files"
  - key: "File naming: findings.md, findings.sarif — predictable for pipeline artifacts"
  - key: "--output-dir default: ./agentsmith-output/ locally, /output/ in Docker"
steps:
  - id: summary
    action: "Create summary output strategy"
    new:
      - "SummaryOutputStrategy: clean findings-only output grouped by severity, no skill discussion noise, includes cost line"
  - id: multi
    action: "Enable multiple output strategies per run"
    modify:
      - "ApiScanCommand: parse --output as comma-separated, add --output-dir"
      - "ContextKeys: add OutputDir"
      - "DeliverFindingsHandler: iterate over all requested strategies, pass output dir"
      - "MarkdownOutputStrategy: write to output dir"
      - "SarifOutputStrategy: write to output dir"
      - "ServiceCollectionExtensions: register SummaryOutputStrategy"
done:
  - "--output console,summary,markdown,sarif runs all four strategies"
  - "summary shows only retained findings grouped by severity"
  - "Cost line visible in summary"
  - "--output-dir controls file output location"
  - "dotnet build + dotnet test clean"
