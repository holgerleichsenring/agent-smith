# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0027
goal: "Replace free-text Slack input with structured modals — dropdowns for commands, projects, tickets"
decisions:
  - modal-additive: "Free-text input continues to work; modal is an additional input method"
  - cached-ticket-search: "ICachedTicketSearch with 60s TTL keyed by project+query"
  - platform-agnostic: "IModalBuilder interface with SlackModalBuilder and TeamsModalBuilder implementations"
steps:
  - id: slash-command
    action: "Register /fix and /agentsmith slash commands, respond with views.open modal"
  - id: dynamic-options
    action: "Create POST /slack/options endpoint for project and ticket dropdown population"
    new: ["POST /slack/options endpoint", "ICachedTicketSearch"]
  - id: submission-handler
    action: "Handle view_submission with direct routing — no IntentEngine needed"
    new: ["ModalCommandHandler"]
  - id: conditional-fields
    action: "Update modal dynamically via views.update on block_actions"
  - id: teams-cards
    action: "Implement Teams Adaptive Cards equivalent via IPlatformAdapter"
    new: ["IModalBuilder", "SlackModalBuilder", "TeamsModalBuilder"]
modal-commands:
  - "Fix ticket (static_select)"
  - "List tickets"
  - "Create ticket (title + description inputs)"
  - "Fix PR comments (PR dropdown)"
done:
  - "/fix opens modal in Slack"
  - "Project dropdown populated from agentsmith.yml"
  - "Ticket dropdown populated dynamically from ticket provider"
  - "Conditional fields based on selected command"
  - "Modal submission routes without IntentEngine"
  - "Teams Adaptive Card equivalent"
  - "Free-text input still works"
  - "Ticket search cached 60s TTL"
