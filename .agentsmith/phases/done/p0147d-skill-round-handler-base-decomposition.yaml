# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0147d
goal: "SkillRoundHandlerBase is 545 lines — 18× over the 30-line base-class
  limit in coding-principles. Four derived round handlers (Filter, Verify,
  GeneratePlan-style, Bootstrap, ApiSkillRound) inherit prompt-building +
  response-parsing + skill-dispatch + observation-collection from a single
  fat base. Decompose into IPromptComposer + ISkillResponseParser +
  ISkillRoundDispatcher injected services; base shrinks to <30 lines of
  template-method orchestration."

requires: ["p0146c"]

scope:
  in: |
    (1) New IPromptComposer + PromptComposer (instance). Responsibilities:
        - Build the stable prefix (cached across same-round calls).
        - Build the per-skill suffix.
        - Compose the final prompt by section (system / task / context /
          output schema).
        Per-handler customisation via injected ISkillPromptStrategy
        (returns the right sections for the round type).

    (2) New ISkillResponseParser + SkillResponseParser. Wraps
        ITolerantJsonParser (p0147a) and ObservationParser, plus the
        round-specific post-processing each derived handler does today
        inline.

    (3) New ISkillRoundDispatcher + SkillRoundDispatcher. Single skill-call
        invocation point: takes the composed prompt, runs through
        SkillCallRuntime, returns parsed observations + cost.

    (4) SkillRoundHandlerBase shrinks to template-method shape:
        ```
        protected async Task<CommandResult> ExecuteRoundAsync(
            string skillName, int round, PipelineContext pipeline, CancellationToken ct)
        {
            var prompt = await _composer.ComposeAsync(skillName, round, pipeline, ct);
            var (observations, cost) = await _dispatcher.DispatchAsync(prompt, skillName, ct);
            _observationAccumulator.Add(pipeline, observations);
            return BuildResult(observations, cost);
        }
        ```
        Approximately 25-30 lines total including ctor + abstract hooks.

    (5) Four derived classes (BootstrapRoundHandler, FilterRoundHandler,
        VerifyRoundHandler, ApiSkillRoundHandler) replace inherited logic
        with their specific ISkillPromptStrategy implementation —
        shrinking each from 175-272 lines to <80 lines each.

  out: |
    Changing the skill-round behaviour itself. Same outputs, same prompts,
    same costs; only the code structure changes. Pure refactor.

    Round-specific business logic (FilterRoundHandler's batching,
    VerifyRoundHandler's two-pass logic). Those move into their respective
    ISkillPromptStrategy implementations unchanged.

decisions:
  - key: |
      Composition with strategy injection, not abstract methods on the
      base. Reason: coding-principles say composition over inheritance —
      this isn't an "extract methods" job, it's a model-responsibilities
      job. Each strategy is its own injectable service the test suite can
      mock independently. -- alternatives: keep abstract methods + extract
      helpers (rejected: that's exactly the "code moving" refactor the
      principles forbid).
  - key: |
      ISkillPromptStrategy per round type, not per skill. Reason: skills
      vary in their content but the round types (filter / verify / bootstrap
      / api-skill-round) have stable prompt shapes. Strategy maps 1:1 to
      the derived handler that used to own the logic; ~5 strategies, not
      ~50.
  - key: |
      Migrate one derived handler at a time — start with BootstrapRoundHandler
      (smallest at 175 lines, lowest blast radius). Reason: validates the
      composition contract on the simplest case before tackling
      FilterRoundHandler / VerifyRoundHandler that have more behaviour.

steps:
  - id: design-contracts
    action: "Add the three service interfaces in Contracts + their stub implementations + DI registrations."
    new:
      - "src/AgentSmith.Contracts/Services/IPromptComposer.cs"
      - "src/AgentSmith.Contracts/Services/ISkillResponseParser.cs"
      - "src/AgentSmith.Contracts/Services/ISkillRoundDispatcher.cs"
      - "src/AgentSmith.Contracts/Services/ISkillPromptStrategy.cs"
      - "src/AgentSmith.Application/Services/PromptComposer.cs"
      - "src/AgentSmith.Application/Services/SkillResponseParser.cs"
      - "src/AgentSmith.Application/Services/SkillRoundDispatcher.cs"

  - id: migrate-bootstrap-first
    action: "BootstrapRoundHandler migrates first as the canary. Its inherited prompt-building moves into BootstrapPromptStrategy; the handler shrinks to template-method delegation."
    new:
      - "src/AgentSmith.Application/Services/SkillPromptStrategies/BootstrapPromptStrategy.cs"
    modify:
      - "src/AgentSmith.Application/Services/Handlers/BootstrapRoundHandler.cs (target ≤60 lines)"
      - "src/AgentSmith.Application/Services/Handlers/SkillRoundHandlerBase.cs (extract composer/dispatcher injection)"

  - id: migrate-remaining-three
    action: "Repeat for FilterRoundHandler, VerifyRoundHandler, ApiSkillRoundHandler. Each gets its prompt strategy + thinned handler. Base class reaches its final ~30-line shape after the last one lands."
    new:
      - "src/AgentSmith.Application/Services/SkillPromptStrategies/FilterPromptStrategy.cs"
      - "src/AgentSmith.Application/Services/SkillPromptStrategies/VerifyPromptStrategy.cs"
      - "src/AgentSmith.Application/Services/SkillPromptStrategies/ApiSkillPromptStrategy.cs"
    modify:
      - "FilterRoundHandler.cs, VerifyRoundHandler.cs, ApiSkillRoundHandler.cs (each ≤80 lines)"
      - "SkillRoundHandlerBase.cs (final shape ≤30 lines)"

tests:
  - "Each new service has its own test pack (prompt composition, response parsing, dispatch)."
  - "Each strategy: bit-for-bit prompt output equals what the old base+derived produced (golden-file tests against captured pre-refactor prompts)."
  - "Existing round-handler test packs pass unchanged (same outputs)."

done:
  - "SkillRoundHandlerBase.cs ≤30 lines."
  - "Each of the four derived handlers ≤80 lines."
  - "Three new service interfaces + four strategies wired via DI."
  - "Full test suite green; smoke runs (security-scan + api-security-scan + mad-discussion + fix-bug) produce identical observation sets pre- and post-refactor."
