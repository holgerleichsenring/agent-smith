# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p80
goal: "Add attacker-perspective LLM skills to security-scan — commodity tools stay unchanged, intelligence layer adds attacker mindset and chain analysis"
requires: ["p43b", "p54", "p64", "p79"]
decisions:
  - key: "Commodity tools (StaticPatternScan, GitHistoryScan, DependencyAudit) are passive layer — unchanged, always run first"
  - key: "Intelligence layer (LLM attacker skills) is the active layer — runs on top of commodity findings"
  - key: "No runtime, no user accounts, no HTTP probing — security-scan operates on code/diff only"
  - key: "Attacker-perspective skills replace knowledge-domain skills — same model as p79 api-security"
  - key: "Existing skills NOT deleted — they become part of the intelligence layer alongside new attacker skills"
  - key: "chain-analyst is the executor — receives all commodity findings + all skill findings, reasons about chains"
  - key: "No EvidenceMode needed — all findings are static/inferred, no confirmed-by-probe distinction"

steps:
  - id: attacker-skills
    action: "Add attacker-perspective skills — do not delete existing skills"
    new:
      - "config/skills/security/recon-analyst/ — What does the codebase reveal? Exposed endpoints, version strings, debug flags, framework fingerprints, commented-out code in diff."
      - "config/skills/security/low-privilege-attacker/ — Code paths reachable without elevated permissions. Missing authorization guards. Backend trusting frontend to hide actions."
      - "config/skills/security/idor-prober/ — Direct object references constructed from user input. IDs in URLs, query params, request bodies without ownership checks."
      - "config/skills/security/input-abuser/ — User input entry points and where they land. Missing validation, sanitization, output encoding. File upload handling."
      - "config/skills/security/response-analyst/ — What does the code expose in responses? Exception messages, stack traces, internal IDs, over-broad response schemas."
      - "config/skills/security/chain-analyst/ — Executor. Receives all findings — commodity + all skill outputs. Reasons about attack chains and combined severity. Produces final report."

  - id: triage-update
    action: "Update SecurityTriageHandler to include new attacker skills in candidate pool"
    modify:
      - "SecurityTriageHandler.cs: add new attacker skills to available roles"
      - "SecurityTriageHandler.cs: add signals — hasDirectObjectReferences, hasInputEntryPoints, hasAuthGuardChanges, hasErrorHandlingChanges, hasFileUploadChanges"
      - "SecurityTriageHandler.cs: chain-analyst always selected as executor"

  - id: chain-analyst-context
    action: "Ensure chain-analyst receives commodity findings as well as skill findings"
    modify:
      - "SecuritySkillRoundHandler.cs: pass StaticPatternFindings, GitHistoryFindings, DependencyFindings into chain-analyst context"
      - "ContextKeys.cs: verify all commodity finding types accessible to skill round"

tests:
  - "SecurityTriageHandler_WithNewSignals_SelectsAttackerSkills"
  - "SecurityTriageHandler_ChainAnalyst_AlwaysSelected"
  - "SecuritySkillRoundHandler_ChainAnalyst_ReceivesCommodityFindings"
  - "SecuritySkillRoundHandler_ChainAnalyst_ReceivesSkillFindings"

done:
  - "All existing commodity tools still run unchanged — StaticPatternScan, GitHistoryScan, DependencyAudit"
  - "All existing knowledge-domain skills still run — auth-reviewer, injection-checker etc."
  - "New attacker-perspective skills run alongside existing skills"
  - "chain-analyst receives findings from all sources and produces chained assessment"
  - "dotnet build zero warnings, all tests green"
