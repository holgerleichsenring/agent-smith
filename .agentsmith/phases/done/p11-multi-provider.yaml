phase: p11
goal: "Multi-provider support — OpenAI + Gemini alongside Claude, selectable via config"
requires: ["p10"]
decisions:
  - key: "Each provider is self-contained — no shared LLM abstraction, APIs too different"
  - key: "IAgentProvider interface stays stable — internal differences only"
  - key: "ToolExecutor is shared — file/command ops are provider-independent"
  - key: "TokenUsageTracker gets provider-agnostic Track(int,int,int,int) overload"
  - key: "Prompt caching, context compaction, scout are Claude-only for now"
steps:
  - id: openai
    action: "Implement OpenAI provider with tool calling"
    new:
      - "OpenAiAgentProvider: IAgentProvider, uses ChatClient"
      - "OpenAiAgenticLoop: ChatCompletions with tool calls, FinishReason.ToolCalls/Stop"
      - "OpenAiToolDefinitions: ChatTool.CreateFunctionTool format"
  - id: gemini
    action: "Implement Gemini provider with function calling"
    new:
      - "GeminiAgentProvider: IAgentProvider, uses GenerativeModel"
      - "GeminiAgenticLoop: FunctionCall/FunctionResponse parts, Roles.Function"
      - "GeminiToolDefinitions: FunctionDeclaration + Schema format"
  - id: factory-config
    action: "Wire up AgentProviderFactory, update config examples"
    modify:
      - "AgentProviderFactory: support claude/anthropic, openai, gemini/google"
      - "TokenUsageTracker: add Track(int,int,int,int) overload"
      - ".env.example: add GEMINI_API_KEY"
  - id: verify
    action: "dotnet build && dotnet test"
tests:
  - "Create_ValidType_ReturnsCorrectProvider (Theory: claude, anthropic, openai, gemini, google)"
  - "Create_UnknownType_Throws"
done:
  - "OpenAI provider with agentic loop working"
  - "Gemini provider with function calling working"
  - "AgentProviderFactory supports all three providers"
  - "Config examples for all providers"
