# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0202a-install-command-operator-override-layer
goal: |
  Give the operator a durable home for ci.install_command. p0202 added the
  field on CiConfig sourced from project-map.json — correct as the analyzer
  DEFAULT, but project-map.json is a generated artifact: a hand-edit there is
  overwritten on the next analysis run. context.yaml is what the operator owns
  and what survives re-analysis. This phase makes context.yaml the override
  layer: a `ci.install_command` set there wins over the analyzer's value.

  The axis is generated-vs-durable, not auto-read (both files are read
  automatically). The override layer is the content of this phase — bootstrap
  auto-population is the secondary convenience on top of it.

requires:
  - p0202-install-dependencies-step-and-aggregation-fixes

scope:
  in: |
    - Add a `ci` segment to ContextYamlDocument (install_command at minimum;
      model the block so test_command / build_command can join the same
      override path without a reshape). Round-trip-safe through the existing
      YamlDotNet reader/writer like the rest of the document.

    - install_command read at discovery time, NOT merged at ProjectMap
      resolution. The InstallDependencies step runs before LoadContext and
      AnalyzeCode, so neither the ProjectMap nor the loaded context.yaml is in
      the pipeline at the step's slot — a ProjectMap-side merge produces nothing
      it can use (and the p0202 handler that read the ProjectMap was a silent
      no-op for exactly this reason). SandboxLanguageResolver reads
      ci.install_command from context.yaml at the same point it reads stack.lang
      and carries it on RemoteContextDiscovery; the handler reads it from there.
      context.yaml is the single, durable source for install_command — this
      fixes the p0202 no-op as the same change. The analyzer-side install_command
      (CiConfig field + ProjectMapJsonReader parse + analyzer-prompt lines) added
      in p0202 had no consumer once the runtime read context.yaml, so it was
      removed — context.yaml is the only place install_command lives.

    - Bootstrap skills (csharp / node / python / generic-bootstrap in
      agent-smith-skills) auto-populate ci.install_command into the context.yaml
      they emit at init-project time, so a fresh project gets the right durable
      value without a manual edit.

  out: |
    Overriding fields beyond the ci block (agent, sandbox, etc.) — the override
    mechanism here is scoped to ci. A general context.yaml override framework is
    a separate concern.

    pytest exit-5 exit-code allowlist — stays in p0202b.

decisions:
  - key: "Generated-vs-durable is the axis: project-map.json is regenerated each analysis (a hand-edit evaporates); context.yaml is operator-owned and survives re-analysis. So context.yaml is the durable source for install_command."
  - key: "Read install_command at discovery time (SandboxLanguageResolver, beside stack.lang), carried on RemoteContextDiscovery — NOT merged at ProjectMap resolution. The install step runs before LoadContext/AnalyzeCode, so context.yaml is the only source available that early; this also fixes the p0202 no-op (the handler read a ProjectMap that wasn't populated at its slot)."
  - key: "Single source for install_command: context.yaml. The p0202 analyzer-side install_command (CiConfig field + ProjectMapJsonReader + prompt) had no consumer once the runtime read context.yaml, so it was removed entirely."

steps:
  - id: ci-segment-on-context-doc
    action: "Add a ci block (install_command; shaped for test/build later) to ContextYamlDocument + the YamlDotNet read/write path"
    modify:
      - "src/backend/AgentSmith.Contracts/Models/Configuration/ContextYamlDocument.cs (+ ContextYamlCi, ContextYamlSummary)"
      - "src/backend/AgentSmith.Infrastructure/Services/ContextYamlSerializer.cs (ReadShape CiBlock)"
  - id: discovery-carries-install-command
    action: "Read ci.install_command in SandboxLanguageResolver and carry it on RemoteContextDiscovery; InstallDependenciesHandler reads it from the discovery (not the ProjectMap) — fixes the p0202 no-op"
    modify:
      - "src/backend/AgentSmith.Contracts/Sandbox/RemoteContextDiscovery.cs"
      - "src/backend/AgentSmith.Application/Services/Sandbox/SandboxLanguageResolver.cs"
      - "src/backend/AgentSmith.Application/Services/Handlers/InstallDependenciesHandler.cs"
  - id: bootstrap-autopopulate
    action: "project-bootstrap SKILL.md emits ci.install_command (cross-repo: agent-smith-skills; release + agentsmith.yml pin is the operational follow-up)"
  - id: tests
    new:
      - "ci round-trip + raw-parse tests; resolver carries install_command; handler reads from discovery"

tests:
  - "ContextYamlDocument_CiSegment_RoundTripsThroughSerializer"
  - "Parse_CiInstallCommandFromRawYaml_ProjectsToSummary"
  - "ResolveAllAsync_CarriesInstallCommandFromContextYaml"
  - "InstallDependenciesHandler_PerContextCommandResolved_RunsInWorkdir"

done:
  - "context.yaml carries a ci.install_command the operator can set; it round-trips through the serializer."
  - "install_command is read at discovery time (beside stack.lang) and carried on RemoteContextDiscovery, so the early InstallDependencies step sees it; context.yaml is the single source. The p0202 ProjectMap no-op is gone."
  - "project-bootstrap SKILL.md emits ci.install_command (skills release + agentsmith.yml pin pending — operational)."
  - "An operator-set install_command for a node repo (npm ci) reaches Test with node_modules present and jest executes, and survives re-analysis (was p0202 done #6)."
