# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0059c
goal: "Extend PR comment support to Azure DevOps PR comments — same CommentIntent model and router, AzDO-specific handler"
requires: ["p0059", "p0043e"]
steps:
  - id: handler
    action: "Implement AzDO PR comment webhook handler"
    new:
      - "AzureDevOpsPrCommentWebhookHandler: handles ms.vss-code.git-pullrequest-comment-event"
      - "AzureDevOpsPrCommentReplyService: POST /_apis/git/repositories/{repo}/pullRequests/{id}/threads"
    modify:
      - "WebhookSignatureValidator: add AzDO Basic Auth verification"
  - id: json-paths
    action: "Map AzDO JSON structure"
    # resource.comment.content -> comment body
    # resource.comment.author.uniqueName -> author login
    # resource.pullRequest.repository.project.name + repository.name -> repo full name
    # resource.pullRequest.pullRequestId -> PR identifier
config: |
  webhooks.azdo_secret: ${AZDO_WEBHOOK_SECRET}
done:
  - "AzureDevOpsPrCommentWebhookHandler handles PR comment events"
  - "AzureDevOpsPrCommentReplyService posts replies as PR thread"
  - "AzDO Basic Auth verification works"
  - "Scenario A (new job) + Scenario B (dialogue) work via AzDO PR comments"
  - "Unit tests for AzDO payload parsing (7 tests)"
  - "All 852 tests green"
