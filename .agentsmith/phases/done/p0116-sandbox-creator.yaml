done:
  - "AgentSmith.Sandbox.Wire is a separate project. Step / StepKind / StepEvent / StepEventKind / StepResult / RedisKeys / WireFormat / SizeLimits live there. Agent and Contracts both reference it. Wire has zero project dependencies."
  - "Wire's StepKind has Run, Shutdown, ReadFile, WriteFile, ListFiles. Agent's StepExecutor handles all five via FileStepHandler for the file-op trio."
  - "Step.Validate() exists on the wire record and is called by JobLoop pre-dispatch (invalid steps push StepResult{ExitCode=-1} and the loop continues) AND by Server-side ToolExecutor pre-push (defense in depth). One source of truth for per-Kind preconditions."
  - "Wire SizeLimits enforced identically by Agent (FileStepHandler) and Server (InProcessSandbox): ReadFile 1 MB + UTF-8-validated, WriteFile 10 MB, ListFiles 1000 entries with truncation warning event."
  - "ISandbox / ISandboxFactory in Contracts. Three implementations: Kubernetes, Docker, InProcess. SandboxSpec includes ResourceLimits + SandboxSecurityContext."
  - "Auto-detection picks the right backend at startup. SANDBOX_TYPE env overrides. Documented edge case: KUBERNETES_SERVICE_HOST is present in every K8s pod (including dev pods) — operators in unusual envs set SANDBOX_TYPE explicitly."
  - "Pipeline lifecycle: Sandbox created at pipeline-start when pipeline contains CheckoutSource / AgenticExecute / Test / GenerateTests / GenerateDocs, disposed at pipeline-end (also on exception). One Sandbox per pipeline-run. Discussion-only pipelines run without a Sandbox."
  - "CheckoutSourceHandler pushes `git clone` as Step #1 inside the sandbox using inline credential.helper against pod env GIT_TOKEN. /work in the sandbox is populated before any downstream handler runs. Server-Pod local filesystem is not touched for clone. Branch/commit/push remain server-side via LibGit2Sharp for V1 — acknowledged limitation, follow-up phase migrates them."
  - "AgenticExecuteHandler + TestHandler + GenerateTestsHandler + GenerateDocsHandler + ToolExecutor go through ISandbox. ToolExecutor's run_command(string) wraps in `Step{Command='/bin/sh', Args=['-c', commandLine]}` so existing LLM tool-schema and existing skill prompts work unchanged (shell pipes/redirects still work). read_file / write_file / list_files map to first-class Kinds. Process.Start in the Server-Pod only via InProcessSandbox path. CLI mode auto-detects to InProcess and continues working without containers."
  - "DockerSandboxFactory and DockerJobSpawner co-exist. DockerJobSpawner (p0019a) spawns whole pipeline containers from Slack-intent / webhook flows; DockerSandboxFactory spawns sandbox containers for individual Step execution. Different layers, both kept, decision documented."
  - "SandboxRedisChannel is pipeline-scoped. ONE channel per pipeline holds a persistent lastSeenXid; XREAD BLOCK starts from lastSeenXid on every WaitForResultAsync call so events are delivered through IProgress exactly once across the pipeline's lifetime. Regression test covers two sequential WaitForResultAsync calls on the same channel."
  - "Pod-spec uses Init-Container agent-loader (copies the binary out of agent-smith-sandbox-agent) + main container toolchain (user-image, ENTRYPOINT overridden). Pod-level securityContext sets fsGroup=1000 by default (overridable via SandboxSpec.SecurityContext) so the initContainer-written /shared/agent is readable+executable from non-root toolchain main containers. No per-language pre-baked images."
  - "RBAC: pods/create+delete+get+log/get+status/get on Server's ServiceAccount. Sample in deploy/k8s/ and Helm chart updated. NO pods/exec."
  - "Cleanup guarantees: Shutdown step → 10s grace → DeleteNamespacedPodAsync force. OwnerReference catches Server-Pod crash."
  - "Resource limits: 2Gi / 1 CPU default, configurable."
  - "End-to-end smoke against AAD-DEV passes: ticket → webhook → pipeline → Sandbox-Pod → git clone via Step → build/test in toolchain image → PR. Pod lifecycle clean."
  - "decisions.md entry documents the p0115/p0116 split honestly. Future readers know neither phase alone is the working sandbox — the pair is."
  - "Tests: ~40 new tests (factored higher to reflect FileStepHandler bounds + Step.Validate + CheckoutSource migration + sh-wrap + lastSeenXid regression), all existing green. dotnet build zero warnings."
  - "Docs: sandbox-architecture.md is the canonical Server-side view (incl. KUBERNETES_SERVICE_HOST detection caveat); sandbox-agent.md cross-references it."