      - "tests/AgentSmith.Tests/Handlers/AgenticExecuteHandlerSandboxTests.cs: mocked ISandbox passed through context, tool-loop runs, tools dispatched correctly via ToolExecutor."
      - "tests/AgentSmith.Tests/Handlers/TestHandlerSandboxTests.cs: dotnet repo dispatches Step with dotnet test. ExitCode 0 → Success-Result. ExitCode 1 → Fail-Result. stdout captured through IProgress."
