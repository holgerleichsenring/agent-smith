      - "src/AgentSmith.Application/Services/Handlers/GenerateTestsHandler.cs: same migration pattern as AgenticExecuteHandler — pulls Sandbox from PipelineContext, ToolExecutor uses ISandbox. The handler today drives an LLM tool-loop; only the underlying ToolExecutor mechanism changes."
