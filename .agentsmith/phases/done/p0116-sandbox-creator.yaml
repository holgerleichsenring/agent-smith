# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0116
goal: "Server-Pod orchestrates an ephemeral Sandbox-Pod per Pipeline-Run via the K8s API using the Init-Container pattern (agent-smith-sandbox-agent injects itself into any Toolchain-Image), and communicates with the Agent through Redis. CheckoutSourceHandler, AgenticExecuteHandler, TestHandler, and ToolExecutor all delegate to the Sandbox via an ISandbox abstraction; the entire pipeline runs inside the sandbox /work directory, with `git clone` itself becoming Step #1 instead of LibGit2Sharp on the Server-Pod. ToolExecutor's run_command/read_file/write_file/list_files map to first-class Step.Kinds instead of shell tricks (run_command is wrapped in `sh -c` to preserve LLM tool-schema compatibility). Pipeline-lifetime equals Sandbox-lifetime, with synchronous-blocking spawn at pipeline start and disposal at pipeline end. This phase also retroactively extracts the wire models from AgentSmith.Sandbox.Agent into a shared AgentSmith.Sandbox.Wire project (with explicit SizeLimits + Step.Validate), and adds first-class Step.Kinds for file operations — both decisions were made too late to land in p0115."

requires: ["p0115"]

scope:
  in: "Wire-project extraction (AgentSmith.Sandbox.Wire — records + WireFormat JSON options + SizeLimits constants + Step.Validate), three new Step.Kinds (ReadFile, WriteFile, ListFiles) with corresponding Agent-side handlers including size/encoding enforcement, ISandbox / ISandboxFactory abstractions in Contracts, KubernetesSandboxFactory and KubernetesSandbox in Server (PodSpecBuilder sets fsGroup so the toolchain main container can read /shared/agent), DockerSandboxFactory for compose-based dev (parallel layer to existing DockerJobSpawner — different concerns, both kept), InProcessSandbox replacing the legacy Process.Start path for CLI mode, auto-detection of the right factory, integration into PipelineExecutor, migration of CheckoutSourceHandler (push `git clone` as Step #1 inside the sandbox instead of LibGit2Sharp on Server-Pod) + AgenticExecuteHandler + TestHandler + ToolExecutor (run_command wraps in sh -c to preserve LLM tool-schema), GenerateTests + GenerateDocs handlers (same migration pattern as Test/AgenticExecute), pipeline-scoped SandboxRedisChannel (one channel per pipeline, lastSeenXid tracks XREAD position so events don't replay across steps), RBAC patch (pods/create + pods/delete + pods/get + pods/log/get + pods/status/get — explicitly NOT pods/exec), Helm chart update, manual end-to-end smoke against AAD-DEV, full documentation."
  out: "Mid-step cancellation (pod-delete works as a hammer; granular signal-based cancel comes later). Pre-spawn parallel to FetchTicket. Sandbox pooling/reuse. Multi-step parallelism. Heartbeat / mid-pipeline recovery. TRX result file parsing in TestHandler (just exit-code routing for V1; structured result parsing is a follow-up). Redis-stream cleanup / MAXLEN trimming on pipeline end (streams stay; follow-up adds DEL or MAXLEN). Pod-spec details beyond fsGroup (imagePullSecrets, nodeSelector, tolerations) — operator can add via Helm overrides; spec-level support is a follow-up."

decisions:
  - key: "Honest framing on retroactive p0115 changes. p0115 shipped Step / StepKind / StepEvent / StepResult / RedisKeys inside the Agent's own Models/ folder, with Kind={Run,Shutdown} only. While p0115 was being implemented we realized two things that should have been part of it: the wire types need to be shared with the Server, and read_file / write_file / list_files should be first-class Kinds rather than encoded as shell tricks. Both decisions are made in p0116 — meaning p0116 modifies code that p0115 just shipped. This is unusual for the phase scheme, normally each phase delivers a clean increment. The trade-off is documented here so the commit history reads correctly: p0115 = first runnable Agent, p0116 = wire refactor + ISandbox + migration, both together = working sandbox architecture. decisions.md gets a matching entry."
  - key: "AgentSmith.Sandbox.Wire as a separate project. Contains the wire records and nothing else: Step, StepKind, StepEvent, StepEventKind, StepResult, RedisKeys. No dependencies of its own. Agent references Wire (drops its own Models/ folder). Contracts references Wire (so Application and Server pick it up transitively). The Agent stays isolated — Wire has no Domain or Provider concepts; it's the controlled shared vocabulary between two independent components. ~10KB in the self-contained Agent binary."
  - key: "First-class Step.Kinds for file operations. Three new Kinds added to StepKind enum: ReadFile, WriteFile, ListFiles. Step record gains optional fields Path (string?), Content (string?), MaxDepth (int?) — only meaningful for the relevant Kind. Agent-side StepExecutor branches on Kind: Run goes to Process.Start as before, ReadFile reads via System.IO.File and returns the content via Result.OutputContent (a new field on StepResult, NOT via StepEvent — events stay reserved for stdout/stderr line-streams), WriteFile writes via System.IO.File (atomic temp+rename), ListFiles does Directory.EnumerateFileSystemEntries with MaxDepth and returns a JSON array via Result.OutputContent. Result.ExitCode = 0 on success, 1 on IOException / size-violation / encoding-violation with ErrorMessage populated. Eliminates the base64-via-Env trick from the previous draft and removes ARG_MAX as a concern."

  - key: "Wire SizeLimits — bounded file ops, NOT general-purpose I/O. The file-op Kinds are designed for an LLM agent reading source files and writing patches, not for moving large blobs. Hard limits enforced by the Agent (and identically by InProcessSandbox) and exposed as constants in AgentSmith.Sandbox.Wire/SizeLimits.cs: ReadFile.MaxBytes = 1 MB (1_048_576), WriteFile.MaxBytes = 10 MB (10_485_760), ListFiles.MaxEntries = 1000. ReadFile additionally validates UTF-8 — binary content (invalid UTF-8 sequences detected via Encoding.UTF8.GetString with Throw-on-invalid) returns ExitCode=1 with ErrorMessage 'binary or non-UTF-8 content not supported'. ReadFile over MaxBytes returns ExitCode=1 with ErrorMessage 'file exceeds 1 MB limit'. ListFiles over MaxEntries truncates the JSON array to the first 1000 entries and pushes a Stderr-kind StepEvent 'directory truncated at 1000 entries'. WriteFile over MaxBytes returns ExitCode=1 (no partial write — temp+rename pattern means failure leaves the destination untouched). Limits live in Wire so both Agent and InProcessSandbox enforce identical numbers; bumping a limit is a single source-edit + Wire-version bump."

  - key: "Step.Validate() in Wire — per-Kind preconditions checked before dispatch. The Step record gets a Validate() method returning a (bool IsValid, string? Error) tuple. Per-Kind rules: Run requires non-empty Command. ReadFile requires non-empty Path, Content/Args/MaxDepth must be null. WriteFile requires non-empty Path AND non-null Content (empty string is allowed — represents 'create empty file'). ListFiles requires non-empty Path; MaxDepth defaults to 1 if null. Shutdown ignores all other fields. JobLoop calls Validate() BEFORE dispatching to StepExecutor — invalid steps push StepResult{ExitCode=-1, ErrorMessage} and the loop continues (same shape as the empty-Command failure path that already exists in p0115's JobLoop). Server-side ToolExecutor calls Validate() too as a defense-in-depth check before pushing to Redis. Validation lives in Wire so both sides have one truth."
  - key: "ISandbox abstraction lives in Contracts. Methods: Task<StepResult> RunStepAsync(Step step, IProgress<StepEvent>? progress, CancellationToken ct). IAsyncDisposable for pipeline-end cleanup. Property string JobId for logging. No GetWorkingDirectory() or similar — /work is convention shared with the Agent (matches p0115)."
  - key: "ISandboxFactory.CreateAsync(SandboxSpec spec, CancellationToken ct) creates and waits-for-ready. SandboxSpec: ToolchainImage (e.g. mcr.microsoft.com/dotnet/sdk:8.0), AgentImage (default agent-smith-sandbox-agent:latest), GitTokenSecretRef (optional), ResourceLimits (default 2Gi / 1 CPU), TimeoutSeconds (default 120 for pod-start)."
  - key: "Pod-naming: agentsmith-sandbox-{shortPipelineId}. Labels: app=agentsmith-sandbox, pipeline-id={fullId} for selection. RestartPolicy=Never (single-job pattern). OwnerReference set to the Server-Pod itself, so the K8s GarbageCollector cleans up the Sandbox-Pod if the Server-Pod dies mid-pipeline."
  - key: "Pod has two containers: initContainer agent-loader (cp /agent/sandbox-agent /shared/) and container toolchain (user-specified Toolchain-Image with ENTRYPOINT overridden to /shared/sandbox-agent --redis-url ... --job-id ...). Shared emptyDir volume /shared between them, plus an emptyDir volume /work used by the Agent for the working directory. Env vars REDIS_URL, JOB_ID, GIT_TOKEN (via secretKeyRef when GitTokenSecretRef is set). Pod-level securityContext sets fsGroup=1000 so emptyDir volumes are group-owned and group-writable — this is critical: the initContainer (running as root in the carrier image, since p0115 deliberately leaves USER unset) writes /shared/agent, and the toolchain main container (running as whatever UID the upstream image declares — `node:20` is UID 1000, `mcr.microsoft.com/dotnet/sdk:8.0` is root, `salesforce/cli` is non-root) needs read+execute on /shared/agent. fsGroup makes emptyDir owned by GID 1000 with 2775 perms, which lines up with most upstream images. Operators can override fsGroup via SandboxSpec.SecurityContext for unusual UIDs."
  - key: "Pod-wait strategy: after CreateNamespacedPodAsync, poll Pod.Status every 2s. Accept when ContainerStatuses[toolchain].Ready=true. On Phase=Failed or ImagePullBackOff: throw with a clear error (image name, reason, message from Status). On timeout (default 120s): delete the pod, throw. Per-status-change logging ('image pulling', 'init running', 'main starting') so the Server-Pod's logs show where things hung."
  - key: "Server-side Redis channel mirrors p0115's RedisJobBus but flipped: Server LPUSHes Step JSONs onto sandbox:{jobId}:in, listens for events on the events stream via XREAD BLOCK, and polls the results-list. New class SandboxRedisChannel in Server, NOT shared with the Agent (different responsibilities, no artificial shared library beyond Wire). RedisKeys constants come from Wire; both sides read the same string-builders."

  - key: "SandboxRedisChannel is pipeline-scoped, NOT step-scoped. ONE channel instance per pipeline lives inside the KubernetesSandbox/DockerSandbox/InProcessSandbox, holding a `_lastSeenXid` field initialized to '0-0' at construction. RunStepAsync(step) pushes the step, then enters an XREAD BLOCK loop starting from `_lastSeenXid`; for each batch returned, every event is forwarded through IProgress (filtered to step.StepId so the caller only sees its own events), the loop's lastSeenXid is advanced to the highest XID in the batch, and in parallel a polling LPOP on the results list checks whether the matching StepResult has arrived. When the result arrives, RunStepAsync returns. Reason: a step-scoped channel that re-read from '0-0' would replay every old event from the entire pipeline on every step, multiplying IProgress callbacks by N steps and visibly bloating the Server's logs. Pipeline-scoping with persistent lastSeenXid means each event fires IProgress exactly once across the pipeline's lifetime."
  - key: "RunStepAsync is synchronous-blocking: pushes the Step, then loops on XREAD BLOCK reading events until the matching Result appears on the results list. IProgress fires per StepEvent for live log streaming. Step-timeout: if step.TimeoutSeconds + 30s grace passes without a Result, throw — Server-Pod decides what to do (typically pipeline-fail)."
  - key: "Pipeline integration: PipelineExecutor creates the Sandbox at the start (`await using var sandbox = await sandboxFactory.CreateAsync(spec, ct)`) and disposes it at the end. Sandbox lives in PipelineContext under ContextKeys.Sandbox. Handlers that need it (AgenticExecute, Test, GenerateTests, GenerateDocs) pull it from Context. The SandboxSpec is built from ProjectConfig + ProjectMap by a SandboxSpecBuilder — convention-driven (e.g. ProjectMap.PrimaryLanguage='dotnet8' → mcr.microsoft.com/dotnet/sdk:8.0), with per-project overrides via ProjectConfig.Sandbox.ToolchainImage."
  - key: "ToolExecutor refactor. Today: run_command/read_file/write_file/list_files all hit Process.Start. New: all four delegate to ISandbox via Steps. run_command(string commandLine) → Step{Kind=Run, Command='/bin/sh', Args=['-c', commandLine]} — wrapping in `sh -c` preserves the LLM tool-schema (today the LLM passes a single command string with shell pipes/redirects/quoting; the Agent's ProcessRunner uses ProcessStartInfo.ArgumentList without shell, so without sh-wrap any pipe like `cat foo | grep bar` would silently fail). read_file → Step{Kind=ReadFile, Path}, takes Result.OutputContent (new field on StepResult, populated only for ReadFile/ListFiles). write_file → Step{Kind=WriteFile, Path, Content}. list_files → Step{Kind=ListFiles, Path, MaxDepth}, returns parsed JSON. The Agent's tool-loop in AgenticExecuteHandler doesn't change — same tool schemas to the LLM, the underlying mechanism is transparently swapped. Existing skills and prompts work unchanged."

  - key: "CheckoutSourceHandler migration. Today CheckoutSourceHandler runs LibGit2Sharp / git CLI on the Server-Pod's filesystem against a Server-side working directory. New: it builds a Step{Kind=Run, Command='git', Args=['-c', 'credential.helper=!f() { echo \"username=x-access-token\"; echo \"password=$GIT_TOKEN\"; }; f', 'clone', repoUrl, '.']} — the credential.helper inline pulls GIT_TOKEN from the sandbox pod's env (set via secretKeyRef in PodSpecBuilder), and the clone target '.' resolves to /work (the Step's WorkingDirectory defaults to /work per p0115). For non-repo pipelines (legal-analysis without source, etc.) CheckoutSourceHandler skips silently as today. After clone succeeds, all subsequent handlers see /work populated. Reason this is in p0116 not p0115: without it, /work stays empty and the entire downstream chain (AgenticExecute, Test, GenerateTests, GenerateDocs) operates on nothing. p0115's 'source-tree acquisition is not the agent's responsibility' decision pushed the burden here; p0116 honors it. Side effect: LibGit2Sharp can be removed from the Server-Pod's runtime closure once all branch/PR ops also move to Step-based git invocations (deferred — branch/commit/push migration is a follow-up after the demo)."

  - key: "DockerJobSpawner is NOT replaced by DockerSandboxFactory — both stay, different layers. DockerJobSpawner (p0019a) spawns whole agent-smith pipeline containers in response to Slack-intent / webhook flows when the dispatcher decides to delegate a pipeline to a fresh container instance. DockerSandboxFactory (this phase) spawns ephemeral sandbox containers FOR a specific pipeline run's individual Steps (the toolchain container the Agent runs inside). One is 'spawn an agent-smith pipeline'; the other is 'spawn a sandbox for a pipeline's tool calls'. Both can co-exist on the same Docker daemon — DockerJobSpawner runs a CLI image, DockerSandboxFactory runs an upstream toolchain image with the carrier-injected agent. No code change to DockerJobSpawner; this decision exists so future readers don't try to merge them."
  - key: "AgenticExecuteHandler. ToolExecutor is constructed with the active Sandbox-instance (pulled from PipelineContext) instead of the old Process-based path. Existing tool-loop logic stays unchanged — same tools, same schemas, same iteration limit."
  - key: "TestHandler. Today: Process.Start('dotnet test ...'). New: sandbox.RunStepAsync(Step{Kind=Run, Command='dotnet', Args=['test', '--logger', 'trx', '--results-directory', '/work/test-results']}). Result.ExitCode determines pass/fail. stdout in CommandResult.Detail. TRX file capture is optional — V1 skip, just route exit-code."
  - key: "Three ISandboxFactory implementations. KubernetesSandboxFactory for in-cluster Server-Pod (containerd-only, no docker.sock). DockerSandboxFactory for compose-based dev (talks to docker.sock). InProcessSandbox for CLI mode (Process.Start in a temp dir, replaces the existing legacy path so the whole codebase goes through ISandbox). All three implement the same contract — handlers don't know which one is active."
  - key: "Auto-detection. ISandboxFactory registered via factory-method that checks at runtime: explicit SANDBOX_TYPE env var first, then KUBERNETES_SERVICE_HOST set → kubernetes, then /var/run/docker.sock exists → docker, else inprocess. Logger prints which one was chosen at startup. CLI mode (no env vars set, no docker socket) ends up on inprocess naturally."
  - key: "RBAC requires pods/create + pods/delete + pods/get + pods/log/get + pods/status/get on the agentsmith Server's ServiceAccount. Sample patch lives in deploy/k8s/rbac-sandbox.yaml and the Helm chart's role.yaml is updated to match. NO pods/exec — communication runs over Redis, not exec. Documented as a precondition the operator merges before deploying the new Server image."
  - key: "Cleanup guarantees. Pipeline ends → Sandbox.DisposeAsync → push Step.Shutdown to Redis (Agent exits gracefully, Pod hits Phase=Succeeded) → wait up to 10s for Phase=Succeeded → DeleteNamespacedPodAsync (force=true if grace expired). On Server-Pod crash mid-pipeline: OwnerReference triggers K8s GC. Belt-and-suspenders. Stale-Pod-Detector in the Server-Pod is post-Demo."
  - key: "Resource-limits default 2Gi memory / 1 CPU, configurable via SandboxSpec. dotnet build with NuGet restore peaks around 1.5Gi, 2Gi gives headroom. CPU 1 is conservative — Demo runs fine, production can raise."
  - key: "Inprocess mode loses container isolation. CLI mode runs the agent's commands directly in the user's machine — `dotnet test` actually runs locally, write_file writes to a real path, etc. This was already true today via Process.Start; the InProcessSandbox just formalizes it. Working-dir is a temp directory created on CreateAsync and deleted on DisposeAsync. Documented as a known property — local CLI is single-tenant, single-user, the whole point of this mode is fast iteration not isolation."

steps:
  - id: wire-extraction
    action: "Extract wire records, JSON options, size limits, and Step.Validate from p0115's Agent into a new shared project"
    new:
      - "src/AgentSmith.Sandbox.Wire/AgentSmith.Sandbox.Wire.csproj: net8.0 class library, no dependencies (NOT even Contracts — Wire stays at the bottom of the dependency graph)."
      - "src/AgentSmith.Sandbox.Wire/Step.cs: moved from src/AgentSmith.Sandbox.Agent/Models/Step.cs. Add new optional fields Path (string?), Content (string?), MaxDepth (int?). Update Step.Shutdown factory. Add public method `(bool IsValid, string? Error) Validate()` per the Step.Validate decision: Run requires non-empty Command; ReadFile requires non-empty Path; WriteFile requires non-empty Path AND non-null Content; ListFiles requires non-empty Path; Shutdown ignores all other fields."
      - "src/AgentSmith.Sandbox.Wire/StepKind.cs: moved + extended with Run, Shutdown, ReadFile, WriteFile, ListFiles."
      - "src/AgentSmith.Sandbox.Wire/StepEvent.cs: moved unchanged."
      - "src/AgentSmith.Sandbox.Wire/StepEventKind.cs: moved unchanged."
      - "src/AgentSmith.Sandbox.Wire/StepResult.cs: moved + new field OutputContent (string?) for ReadFile/ListFiles results."
      - "src/AgentSmith.Sandbox.Wire/RedisKeys.cs: moved unchanged."
      - "src/AgentSmith.Sandbox.Wire/WireFormat.cs: moved from src/AgentSmith.Sandbox.Agent/Models/WireFormat.cs. The JsonSerializerOptions singleton MUST live in Wire so Agent and Server (de)serialize identically — camelCase + JsonStringEnumConverter + WhenWritingNull. Drift here would silently break the wire."
      - "src/AgentSmith.Sandbox.Wire/SizeLimits.cs: static class holding the public constants per the SizeLimits decision: ReadFileMaxBytes = 1_048_576 (1 MB), WriteFileMaxBytes = 10_485_760 (10 MB), ListFilesMaxEntries = 1000. Single source of truth so Agent and InProcessSandbox enforce identical numbers."
    modify:
      - "AgentSmith.sln: add AgentSmith.Sandbox.Wire under src."
      - "src/AgentSmith.Sandbox.Agent/AgentSmith.Sandbox.Agent.csproj: add ProjectReference to Wire, remove the now-empty Models folder."
      - "src/AgentSmith.Sandbox.Agent/Services/JobLoop.cs, StepExecutor.cs, RedisJobBus.cs, RedisEventChannel.cs, Program.cs: update namespaces from AgentSmith.Sandbox.Agent.Models to AgentSmith.Sandbox.Wire."
      - "tests/AgentSmith.Sandbox.Agent.Tests/Models/StepSerializationTests.cs, RedisKeysTests.cs: update namespaces (path stays, namespace flips). Add new tests for Step.Validate covering all five Kinds (Run with empty Command → invalid; ReadFile with null Path → invalid; WriteFile with non-null Content+empty string → valid; ListFiles with null Path → invalid; Shutdown always valid)."
    delete:
      - "src/AgentSmith.Sandbox.Agent/Models/ (entire folder — Step, StepKind, StepEvent, StepEventKind, StepResult, RedisKeys, WireFormat all moved to Wire)."

  - id: agent-file-step-handlers
    action: "Agent's StepExecutor learns ReadFile / WriteFile / ListFiles, with SizeLimits enforcement and UTF-8 validation"
    new:
      - "src/AgentSmith.Sandbox.Agent/Services/FileStepHandler.cs: new class injected into StepExecutor. Single responsibility: handle file-op Kinds. Methods: HandleReadFileAsync(Step) → reads via FileStream into a 1 MB buffer, fails ExitCode=1 if file > SizeLimits.ReadFileMaxBytes, validates UTF-8 via Encoding.UTF8.GetString with DecoderFallback.ExceptionFallback (binary content → ExitCode=1, ErrorMessage='binary or non-UTF-8 content not supported'). HandleWriteFileAsync(Step) → checks step.Content?.Length * sizeof(char) ≤ SizeLimits.WriteFileMaxBytes, writes via temp+rename (write to step.Path + '.tmp.{guid}', then File.Move with overwrite). HandleListFilesAsync(Step) → Directory.EnumerateFileSystemEntries with depth tracking, stops collecting at SizeLimits.ListFilesMaxEntries and pushes a Stderr StepEvent 'directory truncated at 1000 entries'. All file ops resolve relative paths against /work via Path.Combine + Path.GetFullPath validation."
    modify:
      - "src/AgentSmith.Sandbox.Agent/Services/StepExecutor.cs: branch on step.Kind upfront. Run → existing ProcessRunner path. ReadFile/WriteFile/ListFiles → delegate to FileStepHandler. Shutdown still rejected (StepExecutor only handles Run + the 3 file Kinds; Shutdown belongs in JobLoop)."
      - "src/AgentSmith.Sandbox.Agent/Services/JobLoop.cs: pre-dispatch validation via step.Validate() — invalid steps push StepResult{ExitCode=-1, ErrorMessage} and the loop continues (same shape as the existing empty-Command failure path). Then dispatch on Kind: Shutdown still terminates the loop; Run/ReadFile/WriteFile/ListFiles all route through StepExecutor (single dispatch point)."
    new_files_tests:
      - "tests/AgentSmith.Sandbox.Agent.Tests/Services/FileStepHandlerTests.cs: ReadFile happy path returns content via Result.OutputContent, ExitCode=0. ReadFile on missing path returns ExitCode=1 with descriptive ErrorMessage. ReadFile on file > 1 MB returns ExitCode=1 'file exceeds 1 MB limit'. ReadFile on binary file (write known PNG header bytes, then ReadFile) returns ExitCode=1 'binary or non-UTF-8 content not supported'. WriteFile creates file with correct UTF-8 content. WriteFile on existing path overwrites atomically (verify temp+rename pattern: temp file does not survive). WriteFile of > 10 MB returns ExitCode=1 without partial write. ListFiles returns JSON array, respects MaxDepth=1 vs MaxDepth=3. ListFiles on directory with > 1000 entries truncates to 1000 + emits Stderr StepEvent."
      - "tests/AgentSmith.Sandbox.Agent.Tests/Services/JobLoopValidationTests.cs: invalid step (Run with empty Command) routed to PushValidationFailureAsync, executor never called, loop continues. Invalid ReadFile (null Path) likewise. Validate() returning IsValid=true → normal dispatch."

  - id: contracts-isandbox
    action: "ISandbox abstraction in Contracts"
    new:
      - "src/AgentSmith.Contracts/Sandbox/ISandbox.cs: interface, IAsyncDisposable. Task<StepResult> RunStepAsync(Step step, IProgress<StepEvent>? progress, CancellationToken ct). string JobId."
      - "src/AgentSmith.Contracts/Sandbox/ISandboxFactory.cs: Task<ISandbox> CreateAsync(SandboxSpec spec, CancellationToken ct)."
      - "src/AgentSmith.Contracts/Sandbox/SandboxSpec.cs: sealed record (ToolchainImage, AgentImage default 'agent-smith-sandbox-agent:latest', GitTokenSecretRef?, ResourceLimits, SecurityContext, TimeoutSeconds=120)."
      - "src/AgentSmith.Contracts/Sandbox/SecretRef.cs: sealed record (SecretName, Key)."
      - "src/AgentSmith.Contracts/Sandbox/ResourceLimits.cs: sealed record (Memory='2Gi', CpuCores=1.0)."
      - "src/AgentSmith.Contracts/Sandbox/SandboxSecurityContext.cs: sealed record (FsGroup=1000, RunAsUser?). Default fsGroup=1000 covers most upstream images; operators with unusual UIDs (e.g. UID 1001 in some bespoke images) override at SandboxSpec construction time."
    modify:
      - "src/AgentSmith.Contracts/AgentSmith.Contracts.csproj: add ProjectReference to AgentSmith.Sandbox.Wire so Step / StepResult / StepEvent are visible to ISandbox method signatures."

  - id: redis-channel
    action: "SandboxRedisChannel — Server's pipeline-scoped view of the Redis bus"
    new:
      - "src/AgentSmith.Server/Services/Sandbox/SandboxRedisChannel.cs: ctor (IConnectionMultiplexer, string jobId, ILogger). Holds a private mutable `_lastSeenXid` field (initial '0-0'). Methods: Task PushStepAsync(Step step, ct) → LPUSH on sandbox:{jobId}:in. Task<StepResult> WaitForResultAsync(Guid stepId, IProgress<StepEvent>? progress, TimeSpan timeout, ct) → loops with two parallel reads: (a) XREAD BLOCK 1000 against the events stream STARTING FROM `_lastSeenXid` (advance lastSeenXid to the highest XID returned in each batch BEFORE filtering, so even events for OTHER steps still advance the cursor); per returned event, deserialize the StepEvent, filter to event.StepId == stepId, fire IProgress for matching ones; (b) ListLeftPopAsync against sandbox:{jobId}:results with a short tick (250 ms). Returns when the matching StepResult arrives or `timeout` elapses (then throw TimeoutException with a descriptive message). DisposeAsync cleans up subscriptions. Critical invariant: ONE SandboxRedisChannel per pipeline (held by the ISandbox impl), reused across every Step in that pipeline. Step-scoped channels would re-read events from '0-0' on every step, replaying the entire pipeline's history through IProgress on each subsequent step."
    new_files_tests:
      - "tests/AgentSmith.Tests/Sandbox/SandboxRedisChannelTests.cs: Testcontainers-Redis. PushStepAsync writes to input-list correctly (verify via direct LRANGE). WaitForResultAsync with seeded events+result returns and fires progress per event for matching stepId, ignores events for other stepIds. Returns timeout when no result arrives in window. KEY REGRESSION TEST: two sequential WaitForResultAsync calls on the SAME channel for DIFFERENT stepIds — events seeded for step1 BEFORE the channel was created should NOT replay through step2's IProgress (proves lastSeenXid persists across calls)."

  - id: kubernetes-sandbox
    action: "KubernetesSandboxFactory and KubernetesSandbox"
    new:
      - "src/AgentSmith.Server/Services/Sandbox/PodSpecBuilder.cs: pure functional. Builds V1Pod from SandboxSpec + jobId + redisUrl. Init container, main container, shared emptyDir volumes (/shared, /work), env vars, owner reference. Pod-level securityContext sets fsGroup=1000 (overridable via SandboxSpec.SecurityContext) so initContainer-written files in emptyDir are group-owned by 1000 and group-readable+executable, which is the GID of most upstream toolchain images (node:20, ubuntu, debian images, the salesforce CLI image). Without fsGroup, the initContainer (root) writes /shared/agent and the main container (non-root in some images) cannot read or execute it. Unit-testable without K8s mock."
      - "src/AgentSmith.Server/Services/Sandbox/KubernetesSandboxFactory.cs: ISandboxFactory impl. CreateAsync: generate jobId (Guid), build V1Pod via PodSpecBuilder, CreateNamespacedPodAsync, poll WaitForPodReadyAsync (2s interval, 120s timeout), return new KubernetesSandbox."
      - "src/AgentSmith.Server/Services/Sandbox/KubernetesSandbox.cs: ISandbox impl. ctor (IKubernetes, string namespace, string podName, SandboxRedisChannel channel, ILogger). RunStepAsync delegates to channel.PushStepAsync + channel.WaitForResultAsync. DisposeAsync: try { PushStepAsync(Step.Shutdown), wait up to 10s for Pod.Phase=Succeeded } finally { DeleteNamespacedPodAsync(force) }."
    new_files_tests:
      - "tests/AgentSmith.Tests/Sandbox/PodSpecBuilderTests.cs: Pod has 1 initContainer agent-loader, 1 container toolchain, both /shared mounted, /work as emptyDir, env REDIS_URL/JOB_ID set, GIT_TOKEN via secretKeyRef when spec has it, restartPolicy=Never, OwnerReference set, resource limits applied, Pod-level SecurityContext.FsGroup defaults to 1000 (and uses SandboxSpec.SecurityContext.FsGroup when overridden)."
      - "tests/AgentSmith.Tests/Sandbox/KubernetesSandboxFactoryTests.cs: mocked IKubernetes. CreateAsync calls CreateNamespacedPodAsync with correct spec. Pod-wait polls correctly. ImagePullBackOff → exception with clear message. Timeout → pod-delete + throw."
      - "tests/AgentSmith.Tests/Sandbox/KubernetesSandboxTests.cs: mocked Channel + IKubernetes. RunStepAsync delegates. DisposeAsync sends Shutdown + deletes pod even when wait-phase throws."

  - id: docker-sandbox
    action: "DockerSandboxFactory for compose-based development"
    new:
      - "src/AgentSmith.Server/Services/Sandbox/DockerSandboxFactory.cs: ISandboxFactory impl using Docker.DotNet. CreateAsync: create two containers (agent-loader + toolchain) sharing a volume, start toolchain, return DockerSandbox."
      - "src/AgentSmith.Server/Services/Sandbox/DockerSandbox.cs: analogous to KubernetesSandbox but with DockerClient. Cleanup via ContainerRemove force=true."
    new_files_tests:
      - "tests/AgentSmith.Tests/Sandbox/DockerSandboxFactoryTests.cs: mocked DockerClient. Container spec has correct image / command / volumes. DisposeAsync removes containers."

  - id: inprocess-sandbox
    action: "InProcessSandbox replaces the legacy Process.Start path for CLI mode"
    new:
      - "src/AgentSmith.Server/Services/Sandbox/InProcessSandboxFactory.cs: ISandboxFactory. CreateAsync creates a temp directory (e.g. /tmp/agentsmith-{jobId}) and returns InProcessSandbox."
      - "src/AgentSmith.Server/Services/Sandbox/InProcessSandbox.cs: ISandbox. RunStepAsync branches on Kind exactly like the Agent's StepExecutor: Run → Process.Start in temp dir, ReadFile/WriteFile/ListFiles → System.IO. Same semantics as a real Agent, just executed inside the calling process. DisposeAsync removes the temp dir."
    new_files_tests:
