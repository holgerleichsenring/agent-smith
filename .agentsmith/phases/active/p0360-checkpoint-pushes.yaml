# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0360
goal: "A run killed mid-flight (OOM'd sandbox, wall-time, crash) loses at most the work since the last checkpoint, not everything: the framework commits + pushes each dirty repo sandbox to the run branch on every accepted update_progress replace (throttled, secret-scanned), and the final CommitAndPR treats checkpoint-committed repos as delivered instead of 'nothing to commit'"

applies_to: backend

requires: [p0356, p0359]

decisions:
  - "Trigger: the operator's #19106 Wolverine migration died after ~1h/~30 EUR with sandboxes gone, no branch, no PR — durable output only materialized at CommitAndPR (step 21/22). NOT the budget fence (tier large $45/15M was the operator's own override). p0341e's wall-time salvage exists but (a) only fires on watchdog-wall-time, (b) cannot help when the sandbox itself is dead — work must already be on the remote BEFORE death"
  - "Rhythm: checkpoint on every accepted update_progress replace, throttled by agent.checkpoint_push_min_interval_seconds (default 120, <=0 disables). The ledger flip is the natural work-unit boundary and p0359's staleness reminder keeps it firing — no separate timer loop needed. Operator decision: 'alles möglichst schnell committen — periodisch oder bei Änderung'"
  - "Security: every checkpoint diff passes the same ISecretPatternScanner gate as the final commit; a match blocks the push (loudly). A checkpoint must never become the side door around the credential scan"
  - "PR-time semantics: checkpointed repos are recorded in PipelineContext (repo -> carried-real-code). CommitAndPRHandler counts them as changed when the tree is clean (all work already committed), pushes HEAD (no-op when current) and opens the PR over the checkpoint commits. WIP history stays in the PR — honest audit trail; squash-on-open is a possible follow-up, not built"
  - "Salvage widened: the finalizer-tail persist (p0341e, wall-time only) now also fires on sandbox-vanished — the OTHER repo sandboxes of a multi-repo run are alive and carry work; the dead repo's work survives via its last checkpoint. Operator cancel remains a deliberate abort (checkpoints already bound the loss)"
  - "Branch: no new naming — the sandbox is checked out on the run branch since acquire (TicketBranchNamer / CheckoutBranch); checkpoints push HEAD:branch with --force-with-lease exactly like the final commit"

steps:
  - id: checkpointer
    action: "RunWorkCheckpointer: per dirty repo sandbox stage -> secret-scan -> commit '[checkpoint] agent-smith run <id>' -> push to run branch; throttled; marks CheckpointedRepos in PipelineContext"
    new:
      - "src/backend/AgentSmith.Application/Services/RunWorkCheckpointer.cs"
  - id: trigger
    action: "AgenticMasterHandler composes the update_progress onReplaced hook: ledger flush (p0356) then checkpoint (p0360); coding masters only"
    modify:
      - "src/backend/AgentSmith.Application/Services/Handlers/AgenticMasterHandler.cs"
  - id: pr-over-checkpoints
    action: "CommitAndPRHandler: checkpointed-with-code repos keep hasCode over a clean tree; empty staged diff + checkpointed => PushHead + open PR instead of SkippedNoChanges"
    modify:
      - "src/backend/AgentSmith.Application/Services/Handlers/CommitAndPRHandler.cs"
      - "src/backend/AgentSmith.Application/Services/SandboxGitOperations.cs"
  - id: salvage-widened
    action: "PipelineExecutor finalizer-tail also runs on sandbox-vanished cancels (was wall-time only)"
    modify:
      - "src/backend/AgentSmith.Application/Services/PipelineExecutor.cs"
  - id: config
    action: "agent.checkpoint_push_min_interval_seconds (AgentConfig + schema), default 120"
    modify:
      - "src/backend/AgentSmith.Contracts/Models/Configuration/AgentConfig.cs"
      - "config/agentsmith.schema.json"

tests:
  - "Checkpoint_DirtyRepo_CommitsAndPushesToRunBranch_AndMarksRepo"
  - "Checkpoint_WithinMinInterval_SecondCallIsThrottled"
  - "Checkpoint_SecretPatternInDiff_NotPushedNotMarked"
  - "ExecuteAsync_CleanTreeButCheckpointed_OpensPrOverCheckpointCommits"
