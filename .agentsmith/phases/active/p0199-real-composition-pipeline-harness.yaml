# yaml-language-server: $schema=../../phase-spec.schema.json
phase: p0199-real-composition-pipeline-harness
goal: |
  Operator-stated requirement (2026-06-02, after p0198 still left a production
  NU1301): "Ich brauche einen TEST, der ALLES testet. So als würde es im
  System laufen. Partielle Unit Tests sind nicht genug. Ich brauche tests,
  die genau den lauf machen, als wäre eine LLM da. ggf. muss die llm
  weggemockt werden, aber alles andere muss genau gleich sein. ABER ICH
  BRAUCHE DIESEN TEST FÜR ALLE PIPELINES."

  Translated to engineering shape:
    For every pipeline preset (10 today: fix-bug, fix-no-test, add-feature,
    init-project, security-scan, api-security-scan, autonomous, mad-discussion,
    legal-analysis, skill-manager) the test harness must run the preset
    end-to-end through the SAME composition the Server's Program.cs builds.
    The ONLY mocked boundary is the LLM (Azure OpenAI / Claude). Everything
    else — DI graph, YamlConfigurationLoader, IConfigurationLoader, real
    handlers, real ContextBuilders, real ISandbox (InProcessSandbox is fine —
    same process model as DockerSandbox, uses real Process.Start), real
    Git, real dotnet/npm tooling — runs unmocked.

  Why this matters: p0196's PipelineE2EHarness already runs the handler chain
  but stubs ISandboxFactory (StubSandbox returns canned output), stubs
  ISourceProviderFactory, stubs ITicketProviderFactory, AND uses the empty
  AgentSmithConfig placeholder (the very bug p0198-followup fixed). Result:
  the harness can't catch NU1301 (no real dotnet restore), can't catch the
  config-loader bug (no real YAML loaded into AgentSmithConfig), can't catch
  registry-host-mismatch (no real nuget.config in a real workspace). It's a
  handler-chain smoke, not a system-functionality test.

  This phase replaces that harness with one that PROVES the pipeline works
  when wired exactly like production.

requires:
  - p0196-pipeline-e2e-harness
  - p0198-deterministic-registry-auth-setup
  - p0198-followup (DI override fix, commit b33f52e)

scope:
  in: |
    New project tests/AgentSmith.PipelineHarness/ (separate from
    AgentSmith.Tests to keep slow real-tooling runs out of the fast unit
    suite). Runs via `dotnet test --filter Category=PipelineE2E` or as a
    standalone console (so operators can invoke directly without the xUnit
    runner, matching the operator's "ein dotnet oder python programm, dass
    gestartet wird, cool" hint).

    Harness shape:
      RealCompositionHarness:
        - Builds a ServiceCollection identically to Server.Program.cs
          (delegates to a shared helper used by both Program.cs and the
          harness so they can't drift — extract to a
          ServerCompositionBuilder).
        - Mounts a fixture agentsmith.yml that mirrors operator shape:
          registries:, repos:, projects:, secrets:.
        - Overrides ONLY the LLM (IChatClientFactory) with a scripted
          ChatClientFactory that emits canned ChatResponse + ToolCall
          sequences per skill.
        - Optionally overrides ITicketProvider / ISourceProvider with
          fixture-backed implementations (these are infrastructure
          boundaries, not LLM, but they require external HTTP — fixture
          backing is reasonable; document the trade-off).
        - InProcessSandbox is the default; opt-in DockerSandbox via env
          var for the highest fidelity smoke.
        - Real Git operations against a checked-in fixture repo (one per
          language — csharp, node, python).

    Per-preset test:
      - Picks the right fixture repo for the preset's expectations.
      - Scripts LLM responses to drive the preset to its successful path
        AND to its known-failure paths (e.g. "master loops with 0
        changes" — the very symptom that motivated p0198).
      - Asserts: pipeline result.IsSuccess, no NU1301 / EAUTH / NRE in
        log capture, expected artifacts written (run-result.json, PR
        draft, decision YAMLs), expected events emitted.
      - For code-touching presets, the LLM script invokes write_file /
        bash tool calls that exercise the real handler tool-host plumbing
        + real sandbox + real dotnet build / dotnet test.

    Coverage matrix (all 10 must pass):
      ┌─────────────────────┬───────────────────────────────────────┐
      │ Preset              │ Real-tool checks per preset           │
      ├─────────────────────┼───────────────────────────────────────┤
      │ fix-bug             │ dotnet restore + dotnet test green    │
      │ fix-no-test         │ dotnet build green                    │
      │ add-feature         │ build + test + GenerateTests + Docs   │
      │ init-project        │ AnalyzeCode + BootstrapRound writes   │
      │ security-scan       │ StaticPatternScan + DependencyAudit   │
      │ api-security-scan   │ Nuclei/Spectral/ZAP stubs OK          │
      │ autonomous          │ LoadSkills + SkillRound + WriteTickets│
      │ mad-discussion      │ CompileDiscussion writes              │
      │ legal-analysis      │ BootstrapDocument + DeliverOutput     │
      │ skill-manager       │ resolve preset-shape regression first │
      └─────────────────────┴───────────────────────────────────────┘

    Private-feed integration (env-gated — env vars from .e2e-test.env):
      AGENTSMITH_TEST_NUGET_FEED + AGENTSMITH_TEST_NUGET_TOKEN
      AGENTSMITH_TEST_NPM_REGISTRY + AGENTSMITH_TEST_NPM_TOKEN
    When set, the fix-bug / add-feature fixture repo references the
    private feed; the harness asserts SetupRegistryAuth wrote
    /root/.nuget/NuGet/NuGet.Config inside the sandbox AND that the
    subsequent dotnet restore succeeded. This is the exact production
    failure mode that p0198 was supposed to prevent — the harness MUST
    cover it.

    ServerCompositionBuilder extract:
      Server.Program.cs's "var builder = WebApplication.CreateBuilder…
      builder.Services.AddRedis().AddCoreDispatcherServices().Add…" chain
      moves into a static ConfigureServices(IServiceCollection, string
      configPath) used by both Program.cs and the harness. Single source
      of truth.

  out: |
    Replacing InProcessSandbox with DockerSandbox by default — out.
    DockerSandbox runs as the production server uses; harness opt-in.
    Without docker: env-gated DOCKER_SANDBOX=1.

    Replacing real LLM with stubbed in EVERY test — out. A small subset
    of "smoke" tests can hit a real LLM if cheap-enough (env-gated +
    cost-capped); default is scripted.

    A "test all pipelines on every commit" CI gate — out. Suite is slow
    (minutes); operators invoke pre-release. Light unit suite stays the
    PR gate.

decisions:
  - key: "Separate project AgentSmith.PipelineHarness, not adding to AgentSmith.Tests. Reason: slow real-tool tests must be opt-in / off the PR gate; mixing speeds in one project leads to operators silencing the slow ones."
  - key: "InProcessSandbox is the harness default, DockerSandbox opt-in. Reason: InProcessSandbox uses Process.Start (same execution surface that handlers exercise), runs on any dev machine without docker, fast enough to chain. DockerSandbox is the production model — env-var-gate for highest fidelity. Both share ISandbox surface."
  - key: "Real ConfigurationLoader, NOT a hand-built AgentSmithConfig. Reason: this is the bug class p0198-followup just fixed — any test that bypasses the real loader will miss the next composition-root bug. The fixture YAML must round-trip through Yaml + Resolver + Compose."
  - key: "Mock LLM via scripted ChatResponse + ToolCalls, not via skipping the master. Reason: the master-loops-with-0-changes symptom (the original production failure) is a master-skill behavior; only a scripted LLM exposes it via the same tool-host plumbing the real LLM hits."
  - key: "Standalone console runner alongside xUnit, per operator hint. Reason: operators may want to run a single preset from the CLI without spinning up an xUnit project — `dotnet run --project tests/AgentSmith.PipelineHarness -- --preset fix-bug` is direct, scriptable, ops-friendly."

steps:
  - id: server-composition-extract
    new:
      - "src/backend/AgentSmith.Server/Services/ServerCompositionBuilder.cs"
    modify:
      - "src/backend/AgentSmith.Server/Program.cs (delegate DI chain to builder)"

  - id: harness-project
    new:
      - "tests/AgentSmith.PipelineHarness/AgentSmith.PipelineHarness.csproj"
      - "tests/AgentSmith.PipelineHarness/RealCompositionHarness.cs"
      - "tests/AgentSmith.PipelineHarness/ScriptedChatClientFactory.cs (extend existing)"
      - "tests/AgentSmith.PipelineHarness/Fixtures/agentsmith.yml"
      - "tests/AgentSmith.PipelineHarness/Fixtures/csharp-fixture/* (csproj + Tests.csproj)"
      - "tests/AgentSmith.PipelineHarness/Fixtures/node-fixture/* (package.json)"
      - "tests/AgentSmith.PipelineHarness/Fixtures/python-fixture/*"
      - "tests/AgentSmith.PipelineHarness/Program.cs (console runner)"

  - id: preset-tests
    new:
      - "tests/AgentSmith.PipelineHarness/Presets/FixBugTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/FixNoTestTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/AddFeatureTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/InitProjectTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/SecurityScanTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/ApiSecurityScanTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/AutonomousTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/MadDiscussionTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/LegalAnalysisTests.cs"
      - "tests/AgentSmith.PipelineHarness/Presets/SkillManagerTests.cs"

  - id: private-feed-integration
    action: |
      Each code-touching preset test (fix-bug, fix-no-test, add-feature,
      init-project) gets a [Fact] gated on AGENTSMITH_TEST_NUGET_FEED env
      var. Fixture csproj references the operator's private feed; harness
      asserts SetupRegistryAuth + subsequent dotnet restore both succeed.

  - id: smoke-skill-integration
    modify:
      - "scripts/smoke.sh (add `pipeline-harness` scope; runs the full preset suite)"
      - ".claude/agents/smoke.md (document the new scope)"

  - id: ci-opt-in
    action: |
      Document the harness in README.md and CONTRIBUTING.md as
      "pre-release smoke". NOT wired into PR CI by default — too slow
      for every push. Tag for release-please workflow as required step
      on tags only.

tests:
  - "RealComposition_FixBug_TolerantWithEmptyRegistries_PipelineGreen"
  - "RealComposition_FixBug_WithRegistries_SetupStagesCredentials_DotNetRestoreGreen"
  - "RealComposition_FixBug_MasterReturnsZeroChanges_StillPipelineGreen (current symptom)"
  - "RealComposition_FixNoTest_BuildGreenNoTest_PipelineGreen"
  - "RealComposition_AddFeature_GenerateTestsRuns_NewTestFileWritten"
  - "RealComposition_InitProject_BootstrapWritesContextYaml"
  - "RealComposition_SecurityScan_FindingsArtifactWritten"
  - "RealComposition_ApiSecurityScan_NucleiSpectralZapStubsRun"
  - "RealComposition_Autonomous_TicketsWrittenFromObservation"
  - "RealComposition_MadDiscussion_DiscussionMarkdownWritten"
  - "RealComposition_LegalAnalysis_FindingsWrittenAfterBootstrapDocument"
  - "RealComposition_SkillManager_PresetShapeRegression_FailsKnownBroken (until fixed)"
  - "RealComposition_AgentSmithConfig_HandlersSeeOperatorRegistries (the p0198-followup bug)"

done:
  - "ServerCompositionBuilder exists; Program.cs uses it; tests use it."
  - "RealCompositionHarness builds real ServiceProvider via ServerCompositionBuilder + fixture YAML."
  - "ChatClientFactory mock supports scripted ChatResponses + tool calls (write_file, bash, read_file)."
  - "All 10 presets have at least one passing real-composition test that exercises real handlers + real sandbox."
  - "Private-feed integration test green when env vars set; skipped cleanly when not (logs why)."
  - "smoke skill scope 'pipeline-harness' runs the suite."
  - "README documents how operators run the harness standalone (`dotnet run --project tests/AgentSmith.PipelineHarness`)."
  - "After this phase: an operator NEVER again sees a NU1301 / DI-bug / config-loader bug surface only in their production trigger — the harness would have caught it."
